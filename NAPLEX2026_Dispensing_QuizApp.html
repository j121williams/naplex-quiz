const ALL=[{"id": 1, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "A new **tramadol (Ultram)** prescription is written with **5 refills.** Are the refills valid, and why?", "opts": ["Yes — it is CIV, so ≤5 refills within 6 months", "No — it is CII, so no refills are permitted", "No — it is CIII, so only 3 refills are allowed", "No — it is CV, so refills require prescriber reauthorization"], "ans": 0, "exp": "Tramadol (Ultram) is **CIV** (like benzodiazepines, carisoprodol, zolpidem) → **≤5 refills within 6 months** is valid. ⚠ Trap: it is *not* CII (which would void all refills). *2A4.*"}, {"id": 2, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "A prescriber phones in an **emergency oral CII**. The written prescription must follow within:", "opts": ["72 hours", "7 days", "30 days", "24 hours"], "ans": 1, "exp": "Emergency oral CII → dispense only the emergency quantity; the prescriber must deliver the written Rx within **7 days**, and the pharmacist notifies DEA if it isn't received. *2A4.*"}, {"id": 3, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "A patient asks to **transfer** an oxycodone (CII) prescription to another pharmacy. You should:", "opts": ["Transfer it once between pharmacies", "Transfer it unlimited times electronically", "Refuse it — CII cannot be transferred", "Transfer it with prescriber verbal approval"], "ans": 2, "exp": "**CII prescriptions cannot be transferred.** (CIII–V may transfer once, or unlimited with a shared real-time database.) *2A4.*"}, {"id": 4, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "A patient calls for a **6th refill** of **alprazolam (CIV)**, **8 months** after the original fill. You should:", "opts": ["Refill it once more as a one-time courtesy", "Decline — controlled substances allow no refills at all", "Refill it — CIV permits unlimited refills for 1 year", "Decline — the 5-refill/6-month limit is exceeded"], "ans": 3, "exp": "CIII–V = **≤5 refills within 6 months**; beyond that (or past 6 months) a **new prescription** is required. (CII = no refills at all; alprazolam is CIV, so refills exist but are capped — D overstates the rule.) *2A4.*"}, {"id": 5, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2D", "stem": "A pharmacy must destroy expired **CII stock**. The correct method is:", "opts": ["Render non-retrievable, documenting on DEA Form 41", "Return to the distributor on DEA Form 222", "Flush each unit and log it on DEA Form 106", "Mix with cat litter and discard in regular trash"], "ans": 0, "exp": "Registrants destroy to a **non-retrievable** state with **DEA Form 41 + two witnesses**, or use a **reverse distributor**. ⚠ Flushing/cat-litter are **ultimate-user** (patient) methods only. *2D.*"}, {"id": 6, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2D", "stem": "A caregiver has leftover **fentanyl patches** and no take-back program nearby. Best disposal advice?", "opts": ["Throw in trash", "Flush (FDA flush list)", "Save for later", "Return to prescriber"], "ans": 1, "exp": "Fentanyl is on the **FDA flush list** (one-dose-fatal) → flush **only if** no take-back is available (take-back is otherwise preferred). *2D.*"}, {"id": 7, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2D,4B", "stem": "The **EPA RCRA Subpart P \"sewer ban\"** means healthcare facilities:", "opts": ["May sewer-dispose only controlled substances", "May sewer-dispose any non-controlled drug", "May not sewer-dispose hazardous-waste drugs", "Must incinerate all unused pharmaceuticals"], "ans": 2, "exp": "Since 2019, facilities and reverse distributors **cannot sewer hazardous-waste pharmaceuticals.** *2D,4B.*"}, {"id": 8, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2D", "stem": "Unused **warfarin (>0.3%)** is classified as:", "opts": ["RCRA U-list (toxic waste)", "RCRA D-list (characteristic)", "Non-hazardous trace waste", "RCRA P-list (acutely hazardous)"], "ans": 3, "exp": "Warfarin (Coumadin) >0.3% is **P-list acutely hazardous** (black RCRA bin) — also nicotine products, physostigmine, arsenic trioxide. *2D.*"}, {"id": 9, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "Which is an example of a REMS with **ETASU**?", "opts": ["Clozapine (ANC monitoring)", "A communication plan only", "A package insert", "A simple medication guide"], "ans": 0, "exp": "ETASU (Elements to Assure Safe Use) examples: **clozapine (Clozaril), isotretinoin (iPLEDGE), TIRF, mifepristone, lenalidomide/thalidomide, natalizumab (TOUCH).** *2A4.*"}, {"id": 10, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2B", "stem": "Generic substitution requires the product be:", "opts": ["The same color and shape", "Orange Book AB-rated equivalent", "From the same manufacturer", "A Purple Book interchangeable"], "ans": 1, "exp": "Substitute an **Orange Book \"A\"-rated (AB)** therapeutic equivalent (bioequivalent, 90% CI of AUC/Cmax 80–125%). *2B.*"}, {"id": 11, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2B", "stem": "The database for biosimilar/interchangeability status is the:", "opts": ["Green Book", "Orange Book", "Purple Book", "Red Book"], "ans": 2, "exp": "Interchangeable biosimilars may be substituted **per state law**; naming = core + **4-lowercase-letter suffix** (adalimumab-atto). ℹ FDA 2024–25: switching studies generally no longer required. *2B.*"}, {"id": 12, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2B", "stem": "A stable patient's **levothyroxine (Synthroid)** is filled with a **different manufacturer's** AB-rated generic at refill. Why does this still warrant caution?", "opts": ["Generic substitution is illegal for this drug", "The new AB-rated product is not bioequivalent", "Only the brand may legally be dispensed here", "It is narrow-therapeutic-index — recheck TSH if switched"], "ans": 3, "exp": "**NTI drugs** (levothyroxine, warfarin (Coumadin), phenytoin (Dilantin), digoxin (Lanoxin), tacrolimus (Prograf)) → small exposure shifts matter → **keep one product** and recheck levels (TSH) if switched. AB-rated generics are legally substitutable — consistency, not legality, is the issue. *2B.*"}, {"id": 13, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5A", "stem": "Your pharmacy is deciding which drugs require an **independent double-check.** Which most warrants one as an **ISMP high-alert** medication?", "opts": ["Concentrated potassium chloride", "Oral docusate sodium capsules", "Oral loratadine 10 mg tablets", "Oral acetaminophen 500 mg tablets"], "ans": 0, "exp": "High-alert classes (insulin, anticoagulants, opioids, **concentrated electrolytes — KCl, hypertonic saline**, chemo, neuromuscular blockers) → independent double-checks + limited floor-stock access. *5A.*"}, {"id": 14, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5A", "stem": "An order reads \"**digoxin (Lanoxin) 0.125 mg QD.**\" Which element violates the Joint Commission **\"Do-Not-Use\"** list?", "opts": ["The leading zero in 0.125 mg", "\"QD\" (write \"daily\")", "The unit \"mg\"", "The drug name abbreviation"], "ans": 1, "exp": "Banned: **QD/QOD** (write daily / every other day), U/IU, **trailing** zero (1.0 mg), **missing leading** zero (.5 mg), MS/MSO4/MgSO4. ✓ Trap: the **leading** zero (0.125) is **required**, not prohibited — only trailing zeros are. *5A.*"}, {"id": 15, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5C", "stem": "To prevent wrong-concentration insulin errors, your team weighs four fixes. Which is **strongest** per the error-prevention hierarchy?", "opts": ["A mandatory staff education in-service", "An independent second-pharmacist double-check", "A barcode forcing function blocking wrong concentration", "A new concentration-verification checklist step"], "ans": 2, "exp": "Hierarchy (strongest→weakest): **forcing functions / automation > standardization > checklists / double-checks > education.** Forcing functions don't depend on memory or vigilance — they make the error impossible. *5C.*"}, {"id": 16, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5A", "stem": "A technician nearly grabs **hydrOXYzine** instead of **hydrALAZINE**. Best mitigation?", "opts": ["Store the two bottles alphabetically together", "Relabel both with identical shelf stickers", "Memorize the pair to speed retrieval", "Use Tall-Man lettering with barcode scanning"], "ans": 3, "exp": "LASA (look-alike/sound-alike) → **Tall-Man lettering** + barcode verification + separation. *5A.*"}, {"id": 17, "group": "Dispensing & Med Safety", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "Which is a **Beers Criteria** potentially inappropriate medication in a 78-year-old?", "opts": ["Diphenhydramine", "Levothyroxine (Synthroid)", "Atorvastatin (Lipitor)", "Hydrochlorothiazide (Microzide)"], "ans": 0, "exp": "Anticholinergic → falls/cognition. Other Beers PIMs: benzodiazepines/Z-drugs, glyburide (DiaBeta), chronic NSAIDs, meperidine, antipsychotics in dementia. *3C2.*"}, {"id": 18, "group": "Dispensing & Med Safety", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3D1", "stem": "A **comprehensive medication review (CMR)** is provided annually to:", "opts": ["All patients filling any prescription", "Eligible Medicare Part D MTM beneficiaries", "All pediatric Medicaid beneficiaries", "Cash-pay patients without insurance only"], "ans": 1, "exp": "CMR is the core annual MTM service for eligible Part D patients; ends with a written **PMR + MAP.** *3D1.*"}, {"id": 19, "group": "Dispensing & Med Safety", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3A", "stem": "Medication reconciliation should occur at:", "opts": ["Only at the first outpatient visit", "At hospital admission only", "At every transition of care", "Only at the annual wellness visit"], "ans": 2, "exp": "Build the **best possible medication history** at each transition to prevent omissions/duplications/errors. *3A.*"}, {"id": 20, "group": "Dispensing & Med Safety", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "Lantus **40 units** subQ daily, dispense **1 vial (1000 units)**. Days supply?", "opts": ["33", "40", "20", "25"], "ans": 3, "exp": "1000 ÷ 40 = 25. ★ Days supply = total units ÷ units/day. *1C2.*"}, {"id": 21, "group": "Dispensing & Med Safety", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "Latanoprost **1 gtt OU QHS**, 2.5 mL bottle (~20 drops/mL). Days supply?", "opts": ["25", "50", "100", "12"], "ans": 0, "exp": "2.5 mL × 20 = 50 drops; 1 gtt both eyes daily = 2/day → 50 ÷ 2 = 25. ★ Count both eyes. *1C2.*"}, {"id": 22, "group": "Dispensing & Med Safety", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "Sig: \"**1 cap PO BID**,\" dispense **#60**. Days supply?", "opts": ["15", "30", "60", "20"], "ans": 1, "exp": "2 caps/day → 60 ÷ 2 = 30. *1C2.*"}, {"id": 23, "group": "Dispensing & Med Safety", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3E2", "stem": "Which auxiliary label belongs on **doxycycline (Vibramycin)**?", "opts": ["Refrigerate; protect from light", "Take with calcium-containing antacids", "Avoid prolonged sun exposure", "May turn the urine reddish-brown"], "ans": 2, "exp": "Photosensitivity also: fluoroquinolones, sulfonamides, amiodarone (Pacerone), HCTZ, retinoids. (Also separate from dairy/cations.) *3E2.*"}, {"id": 24, "group": "Dispensing & Med Safety", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2D", "stem": "Which is **exempt** from child-resistant packaging (PPPA)?", "opts": ["Lisinopril (Zestril) 10 mg tablets", "Metformin (Glucophage) 500 mg tablets", "Amoxicillin oral suspension", "Sublingual nitroglycerin"], "ans": 3, "exp": "PPPA exemptions: **SL nitroglycerin**, SL isosorbide ≤10 mg, OCs/HRT mnemonic packs, inhalers, and a **single non-CR container at patient/prescriber request.** *2D.*"}, {"id": 25, "group": "Dispensing & Med Safety", "domain": "D4", "tier": "T2", "aware": false, "nabp": "4B", "stem": "A patient takes **oxycodone (OxyContin) 20 mg/day**. The morphine (MS Contin)-milligram-equivalent (MME) is:", "opts": ["30", "13", "45", "20"], "ans": 0, "exp": "20 mg × **1.5** (oxycodone factor). ★ Factors: morphine (MS Contin) 1, hydrocodone 1, oxycodone (OxyContin) 1.5, hydromorphone (Dilaudid) 4, codeine ((in Tylenol #3)) 0.15, tramadol (Ultram) 0.1, fentanyl patch ×2.4. *4B.*"}, {"id": 26, "group": "Dispensing & Med Safety", "domain": "D4", "tier": "T2", "aware": false, "nabp": "4B", "stem": "Per the CDC 2022 guideline, naloxone (Narcan) should be offered when daily opioid dose reaches about:", "opts": ["25 MME", "50 MME", "200 MME", "10 MME"], "ans": 1, "exp": "— also with concurrent benzodiazepine, or history of OUD/overdose. ℹ The 2022 guideline individualizes care (reassess ≥50, avoid escalating ≥90). *4B.*"}, {"id": 27, "group": "Dispensing & Med Safety", "domain": "D4", "tier": "T2", "aware": false, "nabp": "4B", "stem": "To prescribe **buprenorphine (Suboxone) for OUD**, a clinician now needs:", "opts": ["A separate SAMHSA OTP certification", "A DATA 2000 X-waiver from DEA", "Only a standard DEA registration", "Board certification in addiction medicine"], "ans": 2, "exp": "The **MAT Act (2023) eliminated the X-waiver** — any DEA-registered prescriber may prescribe buprenorphine (Suboxone). *4B.*"}, {"id": 28, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5A", "stem": "Under DSCSA, the documents exchanged at each transaction (the \"T3\") are:", "opts": ["The product NDC, UPC, and GTIN identifier codes", "The wholesaler packing slip and itemized invoice", "The Transaction Identifier and Transaction Tracking tag", "The Transaction Information and Transaction Statement"], "ans": 3, "exp": "**TI + TS** (legacy TH being phased out by electronic tracing); retain **6 years**; product identifier = GTIN + serial + lot + expiration. *5A.*"}, {"id": 29, "group": "Dispensing & Med Safety", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5B", "stem": "A drug is recalled because vials contain the **wrong active ingredient**. Recall class?", "opts": ["Class I", "Class II", "Class III", "Market withdrawal"], "ans": 0, "exp": "Reasonable probability of **serious harm or death.** (II = temporary/reversible; III = unlikely harm.) *5B.*"}, {"id": 30, "group": "Dispensing & Med Safety", "domain": "D4", "tier": "T2", "aware": false, "nabp": "4A", "stem": "A patient develops **syncope hours after the influenza vaccine** you administered. Where do you report it?", "opts": ["MedWatch", "VAERS", "FAERS", "PDMP"], "ans": 1, "exp": "✓ **VAERS = vaccines**; MedWatch = all other drugs/devices; FAERS = the FDA's internal adverse-event database; PDMP = controlled-substance dispensing. *4A.*"}, {"id": 31, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "**Amoxicillin 400 mg/5 mL** suspension, **400 mg PO BID × 10 days.** Total mL to dispense?", "opts": ["50 mL", "80 mL", "100 mL", "200 mL"], "ans": 2, "exp": "400 mg = 5 mL/dose; BID = 10 mL/day × 10 days = **100 mL.** *1C2.*"}, {"id": 32, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "**Lantus SoloStar** (U-100, 3 mL/pen), **30 units QHS**, box of **5 pens.** Days supply?", "opts": ["75", "25", "33", "50"], "ans": 3, "exp": "3 mL × 100 units/mL = 300 units/pen × 5 = 1500 units ÷ 30 units/day = **50 days.** *1C2.*"}, {"id": 33, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C4", "stem": "Infuse **1000 mL over 8 hours**, drop factor **15 gtt/mL.** Rate in gtt/min?", "opts": ["31 gtt/min", "42 gtt/min", "63 gtt/min", "21 gtt/min"], "ans": 0, "exp": "1000 mL ÷ 480 min = 2.08 mL/min × 15 gtt/mL = **31 gtt/min.** *1C4.*"}, {"id": 34, "group": "Calculations", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1C3", "stem": "By alligation, to compound **100 g of 2% ointment** from **1%** and **5%** stocks, how much **5%** is needed?", "opts": ["15 g", "25 g", "40 g", "50 g"], "ans": 1, "exp": "Parts of 5% = 2 − 1 = 1; parts of 1% = 5 − 2 = 3; total 4 parts → 5% = (1/4) × 100 = **25 g** (with 75 g of 1%). *1C3.*"}, {"id": 35, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C4", "stem": "How many **mEq of sodium** are in **1 L of 0.9% NaCl** (NaCl MW ≈ 58.5)?", "opts": ["77 mEq", "116 mEq", "154 mEq", "308 mEq"], "ans": 2, "exp": "0.9% = 9 g/L; 9 ÷ 58.5 = 0.154 mol = 154 mmol; Na⁺ is monovalent → **154 mEq.** *1C4.*"}, {"id": 36, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1C3", "stem": "**Epinephrine 1:1000** equals what concentration in mg/mL?", "opts": ["10 mg/mL", "100 mg/mL", "0.1 mg/mL", "1 mg/mL"], "ans": 3, "exp": "1:1000 = 1 g per 1000 mL = 1000 mg/1000 mL = **1 mg/mL.** ★ 1:1000 = IM anaphylaxis; 1:10,000 (0.1 mg/mL) = IV code dose. *1C3.*"}, {"id": 37, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C4", "stem": "Pediatric **amoxicillin 45 mg/kg/day divided BID** for an **18 kg** child. Dose per administration?", "opts": ["405 mg", "810 mg", "90 mg", "200 mg"], "ans": 0, "exp": "45 × 18 = 810 mg/day ÷ 2 = **405 mg per dose.** *1C4.*"}, {"id": 38, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C2", "stem": "**Albuterol (ProAir) HFA**, 200 actuations/inhaler, **2 pu *Lamictal** and **Lamisil** are a dangerous LASA pair of:", "opts": ["Lamotrigine and lamivudine, two antiviral-type agents", "Lamivudine and terbinafine, an antiviral/antifungal pair", "Two topical antifungal agents with similar names", "Lamotrigine, an anticonvulsant, and terbinafine, an antifungal"], "ans": 3, "exp": "**Lamictal = lamotrigine (Lamictal); Lamisil = terbinafine** — confusion risks SJS (lamotrigine) or wrong-therapy errors. *2A4.*"}, {"id": 43, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "2A4, 3C5", "stem": "Which list contains **ISMP high-alert medications**?", "opts": ["Insulin, heparin, warfarin (Coumadin), opioids, concentrated KCl", "Acetaminophen, loratadine, docusate, guaifenesin", "Amoxicillin, azithromycin (Zithromax), cephalexin, doxycycline (Vibramycin)", "Multivitamins, calcium, vitamin D, magnesium"], "ans": 0, "exp": "**Insulin, anticoagulants (heparin/warfarin (Coumadin)), opioids, concentrated electrolytes (KCl), neuromuscular blockers, chemotherapy** are high-alert — errors carry heightened harm; use independent double-checks. *2A4, 3C5.*"}, {"id": 44, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "2A4", "stem": "**Zyprexa** and **Zyrtec** are a LASA pair representing:", "opts": ["Two sedating antihistamine products with similar names", "Olanzapine, an antipsychotic, and cetirizine, an antihistamine", "Olanzapine and ranitidine, an antipsychotic/acid-reducer pair", "Cetirizine and quetiapine, an antihistamine/antipsychotic pair"], "ans": 1, "exp": "**Zyprexa = olanzapine (Zyprexa); Zyrtec = cetirizine** — a high-risk LASA mix-up between an antipsychotic and an OTC antihistamine. *2A4.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();
const APPKEY="naplexQuiz:Dispensing & Med Safety";let MEM={attempts:[],topic:{},dom:{},missed:[]};
function loadP(){try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function getP(){return loadP()||MEM;}
function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
