<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Lab Interpretation — NAPLEX Quiz</title>
<style>
:root{--navy:#1F3864;--steel:#2E5F8A;--green:#1E5C2E;--ok:#1E5C2E;--bad:#9B2226;--bg:#f5f6f8;--card:#fff;--ink:#1d2430;--muted:#5b6675}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--navy);color:#fff;padding:14px 18px}header h1{margin:0;font-size:18px}header .sub{opacity:.85;font-size:12px;margin-top:2px}
.wrap{max-width:800px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid #e3e7ee;border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:12px}
h2.sec{font-size:15px;margin:2px 0 10px;color:var(--navy)}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode{border:2px solid #d7deea;border-radius:10px;padding:12px;cursor:pointer;text-align:center;font-weight:700;color:var(--navy)}
.mode small{display:block;font-weight:400;color:var(--muted);margin-top:3px}.mode.on{border-color:var(--steel);background:#f0f6fd}
.topics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.topic{display:flex;align-items:center;gap:8px;border:1px solid #d7deea;border-radius:9px;padding:9px 11px;cursor:pointer;font-size:13.5px}
.topic.on{border-color:var(--green);background:#eef7ef}.topic input{accent-color:var(--green)}.topic .ct{margin-left:auto;font-size:11px;color:var(--muted)}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:10px}.row label{font-size:13px;color:var(--muted)}
.row select{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db;background:#fff}
.start{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.start:disabled{opacity:.5;cursor:default}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px}.bar button{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #c9d0db;background:#fff;cursor:pointer}.stat{font-size:13px;color:var(--muted);margin-left:auto}
.prog{height:6px;background:#e3e7ee;border-radius:4px;overflow:hidden;margin-bottom:12px}.prog>div{height:100%;background:var(--green);width:0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.b-t1{background:#e2efda;color:#1E5C2E}.b-t2{background:#fff2cc;color:#7a5b00}.b-t3{background:#ffe2e2;color:#9B2226}.b-dom{background:#dee9f6;color:#1F3864}.b-grp{background:#eee;color:#444}.b-aw{background:#ddeeff;color:#17375E}
.stem{font-size:16px;font-weight:600;line-height:1.45;margin:4px 0 14px}
.opt{display:block;width:100%;text-align:left;border:1px solid #c9d0db;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:14.5px;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--steel)}.opt .k{display:inline-block;width:22px;font-weight:700;color:var(--steel)}.opt.sel{border-color:var(--steel);background:#f0f6fd}.opt.correct{border-color:var(--ok);background:#e8f5ea}.opt.wrong{border-color:var(--bad);background:#fdeced}.opt[disabled]{cursor:default}
.exp{margin-top:12px;padding:12px 14px;border-left:4px solid var(--steel);background:#f7f9fc;border-radius:6px;font-size:14px;line-height:1.55;display:none}.exp.show{display:block}.exp .verdict{font-weight:800;margin-bottom:4px}
.actions{display:flex;gap:10px;margin-top:14px}.actions button{flex:1;padding:11px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.check{background:var(--steel);color:#fff}.check:disabled{opacity:.5;cursor:default}.next{background:var(--navy);color:#fff}
.done{text-align:center;padding:26px 16px}.done h2{margin:.2em 0}.score{font-size:42px;font-weight:800;color:var(--navy)}
b,strong{font-weight:700}em,i{font-style:italic}.foot{font-size:11px;color:var(--muted);text-align:center;margin:16px 0}
.bar button{cursor:pointer}.preset{padding:6px 10px!important}
.kpis{display:flex;gap:10px;margin-bottom:4px}.kpi{flex:1;text-align:center;background:#f7f9fc;border:1px solid #e3e7ee;border-radius:9px;padding:10px}.kpi b{font-size:22px;color:var(--navy);display:block}.kpi small{color:var(--muted);font-size:11px}
.ptable{width:100%;border-collapse:collapse;font-size:13px}.ptable th{text-align:left;color:var(--muted);font-weight:600;padding:4px 6px;border-bottom:1px solid #e3e7ee}.ptable td{padding:5px 6px;border-bottom:1px solid #f0f2f6;vertical-align:middle}
.meter{height:7px;background:#e3e7ee;border-radius:4px;overflow:hidden;width:90px}.meter>div{height:100%;background:var(--green)}
</style></head><body>
<header><h1>Lab Interpretation — NAPLEX 2026 Quiz</h1><div class="sub">single-best-answer · Generic (Brand) paired · answers hidden until you submit</div></header>
<div class="wrap"><div id="app"></div><div class="foot">John Williams, PharmD, MS · PGY1 Pharmacy Resident, Confluence Health (Wenatchee, WA) · NAPLEX + UMPJE 2026</div></div>
<script>
const ALL=[{"id": 1, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,3D2", "stem": "A 68-y/o with MRSA bacteremia is started on vancomycin (Vancocin). Best monitoring parameter?", "opts": ["AUC/MIC 400–600", "Peak 30–40", "Trough 5–10", "Trough 15–20"], "ans": 0, "exp": "AUC/MIC 400–600 is the preferred target (2020 ASHP/IDSA); trough 15–20 is the legacy surrogate. *1A2,3D2.*"}, {"id": 2, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5,3C6", "stem": "A HF patient on digoxin (Lanoxin) + furosemide (Lasix) develops nausea, yellow-green vision, and K 3.0. Most important next step?", "opts": ["Increase the digoxin (Lanoxin) dose", "Check level, correct K/Mg", "Give IV calcium gluconate", "Add amiodarone (Pacerone) for rate control"], "ans": 1, "exp": "Hypokalemia and hypomagnesemia potentiate digoxin (Lanoxin) toxicity → check level, correct K/Mg (severe → DigiFab). Increasing the dose worsens it. *3C5,3C6.*"}, {"id": 3, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,1C9", "stem": "A seizure patient has albumin 2.0 and total phenytoin (Dilantin) 6 mcg/mL. Best interpretation?", "opts": ["Redraw the level as a free phenytoin (Dilantin)", "Subtherapeutic — increase the dose", "Corrected ~12 — therapeutic, no change", "Supratherapeutic — hold the next dose"], "ans": 2, "exp": "Sheiner-Tozer: 6 / [(0.2×2.0)+0.1] = 12 mcg/mL (therapeutic). Low albumin lowers the *total*; don't increase the dose. *1A2,1C9.*"}, {"id": 4, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "K 6.8 with peaked T waves. The first agent to give is:", "opts": ["Sodium polystyrene", "Insulin + dextrose", "Albuterol (ProAir)", "IV calcium gluconate"], "ans": 3, "exp": "IV calcium gluconate stabilizes the myocardium first (it does not lower K); then shift (insulin/D50, albuterol (ProAir)) and eliminate (loop, SZC/patiromer (Veltassa), dialysis). *3C2.*"}, {"id": 5, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "A patient has eGFR 28. Which drug is contraindicated?", "opts": ["Metformin (Glucophage)", "Amlodipine (Norvasc)", "Levothyroxine (Synthroid)", "Atorvastatin (Lipitor)"], "ans": 0, "exp": "Metformin (Glucophage) is contraindicated at eGFR <30 (lactic acidosis). *3C2.*"}, {"id": 6, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5", "stem": "Day 7 of heparin: platelets fall 250k → 85k with a new DVT. Best next step?", "opts": ["Continue heparin, recheck count", "Stop heparin, start argatroban", "Transfuse platelets, hold heparin", "Stop heparin, bridge with warfarin (Coumadin)"], "ans": 1, "exp": "HIT (>50% drop, days 5–10, thrombosis): stop all heparin, start a non-heparin anticoagulant (argatroban). No platelets; no early warfarin (limb gangrene). *3C5.*"}, {"id": 7, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "A bipolar patient stable on lithium (Lithobid) starts HCTZ and develops tremor/confusion; level 1.9. Cause?", "opts": ["Coincidental, unrelated timing", "Thiazide displaces protein-bound lithium (Lithobid)", "Thiazide ↓ renal lithium (Lithobid) clearance", "Thiazide induces lithium (Lithobid) metabolism"], "ans": 2, "exp": "Thiazides (also NSAIDs, ACEi) reduce renal lithium (Lithobid) clearance → toxicity. *3C3.*"}, {"id": 8, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3C5", "stem": "A patient on simvastatin (Zocor) 40 starts clarithromycin and develops myalgia, CK 6,000. Mechanism?", "opts": ["CYP2C9 inhibition", "P-glycoprotein induction", "OATP1B1 induction", "CYP3A4 inhibition"], "ans": 3, "exp": "Clarithromycin is a strong CYP3A4 inhibitor; simvastatin (Zocor)/lovastatin are 3A4 substrates → ↑ levels → rhabdomyolysis. *3C2,3C5.*"}, {"id": 9, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3D3", "stem": "A HF patient switched to sacubitril/valsartan (Entresto): BNP rises though symptoms improve. Which marker should be used?", "opts": ["NT-proBNP", "Troponin I", "CK-MB index", "Plasma BNP"], "ans": 0, "exp": "Sacubitril (neprilysin inhibitor) raises BNP (a neprilysin substrate); NT-proBNP is not a substrate → use it. *3C2,3D3.*"}, {"id": 10, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C8", "stem": "ABG: pH 7.20, HCO₃ 10, PaCO₂ 24, anion gap 24. The disorder is:", "opts": ["Metabolic alkalosis, compensated", "High-AG acidosis, compensated", "Normal-AG metabolic acidosis", "Respiratory acidosis, compensated"], "ans": 1, "exp": "pH↓ with HCO₃↓ = metabolic acidosis; high AG; Winter's expected PaCO₂ = 1.5×10+8 = 23 ≈ 24 → appropriate compensation. *1C8.*"}, {"id": 11, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5", "stem": "A clozapine (Clozaril) patient has ANC 800/µL and fever 38.5°C. Action?", "opts": ["Recheck the ANC in 1 week", "Continue clozapine (Clozaril), monitor closely", "Hold clozapine (Clozaril), treat the fever", "Reduce the clozapine (Clozaril) dose 50%"], "ans": 2, "exp": "Clozapine (Clozaril) REMS: ANC <1000 → interrupt; febrile neutropenia is urgent → empiric antibiotics. *3C5.*"}, {"id": 12, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C1", "stem": "Ca 7.6, albumin 2.0. Corrected calcium?", "opts": ["10.0", "7.6", "8.4", "9.2"], "ans": 3, "exp": "7.6 + 0.8×(4.0−2.0) = 9.2 mg/dL (normal). *1C1.*"}, {"id": 13, "group": "Lab Interpretation", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A5", "stem": "During a rapid vancomycin (Vancocin) infusion a patient flushes/itches over the face and torso. Best characterization/management?", "opts": ["Rate-related histamine reaction — slow infusion", "Type II cytotoxic reaction — discontinue", "Type III serum sickness — give steroids", "IgE anaphylaxis — never rechallenge"], "ans": 0, "exp": "\"Red man\" is a rate-related histamine reaction, not IgE allergy → slow the infusion + antihistamine. *2A5.*"}, {"id": 14, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2", "stem": "Extended-interval (once-daily) aminoglycoside dosing primarily:", "opts": ["Raises nephrotoxicity but improves efficacy", "Maximizes killing, lowers nephrotoxicity", "Eliminates ototoxicity and nephrotoxicity", "Exploits time-dependent killing kinetics"], "ans": 1, "exp": "Aminoglycosides are concentration-dependent with a post-antibiotic effect; extended-interval maximizes killing and lowers nephrotoxicity. *1A2.*"}, {"id": 15, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3D2", "stem": "A patient with a mechanical mitral valve needs warfarin (Coumadin). INR goal?", "opts": ["3.5–4.5", "2–3", "2.5–3.5", "1.5–2"], "ans": 2, "exp": "Mechanical mitral valve → INR 2.5–3.5 (most other indications 2–3). *3D2.*"}, {"id": 16, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "A stable warfarin (Coumadin) patient starts metronidazole (Flagyl); INR rises to 6.5 without bleeding. Mechanism?", "opts": ["CYP2C9 enzyme induction", "Increased vitamin K synthesis", "Decreased warfarin (Coumadin) absorption", "CYP2C9 enzyme inhibition"], "ans": 3, "exp": "Metronidazole (Flagyl) inhibits CYP2C9 metabolism of S-warfarin (Coumadin) → ↑ INR. *3C3.*"}, {"id": 17, "group": "Lab Interpretation", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A5,3C5", "stem": "A patient on isoniazid (INH) has ALT 200 (>3× ULN), total bilirubin 3 (>2× ULN), no other cause. This meets:", "opts": ["Hy's law", "Cholestatic pattern", "Normal", "Gilbert syndrome"], "ans": 0, "exp": "Hy's law (ALT/AST >3× ULN + bilirubin >2× ULN + no other cause) = high risk of fatal drug-induced liver injury. *2A5,3C5.*"}, {"id": 18, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "Triglycerides are 800 mg/dL. The primary pharmacologic goal/drug is:", "opts": ["High-intensity statin to lower LDL", "Fenofibrate (Tricor) to prevent pancreatitis", "PCSK9 inhibitor to lower LDL", "Ezetimibe (Zetia) to reduce absorption"], "ans": 1, "exp": "TG >500 → fibrate to prevent pancreatitis (lowering LDL is not the priority here). *3C2.*"}, {"id": 19, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3D1", "stem": "Per ADA Standards of Care 2026, the general A1c target for most nonpregnant adults is:", "opts": ["<6.0%", "<6.5%", "<7.0%", "<8.0%"], "ans": 2, "exp": "<7% for most nonpregnant adults (individualize; <8% if frail/limited life expectancy). *3D1.*"}, {"id": 20, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "Serology: HBsAg negative, anti-HBc positive, anti-HBs positive. Interpretation?", "opts": ["Immune from prior vaccination", "Acute HBV infection", "Chronic HBV infection", "Immune from resolved infection"], "ans": 3, "exp": "anti-HBs + **and** anti-HBc + (HBsAg−) = resolved infection. Vaccine immunity = anti-HBs **only.** *3C2.*"}, {"id": 21, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3D3", "stem": "A patient was treated for syphilis. Which test follows treatment response?", "opts": ["RPR/VDRL titer", "Treponemal EIA", "FTA-ABS assay", "TP-PA assay"], "ans": 0, "exp": "Nontreponemal RPR/VDRL titer tracks response (4-fold drop = success); treponemal tests stay positive for life. *3C2,3D3.*"}, {"id": 22, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "An HIV patient has CD4 180 cells/µL. Indicated prophylaxis?", "opts": ["None", "TMP-SMX for PCP", "Azithromycin (Zithromax) for MAC", "Fluconazole (Diflucan)"], "ans": 1, "exp": "CD4 <200 → PCP prophylaxis (TMP-SMX); MAC prophylaxis (azithromycin) is added at <50. *3C2.*"}, {"id": 23, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3B", "stem": "A BCG-vaccinated recent immigrant needs latent-TB screening. Preferred test?", "opts": ["Chest CT scan", "TST (PPD) skin test", "IGRA blood test", "Sputum AFB smear"], "ans": 2, "exp": "IGRA is preferred when BCG-vaccinated (avoids false-positive TST). *3B.*"}, {"id": 24, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C6", "stem": "After a benzocaine throat spray a patient is cyanotic with SpO₂ 85% unresponsive to oxygen (no G6PD deficiency). Treatment?", "opts": ["Hyperbaric oxygen", "Naloxone (Narcan)", "100% oxygen only", "Methylene blue"], "ans": 3, "exp": "Methemoglobinemia from benzocaine → methylene blue (avoid in G6PD deficiency → ascorbic acid). *3C6.*"}, {"id": 25, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "Which drug is contraindicated in a 9-year-old?", "opts": ["Codeine ((in Tylenol #3))", "Azithromycin (Zithromax)", "Acetaminophen", "Amoxicillin"], "ans": 0, "exp": "Codeine ((in Tylenol #3)) is contraindicated <12 y (CYP2D6 ultrarapid metabolizers → respiratory depression). *3C2.*"}, {"id": 26, "group": "Lab Interpretation", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2A5,4B", "stem": "Before starting rituximab (Rituxan), which screening is essential?", "opts": ["G6PD activity", "HBV serologies", "TPMT genotype", "HLA-B*57:01"], "ans": 1, "exp": "Anti-CD20 → HBV reactivation risk; screen HBsAg + anti-HBc and give prophylaxis if positive. *2A5,4B.*"}, {"id": 27, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3D2", "stem": "Before initiating capecitabine (Xeloda) or 5-FU, the FDA boxed-warning genetic test is:", "opts": ["TPMT", "UGT1A1", "DPYD", "CYP2D6"], "ans": 2, "exp": "DPYD genotyping carries a boxed-warning testing requirement before fluoropyrimidines (FDA capecitabine (Xeloda) 2025, 5-FU 2026). *3D2.*"}, {"id": 28, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "An HFrEF patient on lisinopril (Zestril) + spironolactone (Aldactone) has K 5.8. Best action?", "opts": ["Add a potassium supplement", "Add an NSAID", "Increase spironolactone (Aldactone)", "Hold/discontinue the MRA"], "ans": 3, "exp": "K >5.5 on an MRA → hold/discontinue the MRA; recheck K and SCr. *3C2.*"}, {"id": 29, "group": "Lab Interpretation", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "A BPH patient on finasteride (Proscar) for 1 year has PSA 2.5 ng/mL. Best estimate of \"true\" PSA?", "opts": ["~5.0", "Cannot estimate", "1.25", "2.5"], "ans": 0, "exp": "5-α-reductase inhibitors halve PSA after ~6–12 months → double the measured value (~5.0). *3C2.*"}, {"id": 30, "group": "Lab Interpretation", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C9", "stem": "Per 2024 FDA/KDIGO guidance, renal drug dosing is shifting toward:", "opts": ["Cockcroft-Gault with weight", "Race-free CKD-EPI eGFR", "MDRD with race factor", "24-hour urine collection"], "ans": 1, "exp": "FDA 2024 + KDIGO 2024 + NKF 2024 favor a race-free eGFR (CKD-EPI 2021) for drug dosing over Cockcroft-Gault. *1C9.*"}, {"id": 31, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,1C9", "stem": "Total **phenytoin (Dilantin) 8 mcg/mL**, **albumin 2.5 g/dL**, normal renal function. Corrected (Sheiner-Tozer) level?", "opts": ["13 mcg/mL", "20 mcg/mL", "8 mcg/mL", "10 mcg/mL"], "ans": 0, "exp": "Corrected = total ÷ [(0.2 × albumin) + 0.1] = 8 ÷ [(0.2 × 2.5) + 0.1] = 8 ÷ 0.6 = **13.3 mcg/mL** → therapeutic; don't increase the dose. *1A2,1C9.*"}, {"id": 32, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C1", "stem": "**Calcium 8.0 mg/dL**, **albumin 2.5 g/dL.** Corrected calcium?", "opts": ["8.8", "9.2", "10.0", "8.0"], "ans": 1, "exp": "Corrected Ca = measured + 0.8 × (4.0 − albumin) = 8.0 + 0.8 × (4.0 − 2.5) = 8.0 + 1.2 = **9.2 mg/dL** (normal). *1C1.*"}, {"id": 33, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C4,1A2", "stem": "**60 y/o man, 85 kg, SCr 1.0 mg/dL.** Cockcroft-Gault CrCl?", "opts": ["74 mL/min", "84 mL/min", "94 mL/min", "110 mL/min"], "ans": 2, "exp": "CG = [(140 − 60) × 85] / (72 × 1.0) = 6800/72 = **94 mL/min** (no 0.85 factor — male). *1C4,1A2.*"}, {"id": 34, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1C8", "stem": "Chem panel: **Na 138, Cl 102, HCO₃ 18 mEq/L.** Anion gap?", "opts": ["24", "6", "12", "18"], "ans": 3, "exp": "AG = Na − (Cl + HCO₃) = 138 − (102 + 18) = **18** (elevated — high-AG metabolic acidosis; normal 8–12). *1C8.*"}, {"id": 35, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1A2, 3C5", "stem": "**Lanoxin** is the brand name for which monitored drug?", "opts": ["Digoxin", "Diltiazem", "Dobutamine", "Dronedarone"], "ans": 0, "exp": "**Lanoxin = digoxin (Lanoxin)**; narrow therapeutic index, **HF target 0.5–0.9 ng/mL**; toxicity worsened by hypokalemia/hypomagnesemia/renal impairment. *1A2, 3C5.*"}, {"id": 36, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1A2, 1C9", "stem": "**Dilantin** is the brand for:", "opts": ["Diltiazem", "Phenytoin", "Phenobarbital", "Digoxin"], "ans": 1, "exp": "**Dilantin = phenytoin (Dilantin)** (total 10–20, free 1–2 mcg/mL); correct for **low albumin** (Sheiner-Tozer); zero-order kinetics. *1A2, 1C9.*"}, {"id": 37, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1A2, 3D2", "stem": "**Vancocin** is the brand for:", "opts": ["Vorinostat", "Verapamil", "Vancomycin", "Valganciclovir"], "ans": 2, "exp": "**Vancocin = vancomycin (Vancocin)**; monitor **AUC/MIC 400–600** (preferred over trough); nephrotoxicity risk. *1A2, 3D2.*"}, {"id": 38, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1A2, 3C3", "stem": "**Coumadin** and **Jantoven** are both brands for:", "opts": ["Apixaban", "Dabigatran", "Enoxaparin", "Warfarin"], "ans": 3, "exp": "**Coumadin/Jantoven = warfarin (Coumadin)**; monitor **INR** (2–3 most indications; 2.5–3.5 mechanical mitral valve). *1A2, 3C3.*"}, {"id": 39, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1A2, 3C5", "stem": "**Lithobid** is the brand for which narrow-TI agent?", "opts": ["Lithium", "Levetiracetam", "Lamotrigine", "Linezolid"], "ans": 0, "exp": "**Lithobid = lithium (Lithobid)** (target **0.6–1.2 mEq/L**); toxicity with dehydration, NSAIDs, thiazides, ACEi. *1A2, 3C5.*"}, {"id": 40, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2, 3D2", "stem": "Which immunosuppressant brand ↔ generic pairing is correct?", "opts": ["Prograf = cyclosporine; Neoral = tacrolimus", "Prograf = tacrolimus; Neoral/Sandimmune = cyclosporine", "Prograf = sirolimus; Rapamune = tacrolimus", "Neoral = sirolimus; Prograf = everolimus"], "ans": 1, "exp": "**Prograf = tacrolimus (Prograf); Neoral/Sandimmune = cyclosporine (Neoral)** (Rapamune = sirolimus). All trough-monitored, nephrotoxic, CYP3A substrates. *1A2, 3D2.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();
const APPKEY="naplexQuiz:Lab Interpretation";let MEM={attempts:[],topic:{},dom:{},missed:[]};
function loadP(){try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function getP(){return loadP()||MEM;}
function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
