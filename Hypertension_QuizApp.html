const ITEMS = [{"id": "CL-1", "subtopic": "Classification, Goals & Diagnosis", "domain": "D3", "nabp": "3.B", "tier": "T1", "type": "MCQ", "aware": true, "recall": false, "stem": "Per the 2025 AHA/ACC guideline, an average office BP of 134/86 mmHg is classified as:", "opts": ["Stage 1 hypertension", "Elevated blood pressure", "Stage 2 hypertension", "Normal blood pressure"], "ans": 0, "exp": "2025 categories (unchanged from 2017): **Normal** <120/80 · **Elevated** 120–129/<80 · **Stage 1** 130–139 **or** 80–89 · **Stage 2** ≥140/90. 134/86 → **Stage 1** (meets the SBP and DBP Stage-1 criteria).", "anchor": "2025 AHA/ACC classification."}, {"id": "CL-2", "subtopic": "Classification, Goals & Diagnosis", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "What is the general office BP treatment target for most adults under the 2025 AHA/ACC guideline?", "opts": ["Less than 140/90 mmHg", "Less than 130/80 mmHg", "Less than 120/80 mmHg", "Less than 150/90 mmHg if over 60"], "ans": 1, "exp": "2025 sets a **universal target <130/80 mmHg** (SBP <130 and DBP <80), with individualized exceptions (institutionalized/limited life expectancy, pregnancy). The old 'age ≥60 → <150' (JNC8) framing is obsolete.", "anchor": "2025 BP target."}, {"id": "CL-3", "subtopic": "Classification, Goals & Diagnosis", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": true, "recall": false, "stem": "A 58-year-old with Stage 1 HTN (134/84), no diabetes/CKD/CVD, has a PREVENT 10-year CVD risk of 5%. Initial management?", "opts": ["Start a thiazide diuretic at the first visit", "Start single-pill dual combination therapy now", "Begin lifestyle changes, reassess BP in 3-6 months", "Reassure the patient; no follow-up is needed"], "ans": 2, "exp": "Stage 1 with **low risk (PREVENT <7.5%)** and no compelling condition → **lifestyle first**, reassess in 3–6 months; start a drug if BP remains ≥130/80. Drugs are started up front in Stage 1 if **clinical CVD, DM, CKD, or PREVENT ≥7.5%**.", "anchor": "2025 Stage-1 risk threshold (PREVENT ≥7.5%)."}, {"id": "CL-4", "subtopic": "Classification, Goals & Diagnosis", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "A patient presents with an average BP of 146/92 mmHg (Stage 2). What does the 2025 guideline preferentially recommend to start?", "opts": ["A single agent titrated slowly upward", "Lifestyle alone for another six months", "A beta-blocker chosen as the first agent", "Two-drug single-pill fixed-dose combination"], "ans": 3, "exp": "**Stage 2 (≥140/90)** → begin pharmacotherapy now, **preferably a single-pill dual-class combination** (e.g., ACEi/ARB + CCB or + thiazide) to improve adherence and reach goal faster. Beta-blockers are not first-line without a compelling indication.", "anchor": "Stage-2 single-pill combo."}, {"id": "CL-5", "subtopic": "Classification, Goals & Diagnosis", "domain": "D2", "nabp": "3.B", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient's clinic BP is 138/88 but home readings average 124/78. This pattern is best described as:", "opts": ["White-coat hypertension", "Masked hypertension", "Sustained hypertension", "A hypertensive emergency"], "ans": 0, "exp": "High in clinic, normal out of office = **white-coat hypertension** → confirm with ABPM/HBPM before committing to drug therapy. **Masked** HTN is the reverse (normal clinic, high home). Out-of-office measurement is emphasized for diagnosis.", "anchor": "White-coat vs masked."}, {"id": "CL-6", "subtopic": "Classification, Goals & Diagnosis", "domain": "D2", "nabp": "2.A.5", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which is correct technique for accurate office BP measurement?", "opts": ["Measured right after the patient walks into clinic", "Seated, back and feet supported, arm at heart level, after rest", "Cuff placed over a shirt sleeve while talking", "A single reading is enough to confirm diagnosis"], "ans": 1, "exp": "Proper technique: **seated, back/feet supported, arm at heart level, ≥5 min rest, no talking, empty bladder, correct cuff size**, average ≥2 readings on ≥2 occasions. Poor technique falsely elevates BP and drives overtreatment.", "anchor": "BP measurement."}, {"id": "CL-7", "subtopic": "Classification, Goals & Diagnosis", "domain": "D3", "nabp": "3.B", "tier": "T3", "type": "SATA", "aware": true, "recall": false, "stem": "Per the 2025 guideline, which factors warrant starting antihypertensive drug therapy in a patient with Stage 1 hypertension? Select all that apply.", "opts": ["Established clinical cardiovascular disease", "Diabetes mellitus", "Chronic kidney disease", "PREVENT 10-year CVD risk ≥7.5%", "Age ≥65 years", "BP of 122/78 mmHg"], "ans": [0, 1, 2, 3], "exp": "In **Stage 1**, start a drug up front for **clinical CVD, DM, CKD, or PREVENT >=7.5%**; otherwise lifestyle first. **Age >=65 alone is NOT a standalone trigger** in the 2025 guideline - older age is already captured within the PREVENT risk estimate. 122/78 is **Elevated**, not Stage 1. The PREVENT >=7.5% threshold replaced the old 10% pooled-cohort cutoff.", "anchor": "Stage-1 drug indications."}, {"id": "CL-S1", "subtopic": "Classification, Goals & Diagnosis", "domain": "D2", "nabp": "3.B", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which statements about hypertension diagnosis and BP measurement are correct? Select all that apply.", "opts": ["Diagnosis should be confirmed with out-of-office readings (ABPM/HBPM) when feasible", "White-coat hypertension is high in clinic but normal out of office", "Masked hypertension is normal in clinic but high out of office", "Correct technique: seated and rested ~5 min, back supported, arm at heart level", "A single elevated clinic reading is enough to diagnose hypertension", "Talking during measurement has no effect on the reading"], "ans": [0, 1, 2, 3], "exp": "True: **confirm with ABPM/HBPM**; **white-coat** = high clinic/normal home; **masked** = normal clinic/high home; **proper technique** (rest, support, arm at heart level). False: a **single reading is not sufficient** (average ≥2 readings on ≥2 occasions); **talking raises BP** during measurement.", "anchor": "Diagnosis/measurement."}, {"id": "LF-1", "subtopic": "Lifestyle / Nonpharmacologic", "domain": "D3", "nabp": "3.E.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which dietary pattern is specifically recommended to lower blood pressure?", "opts": ["High-protein ketogenic weight-loss diet", "Low-fiber, high-sodium convenience diet", "DASH eating plan rich in produce and low-fat dairy", "Intermittent fasting with no other dietary change"], "ans": 2, "exp": "The **DASH diet** (rich in fruits/vegetables/low-fat dairy, ↓ saturated fat) lowers SBP ~8–14 mmHg. Core lifestyle bundle: DASH, **sodium <1500 mg/day (≥1000 mg reduction)**, weight loss, exercise, limit alcohol, ↑ potassium intake (if not contraindicated).", "anchor": "DASH."}, {"id": "LF-2", "subtopic": "Lifestyle / Nonpharmacologic", "domain": "D3", "nabp": "3.E.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "What is the recommended dietary sodium goal for blood pressure reduction?", "opts": ["Less than 4000 mg per day is sufficient", "No sodium restriction is necessary at all", "Below 100 mg per day for every patient", "Aim under 1500 mg/day, or a 1000 mg/day cut"], "ans": 3, "exp": "Aim for **<1500 mg sodium/day**; even a **≥1000 mg/day reduction** lowers BP. Pair with ↑ dietary potassium (e.g., 3500–5000 mg/day) unless CKD/hyperkalemia risk.", "anchor": "Sodium goal."}, {"id": "LF-3", "subtopic": "Lifestyle / Nonpharmacologic", "domain": "D3", "nabp": "3.E.1", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which lifestyle modifications are evidence-based for lowering blood pressure? Select all that apply.", "opts": ["Weight loss in overweight/obese adults", "DASH dietary pattern", "Regular aerobic physical activity", "Limiting alcohol (≤2 drinks/day men, ≤1 women)", "Increasing daily sodium intake", "Increasing dietary potassium (if no contraindication)"], "ans": [0, 1, 2, 3, 5], "exp": "BP-lowering lifestyle: **weight loss** (~1 mmHg per kg), **DASH**, **aerobic exercise** (~90–150 min/wk), **alcohol moderation**, **↑ potassium**. **Increasing sodium** raises BP — the false option. These are first-line at every stage.", "anchor": "Lifestyle bundle."}, {"id": "LF-4", "subtopic": "Lifestyle / Nonpharmacologic", "domain": "D3", "nabp": "3.E.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Approximately how much can sustained weight loss lower systolic blood pressure?", "opts": ["About 1 mmHg per kilogram of weight lost", "No measurable effect on BP", "It raises SBP by 1 mmHg per kg", "Only if more than 50 kg is lost"], "ans": 0, "exp": "Roughly **1 mmHg SBP reduction per 1 kg** of weight loss in overweight/obese adults — among the highest-yield lifestyle levers along with DASH and sodium restriction.", "anchor": "Weight effect."}, {"id": "TH-1", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Thiazide diuretics lower blood pressure primarily by:", "opts": ["Inhibiting the Na-K-2Cl transporter in the loop of Henle", "Blocking the Na-Cl cotransporter in the distal convoluted tubule", "Antagonizing aldosterone at the collecting duct", "Blocking carbonic anhydrase in the proximal tubule"], "ans": 1, "exp": "Thiazides block the **Na⁺-Cl⁻ cotransporter (NCC)** in the **distal convoluted tubule** → natriuresis, then chronic ↓ peripheral vascular resistance. Loops act on **NKCC2** (thick ascending limb); MRAs antagonize aldosterone distally.", "anchor": "Thiazide MOA."}, {"id": "TH-2", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "Which thiazide-type diuretic is generally preferred for hypertension because of its longer duration and stronger outcome data?", "opts": ["Hydrochlorothiazide", "Furosemide", "Chlorthalidone", "Acetazolamide"], "ans": 2, "exp": "**Chlorthalidone** (and indapamide) are **thiazide-LIKE**, longer-acting and more potent than HCTZ with strong CV-outcome evidence → preferred in the 2025 guideline (esp. resistant HTN). Furosemide is a loop (reserved for eGFR <30 or HF); acetazolamide isn't a BP drug.", "anchor": "Chlorthalidone preference."}, {"id": "TH-3", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which metabolic/electrolyte effects are associated with thiazide diuretics? Select all that apply.", "opts": ["Hypokalemia", "Hyponatremia", "Hyperuricemia (can precipitate gout)", "Hyperglycemia", "Hyperkalemia", "Hypercalcemia"], "ans": [0, 1, 2, 3, 5], "exp": "Thiazides cause **hypoK, hypoNa, hyperuricemia (gout), hyperglycemia, hyperlipidemia, and hyperCALCemia** (↓ urinary Ca — useful in osteoporosis/stones). **Hyperkalemia** is the false option (thiazides lower K). Also sulfonamide allergy, photosensitivity.", "anchor": "Thiazide AE."}, {"id": "TH-4", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with an eGFR of 25 mL/min/1.73m² needs a diuretic for volume/BP control. Which is most appropriate?", "opts": ["Hydrochlorothiazide at a standard dose", "Chlorthalidone as a thiazide-like agent", "Acetazolamide for its diuretic effect", "A loop diuretic such as furosemide"], "ans": 3, "exp": "Traditional thiazides lose efficacy at **eGFR <30** → switch to a **loop diuretic** (furosemide/torsemide/bumetanide) for diuresis at low GFR. (Metolazone or chlorthalidone may retain some effect/synergy, but the standard answer is a loop.)", "anchor": "Diuretic by renal function."}, {"id": "TH-5", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on hydrochlorothiazide develops an acute gout flare. The most likely contributing mechanism is:", "opts": ["Decreased renal uric acid excretion (hyperuricemia)", "Increased renal uric acid excretion", "Direct urate crystal formation by the drug", "Increased uricase activity"], "ans": 0, "exp": "Thiazides **reduce uric acid excretion** → **hyperuricemia** → may precipitate gout. Caution in gout history; losartan (uricosuric ARB) is a BP-lowering alternative that can lower urate.", "anchor": "Thiazide-gout."}, {"id": "TH-6", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which monitoring is most important after starting or up-titrating a thiazide diuretic?", "opts": ["Liver function tests only, periodically", "Serum electrolytes and renal function", "A complete blood count every week", "Routine serum drug-level monitoring"], "ans": 1, "exp": "Monitor **electrolytes (K⁺, Na⁺), uric acid, glucose, and SCr/eGFR** within ~2–4 weeks. Hypokalemia and hyponatremia are the key risks; combine with an ACEi/ARB to offset K⁺ loss.", "anchor": "Thiazide monitoring."}, {"id": "TH-S1", "subtopic": "Thiazide & Thiazide-like Diuretics", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which statements about thiazide/thiazide-like diuretics in hypertension are correct? Select all that apply.", "opts": ["Chlorthalidone and indapamide are preferred thiazide-like agents", "They can precipitate gout via hyperuricemia", "They reduce urinary calcium (useful in calcium stones/osteoporosis)", "They lose efficacy at eGFR <30, where a loop is substituted", "They typically cause hyperkalemia", "They are the preferred diuretic for acute decompensated HF volume overload"], "ans": [0, 1, 2, 3], "exp": "True: **chlorthalidone/indapamide preferred** (longer-acting, outcome data); **hyperuricemia → gout**; **↓ urinary calcium** (hypocalciuric); **switch to a loop at eGFR <30**. False: thiazides cause **hypoK** (not hyperK); **loops**, not thiazides, are used for acute decompensated HF congestion.", "anchor": "Thiazide clinical facts."}, {"id": "AC-1", "subtopic": "ACE Inhibitors", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "ACE inhibitors lower blood pressure by:", "opts": ["Directly antagonizing the AT1 receptor on vessels", "Inhibiting renin release from the kidney directly", "Blocking conversion of angiotensin I to angiotensin II", "Blocking calcium entry into vascular smooth muscle"], "ans": 2, "exp": "ACEi block **angiotensin-converting enzyme** → ↓ angiotensin II (↓ vasoconstriction/aldosterone) and ↓ bradykinin breakdown (vasodilation, but also the **cough/angioedema**). ARBs block the **AT1 receptor**; aliskiren inhibits renin; CCBs block Ca channels.", "anchor": "ACEi MOA."}, {"id": "AC-2", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.5", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "A dry, persistent cough develops weeks after starting lisinopril. The mechanism is:", "opts": ["Direct toxicity to bronchial smooth muscle", "Reflex tachycardia from vasodilation", "Depletion of total body potassium stores", "Accumulation of bradykinin and substance P"], "ans": 3, "exp": "ACEi ↓ bradykinin breakdown → **bradykinin/substance P accumulation** → **dry cough** (~10–20%, more in women) and rarely **angioedema**. Switch to an **ARB**, which doesn't raise bradykinin and rarely causes cough.", "anchor": "ACEi cough."}, {"id": "AC-3", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient develops swelling of the lips and tongue hours after the first dose of an ACE inhibitor. Best action?", "opts": ["Stop the ACE inhibitor and avoid the class", "Continue the drug and add an antihistamine", "Reduce the current dose by one half", "Switch to another ACE inhibitor at lower dose"], "ans": 0, "exp": "**Angioedema** is a class effect → **stop the ACEi and avoid all ACEi permanently** (can be life-threatening, airway risk). Higher incidence in Black patients. ARBs carry a small cross-reactivity risk; use cautiously if at all. Manage airway emergently.", "anchor": "ACEi angioedema."}, {"id": "AC-4", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "After starting lisinopril, a patient's serum creatinine rises 45% within a week. The most likely cause is:", "opts": ["Acute interstitial nephritis from sulfa", "Bilateral renal artery stenosis", "Rhabdomyolysis", "Contrast nephropathy"], "ans": 1, "exp": "ACEi/ARB dilate the **efferent arteriole** → in **bilateral renal artery stenosis** (or solitary-kidney stenosis), GFR is efferent-tone dependent → **acute ↑SCr**. A rise >30% warrants stopping and evaluation. A mild ≤30% rise is expected and acceptable.", "anchor": "RAS + RAAS blockade."}, {"id": "AC-5", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which electrolyte abnormality is most associated with ACE inhibitors?", "opts": ["Hypokalemia", "Hypercalcemia", "Hyperkalemia", "Hypernatremia"], "ans": 2, "exp": "ACEi/ARB ↓ aldosterone → **hyperkalemia**, especially with CKD, K⁺ supplements, MRAs, or NSAIDs. Monitor K⁺ and SCr ~1–2 weeks after initiation/titration.", "anchor": "RAAS hyperkalemia."}, {"id": "AC-6", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "An ACE inhibitor or ARB is contraindicated in which situation?", "opts": ["Diabetic patient with albuminuria", "Heart failure with reduced ejection fraction", "Hypertension with CKD", "Pregnancy"], "ans": 3, "exp": "ACEi/ARB/aliskiren are **teratogenic** (fetal renal/skull defects, oligohydramnios) → **contraindicated in pregnancy**. They are otherwise preferred in **albuminuric CKD, diabetes with albuminuria, and HFrEF**.", "anchor": "RAAS pregnancy CI."}, {"id": "AC-7", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Combining an ACE inhibitor with which agent most increases the risk of hyperkalemia and acute kidney injury (the 'triple whammy')?", "opts": ["An NSAID plus a diuretic", "Acetaminophen", "An inhaled corticosteroid", "A statin"], "ans": 0, "exp": "The **'triple whammy' = ACEi/ARB + diuretic + NSAID** → ↓ renal perfusion + ↓ K⁺ excretion → **AKI and hyperkalemia**. Avoid chronic NSAIDs; monitor SCr/K⁺ if unavoidable.", "anchor": "Triple whammy."}, {"id": "AC-S1", "subtopic": "ACE Inhibitors", "domain": "D3", "nabp": "3.C.3", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which adverse effects/cautions are SHARED by ACE inhibitors and ARBs? Select all that apply.", "opts": ["Risk of hyperkalemia", "Teratogenicity (avoid in pregnancy)", "Acute kidney injury in bilateral renal artery stenosis", "They should not be combined with each other (dual RAAS blockade)", "Dose-dependent peripheral edema is a typical class effect", "They routinely cause gingival hyperplasia"], "ans": [0, 1, 2, 3], "exp": "Shared RAAS effects: **hyperkalemia, teratogenicity, AKI in bilateral RAS, and the rule against combining the two** (no added benefit, more harm). False: **peripheral edema** and **gingival hyperplasia** are **dihydropyridine CCB** effects, not RAAS effects. (Cough/angioedema are more ACEi-specific.)", "anchor": "RAAS shared effects."}, {"id": "AR-1", "subtopic": "Angiotensin II Receptor Blockers", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Compared with ACE inhibitors, ARBs are LESS likely to cause:", "opts": ["Hyperkalemia", "Dry cough", "Fetal toxicity", "First-dose blood pressure reduction"], "ans": 1, "exp": "ARBs block the **AT1 receptor** without raising bradykinin → **much less cough** and lower angioedema risk. They share **hyperkalemia, teratogenicity, and AKI in renal artery stenosis** with ACEi. Either may be used in CKD — **not both together**.", "anchor": "ARB vs ACEi."}, {"id": "AR-2", "subtopic": "Angiotensin II Receptor Blockers", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Why is routine combination of an ACE inhibitor WITH an ARB discouraged?", "opts": ["It improves outcomes but adds medication cost", "ARBs chemically inactivate ACE inhibitors", "It raises hyperkalemia, hypotension, and AKI risk", "The combination commonly causes a dry cough"], "ans": 2, "exp": "Dual RAAS blockade (ACEi+ARB, or with aliskiren) **↑ hyperkalemia, hypotension, and AKI** with **no outcome benefit** (ONTARGET) → avoid combining. Use one agent of the class.", "anchor": "No dual RAAS."}, {"id": "AR-3", "subtopic": "Angiotensin II Receptor Blockers", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which ARB has a mild uricosuric effect, making it a reasonable choice in a hypertensive patient with gout?", "opts": ["Valsartan", "Olmesartan", "Irbesartan", "Losartan"], "ans": 3, "exp": "**Losartan** mildly **lowers uric acid** (uricosuric) — a useful nuance in HTN + gout (vs thiazides, which raise urate). Other ARBs lack this effect to a meaningful degree.", "anchor": "Losartan uricosuric."}, {"id": "AR-4", "subtopic": "Angiotensin II Receptor Blockers", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "What monitoring is appropriate ~1–2 weeks after starting an ARB?", "opts": ["Serum potassium and creatinine", "Liver enzymes and CK", "Complete blood count", "Thyroid function tests"], "ans": 0, "exp": "Check **potassium and SCr/eGFR** after starting/titrating an ARB (or ACEi). A ≤30% SCr rise is acceptable; larger rises or hyperkalemia prompt reassessment.", "anchor": "ARB monitoring."}, {"id": "AR-5", "subtopic": "Angiotensin II Receptor Blockers", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on lisinopril has an intolerable dry cough but needs RAAS blockade for albuminuric CKD. Best switch?", "opts": ["Add a second ACE inhibitor", "Switch to an ARB such as losartan", "Stop all RAAS therapy permanently", "Switch to a non-dihydropyridine CCB"], "ans": 1, "exp": "ACEi cough → **switch within RAAS to an ARB** (retains renoprotection/albuminuria benefit without bradykinin cough). Stopping RAAS forfeits kidney protection; a CCB doesn't replace the antiproteinuric effect.", "anchor": "ACEi→ARB switch."}, {"id": "CC-1", "subtopic": "Calcium Channel Blockers", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Dihydropyridine calcium channel blockers (e.g., amlodipine) lower BP mainly by:", "opts": ["Slowing AV-nodal conduction and heart rate", "Blocking beta-1 adrenergic receptors in the heart", "Vasodilating arterial smooth muscle directly", "Inhibiting the distal Na-Cl cotransporter"], "ans": 2, "exp": "**Dihydropyridines** (-dipines) are **vascular-selective** → arterial vasodilation, ↓ SVR. **Non-dihydropyridines** (diltiazem, verapamil) are more **cardiac-selective** → ↓ heart rate/AV conduction (rate control).", "anchor": "DHP CCB MOA."}, {"id": "CC-2", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.5", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which adverse effect is most characteristic of amlodipine?", "opts": ["A persistent dry hacking cough", "Hyperkalemia from aldosterone effects", "Marked resting bradycardia at night", "Dose-dependent peripheral ankle edema"], "ans": 3, "exp": "Dihydropyridine CCBs cause **dose-dependent peripheral edema** (precapillary vasodilation, not fluid overload — diuretics don't fix it well; adding an ACEi/ARB helps). Also flushing, headache, reflex tachycardia, gingival hyperplasia.", "anchor": "DHP edema."}, {"id": "CC-3", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Which calcium channel blocker should be AVOIDED in a patient with heart failure with reduced ejection fraction (HFrEF)?", "opts": ["Verapamil", "Amlodipine", "Felodipine", "Nifedipine ER"], "ans": 0, "exp": "**Non-dihydropyridines (verapamil, diltiazem)** are **negative inotropes** → avoid in **HFrEF** (worsen failure). **Amlodipine/felodipine** are considered safe in HFrEF if a CCB is needed (PRAISE). Non-DHPs also avoided with beta-blockers (bradycardia/heart block).", "anchor": "Non-DHP in HFrEF."}, {"id": "CC-4", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which adverse effect is most associated with verapamil?", "opts": ["Peripheral edema only", "Constipation", "Hypoglycemia", "Photosensitivity"], "ans": 1, "exp": "**Verapamil** → **constipation** (common), bradycardia, AV block, negative inotropy. It is a strong **CYP3A4/P-gp inhibitor** → raises levels of statins (simvastatin), digoxin, etc. Diltiazem similar but milder constipation.", "anchor": "Verapamil AE/DDI."}, {"id": "CC-5", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on simvastatin is started on diltiazem. The main concern is:", "opts": ["Reduced statin levels and loss of effect", "Hyperkalemia from combined renal effects", "Increased simvastatin levels with myopathy risk", "Shortening of the QT interval on ECG"], "ans": 2, "exp": "Diltiazem/verapamil **inhibit CYP3A4** → ↑ **simvastatin/lovastatin** exposure → **myopathy/rhabdomyolysis** risk. Cap simvastatin at 10 mg with these (or use pravastatin/rosuvastatin, not CYP3A4-dependent).", "anchor": "CCB-statin DDI."}, {"id": "CC-6", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Chronic use of which antihypertensive is associated with gingival hyperplasia?", "opts": ["Thiazide and thiazide-like diuretic agents", "Angiotensin-converting enzyme inhibitors", "Beta-adrenergic receptor blocking agents", "Dihydropyridine calcium channel blockers"], "ans": 3, "exp": "**Dihydropyridine CCBs** (e.g., amlodipine, nifedipine) can cause **gingival hyperplasia** (also seen with phenytoin, cyclosporine) → emphasize oral hygiene; may need dose change/switch.", "anchor": "Gingival hyperplasia."}, {"id": "CC-S1", "subtopic": "Calcium Channel Blockers", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which statements about calcium channel blockers are correct? Select all that apply.", "opts": ["Dihydropyridines cause dose-dependent peripheral edema", "Non-dihydropyridines (verapamil/diltiazem) are avoided in HFrEF", "Verapamil and diltiazem inhibit CYP3A4 and raise simvastatin levels", "Verapamil commonly causes constipation", "Dihydropyridines slow AV-nodal conduction for rate control", "Amlodipine is contraindicated in all heart failure"], "ans": [0, 1, 2, 3], "exp": "True: **DHP edema**; **non-DHPs avoided in HFrEF** (negative inotropes); **verapamil/diltiazem inhibit CYP3A4** (↑ simvastatin → myopathy); **verapamil → constipation**. False: **non-DHPs** (not DHPs) slow the **AV node**; **amlodipine/felodipine are acceptable** in HFrEF if a CCB is needed.", "anchor": "CCB facts."}, {"id": "FL-1", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": true, "recall": false, "stem": "A 55-year-old Black adult with primary HTN and no other comorbidity needs initial therapy. Per the 2025 guideline, which is appropriate first-line?", "opts": ["Any of thiazide, ACEi, ARB, or DHP-CCB", "An ACE inhibitor, chosen because of his age", "A beta-blocker selected as the initial agent", "An alpha-blocker selected as initial therapy"], "ans": 0, "exp": "The **2025 guideline made first-line selection race-neutral** — choose **thiazide/thiazide-like, ACEi, ARB, or DHP-CCB** for any patient without a compelling indication. (This changed the 2017 advice that favored CCB/thiazide first in Black adults without HF/CKD.)", "anchor": "Race-neutral first-line (2025)."}, {"id": "FL-2", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A hypertensive patient with CKD and albuminuria should preferentially receive:", "opts": ["A beta-blocker", "An ACE inhibitor or ARB", "An alpha-blocker", "Hydralazine monotherapy"], "ans": 1, "exp": "**Albuminuric CKD → ACEi OR ARB** (efferent dilation ↓ intraglomerular pressure → slows progression, ↓ albuminuria). Use one, not both; monitor K⁺/SCr.", "anchor": "CKD compelling indication."}, {"id": "FL-3", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "A patient has HTN plus HFrEF (EF 30%). Which agents are guideline-directed components of therapy? Select all that apply.", "opts": ["ARNI (sacubitril/valsartan) or ACEi/ARB", "Evidence-based beta-blocker (carvedilol, metoprolol succinate, or bisoprolol)", "Mineralocorticoid receptor antagonist (spironolactone/eplerenone)", "SGLT2 inhibitor", "Verapamil for blood pressure control", "Diltiazem for afterload reduction"], "ans": [0, 1, 2, 3], "exp": "HFrEF GDMT = **ARNI/ACEi/ARB + evidence-based BB + MRA + SGLT2i** (the 4 pillars), which also control BP. **Non-dihydropyridine CCBs (verapamil/diltiazem) are negative inotropes → avoided in HFrEF** — the two false options.", "anchor": "HFrEF GDMT."}, {"id": "FL-4", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with HTN who is 3 months post-myocardial infarction should preferentially receive which agents for both BP and secondary prevention?", "opts": ["An alpha-blocker plus hydralazine", "A thiazide plus minoxidil", "A beta-blocker plus an ACE inhibitor (or ARB)", "A non-dihydropyridine CCB plus clonidine"], "ans": 2, "exp": "**Post-MI / stable ischemic heart disease → beta-blocker + ACEi/ARB** (mortality benefit + BP control); add an MRA if HFrEF/low EF. Beta-blockers are first-line **here** because of the compelling cardiac indication.", "anchor": "Post-MI indication."}, {"id": "FL-5", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "For a hypertensive patient with type 2 diabetes and normal albumin excretion, the best first-line choice is:", "opts": ["A beta-blocker, specifically because of diabetes", "An alpha-blocker as the initial monotherapy", "Spironolactone chosen as the first-line agent", "Any first-line class: thiazide, ACEi, ARB, or CCB"], "ans": 3, "exp": "In diabetes **without albuminuria**, any first-line class is appropriate; **add/prefer ACEi or ARB once albuminuria is present**. Beta-blockers can mask hypoglycemia and aren't preferred unless another indication exists.", "anchor": "Diabetes selection."}, {"id": "FL-6", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A man with HTN and symptomatic benign prostatic hyperplasia could reasonably use which add-on agent that treats both?", "opts": ["An alpha-1 blocker such as doxazosin, as add-on", "An alpha-1 blocker as first-line monotherapy", "A thiazide diuretic as the primary agent", "A non-dihydropyridine CCB as the agent"], "ans": 0, "exp": "**Alpha-1 blockers** (doxazosin, terazosin) relax prostatic/bladder-neck smooth muscle and lower BP → reasonable **add-on** in HTN + BPH. They are **not first-line monotherapy** for HTN (ALLHAT: doxazosin ↑ heart failure vs chlorthalidone).", "anchor": "Alpha-blocker + BPH."}, {"id": "FL-7", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient needs a second agent added to an ACE inhibitor. Which combination is rational and synergistic?", "opts": ["Add an ARB on top of the ACE inhibitor", "Add a dihydropyridine CCB or a thiazide", "Add a second ACE inhibitor to the regimen", "Add aliskiren to the ACE inhibitor"], "ans": 1, "exp": "Logical pairings: **ACEi/ARB + CCB** (ACCOMPLISH favored ACEi+amlodipine) **or ACEi/ARB + thiazide**. Avoid **ACEi+ARB** or **ACEi+aliskiren** (dual RAAS blockade → harm). Single-pill combos improve adherence.", "anchor": "Rational combinations."}, {"id": "FL-8", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with HTN and a history of recurrent calcium kidney stones plus osteoporosis would benefit from which BP agent's off-target effect?", "opts": ["A loop diuretic, which raises urinary calcium", "An alpha-blocker for its mild renal effects", "A thiazide diuretic, which lowers urinary calcium", "Hydralazine chosen for its vasodilator effect"], "ans": 2, "exp": "**Thiazides ↓ urinary calcium** → helpful in **calcium nephrolithiasis** and modest bone benefit (vs loops, which ↑ urinary Ca and can worsen stones). A nice 'compelling indication' nuance.", "anchor": "Thiazide hypocalciuria."}, {"id": "FL-S1", "subtopic": "First-line Selection & Compelling Indications", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "In which conditions is an ACE inhibitor OR ARB specifically a preferred/compelling agent? Select all that apply.", "opts": ["CKD with albuminuria", "Diabetes with albuminuria", "Heart failure with reduced ejection fraction", "After myocardial infarction", "Pregnancy", "Uncomplicated hypertension with no comorbidity"], "ans": [0, 1, 2, 3], "exp": "ACEi/ARB are **compelling/preferred** in **albuminuric CKD, diabetes with albuminuria, HFrEF, and post-MI**. **Pregnancy is a contraindication** (teratogenic). In **uncomplicated HTN**, any first-line class is fine — RAAS isn't specifically preferred → the false options.", "anchor": "RAAS compelling indications."}, {"id": "OA-1", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A man on spironolactone for resistant HTN develops painful gynecomastia. The best alternative MRA with less of this effect is:", "opts": ["Amiloride", "Triamterene", "Furosemide", "Eplerenone"], "ans": 3, "exp": "**Spironolactone** is nonselective (binds androgen/progesterone receptors) → **gynecomastia, ↓ libido**. **Eplerenone** is a selective MRA → much less gynecomastia (but weaker, CYP3A4 substrate). Both cause **hyperkalemia**. Amiloride/triamterene are ENaC blockers, not MRAs.", "anchor": "Spironolactone vs eplerenone."}, {"id": "OA-2", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Why are beta-blockers NOT recommended as first-line monotherapy for uncomplicated hypertension?", "opts": ["They are less effective at preventing stroke here", "They paradoxically raise blood pressure in most", "They cannot be combined with other BP agents", "They are contraindicated in everyone over 60"], "ans": 0, "exp": "Beta-blockers are **reserved for compelling indications** (post-MI, HFrEF, AF rate control, angina) — they were **less effective at stroke prevention** than other classes in HTN trials and aren't first-line for uncomplicated HTN.", "anchor": "Beta-blocker positioning."}, {"id": "OA-3", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient abruptly stops clonidine and presents with severe rebound hypertension, tachycardia, and diaphoresis. This occurred because clonidine:", "opts": ["Is a beta-blocker causing receptor upregulation", "Central alpha-2 agonist; abrupt stop causes catecholamine surge", "Directly injures the adrenal medullary tissue", "Has an unusually long elimination half-life"], "ans": 1, "exp": "**Clonidine** (central **alpha-2 agonist**) abruptly stopped → **rebound HTN/catecholamine surge** → taper, never stop suddenly (worse if on a beta-blocker — unopposed alpha). AEs: sedation, dry mouth, bradycardia; transdermal patch dosed weekly.", "anchor": "Clonidine rebound."}, {"id": "OA-4", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which antihypertensive is associated with a drug-induced lupus-like syndrome (especially in slow acetylators)?", "opts": ["Amlodipine", "Losartan", "Hydralazine", "Chlorthalidone"], "ans": 2, "exp": "**Hydralazine** (direct arterial vasodilator) → **drug-induced lupus** (anti-histone antibodies), reflex tachycardia, and Na/fluid retention. Combined with isosorbide dinitrate (BiDil) it benefits Black patients with HFrEF.", "anchor": "Hydralazine lupus."}, {"id": "OA-5", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Minoxidil, a potent arterial vasodilator used in refractory HTN, characteristically causes:", "opts": ["Constipation along with marked resting bradycardia", "Dry cough accompanied by significant hyperkalemia", "Gingival hyperplasia as essentially the only effect", "Hypertrichosis, reflex tachycardia, and fluid retention"], "ans": 3, "exp": "**Minoxidil** → **hypertrichosis (hair growth)**, marked **reflex tachycardia** and **sodium/fluid retention** (and rarely **pericardial effusion**) → must co-administer a **beta-blocker + loop diuretic**. Reserved for severe/refractory HTN.", "anchor": "Minoxidil AE."}, {"id": "OA-6", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Aliskiren, a direct renin inhibitor, is specifically contraindicated in combination with an ACE inhibitor or ARB in which patients?", "opts": ["Patients who have diabetes or renal impairment", "Otherwise healthy young adult patients", "Patients with a remote history of gout", "Patients with well-controlled mild asthma"], "ans": 0, "exp": "**Aliskiren + ACEi/ARB is contraindicated in diabetes** (and avoided in renal impairment) — ALTITUDE showed ↑ hyperkalemia, hypotension, AKI, stroke. It is also **teratogenic** (RAAS class effect).", "anchor": "Aliskiren CI."}, {"id": "OA-7", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T3", "type": "MCQ", "aware": true, "recall": false, "stem": "Aprocitentan, a newer dual endothelin receptor antagonist approved for resistant hypertension, most characteristically causes:", "opts": ["Severe constipation and abdominal cramping", "Fluid retention and edema, with anemia and a REMS", "A persistent dry cough like ACE inhibitors", "Hypokalemia with a metabolic alkalosis"], "ans": 1, "exp": "**Aprocitentan (Tryvio)** — **dual endothelin receptor antagonist**, added for **resistant HTN**. AE: **fluid retention/edema and anemia**; **embryo-fetal toxicity → REMS, contraindicated in pregnancy**, monitor Hgb. ℹ New 2024 agent in the 2025 resistant-HTN pathway.", "anchor": "Aprocitentan (2024)."}, {"id": "OA-8", "subtopic": "Other / Add-on Agents", "domain": "D1", "nabp": "1.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Carvedilol and labetalol differ from metoprolol in that they also:", "opts": ["Act as selective beta-2 receptor agonists", "Inhibit the angiotensin-converting enzyme", "Also block alpha-1 receptors for added vasodilation", "Block L-type calcium channels in vessels"], "ans": 2, "exp": "**Carvedilol** and **labetalol** are nonselective beta-blockers with **alpha-1 blockade** → extra vasodilation (useful in HFrEF/carvedilol; labetalol in pregnancy & hypertensive emergency). Metoprolol is beta-1 selective without alpha activity.", "anchor": "Alpha-beta blockers."}, {"id": "OA-9", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which statements about beta-blockers in hypertension are correct? Select all that apply.", "opts": ["They should not be stopped abruptly (rebound tachycardia/ischemia)", "They can mask adrenergic symptoms of hypoglycemia", "Carvedilol and labetalol add alpha-1 blockade", "They are the preferred first-line for uncomplicated HTN", "Non-selective agents are preferred in reactive airway disease", "They are indicated post-MI and in HFrEF"], "ans": [0, 1, 2, 5], "exp": "True: **taper, don't stop abruptly**; **mask hypoglycemia** symptoms (tremor/tachycardia, not sweating); **carvedilol/labetalol add alpha-1 block**; **indicated post-MI/HFrEF**. False: **not first-line for uncomplicated HTN**; **non-selective agents are avoided** in reactive airway disease (use beta-1 selective if needed).", "anchor": "Beta-blocker facts."}, {"id": "OA-S1", "subtopic": "Other / Add-on Agents", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which add-on antihypertensive–adverse-effect pairings are correct? Select all that apply.", "opts": ["Spironolactone — gynecomastia and hyperkalemia", "Clonidine — rebound hypertension if stopped abruptly", "Hydralazine — drug-induced lupus-like syndrome", "Minoxidil — hypertrichosis and fluid retention", "Eplerenone — frequently causes gynecomastia", "Aliskiren — safe to combine with an ARB in diabetes"], "ans": [0, 1, 2, 3], "exp": "Correct: **spironolactone → gynecomastia/hyperkalemia**; **clonidine → rebound HTN**; **hydralazine → drug-induced lupus**; **minoxidil → hypertrichosis/fluid retention**. False: **eplerenone is selective → little gynecomastia**; **aliskiren + ARB is contraindicated in diabetes** (ALTITUDE).", "anchor": "Add-on AE matching."}, {"id": "RH-1", "subtopic": "Resistant Hypertension", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Resistant hypertension is best defined as BP above goal despite:", "opts": ["Uncontrolled while taking a single low-dose agent", "Uncontrolled despite lifestyle changes alone", "Taking two agents from the same drug class", "Above goal on 3 classes incl. a diuretic, or needing >=4 drugs"], "ans": 3, "exp": "**Resistant HTN** = uncontrolled despite **3 agents of different classes including a diuretic at optimal/maximally-tolerated doses**, OR controlled but requiring **≥4 drugs**. First exclude **pseudoresistance** (nonadherence, white-coat, poor technique) and secondary causes.", "anchor": "Resistant HTN definition."}, {"id": "RH-2", "subtopic": "Resistant Hypertension", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "For true resistant HTN already on an ACEi/ARB + CCB + thiazide-like diuretic (eGFR ≥45), the preferred next add-on is:", "opts": ["A mineralocorticoid receptor antagonist (spironolactone)", "A second dihydropyridine calcium channel blocker", "An ACE inhibitor and an ARB used together", "A loop diuretic added on top of the thiazide"], "ans": 0, "exp": "Add a **mineralocorticoid receptor antagonist — spironolactone** is the preferred 4th agent (**PATHWAY-2**) when eGFR ≥45 and K⁺ permits. Eplerenone/amiloride are alternatives. Avoid dual RAAS (ACEi+ARB).", "anchor": "Spironolactone 4th-line — PATHWAY-2."}, {"id": "RH-3", "subtopic": "Resistant Hypertension", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Before labeling a patient 'resistant,' which thiazide-type agents are preferred in the optimal three-drug regimen?", "opts": ["Hydrochlorothiazide at a 12.5 mg dose", "Chlorthalidone or indapamide, thiazide-like agents", "Acetazolamide for its diuretic action", "Mannitol given as an osmotic diuretic"], "ans": 1, "exp": "The 2025 optimal triple uses a **thiazide-LIKE diuretic — chlorthalidone or indapamide** (longer-acting, better outcomes) rather than low-dose HCTZ, plus an ACEi/ARB and a DHP-CCB, all at optimal doses.", "anchor": "Optimal triple."}, {"id": "RH-4", "subtopic": "Resistant Hypertension", "domain": "D3", "nabp": "3.C.7", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient appears resistant on 3 drugs, but pharmacy refill records show frequent gaps. The most likely explanation is:", "opts": ["Primary aldosteronism causing the elevation", "Renal artery stenosis reducing renal perfusion", "Pseudoresistance due to medication nonadherence", "Pheochromocytoma releasing catecholamines"], "ans": 2, "exp": "**Nonadherence (pseudoresistance)** is the most common reason apparent 'resistant' HTN — confirm via refill records/pill counts/observed dosing, plus rule out white-coat effect and poor technique, before escalating or working up secondary causes.", "anchor": "Pseudoresistance."}, {"id": "RH-5", "subtopic": "Resistant Hypertension", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "SATA", "aware": true, "recall": false, "stem": "Per the 2025 guideline, if a patient with resistant HTN cannot tolerate an MRA, which add-on options are reasonable? Select all that apply.", "opts": ["Amiloride", "A beta-blocker", "A central sympatholytic (e.g., clonidine)", "A dual endothelin receptor antagonist (aprocitentan)", "A direct vasodilator (hydralazine/minoxidil)", "A second thiazide of the same class"], "ans": [0, 1, 2, 3, 4], "exp": "MRA-intolerant resistant HTN → **amiloride, beta-blocker, alpha-blocker, central sympatholytic, dual endothelin antagonist (aprocitentan), or direct vasodilator**. Adding a **second same-class thiazide** is not a rational step — the false option.", "anchor": "Resistant add-ons (2025)."}, {"id": "SP-1", "subtopic": "Special Populations", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "A pregnant patient with chronic hypertension needs pharmacotherapy. Which is an appropriate first-line agent (target <140/90)?", "opts": ["Lisinopril, an ACE inhibitor", "Valsartan, an angiotensin receptor blocker", "Aliskiren, a direct renin inhibitor", "Labetalol or extended-release nifedipine"], "ans": 3, "exp": "Pregnancy first-line = **labetalol or nifedipine ER** (methyldopa is an alternative); treat to **<140/90** (CHAP). **ACEi/ARB/direct renin inhibitors are contraindicated** (teratogenic).", "anchor": "HTN in pregnancy."}, {"id": "SP-2", "subtopic": "Special Populations", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which antihypertensive agents should be AVOIDED in pregnancy? Select all that apply.", "opts": ["Lisinopril (ACE inhibitor)", "Valsartan (ARB)", "Aliskiren (direct renin inhibitor)", "Labetalol", "Nifedipine extended-release", "Methyldopa"], "ans": [0, 1, 2], "exp": "Avoid **RAAS blockers — ACEi, ARB, aliskiren** (fetal renal damage, oligohydramnios, skull defects). **Labetalol, nifedipine ER, and methyldopa** are pregnancy-appropriate. (Atenolol is also generally avoided — IUGR.)", "anchor": "Pregnancy avoid-list."}, {"id": "SP-3", "subtopic": "Special Populations", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A pregnant patient at 36 weeks has BP 165/115 with severe features (preeclampsia). Acute first-line antihypertensive options include:", "opts": ["IV labetalol, IV hydralazine, or oral nifedipine IR", "A sodium nitroprusside infusion given IV", "Oral lisinopril given as a single dose", "Intravenous furosemide for blood pressure"], "ans": 0, "exp": "Severe-range BP in pregnancy → **IV labetalol, IV hydralazine, or PO immediate-release nifedipine** to prevent stroke. **Magnesium sulfate** is added for **seizure prophylaxis** (not a BP drug). Avoid nitroprusside (fetal cyanide) and ACEi.", "anchor": "Severe preeclampsia."}, {"id": "SP-4", "subtopic": "Special Populations", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "In a patient with severe preeclampsia receiving magnesium sulfate, the magnesium is given primarily to:", "opts": ["Lower the blood pressure acutely", "Prevent and treat eclamptic seizures", "Promote diuresis and fluid loss", "Reverse the proteinuria of preeclampsia"], "ans": 1, "exp": "**Magnesium sulfate = seizure prophylaxis/treatment** in preeclampsia/eclampsia — **not** an antihypertensive. Monitor for **Mg toxicity** (loss of reflexes → respiratory depression); antidote is **IV calcium gluconate**.", "anchor": "Magnesium in preeclampsia."}, {"id": "SP-5", "subtopic": "Special Populations", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "When initiating antihypertensives in a frail older adult, the best approach is:", "opts": ["Avoid all antihypertensive treatment after age 75", "Use the maximum dose at the first clinic visit", "Start low, go slow, watch orthostasis; aim <130/80 if tolerated", "Target under 150/90 regardless of tolerability"], "ans": 2, "exp": "In older adults, **start low and go slow**, check **orthostatic BP/falls**, but still aim **<130/80 if tolerated** (SPRINT included older adults). Avoid the obsolete '<150/90 if ≥60' (JNC8) target unless individualized for frailty/limited life expectancy.", "anchor": "Older adults."}, {"id": "HE-1", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "What distinguishes a hypertensive EMERGENCY from hypertensive urgency?", "opts": ["A systolic BP above 160", "The patient having a headache only", "Whether the patient is on medication", "The presence of acute target-organ damage"], "ans": 3, "exp": "**Emergency = severe BP (often >180/120) WITH acute target-organ damage** (encephalopathy, ICH/stroke, ACS, pulmonary edema, dissection, AKI, eclampsia) → **IV therapy in ICU**. **Urgency = severe BP without organ damage** → gradual **oral** therapy.", "anchor": "Emergency vs urgency."}, {"id": "HE-2", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.D.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "For most hypertensive emergencies (excluding specific conditions), the initial BP-lowering goal is to reduce mean arterial pressure by:", "opts": ["No more than about 25% in the first hour, then slowly", "At least 50% within the first 15 minutes", "To a normal 120/80 within 30 minutes", "By only about 5% over a full 24 hours"], "ans": 0, "exp": "Reduce **MAP ≤25% in the first hour**, then toward ~160/100–110 over 2–6 h, then normalize over 24–48 h — **too-rapid lowering risks ischemic stroke/MI**. Exceptions (faster targets): **aortic dissection**; special thresholds for **acute ischemic stroke**.", "anchor": "Emergency BP-lowering rate."}, {"id": "HE-3", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Prolonged sodium nitroprusside infusion, especially in renal or hepatic impairment, risks accumulation of:", "opts": ["Excess potassium and magnesium", "Cyanide and thiocyanate", "Calcium and phosphate salts", "Bradykinin and substance P"], "ans": 1, "exp": "Nitroprusside (arterial+venous dilator) is metabolized to **cyanide → thiocyanate** → toxicity with **prolonged/high-dose use or renal/hepatic impairment** (lactic acidosis, AMS). Prefer **nicardipine/clevidipine/labetalol** for most emergencies.", "anchor": "Nitroprusside toxicity."}, {"id": "HE-4", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "In acute aortic dissection with severe hypertension, the FIRST drug class to give is:", "opts": ["A direct arterial vasodilator given by itself", "A loop diuretic to reduce intravascular volume", "A beta-blocker such as IV esmolol, before any vasodilator", "An ACE inhibitor to block the renin system"], "ans": 2, "exp": "Aortic dissection → rapidly lower **SBP <120 and HR <60**; give a **beta-blocker (esmolol/labetalol) FIRST** to cut **dP/dt (shear)** before adding a vasodilator (nitroprusside/nicardipine). A vasodilator alone causes **reflex tachycardia** that worsens the tear.", "anchor": "Dissection — BB first."}, {"id": "HE-5", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which are intravenous agents used to treat hypertensive emergencies? Select all that apply.", "opts": ["Nicardipine", "Clevidipine", "Labetalol", "Esmolol", "Nitroprusside", "Oral amlodipine"], "ans": [0, 1, 2, 3, 4], "exp": "IV emergency agents: **nicardipine, clevidipine** (titratable DHP CCBs), **labetalol, esmolol** (beta/alpha), **nitroprusside, nitroglycerin, hydralazine, fenoldopam, phentolamine**. **Oral amlodipine** has a slow onset → not for emergencies (the false option).", "anchor": "IV emergency agents."}, {"id": "HE-6", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A hypertensive crisis due to catecholamine excess (e.g., pheochromocytoma or cocaine) is best treated acutely with:", "opts": ["A nonselective beta-blocker used alone", "A thiazide diuretic given by mouth", "An ACE inhibitor titrated to effect", "Phentolamine, an alpha-blocker, given first"], "ans": 3, "exp": "Catecholamine surge → **alpha-blockade first (phentolamine)**; giving a **beta-blocker alone causes unopposed alpha vasoconstriction → worse HTN**. (For pheochromocytoma surgery, phenoxybenzamine alpha-blockade precedes any beta-blocker.)", "anchor": "Catecholamine crisis."}, {"id": "HE-7", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient has BP 192/118 but no symptoms and no evidence of acute organ damage (hypertensive urgency). Appropriate management is:", "opts": ["Gradual oral BP reduction over hours to days, with follow-up", "Rapid IV reduction to normal within one hour", "Sublingual immediate-release nifedipine for speed", "No treatment and no follow-up are required"], "ans": 0, "exp": "**Urgency → restart/optimize ORAL therapy and lower BP gradually over hours–days** with follow-up. **Avoid sublingual immediate-release nifedipine** (uncontrolled drops → stroke/MI) and avoid aggressive IV lowering.", "anchor": "Urgency management."}, {"id": "HE-S1", "subtopic": "Hypertensive Urgency & Emergency", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which presentations represent a hypertensive EMERGENCY (acute target-organ damage)? Select all that apply.", "opts": ["Hypertensive encephalopathy", "Acute aortic dissection", "Acute pulmonary edema or acute coronary syndrome", "Eclampsia", "Acute ischemic stroke with new neurologic deficits", "BP 190/115 with no symptoms or organ damage"], "ans": [0, 1, 2, 3, 4], "exp": "Emergencies = severe BP **with acute target-organ damage**: **encephalopathy, aortic dissection, pulmonary edema/ACS, eclampsia, acute stroke**. **190/115 without symptoms/organ damage is hypertensive URGENCY** → gradual oral therapy, not IV. Each emergency has condition-specific targets (e.g., dissection: SBP <120 + beta-blocker first).", "anchor": "Emergency recognition."}, {"id": "SH-1", "subtopic": "Secondary Hypertension", "domain": "D3", "nabp": "3.C.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "The most common identifiable (secondary) cause of resistant hypertension, often with hypokalemia, is:", "opts": ["Pheochromocytoma", "Primary aldosteronism", "Cushing syndrome", "Coarctation of the aorta"], "ans": 1, "exp": "**Primary aldosteronism** is the most common secondary cause (esp. resistant HTN ± **hypokalemia, metabolic alkalosis**). Screen with the **aldosterone-to-renin ratio (ARR)** — ↑ aldosterone with suppressed renin.", "anchor": "Primary aldosteronism."}, {"id": "SH-2", "subtopic": "Secondary Hypertension", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": true, "recall": false, "stem": "Before screening for primary aldosteronism with the aldosterone-to-renin ratio, which drug class should generally be withheld for ~4 weeks because it confounds the test?", "opts": ["Dihydropyridine calcium channel blockers", "HMG-CoA reductase inhibitors (statins)", "Mineralocorticoid receptor antagonists (MRAs)", "Proton pump inhibitors used for reflux"], "ans": 2, "exp": "**MRAs (spironolactone/eplerenone) must be held ~4 weeks** before ARR testing — they raise renin and mask the diagnosis. Many guidelines keep verapamil/alpha-blockers as 'ARR-neutral' agents during workup.", "anchor": "ARR test prep."}, {"id": "SH-3", "subtopic": "Secondary Hypertension", "domain": "D3", "nabp": "3.B", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which features should prompt evaluation for SECONDARY hypertension? Select all that apply.", "opts": ["Onset before age 30 without family history", "Resistant or abrupt-onset hypertension", "Unprovoked or diuretic-induced hypokalemia", "An abdominal bruit", "Episodic headache, palpitations, and sweating", "Well-controlled BP on one low-dose agent"], "ans": [0, 1, 2, 3, 4], "exp": "Red flags for secondary HTN: **young onset, resistant/abrupt onset, spontaneous hypokalemia (aldosteronism), abdominal bruit (renovascular), episodic headache/palpitations/sweating (pheochromocytoma)**, and target-organ damage out of proportion. Well-controlled HTN on one agent is the false option.", "anchor": "Secondary HTN clues."}, {"id": "SH-4", "subtopic": "Secondary Hypertension", "domain": "D3", "nabp": "3.C.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Episodic hypertension with the triad of headache, palpitations, and diaphoresis suggests:", "opts": ["Obstructive sleep apnea", "Hypothyroidism", "Primary aldosteronism", "Pheochromocytoma"], "ans": 3, "exp": "**Pheochromocytoma** → catecholamine surges → paroxysmal HTN with the classic **headache + palpitations + sweating** triad. Screen with **plasma free metanephrines** (or 24-h urine). Treat with **alpha-blockade before beta-blockade**.", "anchor": "Pheochromocytoma."}, {"id": "BC-1", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": true, "stem": "Norvasc is the brand name for which antihypertensive?", "opts": ["Amlodipine, a dihydropyridine CCB", "Lisinopril, an ACE inhibitor", "Losartan, an ARB", "Metoprolol, a beta-blocker"], "ans": 0, "exp": "**Norvasc = amlodipine** (long-acting dihydropyridine CCB; AE peripheral edema; once daily). Lisinopril = Prinivil/Zestril; losartan = Cozaar; metoprolol succinate = Toprol XL.", "anchor": "Brand recall."}, {"id": "BC-2", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": true, "stem": "Cozaar is the brand name for which antihypertensive?", "opts": ["Valsartan, an ARB", "Losartan, an ARB", "Lisinopril, an ACE inhibitor", "Amlodipine, a CCB"], "ans": 1, "exp": "**Cozaar = losartan** (ARB; mild uricosuric; losartan/HCTZ = Hyzaar). Valsartan = Diovan; lisinopril = Prinivil/Zestril.", "anchor": "Brand recall."}, {"id": "BC-3", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which describes the correct difference between metoprolol tartrate and metoprolol succinate?", "opts": ["They are identical and interchangeable milligram for milligram", "Tartrate is the extended-release once-daily formulation", "Tartrate (Lopressor) = IR/BID; succinate (Toprol XL) = ER/daily, HFrEF", "Succinate is available only as an intravenous form"], "ans": 2, "exp": "**Metoprolol tartrate (Lopressor)** = immediate-release, usually BID; **metoprolol succinate (Toprol XL)** = extended-release, once daily and the **HFrEF-indicated** salt. Not mg-for-mg interchangeable in HF — a classic dispensing trap.", "anchor": "Metoprolol salts."}, {"id": "BC-4", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": true, "stem": "Entresto is the brand name for which fixed-dose combination?", "opts": ["Amlodipine/valsartan", "Lisinopril/hydrochlorothiazide", "Olmesartan/amlodipine/HCTZ", "Sacubitril/valsartan (ARNI)"], "ans": 3, "exp": "**Entresto = sacubitril/valsartan** (ARNI; neprilysin inhibitor + ARB) for HFrEF/HTN. ⚠ Requires a **36-hour ACEi washout** (angioedema risk); contraindicated in pregnancy. Exforge = amlodipine/valsartan; Zestoretic = lisinopril/HCTZ.", "anchor": "ARNI brand."}, {"id": "BC-5", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A single-pill combination of an ACE inhibitor and a thiazide is represented by:", "opts": ["Lisinopril/hydrochlorothiazide (Zestoretic)", "Amlodipine/valsartan (Exforge)", "Sacubitril/valsartan (Entresto)", "Losartan/hydrochlorothiazide (Hyzaar)"], "ans": 0, "exp": "**Lisinopril/HCTZ (Zestoretic)** = ACEi + thiazide. For reference: **Hyzaar** = ARB+thiazide (losartan/HCTZ); **Exforge** = CCB+ARB; **Lotrel** = CCB+ACEi; **Entresto** = ARNI. Single-pill combos are preferred to start Stage 2.", "anchor": "ACEi/thiazide combo."}, {"id": "BC-6", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which generic-to-brand pairings are correct? Select all that apply.", "opts": ["Amlodipine/valsartan — Exforge", "Amlodipine/benazepril — Lotrel", "Hydralazine/isosorbide dinitrate — BiDil", "Carvedilol — Coreg", "Valsartan — Norvasc", "Chlorthalidone — Lopressor"], "ans": [0, 1, 2, 3], "exp": "Correct: **Exforge** (amlodipine/valsartan), **Lotrel** (amlodipine/benazepril), **BiDil** (hydralazine/isosorbide dinitrate, Black HFrEF), **Coreg** (carvedilol). Wrong: **Norvasc = amlodipine** (valsartan = Diovan); **Lopressor = metoprolol tartrate** (chlorthalidone is generic/Thalitone).", "anchor": "Brand mapping."}, {"id": "BC-7", "subtopic": "Brand/Generic + Combinations", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "When switching a patient from an ACE inhibitor to sacubitril/valsartan (Entresto), the key safety step is:", "opts": ["Start both agents together for the first week", "Allow a 36-hour ACE inhibitor washout before the first dose", "Double the ACE inhibitor dose beforehand", "No washout period is necessary at all"], "ans": 1, "exp": "**Sacubitril/valsartan requires a 36-hour ACEi washout** — overlapping neprilysin inhibition + ACE inhibition stacks bradykinin → **angioedema**. No washout needed when switching from an ARB. Contraindicated with a history of ACEi/ARB angioedema and in pregnancy.", "anchor": "ARNI washout."}];

const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="htn_log_v1", MISSKEY="htn_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }

function renderDash(){
  const subs = subtopics();
  let s = `<div class="card"><h2>Build your set</h2>
    <div class="row">
      <div><label>Domain</label><select id="fDom"><option value="">All</option>
        <option>D1</option><option>D2</option><option>D3</option><option>D4</option><option>D5</option></select></div>
      <div><label>Tier</label><select id="fTier"><option value="">All</option>
        <option>T1</option><option>T2</option><option>T3</option></select></div>
      <div><label>Count</label><select id="fCount"><option value="0">All</option>
        <option>10</option><option>20</option><option>30</option><option>40</option></select></div>
      <div><label>Order</label><select id="fShuf"><option value="1">Shuffle</option><option value="0">In order</option></select></div>
    </div>
    <div style="margin-top:12px"><label>Subtopics
      <span style="float:right">
        <button class="tag-link" onclick="allSubs(true)">Select all</button>
        <button class="tag-link" onclick="allSubs(false)">Clear</button></span></label>
      <div class="subtopics" id="subs">`;
  subs.forEach((sub,i)=>{ const n=ITEMS.filter(x=>x.subtopic===sub).length;
    s += `<label><input type="checkbox" class="subck" value="${i}" checked onchange="liveCount()"> ${sub} <span class="count-pill">(${n})</span></label>`; });
  s += `</div></div>
    <div class="count-pill" id="live" style="margin-top:6px"></div>
    <button class="bigbtn" id="startBtn" onclick="startQuiz()">Start quiz</button></div>`;
  el('dash').innerHTML = s;
  ['fDom','fTier','fCount','fShuf'].forEach(id=>el(id).onchange=liveCount);
  liveCount();
}
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  const subs = subtopics();
  const chosen = [...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
  const dom = el('fDom').value, tier = el('fTier').value;
  let pool = ITEMS.filter(i=>chosen.includes(i.subtopic));
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const want = +el('fCount').value;
  const n = want? Math.min(want,pool.length): pool.length;
  el('live').textContent = `${pool.length} match filters · quiz of ${n}`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false, answered=false, picks=[];
function buildItem(it){
  if(it.type==='FILL') return {...it};
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  const want = +el('fCount').value;
  if(+el('fShuf').value) pool = shuffle(pool);
  if(want) pool = pool.slice(0,want);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
function badgeHtml(it){
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];
  let b=`<div class="badge ${tierC}">${it.tier}</div><div class="badge b-dom">${it.domain}</div>
    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.type==='FILL') b+=`<div class="badge b-fill">FILL</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  return b;
}
function renderQ(){
  answered=false; picks=[];
  const it=Q[qi];
  const head=`<div class="card">
    <div class="topbar"><span>Question ${qi+1} / ${Q.length}${retestMode?' · retest':''}</span><span>Score ${score}</span></div>
    <div class="bar"><div style="width:${(qi/Q.length)*100}%"></div></div>
    <div class="badges">${badgeHtml(it)}</div>`;
  let body;
  if(it.type==='FILL'){
    body=`<div class="stem">${render(it.stem)}</div>
      <div class="fillrow"><input id="fillIn" type="text" inputmode="decimal" autocomplete="off"
        placeholder="Enter a number" oninput="el('checkBtn').disabled=this.value.trim()===''">
        <span class="unit">${render(it.unit)}</span></div>
      <div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkFill()" disabled>Check</button></div>`;
  } else {
    const isSata = it.type==='SATA';
    body=`<div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div><div id="opts">`;
    it.opts.forEach((o,i)=>{ body+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
      <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
    body+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>`;
  }
  const tail=`<div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=head+body+tail;
  if(it.type==='FILL') setTimeout(()=>{const f=el('fillIn'); if(f)f.focus();},30);
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function tolOk(user,it){
  if(it.tol!=null) return Math.abs(user-it.ans)<=it.tol+1e-9;
  if(it.tolpct!=null) return Math.abs(user-it.ans)<=Math.abs(it.ans)*it.tolpct/100+1e-9;
  return Math.abs(user-it.ans)<=Math.max(Math.abs(it.ans)*0.02,0.01);
}
function recordAndReveal(it,ok,answerText){
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok&&retestMode){ const m=getMissed(); const k=m.indexOf(it.id); if(k>=0){m.splice(k,1);setMissed(m);} }
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+answerText}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function checkFill(){
  if(answered) return; const it=Q[qi];
  const raw=el('fillIn').value.trim().replace(/,/g,'').replace(/[^0-9eE.+-]/g,'');
  const user=parseFloat(raw);
  if(isNaN(user)) return;
  answered=true;
  const ok=tolOk(user,it);
  el('fillIn').classList.add(ok?'correct':'wrong'); el('fillIn').disabled=true;
  recordAndReveal(it,ok,fmtNum(it.ans)+' '+it.unit);
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  recordAndReveal(it,ok,al);
}
function fmtNum(x){ return (Math.round(x*1000)/1000).toString(); }
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button onclick="if(confirm('Reset all progress?')){store.set(LOGKEY,[]);store.set(MISSKEY,[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  const it=Q[qi];
  if(!answered){
    if(it.type==='FILL'){ if(e.key==='Enter'&&!el('checkBtn').disabled)checkFill(); return; }
    if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA');
  } else if(e.key==='Enter')nextQ();
});
renderDash();
</script>
</body></html>
