<script>
const ALL=[{"id": 1, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1A2,3C2,3C3", "stem": "A 61 y/o **6 weeks post-PCI** for ACS on **clopidogrel (Plavix) + aspirin + omeprazole (Prilosec)** presents with **recurrent in-stent thrombosis.** Genotype: **CYP2C19 \\*2/\\*2.** Best change?", "opts": ["Switch to prasugrel (Effient) or ticagrelor (Brilinta)", "Increase clopidogrel (Plavix) to 150 mg daily", "Keep clopidogrel (Plavix); switch omeprazole (Prilosec) to pantoprazole (Protonix)", "Continue current therapy"], "ans": 0, "exp": "A CYP2C19 **poor metabolizer** cannot activate clopidogrel (Plavix) — compounded by **omeprazole (Prilosec)** (a 2C19 inhibitor) → treatment failure. Use **prasugrel (Effient) or ticagrelor (Brilinta)** (not 2C19-dependent; CPIC A, FDA BBW). A dose-bump **B** is inadequate in PMs; swapping the PPI **C** doesn't fix the genetic LOF; **D** leaves the stent unprotected. ⚠ Prasugrel CI with prior stroke/TIA. *1A2,3C2,3C3.*"}, {"id": 2, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,3C5", "stem": "A breastfeeding mother on codeine ((in Tylenol #3)) has a lethargic, poorly feeding infant. Mechanism?", "opts": ["CYP2D6 poor metabolizer → weak morphine (MS Contin)", "CYP2D6 ultrarapid → excess morphine (MS Contin) in milk", "UGT2B7 deficiency → morphine (MS Contin) buildup", "CYP3A4 induction → excess norcodeine"], "ans": 1, "exp": "CYP2D6 ultrarapid metabolizer → excess morphine (MS Contin) reaches the infant (boxed warning). *1A2,3C5.*"}, {"id": 3, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,3C2", "stem": "A CYP2D6 poor metabolizer reports no pain relief from codeine ((in Tylenol #3)). Why?", "opts": ["CYP2D6 ultrarapid converts too much", "OCT1 variant raises brain morphine (MS Contin)", "PM cannot convert codeine ((in Tylenol #3)) to morphine (MS Contin)", "UGT2B7 rapidly clears the morphine (MS Contin)"], "ans": 2, "exp": "Codeine ((in Tylenol #3)) is a prodrug; the PM cannot activate it → no analgesia. *1A2,3C2.*"}, {"id": 4, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2,3C2", "stem": "A tamoxifen (Nolvadex) patient needs an antidepressant for hot flashes. Which to AVOID?", "opts": ["Escitalopram (Lexapro)", "Venlafaxine (Effexor)", "Citalopram (Celexa)", "Paroxetine (Paxil)"], "ans": 3, "exp": "Paroxetine (Paxil) is a strong CYP2D6 inhibitor → ↓ endoxifen → ↓ tamoxifen (Nolvadex) efficacy (also fluoxetine (Prozac), bupropion (Wellbutrin)). Use venlafaxine (Effexor)/citalopram (Celexa). *1A2,3C2.*"}, {"id": 5, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1A2,3D2", "stem": "A patient with **CYP2C9 \\*3/\\*3 + VKORC1 −1639 AA** is started on **warfarin (Coumadin) 5 mg daily**; **day 4 INR is 5.5** (no bleeding). Best explanation/action?", "opts": ["Lab error — simply repeat the INR now", "Expected day-4 response — continue 5 mg", "High genetic sensitivity — hold, resume lower", "Reverse with vitamin K and stop warfarin (Coumadin)"], "ans": 2, "exp": "**Reduced-function CYP2C9** (slow S-warfarin (Coumadin) clearance) **and VKORC1 −1639 AA** (low enzyme expression) markedly ↑ sensitivity → 5 mg was too high → **hold and resume low.** Vitamin K/stopping **D** isn't warranted without bleeding at INR 5.5. *1A2,3D2.*"}, {"id": 6, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2", "stem": "An MS patient is CYP2C9 *3/*3. Regarding siponimod (Mayzent):", "opts": ["Max 1 mg/day", "Contraindicated", "Double the dose", "Standard dose"], "ans": 1, "exp": "Siponimod (Mayzent) is contraindicated in CYP2C9 *3/*3; *1/*3 and *2/*3 → max 1 mg/day. *1A2.*"}, {"id": 7, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5", "stem": "A patient is HLA-B*57:01 positive. Which drug must be avoided?", "opts": ["Allopurinol (Zyloprim)", "Carbamazepine (Tegretol)", "Abacavir (Ziagen)", "Clopidogrel (Plavix)"], "ans": 2, "exp": "HLA-B*57:01 → abacavir (Ziagen) hypersensitivity → never use (mandatory pre-test). *3C5.*"}, {"id": 8, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5", "stem": "A patient of Han Chinese ancestry needs an antiepileptic. Which test precedes carbamazepine (Tegretol)?", "opts": ["CYP2C9 genotype", "G6PD activity", "TPMT genotype", "HLA-B*15:02"], "ans": 3, "exp": "HLA-B*15:02 (Asian ancestry) → carbamazepine (Tegretol) SJS/TEN; screen first. *3C5.*"}, {"id": 9, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5", "stem": "A CKD patient of Korean ancestry needs urate-lowering therapy. Which screen precedes allopurinol (Zyloprim)?", "opts": ["HLA-B*58:01", "HLA-B*57:01", "HLA-B*15:02", "HLA-A*31:01"], "ans": 0, "exp": "HLA-B*58:01 (Han Chinese/Thai/Korean, CKD) → allopurinol (Zyloprim) SCAR. *3C5.*"}, {"id": 10, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3C5", "stem": "Before starting azathioprine (Imuran), which genotype prevents severe myelosuppression?", "opts": ["CYP2D6 status", "TPMT/NUDT15", "UGT1A1 status", "VKORC1 status"], "ans": 1, "exp": "TPMT + NUDT15 inactivate thiopurine metabolites; deficiency → myelosuppression → test before. *3C2,3C5.*"}, {"id": 11, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3C5", "stem": "A colon-cancer patient develops severe mucositis and neutropenia early after capecitabine (Xeloda). Cause?", "opts": ["SLCO1B1 variant", "UGT1A1 *28/*28", "DPYD deficiency", "CYP3A5 expresser"], "ans": 2, "exp": "DPYD deficiency → impaired 5-FU catabolism → severe/fatal toxicity. *3C2,3C5.*"}, {"id": 12, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2", "stem": "A patient with UGT1A1 *28/*28 on irinotecan (Camptosar) is at increased risk of:", "opts": ["QT prolongation", "Statin myopathy", "Oxidative hemolysis", "Neutropenia/diarrhea"], "ans": 3, "exp": "*28/*28 → ↓ SN-38 glucuronidation → neutropenia/diarrhea. *3C2.*"}, {"id": 13, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3C5", "stem": "A decreased-function SLCO1B1 variant raises myopathy risk most with:", "opts": ["Simvastatin (Zocor)", "Pitavastatin", "Rosuvastatin (Crestor)", "Pravastatin (Pravachol)"], "ans": 0, "exp": "SLCO1B1 decreased uptake → ↑ simvastatin (Zocor) exposure → myopathy. *3C2,3C5.*"}, {"id": 14, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2", "stem": "A **CYP3A5 expresser (\\*1/\\*1)** kidney-transplant patient has **persistently subtherapeutic tacrolimus (Prograf) troughs** on a standard weight-based dose. Best action?", "opts": ["Lower the dose to avoid toxicity", "Increase the dose (~1.5–2×) to target", "Switch to cyclosporine (Neoral) instead", "No change — troughs run unreliable"], "ans": 1, "exp": "**Expressers (\\*1/\\*1)** metabolize tacrolimus (Prograf) **faster** → low troughs on standard dosing → **increase the dose** (CPIC ~1.5–2× start, titrate to trough). Non-expressers (\\*3/\\*3) need less. *1A2.*"}, {"id": 15, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C5,3C6", "stem": "A G6PD-deficient patient with tumor-lysis risk should avoid:", "opts": ["Hydration", "Allopurinol (Zyloprim)", "Rasburicase (Elitek)", "IV fluids"], "ans": 2, "exp": "Rasburicase (Elitek) causes oxidative hemolysis in G6PD deficiency → avoid (use allopurinol (Zyloprim) + hydration). *3C5,3C6.*"}, {"id": 16, "group": "PGx & Drug Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1A2", "stem": "A **CYP2C19 poor metabolizer** on **voriconazole (Vfend)** for invasive aspergillosis develops **visual disturbance, hallucinations, and rising LFTs.** Mechanism?", "opts": ["Subtherapeutic levels from rapid 2C19 clearance", "Oxidative hemolysis from a G6PD defect", "An HLA-B-mediated immune reaction", "↑ voriconazole (Vfend) levels (2C19-cleared) → toxicity"], "ans": 3, "exp": "Voriconazole (Vfend) is an **active drug** cleared mainly by **CYP2C19**; a PM accumulates it → neuro/visual + hepatotoxicity → check levels, reduce dose. (A **UM** would instead run **sub**therapeutic — option **A**.) *1A2.*"}, {"id": 17, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "Which PPI is preferred with clopidogrel (Plavix)?", "opts": ["Pantoprazole (Protonix)", "Lansoprazole", "Omeprazole (Prilosec)", "Esomeprazole (Nexium)"], "ans": 0, "exp": "Pantoprazole (Protonix) has the least CYP2C19 inhibition; avoid omeprazole (Prilosec)/esomeprazole (Nexium) with clopidogrel (Plavix). *3C3.*"}, {"id": 18, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C2,3C5", "stem": "Which statin carries the highest rhabdomyolysis risk with a strong CYP3A4 inhibitor?", "opts": ["Rosuvastatin (Crestor)", "Simvastatin (Zocor)", "Pravastatin (Pravachol)", "Pitavastatin"], "ans": 1, "exp": "Simvastatin (and lovastatin) are CYP3A4 substrates → rhabdo with strong 3A4 inhibitors. *3C2,3C5.*"}, {"id": 19, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "A patient on a combined oral contraceptive starts rifampin (Rifadin). The key concern is:", "opts": ["Serotonin syndrome from induction", "Higher estrogen from inhibition", "Contraceptive failure from induction", "QT prolongation from inhibition"], "ans": 2, "exp": "Rifampin (Rifadin) induces CYP3A4 → ↓ contraceptive hormones → failure; use backup. *3C3.*"}, {"id": 20, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "A patient on an SSRI is given linezolid (Zyvox) and develops clonus, hyperthermia, and agitation. Diagnosis?", "opts": ["Anticholinergic toxicity", "Malignant hyperthermia", "Neuroleptic malignant syndrome", "Serotonin syndrome"], "ans": 3, "exp": "Serotonin syndrome — linezolid (Zyvox) is an MAOI. *3C3.*"}, {"id": 21, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1A2,3C5", "stem": "A **4-year-old** given weight-based **codeine ((in Tylenol #3))** after **tonsillectomy/adenoidectomy** becomes **difficult to arouse with RR 8.** Most likely CYP2D6 phenotype?", "opts": ["Ultrarapid metabolizer → excess morphine (MS Contin)", "Poor metabolizer → no morphine (MS Contin)", "Normal metabolizer → usual effect", "Intermediate metabolizer → mild effect"], "ans": 0, "exp": "**Ultrarapid** CYP2D6 → rapid codeine ((in Tylenol #3))→morphine (MS Contin) → respiratory depression. ⚠ FDA **contraindicates codeine after T&A in children** for exactly this reason. (A **PM** would have **no analgesia**, not toxicity — option **B**.) *1A2,3C5.*"}, {"id": 22, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1A2,3C2", "stem": "A **CYP2C19 poor metabolizer** on **citalopram (Celexa) 40 mg/day** is found to have **QTc 480 ms.** Best action?", "opts": ["Continue citalopram (Celexa) 40 mg/day", "Reduce to ≤20 mg/day (PM cap)", "Increase to 60 mg for efficacy", "Switch to paroxetine (Paxil) 40 mg/day"], "ans": 1, "exp": "CYP2C19 PMs (also elderly/hepatic impairment/2C19 inhibitors) accumulate citalopram (Celexa) → **QT prolongation** → **cap at 20 mg/day.** Paroxetine (Paxil) **D** is a strong 2D6 inhibitor (its own issues) and ignores the dose problem. *1A2,3C2.*"}, {"id": 23, "group": "PGx & Drug Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3C3", "stem": "A patient on digoxin (Lanoxin) starts amiodarone (Pacerone). The appropriate action is to:", "opts": ["Stop digoxin (Lanoxin) entirely", "Double the digoxin (Lanoxin) dose", "Reduce digoxin (Lanoxin) ~50% (P
