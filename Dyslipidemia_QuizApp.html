→ prompts more aggressive overall LDL/risk reduction.", "anchor": "2026 ACC/AHA; NLA 2024."}, {"id": "DLP004", "subtopic": "Risk Assessment & LDL Goals", "domain": "D3", "nabp": "3.D.3", "tier": "T2", "type": "SATA", "aware": true, "recall": false, "stem": "Which findings are recognized ASCVD 'risk enhancers' in the 2026 guideline that favor earlier lipid-lowering therapy? Select all that apply.", "opts": ["Persistently elevated triglycerides", "Chronic inflammatory disease (e.g., RA, lupus)", "South Asian ancestry", "Preeclampsia or early menopause", "Elevated HDL-C >60 mg/dL"], "ans": [0, 1, 2, 3], "exp": "Risk enhancers: family hx premature ASCVD, chronic inflammatory dz, high-risk ancestry (South Asian/Filipino), metabolic dz (obesity, DM, CKD), reproductive markers (preeclampsia, early menopause, GDM), ↑TG, ↑Lp(a), ↑apoB, ↑hsCRP. High HDL is NOT protective 'free pass' — not an enhancer.", "anchor": "2026 ACC/AHA Dyslipidemia."}, {"id": "DLP005", "subtopic": "Risk Assessment & LDL Goals", "domain": "D3", "nabp": "3.B", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "A non-contrast coronary artery calcium (CAC) scan is most useful in the 2026 framework to refine therapy decisions in which patient?", "opts": ["Intermediate-risk adult unsure about starting a statin", "Patient with established clinical ASCVD on therapy", "Patient already well below an LDL of 55 mg/dL", "Healthy adult whose 10-year ASCVD risk is under 3%"], "ans": 0, "exp": "CAC helps borderline/intermediate-risk adults (men ≥40, women ≥45) when the statin decision is uncertain. Any CAC >0 supports LDL <100 (lower with higher scores); CAC=0 may defer. Not needed in known ASCVD (already high-risk) or at-goal patients.", "anchor": "2026 ACC/AHA Dyslipidemia."}, {"id": "DLP006", "subtopic": "Statins: Intensity & MOA", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "What is the mechanism of action of HMG-CoA reductase inhibitors?", "opts": ["Inhibit hepatic cholesterol synthesis, raising LDL-receptor density", "Block intestinal cholesterol absorption at the NPC1L1 transporter", "Bind circulating PCSK9 to preserve hepatic LDL receptors", "Inhibit ATP-citrate lyase one step upstream of HMG-CoA"], "ans": 0, "exp": "Statins inhibit HMG-CoA reductase (rate-limiting step of hepatic cholesterol synthesis) → ↓ intracellular cholesterol → ↑ LDL-receptor expression → ↑ LDL clearance → ↓ serum LDL. Also modestly ↓TG, ↑HDL. Foundation of all lipid lowering.", "anchor": "Pharmacology."}, {"id": "DLP007", "subtopic": "Statins: Intensity & MOA", "domain": "D2", "nabp": "2.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which regimen qualifies as high-intensity statin therapy (expected LDL reduction ≥50%)?", "opts": ["Rosuvastatin 20 mg daily", "Atorvastatin 10 mg daily", "Pravastatin 40 mg daily", "Simvastatin 20 mg daily"], "ans": 0, "exp": "High-intensity = atorvastatin (Lipitor) 40–80 mg or rosuvastatin (Crestor) 20–40 mg (↓LDL ≥50%). Atorvastatin 10–20, rosuvastatin 5–10, simvastatin (Zocor) 20–40, pravastatin (Pravachol) 40–80, pitavastatin (Livalo) 1–4 = moderate (↓LDL 30–49%). Simvastatin 80 mg is no longer used (myopathy).", "anchor": "Statin intensity table."}, {"id": "DLP008", "subtopic": "Statins: Intensity & MOA", "domain": "D2", "nabp": "2.A.2", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which statin regimens are classified as moderate-intensity? Select all that apply.", "opts": ["Atorvastatin 20 mg daily", "Rosuvastatin 10 mg daily", "Simvastatin 20 mg daily", "Atorvastatin 80 mg daily", "Pravastatin 10 mg daily"], "ans": [0, 1, 2], "exp": "Moderate (↓LDL 30–49%): atorvastatin (Lipitor) 10–20, rosuvastatin (Crestor) 5–10, simvastatin (Zocor) 20–40, pravastatin (Pravachol) 40–80, lovastatin (Mevacor) 40, pitavastatin (Livalo) 1–4. Atorvastatin 80 = high-intensity; pravastatin 10 = low-intensity.", "anchor": "Statin intensity table."}, {"id": "DLP009", "subtopic": "Statins: AE/DDI/PGx", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on simvastatin (Zocor) is prescribed clarithromycin. What is the primary concern with this combination?", "opts": ["Increased myopathy/rhabdomyolysis risk from CYP3A4 inhibition", "Reduced statin efficacy from CYP3A4 enzyme induction instead", "Increased bleeding risk mediated by CYP2C9 inhibition effects", "QT-interval prolongation from cardiac hERG potassium blockade"], "ans": 0, "exp": "Simvastatin & lovastatin (Mevacor) are CYP3A4 substrates. Strong 3A4 inhibitors (clarithromycin, itraconazole, ritonavir, grapefruit) ↑ statin levels → ↑ rhabdo. Simvastatin is CONTRAINDICATED with strong 3A4 inhibitors. Rosuvastatin (Crestor)/pravastatin (Pravachol) are non-3A4 → safer choices.", "anchor": "DDI; CYP3A4."}, {"id": "DLP010", "subtopic": "Statins: AE/DDI/PGx", "domain": "D1", "nabp": "1.A.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A reduced-function SLCO1B1 (OATP1B1) genotype most increases the myopathy risk of which statin?", "opts": ["Simvastatin", "Pravastatin", "Rosuvastatin", "Pitavastatin"], "ans": 0, "exp": "SLCO1B1 encodes OATP1B1, the hepatic uptake transporter. Reduced function ↑ systemic simvastatin (Zocor) acid exposure → ↑ myopathy (strongest for simvastatin). CPIC: consider lower dose / alternative statin. Effect is statin-specific and largest with simvastatin.", "anchor": "PGx; CPIC SLCO1B1."}, {"id": "DLP011", "subtopic": "Statins: AE/DDI/PGx", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Which statin dose limit applies when co-administered with verapamil or diltiazem?", "opts": ["Simvastatin should not exceed 10 mg daily", "Rosuvastatin should not exceed 5 mg daily", "Atorvastatin should not exceed 20 mg daily", "Pravastatin should not exceed 40 mg daily"], "ans": 0, "exp": "Moderate CYP3A4 inhibitors raise simvastatin (Zocor) levels: simvastatin max 10 mg/day with diltiazem/verapamil, max 20 mg/day with amlodipine. Pravastatin (Pravachol)/rosuvastatin (Crestor) are non-3A4 and unaffected. Avoid simvastatin 80 mg entirely (myopathy BBW history).", "anchor": "DDI; simvastatin label."}, {"id": "DLP012", "subtopic": "Statins: AE/DDI/PGx", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which are recognized adverse effects or label considerations for statins? Select all that apply.", "opts": ["Myalgia / myopathy", "New-onset type 2 diabetes", "Transaminase elevation", "Permanent memory loss", "Rhabdomyolysis (rare)"], "ans": [0, 1, 2, 4], "exp": "Statin AEs: myalgia (common) → myopathy → rare rhabdo (↑CK, myoglobinuria); small ↑ new-onset DM (benefit still outweighs); ↑ transaminases (routine LFT monitoring no longer mandated). Cognitive complaints are rare/reversible — NOT permanent memory loss.", "anchor": "Statin safety."}, {"id": "DLP013", "subtopic": "Statins: AE/DDI/PGx", "domain": "D3", "nabp": "3.E.2", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which counseling point is most appropriate for a patient starting lovastatin (Mevacor)?", "opts": ["Take in the evening and avoid grapefruit juice", "Take on an empty stomach each morning", "Expect red-orange discoloration of urine", "Stop the drug if you develop a mild headache"], "ans": 0, "exp": "Short-half-life statins (lovastatin, simvastatin (Zocor)) are dosed in the evening (peak nocturnal cholesterol synthesis); lovastatin is taken with food. Avoid grapefruit (CYP3A4). Report unexplained muscle pain/weakness or dark urine. Atorvastatin (Lipitor)/rosuvastatin (long t½) are time-independent.", "anchor": "Counseling."}, {"id": "DLP014", "subtopic": "Ezetimibe", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "What is the mechanism of action of ezetimibe (Zetia)?", "opts": ["Inhibits the NPC1L1 intestinal cholesterol absorption transporter", "Inhibits hepatic HMG-CoA reductase to block synthesis", "Binds intestinal bile acids within the gut lumen", "Activates PPAR-alpha receptors to lower serum triglycerides"], "ans": 0, "exp": "Ezetimibe blocks the NPC1L1 sterol transporter at the intestinal brush border → ↓ cholesterol absorption → ↑ hepatic LDL-R. Monotherapy ↓LDL ~18–25%; first add-on to statin (IMPROVE-IT showed CV benefit). 10 mg PO daily, well tolerated.", "anchor": "MOA; IMPROVE-IT."}, {"id": "DLP015", "subtopic": "Ezetimibe", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "Per the 2026 nonstatin cascade, which agent is generally the first add-on for a patient not at LDL goal on a maximally tolerated statin?", "opts": ["Ezetimibe", "Evolocumab", "Inclisiran", "Gemfibrozil"], "ans": 0, "exp": "After maximally tolerated statin: add ezetimibe (Zetia) and/or bempedoic acid (oral, ~18–25% LDL ↓), then PCSK9 mAb (evolocumab (Repatha)/alirocumab (Praluent)) or inclisiran (Leqvio) if still not at goal or higher risk. 2026 allows earlier PCSK9i in select high-risk pts (equal placement with ezetimibe).", "anchor": "2026 ACC/AHA nonstatin pathway."}, {"id": "DLP016", "subtopic": "PCSK9i & Inclisiran", "domain": "D1", "nabp": "1.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "How do the monoclonal antibody PCSK9 inhibitors evolocumab (Repatha) and alirocumab (Praluent) lower LDL-C?", "opts": ["Bind circulating PCSK9 to prevent LDL-receptor degradation", "Silence hepatic PCSK9 messenger RNA inside hepatocytes", "Inhibit cholesterol synthesis at the HMG-CoA reductase step", "Block intestinal NPC1L1-mediated cholesterol absorption fully"], "ans": 0, "exp": "PCSK9 normally targets the LDL receptor for lysosomal degradation. mAbs bind circulating PCSK9 → more LDL-R recycled to the surface → ↓LDL ~50–60%. SQ q2wk or monthly. Outcomes: FOURIER (evolocumab), ODYSSEY (alirocumab). AE: injection-site reaction.", "anchor": "MOA; FOURIER/ODYSSEY."}, {"id": "DLP017", "subtopic": "PCSK9i & Inclisiran", "domain": "D1", "nabp": "1.A.1", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "Inclisiran (Leqvio) differs mechanistically from evolocumab (Repatha) in that inclisiran:", "opts": ["Is a small interfering RNA that reduces PCSK9 synthesis", "Is an oral ATP-citrate lyase inhibitor", "Binds PCSK9 protein in the circulation", "Inhibits intestinal cholesterol absorption"], "ans": 0, "exp": "Inclisiran is a hepatocyte-directed siRNA that degrades PCSK9 mRNA → ↓ PCSK9 production. Dosed SQ at day 0, 3 months, then every 6 months (twice-yearly), ↓LDL ~50%. 2026 guideline notes cardiovascular outcomes trials are still pending vs the mAbs.", "anchor": "2026 ACC/AHA; ORION program."}, {"id": "DLP018", "subtopic": "PCSK9i & Inclisiran", "domain": "D3", "nabp": "3.D.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which administration schedule correctly describes maintenance inclisiran (Leqvio) dosing?", "opts": ["SQ at day 0 and month 3, then every 6 months", "Subcutaneously once every 2 weeks indefinitely", "By mouth as a single once-daily oral tablet", "Intravenous infusion repeated every 8 weeks"], "ans": 0, "exp": "Inclisiran: SQ initial, again at 3 months, then every 6 months → twice-yearly maintenance (adherence advantage). Contrast: evolocumab (Repatha)/alirocumab (Praluent) SQ q2wk or monthly. The infrequent schedule is the key NABP-distinguishing feature.", "anchor": "Dosing."}, {"id": "DLP019", "subtopic": "Bempedoic Acid", "domain": "D1", "nabp": "1.A.1", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "Bempedoic acid (Nexletol) lowers LDL-C by inhibiting which enzyme, and why is muscle toxicity uncommon?", "opts": ["ATP-citrate lyase; a prodrug activated only in the liver", "HMG-CoA reductase; the drug concentrates within hepatocytes", "PCSK9 protein; the drug spares skeletal-muscle receptors", "NPC1L1 transporter; the drug acts only within the gut"], "ans": 0, "exp": "Bempedoic acid inhibits ATP-citrate lyase (upstream of HMG-CoA reductase). It is a prodrug requiring ACSVL1 activation, which is present in liver but NOT skeletal muscle → minimal myalgia → useful in statin-intolerant pts. ↓LDL ~18–25%. CLEAR Outcomes: ↓ MACE.", "anchor": "2026 ACC/AHA; CLEAR Outcomes."}, {"id": "DLP020", "subtopic": "Bempedoic Acid", "domain": "D3", "nabp": "3.C.5", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which adverse effects are associated with bempedoic acid (Nexletol)? Select all that apply.", "opts": ["Hyperuricemia / gout flares", "Tendon rupture risk", "Elevated transaminases", "Profound bradycardia", "Increased serum creatinine"], "ans": [0, 1, 2, 4], "exp": "Bempedoic acid AEs: ↑uric acid → gout, tendon rupture (caution with prior tendon disorders/fluoroquinolones), ↑transaminases, and a small ↑ serum creatinine/BUN. No effect on heart rate — bradycardia is not associated.", "anchor": "Nexletol label."}, {"id": "DLP021", "subtopic": "Hypertriglyceridemia", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with established ASCVD on a maximally tolerated statin has triglycerides of 220 mg/dL. Which agent has outcome data (REDUCE-IT) for residual cardiovascular risk reduction?", "opts": ["Icosapent ethyl", "Gemfibrozil", "Niacin extended-release", "Cholestyramine"], "ans": 0, "exp": "Icosapent ethyl (purified EPA) 2 g BID: REDUCE-IT showed ↓ CV events in statin-treated pts with TG 135–499 + high risk. Mixed EPA/DHA omega-3 lacked benefit (STRENGTH). Niacin (AIM-HIGH/HPS2-THRIVE) showed no CV benefit + harm. AE of icosapent: AFib, bleeding.", "anchor": "REDUCE-IT."}, {"id": "DLP022", "subtopic": "Hypertriglyceridemia", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient has trigly  "exp": "Friedewald: LDL = TC − HDL − (TG/5) = 220 − 50 − 30 = 140 mg/dL. Valid only when TG <400 mg/dL (the VLDL ≈ TG/5 estimate fails above that → use direct LDL).", "anchor": "Friedewald equation."}, {"id": "DLP037", "subtopic": "Lipid Calculations", "domain": "D1", "nabp": "1.C.1", "tier": "T1", "type": "FILL", "aware": false, "recall": false, "stem": "Calculate non-HDL cholesterol for a patient with total cholesterol 240 mg/dL and HDL-C 45 mg/dL.", "ans": 195, "unit": "mg/dL", "tol": 1, "check": "240 - 45", "exp": "Non-HDL-C = TC − HDL = 240 − 45 = 195 mg/dL. Captures all atherogenic (apoB) particles, valid in non-fasting samples and high TG. 2026 non-HDL goal ≈ LDL goal + 30 (e.g., LDL <55 → non-HDL <85).", "anchor": "Non-HDL calculation."}, {"id": "DLP038", "subtopic": "Lipid Calculations", "domain": "D1", "nabp": "1.C.1", "tier": "T2", "type": "FILL", "aware": false, "recall": false, "stem": "A patient's baseline LDL-C is 160 mg/dL and falls to 72 mg/dL on therapy. What percent reduction in LDL-C was achieved? Enter to one decimal.", "ans": 55, "unit": "%", "tol": 0.5, "check": "(160 - 72)/160*100", "exp": "% reduction = (baseline − on-treatment)/baseline × 100 = (160 − 72)/160 × 100 = 55%. ≥50% reduction defines a high-intensity statin response — this patient meets it.", "anchor": "Percent LDL reduction."}, {"id": "DLP039", "subtopic": "Lipid Calculations", "domain": "D1", "nabp": "1.C.1", "tier": "T2", "type": "FILL", "aware": false, "recall": false, "stem": "A high-intensity statin is expected to lower LDL-C by at least 50%. For a baseline LDL-C of 190 mg/dL, what is the highest expected on-treatment LDL-C from this effect alone?", "ans": 95, "unit": "mg/dL", "tol": 1, "check": "190 * 0.5", "exp": "≥50% reduction → on-treatment LDL ≤ 190 × 0.50 = 95 mg/dL. High-intensity = atorvastatin (Lipitor) 40–80 or rosuvastatin (Crestor) 20–40. If still above goal, add ezetimibe (Zetia)/bempedoic acid (Nexletol) → PCSK9i/inclisiran (Leqvio).", "anchor": "Statin intensity math."}, {"id": "DLP040", "subtopic": "Risk Assessment & LDL Goals", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Apolipoprotein B (apoB) measurement is most appropriately used in the 2026 guideline to:", "opts": ["Assess residual atherogenic risk once LDL/non-HDL goals are met", "Replace LDL-C as the universal first-line lipid screening test", "Screen every adult once in a lifetime, like lipoprotein(a)", "Diagnose acute pancreatitis in severe hypertriglyceridemia"], "ans": 0, "exp": "ApoB is an optional confirmatory marker of residual risk in pts with ASCVD, diabetes, metabolic syndrome, or high TG who have reached LDL/non-HDL goals (apoB counts all atherogenic particles). Lp(a) — not apoB — is the universal once-in-life screen.", "anchor": "2026 ACC/AHA biomarkers."}];
const LET = "ABCDEF";
const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="dlp_log_v1", MISSKEY="dlp_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function domainList(){ return [...new Set(ITEMS.map(i=>i.domain))].sort(); }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }
function setHub(){ el('hubstat').textContent = `${ITEMS.length} Qs · ${subtopics().length} topics · ${domainList().length} domains`; }

let dashMode='full', countSel=0;

  [0,10,20,30,40].forEach(n=>{ s += `<button class="pill ${countSel===n?'on':''}" data-n="${n}" onclick="setCount(${n})">${n===0?'All':n}</button>`; });

    <button class="bigbtn start" id="startBtn" onclick="startQuiz()">Start quiz</button>`;

function setMode(m){ dashMode=m; el('subsWrap').classList.toggle('hide',m!=='pick');
  document.querySelectorAll('.modecard').forEach((c,i)=>c.classList.toggle('on',(m==='full')===(i===0))); liveCount(); }
function setCount(n){ countSel=n; document.querySelectorAll('#countPills .pill').forEach(b=>b.classList.toggle('on',+b.dataset.n===n)); liveCount(); }
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  let pool;
  if(dashMode==='full'){ pool = ITEMS.slice(); }
  else { const subs=subtopics(); const chosen=[...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
    pool = ITEMS.filter(i=>chosen.includes(i.subtopic)); }
  const dom = el('fDom')?el('fDom').value:'', tier = el('fTier')?el('fTier').value:'';
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const n = countSel? Math.min(countSel,pool.length): pool.length;
  if(el('avail')) el('avail').textContent = `${pool.length} available`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false, answered=false, picks=[];
function buildItem(it){
  if(it.type==='FILL') return {...it};
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  if(el('fShuf').checked) pool = shuffle(pool);
  if(countSel) pool = pool.slice(0,countSel);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
function badgeHtml(it){
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];

    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.type==='FILL') b+=`<div class="badge b-fill">FILL</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  return b;
}

  } else {
    const isSata = it.type==='SATA';
    body=`<div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div><div id="opts">`;
    it.opts.forEach((o,i)=>{ body+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
      <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
    body+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>`;
  }
  const tail=`<div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="ghost hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=head+body+tail;
  if(it.type==='FILL') setTimeout(()=>{const f=el('fillIn'); if(f)f.focus();},30);
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function tolOk(user,it){
  if(it.tol!=null) return Math.abs(user-it.ans)<=it.tol+1e-9;
  if(it.tolpct!=null) return Math.abs(user-it.ans)<=Math.abs(it.ans)*it.tolpct/100+1e-9;
  return Math.abs(user-it.ans)<=Math.max(Math.abs(it.ans)*0.02,0.01);
}
function recordAndReveal(it,ok,answerText){
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok&&retestMode){ const m=getMissed(); const k=m.indexOf(it.id); if(k>=0){m.splice(k,1);setMissed(m);} }
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+answerText}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function checkFill(){
  if(answered) return; const it=Q[qi];
  const raw=el('fillIn').value.trim().replace(/,/g,'').replace(/[^0-9eE.+-]/g,'');
  const user=parseFloat(raw);
  if(isNaN(user)) return;
  answered=true;
  const ok=tolOk(user,it);
  el('fillIn').classList.add(ok?'correct':'wrong'); el('fillIn').disabled=true;
  recordAndReveal(it,ok,fmtNum(it.ans)+' '+it.unit);
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  recordAndReveal(it,ok,al);
}
function fmtNum(x){ return (Math.round(x*1000)/1000).toString(); }
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button class="bigbtn start" style="width:auto;padding:11px 18px" onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button class="ghost" onclick="if(confirm('Reset all progress?')){store.set(LOGKEY,[]);store.set(MISSKEY,[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  const it=Q[qi];
  if(!answered){
    if(it.type==='FILL'){ if(e.key==='Enter'&&!el('checkBtn').disabled)checkFill(); return; }
    if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA');
  } else if(e.key==='Enter')nextQ();
});
setHub();
renderDash();
</script>
</body></html>
