<script>
const ALL=[{"id": 1, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA shared by all **β-lactams**?", "opts": ["Bind penicillin-binding proteins to block cell-wall cross-linking", "Inhibit DNA gyrase/topoisomerase IV to block DNA replication", "Inhibit dihydrofolate reductase to disrupt folate synthesis", "Bind the 50S ribosomal subunit to block peptide elongation"], "ans": 0, "exp": "β-lactams bind **PBPs** → block transpeptidation → cell-wall lysis (**time-dependent** killing → extended infusions for pip-tazo/cefepime). *NABP: 1.A.1.*"}, {"id": 2, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "A patient needs coverage for **MSSA** bacteremia (no allergy). Best β-lactam?", "opts": ["Ceftazidime, a third-generation antipseudomonal cephalosporin", "Nafcillin or cefazolin (β-lactamase-stable)", "Ampicillin, an aminopenicillin with enterococcal activity", "Penicillin G for streptococcal and syphilis coverage"], "ans": 1, "exp": "**Antistaphylococcal penicillins (nafcillin/oxacillin) or cefazolin** are preferred for **MSSA** (β-lactamase-stable). ⚠ They do **not** cover MRSA or enterococci. *NABP: 3.C.2.*"}, {"id": 3, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which agent adds **Pseudomonas aeruginosa** coverage?", "opts": ["Ampicillin, which adds Listeria and enterococcal coverage", "Cefazolin, the first-generation surgical-prophylaxis agent", "Piperacillin-tazobactam (covers Pseudomonas)", "Ertapenem, a once-daily ESBL-active carbapenem"], "ans": 2, "exp": "**Pip-tazo** covers Pseudomonas + anaerobes. Antipseudomonal β-lactams: **pip-tazo, ceftazidime, cefepime, meropenem/imipenem, aztreonam.** ⚠ **Ertapenem does NOT cover Pseudomonas.** *NABP: 3.C.2.*"}, {"id": 4, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "An older patient has **Listeria** meningitis. Which β-lactam is active?", "opts": ["Cefazolin", "Ceftriaxone", "Cefepime", "Ampicillin"], "ans": 3, "exp": "**Ampicillin (or penicillin)** covers **Listeria**; ⚠ **cephalosporins do NOT cover Listeria** (add ampicillin to ceftriaxone for age >50/immunocompromised meningitis). *NABP: 3.C.2.*"}, {"id": 5, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**Cefazolin (1st-generation cephalosporin)** best covers:", "opts": ["MSSA, streptococci, and PEK gram-negatives (Proteus/E. coli/Klebsiella)", "MRSA, Pseudomonas, and Acinetobacter gram-negatives", "Anaerobes plus atypicals (Mycoplasma/Legionella)", "Enterococcus faecalis, Listeria, and VRE"], "ans": 0, "exp": "1st-gen = **gram-positive (MSSA/strep) + PEK**; the go-to **surgical prophylaxis** agent. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 6, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Ceftriaxone** is first-line empiric therapy in all EXCEPT:", "opts": ["Bacterial meningitis (empiric)", "Pseudomonal infection", "Gonorrhea", "Community-acquired pneumonia (with a macrolide)"], "ans": 1, "exp": "Ceftriaxone (3rd-gen) covers CAP/meningitis/gonorrhea but ⚠ **lacks Pseudomonas** activity → use **ceftazidime/cefepime** for Pseudomonas. *NABP: 3.C.2.*"}, {"id": 7, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A **neonate** needs a cephalosporin; which caution applies to **ceftriaxone**?", "opts": ["Requires renal dose adjustment for elevated SCr", "It is the drug of choice with no neonatal caution", "Avoid in neonates (biliary sludging, fatal Ca²⁺ precipitation)", "Causes rate-related red-man flushing reactions"], "ans": 2, "exp": "⚠ **Ceftriaxone is contraindicated in neonates** (kernicterus risk; lethal **Ca²⁺-ceftriaxone precipitation**) → use **cefotaxime.** ✓ Ceftriaxone is otherwise not renally adjusted (biliary elimination). *NABP: 3.C.2 / 2.A.4.*"}, {"id": 8, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which cephalosporin covers **MRSA**?", "opts": ["Cefazolin", "Cefepime", "Ceftriaxone", "Ceftaroline"], "ans": 3, "exp": "**Ceftaroline (5th-gen)** is the only β-lactam with reliable **MRSA** activity. *NABP: 3.C.2.*"}, {"id": 9, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 2.A.4", "stem": "A renally-impaired ICU patient on **cefepime** develops confusion and myoclonus. Most likely cause?", "opts": ["Cefepime neurotoxicity from inadequate renal dose adjustment", "Hepatic encephalopathy from rising serum ammonia", "Alcohol-withdrawal delirium with autonomic signs", "Serotonin syndrome from a drug interaction"], "ans": 0, "exp": "⚠ **Cefepime neurotoxicity** (encephalopathy, myoclonus, seizures) occurs with **renal accumulation** → adjust for CrCl. *NABP: 3.C.5 / 2.A.4.*"}, {"id": 10, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which carbapenem should NOT be used for **Pseudomonas**?", "opts": ["Imipenem-cilastatin", "Ertapenem", "Doripenem", "Meropenem"], "ans": 1, "exp": "**Ertapenem** lacks **Pseudomonas, Acinetobacter, and enterococcal** activity (once-daily; good for ESBL/community intra-abdominal). ⚠ **Imipenem → seizure risk** (use meropenem for CNS). *NABP: 3.C.2 / 3.C.5.*"}, {"id": 11, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Carbapenems are broad but reliably **miss** which organisms?", "opts": ["ESBL-producing", "coli and Klebsiella pneumoniae", "Anaerobes including Bacteroides fragilis species", "MRSA, VRE, and atypicals (Mycoplasma/Legionella)"], "ans": 2, "exp": "Carbapenems cover ESBLs/anaerobes/most gram-negs but **NOT MRSA, VRE, atypicals,** or *Stenotrophomonas*. *NABP: 1.A.1.*"}, {"id": 12, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.5", "stem": "A patient with a documented **severe penicillin allergy (anaphylaxis)** needs gram-negative/Pseudomonas coverage. Safest β-lactam?", "opts": ["Cefepime", "Meropenem", "Aztreonam", "Piperacillin-tazobactam"], "ans": 2, "exp": "**Aztreonam (monobactam)** has **negligible cross-reactivity** with penicillins → safe in severe PCN allergy; covers **gram-negatives incl. Pseudomonas.** ⚠ Shares an R-group with **ceftazidime** (avoid if ceftazidime-allergic). *NABP: 3.C.2 / 2.A.5.*"}, {"id": 13, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.5 / 3.C.2", "stem": "Current best practice on **penicillin–cephalosporin cross-reactivity**?", "opts": ["All β-lactams are absolutely contraindicated together", "Only the carbapenem class is safe to administer", "About 10% cross-reactivity, so avoid all cephalosporins", "Low (~1–2%), driven by shared R1 side chains (cefazolin safe)"], "ans": 3, "exp": "Modern data: **low (~1–2%)** cross-reactivity, **side-chain**–dependent; **cefazolin** is safe with most PCN allergies. ✓ Many \"penicillin-allergic\" patients can be safely de-labeled. *NABP: 2.A.5 / 3.C.2.*"}, {"id": 14, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Which β-lactam AE is correctly matched?", "opts": ["Cefotetan → disulfiram-like reaction with hypoprothrombinemia (NMTT)", "Nafcillin → dose-dependent nephrotoxicity needing renal adjustment", "Penicillin → routine concentration-dependent QT prolongation", "Aztreonam → rate-related red-man flushing syndrome"], "ans": 0, "exp": "**Cefotetan (and cefamandole)** carry the **NMTT side chain** → **disulfiram-like reaction + ↓ vitamin-K-dependent factors** (bleeding). (Nafcillin is **hepatically** cleared—no renal adjustment.) *NABP: 3.C.5 / 3.C.3.*"}, {"id": 17, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Vancomycin (Vancocin) MOA?", "opts": ["Binds the D-Ala-D-Ala terminus to block cell-wall synthesis", "Binds penicillin-binding proteins like the β-lactams", "Binds the 30S subunit to misread mRNA", "Depolarizes the gram-positive cell membrane"], "ans": 0, "exp": "Glycopeptide — **binds D-Ala-D-Ala** → blocks cross-linking (bactericidal; gram-positive incl. MRSA). *NABP: 1.A.1.*"}, {"id": 18, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": true, "nabp": "1.A.2 / 3.D.2", "stem": "Preferred vancomycin (Vancocin) monitoring for serious MRSA infection (2020 ASHP/IDSA)?", "opts": ["Peak 30–40", "AUC/MIC 400–600", "Trough 25–30", "Trough 5–10"], "ans": 1, "exp": "**AUC/MIC 400–600** (Bayesian) is preferred; trough 15–20 is the legacy surrogate. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 19, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.5 / 3.E.2", "stem": "During a vancomycin (Vancocin) infusion a patient flushes over the face/torso. Best management?", "opts": ["Give intramuscular epinephrine for presumed anaphylaxis", "Stop the drug permanently as an IgE-mediated allergy", "Slow the infusion and give an antihistamine (histamine)", "Switch immediately to a carbapenem for coverage"], "ans": 2, "exp": "**Vancomycin (Vancocin) flushing (\"red man\") = rate-related histamine** reaction, not IgE allergy → **slow the infusion + antihistamine** (can pre-treat). *NABP: 2.A.5 / 3.E.2.*"}, {"id": 20, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Daptomycin (Cubicin) MOA?", "opts": ["Inhibits dihydrofolate reductase in folate synthesis", "Binds the D-Ala-D-Ala peptidoglycan terminus", "Binds the 50S subunit to block elongation", "Lipopeptide that depolarizes the cell membrane"], "ans": 3, "exp": "**Membrane depolarization** → rapid bactericidal (MRSA, VRE). *NABP: 1.A.1.*"}, {"id": 21, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why is daptomycin (Cubicin) inappropriate for **pneumonia**?", "opts": ["It is inactivated by pulmonary surfactant in the alveoli", "It cannot penetrate inflamed lung parenchyma", "It covers only gram-negative respiratory pathogens", "Its gram-positive spectrum is far too narrow"], "ans": 0, "exp": "⚠ **Pulmonary surfactant inactivates daptomycin (Cubicin)** → never use for pneumonia; excellent for MRSA/VRE **bacteremia/endocarditis.** *NABP: 3.C.2.*"}, {"id": 22, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Key monitoring for a patient on daptomycin (Cubicin) also taking a statin?", "opts": ["Thyroid-stimulating hormone every 4 weeks", "Weekly CPK; consider holding the statin (myopathy)", "INR for additive anticoagulant effect", "Liver enzymes for hepatotoxicity only"], "ans": 1, "exp": "Daptomycin (Cubicin) → **myopathy/↑CPK** → **monitor CPK weekly**, hold statins; also watch for **eosinophilic pneumonia.** *NABP: 3.C.5 / 3.C.3.*"}, {"id": 23, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Linezolid (Zyvox) class/MOA?", "opts": ["Lipopeptide that depolarizes the membrane", "Tetracycline that binds the 30S subunit", "Oxazolidinone — binds 23S rRNA to block initiation", "Glycopeptide that binds D-Ala-D-Ala"], "ans": 2, "exp": "**Oxazolidinone** (bacteriostatic vs staph; covers **MRSA + VRE**); **~100% oral bioavailability.** *NABP: 1.A.1.*"}, {"id": 24, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on an SSRI is started on **linezolid (Zyvox).** Main concern?", "opts": ["Nephrotoxicity from tubular accumulation", "No clinically relevant interaction occurs", "QT prolongation with torsades risk", "Serotonin syndrome — linezolid (Zyvox) is a weak MAOI"], "ans": 3, "exp": "⚠ Linezolid (Zyvox) = **reversible MAOI** → **serotonin syndrome** with SSRIs/SNRIs; also tyramine caution. *NABP: 3.C.3.*"}, {"id": 25, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Prolonged (>2-week) linezolid (Zyvox) therapy risks:", "opts": ["Myelosuppression (thrombocytopenia) plus optic/peripheral neuropathy", "Irreversible cochlear ototoxicity with vestibular dysfunction", "Rate-related red-man flushing histamine reaction", "A disulfiram-like reaction when alcohol is consumed"], "ans": 0, "exp": "**Reversible thrombocytopenia/myelosuppression** (>2 wks → monitor CBC) and **peripheral/optic neuropathy** with prolonged use. *NABP: 3.C.5.*"}, {"id": 26, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which pair reliably treats **VRE (E. faecium)**?", "opts": ["Vancomycin (Vancocin) and cefazolin", "Linezolid (Zyvox) and daptomycin (Cubicin)", "Nafcillin and ceftriaxone", "Ertapenem and aztreonam"], "ans": 1, "exp": "**Linezolid (Zyvox) and daptomycin (Cubicin)** are the workhorses for **VRE.** (Quinupristin-dalfopristin covers E. faecium, not E. faecalis.) *NABP: 3.C.2.*"}, {"id": 27, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Appropriate agent for **MRSA pneumonia**?", "opts": ["Aztreonam, a gram-negative monobactam", "Daptomycin (inactivated by surfactant)", "Vancomycin (Vancocin) or linezolid (Zyvox)", "Cefazolin, a first-gen cephalosporin"], "ans": 2, "exp": "**Vancomycin (Vancocin) or linezolid (Zyvox)** for MRSA pneumonia; ⚠ **not daptomycin (Cubicin)** (surfactant inactivation). *NABP: 3.C.2.*"}, {"id": 28, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Oral options for **community MRSA skin/soft-tissue infection** include:", "opts": ["Cephalexin, a first-generation oral cephalosporin", "Penicillin VK for streptococcal coverage", "Amoxicillin, an aminopenicillin", "TMP-SMX, doxycycline (Vibramycin), clindamycin, or linezolid (Zyvox)"], "ans": 3, "exp": "Community **MRSA SSTI** orals: **TMP-SMX, doxycycline (Vibramycin), clindamycin, linezolid (Zyvox).** β-lactams (cephalexin/amoxicillin) cover only MSSA/strep. *NABP: 3.C.2.*"}, {"id": 29, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.A.2", "stem": "Before using **clindamycin** for an erythromycin-resistant staph isolate, the lab should perform:", "opts": ["A D-test for inducible clindamycin (MLS_B) resistance", "A Gram stain confirming gram-positive cocci in clusters", "A coagulase test to speciate the staphylococcus", "A minimum inhibitory concentration determination alone"], "ans": 0, "exp": "A **positive D-test → inducible clindamycin resistance** → avoid clindamycin (risk of treatment failure). *NABP: 3.C.2 / 1.A.2.*"}, {"id": 30, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2 / 2.A.1", "stem": "Which **long-acting lipoglycopeptides** allow single-dose treatment of ABSSSI?", "opts": ["Telavancin and tedizolid", "Dalbavancin and oritavancin", "Vancomycin (Vancocin) and linezolid (Zyvox)", "Daptomycin (Cubicin) and ceftaroline"], "ans": 1, "exp": "**Dalbavancin & oritavancin** have ultra-long half-lives → **single-dose** ABSSSI therapy (gram-positive incl. MRSA). *NABP: 3.C.2 / 2.A.1.*"}, {"id": 33, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "**Macrolides** (azithromycin/clarithromycin) — MOA & key spectrum?", "opts": ["Inhibit the 50S subunit; cover atypicals (Mycoplasma/Legionella)", "Inhibit DNA gyrase; cover gram-negatives and Pseudomonas", "Bind penicillin-binding proteins to disrupt the cell wall", "Inhibit dihydropteroate synthase in the folate pathway"], "ans": 0, "exp": "**50S** (bacteriostatic) → **atypical** coverage for CAP; also H. pylori, pertussis. *NABP: 1.A.1.*"}, {"id": 34, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on simvastatin (Zocor) develops myopathy after starting an antibiotic. Most likely culprit?", "opts": ["Azithromycin (Zithromax), which minimally inhibits CYP3A4", "Clarithromycin, a strong CYP3A4 inhibitor", "Doxycycline (Vibramycin), which chelates polyvalent cations", "Nitrofurantoin (Macrobid), concentrated in the urine"], "ans": 1, "exp": "**Clarithromycin/erythromycin = strong CYP3A4 inhibitors** → ↑ simvastatin (Zocor) → rhabdomyolysis. ✓ **Azithromycin (Zithromax)** has minimal CYP interaction (preferred with statins). *NABP: 3.C.3.*"}, {"id": 35, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which adverse effect do macrolides and fluoroquinolones share?", "opts": ["Photosensitivity rash with sun exposure", "Nephrotoxicity from tubular injury", "QT prolongation with torsades risk", "Tendinopathy and tendon rupture"], "ans": 2, "exp": "Both **prolong QT** → caution with other QT drugs/electrolyte abnormalities. *NABP: 3.C.5.*"}, {"id": 36, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Counseling for oral **doxycycline (Vibramycin)/tetracycline**?", "opts": ["Crush and take at bedtime while lying down", "Always take with an aluminum-magnesium antacid", "Take with milk to improve gastric tolerability", "Separate from dairy/antacids/iron, sit upright, avoid sun"], "ans": 3, "exp": "**Polyvalent cations chelate** tetracyclines (↓ absorption) → separate ~2 h; sit upright with water (esophageal ulcer); **photosensitivity.** *NABP: 3.E.2 / 3.C.3.*"}, {"id": 37, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Tetracyclines are contraindicated in:", "opts": ["Pregnancy and children <8 years (tooth/bone effects)", "Community-acquired MRSA skin and soft-tissue infection", "Mild to moderate inflammatory acne vulgaris", "Adult community-acquired atypical pneumonia"], "ans": 0, "exp": "⚠ Avoid in **pregnancy and <8 yo** (permanent **tooth staining**, ↓ bone growth). *NABP: 2.A.4 / 3.C.2.*"}, {"id": 38, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Appropriate uses of **doxycycline (Vibramycin)** include all EXCEPT:", "opts": ["Rickettsial disease / Lyme", "Pseudomonas bacteremia", "Atypical CAP", "CA-MRSA skin infection"], "ans": 1, "exp": "Doxycycline (Vibramycin) covers atypicals, **CA-MRSA**, rickettsia/Lyme — but **not Pseudomonas.** ✓ Safe in renal impairment (no adjustment). *NABP: 3.C.2.*"}, {"id": 39, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which is a boxed-warning/class risk of **fluoroquinolones**?", "opts": ["Reversible agranulocytosis with neutropenic fever", "Progressive interstitial pulmonary fibrosis", "Tendinopathy, neuropathy, aortic dissection, dysglycemia", "Dialysis-requiring acute tubular nephrotoxicity"], "ans": 2, "exp": "⚠ FQ BBWs: **tendon rupture, peripheral neuropathy, CNS/psych, QT, aortic dissection, hypo/hyperglycemia; worsen myasthenia gravis** → reserve for no-alternative cases. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 40, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which fluoroquinolone should NOT be used for a **UTI**?", "opts": ["Ofloxacin", "Ciprofloxacin (Cipro)", "Levofloxacin (Levaquin)", "Moxifloxacin"], "ans": 3, "exp": "**Moxifloxacin** has **negligible urinary excretion** → not for UTI (but it covers anaerobes; good for CAP/intra-abdominal). *NABP: 3.C.2.*"}, {"id": 41, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Fluoroquinolone MOA / spectrum highlight?", "opts": ["Inhibit gyrase/topo IV; cipro for Pseudomonas, levo/moxi respiratory", "Inhibit the 30S ribosomal subunit; gram-positive coverage only", "Bind penicillin-binding proteins to disrupt the cell wall", "Inhibit the folate synthesis enzymes sequentially"], "ans": 0, "exp": "**DNA gyrase/topo IV** (bactericidal); **cipro** = best gram-neg/Pseudomonas; **levo/moxi** = respiratory FQs. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 42, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 1.A.2", "stem": "Aminoglycosides (gentamicin/tobramycin) — MOA/PK?", "opts": ["Folate-pathway inhibitor; bacteriostatic gram-negative coverage", "30S inhibitor; concentration-dependent killing with post-antibiotic effect", "50S inhibitor; bacteriostatic against staphylococci", "Time-dependent agent with no post-antibiotic effect"], "ans": 1, "exp": "**30S, bactericidal, concentration-dependent** (extended-interval dosing); **synergy** with β-lactams/vancomycin (Vancocin) for enterococci/staph. *NABP: 1.A.1 / 1.A.2.*"}, {"id": 43, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Hallmark toxicities of aminoglycosides?", "opts": ["QT prolongation with torsades and arrhythmia risk", "Disulfiram-like reaction when alcohol is consumed", "Reversible nephrotoxicity plus often-permanent ototoxicity", "Tendon rupture and aortic aneurysm/dissection"], "ans": 2, "exp": "⚠ **Nephrotoxicity (usually reversible)** + **ototoxicity (often permanent)**; can potentiate **neuromuscular blockade** → monitor levels/renal. *NABP: 3.C.5.*"}, {"id": 44, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "TMP-SMX MOA?", "opts": ["50S ribosomal subunit inhibition", "DNA gyrase and topoisomerase IV inhibition", "Penicillin-binding protein (cell-wall) inhibition", "Sequential folate-pathway blockade (DHPS plus DHFR)"], "ans": 3, "exp": "**Sequential folate inhibition** → synergistic, bactericidal. *NABP: 1.A.1.*"}, {"id": 45, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which set are recognized TMP-SMX effects/interactions?", "opts": ["Hyperkalemia, pseudo-↑ SCr, SJS/TEN, and ↑ warfarin (Coumadin) effect", "Tendon rupture, aortic dissection, and dysglycemia", "Progressive interstitial pulmonary fibrosis with chronic use", "Rate-related red-man flushing histamine reaction"], "ans": 0, "exp": "TMP-SMX → **hyperkalemia**, **pseudo-↑ SCr** (inhibits Cr secretion; GFR unchanged), **SJS/TEN**, ↑INR with warfarin (Coumadin); also **G6PD hemolysis** and kernicterus (avoid late pregnancy/neonates). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 46, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **Pneumocystis jirovecii pneumonia (PCP)**?", "opts": ["Azithromycin (Zithromax)", "TMP-SMX", "Doxycycline (Vibramycin)", "Metronidazole (Flagyl)"], "ans": 1, "exp": "**TMP-SMX** is first-line for **PCP** (treatment & prophylaxis); also covers **Stenotrophomonas, Nocardia, CA-MRSA.** *NABP: 3.C.2.*"}, {"id": 47, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **metronidazole (Flagyl)** for a *B. fragilis* intra-abdominal infection should be counseled to:", "opts": ["Avoid direct sunlight to prevent photosensitivity", "Take each dose with a glass of milk", "Avoid alcohol (disulfiram reaction); expect a metallic taste", "Take an aluminum-magnesium antacid with each dose"], "ans": 2, "exp": "⚠ **Metronidazole (Flagyl) + alcohol → disulfiram reaction** (flushing, vomiting) — avoid alcohol during and ~3 days after; covers **anaerobes & protozoa** (C. diff, BV, trichomonas, Giardia, amebiasis); ↑INR with warfarin (Coumadin). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 48, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which is true of **nitrofurantoin (Macrobid)**?", "opts": ["Reliably covers Pseudomonas aeruginosa", "Achieves high serum levels for bacteremia", "Serves as first-line therapy for pyelonephritis", "For cystitis only; avoid if CrCl <30 or at term"], "ans": 3, "exp": "**Nitrofurantoin (Macrobid) = lower UTI (cystitis) only** (no tissue/serum levels) → **not for pyelonephritis**; ⚠ avoid at low CrCl (**label <60; Beers/practice ~<30**), term pregnancy (38–42 wk)/neonates (hemolysis), G6PD; **pulmonary fibrosis** with chronic use. ✓ **Fosfomycin** = single-dose alternative for uncomplicated cystitis. *NABP: 3.C.2 / 3.C.5.*"}, {"id": 51, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Which class shows **concentration-dependent** killing (maximize Cmax/MIC)?", "opts": ["Aminoglycosides and fluoroquinolones (maximize the Cmax/MIC)", "Vancomycin (Vancocin), driven by total 24-hour AUC exposure to drug", "Clindamycin, driven by the time the level exceeds the MIC", "β-lactams, driven by the time the level exceeds the MIC"], "ans": 0, "exp": "**Aminoglycosides, FQs, daptomycin (Cubicin)** = concentration-dependent (+ post-antibiotic effect) → maximize **Cmax/MIC or AUC/MIC.** β-lactams/vancomycin (Vancocin) are time/AUC-dependent. *NABP: 1.A.2.*"}, {"id": 52, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "The PK/PD index best predicting **β-lactam** efficacy is:", "opts": ["The peak-to-MIC (Cmax/MIC) ratio", "Percent time the free drug is above the MIC", "A prolonged post-antibiotic effect", "A single high peak serum level"], "ans": 1, "exp": "β-lactams are **time-dependent** → **%fT>MIC** → use **extended/continuous infusions** (pip-tazo, cefepime) for serious gram-negatives. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 53, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": true, "nabp": "1.A.2", "stem": "Target for vancomycin (Vancocin) in serious MRSA infection (2020 guideline)?", "opts": ["100% of the dosing interval above MIC", "A pre-dose trough of 5–10 mg/L", "AUC₂₄/MIC of 400–600", "A peak-to-MIC (Cmax/MIC) of ≥10"], "ans": 2, "exp": "Vancomycin (Vancocin) is **AUC-dependent** → **AUC₂₄/MIC 400–600.** *NABP: 1.A.2.*"}, {"id": 54, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "A 100-kg patient with MRSA bacteremia. Vancomycin (Vancocin) **loading dose** at 25 mg/kg?", "opts": ["4000 mg", "1000 mg", "1500 mg", "2500 mg"], "ans": 3, "exp": "25 × 100 = **2500 mg** load (20–35 mg/kg for serious infection; cap ~3 g). *NABP: 1.C.4 / 3.D.2.*"}, {"id": 55, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4", "stem": "An 80-kg patient: vancomycin (Vancocin) **maintenance** at 15 mg/kg q12h?", "opts": ["1200 mg q12h", "2000 mg q12h", "400 mg q12h", "600 mg q12h"], "ans": 0, "exp": "15 × 80 = **1200 mg q12h** (then titrate by AUC/levels and renal function). *NABP: 1.C.4.*"}, {"id": 56, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "When is a vancomycin (Vancocin) **trough** drawn (trough-based monitoring)?", "opts": ["One hour after the first infusion finishes", "At steady state (~before the 4th dose), just pre-dose", "At any random time during the interval", "Only at the post-infusion peak concentration"], "ans": 1, "exp": "Draw the trough **at steady state (~before the 4th dose)**, right before the next dose. (AUC-Bayesian uses 1–2 earlier levels.) *NABP: 1.A.2 / 3.D.2.*"}, {"id": 57, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Target **Cmax/MIC** for extended-interval aminoglycoside efficacy?", "opts": ["0.5", "400–600", "≥8–10", "1–2"], "ans": 2, "exp": "Concentration-dependent → **peak/MIC ≥8–10.** *NABP: 1.A.2.*"}, {"id": 58, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4", "stem": "Extended-interval **gentamicin** at 7 mg/kg for a 70-kg patient (normal renal function)?", "opts": ["700 mg", "140 mg", "350 mg", "490 mg"], "ans": 3, "exp": "7 × 70 = **490 mg** once-daily (then use a nomogram/levels). *NABP: 1.C.4.*"}, {"id": 59, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.5", "stem": "Rationale and trough goal for **extended-interval (once-daily)** aminoglycoside dosing?", "opts": ["Concentration-dependent killing plus PAE; aim for an undetectable trough", "Time-dependent killing; keep the pre-dose trough elevated", "It abolishes aminoglycoside-related ototoxicity entirely", "It removes the need for any serum-level monitoring"], "ans": 0, "exp": "High peak + **PAE** allows a drug-free interval → **undetectable trough** lowers nephrotoxicity. ⚠ Avoid extended-interval in pregnancy, enterococcal-synergy endocarditis, severe/unstable renal function, burns, ascites. *NABP: 1.A.2 / 3.C.5.*"}, {"id": 60, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Traditional (multiple-daily) aminoglycoside dosing with **peak/trough** monitoring is preferred in:", "opts": ["Routine outpatient uncomplicated cystitis treatment", "Enterococcal endocarditis, pregnancy, or unstable renal function", "Every patient who is receiving an aminoglycoside", "No clinical situation now warrants this approach"], "ans": 1, "exp": "Use **traditional dosing** for **synergy (enterococcal endocarditis), pregnancy, significant/unstable renal impairment**; gentamicin synergy peak ~3–5, trough <1. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 61, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "The **post-antibiotic effect (PAE)** refers to:", "opts": ["The disulfiram-like reaction occurring with alcohol", "Resistance that emerges late during therapy", "Continued growth suppression after levels fall below MIC", "An IgE-mediated immediate allergic reaction"], "ans": 2, "exp": "**PAE** = persistent growth suppression after levels drop below MIC (prominent with aminoglycosides/FQs) → supports extended-interval dosing. *NABP: 1.A.2.*"}, {"id": 62, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "For **fluoroquinolones and daptomycin (Cubicin)**, efficacy correlates best with:", "opts": ["The pre-dose trough concentration alone", "The total cumulative number of doses given", "The percent time the drug is above MIC", "AUC/MIC and Cmax/MIC (concentration-dependent)"], "ans": 3, "exp": "FQs/daptomycin (Cubicin) are **concentration-dependent** → **AUC/MIC** (≈ ≥125 for gram-negative FQ) and peak. *NABP: 1.A.2.*"}, {"id": 63, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Why give **piperacillin-tazobactam or cefepime** as an extended (3–4 h) infusion for serious Pseudomonas infection?", "opts": ["To maximize percent time above the MIC (time-dependent)", "To raise the peak serum concentration achieved", "To eliminate the need for therapeutic monitoring", "To reduce the overall cost of therapy"], "ans": 0, "exp": "Prolonging the infusion **increases time above MIC** → better outcomes against high-MIC gram-negatives. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 64, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "An aminoglycoside peak is 10 mg/L against an organism with MIC 1 mg/L. The Cmax/MIC ratio is:", "opts": ["5", "10", "0.1", "1"], "ans": 1, "exp": "10 ÷ 1 = **10** (meets the ≥8–10 target). *NABP: 1.C.4 / 1.A.2.*"}, {"id": 67, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Healthy outpatient, no comorbidities, **community-acquired pneumonia.** First-line (IDSA/ATS 2019)?", "opts": ["Amoxicillin, doxycycline (Vibramycin), or a macrolide (low resistance)", "Vancomycin (Vancocin) to empirically cover MRSA pneumonia", "IV ceftriaxone combined with azithromycin (Zithromax)", "Meropenem for broad gram-negative coverage"], "ans": 0, "exp": "Healthy outpatient CAP: **amoxicillin, doxycycline (Vibramycin), or a macrolide.** *NABP: 3.C.2.*"}, {"id": 68, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Outpatient CAP **with comorbidities** (COPD, diabetes, etc.). Preferred regimen?", "opts": ["High-dose amoxicillin given as monotherapy", "A respiratory FQ, or β-lactam + macrolide/doxycycline (Vibramycin)", "Doxycycline (Vibramycin) given as oral monotherapy", "Nitrofurantoin (Macrobid) for any concurrent bacteriuria"], "ans": 1, "exp": "Comorbid outpatient CAP: **respiratory FQ**, or a **β-lactam (amox-clav/cefuroxime) + macrolide/doxycycline (Vibramycin).** *NABP: 3.C.2.*"}, {"id": 69, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Inpatient (non-ICU) **CAP** empiric therapy?", "opts": ["Vancomycin (Vancocin) monotherapy for MRSA", "Metronidazole (Flagyl) for anaerobic coverage", "A β-lactam plus macrolide, or a respiratory FQ", "Oral amoxicillin step-down therapy"], "ans": 2, "exp": "Inpatient CAP: **β-lactam + macrolide** or **respiratory FQ** (covers atypicals). Add MRSA/Pseudomonas coverage only with risk factors. *NABP: 3.C.2.*"}, {"id": 70, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Empiric **HAP/VAP** must reliably cover:", "opts": ["Anaerobes including Bacteroides fragilis only", "Streptococcus pneumoniae and typical pathogens only", "Atypicals (Mycoplasma/Legionella) exclusively", "Pseudomonas and gram-negatives, plus MRSA if at risk"], "ans": 3, "exp": "HAP/VAP: **antipseudomonal β-lactam** (pip-tazo/cefepime/meropenem) **± MRSA coverage** per risk; double gram-negative coverage if MDR risk. ℹ \"HCAP\" category retired. *NABP: 3.C.2.*"}, {"id": 71, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2", "stem": "First-line oral options for **uncomplicated cystitis** in women include all EXCEPT:", "opts": ["Moxifloxacin", "Nitrofurantoin (Macrobid)", "TMP-SMX (if local resistance <20%)", "Fosfomycin or pivmecillinam"], "ans": 0, "exp": "First-line uUTI: **nitrofurantoin (Macrobid), TMP-SMX, fosfomycin, pivmecillinam (Pivya, FDA 2024).** Fluoroquinolones are reserved, and **moxifloxacin isn't even renally excreted.** *NABP: 3.C.2.*"}, {"id": 72, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Outpatient **acute pyelonephritis** — appropriate empiric agent?", "opts": ["Nitrofurantoin (Macrobid), concentrated in the bladder", "A fluoroquinolone (cipro/levo) or ceftriaxone", "Fosfomycin as a single 3 g dose", "Moxifloxacin for its broad spectrum"], "ans": 1, "exp": "Pyelonephritis needs **renal/tissue levels** → **FQ or ceftriaxone**; ⚠ **nitrofurantoin (Macrobid)/fosfomycin fail** (no tissue levels). *NABP: 3.C.2.*"}, {"id": 73, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Nonpurulent **cellulitis** (no abscess), usually streptococcal. Preferred therapy?", "opts": ["Metronidazole (Flagyl) for anaerobic coverage", "Vancomycin (Vancocin) for empiric MRSA in all", "Cephalexin or dicloxacillin (strep/MSSA)", "TMP-SMX given as oral monotherapy"], "ans": 2, "exp": "Nonpurulent cellulitis → **β-lactam (cephalexin/dicloxacillin)**; routine MRSA coverage not needed unless systemic illness/risk. *NABP: 3.C.2.*"}, {"id": 74, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient has a purulent skin **abscess.** Best management?", "opts": ["Cephalexin monotherapy without any drainage", "Topical mupirocin ointment therapy alone", "Oral antibiotics alone, deferring drainage", "Incision and drainage; add MRSA-active oral if indicated"], "ans": 3, "exp": "**Purulent SSTI → I&D** (primary); add **MRSA-active oral** (TMP-SMX/doxy) for moderate/severe disease or systemic signs. *NABP: 3.C.2.*"}, {"id": 75, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for community **intra-abdominal infection** must cover:", "opts": ["Gram-negatives plus anaerobes (pip-tazo or ceftriaxone+metronidazole (Flagyl))", "MRSA plus the respiratory atypicals (Mycoplasma/Legionella)", "Pseudomonas aeruginosa as the sole empiric target", "Anaerobes (Bacteroides fragilis) as the only target"], "ans": 0, "exp": "Cover **enteric gram-negatives + anaerobes**: **pip-tazo**, **ceftriaxone + metronidazole (Flagyl)**, or a **carbapenem.** *NABP: 3.C.2.*"}, {"id": 76, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for adult **bacterial meningitis** (age <50, immunocompetent)?", "opts": ["Meropenem combined with doxycycline (Vibramycin)", "Vancomycin (Vancocin) plus ceftriaxone (± dexamethasone)", "Ceftriaxone given as monotherapy", "Ampicillin given as monotherapy"], "ans": 1, "exp": "**Vancomycin (Vancocin) + ceftriaxone** (resistant pneumococcus); **add ampicillin if >50/immunocompromised** (Listeria); **dexamethasone** with/just before the first dose for S. pneumoniae. *NABP: 3.C.2.*"}, {"id": 77, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per 2021 IDSA/SHEA, preferred therapy for an **initial C. difficile** episode?", "opts": ["Oral vancomycin (Vancocin) administered by the IV route", "Oral metronidazole (Flagyl) as first-line therapy", "Fidaxomicin (preferred) or oral vancomycin (Vancocin)", "IV vancomycin (Vancocin) for colonic delivery"], "ans": 2, "exp": "ℹ 2021 update: **fidaxomicin preferred** (lower recurrence) or **oral vancomycin (Vancocin)**; **metronidazole (Flagyl)** reserved for when others are unavailable. ⚠ **IV vancomycin does not treat C. diff.** *NABP: 3.C.2.*"}, {"id": 78, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Fulminant C. difficile** (hypotension, ileus, megacolon) — treatment?", "opts": ["Fidaxomicin given as oral monotherapy", "Supportive observation without any antibiotics", "Oral metronidazole (Flagyl) given as monotherapy", "High-dose oral (± rectal) vancomycin (Vancocin) + IV metronidazole (Flagyl)"], "ans": 3, "exp": "Fulminant: **high-dose oral vancomycin (± rectal if ileus) + IV metronidazole (Flagyl)**; surgical consult. *NABP: 3.C.2.*"}, {"id": 79, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "For **recurrent C. difficile**, appropriate options include:", "opts": ["Fidaxomicin or vancomycin (Vancocin) taper/pulse; ± bezlotoxumab or FMT", "IV vancomycin (Vancocin) given to achieve adequate colonic delivery", "No further antibiotic treatment beyond the index course", "A repeat course of the same dose of metronidazole (Flagyl)"], "ans": 0, "exp": "Recurrence: **fidaxomicin** or **vancomycin (Vancocin) taper-pulse**; **bezlotoxumab** (anti-toxin-B mAb) adjunct; **fecal microbiota transplant** for multiple recurrences. *NABP: 3.C.2.*"}, {"id": 80, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "In suspected **sepsis**, the key early antimicrobial principle is:", "opts": ["Await final culture and susceptibility results before any therapy", "Culture, then promptly start broad empiric antibiotics + source control", "Start a narrow-spectrum oral agent empirically at once", "Give antibiotics only after diagnostic imaging is complete"], "ans": 1, "exp": "**Cultures → prompt broad empiric antibiotics (~1 h)** + fluids + **source control**; de-escalate once cultures return. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 81, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **group A streptococcal pharyngitis**?", "opts": ["Ciprofloxacin (Cipro), a respiratory-active fluoroquinolone", "Metronidazole (Flagyl) for anaerobic coverage", "Penicillin or amoxicillin (macrolide if allergic)", "Vancomycin (Vancocin) for resistant gram-positives"], "ans": 2, "exp": "Strep throat: **penicillin/amoxicillin** (no documented GAS penicillin resistance); macrolide/clindamycin if PCN-allergic. *NABP: 3.C.2.*"}, {"id": 82, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per CDC 2021, treatment for **uncomplicated gonorrhea**?", "opts": ["Ciprofloxacin (Cipro) 500 mg PO as a single oral dose", "Cefixime 800 mg PO plus a 1 g azithromycin (Zithromax) dose", "Azithromycin (Zithromax) 1 g PO given as a single oral dose", "Ceftriaxone 500 mg IM once (add doxy if chlamydia possible)"], "ans": 3, "exp": "ℹ **Ceftriaxone 500 mg IM ×1** (1 g if ≥150 kg); **+ doxycycline (Vibramycin) 100 mg BID ×7 d** if chlamydia not excluded. Routine azithromycin (Zithromax) co-treatment was dropped. *NABP: 3.C.2.*"}, {"id": 85, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "The mechanism of **MRSA** resistance to β-lactams is:", "opts": ["mecA gene encoding altered PBP2a with low affinity", "An efflux pump actively expelling the β-lactam", "Outer-membrane porin-channel loss limiting entry", "A plasmid β-lactamase that hydrolyzes the ring"], "ans": 0, "exp": "**mecA → PBP2a** → β-lactams can't bind → only ceftaroline (anti-PBP2a) and non-β-lactams (vanc/dapto/linezolid (Zyvox)) work. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 86, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**VRE** resistance to vancomycin (Vancocin) arises from:", "opts": ["A β-lactamase that hydrolyzes vancomycin (Vancocin)", "vanA/vanB → D-Ala-D-Lactate terminus (altered target)", "An efflux pump expelling the glycopeptide", "PBP2a with reduced binding affinity"], "ans": 1, "exp": "**D-Ala-D-Ala → D-Ala-D-Lac** → vancomycin (Vancocin) can't bind → use **linezolid (Zyvox) or daptomycin (Cubicin).** *NABP: 1.A.1 / 3.C.2.*"}, {"id": 87, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An **ESBL**-producing E. coli is isolated. Best definitive therapy?", "opts": ["Aztreonam, a monobactam", "Ceftriaxone, a third-generation cephalosporin", "A carbapenem (meropenem or ertapenem)", "Ceftazidime, an antipseudomonal cephalosporin"], "ans": 2, "exp": "**ESBLs hydrolyze penicillins, cephalosporins, and aztreonam** → **carbapenem is preferred** for serious infection. ⚠ Pip-tazo is inferior for serious ESBL bacteremia (MERINO). *NABP: 3.C.2.*"}, {"id": 88, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.A.2", "stem": "An **Enterobacter cloacae** (inducible **AmpC** β-lactamase) bloodstream infection. Which empiric β-lactam risks emergent resistance and should be avoided?", "opts": ["Imipenem-cilastatin, a stable carbapenem", "Cefepime, a fourth-generation cephalosporin", "Meropenem, a CNS-penetrant carbapenem", "A third-generation cephalosporin (e.g., ceftriaxone)"], "ans": 3, "exp": "**AmpC organisms (Enterobacter, Citrobacter, Serratia)** can be **de-repressed** on 3rd-gen cephalosporins → treatment failure → prefer **cefepime or a carbapenem.** *NABP: 3.C.2 / 1.A.2.*"}, {"id": 89, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A **carbapenem-resistant Enterobacterales (CRE, KPC-type)** infection. Appropriate agent?", "opts": ["Ceftazidime-avibactam or meropenem-vaborbactam", "Ceftriaxone, a third-generation cephalosporin", "Ampicillin-sulbactam, a BLBLI combination", "Meropenem alone without an inhibitor"], "ans": 0, "exp": "**CRE-KPC** → **ceftazidime-avibactam, meropenem-vaborbactam, or imipenem-relebactam** (the inhibitors restore activity vs KPC serine carbapenemases). *NABP: 3.C.2.*"}, {"id": 90, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "What do β-lactamase inhibitors (avibactam, vaborbactam, relebactam) contribute?", "opts": ["They are independently bactericidal antibacterial agents", "They inactivate β-lactamases (incl. KPC) to restore the partner", "They bind the bacterial ribosome to block synthesis", "They block efflux pumps to retain the partner"], "ans": 1, "exp": "Inhibitors **protect the partner β-lactam** by inactivating β-lactamases — avibactam/vaborbactam/relebactam cover **KPC** (serine carbapenemases). *NABP: 1.A.1.*"}, {"id": 91, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Ceftolozane-tazobactam** is most valued for:", "opts": ["Anaerobes including Bacteroides fragilis", "Methicillin-resistant Staphylococcus aureus", "Multidrug-resistant Pseudomonas aeruginosa", "Vancomycin (Vancocin)-resistant enterococci"], "ans": 2, "exp": "Ceftolozane-tazobactam is a leading agent for **MDR Pseudomonas** (also ESBL gram-negatives). *NABP: 3.C.2.*"}, {"id": 92, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 1.A.1", "stem": "**Cefiderocol** is best described as:", "opts": ["An oxazolidinone that binds the bacterial 23S rRNA", "A polymyxin that disrupts the outer cell membrane", "A macrolide that binds the 50S ribosomal subunit", "A siderophore cephalosporin active vs CRE incl. NDM/MBL"], "ans": 3, "exp": "**Cefiderocol** uses iron transport to enter gram-negatives → covers **difficult CRE (incl. MBL/NDM), Acinetobacter, Stenotrophomonas, Pseudomonas.** *NABP: 3.C.2 / 1.A.1.*"}, {"id": 93, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A CRE isolate produces a **metallo-β-lactamase (NDM)**. Which will likely FAIL?", "opts": ["Ceftazidime-avibactam (avibactam misses MBLs)", "Colistin, a polymyxin", "Historically, aztreonam-based combinations", "Cefiderocol, a siderophore cephalosporin"], "ans": 0, "exp": "**Avibactam/vaborbactam/relebactam do NOT inhibit MBLs (NDM/VIM/IMP)** → ceftazidime-avibactam fails alone; use **cefiderocol** (MBL-stable). *NABP: 3.C.2.*"}, {"id": 94, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "A core **antimicrobial stewardship** action after culture/susceptibility results return is:", "opts": ["Continue the broadest empiric regimen for the full course", "De-escalate to the narrowest effective culture-directed agent", "Always add a second synergistic agent", "Discontinue all therapeutic monitoring"], "ans": 1, "exp": "**De-escalation / culture-directed therapy** narrows the regimen → less resistance, AEs, C. diff, cost. *NABP: 3.D.2 / 5.C.*"}, {"id": 95, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Criteria supporting an **IV-to-PO antibiotic switch** include:", "opts": ["Patient preference alone regardless of clinical status", "Persistent hypotension with NPO status", "Stable, improving, tolerating PO, with a bioavailable agent", "Persistently positive blood cultures alone"], "ans": 2, "exp": "Switch when **stable + improving + tolerating PO**, using high-bioavailability orals (FQs, linezolid (Zyvox), metronidazole (Flagyl), TMP-SMX, fluconazole (Diflucan)). *NABP: 3.D.2.*"}, {"id": 96, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Empiric antibiotic selection should be guided primarily by:", "opts": ["The single broadest available agent for every patient", "Whatever empiric regimen happened to be used last time", "The most expensive broad-spectrum agent that is available", "The local antibiogram, likely pathogens, and patient factors"], "ans": 3, "exp": "Use the **local antibiogram + likely pathogens + site/patient factors**; then de-escalate by culture. *NABP: 3.D.2 / 5.C.*"}, {"id": 97, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Regarding **duration of therapy**, current stewardship favors:", "opts": ["The shortest effective evidence-based course (often 5–7 days)", "A fixed 14-day course applied to all infections", "Therapy continued until every symptom fully resolves", "The longest course the patient can tolerate"], "ans": 0, "exp": "Evidence supports **shorter courses** for many infections (CAP ~5 d, uncomplicated cystitis 3–5 d) → less resistance/AEs. *NABP: 3.D.2.*"}, {"id": 98, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which combination of **organism → preferred drug** is correct?", "opts": ["MRSA treated with ceftriaxone monotherapy", "CRE (KPC) treated with ceftazidime-avibactam", "VRE treated with intravenous vancomycin (Vancocin)", "ESBL treated with ceftazidime monotherapy"], "ans": 1, "exp": "**CRE-KPC → ceftazidime-avibactam.** (MRSA→vanc/dapto/linezolid (Zyvox)/ceftaroline; VRE→linezolid/dapto; ESBL→carbapenem.) *NABP: 3.C.2.*"}, {"id": 101, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Zosyn** is the brand name for:", "opts": ["piperacillin-tazobactam", "amoxicillin-clavulanate", "ceftolozane-tazobactam", "ampicillin-sulbactam"], "ans": 0, "exp": "Zosyn = **piperacillin-tazobactam** (antipseudomonal + anaerobic). *NABP: 2.A.1.*"}, {"id": 102, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Augmentin** and **Unasyn** are, respectively:", "opts": ["amoxicillin-clavulanate and piperacillin-tazobactam", "amoxicillin-clavulanate (PO) and ampicillin-sulbactam (IV)", "ampicillin-sulbactam and amoxicillin-clavulanate", "piperacillin-tazobactam and amoxicillin-clavulanate"], "ans": 1, "exp": "**Augmentin = amoxicillin-clavulanate**; **Unasyn = ampicillin-sulbactam.** *NABP: 2.A.1.*"}, {"id": 103, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Cephalosporin brands **Ancef, Keflex, Rocephin, Maxipime** are:", "opts": ["ceftriaxone, cefepime, cefazolin, cephalexin", "cefepime, ceftriaxone, cephalexin, cefazolin", "cefazolin, cephalexin, ceftriaxone, cefepime", "cephalexin, cefazolin, cefepime, ceftriaxone"], "ans": 2, "exp": "Ancef=**cefazolin** (1st, IV), Keflex=**cephalexin** (1st, PO), Rocephin=**ceftriaxone** (3rd), Maxipime=**cefepime** (4th). *NABP: 2.A.1.*"}, {"id": 104, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Bactrim/Septra** and **Macrobid** are:", "opts": ["nitrofurantoin and TMP-SMX", "TMP-SMX and fosfomycin", "metronidazole and nitrofurantoin", "TMP-SMX and nitrofurantoin"], "ans": 3, "exp": "Bactrim/Septra = **TMP-SMX**; Macrobid = **nitrofurantoin (Macrobid).** *NABP: 2.A.1.*"}, {"id": 105, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Anti-MRSA brands **Vancocin, Zyvox, Cubicin, Teflaro** are:", "opts": ["vancomycin, linezolid, daptomycin, ceftaroline", "linezolid, vancomycin, ceftaroline, daptomycin", "daptomycin, ceftaroline, vancomycin, linezolid", "vancomycin, daptomycin, linezolid, ceftaroline"], "ans": 0, "exp": "Vancocin=**vancomycin (Vancocin)**, Zyvox=**linezolid (Zyvox)**, Cubicin=**daptomycin (Cubicin)**, Teflaro=**ceftaroline.** *NABP: 2.A.1.*"}, {"id": 106, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Cipro, Levaquin, Avelox, Zithromax, Biaxin** are:", "opts": ["ciprofloxacin, levofloxacin, moxifloxacin, clarithromycin, azithromycin", "ciprofloxacin, levofloxacin, moxifloxacin, azithromycin, clarithromycin", "levofloxacin, ciprofloxacin, azithromycin, moxifloxacin, clarithromycin", "ciprofloxacin, moxifloxacin, levofloxacin, clarithromycin, azithromycin"], "ans": 1, "exp": "Cipro=ciprofloxacin (Cipro), Levaquin=**levofloxacin (Levaquin)**, Avelox=**moxifloxacin**, Zithromax=**azithromycin (Zithromax)**, Biaxin=**clarithromycin.** *NABP: 2.A.1.*"}, {"id": 107, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "First-line dosing for **pediatric acute otitis media** (high-dose amoxicillin)?", "opts": ["20 mg/kg/day divided three times daily", "40 mg/kg/day given once daily", "80–90 mg/kg/day divided twice daily", "10 mg/kg/day given once daily"], "ans": 2, "exp": "**High-dose amoxicillin 80–90 mg/kg/day ÷ BID** (overcomes intermediate pneumococcal resistance); use amox-clav if recent antibiotics/failure. *NABP: 1.C.4 / 3.C.2.*"}, {"id": 108, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "The azithromycin (Zithromax) **\"Z-Pak\"** regimen is:", "opts": ["1 g PO given as a single dose", "500 mg PO twice daily for 7 days", "250 mg PO once daily for 3 days", "500 mg once, then 250 mg daily on days 2–5"], "ans": 3, "exp": "**500 mg day 1, then 250 mg daily days 2–5** (long tissue half-life extends the effective course). *NABP: 1.C.4.*"}, {"id": 109, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "Dosing distinction for **TMP-SMX** in *Pneumocystis* (PCP)?", "opts": ["Treatment 15–20 mg/kg/day ×21 d; prophylaxis 1 DS tab daily", "Treatment given as a single high oral dose", "Prophylaxis using a 15 mg/kg/day regimen", "Identical dosing for treatment and prophylaxis"], "ans": 0, "exp": "**PCP treatment** = high-dose **weight-based (TMP 15–20 mg/kg/day) ×21 d**; **prophylaxis** = **1 DS tab daily** (start at CD4 <200). *NABP: 1.C.4 / 3.C.2.*"}, {"id": 110, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Key monitoring for **vancomycin (Vancocin)**?", "opts": ["Liver function tests and serum lipase only", "AUC (or trough) plus SCr/renal function (± CBC)", "A coagulation panel including the INR", "Thyroid-stimulating hormone and free T4"], "ans": 1, "exp": "Follow **AUC/trough + SCr/renal function**; ⚠ nephrotoxicity (worse with pip-tazo/aminoglycosides), infusion-rate flushing. *NABP: 3.D.2 / 3.C.5.*"}, {"id": 111, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Monitoring for **aminoglycosides**?", "opts": ["Weekly creatine phosphokinase concentrations", "Complete blood count and platelet count only", "Serum peak/trough, SCr/BUN, and hearing/vestibular checks", "INR and prothrombin time at baseline"], "ans": 2, "exp": "**Levels + renal function + audiometry/vestibular** (nephro- and ototoxicity). *NABP: 3.D.2 / 3.C.5.*"}, {"id": 112, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "A patient on **linezolid (Zyvox)** for 3 weeks — which lab is monitored?", "opts": ["INR and prothrombin time weekly", "Serum lipase and amylase weekly", "Creatine phosphokinase weekly", "Weekly CBC/platelets (myelosuppression)"], "ans": 3, "exp": "**Weekly CBC** (thrombocytopenia/anemia with >2 wk); also serotonin syndrome and tyramine/BP cautions. *NABP: 3.C.5 / 3.C.3.*"}, {"id": 113, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A patient on **daptomycin (Cubicin)** — which lab to follow?", "opts": ["Weekly creatine phosphokinase (myopathy)", "Thyroid-stimulating hormone at baseline", "INR and prothrombin time weekly", "Serum amylase and lipase weekly"], "ans": 0, "exp": "**Weekly CPK**; hold statins; watch for eosinophilic pneumonia. *NABP: 3.C.5.*"}, {"id": 114, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Monitoring/labs for **TMP-SMX**?", "opts": ["Coagulation studies and INR only", "CBC, serum potassium, and SCr (with CrCl)", "Creatine phosphokinase weekly", "Thyroid-stimulating hormone levels"], "ans": 1, "exp": "**CBC** (cytopenias), **K** (hyperkalemia), **SCr** (pseudo-rise; dose by CrCl); watch rash/SJS and sun exposure. *NABP: 3.C.5 / 3.C.3.*"}, {"id": 115, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Which class set is generally **avoided in young children** for a class-specific toxicity?", "opts": ["Cephalosporins — all contraindicated in children", "Penicillins — risk of maculopapular rash", "Fluoroquinolones (cartilage) and tetracyclines (<8 yr)", "Macrolides — QT prolongation risk"], "ans": 2, "exp": "Peds cautions: **FQ (arthropathy), tetracyclines <8 yr (teeth), ceftriaxone neonates (kernicterus/Ca precipitation), sulfonamides in neonates/near term (kernicterus).** *NABP: 2.A.4 / 3.C.2.*"}, {"id": 116, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.C.3", "stem": "Counseling/typical dosing for **metronidazole (Flagyl)** for an anaerobic infection?", "opts": ["100 mg PO once weekly; alcohol is permitted", "1 g IV once; concurrent alcohol is acceptable", "250 mg PO once daily, taken with alcohol", "500 mg PO three times daily; avoid alcohol"], "ans": 3, "exp": "**Metronidazole (Flagyl) 500 mg PO TID** for anaerobic infections; **avoid alcohol**; metallic taste, peripheral neuropathy with prolonged use. ⚠ For **C. diff**, metronidazole (500 mg TID) is now **second-line** — first-line is **oral vancomycin (Vancocin) 125 mg QID** or **fidaxomicin.** *NABP: 1.C.4 / 3.C.3.*"}, {"id": 119, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which antibiotic class is generally considered **safe in pregnancy**?", "opts": ["Penicillins/cephalosporins (and azithromycin (Zithromax))", "Sulfonamides given near term", "Fluoroquinolones for gram-negatives", "Tetracyclines for atypical coverage"], "ans": 0, "exp": "**β-lactams and azithromycin (Zithromax)** are pregnancy-preferred; ⚠ avoid **FQ (cartilage), tetracyclines (teeth/bone), and sulfonamides/nitrofurantoin (Macrobid) near term.** *NABP: 3.C.2 / 2.A.4.*"}, {"id": 120, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A pregnant patient has **asymptomatic bacteriuria.** Best approach?", "opts": ["Do not treat unless cystitis symptoms develop", "Treat with a β-lactam, nitrofurantoin (Macrobid), or fosfomycin", "Treat empirically with ciprofloxacin (Cipro)", "Treat with a doxycycline (Vibramycin) course"], "ans": 1, "exp": "⚠ Unlike non-pregnant adults, **asymptomatic bacteriuria is treated in pregnancy**; use pregnancy-safe agents (avoid FQ/tetracyclines). *NABP: 3.C.2.*"}, {"id": 121, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Why avoid **sulfonamides and nitrofurantoin (Macrobid) near term** (38–42 weeks)?", "opts": ["Maternal nephrotoxicity and acute kidney injury", "Maternal hepatotoxicity with marked transaminitis", "Neonatal hemolysis and kernicterus (bilirubin displacement)", "Teratogenic limb-reduction birth defects"], "ans": 2, "exp": "Near term they risk **neonatal hemolysis (nitrofurantoin/G6PD) and kernicterus (sulfonamide bilirubin displacement).** (Sulfonamides also avoided 1st trimester — folate antagonism.) *NABP: 2.A.4 / 3.C.5.*"}, {"id": 122, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Intrapartum **Group B Streptococcus (GBS) prophylaxis** — first-line agent?", "opts": ["Vancomycin (Vancocin) given to all GBS-positive mothers", "Azithromycin (Zithromax), a macrolide", "Doxycycline (Vibramycin), a tetracycline", "Penicillin G (or ampicillin) IV"], "ans": 3, "exp": "**Penicillin G** (or ampicillin) intrapartum; **cefazolin** for low-risk PCN allergy; **clindamycin** only if isolate susceptible (high-risk allergy); **vancomycin (Vancocin)** if clindamycin-resistant. *NABP: 3.C.2.*"}, {"id": 123, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.5", "stem": "A **pregnant** patient with **syphilis** has a reported penicillin allergy. Correct management?", "opts": ["Penicillin desensitization, then treat with penicillin", "Defer all treatment until after the delivery", "Treat with a 14-day doxycycline (Vibramycin) course", "Treat with a single azithromycin (Zithromax) dose"], "ans": 0, "exp": "**Penicillin is the only therapy that reliably treats fetal syphilis** → **desensitize** if allergic. (Doxycycline is contraindicated in pregnancy.) *NABP: 3.C.2 / 2.A.5.*"}, {"id": 124, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which antibiotic does NOT require renal dose adjustment?", "opts": ["Gentamicin", "Ceftriaxone", "Levofloxacin (Levaquin)", "Vancomycin (Vancocin)"], "ans": 1, "exp": "**Ceftriaxone (biliary)** — no renal adjustment; also **nafcillin/oxacillin, azithromycin (Zithromax), doxycycline (Vibramycin), linezolid (Zyvox), metronidazole (Flagyl), clindamycin, moxifloxacin** are not renally adjusted. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 125, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which set generally **requires renal dose adjustment**?", "opts": ["Nafcillin, moxifloxacin, and doxycycline (no adjustment)", "Azithromycin (Zithromax), doxycycline (Vibramycin), and linezolid (no adjustment)", "Aminoglycosides, vancomycin (Vancocin), β-lactams, cipro/levo, TMP-SMX", "Metronidazole (Flagyl), clindamycin, and ceftriaxone (no adjustment)"], "ans": 2, "exp": "**Renally cleared** agents need adjustment: aminoglycosides, vancomycin (Vancocin), most β-lactams, cipro/levo, TMP-SMX, daptomycin (Cubicin). *NABP: 1.A.2 / 3.D.2.*"}, {"id": 126, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Standard **surgical antibiotic prophylaxis** (clean/clean-contaminated) and timing?", "opts": ["Ceftriaxone continued for 7 days postoperatively", "Vancomycin (Vancocin) given to all surgical patients", "Antibiotics started in the recovery room", "Cefazolin within 60 min of incision; stop within 24 h"], "ans": 3, "exp": "**Cefazolin within 60 min of incision** (vancomycin/FQ within **120 min**), **redose** for prolonged surgery/major blood loss, **discontinue ≤24 h.** *NABP: 3.D.2 / 5.C.*"}, {"id": 127, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Prophylaxis for **colorectal surgery** differs how?", "opts": ["Add anaerobic coverage (cefazolin + metronidazole (Flagyl) or cefoxitin)", "Use vancomycin (Vancocin) given as single-agent monotherapy", "Use a single dose of azithromycin (Zithromax) preoperatively", "No surgical prophylaxis is needed for these cases"], "ans": 0, "exp": "Colorectal cases need **anaerobic coverage** (Bacteroides) → cefazolin + metronidazole (Flagyl) or cefoxitin, often with **oral neomycin + metronidazole/erythromycin** bowel prep. *NABP: 3.D.2.*"}, {"id": 128, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 2.A.5", "stem": "Surgical prophylaxis for a patient with a **severe β-lactam allergy**?", "opts": ["Cefazolin, a first-generation cephalosporin", "Clindamycin or vancomycin (± an aminoglycoside)", "Penicillin G for gram-positive coverage", "No prophylaxis given preoperatively"], "ans": 1, "exp": "β-lactam-allergic → **clindamycin or vancomycin (Vancocin)** (± aminoglycoside/aztreonam for gram-negatives if needed). *NABP: 3.D.2 / 2.A.5.*"}, {"id": 129, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Who needs **infective endocarditis prophylaxis** before a dental procedure (AHA)?", "opts": ["All patients who are older than 65 years of age", "Everyone who has any audible cardiac murmur on exam", "Prosthetic valve, prior IE, certain CHD, or transplant valvulopathy", "Anyone carrying a diagnosis of chronic hypertension"], "ans": 2, "exp": "Only the **highest-risk cardiac conditions** (prosthetic valve, prior IE, specific CHD, transplant valvulopathy) for procedures **manipulating gingiva/periapical tissue or perforating oral mucosa.** *NABP: 3.D.2.*"}, {"id": 130, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.D.2", "stem": "Endocarditis prophylaxis regimen (AHA 2021)?", "opts": ["Vancomycin (Vancocin) 1 g IV given before the dental procedure", "Ciprofloxacin (Cipro) 500 mg PO given before the procedure", "Clindamycin 600 mg PO given before the procedure", "Amoxicillin 2 g PO 30–60 min before (cephalexin if allergic)"], "ans": 3, "exp": "**Amoxicillin 2 g** (peds 50 mg/kg) 30–60 min pre-procedure; PCN allergy → **cephalexin/azithromycin (Zithromax)/doxycycline (Vibramycin).** ℹ **Clindamycin was removed in 2021** (C. diff/reactions). *NABP: 3.D.2.*"}, {"id": 131, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.B", "stem": "A close contact of a patient with **meningococcal meningitis** needs chemoprophylaxis. Options?", "opts": ["Rifampin (Rifadin), ciprofloxacin (Cipro), or ceftriaxone", "Vancomycin (Vancocin) for gram-positive coverage", "Azithromycin (Zithromax) as a single dose", "Amoxicillin for 7 days"], "ans": 0, "exp": "**Rifampin (Rifadin), ciprofloxacin (Cipro), or ceftriaxone** for close contacts of *N. meningitidis.* *NABP: 3.C.2 / 5.B.*"}, {"id": 132, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "Correct dosing-weight choice for these agents?", "opts": ["Vancomycin (Vancocin) by ideal weight; aminoglycosides by total body weight", "Vancomycin (Vancocin) by actual weight; aminoglycosides by ideal (adjusted)", "Both agents are dosed using ideal body weight", "Both agents are dosed using actual body weight"], "ans": 1, "exp": "**Vancomycin (Vancocin) → actual body weight**; **aminoglycosides → ideal body weight** (use **adjusted body weight** if obese). *NABP: 1.C.4 / 3.D.2.*"}, {"id": 133, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 5.B", "stem": "Post-exposure prophylaxis for a close contact of **pertussis (whooping cough)**?", "opts": ["Vancomycin (Vancocin), a glycopeptide", "Penicillin, a natural penicillin", "A macrolide (azithromycin)", "Doxycycline (Vibramycin), a tetracycline"], "ans": 2, "exp": "**Azithromycin (Zithromax)** (macrolide) for pertussis post-exposure prophylaxis and treatment. *NABP: 3.C.2 / 5.B.*"}, {"id": 134, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "For recurrent **MRSA** skin infections, an adjunctive **decolonization** strategy is:", "opts": ["IV daptomycin (Cubicin) given for chronic suppressive therapy", "Long-term low-dose oral cephalexin prophylaxis", "Oral vancomycin (Vancocin) given for intestinal decolonization", "Intranasal mupirocin + chlorhexidine washes (± bleach baths)"], "ans": 3, "exp": "**Nasal mupirocin + chlorhexidine** (± dilute bleach baths) for decolonization in recurrent MRSA SSTI. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 137, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Standard initial regimen for **active drug-susceptible TB**?", "opts": ["RIPE ×2 months, then isoniazid (INH) + rifampin (Rifadin) ×4 months", "Isoniazid (INH) given as monotherapy for 9 months", "Azithromycin (Zithromax) plus ethambutol combination therapy", "Rifampin (Rifadin) given as monotherapy for 6 months"], "ans": 0, "exp": "**RIPE intensive phase ×2 mo → isoniazid (INH) + rifampin (Rifadin) continuation ×4 mo** (total **6 months**). *NABP: 3.C.2.*"}, {"id": 138, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A TB patient on **isoniazid (INH)** develops numbness/tingling of the feet. Cause and prevention?", "opts": ["Optic neuritis; substitute ethambutol", "Pyridoxine (B6) depletion; co-administer vitamin B6", "Early hepatotoxicity; discontinue isoniazid (INH)", "Hyperuricemia; start allopurinol (Zyloprim) therapy"], "ans": 1, "exp": "**Isoniazid (INH) depletes pyridoxine → peripheral neuropathy** → co-administer **B6** (esp. pregnancy, diabetes, alcoholism, HIV, malnutrition). *NABP: 3.C.5.*"}, {"id": 139, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Most important routine monitoring shared by **isoniazid (INH), rifampin (Rifadin), and pyrazinamide**?", "opts": ["Baseline and periodic visual acuity testing", "Serum uric acid concentrations only", "Liver function tests (hepatotoxicity)", "Creatine phosphokinase levels"], "ans": 2, "exp": "All three are **hepatotoxic** → baseline + periodic **LFTs**; counsel on hepatitis symptoms and avoiding alcohol. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 140, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for a patient starting **rifampin (Rifadin)**?", "opts": ["It causes a permanent blue-gray skin discoloration", "It must be taken together with grapefruit juice", "It is nephrotoxic and needs renal dosing", "It turns body fluids orange-red and stains contact lenses"], "ans": 3, "exp": "**Rifampin (Rifadin) → harmless orange-red body fluids** — warn about **soft contact lens staining.** *NABP: 3.E.2.*"}, {"id": 141, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "Why is **rifampin (Rifadin)** a major source of drug interactions?", "opts": ["Potent CYP3A4/P-gp inducer → ↓ warfarin (Coumadin), OCs, HIV drugs", "A strong CYP3A4 inhibitor raising substrate levels", "It chelates di/trivalent cations, reducing absorption", "It markedly prolongs the QT interval"], "ans": 0, "exp": "**Rifampin (Rifadin) is a potent enzyme inducer** → ↓ OC efficacy (use backup), ↓ warfarin (Coumadin) effect, ↓ protease inhibitors/many drugs. ✓ **Rifabutin** induces less. *NABP: 3.C.3.*"}, {"id": 142, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A TB patient on **pyrazinamide** develops a gout flare. Mechanism?", "opts": ["Optic neuritis with red-green color loss", "Hyperuricemia from reduced urate excretion → gout", "Direct dose-related hepatotoxicity", "Peripheral neuropathy from B6 depletion"], "ans": 1, "exp": "**Pyrazinamide → hyperuricemia** (inhibits urate excretion) → gout/arthralgia; it is also hepatotoxic. *NABP: 3.C.5.*"}, {"id": 143, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which TB drug requires baseline/periodic **visual acuity and color-vision** testing?", "opts": ["Isoniazid (INH), which depletes pyridoxine", "Rifampin (Rifadin), a potent enzyme inducer", "Ethambutol (optic neuritis, red-green deficit)", "Pyrazinamide, which raises uric acid"], "ans": 2, "exp": "**Ethambutol → optic neuritis** (↓ acuity, red-green deficit) → monitor vision; renally dose-adjusted. *NABP: 3.C.5.*"}, {"id": 144, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "**Pyridoxine (B6)** is co-administered with isoniazid (INH) especially in:", "opts": ["Children who are younger than 2 years only", "No patient routinely requires the supplement", "Patients with chronic renal failure only", "Pregnancy, diabetes, alcoholism, HIV, or malnutrition"], "ans": 3, "exp": "Give **B6** to higher-risk groups (and commonly to all) to prevent neuropathy. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 145, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Preferred **latent TB infection (LTBI)** regimens per CDC?", "opts": ["Short rifamycin-based: 3HP, 4R, or 3HR", "Full RIPE four-drug regimen ×6 months", "A single oral dose of azithromycin (Zithromax)", "Isoniazid (INH) monotherapy ×9 months"], "ans": 0, "exp": "CDC now **prefers the short rifamycin-based LTBI regimens** (3HP/4R/3HR) over 6–9-month isoniazid (higher completion). *NABP: 3.C.2.*"}, {"id": 146, "group": "Tuberculosis & Mycobacteria", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Match MOA — **isoniazid (INH)** and **rifampin (Rifadin)**?", "opts": ["Isoniazid (INH) inhibits RNA polymerase; rifampin (Rifadin) inhibits the folate pathway", "Isoniazid (INH) inhibits mycolic acid; rifampin (Rifadin) inhibits RNA polymerase", "Both agents inhibit the bacterial 30S/50S ribosome", "Both agents inhibit cell-wall synthesis via the PBPs"], "ans": 1, "exp": "**Isoniazid (INH) → mycolic acid (cell wall)**; **rifampin (Rifadin) → bacterial RNA polymerase.** *NABP: 1.A.1.*"}, {"id": 147, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "An HIV patient on a **protease inhibitor** needs TB therapy. Preferred rifamycin?", "opts": ["Rifampin (Rifadin) administered at twice the usual daily dose", "Rifampin (Rifadin), the strongest CYP3A4 enzyme inducer", "Rifabutin (weaker CYP3A4 induction → fewer PI interactions)", "No rifamycin agent should be given at all here"], "ans": 2, "exp": "**Rifabutin** replaces rifampin (Rifadin) alongside HIV protease inhibitors/some ART (less enzyme induction). *NABP: 3.C.3.*"}, {"id": 148, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Active TB treatment in **pregnancy** (US practice)?", "opts": ["A streptomycin-containing four-drug regimen", "Fluoroquinolone monotherapy throughout", "Withhold all TB drugs until after delivery", "Isoniazid (INH) + rifampin (Rifadin) + ethambutol + pyridoxine"], "ans": 3, "exp": "US pregnancy regimen: **INH + RIF + EMB + pyridoxine**; ⚠ **streptomycin is contraindicated** (fetal ototoxicity); pyrazinamide often deferred in the US. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 149, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Main rationale for **directly observed therapy (DOT)** in TB?", "opts": ["To ensure adherence and prevent resistance/relapse", "To avoid the need for periodic monitoring labs", "To shorten the total therapy course to one month", "To reduce the overall cost of the drug regimen"], "ans": 0, "exp": "**DOT** ensures completion → prevents **resistance/relapse** (a public-health priority). *NABP: 3.D.2 / 5.C.*"}, {"id": 150, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Appropriate **baseline/monitoring** for RIPE?", "opts": ["Thyroid-function studies at baseline and follow-up", "LFTs (all), vision (ethambutol), uric acid (pyrazinamide)", "Baseline and periodic echocardiography", "A coagulation panel including the INR"], "ans": 1, "exp": "**LFTs** (hepatotoxic trio) + **vision** (ethambutol) + **uric acid** (pyrazinamide, if gouty symptoms). *NABP: 3.D.2 / 3.C.5.*"}, {"id": 151, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Multidrug-resistant TB (MDR-TB)** is defined as resistance to at least:", "opts": ["Resistance to all four RIPE first-line drugs", "Resistance to ethambutol plus pyrazinamide", "Resistance to isoniazid (INH) plus rifampin (Rifadin)", "Resistance to any single first-line drug"], "ans": 2, "exp": "**MDR-TB = resistance to ≥ isoniazid (INH) AND rifampin (Rifadin)** → prolonged second-line therapy. *NABP: 3.C.2.*"}, {"id": 152, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which TB drug → adverse-effect pairing is **INCORRECT**?", "opts": ["Isoniazid (INH) → peripheral neuropathy and hepatotoxicity", "Rifampin (Rifadin) → orange fluids and enzyme induction", "Ethambutol → optic neuritis", "Pyrazinamide → optic neuritis"], "ans": 3, "exp": "**Pyrazinamide → hyperuricemia/hepatotoxicity** (optic neuritis is **ethambutol**). *NABP: 3.C.5.*"}, {"id": 155, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for **nitrofurantoin (Macrobid)**?", "opts": ["Take with food; harmless brown urine; finish the course", "Crush the capsule and dissolve it in juice", "Restrict all oral fluid intake during therapy", "Take on an empty stomach; expect no urine change"], "ans": 0, "exp": "**Take with food** (better absorption/tolerability); **harmless brown urine**; finish the course. *NABP: 3.E.2.*"}, {"id": 156, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "A patient on **ciprofloxacin (Cipro)** also takes calcium, iron, and an antacid. Best counseling?", "opts": ["No interaction occurs, so they may be taken together", "Separate from antacids/dairy/iron/calcium (~2 h before/6 h after)", "Discontinue the calcium supplement entirely and permanently", "Double the ciprofloxacin (Cipro) dose to overcome the chelation"], "ans": 1, "exp": "**Di/trivalent cations chelate FQs** → markedly ↓ absorption → **separate dosing**; also counsel on photosensitivity. *NABP: 3.C.3 / 3.E.2.*"}, {"id": 157, "group": "Counselin
