g, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "A patient on **linezolid (Zyvox)** should avoid:", "opts": ["Dairy products and calcium-rich foods only", "Citrus fruits and acidic fruit juices", "Tyramine-rich foods and serotonergic/adrenergic drugs", "High-fiber foods and bran-based cereals"], "ans": 2, "exp": "Linezolid (Zyvox) = **reversible MAOI** → ⚠ **tyramine** (hypertensive reaction) and **serotonergic** drugs (serotonin syndrome). *NABP: 3.C.3 / 3.E.2.*"}, {"id": 158, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.5", "stem": "Counseling for **clindamycin**?", "opts": ["Expect a harmless orange urine discoloration", "Avoid direct sunlight to prevent photosensitivity", "Take on an empty stomach with a glass of milk", "Report new/persistent diarrhea (C. diff); take with water"], "ans": 3, "exp": "⚠ **Clindamycin → C. difficile** (report diarrhea promptly); take with **a full glass of water** (pill esophagitis). *NABP: 3.E.2 / 3.C.5.*"}, {"id": 159, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A warfarin (Coumadin) patient is prescribed **TMP-SMX.** Key concern?", "opts": ["↑ INR/bleeding — sulfamethoxazole inhibits CYP2C9", "No clinically significant interaction occurs", "Cation chelation reduces drug absorption", "↓ INR from hepatic enzyme induction"], "ans": 0, "exp": "**TMP-SMX markedly ↑ INR** → monitor closely/adjust warfarin (also hyperkalemia). *NABP: 3.C.3.*"}, {"id": 160, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "Counseling/interaction for **metronidazole (Flagyl)**?", "opts": ["Always take each dose with an antacid", "Avoid alcohol (disulfiram reaction); it ↑ warfarin (Coumadin) INR", "Concurrent alcohol use during therapy is fine", "It ↓ warfarin (Coumadin) INR through enzyme induction"], "ans": 1, "exp": "**No alcohol** (flushing/vomiting/tachycardia); **↑ INR** with warfarin (monitor). *NABP: 3.C.3 / 3.E.2.*"}, {"id": 161, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which combination most increases **ototoxicity** risk?", "opts": ["Doxycycline (Vibramycin) plus oral iron supplements", "Cephalexin taken together with a meal", "An aminoglycoside plus a loop diuretic (furosemide)", "Penicillin combined with acetaminophen"], "ans": 2, "exp": "**Aminoglycoside + loop diuretic → additive ototoxicity** (also avoid concurrent nephrotoxins and neuromuscular blockers). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 162, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Co-administering **vancomycin (Vancocin) with piperacillin-tazobactam** raises the risk of:", "opts": ["Tendon rupture and tendinopathy", "Hypoglycemia and other dysglycemia", "QT prolongation and torsades de pointes", "Acute kidney injury (additive nephrotoxicity)"], "ans": 3, "exp": "**Vancomycin (Vancocin) + pip-tazo → ↑ AKI** → monitor **renal function**; consider alternative combinations. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 163, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A diabetic on a **sulfonylurea** starts a **fluoroquinolone.** Monitor for?", "opts": ["Dysglycemia — especially hypoglycemia; monitor blood glucose", "Hyperkalemia from aldosterone-related potassium retention", "Shortening of the QT interval seen on the ECG", "Hyperthyroidism with overt thyrotoxic symptoms"], "ans": 0, "exp": "**FQs disturb glucose homeostasis** (hypo- or hyperglycemia), additive with sulfonylureas/insulin → **monitor glucose.** *NABP: 3.C.3 / 3.C.5.*"}, {"id": 164, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which combination carries the greatest **QT-prolongation/torsades** risk?", "opts": ["Cephalexin combined with ibuprofen", "A macrolide + a fluoroquinolone + ondansetron (Zofran)", "Amoxicillin combined with acetaminophen", "Doxycycline (Vibramycin) combined with oral iron"], "ans": 1, "exp": "Additive **QT prolongation** with macrolide + FQ + other QT drugs → review ECG/electrolytes. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 165, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which patient should generally **avoid a fluoroquinolone**?", "opts": ["A patient taking a statin (myopathy risk)", "A healthy adult with cystitis and no alternatives", "A patient with myasthenia gravis or aortic aneurysm", "A patient with a documented sulfa allergy"], "ans": 2, "exp": "FQ cautions/CIs: **myasthenia gravis (exacerbation), aortic aneurysm/dissection, tendon disorders**, pregnancy/peds → reserve for when no alternative exists. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 166, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Contraindications/cautions for **nitrofurantoin (Macrobid)**?", "opts": ["Type 2 diabetes mellitus on metformin (Glucophage)", "Uncontrolled chronic essential hypertension", "A documented penicillin class allergy", "G6PD deficiency, CrCl <30, term pregnancy/neonates"], "ans": 3, "exp": "⚠ Avoid in **G6PD deficiency, low CrCl, term pregnancy/neonates**; chronic use → pulmonary fibrosis. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 167, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.5", "stem": "Counseling to reduce **TMP-SMX (sulfonamide)** crystalluria and toxicity?", "opts": ["Hydrate well; report rash (SJS); avoid sun/sulfa allergy/G6PD", "Take each dose with an aluminum-magnesium antacid", "Acidify the urine using cranberry juice daily", "Restrict oral fluid intake throughout the therapy"], "ans": 0, "exp": "**Hydrate** (crystalluria), watch for **rash/SJS** and photosensitivity; avoid in **sulfa allergy/G6PD.** *NABP: 3.E.2 / 3.C.5.*"}, {"id": 168, "group": "Counseling, Ae/Ci & Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which agents have **high oral bioavailability** (good IV→PO step-down candidates)?", "opts": ["Vancomycin (Vancocin) and the parenteral aminoglycoside agents", "Fluoroquinolones, linezolid (Zyvox), metronidazole (Flagyl), doxycycline (Vibramycin), TMP-SMX", "Penicillin G and ceftriaxone (parenteral only)", "Daptomycin (Cubicin) and the long-acting lipoglycopeptides"], "ans": 1, "exp": "These orals approach IV exposure → **step-down therapy.** (Vancomycin/aminoglycosides/daptomycin (Cubicin) lack useful oral systemic absorption.) *NABP: 1.A.2 / 3.D.2.*"}, {"id": 169, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for **amoxicillin-clavulanate (Augmentin)** and the **amoxicillin suspension**?", "opts": ["Avoid all dairy products with each dose", "Crush the extended-release tablets before dosing", "Take with food; refrigerate suspension, discard after 10 days", "Take on an empty stomach; store at room temperature"], "ans": 2, "exp": "**Augmentin with food** (clavulanate GI); **refrigerate** the reconstituted suspension, **discard after 10 days** (plain amoxicillin suspension = 14 days); complete the course. *NABP: 3.E.2.*"}, {"id": 170, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Counseling for **doxycycline (Vibramycin)**?", "opts": ["Take it only together with a full glass of milk", "Avoid all fluid intake immediately around each dose", "Take it lying flat down without any water", "Full glass of water, sit upright, avoid sun, separate cations"], "ans": 3, "exp": "Doxycycline (Vibramycin): **upright with water** (esophageal ulcer), **photosensitivity**, **separate cations**; unlike tetracycline it **may be taken with food.** *NABP: 3.E.2 / 3.C.3.*"}, {"id": 173, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "Treatment for **primary, secondary, or early latent syphilis**?", "opts": ["Benzathine penicillin G 2.4 million units IM once", "Ceftriaxone 500 mg IM as a single dose", "Azithromycin (Zithromax) 1 g PO as a single dose", "Doxycycline (Vibramycin) 100 mg PO BID ×28 days"], "ans": 0, "exp": "**Benzathine penicillin G 2.4 MU IM ×1** for early syphilis. *NABP: 3.C.2 / 1.C.4.*"}, {"id": 174, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Treatment for **late latent (or unknown-duration) syphilis**?", "opts": ["Benzathine penicillin G 2.4 MU IM as a single dose", "Benzathine penicillin G 2.4 MU IM weekly ×3 doses", "Oral penicillin VK for 10 days", "Azithromycin (Zithromax) 1 g PO as a single dose"], "ans": 1, "exp": "**Late latent → 3 weekly IM doses** (2.4 MU each). *NABP: 3.C.2.*"}, {"id": 175, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Treatment for **neurosyphilis**?", "opts": ["Ceftriaxone 250 mg IM as a single dose", "Benzathine penicillin G 2.4 MU IM once", "Aqueous crystalline penicillin G IV ×10–14 days", "Oral doxycycline (Vibramycin) 100 mg BID ×14 days"], "ans": 2, "exp": "**Neurosyphilis → IV aqueous crystalline penicillin G** (benzathine IM does **not** reach the CNS). *NABP: 3.C.2.*"}, {"id": 176, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.5", "stem": "A **non-pregnant, penicillin-allergic** patient with early syphilis — alternative?", "opts": ["Azithromycin (Zithromax) 1 g PO as reliable therapy", "No antibiotic treatment is required", "Vancomycin (Vancocin) IV for gram-positive coverage", "Doxycycline (Vibramycin) 100 mg PO BID ×14 days"], "ans": 3, "exp": "**Doxycycline (Vibramycin)** is the non-pregnant alternative; ⚠ **pregnant patients must be desensitized** to penicillin (only reliably fetal-protective therapy). *NABP: 3.C.2 / 2.A.5.*"}, {"id": 177, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "A patient treated for syphilis develops fever, chills, and myalgias within hours. This is:", "opts": ["The Jarisch-Herxheimer reaction (self-limited; supportive)", "Early failure of the antibiotic treatment regimen", "A delayed serum-sickness type immune reaction", "Penicillin anaphylaxis requiring intramuscular epinephrine"], "ans": 0, "exp": "**Jarisch-Herxheimer** = transient febrile reaction from spirochete lysis (first ~24 h) → **antipyretics/supportive**; not a penicillin allergy. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 178, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "First-line for **early Lyme disease (erythema migrans)** in an adult?", "opts": ["Azithromycin (Zithromax) 500 mg PO once daily for 3 days", "Doxycycline (Vibramycin) 100 mg PO BID ×10 d (covers Anaplasma)", "Penicillin G 4 million units given IV q4h", "Ciprofloxacin (Cipro) 500 mg PO given twice daily"], "ans": 1, "exp": "**Doxycycline (Vibramycin) 100 mg BID ×10 d** (alternatives: amoxicillin or cefuroxime); doxycycline also covers **Anaplasma** co-infection. *NABP: 3.C.2 / 1.C.4.*"}, {"id": 179, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Early Lyme disease in a **pregnant patient or a child <8 years** — preferred agent?", "opts": ["Azithromycin (Zithromax) as the first-line agent", "Doxycycline (Vibramycin), a tetracycline", "Amoxicillin or cefuroxime", "Ciprofloxacin (Cipro), a fluoroquinolone"], "ans": 2, "exp": "Use **amoxicillin or cefuroxime** when avoiding prolonged doxycycline (Vibramycin). *NABP: 3.C.2.*"}, {"id": 180, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Lyme carditis (high-grade AV block) or neuroborreliosis** is treated with:", "opts": ["Azithromycin (Zithromax)", "Penicillin VK PO", "Oral doxycycline (Vibramycin) only", "IV ceftriaxone"], "ans": 3, "exp": "Severe/disseminated Lyme (carditis, meningitis) → **IV ceftriaxone.** *NABP: 3.C.2.*"}, {"id": 181, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "A patient removes an engorged **Ixodes tick** (high-risk area, within 72 h). Post-exposure prophylaxis?", "opts": ["A single doxycycline (Vibramycin) 200 mg oral dose", "Amoxicillin 500 mg PO TID ×5 days", "No prophylaxis option currently exists", "A full 10-day doxycycline (Vibramycin) treatment course"], "ans": 0, "exp": "**Single-dose doxycycline (Vibramycin) 200 mg** within 72 h for qualifying high-risk **Ixodes** bites. *NABP: 3.C.2 / 1.C.4.*"}, {"id": 182, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A child has fever, headache, and a petechial rash spreading from the wrists/ankles after a tick bite (suspected **RMSF**). Treatment?", "opts": ["Withhold antibiotics until serology confirms RMSF", "Doxycycline (Vibramycin) immediately at any age (do not delay)", "Amoxicillin 500 mg PO three times daily", "Azithromycin (Zithromax) 500 mg PO once daily"], "ans": 1, "exp": "**RMSF → doxycycline (Vibramycin) empirically at ANY age** — delay risks death; the short course doesn't stain teeth. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 183, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for **atypical (\"walking\") pneumonia** (Mycoplasma/Chlamydophila/Legionella)?", "opts": ["Vancomycin (Vancocin) to cover gram-positive organisms", "Nitrofurantoin (Macrobid), concentrated in the urine", "A macrolide, doxycycline (Vibramycin), or respiratory FQ", "Amoxicillin, an oral aminopenicillin"], "ans": 2, "exp": "Atypicals lack a cell wall (no β-lactam target) → **macrolide, doxycycline (Vibramycin), or respiratory FQ.** *NABP: 3.C.2.*"}, {"id": 184, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient with severe pneumonia, hyponatremia, and diarrhea has a positive **urinary antigen** for **Legionella.** Preferred therapy?", "opts": ["Nitrofurantoin (Macrobid), concentrated in the bladder", "Clindamycin for gram-positive anaerobes", "Amoxicillin, an oral aminopenicillin", "A respiratory FQ (levofloxacin) or azithromycin (Zithromax)"], "ans": 3, "exp": "**Legionella → respiratory FQ or azithromycin (Zithromax)** (diagnosed via **urinary antigen**). *NABP: 3.C.2.*"}, {"id": 185, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2", "stem": "Per CDC 2021, preferred treatment for **genital chlamydia**?", "opts": ["Doxycycline (Vibramycin) 100 mg PO BID ×7 days (now preferred)", "Ceftriaxone 500 mg IM as a single dose", "Penicillin G benzathine 2.4 MU IM once", "Azithromycin (Zithromax) 1 g PO as a single dose"], "ans": 0, "exp": "ℹ 2021 update: **doxycycline (Vibramycin) 100 mg BID ×7 d is preferred** for chlamydia; azithromycin (Zithromax) 1 g is the alternative (e.g., adherence concerns/pregnancy). *NABP: 3.C.2.*"}, {"id": 186, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per CDC 2021, treatment for **trichomoniasis**?", "opts": ["A single 2 g metronidazole (Flagyl) dose for all patients", "Women: metronidazole (Flagyl) 500 mg BID ×7 d; men: 2 g ×1", "Doxycycline (Vibramycin) 100 mg PO BID ×7 days", "Azithromycin (Zithromax) 1 g PO as a single dose"], "ans": 1, "exp": "ℹ 2021 change: **women now get the 7-day multidose** regimen (more effective); **men get single 2 g.** Treat partners; avoid alcohol. *NABP: 3.C.2.*"}, {"id": 187, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Outpatient regimen for **pelvic inflammatory disease (PID)**?", "opts": ["Nitrofurantoin (Macrobid) for urinary tract coverage", "Amoxicillin given as oral monotherapy", "Ceftriaxone IM + doxycycline (Vibramycin) + metronidazole (Flagyl)", "Azithromycin (Zithromax) 1 g PO as a single dose"], "ans": 2, "exp": "PID needs broad coverage (gonorrhea + chlamydia + anaerobes): **ceftriaxone + doxycycline (Vibramycin) + metronidazole (Flagyl).** *NABP: 3.C.2.*"}, {"id": 188, "group": "Atypical, Zoonotic & Sti", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line for **anaplasmosis or ehrlichiosis** (tick-borne)?", "opts": ["Azithromycin (Zithromax)", "Ceftriaxone", "Amoxicillin", "Doxycycline (Vibramycin)"], "ans": 3, "exp": "**Doxycycline (Vibramycin)** is first-line for **Anaplasma/Ehrlichia** (and the rickettsioses, incl. RMSF). *NABP: 3.C.2.*"}, {"id": 191, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "A patient empirically on vancomycin (Vancocin) grows **MSSA** in blood cultures. Best stewardship step?", "opts": ["De-escalate to cefazolin or nafcillin (superior for MSSA)", "Add gentamicin for synergistic bactericidal killing", "Switch to linezolid (Zyvox) for broader spectrum", "Continue the empiric vancomycin (Vancocin) therapy"], "ans": 0, "exp": "**MSSA → cefazolin or anti-staph penicillin** (vancomycin is **inferior** for MSSA bacteremia) → **de-escalate.** *NABP: 3.C.2 / 5.C.*"}, {"id": 192, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.2 / 3.C.2", "stem": "Daptomycin (Cubicin) dosing by indication — **MRSA bacteremia/endocarditis** vs skin infection?", "opts": ["The same dose is used for both indications", "Bacteremia/endocarditis ≥8–10 mg/kg vs SSTI 4 mg/kg", "A lower dose is used for bacteremia", "Daptomycin (Cubicin) is not used for bacteremia"], "ans": 1, "exp": "**SSTI 4 mg/kg; bacteremia/endocarditis ≥8–10 mg/kg** (higher for deep-seated MRSA). ⚠ Monitor CPK; never for pneumonia (surfactant). *NABP: 2.A.2 / 3.C.2.*"}, {"id": 193, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Preferred regimen for **Enterococcus faecalis endocarditis**?", "opts": ["Daptomycin (Cubicin) combined with linezolid (Zyvox) therapy", "Vancomycin (Vancocin) given as single-agent monotherapy", "Ampicillin + ceftriaxone (or ampicillin + gentamicin)", "Ceftriaxone given as single-agent monotherapy"], "ans": 2, "exp": "**E. faecalis IE → ampicillin + ceftriaxone** (double β-lactam) or **ampicillin + gentamicin** (synergy). *NABP: 3.C.2.*"}, {"id": 194, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.C / 3.D.2", "stem": "Core antimicrobial-stewardship action once culture & susceptibility results return?", "opts": ["Broaden the coverage to an even wider regimen", "Add a second synergistic antibiotic agent", "Continue the broad empiric regimen for the full course", "De-escalate to the narrowest effective culture-directed agent"], "ans": 3, "exp": "**De-escalation / culture-directed therapy** → less resistance, fewer AEs, less C. diff, lower cost. *NABP: 5.C / 3.D.2.*"}, {"id": 195, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for **high-risk febrile neutropenia**?", "opts": ["An antipseudomonal β-lactam (cefepime or pip-tazo) alone", "Oral amoxicillin-clavulanate as outpatient empiric therapy", "Ceftriaxone given as single-agent intravenous monotherapy", "Vancomycin (Vancocin) given as single-agent intravenous monotherapy"], "ans": 0, "exp": "**Antipseudomonal β-lactam monotherapy** is standard empiric therapy; **don't add vancomycin (Vancocin) routinely.** *NABP: 3.C.2.*"}, {"id": 196, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "When should **vancomycin (Vancocin)** be ADDED to empiric febrile-neutropenia therapy?", "opts": ["In every febrile-neutropenia patient as empiric therapy", "For instability, pneumonia, line infection, or MRSA colonization", "In no clinical situation under current guidance", "Only once the patient has become fully afebrile"], "ans": 1, "exp": "Add **MRSA coverage only for specific triggers**, then **de-escalate** if not needed. *NABP: 3.C.2 / 5.C.*"}, {"id": 197, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Preferred empiric regimen for **severe (ICU) community-acquired pneumonia**?", "opts": ["Vancomycin (Vancocin) given as monotherapy for MRSA", "A macrolide given as sole monotherapy", "A β-lactam + macrolide, or β-lactam + respiratory FQ", "Amoxicillin given as oral monotherapy"], "ans": 2, "exp": "Severe CAP → **β-lactam + macrolide** or **β-lactam + respiratory FQ** (typical + atypical); add MRSA/Pseudomonas coverage only with risk factors. *NABP: 3.C.2.*"}, {"id": 198, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "\"Double antipseudomonal coverage\" (two agents, different classes) is best reserved for:", "opts": ["Outpatient uncomplicated bacterial cystitis in women", "Group A streptococcal pharyngitis in adults", "Every infection regardless of its overall severity", "Septic shock with MDR-Pseudomonas risk, then de-escalate"], "ans": 3, "exp": "Empiric **double coverage** raises the odds an active drug is given for serious MDR-Pseudomonas risk; **de-escalate to monotherapy** when susceptible. *NABP: 3.C.2 / 5.C.*"}, {"id": 199, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "A hospitalized patient on ceftriaxone develops **C. difficile** colitis. Besides starting C. diff therapy, you should:", "opts": ["Discontinue the inciting antibiotic when possible", "Add a second broad-spectrum antibiotic", "Give an antimotility agent as primary therapy", "Continue the precipitating ceftriaxone"], "ans": 0, "exp": "**Stop the precipitating antibiotic** when feasible + treat (fidaxomicin/oral vancomycin (Vancocin)); avoid antiperistaltics as primary therapy. *NABP: 3.C.2 / 5.C.*"}, {"id": 200, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Criteria for an **IV-to-PO** antibiotic switch (stewardship)?", "opts": ["Persistent septic shock with NPO status", "Improving, stable, tolerating PO, with a bioavailable oral", "Persistently positive blood cultures alone", "Patient request alone without other criteria"], "ans": 1, "exp": "Switch when **stable + improving + taking PO** using bioavailable orals (FQ, linezolid (Zyvox), metronidazole (Flagyl), TMP-SMX, fluconazole (Diflucan)). *NABP: 3.D.2 / 5.C.*"}, {"id": 201, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "How can **procalcitonin** support stewardship?", "opts": ["It selects the optimal antibiotic dose", "It identifies the causative organism", "A low/falling level supports stopping antibiotics", "It fully replaces blood cultures"], "ans": 2, "exp": "**Procalcitonin trends** help **shorten/withhold** antibiotic courses. *NABP: 3.D.2 / 5.C.*"}, {"id": 202, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Typical treatment duration for **infective endocarditis**?", "opts": ["A single antibiotic dose given once", "A fixed 10-day oral antibiotic course", "A 5-day oral antibiotic course only", "Prolonged IV therapy, usually ~4–6 weeks"], "ans": 3, "exp": "IE → **prolonged IV (≈4–6 weeks)**, agent/duration set by organism and valve type. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 203, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 5.C", "stem": "For **osteomyelitis**, current evidence (OVIVA) supports:", "opts": ["Oral antibiotics can be non-inferior to IV in stable patients", "A single antibiotic dose is fully sufficient", "Topical antibiotic therapy alone is adequate", "IV therapy only, with no oral step-down ever"], "ans": 0, "exp": "ℹ **OVIVA**: **oral step-down** is non-inferior to prolonged IV for bone/joint infection in suitable patients → supports IV→PO. *NABP: 3.C.2 / 5.C.*"}, {"id": 204, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "In **septic shock with MDR risk**, the empiric strategy is:", "opts": ["Narrow-spectrum oral empiric therapy upfront", "Prompt broad coverage (MRSA + antipseudomonal), then de-escalate", "Withhold antibiotics entirely until cultures return", "A single narrow-spectrum empiric antibiotic agent"], "ans": 1, "exp": "**Start broad early** (cover likely resistant pathogens) → **de-escalate** once cultures/susceptibilities return. *NABP: 3.C.2 / 5.C.*"}, {"id": 205, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.C / 3.D.2", "stem": "An \"**antibiotic time-out**\" (reassessment at ~48–72 h) is a stewardship practice to:", "opts": ["Add empiric antifungal coverage to the regimen", "Increase the dose of the current antibiotic", "Reassess against cultures — narrow, switch to PO, or stop", "Routinely extend the planned therapy duration"], "ans": 2, "exp": "The **48–72 h time-out** prompts de-escalation / IV-to-PO / stop decisions. *NABP: 5.C / 3.D.2.*"}, {"id": 206, "group": "Indication-Specific Regimens & Stewardship", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "A cellulitis patient on IV vancomycin (Vancocin) is afebrile/improving at 48 h; cultures grow **MSSA**. Best action?", "opts": ["Add gentamicin for synergistic killing", "Broaden therapy to piperacillin-tazobactam", "Continue IV vancomycin (Vancocin) for 14 days", "De-escalate to oral cephalexin or dicloxacillin"], "ans": 3, "exp": "**De-escalate + IV→PO**: MSSA cellulitis → **cephalexin/dicloxacillin** once improving. *NABP: 3.C.2 / 5.C.*"}, {"id": 209, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Which agent provides reliable **anaerobic** coverage?", "opts": ["Metronidazole (Flagyl)", "Aztreonam", "Gentamicin", "Ceftriaxone"], "ans": 0, "exp": "**Metronidazole (Flagyl)** (anaerobes/B. fragilis). ⚠ Ceftriaxone, aztreonam, and aminoglycosides have **no useful anaerobic** activity. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 210, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1", "stem": "How do **clindamycin** and **metronidazole (Flagyl)** differ for anaerobes?", "opts": ["Identical coverage", "Clindamycin → \"above-the-diaphragm\" (oral/respiratory) anaerobes; metronidazole (Flagyl) → \"below-the-diaphragm\" (GI/B. fragilis) anaerobes", "Metronidazole (Flagyl) covers gram-positives only", "Clindamycin covers Pseudomonas"], "ans": 1, "exp": "**Clindamycin = above-diaphragm**; **metronidazole (Flagyl) = below-diaphragm (B. fragilis).** *NABP: 1.A.1.*"}, {"id": 211, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why is **metronidazole (Flagyl) added to ceftriaxone** for community intra-abdominal infection?", "opts": ["To add coverage for MRSA", "Ceftriaxone misses anaerobes; metronidazole (Flagyl) adds", "fragilis", "To add antipseudomonal coverage"], "ans": 1, "exp": "**Ceftriaxone covers enteric gram-negatives but not anaerobes** → add **metronidazole (Flagyl)** (or use pip-tazo/a carbapenem alone). *NABP: 3.C.2.*"}, {"id": 212, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Which is TRUE of **cephalosporins** and **Enterococcus**?", "opts": ["Cefazolin reliably covers VRE and enterococci", "All cephalosporin generations cover the enterococci", "Cephalosporins miss enterococci → use ampicillin/vancomycin (Vancocin)", "Only ceftriaxone among them covers enterococci"], "ans": 2, "exp": "⚠ **Cephalosporins have a gap for Enterococcus** → **ampicillin/vancomycin (Vancocin)** (VRE → linezolid (Zyvox)/daptomycin (Cubicin)). *NABP: 1.A.1 / 3.C.2.*"}, {"id": 213, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Stenotrophomonas maltophilia** is best treated with:", "opts": ["Ceftriaxone, a third-generation cephalosporin", "Ampicillin, an aminopenicillin", "Meropenem, a broad carbapenem", "TMP-SMX (intrinsically carbapenem-resistant)"], "ans": 3, "exp": "⚠ **Stenotrophomonas is intrinsically carbapenem-resistant** (metallo-β-lactamase) → **TMP-SMX** (alternatives: levofloxacin (Levaquin), minocycline). *NABP: 3.C.2.*"}, {"id": 214, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Acinetobacter baumannii** (MDR) is treated with:", "opts": ["A carbapenem or ampicillin-sulbactam (cefiderocol if MDR)", "Nitrofurantoin (Macrobid), which is concentrated in the urine", "Azithromycin (Zithromax), a macrolide-class agent", "Ceftriaxone, a third-generation cephalosporin"], "ans": 0, "exp": "**Carbapenem or a sulbactam-containing** regimen; **cefiderocol/polymyxins** for MDR strains. *NABP: 3.C.2.*"}, {"id": 215, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Atypical organisms (Mycoplasma, Legionella, Chlamydophila) require:", "opts": ["β-lactams that bind penicillin-binding proteins", "A macrolide, doxycycline (Vibramycin), or a respiratory FQ", "Vancomycin (Vancocin) for gram-positive coverage", "Aztreonam, a gram-negative monobactam"], "ans": 1, "exp": "Atypicals lack a cell wall / are intracellular → **β-lactams fail**; use **macrolide/doxycycline (Vibramycin)/FQ.** *NABP: 1.A.1 / 3.C.2.*"}, {"id": 216, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Which set is fully **antipseudomonal**?", "opts": ["Azithromycin (Zithromax), doxycycline (Vibramycin), and metronidazole (Flagyl)", "Ceftriaxone, ampicillin, and ertapenem", "Cefepime, pip-tazo, meropenem, cipro, tobramycin", "Cefazolin, nafcillin, and clindamycin"], "ans": 2, "exp": "Antipseudomonal: **cefepime, ceftazidime, pip-tazo, mero/imipenem, cipro/levo, aztreonam, aminoglycosides.** (Ceftriaxone/ampicillin/ertapenem are NOT.) *NABP: 1.A.1 / 3.C.2.*"}, {"id": 217, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Preferred definitive therapy for a serious **ESBL** infection?", "opts": ["Ampicillin-sulbactam", "Cefepime alone", "Ceftriaxone", "A carbapenem"], "ans": 3, "exp": "**ESBLs hydrolyze cephalosporins** → **carbapenem** for serious infection (pip-tazo inferior — MERINO). *NABP: 3.C.2.*"}, {"id": 218, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2", "stem": "Which agent has **poor CNS/CSF penetration** (avoid as sole therapy for meningitis)?", "opts": ["Aminoglycosides (poor CSF penetration)", "Ceftriaxone, a third-generation cephalosporin", "Meropenem, a CNS-penetrant carbapenem", "Vancomycin (Vancocin), which penetrates inflamed meninges"], "ans": 0, "exp": "**Aminoglycosides (and 1st-gen cephalosporins, daptomycin (Cubicin)) penetrate CSF poorly.** Ceftriaxone, cefepime, meropenem, vancomycin (Vancocin), linezolid (Zyvox), and metronidazole (Flagyl) **do** penetrate. *NABP: 1.A.2.*"}, {"id": 219, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Which is TRUE about **vancomycin (Vancocin) route**?", "opts": ["Oral vancomycin (Vancocin) treats systemic MRSA infection", "IV for systemic infection; oral only for", "difficile", "Oral and IV vancomycin (Vancocin) are interchangeable"], "ans": 1, "exp": "**Oral vancomycin (Vancocin) stays in the gut (C. diff only); systemic MRSA needs IV.** ⚠ IV vancomycin does NOT treat C. diff. *NABP: 1.A.2 / 3.C.2.*"}, {"id": 220, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.5", "stem": "Which is TRUE of **aminoglycosides**?", "opts": ["Well absorbed after oral administration", "O₂-dependent uptake (poor in abscesses), IV/IM only", "Reliable anaerobic and Bacteroides coverage", "Excellent CSF and CNS tissue penetration"], "ans": 1, "exp": "Aminoglycoside uptake is **oxygen-dependent** → poor at **abscess/anaerobic** sites; **IV/IM only**; poor lung/CNS penetration. *NABP: 1.A.2 / 3.C.5.*"}, {"id": 221, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 2.A.4", "stem": "**Tigecycline** spectrum/limitations?", "opts": ["Narrow gram-negative aerobic coverage exclusively", "Covers Pseudomonas well and is suited to bacteremia", "Broad (MRSA/VRE/ESBL/anaerobes) but not Pseudomonas; avoid bacteremia", "Gram-positive organism coverage only, no gram-negatives"], "ans": 2, "exp": "Tigecycline is very broad **except Pseudomonas/Proteus**; **low blood levels** (not for bloodstream infection) + a **boxed warning for ↑ mortality.** *NABP: 3.C.2 / 2.A.4.*"}, {"id": 222, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**Daptomycin (Cubicin)** spectrum?", "opts": ["Broad gram-negative aerobic coverage", "Atypical organism (Mycoplasma) coverage", "Anaerobic (Bacteroides fragilis) coverage", "Gram-positive only (MRSA/VRE); not for pneumonia"], "ans": 3, "exp": "Daptomycin (Cubicin) is **gram-positive only** (no gram-negative/atypical coverage); **inactivated by surfactant** → no pneumonia. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 223, "group": "Agent Product/Spectrum Cards", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Tissue/spectrum nuance among **fluoroquinolones**?", "opts": ["Cipro best for Pseudomonas; levo/moxi respiratory; moxi not for UTI", "None of these agents reliably cover Pseudomonas", "All of them treat urinary tract infection equally well", "All four agents are pharmacologically identical"], "ans": 0, "exp": "**Cipro** gram-neg/Pseudomonas; **levo/moxi** respiratory; **moxi** anaerobes but no urinary excretion; FQs have **excellent tissue penetration.** *NABP: 1.A.2 / 3.C.2.*"}, {"id": 224, "group": "Agent Product/Spectrum Cards", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Spectrum/route of **nitrofurantoin (Macrobid) and fosfomycin**?", "opts": ["Broad systemic gram-negative coverage", "Concentrate in the bladder/urine only (lower UTI); both cover", "coli/E. faecalis — fosfomycin (single 3 g oral dose) also covers many VRE; neither covers Proteus or Pseudomonas", "Cover Pseudomonas"], "ans": 1, "exp": "Both achieve **urinary levels only** (cystitis): cover **E. coli/E. faecalis**; **fosfomycin** additionally has notable **VRE** activity (single 3 g dose). ⚠ Both **miss Proteus/Pseudomonas** and are **not for pyelonephritis** (no tissue levels). *NABP: 1.A.2 / 3.C.2.*"}, {"id": 227, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 1.A.1", "stem": "**Avycaz** is which combination, and what does it add?", "opts": ["Ceftazidime/avibactam — covers KPC, AmpC, ESBL, OXA-48 (not MBL)", "Ceftolozane/tazobactam — antipseudomonal only", "Meropenem/vaborbactam — a carbapenem combo", "Imipenem/cilastatin/relebactam — a carbapenem combo"], "ans": 0, "exp": "(a non-β-lactam β-lactamase inhibitor). Restores activity vs **KPC, AmpC, ESBL, OXA-48 — but NOT metallo-β-lactamases (MBL)**. USE: cIAI (with metronidazole (Flagyl)), cUTI, HABP/VABP. Route: **IV**, renally dose-adjusted. *NABP: 2.A.1 / 1.A.1.*"}, {"id": 228, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 1.A.1", "stem": "**Vabomere** consists of:", "opts": ["Ceftazidime/avibactam", "Meropenem/vaborbactam — vaborbactam restores meropenem vs KPC-CRE", "Ceftolozane/tazobactam", "Piperacillin/tazobactam"], "ans": 1, "exp": "Vaborbactam (a cyclic boronate BLI) protects meropenem against **KPC-producing carbapenem-resistant Enterobacterales**; no added Pseudomonas/MBL benefit. Route: **IV**, for cUTI/CRE. *NABP: 2.A.1 / 1.A.1.*"}, {"id": 229, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1", "stem": "**Zerbaxa** is best known for:", "opts": ["KPC coverage via avibactam", "Anaerobic and MRSA coverage", "Ceftolozane/tazobactam — potent antipseudomonal (MDR Pseudomonas)", "A fixed oral combination for cystitis"], "ans": 2, "exp": "— strongest of the combos against **MDR Pseudomonas aeruginosa**; USE: cUTI, cIAI (with metronidazole (Flagyl)), HABP/VABP. Route: **IV**. (ESBL covered; not reliable for KPC.) *NABP: 2.A.1.*"}, {"id": 230, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 1.A.1", "stem": "**Recarbrio** is a triple product of:", "opts": ["Meropenem/vaborbactam/clavulanate", "Ceftazidime/avibactam/metronidazole", "Piperacillin/tazobactam/amikacin", "Imipenem/cilastatin/relebactam"], "ans": 3, "exp": "Cilastatin blocks renal **dehydropeptidase-I** (protects imipenem); relebactam (BLI) restores activity vs **KPC/AmpC**. Route: **IV**, MDR gram-negatives. *NABP: 2.A.1 / 1.A.1.*"}, {"id": 231, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": true, "nabp": "1.A.1 / 3.C.2", "stem": "A carbapenem-resistant isolate produces a **metallo-β-lactamase (MBL)**. Which agent retains activity?", "opts": ["Cefiderocol, a siderophore cephalosporin", "Ceftolozane/tazobactam, antipseudomonal", "Meropenem/vaborbactam, a KPC combo", "Ceftazidime/avibactam given on its own"], "ans": 0, "exp": "— a **siderophore (\"Trojan-horse\") cephalosporin** taken up via iron transporters; active against MBL and many carbapenem-resistant gram-negatives. ⚠ Standard BLI combos (avibactam/vaborbactam/relebactam) do **NOT** cover MBL (an aztreonam–avibactam strategy is the other option). Route: **IV**. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 232, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.C.5", "stem": "**Bactrim/Septra** is itself a combination. Which is correct?", "opts": ["Trimethoprim alone with a brand name", "Trimethoprim/sulfamethoxazole in a 1:5 ratio, sequential folate blockade", "Trimethoprim/sulfadiazine in a 1:1 ratio", "Sulfamethoxazole/dapsone for PCP only"], "ans": 1, "exp": "— block **sequential steps of folate synthesis** (synergistic, bactericidal). USE: UTI, PCP (treatment/prophylaxis), MRSA SSTI, Stenotrophomonas. ⚠ AE: **hyperkalemia, ↑SCr, SJS/TEN, sulfa allergy**, kernicterus near term. *NABP: 2.A.1 / 3.C.5.*"}, {"id": 233, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 1.A.1", "stem": "**Synercid** is a streptogramin combination used for:", "opts": ["Two aminoglycosides — gram-negative synergy", "A penicillin/macrolide oral combo", "Quinupristin/dalfopristin — VRE faecium (NOT faecalis)", "Quinupristin/dalfopristin — first-line MSSA bacteremia"], "ans": 2, "exp": "— IV streptogramin combo for **vancomycin (Vancocin)-resistant *Enterococcus faecium*** (⚠ intrinsically inactive vs *E. faecalis*). AE: arthralgia/myalgia, infusion-site reactions; CYP3A4 inhibitor. *NABP: 2.A.1 / 1.A.1.*"}, {"id": 234, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1", "stem": "**Dalvance** and **Orbactiv** are notable because they are:", "opts": ["Inhaled agents for cystic fibrosis", "Anti-Pseudomonas β-lactams", "Oral oxazolidinones for ABSSSI", "Long-acting lipoglycopeptides given as single/infrequent IV doses"], "ans": 3, "exp": "— long-half-life **lipoglycopeptides** for **ABSSSI** (gram-positive incl. MRSA), enabling single- or two-dose IV therapy. (Telavancin = Vibativ.) *NABP: 2.A.1.*"}, {"id": 235, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.C.5", "stem": "**Sivextro (tedizolid)** compared with **Zyvox (linezolid)**?", "opts": ["Both are oxazolidinones; tedizolid is once daily for ABSSSI", "Tedizolid is IV-only; linezolid oral-only", "Tedizolid covers Pseudomonas; linezolid does not", "Tedizolid is an aminoglycoside; linezolid an oxazolidinone"], "ans": 0, "exp": "**Tedizolid = once daily, 6-day ABSSSI course**; linezolid (Zyvox) = BID. ⚠ Class: myelosuppression, serotonin syndrome (MAO inhibition), neuropathy (prolonged). *NABP: 2.A.1 / 3.C.5.*"}, {"id": 236, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.C.2", "stem": "Which pairing for **C. difficile / gut-active** agents is correct?", "opts": ["Dificid = fidaxomicin (first-line CDI); Xifaxan = rifaximin (HE/traveler's diarrhea)", "Dificid = rifaximin; Xifaxan = fidaxomicin", "Both are first-line for", "difficile colitis"], "ans": 0, "exp": "= preferred oral CDI therapy (narrow spectrum, ↓ recurrence); **Xifaxan (rifaximin)** = non-absorbed, for **hepatic encephalopathy and traveler's diarrhea** (not primary CDI). *NABP: 2.A.1 / 3.C.2.*"}, {"id": 237, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1", "stem": "**Rifater** and **Rifamate** are TB fixed-dose combinations of:", "opts": ["Both are second-line injectable combinations", "Rifater = rifampin/INH/pyrazinamide; Rifamate = rifampin/INH", "Rifater = INH/ethambutol; Rifamate = rifampin/pyrazinamide", "Both contain all four RIPE drugs"], "ans": 1, "exp": "FDCs reduce pill burden and improve adherence/reduce monotherapy resistance. *NABP: 2.A.1.*"}, {"id": 238, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.C.3", "stem": "Match the rifamycin brand/role:", "opts": ["All three are identical agents", "Rifadin = rifapentine; Priftin = rifampin", "Rifadin = rifampin; Mycobutin = rifabutin (preferred with HIV PIs); Priftin = rifapentine (weekly 3HP)", "Mycobutin = rifampin; Priftin = rifabutin"], "ans": 2, "exp": "(less CYP3A induction → preferred with HIV protease inhibitors); **Priftin = rifapentine (Priftin)** (once-weekly with INH = **3HP** for latent TB). ⚠ Rifamycins: orange secretions, strong CYP inducers. *NABP: 2.A.1 / 3.C.3.*"}, {"id": 239, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "A patient on **isoniazid (INH)** should also receive which agent, and why?", "opts": ["Folic acid to prevent megaloblastic anemia", "Calcium to prevent osteoporosis", "Thiamine to prevent Wernicke encephalopathy", "Pyridoxine (vitamin B6) to prevent peripheral neuropathy"], "ans": 3, "exp": "prevents INH-induced **peripheral neuropathy** (INH depletes B6). ⚠ INH also → **hepatotoxicity** (monitor LFTs), drug-induced lupus. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 240, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.C.5", "stem": "**Azactam (aztreonam)** and its inhaled form **Cayston** are best described as:", "opts": ["A monobactam, gram-negative only, safe in penicillin allergy", "A carbapenem with broad gram-positive and anaerobic cover", "A last-resort polymyxin reserved for MDR organisms", "A macrolide used mainly for atypical respiratory pathogens"], "ans": 0, "exp": "(no gram-positive/anaerobe). ✓ Safe in **penicillin allergy** (minimal cross-reactivity — except shared side chain with **ceftazidime**). **Cayston** = inhaled, for CF Pseudomonas. Route: IV (Azactam). *NABP: 2.A.1 / 3.C.5.*"}, {"id": 241, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.C.5", "stem": "**Zemdri (plazomicin)** belongs to which class?", "opts": ["A lipopeptide like daptomycin", "A next-generation aminoglycoside for cUTI/CRE", "A fluoroquinolone for respiratory infection", "A glycylcycline like tigecycline"], "ans": 1, "exp": "with activity against some **carbapenem-resistant Enterobacterales**; USE: cUTI. ⚠ Class AE: nephrotoxicity, ototoxicity → TDM. *NABP: 2.A.1 / 3.C.5.*"}, {"id": 242, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.C.5", "stem": "**Colistin (colistimethate)** and **polymyxin B** are used as:", "opts": ["First-line agents for community pneumonia", "Last-resort agents for MDR gram-negatives, limited by nephro/neurotoxicity", "Oral agents for", "difficile colitis"], "ans": 1, "exp": "for MDR gram-negatives (Pseudomonas, Acinetobacter, CRE); ⚠ dose-limiting **nephrotoxicity and neurotoxicity**. Colistin is given as the prodrug **colistimethate**. *NABP: 2.A.1 / 3.C.5.*"}, {"id": 243, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "**Vibramycin (doxycycline)** and **Minocin (minocycline)** counseling pearl?", "opts": ["Fluoroquinolones with tendon-rupture and dysglycemia risk", "Sulfonamides with risk of SJS and hyperkalemia", "Tetracyclines — avoid pregnancy/<8 y; photosensitivity, chelation", "Macrolides with strong CYP3A inhibition and QT risk"], "ans": 2, "exp": "→ ⚠ **avoid in pregnancy and children <8 y** (teeth staining/bone), **photosensitivity**, and **chelation by Ca/Mg/Al/Fe/dairy/antacids** (separate dosing). Doxycycline (Vibramycin) preferred for chlamydia (CDC 2021). *NABP: 3.C.5 / 3.E.2.*"}, {"id": 244, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Among macrolide brands, **Biaxin (clarithromycin)** is distinguished by:", "opts": ["Having essentially no clinically relevant drug interactions", "Being available only as an intravenous formulation", "Providing reliable coverage of Pseudomonas aeruginosa", "Being a strong CYP3A4 inhibitor with QT-prolongation risk"], "ans": 3, "exp": "(↑ statins, etc.) with **QT-prolongation** risk. (Zithromax/Z-Pak = azithromycin (Zithromax), fewer CYP interactions; both atypical coverage.) *NABP: 3.C.3 / 3.C.5.*"}, {"id": 245, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "1.A.1 / 3.C.5", "stem": "**Cubicin (daptomycin)** — class and one key limitation?", "opts": ["Lipopeptide inactivated by lung surfactant, so not for pneumonia", "Oxazolidinone carrying a serotonin-syndrome interaction risk", "Glycopeptide that requires AUC-based therapeutic monitoring", "Carbapenem with broad aerobic gram-negative coverage"], "ans": 0, "exp": "(gram-positive incl. MRSA/VRE bacteremia/endocarditis). ⚠ **Inactivated by lung surfactant → never use for pneumonia**; monitor **CPK** (myopathy), hold statins. *NABP: 1.A.1 / 3.C.5.*"}, {"id": 246, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**Teflaro (ceftaroline)** is unique among cephalosporins because it:", "opts": ["Covers anaerobes like metronidazole", "Has activity against MRSA", "Is the only oral cephalosporin", "Reliably covers Pseudomonas"], "ans": 1, "exp": "(binds PBP2a); also covers typical CAP pathogens. ⚠ Does **not** cover Pseudomonas/ESBL/anaerobes. Route: IV. *NABP: 1.A.1 / 3.C.2.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();
const APPKEY="naplexQuiz:Infectious Disease / Antimicrobials";let MEM={attempts:[],topic:{},dom:{},missed:[]};
function loadP(){try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function getP(){return loadP()||MEM;}
function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
