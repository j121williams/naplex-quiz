const ALL=[{"id": 1, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA shared by all **β-lactams**?", "opts": ["Bind penicillin-binding proteins → inhibit cell-wall (peptidoglycan) cross-linking → bactericidal", "Inhibit DNA gyrase", "Disrupt folate synthesis", "Inhibit 50S ribosomal subunit"], "ans": 0, "exp": "β-lactams bind **PBPs** → block transpeptidation → cell-wall lysis (**time-dependent** killing → extended infusions for pip-tazo/cefepime). *NABP: 1.A.1.*"}, {"id": 2, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "A patient needs coverage for **MSSA** bacteremia (no allergy). Best β-lactam?", "opts": ["Ceftazidime", "Nafcillin or cefazolin", "Ampicillin", "Penicillin G"], "ans": 1, "exp": "**Antistaphylococcal penicillins (nafcillin/oxacillin) or cefazolin** are preferred for **MSSA** (β-lactamase-stable). ⚠ They do **not** cover MRSA or enterococci. *NABP: 3.C.2.*"}, {"id": 3, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which agent adds **Pseudomonas aeruginosa** coverage?", "opts": ["Ampicillin", "Cefazolin", "Piperacillin-tazobactam", "Ertapenem"], "ans": 2, "exp": "**Pip-tazo** covers Pseudomonas + anaerobes. Antipseudomonal β-lactams: **pip-tazo, ceftazidime, cefepime, meropenem/imipenem, aztreonam.** ⚠ **Ertapenem does NOT cover Pseudomonas.** *NABP: 3.C.2.*"}, {"id": 4, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "An older patient has **Listeria** meningitis. Which β-lactam is active?", "opts": ["Cefazolin", "Ceftriaxone", "Cefepime", "Ampicillin"], "ans": 3, "exp": "**Ampicillin (or penicillin)** covers **Listeria**; ⚠ **cephalosporins do NOT cover Listeria** (add ampicillin to ceftriaxone for age >50/immunocompromised meningitis). *NABP: 3.C.2.*"}, {"id": 5, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**Cefazolin (1st-generation cephalosporin)** best covers:", "opts": ["MSSA, streptococci, and some gram-negatives (Proteus/E. coli/Klebsiella)", "MRSA and Pseudomonas", "Anaerobes and atypicals", "Enterococcus and Listeria"], "ans": 0, "exp": "1st-gen = **gram-positive (MSSA/strep) + PEK**; the go-to **surgical prophylaxis** agent. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 6, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Ceftriaxone** is first-line empiric therapy in all EXCEPT:", "opts": ["Bacterial meningitis (empiric)", "Pseudomonal infection", "Gonorrhea", "Community-acquired pneumonia (with a macrolide)"], "ans": 1, "exp": "Ceftriaxone (3rd-gen) covers CAP/meningitis/gonorrhea but ⚠ **lacks Pseudomonas** activity → use **ceftazidime/cefepime** for Pseudomonas. *NABP: 3.C.2.*"}, {"id": 7, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A **neonate** needs a cephalosporin; which caution applies to **ceftriaxone**?", "opts": ["Requires renal dose adjustment", "It is the drug of choice—no caution", "Avoid in neonates (biliary sludging; fatal precipitation with IV calcium) → use cefotaxime", "Causes red-man syndrome"], "ans": 2, "exp": "⚠ **Ceftriaxone is contraindicated in neonates** (kernicterus risk; lethal **Ca²⁺-ceftriaxone precipitation**) → use **cefotaxime.** ✓ Ceftriaxone is otherwise not renally adjusted (biliary elimination). *NABP: 3.C.2 / 2.A.4.*"}, {"id": 8, "group": "Beta-Lactams", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which cephalosporin covers **MRSA**?", "opts": ["Cefazolin", "Cefepime", "Ceftriaxone", "Ceftaroline"], "ans": 3, "exp": "**Ceftaroline (5th-gen)** is the only β-lactam with reliable **MRSA** activity. *NABP: 3.C.2.*"}, {"id": 9, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 2.A.4", "stem": "A renally-impaired ICU patient on **cefepime** develops confusion and myoclonus. Most likely cause?", "opts": ["Cefepime neurotoxicity (encephalopathy/non-convulsive status) from under-dose-adjustment", "Hepatic encephalopathy", "Alcohol withdrawal", "Serotonin syndrome"], "ans": 0, "exp": "⚠ **Cefepime neurotoxicity** (encephalopathy, myoclonus, seizures) occurs with **renal accumulation** → adjust for CrCl. *NABP: 3.C.5 / 2.A.4.*"}, {"id": 10, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which carbapenem should NOT be used for **Pseudomonas**?", "opts": ["Imipenem-cilastatin", "Ertapenem", "Doripenem", "Meropenem"], "ans": 1, "exp": "**Ertapenem** lacks **Pseudomonas, Acinetobacter, and enterococcal** activity (once-daily; good for ESBL/community intra-abdominal). ⚠ **Imipenem → seizure risk** (use meropenem for CNS). *NABP: 3.C.2 / 3.C.5.*"}, {"id": 11, "group": "Beta-Lactams", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Carbapenems are broad but reliably **miss** which organisms?", "opts": ["ESBL-producing", "coli", "Anaerobes", "MRSA, VRE, and atypicals (Mycoplasma/Legionella)"], "ans": 2, "exp": "Carbapenems cover ESBLs/anaerobes/most gram-negs but **NOT MRSA, VRE, atypicals,** or *Stenotrophomonas*. *NABP: 1.A.1.*"}, {"id": 12, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.5", "stem": "A patient with a documented **severe penicillin allergy (anaphylaxis)** needs gram-negative/Pseudomonas coverage. Safest β-lactam?", "opts": ["Cefepime", "Meropenem", "Aztreonam", "Piperacillin-tazobactam"], "ans": 2, "exp": "**Aztreonam (monobactam)** has **negligible cross-reactivity** with penicillins → safe in severe PCN allergy; covers **gram-negatives incl. Pseudomonas.** ⚠ Shares an R-group with **ceftazidime** (avoid if ceftazidime-allergic). *NABP: 3.C.2 / 2.A.5.*"}, {"id": 13, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.5 / 3.C.2", "stem": "Current best practice on **penicillin–cephalosporin cross-reactivity**?", "opts": ["All β-lactams are absolutely contraindicated", "Only carbapenems are safe", "~10% cross-reactivity; avoid all cephalosporins", "Cross-reactivity is low (~1–2%) and driven by similar **R1 side chains**, not the β-lactam ring; cefazolin (unique side chain) is generally safe"], "ans": 3, "exp": "Modern data: **low (~1–2%)** cross-reactivity, **side-chain**–dependent; **cefazolin** is safe with most PCN allergies. ✓ Many \"penicillin-allergic\" patients can be safely de-labeled. *NABP: 2.A.5 / 3.C.2.*"}, {"id": 14, "group": "Beta-Lactams", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Which β-lactam AE is correctly matched?", "opts": ["Cefotetan → disulfiram-like reaction with alcohol + hypoprothrombinemia (NMTT side chain)", "Nafcillin → nephrotoxicity requiring renal dose reduction", "Penicillin → routine QT prolongation", "Aztreonam → red-man syndrome"], "ans": 0, "exp": "**Cefotetan (and cefamandole)** carry the **NMTT side chain** → **disulfiram-like reaction + ↓ vitamin-K-dependent factors** (bleeding). (Nafcillin is **hepatically** cleared—no renal adjustment.) *NABP: 3.C.5 / 3.C.3.*"}, {"id": 17, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Vancomycin (Vancocin) MOA?", "opts": ["Binds the D-Ala-D-Ala terminus of peptidoglycan precursors → inhibits cell-wall synthesis", "Binds PBPs like the β-lactams", "Inhibits the 30S ribosome", "Depolarizes the cell membrane"], "ans": 0, "exp": "Glycopeptide — **binds D-Ala-D-Ala** → blocks cross-linking (bactericidal; gram-positive incl. MRSA). *NABP: 1.A.1.*"}, {"id": 18, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": true, "nabp": "1.A.2 / 3.D.2", "stem": "Preferred vancomycin (Vancocin) monitoring for serious MRSA infection (2020 ASHP/IDSA)?", "opts": ["Peak 30–40", "AUC/MIC 400–600", "Trough 25–30", "Trough 5–10"], "ans": 1, "exp": "**AUC/MIC 400–600** (Bayesian) is preferred; trough 15–20 is the legacy surrogate. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 19, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.5 / 3.E.2", "stem": "During a vancomycin (Vancocin) infusion a patient flushes over the face/torso. Best management?", "opts": ["Give IM epinephrine", "Stop permanently — IgE anaphylaxis", "Slow the infusion + give an antihistamine (rate-related histamine release)", "Switch to a carbapenem"], "ans": 2, "exp": "**Vancomycin (Vancocin) flushing (\"red man\") = rate-related histamine** reaction, not IgE allergy → **slow the infusion + antihistamine** (can pre-treat). *NABP: 2.A.5 / 3.E.2.*"}, {"id": 20, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Daptomycin (Cubicin) MOA?", "opts": ["Inhibits DHFR", "Binds D-Ala-D-Ala", "Inhibits the 50S subunit", "Lipopeptide — inserts into and depolarizes the gram-positive cell membrane"], "ans": 3, "exp": "**Membrane depolarization** → rapid bactericidal (MRSA, VRE). *NABP: 1.A.1.*"}, {"id": 21, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why is daptomycin (Cubicin) inappropriate for **pneumonia**?", "opts": ["It is inactivated by pulmonary surfactant", "It cannot penetrate lung tissue", "It only covers gram-negatives", "Its spectrum is too narrow"], "ans": 0, "exp": "⚠ **Pulmonary surfactant inactivates daptomycin (Cubicin)** → never use for pneumonia; excellent for MRSA/VRE **bacteremia/endocarditis.** *NABP: 3.C.2.*"}, {"id": 22, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Key monitoring for a patient on daptomycin (Cubicin) also taking a statin?", "opts": ["TSH", "Weekly CPK; consider holding the statin (myopathy/rhabdomyolysis risk)", "INR", "Liver enzymes only"], "ans": 1, "exp": "Daptomycin (Cubicin) → **myopathy/↑CPK** → **monitor CPK weekly**, hold statins; also watch for **eosinophilic pneumonia.** *NABP: 3.C.5 / 3.C.3.*"}, {"id": 23, "group": "Gram-Positive Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Linezolid (Zyvox) class/MOA?", "opts": ["Lipopeptide", "Tetracycline", "Oxazolidinone — binds 23S rRNA of the 50S subunit, blocking initiation", "Glycopeptide"], "ans": 2, "exp": "**Oxazolidinone** (bacteriostatic vs staph; covers **MRSA + VRE**); **~100% oral bioavailability.** *NABP: 1.A.1.*"}, {"id": 24, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on an SSRI is started on **linezolid (Zyvox).** Main concern?", "opts": ["Nephrotoxicity", "No clinically relevant interaction", "QT prolongation", "Serotonin syndrome — linezolid (Zyvox) is a weak/reversible MAOI"], "ans": 3, "exp": "⚠ Linezolid (Zyvox) = **reversible MAOI** → **serotonin syndrome** with SSRIs/SNRIs; also tyramine caution. *NABP: 3.C.3.*"}, {"id": 25, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Prolonged (>2-week) linezolid (Zyvox) therapy risks:", "opts": ["Myelosuppression (thrombocytopenia) and peripheral/optic neuropathy", "Ototoxicity", "Red man syndrome", "A disulfiram reaction"], "ans": 0, "exp": "**Reversible thrombocytopenia/myelosuppression** (>2 wks → monitor CBC) and **peripheral/optic neuropathy** with prolonged use. *NABP: 3.C.5.*"}, {"id": 26, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which pair reliably treats **VRE (E. faecium)**?", "opts": ["Vancomycin (Vancocin) and cefazolin", "Linezolid (Zyvox) and daptomycin (Cubicin)", "Nafcillin and ceftriaxone", "Ertapenem and aztreonam"], "ans": 1, "exp": "**Linezolid (Zyvox) and daptomycin (Cubicin)** are the workhorses for **VRE.** (Quinupristin-dalfopristin covers E. faecium, not E. faecalis.) *NABP: 3.C.2.*"}, {"id": 27, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Appropriate agent for **MRSA pneumonia**?", "opts": ["Aztreonam", "Daptomycin (Cubicin)", "Vancomycin (Vancocin) or linezolid (Zyvox)", "Cefazolin"], "ans": 2, "exp": "**Vancomycin (Vancocin) or linezolid (Zyvox)** for MRSA pneumonia; ⚠ **not daptomycin (Cubicin)** (surfactant inactivation). *NABP: 3.C.2.*"}, {"id": 28, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Oral options for **community MRSA skin/soft-tissue infection** include:", "opts": ["Cephalexin", "Penicillin VK", "Amoxicillin", "TMP-SMX, doxycycline (Vibramycin), clindamycin, or linezolid (Zyvox)"], "ans": 3, "exp": "Community **MRSA SSTI** orals: **TMP-SMX, doxycycline (Vibramycin), clindamycin, linezolid (Zyvox).** β-lactams (cephalexin/amoxicillin) cover only MSSA/strep. *NABP: 3.C.2.*"}, {"id": 29, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.A.2", "stem": "Before using **clindamycin** for an erythromycin-resistant staph isolate, the lab should perform:", "opts": ["A D-test (to detect inducible MLS_B/clindamycin resistance)", "A Gram stain", "A coagulase test", "An MIC only"], "ans": 0, "exp": "A **positive D-test → inducible clindamycin resistance** → avoid clindamycin (risk of treatment failure). *NABP: 3.C.2 / 1.A.2.*"}, {"id": 30, "group": "Gram-Positive Agents", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2 / 2.A.1", "stem": "Which **long-acting lipoglycopeptides** allow single-dose treatment of ABSSSI?", "opts": ["Telavancin and tedizolid", "Dalbavancin and oritavancin", "Vancomycin (Vancocin) and linezolid (Zyvox)", "Daptomycin (Cubicin) and ceftaroline"], "ans": 1, "exp": "**Dalbavancin & oritavancin** have ultra-long half-lives → **single-dose** ABSSSI therapy (gram-positive incl. MRSA). *NABP: 3.C.2 / 2.A.1.*"}, {"id": 33, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "**Macrolides** (azithromycin/clarithromycin) — MOA & key spectrum?", "opts": ["Inhibit the 50S ribosomal subunit; cover atypicals (Mycoplasma, Legionella, Chlamydia)", "Inhibit DNA gyrase; gram-negative only", "Bind PBPs", "Inhibit folate synthesis"], "ans": 0, "exp": "**50S** (bacteriostatic) → **atypical** coverage for CAP; also H. pylori, pertussis. *NABP: 1.A.1.*"}, {"id": 34, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on simvastatin (Zocor) develops myopathy after starting an antibiotic. Most likely culprit?", "opts": ["Azithromycin (Zithromax)", "Clarithromycin (strong CYP3A4 inhibitor)", "Doxycycline (Vibramycin)", "Nitrofurantoin (Macrobid)"], "ans": 1, "exp": "**Clarithromycin/erythromycin = strong CYP3A4 inhibitors** → ↑ simvastatin (Zocor) → rhabdomyolysis. ✓ **Azithromycin (Zithromax)** has minimal CYP interaction (preferred with statins). *NABP: 3.C.3.*"}, {"id": 35, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which adverse effect do macrolides and fluoroquinolones share?", "opts": ["Photosensitivity only", "Nephrotoxicity", "QT prolongation (torsades risk)", "Tendon rupture"], "ans": 2, "exp": "Both **prolong QT** → caution with other QT drugs/electrolyte abnormalities. *NABP: 3.C.5.*"}, {"id": 36, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Counseling for oral **doxycycline (Vibramycin)/tetracycline**?", "opts": ["Crush and take at bedtime lying down", "Always take with an antacid", "Take with milk for tolerability", "Separate from dairy/antacids/iron/calcium (chelation); take with water and sit upright (esophagitis); avoid sun (photosensitivity)"], "ans": 3, "exp": "**Polyvalent cations chelate** tetracyclines (↓ absorption) → separate ~2 h; sit upright with water (esophageal ulcer); **photosensitivity.** *NABP: 3.E.2 / 3.C.3.*"}, {"id": 37, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Tetracyclines are contraindicated in:", "opts": ["Pregnancy and children <8 years (tooth discoloration, bone-growth inhibition)", "CA-MRSA skin infection", "Acne", "Adults with CAP"], "ans": 0, "exp": "⚠ Avoid in **pregnancy and <8 yo** (permanent **tooth staining**, ↓ bone growth). *NABP: 2.A.4 / 3.C.2.*"}, {"id": 38, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Appropriate uses of **doxycycline (Vibramycin)** include all EXCEPT:", "opts": ["Rickettsial disease / Lyme", "Pseudomonas bacteremia", "Atypical CAP", "CA-MRSA skin infection"], "ans": 1, "exp": "Doxycycline (Vibramycin) covers atypicals, **CA-MRSA**, rickettsia/Lyme — but **not Pseudomonas.** ✓ Safe in renal impairment (no adjustment). *NABP: 3.C.2.*"}, {"id": 39, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which is a boxed-warning/class risk of **fluoroquinolones**?", "opts": ["Agranulocytosis", "Pulmonary fibrosis", "Tendinopathy/rupture, peripheral neuropathy, CNS effects, aortic aneurysm/dissection, dysglycemia, MG exacerbation", "Nephrotoxicity requiring dialysis"], "ans": 2, "exp": "⚠ FQ BBWs: **tendon rupture, peripheral neuropathy, CNS/psych, QT, aortic dissection, hypo/hyperglycemia; worsen myasthenia gravis** → reserve for no-alternative cases. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 40, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which fluoroquinolone should NOT be used for a **UTI**?", "opts": ["Ofloxacin", "Ciprofloxacin (Cipro)", "Levofloxacin (Levaquin)", "Moxifloxacin"], "ans": 3, "exp": "**Moxifloxacin** has **negligible urinary excretion** → not for UTI (but it covers anaerobes; good for CAP/intra-abdominal). *NABP: 3.C.2.*"}, {"id": 41, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "Fluoroquinolone MOA / spectrum highlight?", "opts": ["Inhibit DNA gyrase & topoisomerase IV; ciprofloxacin (Cipro) best for Pseudomonas, levo/moxi \"respiratory\" (S. pneumoniae)", "Inhibit 30S; gram-positive only", "Bind PBPs", "Inhibit folate"], "ans": 0, "exp": "**DNA gyrase/topo IV** (bactericidal); **cipro** = best gram-neg/Pseudomonas; **levo/moxi** = respiratory FQs. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 42, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 1.A.2", "stem": "Aminoglycosides (gentamicin/tobramycin) — MOA/PK?", "opts": ["Folate inhibitor", "30S inhibitor; concentration-dependent killing + post-antibiotic effect; synergy with cell-wall agents", "50S bacteriostatic", "Time-dependent with no PAE"], "ans": 1, "exp": "**30S, bactericidal, concentration-dependent** (extended-interval dosing); **synergy** with β-lactams/vancomycin (Vancocin) for enterococci/staph. *NABP: 1.A.1 / 1.A.2.*"}, {"id": 43, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Hallmark toxicities of aminoglycosides?", "opts": ["QT prolongation", "Disulfiram reaction", "Reversible nephrotoxicity (ATN) and often IRREVERSIBLE ototoxicity; neuromuscular blockade", "Tendon rupture"], "ans": 2, "exp": "⚠ **Nephrotoxicity (usually reversible)** + **ototoxicity (often permanent)**; can potentiate **neuromuscular blockade** → monitor levels/renal. *NABP: 3.C.5.*"}, {"id": 44, "group": "Other Antibiotic Classes", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "TMP-SMX MOA?", "opts": ["50S inhibition", "DNA gyrase inhibition", "Cell-wall (PBP) inhibition", "Sequential blockade of folate synthesis (sulfamethoxazole → dihydropteroate synthase; trimethoprim → dihydrofolate reductase)"], "ans": 3, "exp": "**Sequential folate inhibition** → synergistic, bactericidal. *NABP: 1.A.1.*"}, {"id": 45, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which set are recognized TMP-SMX effects/interactions?", "opts": ["Hyperkalemia, a ↑ in serum creatinine (blocks tubular secretion), SJS/TEN, and ↑ warfarin (Coumadin) effect (CYP2C9)", "Tendon rupture", "Pulmonary fibrosis", "Red man syndrome"], "ans": 0, "exp": "TMP-SMX → **hyperkalemia**, **pseudo-↑ SCr** (inhibits Cr secretion; GFR unchanged), **SJS/TEN**, ↑INR with warfarin (Coumadin); also **G6PD hemolysis** and kernicterus (avoid late pregnancy/neonates). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 46, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **Pneumocystis jirovecii pneumonia (PCP)**?", "opts": ["Azithromycin (Zithromax)", "TMP-SMX", "Doxycycline (Vibramycin)", "Metronidazole (Flagyl)"], "ans": 1, "exp": "**TMP-SMX** is first-line for **PCP** (treatment & prophylaxis); also covers **Stenotrophomonas, Nocardia, CA-MRSA.** *NABP: 3.C.2.*"}, {"id": 47, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **metronidazole (Flagyl)** for a *B. fragilis* intra-abdominal infection should be counseled to:", "opts": ["Avoid sunlight only", "Take it with milk", "Avoid alcohol (disulfiram-like reaction); watch for metallic taste/peripheral neuropathy", "Take an antacid with each dose"], "ans": 2, "exp": "⚠ **Metronidazole (Flagyl) + alcohol → disulfiram reaction** (flushing, vomiting) — avoid alcohol during and ~3 days after; covers **anaerobes & protozoa** (C. diff, BV, trichomonas, Giardia, amebiasis); ↑INR with warfarin (Coumadin). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 48, "group": "Other Antibiotic Classes", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which is true of **nitrofurantoin (Macrobid)**?", "opts": ["Reliably covers Pseudomonas", "Achieves high serum levels suitable for bacteremia", "First-line for pyelonephritis", "For uncomplicated cystitis ONLY; avoid if CrCl <30 and at term pregnancy/neonates; chronic use → pulmonary fibrosis"], "ans": 3, "exp": "**Nitrofurantoin (Macrobid) = lower UTI (cystitis) only** (no tissue/serum levels) → **not for pyelonephritis**; ⚠ avoid at low CrCl (**label <60; Beers/practice ~<30**), term pregnancy (38–42 wk)/neonates (hemolysis), G6PD; **pulmonary fibrosis** with chronic use. ✓ **Fosfomycin** = single-dose alternative for uncomplicated cystitis. *NABP: 3.C.2 / 3.C.5.*"}, {"id": 51, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Which class shows **concentration-dependent** killing (maximize Cmax/MIC)?", "opts": ["Aminoglycosides and fluoroquinolones", "Vancomycin (Vancocin)", "Clindamycin", "β-lactams"], "ans": 0, "exp": "**Aminoglycosides, FQs, daptomycin (Cubicin)** = concentration-dependent (+ post-antibiotic effect) → maximize **Cmax/MIC or AUC/MIC.** β-lactams/vancomycin (Vancocin) are time/AUC-dependent. *NABP: 1.A.2.*"}, {"id": 52, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "The PK/PD index best predicting **β-lactam** efficacy is:", "opts": ["Cmax/MIC", "%Time above MIC (fT>MIC)", "Post-antibiotic effect", "Single peak level"], "ans": 1, "exp": "β-lactams are **time-dependent** → **%fT>MIC** → use **extended/continuous infusions** (pip-tazo, cefepime) for serious gram-negatives. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 53, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": true, "nabp": "1.A.2", "stem": "Target for vancomycin (Vancocin) in serious MRSA infection (2020 guideline)?", "opts": ["100% T>MIC", "Trough 5–10", "AUC₂₄/MIC 400–600", "Cmax/MIC ≥10"], "ans": 2, "exp": "Vancomycin (Vancocin) is **AUC-dependent** → **AUC₂₄/MIC 400–600.** *NABP: 1.A.2.*"}, {"id": 54, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "A 100-kg patient with MRSA bacteremia. Vancomycin (Vancocin) **loading dose** at 25 mg/kg?", "opts": ["4000 mg", "1000 mg", "1500 mg", "2500 mg"], "ans": 3, "exp": "25 × 100 = **2500 mg** load (20–35 mg/kg for serious infection; cap ~3 g). *NABP: 1.C.4 / 3.D.2.*"}, {"id": 55, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4", "stem": "An 80-kg patient: vancomycin (Vancocin) **maintenance** at 15 mg/kg q12h?", "opts": ["1200 mg q12h", "2000 mg q12h", "400 mg q12h", "600 mg q12h"], "ans": 0, "exp": "15 × 80 = **1200 mg q12h** (then titrate by AUC/levels and renal function). *NABP: 1.C.4.*"}, {"id": 56, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "When is a vancomycin (Vancocin) **trough** drawn (trough-based monitoring)?", "opts": ["1 hour after the first dose", "At steady state (~just before the 4th dose), immediately pre-dose", "At any random time", "Only at the peak"], "ans": 1, "exp": "Draw the trough **at steady state (~before the 4th dose)**, right before the next dose. (AUC-Bayesian uses 1–2 earlier levels.) *NABP: 1.A.2 / 3.D.2.*"}, {"id": 57, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Target **Cmax/MIC** for extended-interval aminoglycoside efficacy?", "opts": ["0.5", "400–600", "≥8–10", "1–2"], "ans": 2, "exp": "Concentration-dependent → **peak/MIC ≥8–10.** *NABP: 1.A.2.*"}, {"id": 58, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4", "stem": "Extended-interval **gentamicin** at 7 mg/kg for a 70-kg patient (normal renal function)?", "opts": ["700 mg", "140 mg", "350 mg", "490 mg"], "ans": 3, "exp": "7 × 70 = **490 mg** once-daily (then use a nomogram/levels). *NABP: 1.C.4.*"}, {"id": 59, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.5", "stem": "Rationale and trough goal for **extended-interval (once-daily)** aminoglycoside dosing?", "opts": ["Exploits concentration-dependent killing + post-antibiotic effect; aim for an **undetectable trough** (less nephrotoxicity)", "Time-dependent killing; keep the trough high", "Eliminates ototoxicity entirely", "Requires no monitoring"], "ans": 0, "exp": "High peak + **PAE** allows a drug-free interval → **undetectable trough** lowers nephrotoxicity. ⚠ Avoid extended-interval in pregnancy, enterococcal-synergy endocarditis, severe/unstable renal function, burns, ascites. *NABP: 1.A.2 / 3.C.5.*"}, {"id": 60, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Traditional (multiple-daily) aminoglycoside dosing with **peak/trough** monitoring is preferred in:", "opts": ["Routine outpatient cystitis", "Enterococcal endocarditis (synergy), pregnancy, or unstable renal function", "All patients", "Never"], "ans": 1, "exp": "Use **traditional dosing** for **synergy (enterococcal endocarditis), pregnancy, significant/unstable renal impairment**; gentamicin synergy peak ~3–5, trough <1. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 61, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "The **post-antibiotic effect (PAE)** refers to:", "opts": ["The disulfiram reaction", "Resistance emerging after therapy", "Continued suppression of bacterial growth after drug levels fall below the MIC", "An allergic reaction"], "ans": 2, "exp": "**PAE** = persistent growth suppression after levels drop below MIC (prominent with aminoglycosides/FQs) → supports extended-interval dosing. *NABP: 1.A.2.*"}, {"id": 62, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "For **fluoroquinolones and daptomycin (Cubicin)**, efficacy correlates best with:", "opts": ["Trough only", "Total number of doses", "%T>MIC", "AUC/MIC (and Cmax/MIC) — concentration-dependent"], "ans": 3, "exp": "FQs/daptomycin (Cubicin) are **concentration-dependent** → **AUC/MIC** (≈ ≥125 for gram-negative FQ) and peak. *NABP: 1.A.2.*"}, {"id": 63, "group": "Pk/Pd & Tdm", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Why give **piperacillin-tazobactam or cefepime** as an extended (3–4 h) infusion for serious Pseudomonas infection?", "opts": ["To maximize **%T>MIC** (time-dependent killing)", "To raise the peak concentration", "To avoid TDM", "To reduce cost"], "ans": 0, "exp": "Prolonging the infusion **increases time above MIC** → better outcomes against high-MIC gram-negatives. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 64, "group": "Pk/Pd & Tdm", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "An aminoglycoside peak is 10 mg/L against an organism with MIC 1 mg/L. The Cmax/MIC ratio is:", "opts": ["5", "10", "0.1", "1"], "ans": 1, "exp": "10 ÷ 1 = **10** (meets the ≥8–10 target). *NABP: 1.C.4 / 1.A.2.*"}, {"id": 67, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Healthy outpatient, no comorbidities, **community-acquired pneumonia.** First-line (IDSA/ATS 2019)?", "opts": ["Amoxicillin (high-dose), doxycycline (Vibramycin), or a macrolide (where pneumococcal resistance <25%)", "Vancomycin (Vancocin)", "IV ceftriaxone + azithromycin (Zithromax)", "Meropenem"], "ans": 0, "exp": "Healthy outpatient CAP: **amoxicillin, doxycycline (Vibramycin), or a macrolide.** *NABP: 3.C.2.*"}, {"id": 68, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Outpatient CAP **with comorbidities** (COPD, diabetes, etc.). Preferred regimen?", "opts": ["Amoxicillin alone", "A respiratory fluoroquinolone (levofloxacin/moxifloxacin) OR a β-lactam + macrolide/doxycycline (Vibramycin)", "Doxycycline (Vibramycin) alone", "Nitrofurantoin (Macrobid)"], "ans": 1, "exp": "Comorbid outpatient CAP: **respiratory FQ**, or a **β-lactam (amox-clav/cefuroxime) + macrolide/doxycycline (Vibramycin).** *NABP: 3.C.2.*"}, {"id": 69, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Inpatient (non-ICU) **CAP** empiric therapy?", "opts": ["Vancomycin (Vancocin) monotherapy", "Metronidazole (Flagyl)", "β-lactam (ceftriaxone/ampicillin-sulbactam) + macrolide, OR a respiratory FQ", "Oral amoxicillin"], "ans": 2, "exp": "Inpatient CAP: **β-lactam + macrolide** or **respiratory FQ** (covers atypicals). Add MRSA/Pseudomonas coverage only with risk factors. *NABP: 3.C.2.*"}, {"id": 70, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Empiric **HAP/VAP** must reliably cover:", "opts": ["Anaerobes only", "S. pneumoniae only", "Atypicals only", "Pseudomonas + other gram-negatives, with MRSA coverage (vancomycin/linezolid (Zyvox)) when risk factors are present"], "ans": 3, "exp": "HAP/VAP: **antipseudomonal β-lactam** (pip-tazo/cefepime/meropenem) **± MRSA coverage** per risk; double gram-negative coverage if MDR risk. ℹ \"HCAP\" category retired. *NABP: 3.C.2.*"}, {"id": 71, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2", "stem": "First-line oral options for **uncomplicated cystitis** in women include all EXCEPT:", "opts": ["Moxifloxacin", "Nitrofurantoin (Macrobid)", "TMP-SMX (if local resistance <20%)", "Fosfomycin or pivmecillinam"], "ans": 0, "exp": "First-line uUTI: **nitrofurantoin (Macrobid), TMP-SMX, fosfomycin, pivmecillinam (Pivya, FDA 2024).** Fluoroquinolones are reserved, and **moxifloxacin isn't even renally excreted.** *NABP: 3.C.2.*"}, {"id": 72, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Outpatient **acute pyelonephritis** — appropriate empiric agent?", "opts": ["Nitrofurantoin (Macrobid)", "A fluoroquinolone (ciprofloxacin/levofloxacin (Levaquin)) or ceftriaxone", "Fosfomycin", "Moxifloxacin"], "ans": 1, "exp": "Pyelonephritis needs **renal/tissue levels** → **FQ or ceftriaxone**; ⚠ **nitrofurantoin (Macrobid)/fosfomycin fail** (no tissue levels). *NABP: 3.C.2.*"}, {"id": 73, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Nonpurulent **cellulitis** (no abscess), usually streptococcal. Preferred therapy?", "opts": ["Metronidazole (Flagyl)", "Vancomycin (Vancocin) for everyone", "Cephalexin or dicloxacillin (cover strep/MSSA)", "TMP-SMX alone"], "ans": 2, "exp": "Nonpurulent cellulitis → **β-lactam (cephalexin/dicloxacillin)**; routine MRSA coverage not needed unless systemic illness/risk. *NABP: 3.C.2.*"}, {"id": 74, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient has a purulent skin **abscess.** Best management?", "opts": ["Cephalexin alone", "Topical therapy only", "Antibiotics alone", "Incision & drainage; add MRSA-active oral therapy (TMP-SMX or doxycycline (Vibramycin)) if indicated"], "ans": 3, "exp": "**Purulent SSTI → I&D** (primary); add **MRSA-active oral** (TMP-SMX/doxy) for moderate/severe disease or systemic signs. *NABP: 3.C.2.*"}, {"id": 75, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for community **intra-abdominal infection** must cover:", "opts": ["Gram-negatives + anaerobes (pip-tazo, or ceftriaxone + metronidazole (Flagyl), or a carbapenem)", "MRSA + atypicals", "Pseudomonas only", "Anaerobes only"], "ans": 0, "exp": "Cover **enteric gram-negatives + anaerobes**: **pip-tazo**, **ceftriaxone + metronidazole (Flagyl)**, or a **carbapenem.** *NABP: 3.C.2.*"}, {"id": 76, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Empiric therapy for adult **bacterial meningitis** (age <50, immunocompetent)?", "opts": ["Meropenem + doxycycline (Vibramycin)", "Vancomycin (Vancocin) + ceftriaxone (+ dexamethasone for suspected pneumococcus)", "Ceftriaxone alone", "Ampicillin alone"], "ans": 1, "exp": "**Vancomycin (Vancocin) + ceftriaxone** (resistant pneumococcus); **add ampicillin if >50/immunocompromised** (Listeria); **dexamethasone** with/just before the first dose for S. pneumoniae. *NABP: 3.C.2.*"}, {"id": 77, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per 2021 IDSA/SHEA, preferred therapy for an **initial C. difficile** episode?", "opts": ["Oral vancomycin (Vancocin) given IV", "Oral metronidazole (Flagyl)", "Fidaxomicin (preferred) or oral vancomycin (Vancocin); metronidazole (Flagyl) only if neither is available", "IV vancomycin (Vancocin)"], "ans": 2, "exp": "ℹ 2021 update: **fidaxomicin preferred** (lower recurrence) or **oral vancomycin (Vancocin)**; **metronidazole (Flagyl)** reserved for when others are unavailable. ⚠ **IV vancomycin does not treat C. diff.** *NABP: 3.C.2.*"}, {"id": 78, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Fulminant C. difficile** (hypotension, ileus, megacolon) — treatment?", "opts": ["Fidaxomicin alone", "Observation", "Oral metronidazole (Flagyl) alone", "High-dose oral (± rectal) vancomycin (Vancocin) + IV metronidazole (Flagyl)"], "ans": 3, "exp": "Fulminant: **high-dose oral vancomycin (± rectal if ileus) + IV metronidazole (Flagyl)**; surgical consult. *NABP: 3.C.2.*"}, {"id": 79, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "For **recurrent C. difficile**, appropriate options include:", "opts": ["Fidaxomicin or a vancomycin (Vancocin) taper/pulse; bezlotoxumab to reduce recurrence; FMT for multiple recurrences", "IV vancomycin (Vancocin)", "No treatment", "A repeat identical metronidazole (Flagyl) course"], "ans": 0, "exp": "Recurrence: **fidaxomicin** or **vancomycin (Vancocin) taper-pulse**; **bezlotoxumab** (anti-toxin-B mAb) adjunct; **fecal microbiota transplant** for multiple recurrences. *NABP: 3.C.2.*"}, {"id": 80, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "In suspected **sepsis**, the key early antimicrobial principle is:", "opts": ["Wait for culture results before starting therapy", "Obtain cultures, then start broad-spectrum empiric antibiotics promptly (~within 1 hour) + source control", "Start narrow oral therapy", "Give antibiotics only after imaging"], "ans": 1, "exp": "**Cultures → prompt broad empiric antibiotics (~1 h)** + fluids + **source control**; de-escalate once cultures return. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 81, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **group A streptococcal pharyngitis**?", "opts": ["Ciprofloxacin (Cipro)", "Metronidazole (Flagyl)", "Penicillin or amoxicillin (macrolide/clindamycin if penicillin-allergic)", "Vancomycin (Vancocin)"], "ans": 2, "exp": "Strep throat: **penicillin/amoxicillin** (no documented GAS penicillin resistance); macrolide/clindamycin if PCN-allergic. *NABP: 3.C.2.*"}, {"id": 82, "group": "Syndromic Empiric Therapy", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per CDC 2021, treatment for **uncomplicated gonorrhea**?", "opts": ["Ciprofloxacin (Cipro) 500 mg PO", "Cefixime 800 mg + azithromycin (Zithromax)", "Azithromycin (Zithromax) 1 g PO once", "Ceftriaxone 500 mg IM once (1 g if ≥150 kg); add doxycycline (Vibramycin) if chlamydia is not excluded"], "ans": 3, "exp": "ℹ **Ceftriaxone 500 mg IM ×1** (1 g if ≥150 kg); **+ doxycycline (Vibramycin) 100 mg BID ×7 d** if chlamydia not excluded. Routine azithromycin (Zithromax) co-treatment was dropped. *NABP: 3.C.2.*"}, {"id": 85, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "The mechanism of **MRSA** resistance to β-lactams is:", "opts": ["**mecA gene → altered PBP2a** with low β-lactam affinity (target alteration)", "Efflux pump", "Porin loss", "β-lactamase that hydrolyzes the ring"], "ans": 0, "exp": "**mecA → PBP2a** → β-lactams can't bind → only ceftaroline (anti-PBP2a) and non-β-lactams (vanc/dapto/linezolid (Zyvox)) work. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 86, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**VRE** resistance to vancomycin (Vancocin) arises from:", "opts": ["β-lactamase", "**vanA/vanB → D-Ala-D-Lactate** terminus (altered target, ↓ vancomycin (Vancocin) binding)", "Efflux", "PBP2a"], "ans": 1, "exp": "**D-Ala-D-Ala → D-Ala-D-Lac** → vancomycin (Vancocin) can't bind → use **linezolid (Zyvox) or daptomycin (Cubicin).** *NABP: 1.A.1 / 3.C.2.*"}, {"id": 87, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An **ESBL**-producing E. coli is isolated. Best definitive therapy?", "opts": ["Aztreonam", "Ceftriaxone", "A carbapenem (e.g., meropenem/ertapenem)", "Ceftazidime"], "ans": 2, "exp": "**ESBLs hydrolyze penicillins, cephalosporins, and aztreonam** → **carbapenem is preferred** for serious infection. ⚠ Pip-tazo is inferior for serious ESBL bacteremia (MERINO). *NABP: 3.C.2.*"}, {"id": 88, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.A.2", "stem": "An **Enterobacter cloacae** (inducible **AmpC** β-lactamase) bloodstream infection. Which empiric β-lactam risks emergent resistance and should be avoided?", "opts": ["Imipenem", "Cefepime", "Meropenem", "A 3rd-generation cephalosporin (e.g., ceftriaxone)"], "ans": 3, "exp": "**AmpC organisms (Enterobacter, Citrobacter, Serratia)** can be **de-repressed** on 3rd-gen cephalosporins → treatment failure → prefer **cefepime or a carbapenem.** *NABP: 3.C.2 / 1.A.2.*"}, {"id": 89, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A **carbapenem-resistant Enterobacterales (CRE, KPC-type)** infection. Appropriate agent?", "opts": ["Ceftazidime-avibactam or meropenem-vaborbactam", "Ceftriaxone", "Ampicillin-sulbactam", "Meropenem alone"], "ans": 0, "exp": "**CRE-KPC** → **ceftazidime-avibactam, meropenem-vaborbactam, or imipenem-relebactam** (the inhibitors restore activity vs KPC serine carbapenemases). *NABP: 3.C.2.*"}, {"id": 90, "group": "Resistance & Newer Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "What do β-lactamase inhibitors (avibactam, vaborbactam, relebactam) contribute?", "opts": ["They are antibacterial on their own", "They inactivate β-lactamases (incl. KPC serine carbapenemases) to restore the partner β-lactam's activity", "They inhibit ribosomes", "They block efflux pumps"], "ans": 1, "exp": "Inhibitors **protect the partner β-lactam** by inactivating β-lactamases — avibactam/vaborbactam/relebactam cover **KPC** (serine carbapenemases). *NABP: 1.A.1.*"}, {"id": 91, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Ceftolozane-tazobactam** is most valued for:", "opts": ["Anaerobes", "MRSA", "Multidrug-resistant **Pseudomonas aeruginosa**", "VRE"], "ans": 2, "exp": "Ceftolozane-tazobactam is a leading agent for **MDR Pseudomonas** (also ESBL gram-negatives). *NABP: 3.C.2.*"}, {"id": 92, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 1.A.1", "stem": "**Cefiderocol** is best described as:", "opts": ["An oxazolidinone", "A polymyxin", "A macrolide", "A **siderophore cephalosporin** (\"Trojan horse\") active against CRE incl. metallo-β-lactamase (NDM) producers, Acinetobacter, and Stenotrophomonas"], "ans": 3, "exp": "**Cefiderocol** uses iron transport to enter gram-negatives → covers **difficult CRE (incl. MBL/NDM), Acinetobacter, Stenotrophomonas, Pseudomonas.** *NABP: 3.C.2 / 1.A.1.*"}, {"id": 93, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A CRE isolate produces a **metallo-β-lactamase (NDM)**. Which will likely FAIL?", "opts": ["Ceftazidime-avibactam (avibactam does not inhibit MBLs)", "Colistin", "(Historically) aztreonam-based combinations", "Cefiderocol"], "ans": 0, "exp": "**Avibactam/vaborbactam/relebactam do NOT inhibit MBLs (NDM/VIM/IMP)** → ceftazidime-avibactam fails alone; use **cefiderocol** (MBL-stable). *NABP: 3.C.2.*"}, {"id": 94, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "A core **antimicrobial stewardship** action after culture/susceptibility results return is:", "opts": ["Continue the broadest empiric regimen for the full course", "De-escalate to the narrowest effective agent (culture-directed therapy)", "Always add a second agent", "Stop monitoring"], "ans": 1, "exp": "**De-escalation / culture-directed therapy** narrows the regimen → less resistance, AEs, C. diff, cost. *NABP: 3.D.2 / 5.C.*"}, {"id": 95, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Criteria supporting an **IV-to-PO antibiotic switch** include:", "opts": ["Patient preference alone, regardless of status", "Persistent hypotension and NPO status", "Hemodynamic stability, improving clinically, tolerating oral intake, and an agent with high oral bioavailability", "Positive blood cultures only"], "ans": 2, "exp": "Switch when **stable + improving + tolerating PO**, using high-bioavailability orals (FQs, linezolid (Zyvox), metronidazole (Flagyl), TMP-SMX, fluconazole (Diflucan)). *NABP: 3.D.2.*"}, {"id": 96, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Empiric antibiotic selection should be guided primarily by:", "opts": ["The broadest agent for everyone", "Whatever was used last time", "The most expensive available drug", "The local antibiogram, likely pathogens, and patient/site factors"], "ans": 3, "exp": "Use the **local antibiogram + likely pathogens + site/patient factors**; then de-escalate by culture. *NABP: 3.D.2 / 5.C.*"}, {"id": 97, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Regarding **duration of therapy**, current stewardship favors:", "opts": ["The **shortest effective evidence-based course** (e.g., many infections 5–7 days)", "Always 14 days", "Treating until all symptoms vanish completely", "The longest tolerated course"], "ans": 0, "exp": "Evidence supports **shorter courses** for many infections (CAP ~5 d, uncomplicated cystitis 3–5 d) → less resistance/AEs. *NABP: 3.D.2.*"}, {"id": 98, "group": "Resistance & Newer Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which combination of **organism → preferred drug** is correct?", "opts": ["MRSA → ceftriaxone", "CRE (KPC) → ceftazidime-avibactam", "VRE → vancomycin (Vancocin)", "ESBL → ceftazidime"], "ans": 1, "exp": "**CRE-KPC → ceftazidime-avibactam.** (MRSA→vanc/dapto/linezolid (Zyvox)/ceftaroline; VRE→linezolid/dapto; ESBL→carbapenem.) *NABP: 3.C.2.*"}, {"id": 101, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Zosyn** is the brand name for:", "opts": ["piperacillin-tazobactam", "amoxicillin-clavulanate", "ceftolozane-tazobactam", "ampicillin-sulbactam"], "ans": 0, "exp": "Zosyn = **piperacillin-tazobactam** (antipseudomonal + anaerobic). *NABP: 2.A.1.*"}, {"id": 102, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Augmentin** and **Unasyn** are, respectively:", "opts": ["amox-clav and pip-tazo", "amoxicillin-clavulanate (PO) and ampicillin-sulbactam (IV)", "ampicillin-sulbactam and amoxicillin-clavulanate", "pip-tazo and amox-clav"], "ans": 1, "exp": "**Augmentin = amoxicillin-clavulanate**; **Unasyn = ampicillin-sulbactam.** *NABP: 2.A.1.*"}, {"id": 103, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Cephalosporin brands **Ancef, Keflex, Rocephin, Maxipime** are:", "opts": ["ceftriaxone, cefepime, cefazolin, cephalexin", "cefepime, ceftriaxone, cephalexin, cefazolin", "cefazolin, cephalexin, ceftriaxone, cefepime", "cephalexin, cefazolin, cefepime, ceftriaxone"], "ans": 2, "exp": "Ancef=**cefazolin** (1st, IV), Keflex=**cephalexin** (1st, PO), Rocephin=**ceftriaxone** (3rd), Maxipime=**cefepime** (4th). *NABP: 2.A.1.*"}, {"id": 104, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Bactrim/Septra** and **Macrobid** are:", "opts": ["nitrofurantoin and TMP-SMX", "TMP-SMX and fosfomycin", "metronidazole and nitrofurantoin", "TMP-SMX and nitrofurantoin"], "ans": 3, "exp": "Bactrim/Septra = **TMP-SMX**; Macrobid = **nitrofurantoin (Macrobid).** *NABP: 2.A.1.*"}, {"id": 105, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Anti-MRSA brands **Vancocin, Zyvox, Cubicin, Teflaro** are:", "opts": ["vancomycin, linezolid, daptomycin, ceftaroline", "linezolid, vancomycin, ceftaroline, daptomycin", "daptomycin, ceftaroline, vancomycin, linezolid", "vancomycin, daptomycin, linezolid, ceftaroline"], "ans": 0, "exp": "Vancocin=**vancomycin (Vancocin)**, Zyvox=**linezolid (Zyvox)**, Cubicin=**daptomycin (Cubicin)**, Teflaro=**ceftaroline.** *NABP: 2.A.1.*"}, {"id": 106, "group": "Antibacterial Drug Essentials", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Cipro, Levaquin, Avelox, Zithromax, Biaxin** are:", "opts": ["ciprofloxacin, levofloxacin, moxifloxacin, clarithromycin, azithromycin", "ciprofloxacin, levofloxacin, moxifloxacin, azithromycin, clarithromycin", "levofloxacin, ciprofloxacin, azithromycin, moxifloxacin, clarithromycin", "ciprofloxacin, moxifloxacin, levofloxacin, clarithromycin, azithromycin"], "ans": 1, "exp": "Cipro=ciprofloxacin (Cipro), Levaquin=**levofloxacin (Levaquin)**, Avelox=**moxifloxacin**, Zithromax=**azithromycin (Zithromax)**, Biaxin=**clarithromycin.** *NABP: 2.A.1.*"}, {"id": 107, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "First-line dosing for **pediatric acute otitis media** (high-dose amoxicillin)?", "opts": ["20 mg/kg/day", "40 mg/kg/day once daily", "80–90 mg/kg/day divided BID", "10 mg/kg/day"], "ans": 2, "exp": "**High-dose amoxicillin 80–90 mg/kg/day ÷ BID** (overcomes intermediate pneumococcal resistance); use amox-clav if recent antibiotics/failure. *NABP: 1.C.4 / 3.C.2.*"}, {"id": 108, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "The azithromycin (Zithromax) **\"Z-Pak\"** regimen is:", "opts": ["1 g once", "500 mg BID ×7", "250 mg daily ×3", "500 mg ×1, then 250 mg daily on days 2–5"], "ans": 3, "exp": "**500 mg day 1, then 250 mg daily days 2–5** (long tissue half-life extends the effective course). *NABP: 1.C.4.*"}, {"id": 109, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "Dosing distinction for **TMP-SMX** in *Pneumocystis* (PCP)?", "opts": ["Treatment = 15–20 mg/kg/day (TMP) ÷ q6–8h ×21 d; prophylaxis = 1 DS tab daily (or SS daily / DS 3×/wk)", "Treatment is a single dose", "Prophylaxis is 15 mg/kg/day", "Same dose for treatment and prophylaxis"], "ans": 0, "exp": "**PCP treatment** = high-dose **weight-based (TMP 15–20 mg/kg/day) ×21 d**; **prophylaxis** = **1 DS tab daily** (start at CD4 <200). *NABP: 1.C.4 / 3.C.2.*"}, {"id": 110, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Key monitoring for **vancomycin (Vancocin)**?", "opts": ["Liver enzymes only", "AUC (or trough) + serum creatinine/renal function (± CBC for prolonged courses)", "A coagulation panel", "Thyroid function"], "ans": 1, "exp": "Follow **AUC/trough + SCr/renal function**; ⚠ nephrotoxicity (worse with pip-tazo/aminoglycosides), infusion-rate flushing. *NABP: 3.D.2 / 3.C.5.*"}, {"id": 111, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Monitoring for **aminoglycosides**?", "opts": ["CPK weekly", "CBC only", "Serum peak/trough levels, SCr/BUN, urine output, and hearing/vestibular checks", "INR only"], "ans": 2, "exp": "**Levels + renal function + audiometry/vestibular** (nephro- and ototoxicity). *NABP: 3.D.2 / 3.C.5.*"}, {"id": 112, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "A patient on **linezolid (Zyvox)** for 3 weeks — which lab is monitored?", "opts": ["INR", "Lipase", "CPK", "Weekly CBC/platelets (myelosuppression risk)"], "ans": 3, "exp": "**Weekly CBC** (thrombocytopenia/anemia with >2 wk); also serotonin syndrome and tyramine/BP cautions. *NABP: 3.C.5 / 3.C.3.*"}, {"id": 113, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A patient on **daptomycin (Cubicin)** — which lab to follow?", "opts": ["Weekly CPK (myopathy/rhabdomyolysis)", "TSH", "INR", "Amylase"], "ans": 0, "exp": "**Weekly CPK**; hold statins; watch for eosinophilic pneumonia. *NABP: 3.C.5.*"}, {"id": 114, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Monitoring/labs for **TMP-SMX**?", "opts": ["Coagulation studies only", "CBC, serum potassium, and SCr (+ CrCl for dosing)", "CPK only", "TSH"], "ans": 1, "exp": "**CBC** (cytopenias), **K** (hyperkalemia), **SCr** (pseudo-rise; dose by CrCl); watch rash/SJS and sun exposure. *NABP: 3.C.5 / 3.C.3.*"}, {"id": 115, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Which class set is generally **avoided in young children** for a class-specific toxicity?", "opts": ["Cephalosporins — all contraindicated", "Penicillins — rash", "Fluoroquinolones (cartilage/tendon) and tetracyclines (<8 yr, teeth/bone); ceftriaxone in neonates; sulfonamides near term/neonates (kernicterus)", "Macrolides — QT"], "ans": 2, "exp": "Peds cautions: **FQ (arthropathy), tetracyclines <8 yr (teeth), ceftriaxone neonates (kernicterus/Ca precipitation), sulfonamides in neonates/near term (kernicterus).** *NABP: 2.A.4 / 3.C.2.*"}, {"id": 116, "group": "Antibacterial Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.C.3", "stem": "Counseling/typical dosing for **metronidazole (Flagyl)** for an anaerobic infection?", "opts": ["100 mg once weekly", "1 g IV once; alcohol is fine", "250 mg once daily with alcohol", "500 mg PO TID; avoid alcohol (disulfiram reaction); metallic taste"], "ans": 3, "exp": "**Metronidazole (Flagyl) 500 mg PO TID** for anaerobic infections; **avoid alcohol**; metallic taste, peripheral neuropathy with prolonged use. ⚠ For **C. diff**, metronidazole (500 mg TID) is now **second-line** — first-line is **oral vancomycin (Vancocin) 125 mg QID** or **fidaxomicin.** *NABP: 1.C.4 / 3.C.3.*"}, {"id": 119, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which antibiotic class is generally considered **safe in pregnancy**?", "opts": ["Penicillins/cephalosporins (and azithromycin (Zithromax))", "Sulfonamides at term", "Fluoroquinolones", "Tetracyclines"], "ans": 0, "exp": "**β-lactams and azithromycin (Zithromax)** are pregnancy-preferred; ⚠ avoid **FQ (cartilage), tetracyclines (teeth/bone), and sulfonamides/nitrofurantoin (Macrobid) near term.** *NABP: 3.C.2 / 2.A.4.*"}, {"id": 120, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A pregnant patient has **asymptomatic bacteriuria.** Best approach?", "opts": ["Do not treat unless symptomatic", "Treat it (↑ pyelonephritis/preterm risk) with a β-lactam (amox-clav/cephalexin), nitrofurantoin (not near term), or fosfomycin", "Treat with ciprofloxacin (Cipro)", "Treat with doxycycline (Vibramycin)"], "ans": 1, "exp": "⚠ Unlike non-pregnant adults, **asymptomatic bacteriuria is treated in pregnancy**; use pregnancy-safe agents (avoid FQ/tetracyclines). *NABP: 3.C.2.*"}, {"id": 121, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Why avoid **sulfonamides and nitrofurantoin (Macrobid) near term** (38–42 weeks)?", "opts": ["Maternal nephrotoxicity", "Maternal hepatotoxicity", "Neonatal hemolysis and kernicterus risk (bilirubin displacement)", "Teratogenic limb defects"], "ans": 2, "exp": "Near term they risk **neonatal hemolysis (nitrofurantoin/G6PD) and kernicterus (sulfonamide bilirubin displacement).** (Sulfonamides also avoided 1st trimester — folate antagonism.) *NABP: 2.A.4 / 3.C.5.*"}, {"id": 122, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Intrapartum **Group B Streptococcus (GBS) prophylaxis** — first-line agent?", "opts": ["Vancomycin (Vancocin) for everyone", "Azithromycin (Zithromax)", "Doxycycline (Vibramycin)", "Penicillin G (or ampicillin) IV"], "ans": 3, "exp": "**Penicillin G** (or ampicillin) intrapartum; **cefazolin** for low-risk PCN allergy; **clindamycin** only if isolate susceptible (high-risk allergy); **vancomycin (Vancocin)** if clindamycin-resistant. *NABP: 3.C.2.*"}, {"id": 123, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.5", "stem": "A **pregnant** patient with **syphilis** has a reported penicillin allergy. Correct management?", "opts": ["**Penicillin desensitization**, then treat with penicillin (only proven fetal-protective therapy)", "Defer treatment until delivery", "Use doxycycline (Vibramycin)", "Use azithromycin (Zithromax)"], "ans": 0, "exp": "**Penicillin is the only therapy that reliably treats fetal syphilis** → **desensitize** if allergic. (Doxycycline is contraindicated in pregnancy.) *NABP: 3.C.2 / 2.A.5.*"}, {"id": 124, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which antibiotic does NOT require renal dose adjustment?", "opts": ["Gentamicin", "Ceftriaxone", "Levofloxacin (Levaquin)", "Vancomycin (Vancocin)"], "ans": 1, "exp": "**Ceftriaxone (biliary)** — no renal adjustment; also **nafcillin/oxacillin, azithromycin (Zithromax), doxycycline (Vibramycin), linezolid (Zyvox), metronidazole (Flagyl), clindamycin, moxifloxacin** are not renally adjusted. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 125, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which set generally **requires renal dose adjustment**?", "opts": ["Nafcillin, moxifloxacin, doxycycline (Vibramycin)", "Azithromycin (Zithromax), doxycycline (Vibramycin), linezolid (Zyvox)", "Aminoglycosides, vancomycin (Vancocin), most β-lactams, levofloxacin (Levaquin)/ciprofloxacin (Cipro), TMP-SMX, daptomycin (Cubicin)", "Metronidazole (Flagyl), clindamycin, ceftriaxone"], "ans": 2, "exp": "**Renally cleared** agents need adjustment: aminoglycosides, vancomycin (Vancocin), most β-lactams, cipro/levo, TMP-SMX, daptomycin (Cubicin). *NABP: 1.A.2 / 3.D.2.*"}, {"id": 126, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Standard **surgical antibiotic prophylaxis** (clean/clean-contaminated) and timing?", "opts": ["Ceftriaxone for 7 days postop", "Vancomycin (Vancocin) for all patients", "Start antibiotics in the recovery room", "Cefazolin within 60 minutes before incision (vancomycin/FQ within 120 min); redose for long cases/blood loss; stop within 24 h"], "ans": 3, "exp": "**Cefazolin within 60 min of incision** (vancomycin/FQ within **120 min**), **redose** for prolonged surgery/major blood loss, **discontinue ≤24 h.** *NABP: 3.D.2 / 5.C.*"}, {"id": 127, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Prophylaxis for **colorectal surgery** differs how?", "opts": ["Add **anaerobic coverage** (e.g., cefazolin + metronidazole (Flagyl), or cefoxitin) ± **oral antibiotic bowel prep**", "Use vancomycin (Vancocin) alone", "Use azithromycin (Zithromax)", "No prophylaxis needed"], "ans": 0, "exp": "Colorectal cases need **anaerobic coverage** (Bacteroides) → cefazolin + metronidazole (Flagyl) or cefoxitin, often with **oral neomycin + metronidazole/erythromycin** bowel prep. *NABP: 3.D.2.*"}, {"id": 128, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 2.A.5", "stem": "Surgical prophylaxis for a patient with a **severe β-lactam allergy**?", "opts": ["Cefazolin", "Clindamycin or vancomycin (± an aminoglycoside for gram-negative coverage)", "Penicillin G", "No prophylaxis"], "ans": 1, "exp": "β-lactam-allergic → **clindamycin or vancomycin (Vancocin)** (± aminoglycoside/aztreonam for gram-negatives if needed). *NABP: 3.D.2 / 2.A.5.*"}, {"id": 129, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "Who needs **infective endocarditis prophylaxis** before a dental procedure (AHA)?", "opts": ["All patients over 65", "Everyone with a heart murmur", "Prosthetic valve/material, prior IE, certain congenital heart disease, or a cardiac transplant with valvulopathy", "Anyone with hypertension"], "ans": 2, "exp": "Only the **highest-risk cardiac conditions** (prosthetic valve, prior IE, specific CHD, transplant valvulopathy) for procedures **manipulating gingiva/periapical tissue or perforating oral mucosa.** *NABP: 3.D.2.*"}, {"id": 130, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.D.2", "stem": "Endocarditis prophylaxis regimen (AHA 2021)?", "opts": ["Vancomycin (Vancocin) 1 g IV", "Ciprofloxacin (Cipro) 500 mg", "Clindamycin 600 mg", "Amoxicillin 2 g PO 30–60 min before; if PCN-allergic, cephalexin, azithromycin (Zithromax)/clarithromycin, or doxycycline (Vibramycin)"], "ans": 3, "exp": "**Amoxicillin 2 g** (peds 50 mg/kg) 30–60 min pre-procedure; PCN allergy → **cephalexin/azithromycin (Zithromax)/doxycycline (Vibramycin).** ℹ **Clindamycin was removed in 2021** (C. diff/reactions). *NABP: 3.D.2.*"}, {"id": 131, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.B", "stem": "A close contact of a patient with **meningococcal meningitis** needs chemoprophylaxis. Options?", "opts": ["Rifampin (Rifadin), ciprofloxacin (Cipro), or ceftriaxone", "Vancomycin (Vancocin)", "Azithromycin (Zithromax) only", "Amoxicillin"], "ans": 0, "exp": "**Rifampin (Rifadin), ciprofloxacin (Cipro), or ceftriaxone** for close contacts of *N. meningitidis.* *NABP: 3.C.2 / 5.B.*"}, {"id": 132, "group": "Special Populations & Prophylaxis", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "Correct dosing-weight choice for these agents?", "opts": ["Vancomycin (Vancocin) uses ideal body weight; aminoglycosides use total body weight", "Vancomycin (Vancocin) uses actual (total) body weight; aminoglycosides use ideal body weight (adjusted body weight in obesity)", "Both use ideal body weight", "Both use actual body weight"], "ans": 1, "exp": "**Vancomycin (Vancocin) → actual body weight**; **aminoglycosides → ideal body weight** (use **adjusted body weight** if obese). *NABP: 1.C.4 / 3.D.2.*"}, {"id": 133, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 5.B", "stem": "Post-exposure prophylaxis for a close contact of **pertussis (whooping cough)**?", "opts": ["Vancomycin (Vancocin)", "Penicillin", "A macrolide (azithromycin)", "Doxycycline (Vibramycin)"], "ans": 2, "exp": "**Azithromycin (Zithromax)** (macrolide) for pertussis post-exposure prophylaxis and treatment. *NABP: 3.C.2 / 5.B.*"}, {"id": 134, "group": "Special Populations & Prophylaxis", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "For recurrent **MRSA** skin infections, an adjunctive **decolonization** strategy is:", "opts": ["IV daptomycin (Cubicin)", "Long-term oral cephalexin", "Oral vancomycin (Vancocin)", "Intranasal mupirocin + chlorhexidine body washes (± bleach baths)"], "ans": 3, "exp": "**Nasal mupirocin + chlorhexidine** (± dilute bleach baths) for decolonization in recurrent MRSA SSTI. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 137, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Standard initial regimen for **active drug-susceptible TB**?", "opts": ["RIPE (rifampin, isoniazid (INH), pyrazinamide, ethambutol) ×2 months, then isoniazid + rifampin (Rifadin) ×4 months", "Isoniazid (INH) alone ×9 months", "Azithromycin (Zithromax) + ethambutol", "Rifampin (Rifadin) monotherapy ×6 months"], "ans": 0, "exp": "**RIPE intensive phase ×2 mo → isoniazid (INH) + rifampin (Rifadin) continuation ×4 mo** (total **6 months**). *NABP: 3.C.2.*"}, {"id": 138, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A TB patient on **isoniazid (INH)** develops numbness/tingling of the feet. Cause and prevention?", "opts": ["Optic neuritis; give ethambutol", "Peripheral neuropathy from B6 depletion → give **pyridoxine (vitamin B6)**", "Hepatotoxicity; stop isoniazid (INH)", "Hyperuricemia; give allopurinol (Zyloprim)"], "ans": 1, "exp": "**Isoniazid (INH) depletes pyridoxine → peripheral neuropathy** → co-administer **B6** (esp. pregnancy, diabetes, alcoholism, HIV, malnutrition). *NABP: 3.C.5.*"}, {"id": 139, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Most important routine monitoring shared by **isoniazid (INH), rifampin (Rifadin), and pyrazinamide**?", "opts": ["Visual acuity", "Uric acid only", "Liver function tests (hepatotoxicity)", "CPK"], "ans": 2, "exp": "All three are **hepatotoxic** → baseline + periodic **LFTs**; counsel on hepatitis symptoms and avoiding alcohol. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 140, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for a patient starting **rifampin (Rifadin)**?", "opts": ["It causes blue-gray skin", "It must be taken with grapefruit", "It is nephrotoxic", "It turns urine/tears/sweat orange-red and can permanently stain soft contact lenses"], "ans": 3, "exp": "**Rifampin (Rifadin) → harmless orange-red body fluids** — warn about **soft contact lens staining.** *NABP: 3.E.2.*"}, {"id": 141, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "Why is **rifampin (Rifadin)** a major source of drug interactions?", "opts": ["It is a potent CYP3A4 (and broad CYP/P-gp) **inducer** → ↓ levels of warfarin (Coumadin), oral contraceptives, and many HIV drugs", "It is a strong CYP inhibitor", "It chelates cations", "It markedly prolongs the QT interval"], "ans": 0, "exp": "**Rifampin (Rifadin) is a potent enzyme inducer** → ↓ OC efficacy (use backup), ↓ warfarin (Coumadin) effect, ↓ protease inhibitors/many drugs. ✓ **Rifabutin** induces less. *NABP: 3.C.3.*"}, {"id": 142, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A TB patient on **pyrazinamide** develops a gout flare. Mechanism?", "opts": ["Optic neuritis", "Hyperuricemia (pyrazinamide reduces uric-acid excretion) → gout/arthralgia", "Direct hepatotoxicity", "Peripheral neuropathy"], "ans": 1, "exp": "**Pyrazinamide → hyperuricemia** (inhibits urate excretion) → gout/arthralgia; it is also hepatotoxic. *NABP: 3.C.5.*"}, {"id": 143, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which TB drug requires baseline/periodic **visual acuity and color-vision** testing?", "opts": ["Isoniazid (INH)", "Rifampin (Rifadin)", "Ethambutol (optic neuritis — red-green color loss)", "Pyrazinamide"], "ans": 2, "exp": "**Ethambutol → optic neuritis** (↓ acuity, red-green deficit) → monitor vision; renally dose-adjusted. *NABP: 3.C.5.*"}, {"id": 144, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "**Pyridoxine (B6)** is co-administered with isoniazid (INH) especially in:", "opts": ["Children only", "No one routinely", "Renal failure only", "Pregnancy, diabetes, alcoholism, HIV, or malnutrition (higher neuropathy risk)"], "ans": 3, "exp": "Give **B6** to higher-risk groups (and commonly to all) to prevent neuropathy. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 145, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Preferred **latent TB infection (LTBI)** regimens per CDC?", "opts": ["Short rifamycin-based: 3HP (isoniazid + rifapentine (Priftin) weekly ×12 wk), 4R (rifampin daily ×4 mo), or 3HR (isoniazid + rifampin (Rifadin) ×3 mo)", "RIPE ×6 months", "A single dose of azithromycin (Zithromax)", "Isoniazid (INH) ×9 months only"], "ans": 0, "exp": "CDC now **prefers the short rifamycin-based LTBI regimens** (3HP/4R/3HR) over 6–9-month isoniazid (higher completion). *NABP: 3.C.2.*"}, {"id": 146, "group": "Tuberculosis & Mycobacteria", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Match MOA — **isoniazid (INH)** and **rifampin (Rifadin)**?", "opts": ["Isoniazid (INH) inhibits RNA polymerase; rifampin (Rifadin) inhibits folate", "Isoniazid (INH) inhibits mycolic acid synthesis; rifampin (Rifadin) inhibits DNA-dependent RNA polymerase", "Both inhibit the ribosome", "Both inhibit cell wall via PBPs"], "ans": 1, "exp": "**Isoniazid (INH) → mycolic acid (cell wall)**; **rifampin (Rifadin) → bacterial RNA polymerase.** *NABP: 1.A.1.*"}, {"id": 147, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "An HIV patient on a **protease inhibitor** needs TB therapy. Preferred rifamycin?", "opts": ["Double-dose rifampin (Rifadin)", "Rifampin (strongest inducer)", "Rifabutin (weaker CYP3A4 induction → fewer PI interactions)", "No rifamycin at all"], "ans": 2, "exp": "**Rifabutin** replaces rifampin (Rifadin) alongside HIV protease inhibitors/some ART (less enzyme induction). *NABP: 3.C.3.*"}, {"id": 148, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Active TB treatment in **pregnancy** (US practice)?", "opts": ["A streptomycin-based regimen", "Fluoroquinolone monotherapy", "Avoid all TB drugs until delivery", "Isoniazid (INH) + rifampin (Rifadin) + ethambutol (+ pyridoxine); pyrazinamide commonly deferred in the US"], "ans": 3, "exp": "US pregnancy regimen: **INH + RIF + EMB + pyridoxine**; ⚠ **streptomycin is contraindicated** (fetal ototoxicity); pyrazinamide often deferred in the US. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 149, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2 / 5.C", "stem": "Main rationale for **directly observed therapy (DOT)** in TB?", "opts": ["To ensure adherence and prevent resistance/relapse", "To avoid monitoring labs", "To shorten therapy to 1 month", "To reduce drug cost"], "ans": 0, "exp": "**DOT** ensures completion → prevents **resistance/relapse** (a public-health priority). *NABP: 3.D.2 / 5.C.*"}, {"id": 150, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Appropriate **baseline/monitoring** for RIPE?", "opts": ["Thyroid studies", "LFTs (all), visual acuity/color vision (ethambutol), and uric acid if symptomatic (pyrazinamide)", "Echocardiogram", "A coagulation panel"], "ans": 1, "exp": "**LFTs** (hepatotoxic trio) + **vision** (ethambutol) + **uric acid** (pyrazinamide, if gouty symptoms). *NABP: 3.D.2 / 3.C.5.*"}, {"id": 151, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Multidrug-resistant TB (MDR-TB)** is defined as resistance to at least:", "opts": ["All four RIPE drugs", "Ethambutol + pyrazinamide", "Isoniazid (INH) + rifampin (the two most potent first-line drugs)", "Any single drug"], "ans": 2, "exp": "**MDR-TB = resistance to ≥ isoniazid (INH) AND rifampin (Rifadin)** → prolonged second-line therapy. *NABP: 3.C.2.*"}, {"id": 152, "group": "Tuberculosis & Mycobacteria", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which TB drug → adverse-effect pairing is **INCORRECT**?", "opts": ["Isoniazid (INH) → peripheral neuropathy/hepatotoxicity", "Rifampin (Rifadin) → orange fluids/enzyme induction", "Ethambutol → optic neuritis", "Pyrazinamide → optic neuritis"], "ans": 3, "exp": "**Pyrazinamide → hyperuricemia/hepatotoxicity** (optic neuritis is **ethambutol**). *NABP: 3.C.5.*"}, {"id": 155, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for **nitrofurantoin (Macrobid)**?", "opts": ["Take with food (↑ absorption, ↓ GI upset); urine may turn brown (harmless); complete the full course", "Crush and dissolve in juice", "Restrict all fluids", "Take on an empty stomach; expect no urine change"], "ans": 0, "exp": "**Take with food** (better absorption/tolerability); **harmless brown urine**; finish the course. *NABP: 3.E.2.*"}, {"id": 156, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "A patient on **ciprofloxacin (Cipro)** also takes calcium, iron, and an antacid. Best counseling?", "opts": ["No interaction — take together", "Separate the fluoroquinolone from antacids/dairy/iron/calcium/sucralfate (Carafate)/multivitamins (~2 h before or 6 h after) — cation chelation ↓ absorption", "Stop the calcium permanently", "Double the ciprofloxacin (Cipro) dose"], "ans": 1, "exp": "**Di/trivalent cations chelate FQs** → markedly ↓ absorption → **separate dosing**; also counsel on photosensitivity. *NABP: 3.C.3 / 3.E.2.*"}, {"id": 157, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "A patient on **linezolid (Zyvox)** should avoid:", "opts": ["Dairy only", "Citrus fruit", "Tyramine-rich foods (aged cheese, cured/smoked meats, tap beer) and serotonergic/adrenergic drugs (MAOI activity)", "High-fiber foods"], "ans": 2, "exp": "Linezolid (Zyvox) = **reversible MAOI** → ⚠ **tyramine** (hypertensive reaction) and **serotonergic** drugs (serotonin syndrome). *NABP: 3.C.3 / 3.E.2.*"}, {"id": 158, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.5", "stem": "Counseling for **clindamycin**?", "opts": ["Expect orange urine", "Avoid sunlight only", "Take on an empty stomach with milk", "Report new or persistent diarrhea (C. difficile risk); take with a full glass of water (esophageal irritation)"], "ans": 3, "exp": "⚠ **Clindamycin → C. difficile** (report diarrhea promptly); take with **a full glass of water** (pill esophagitis). *NABP: 3.E.2 / 3.C.5.*"}, {"id": 159, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A warfarin (Coumadin) patient is prescribed **TMP-SMX.** Key concern?", "opts": ["↑ INR/bleeding — sulfamethoxazole inhibits CYP2C9 (+ protein-binding displacement) → monitor INR", "No interaction", "Chelation reduces absorption", "↓ INR (enzyme induction)"], "ans": 0, "exp": "**TMP-SMX markedly ↑ INR** → monitor closely/adjust warfarin (also hyperkalemia). *NABP: 3.C.3.*"}, {"id": 160, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "Counseling/interaction for **metronidazole (Flagyl)**?", "opts": ["Always take with antacids", "Avoid alcohol (disulfiram-like reaction) during therapy and ~3 days after; it ↑ warfarin (Coumadin)'s INR", "Alcohol is fine", "It ↓ INR"], "ans": 1, "exp": "**No alcohol** (flushing/vomiting/tachycardia); **↑ INR** with warfarin (monitor). *NABP: 3.C.3 / 3.E.2.*"}, {"id": 161, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which combination most increases **ototoxicity** risk?", "opts": ["Doxycycline (Vibramycin) + iron", "Cephalexin + food", "An aminoglycoside + a loop diuretic (furosemide)", "Penicillin + acetaminophen"], "ans": 2, "exp": "**Aminoglycoside + loop diuretic → additive ototoxicity** (also avoid concurrent nephrotoxins and neuromuscular blockers). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 162, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Co-administering **vancomycin (Vancocin) with piperacillin-tazobactam** raises the risk of:", "opts": ["Tendon rupture", "Hypoglycemia", "QT prolongation", "Acute kidney injury (additive nephrotoxicity) — monitor SCr"], "ans": 3, "exp": "**Vancomycin (Vancocin) + pip-tazo → ↑ AKI** → monitor **renal function**; consider alternative combinations. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 163, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A diabetic on a **sulfonylurea** starts a **fluoroquinolone.** Monitor for?", "opts": ["Dysglycemia — especially hypoglycemia (also hyperglycemia); monitor blood glucose", "Hyperkalemia", "QT shortening", "Hyperthyroidism"], "ans": 0, "exp": "**FQs disturb glucose homeostasis** (hypo- or hyperglycemia), additive with sulfonylureas/insulin → **monitor glucose.** *NABP: 3.C.3 / 3.C.5.*"}, {"id": 164, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "Which combination carries the greatest **QT-prolongation/torsades** risk?", "opts": ["Cephalexin + ibuprofen", "A macrolide + a fluoroquinolone + ondansetron (or an antipsychotic)", "Amoxicillin + acetaminophen", "Doxycycline (Vibramycin) + iron"], "ans": 1, "exp": "Additive **QT prolongation** with macrolide + FQ + other QT drugs → review ECG/electrolytes. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 165, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which patient should generally **avoid a fluoroquinolone**?", "opts": ["A patient taking a statin", "A healthy adult with cystitis and no alternatives", "A patient with myasthenia gravis, a known aortic aneurysm, or a prior tendon disorder (also pregnancy/children)", "A patient with a sulfa allergy"], "ans": 2, "exp": "FQ cautions/CIs: **myasthenia gravis (exacerbation), aortic aneurysm/dissection, tendon disorders**, pregnancy/peds → reserve for when no alternative exists. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 166, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Contraindications/cautions for **nitrofurantoin (Macrobid)**?", "opts": ["Diabetes", "Hypertension", "Penicillin allergy", "G6PD deficiency (hemolysis), CrCl <30 (inadequate urinary levels), and term pregnancy/neonates"], "ans": 3, "exp": "⚠ Avoid in **G6PD deficiency, low CrCl, term pregnancy/neonates**; chronic use → pulmonary fibrosis. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 167, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.5", "stem": "Counseling to reduce **TMP-SMX (sulfonamide)** crystalluria and toxicity?", "opts": ["Maintain adequate hydration; report rash (SJS) and avoid excess sun; avoid with sulfa allergy/G6PD", "Take with antacids", "Acidify the urine", "Restrict fluids"], "ans": 0, "exp": "**Hydrate** (crystalluria), watch for **rash/SJS** and photosensitivity; avoid in **sulfa allergy/G6PD.** *NABP: 3.E.2 / 3.C.5.*"}, {"id": 168, "group": "Counseling, Ae/Ci & Interactions", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which agents have **high oral bioavailability** (good IV→PO step-down candidates)?", "opts": ["Vancomycin (Vancocin) and aminoglycosides", "Fluoroquinolones, linezolid (Zyvox), metronidazole (Flagyl), doxycycline (Vibramycin), TMP-SMX, fluconazole (Diflucan), clindamycin", "Penicillin G and ceftriaxone", "Daptomycin (Cubicin)"], "ans": 1, "exp": "These orals approach IV exposure → **step-down therapy.** (Vancomycin/aminoglycosides/daptomycin (Cubicin) lack useful oral systemic absorption.) *NABP: 1.A.2 / 3.D.2.*"}, {"id": 169, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for **amoxicillin-clavulanate (Augmentin)** and the **amoxicillin suspension**?", "opts": ["Avoid all dairy", "Crush the extended-release tablets", "Take Augmentin with food (↓ GI upset from clavulanate); refrigerate the reconstituted suspension and discard after 10 days", "Take on an empty stomach; store at room temperature indefinitely"], "ans": 2, "exp": "**Augmentin with food** (clavulanate GI); **refrigerate** the reconstituted suspension, **discard after 10 days** (plain amoxicillin suspension = 14 days); complete the course. *NABP: 3.E.2.*"}, {"id": 170, "group": "Counseling, Ae/Ci & Interactions", "domain": "D3", "tier":
