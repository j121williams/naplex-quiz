<style>
:root{--navy:#1F3864;--steel:#2E5F8A;--green:#1E5C2E;--ok:#1E5C2E;--bad:#9B2226;--bg:#f5f6f8;--card:#fff;--ink:#1d2430;--muted:#5b6675}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--navy);color:#fff;padding:14px 18px}header h1{margin:0;font-size:18px}header .sub{opacity:.85;font-size:12px;margin-top:2px}
.wrap{max-width:800px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid #e3e7ee;border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:12px}
h2.sec{font-size:15px;margin:2px 0 10px;color:var(--navy)}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode{border:2px solid #d7deea;border-radius:10px;padding:12px;cursor:pointer;text-align:center;font-weight:700;color:var(--navy)}
.mode small{display:block;font-weight:400;color:var(--muted);margin-top:3px}.mode.on{border-color:var(--steel);background:#f0f6fd}
.topics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.topic{display:flex;align-items:center;gap:8px;border:1px solid #d7deea;border-radius:9px;padding:9px 11px;cursor:pointer;font-size:13.5px}
.topic.on{border-color:var(--green);background:#eef7ef}.topic input{accent-color:var(--green)}.topic .ct{margin-left:auto;font-size:11px;color:var(--muted)}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:10px}.row label{font-size:13px;color:var(--muted)}
.row select{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db;background:#fff}
.start{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.start:disabled{opacity:.5;cursor:default}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px}.bar button{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #c9d0db;background:#fff;cursor:pointer}.stat{font-size:13px;color:var(--muted);margin-left:auto}
.prog{height:6px;background:#e3e7ee;border-radius:4px;overflow:hidden;margin-bottom:12px}.prog>div{height:100%;background:var(--green);width:0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.b-t1{background:#e2efda;color:#1E5C2E}.b-t2{background:#fff2cc;color:#7a5b00}.b-t3{background:#ffe2e2;color:#9B2226}.b-dom{background:#dee9f6;color:#1F3864}.b-grp{background:#eee;color:#444}.b-aw{background:#ddeeff;color:#17375E}
.stem{font-size:16px;font-weight:600;line-height:1.45;margin:4px 0 14px}
.opt{display:block;width:100%;text-align:left;border:1px solid #c9d0db;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:14.5px;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--steel)}.opt .k{display:inline-block;width:22px;font-weight:700;color:var(--steel)}.opt.sel{border-color:var(--steel);background:#f0f6fd}.opt.correct{border-color:var(--ok);background:#e8f5ea}.opt.wrong{border-color:var(--bad);background:#fdeced}.opt[disabled]{cursor:default}
.exp{margin-top:12px;padding:12px 14px;border-left:4px solid var(--steel);background:#f7f9fc;border-radius:6px;font-size:14px;line-height:1.55;display:none}.exp.show{display:block}.exp .verdict{font-weight:800;margin-bottom:4px}
.actions{display:flex;gap:10px;margin-top:14px}.actions button{flex:1;padding:11px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.check{background:var(--steel);color:#fff}.check:disabled{opacity:.5;cursor:default}.next{background:var(--navy);color:#fff}
.done{text-align:center;padding:26px 16px}.done h2{margin:.2em 0}.score{font-size:42px;font-weight:800;color:var(--navy)}
b,strong{font-weight:700}em,i{font-style:italic}.foot{font-size:11px;color:var(--muted);text-align:center;margin:16px 0}
.bar button{cursor:pointer}.preset{padding:6px 10px!important}
.kpis{display:flex;gap:10px;margin-bottom:4px}.kpi{flex:1;text-align:center;background:#f7f9fc;border:1px solid #e3e7ee;border-radius:9px;padding:10px}.kpi b{font-size:22px;color:var(--navy);display:block}.kpi small{color:var(--muted);font-size:11px}
.ptable{width:100%;border-collapse:collapse;font-size:13px}.ptable th{text-align:left;color:var(--muted);font-weight:600;padding:4px 6px;border-bottom:1px solid #e3e7ee}.ptable td{padding:5px 6px;border-bottom:1px solid #f0f2f6;vertical-align:middle}
.meter{height:7px;background:#e3e7ee;border-radius:4px;overflow:hidden;width:90px}.meter>div{height:100%;background:var(--green)}
</style></head><body>

<script>
const ALL=[{"id": 1, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "Which set are the **four pillars** of guideline-directed therapy that reduce mortality in HFrEF?", "opts": ["ARNI/ACEi/ARB + β-blocker + MRA + SGLT2i", "ACEi + loop diuretic + digoxin (Lanoxin) + aspirin", "β-blocker + CCB + nitrate + statin", "ARB + thiazide + digoxin (Lanoxin) + warfarin (Coumadin)"], "ans": 0, "exp": "The quadruple foundation: **ARNI (sacubitril/valsartan (Diovan)) [or ACEi/ARB] + β-blocker + MRA + SGLT2i.** Diuretics/digoxin (Lanoxin) treat symptoms, not mortality. *Anchor: AHA/ACC/HFSA 2022. NABP: 3.C.2 / 3.D.1.*"}, {"id": 2, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 2.A.4", "stem": "A patient on lisinopril (Zestril) is switching to **sacubitril/valsartan (Entresto)**. Key step?", "opts": ["Start with the next scheduled dose", "Wait ≥36 hours after the last ACEi dose", "Overlap with lisinopril (Zestril) for 1 week", "Start only if the BNP is below 100"], "ans": 1, "exp": "Overlapping ACEi + neprilysin inhibition ↑ bradykinin → **angioedema** → require a **36-h washout.** ⚠ Never co-administer ARNI with an ACEi. *Anchor: PARADIGM-HF. NABP: 3.C.3 / 2.A.4.*"}, {"id": 3, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.1", "stem": "Which β-blockers have proven mortality benefit in HFrEF?", "opts": ["Atenolol, propranolol, and nadolol", "Metoprolol (Lopressor) tartrate, labetalol (Trandate), and sotalol (Betapace)", "Carvedilol (Coreg), metoprolol (Lopressor) succinate, and bisoprolol (Zebeta)", "Nebivolol, esmolol, and timolol"], "ans": 2, "exp": "Only **carvedilol (Coreg), metoprolol (Lopressor) succinate (ER), and bisoprolol (Zebeta)** are evidence-based in HFrEF. ⚠ Metoprolol **tartrate** (IR) is not the HF formulation. *NABP: 3.C.2 / 2.A.1.*"}, {"id": 4, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Newly diagnosed HFrEF: **K⁺ 5.6 mEq/L, eGFR 26.** Regarding an MRA (spironolactone)?", "opts": ["Start, adding a potassium supplement", "Start, pairing with a loop diuretic", "Start at full dose immediately", "Do not start — both values exceed thresholds"], "ans": 3, "exp": "Initiate an MRA only if **K ≤5.0** and **eGFR ≥30** (CrCl ≥30); recheck K/renal in 1 wk. ⚠ Hyperkalemia + advanced CKD → hold. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 5, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which statement about **SGLT2 inhibitors** in HFrEF is correct?", "opts": ["Reduce HF events regardless of diabetes; start at eGFR ≥20", "Contraindicated once the eGFR falls below 60", "Require concurrent insulin therapy to be effective", "Benefit only patients with established type 2 diabetes"], "ans": 0, "exp": "Dapagliflozin (Farxiga, DAPA-HF) and empagliflozin (Jardiance, EMPEROR-Reduced) benefit HFrEF **independent of diabetes.** *Anchor: DAPA-HF/EMPEROR-Reduced. NABP: 3.C.2.*"}, {"id": 6, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.1", "stem": "Newly diagnosed HFrEF, BP 116/72, K 4.2, eGFR 58. Best initiation strategy?", "opts": ["Add one pillar every few months in sequence", "Begin all four pillars early at low doses, then titrate", "Maximize each drug fully before adding the next", "Start a loop diuretic alone before any pillar"], "ans": 1, "exp": "Modern HFrEF care **starts all four classes early** (low-dose, then rapid titration — STRONG-HF), not sequential months-apart additions. ✓ Trap: \"max one before adding\" is outdated. *NABP: 3.D.1.*"}, {"id": 7, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "In a stable HFrEF patient tolerating an ACEi, guidelines favor:", "opts": ["Stopping all RAAS therapy entirely", "Continuing the ACEi indefinitely over an ARNI", "Replacing the ACEi with an ARNI for greater benefit", "Adding an ARB on top of the ACEi"], "ans": 2, "exp": "**ARNI is preferred over ACEi/ARB** in HFrEF (PARADIGM-HF) — switch when feasible (after 36-h washout). *NABP: 3.C.2.*"}, {"id": 8, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Which is an absolute **contraindication** to sacubitril/valsartan (Entresto)?", "opts": ["NYHA class II functional symptoms", "Age greater than 65 years at initiation", "An eGFR of 45 mL/min/1.73 m²", "Prior angioedema or current pregnancy"], "ans": 3, "exp": "⚠ CI: prior **angioedema**, **concurrent ACEi** (washout), and **pregnancy** (ARB fetotoxicity). Use cautiously w/ low BP/renal impairment. *NABP: 2.A.4 / 3.C.2.*"}, {"id": 9, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "After starting an MRA, the most important early monitoring is:", "opts": ["Potassium and renal function within ~1 week", "Thyroid-stimulating hormone (TSH)", "International normalized ratio (INR)", "Liver enzymes and serum lipids"], "ans": 0, "exp": "MRAs → **hyperkalemia + ↑ SCr** → check K/renal early and after dose changes. ✓ Spironolactone (Aldactone) gynecomastia → switch to **eplerenone (Inspra).** *NABP: 3.D.2.*"}, {"id": 10, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Correct β-blocker initiation in HFrEF?", "opts": ["Start at the full target dose right away", "Start low, double every ~2 weeks; avoid in decompensation", "Reserve only for HFpEF, never in HFrEF", "Give an IV loading dose before any oral therapy"], "ans": 1, "exp": "Up-titrate slowly to target; **avoid starting in decompensated/volume-overloaded** patients (negative inotropy). *NABP: 3.D.2.*"}, {"id": 11, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "HFrEF patient, **SBP 92 mmHg**, on all four pillars at low dose, mildly symptomatic. Best approach to preserve GDMT?", "opts": ["Add amlodipine (Norvasc) to support the blood pressure", "Stop the MRA and SGLT2i, the least vital pillars", "Trim the loop or nitrate first, keeping prognostic GDMT", "Stop all four pillars until BP recovers"], "ans": 2, "exp": "Protect mortality agents — trim **non-prognostic vasodilators/diuretics** first; **SGLT2i and MRA** lower BP least, so prioritize keeping them. ✓ Trap: don't reflexively stop GDMT for asymptomatic low BP. *NABP: 3.D.2.*"}, {"id": 12, "group": "HFrEF GDMT — The Four Pillars", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.3", "stem": "MOA of **sacubitril/valsartan (Entresto)**?", "opts": ["SGLT2 inhibition plus RAAS pathway blockade", "Aldosterone-receptor antagonism at the kidney", "Selective β₁-adrenergic receptor blockade", "Neprilysin inhibition + AT₁-receptor blockade"], "ans": 3, "exp": "Neprilysin inhibition raises natriuretic peptides (and bradykinin → angioedema risk); valsartan (Diovan) blocks AT1. ✓ Monitor **NT-proBNP** (BNP rises on ARNI). *NABP: 1.A.1 / 3.D.3.*"}, {"id": 13, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Add-on **hydralazine + isosorbide dinitrate** is specifically indicated for:", "opts": ["Black patients with NYHA III–IV HFrEF symptomatic on GDMT", "HFpEF patients with preserved ejection fraction", "Asymptomatic stage A at-risk patients", "All HFrEF patients as first-line therapy"], "ans": 0, "exp": "A-HeFT supports hydral/ISDN add-on in **self-identified Black patients** on optimal GDMT; also an option for **RAAS intolerance** (renal/hyperK). *Anchor: A-HeFT. NABP: 3.C.2.*"}, {"id": 16, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "A HFrEF patient cannot tolerate any ACEi/ARB/ARNI due to recurrent hyperkalemia and renal decline. Best RAAS-sparing substitute to retain vasodilator benefit?", "opts": ["Add a second β-blocker agent", "Hydralazine plus isosorbide dinitrate", "Amlodipine (Norvasc) for afterload reduction", "Diltiazem (Cardizem) for vasodilation"], "ans": 1, "exp": "When RAAS agents aren't tolerated, **hydralazine/ISDN** provides afterload/preload reduction with survival data. ⚠ Non-DHP CCBs (diltiazem/verapamil (Calan)) are avoided in HFrEF. *NABP: 3.C.2.*"}, {"id": 17, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which drug class has the strongest evidence to reduce HF events in **HFpEF/HFmrEF**?", "opts": ["Dihydropyridine calcium channel blockers", "ACE inhibitors such as lisinopril (Zestril)", "SGLT2 inhibitors (empagliflozin/dapagliflozin (Farxiga))", "Digoxin (Lanoxin) titrated to a low serum level"], "ans": 2, "exp": "SGLT2i (Jardiance/EMPEROR-Preserved, Farxiga/DELIVER) reduce HF hospitalization in **preserved/mildly-reduced EF** — the first class with clear HFpEF outcome benefit. *Anchor: EMPEROR-Preserved/DELIVER. NABP: 3.C.2.*"}, {"id": 18, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per FINEARTS-HF (2024), which agent reduces CV death/HF events in symptomatic HF with **LVEF ≥40%**?", "opts": ["Sacubitril/valsartan (an ARNI)", "Ivabradine (an If-current inhibitor)", "Spironolactone (a steroidal MRA)", "Finerenone (a nonsteroidal MRA)"], "ans": 3, "exp": "ℹ **NEW: finerenone (Kerendia)** cut CV death + total HF events ~16% in LVEF ≥40% (FINEARTS-HF), benefit independent of SGLT2i use. Monitor K. *Anchor: FINEARTS-HF. NABP: 3.C.2.*"}, {"id": 19, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "The cornerstone of **HFpEF** management is:", "opts": ["Treat comorbidities, decongest, and add an SGLT2 inhibitor", "Digoxin (Lanoxin) combined with long-acting nitrates", "No pharmacotherapy beyond lifestyle change", "Quadruple HFrEF GDMT at full target doses"], "ans": 0, "exp": "HFpEF is comorbidity-driven: control BP/AFib/weight, **decongest with diuretics**, add **SGLT2i** (± finerenone (Kerendia)). *NABP: 3.C.2 / 3.D.1.*"}, {"id": 20, "group": "HFpEF / HFmrEF", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.2", "stem": "How does **finerenone (Kerendia)** differ from spironolactone (Aldactone)?", "opts": ["It is a selective β₁-blocker", "Nonsteroidal selective MRA, with fewer hormonal effects", "It is an SGLT2 inhibitor like dapagliflozin (Farxiga)", "It blocks neprilysin, raising natriuretic peptides"], "ans": 1, "exp": "Nonsteroidal selective mineralocorticoid-receptor antagonist; **fewer sex-hormone effects** than spironolactone (Aldactone), but **still causes hyperkalemia** → monitor K/renal. *NABP: 1.A.1 / 3.D.2.*"}, {"id": 21, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient with **HFpEF and obesity (BMI 37)**, NYHA II. Per 2026 evidence, a reasonable add-on for symptoms/events?", "opts": ["Verapamil (Calan) for rate and afterload control", "Hydralazine for afterload reduction", "Tirzepatide (Mounjaro), a dual GIP/GLP-1 agonist", "Digoxin (Lanoxin) for symptom improvement"], "ans": 2, "exp": "ℹ SUMMIT showed **tirzepatide (Mounjaro)** improved HFpEF symptoms/events in obesity; **SGLT2i** also beneficial. (Cross-ref diabetes/obesity.) *Anchor: SUMMIT. NABP: 3.C.2.*"}, {"id": 22, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "For **HFmrEF (LVEF 41–49%)**, the best-supported therapy is:", "opts": ["High-dose long-acting oral nitrates", "A non-dihydropyridine calcium channel blocker", "No pharmacotherapy, given the absent evidence", "An SGLT2 inhibitor, with HFrEF GDMT reasonable"], "ans": 3, "exp": "**SGLT2i** has the clearest benefit; the four-pillar agents are reasonable extrapolations in the mildly-reduced range. *NABP: 3.C.2.*"}, {"id": 23, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 3.C.1", "stem": "HFpEF is diagnosed by:", "opts": ["LVEF ≥50% with HF symptoms and diastolic dysfunction", "A low NT-proBNP in an asymptomatic patient", "A completely normal echocardiogram and biomarkers", "An LVEF below 40% with overt HF symptoms"], "ans": 0, "exp": "Preserved EF (≥50%) with HF features and objective evidence (↑ natriuretic peptides, structural/diastolic abnormality). *NABP: 3.B / 3.C.1.*"}, {"id": 24, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "In HFpEF, which is true about **diuresis and nitrates**?", "opts": ["Diurese aggressively to a very low filling pressure", "Avoid over-diuresis; routine nitrates lack benefit", "Routine nitrates improve outcomes in all HFpEF", "Diuretics are contraindicated in preserved EF"], "ans": 1, "exp": "Stiff ventricles are **preload-sensitive** → over-diuresis drops output; **routine isosorbide mononitrate showed no activity benefit** (NEAT-HFpEF). Use diuretics for congestion, judiciously. *NABP: 3.D.2.*"}, {"id": 25, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Spironolactone (Aldactone) in HFpEF:", "opts": ["Preferred first-line over an SGLT2 inhibitor", "Strong mortality benefit across all HFpEF", "Modest benefit at lower EF; monitor potassium", "Contraindicated in preserved ejection fraction"], "ans": 2, "exp": "TOPCAT suggested **modest** HF-hospitalization benefit (regional/EF-dependent); reasonable add-on with **K monitoring**, but SGLT2i/finerenone (Kerendia) have clearer data. *NABP: 3.C.2.*"}, {"id": 26, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "A HFpEF patient has new atrial fibrillation (CHA₂DS₂-VASc 4). Priority?", "opts": ["Avoid non-DHP CCBs, which are contraindicated", "Withhold anticoagulation given preserved EF", "Start digoxin (Lanoxin) for its mortality benefit", "Anticoagulate per score plus rate/rhythm control"], "ans": 3, "exp": "AFib is a key HFpEF driver — **anticoagulate** (DOAC unless mechanical valve/APS) and control rate/rhythm. (Non-DHP CCBs are acceptable for rate control in *preserved* EF.) *NABP: 3.C.2 / 3.D.2.*"}, {"id": 27, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "SGLT2i initiation threshold and benefit in HFpEF:", "opts": ["Benefits regardless of diabetes or EF; start at eGFR ≥20", "Contraindicated once the eGFR falls below 60", "Requires concurrent insulin therapy to work", "Only if diabetic, and only when eGFR ≥45"], "ans": 0, "exp": "SGLT2i benefit is **independent of diabetes and EF**; initiate down to **eGFR ≥20.** *NABP: 3.C.2.*"}, {"id": 31, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Ivabradine (Corlanor) is indicated when:", "opts": ["Any HFrEF patient regardless of heart rate", "Sinus rhythm with HR ≥70 on a maximal β-blocker", "Atrial fibrillation with a rapid ventricular rate", "HFpEF with preserved ejection fraction"], "ans": 1, "exp": "SHIFT criteria: **sinus rhythm + resting HR ≥70 on max BB** → ivabradine reduces HF hospitalization. *Anchor: SHIFT. NABP: 3.C.2.*"}, {"id": 32, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **ivabradine**?", "opts": ["Soluble guanylate cyclase stimulation raising cGMP", "Selective β₁-adrenergic receptor blockade", "Selective SA-node If (\"funny\") current inhibition", "L-type calcium-channel blockade in the SA node"], "ans": 2, "exp": "Pure **heart-rate reduction** via I_f inhibition — useful when more β-blocker isn't tolerated. *NABP: 1.A.1.*"}, {"id": 33, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.D.2", "stem": "Which is true about ivabradine?", "opts": ["It substantially lowers blood pressure", "It improves myocardial contractility", "It controls rate in atrial fibrillation", "It needs sinus rhythm; AEs include phosphenes"], "ans": 3, "exp": "Needs **sinus rhythm**; watch **bradycardia/AFib/phosphenes.** ✓ Trap: don't use for AFib rate control. *NABP: 2.A.4 / 3.D.2.*"}, {"id": 34, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Vericiguat (Verquvo) is best suited for:", "opts": ["Symptomatic HFrEF after a recent worsening event", "HFpEF with preserved ejection fraction", "Asymptomatic LV dysfunction (stage B)", "Stable HFrEF never hospitalized for HF"], "ans": 0, "exp": "VICTORIA enrolled **worsening HFrEF** — vericiguat is the \"fifth drug\" after the four pillars. *Anchor: VICTORIA. NABP: 3.C.2.*"}, {"id": 35, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **vericiguat**?", "opts": ["Neprilysin inhibition raising natriuretic peptides", "Soluble guanylate cyclase stimulation raising cGMP", "β₁-adrenergic receptor blockade", "SGLT2 inhibition promoting glycosuria"], "ans": 1, "exp": "sGC stimulation (NO–cGMP pathway). AE: **hypotension, syncope, anemia.** *NABP: 1.A.1.*"}, {"id": 36, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "Vericiguat should NOT be combined with:", "opts": ["A loop diuretic such as furosemide (Lasix) or torsemide", "A β-blocker such as carvedilol (Coreg) or bisoprolol (Zebeta)", "PDE5 inhibitors or riociguat (additive hypotension)", "An SGLT2 inhibitor such as empagliflozin (Jardiance) or dapagliflozin (Farxiga)"], "ans": 2, "exp": "Both act on the NO–cGMP pathway → **severe hypotension**; avoid the combination. *NABP: 3.C.3.*"}, {"id": 37, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Digoxin (Lanoxin)'s role in HFrEF is best described as:", "opts": ["A first-line guideline-directed mortality therapy", "Absolutely contraindicated in chronic HF", "Reduces all-cause mortality in HFrEF", "Reduces symptoms/hospitalizations, not mortality"], "ans": 3, "exp": "DIG trial — **hospitalization/symptom** benefit, **neutral mortality**; keep level **0.5–0.9.** *Anchor: DIG. NABP: 3.C.2 / 3.D.2.*"}, {"id": 38, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.6", "stem": "Digoxin (Lanoxin) toxicity is potentiated by:", "opts": ["Hypokalemia, hypomagnesemia, and P-gp inhibitors", "High dietary fiber and antacid binding", "Vigorous aerobic exercise training", "Hyperkalemia and hypermagnesemia"], "ans": 0, "exp": "↓K/↓Mg and **P-gp inhibitors** raise digoxin (Lanoxin) effect/levels → **dose-reduce and monitor.** *NABP: 3.C.3 / 3.C.6.*"}, {"id": 39, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which should be **AVOIDED** in HFrEF?", "opts": ["Carvedilol (Coreg), an evidence-based β-blocker", "Non-DHP CCBs (verapamil, diltiazem (Cardizem))", "Dapagliflozin (Farxiga), an SGLT2 inhibitor", "Spironolactone (Aldactone), a mineralocorticoid antagonist"], "ans": 1, "exp": "Non-DHP CCBs depress contractility → **avoid in HFrEF.** (Acceptable in HFpEF.) *NABP: 3.C.2 / 2.A.4.*"}, {"id": 40, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.C.3", "stem": "Why are **NSAIDs** problematic in HF?", "opts": ["They have no clinically relevant effect", "They lower serum potassium markedly", "Sodium/fluid retention and blunted diuretics", "They precipitate hypoglycemia"], "ans": 2, "exp": "NSAIDs worsen congestion and renal function and **antagonize HF therapies.** *NABP: 3.C.2 / 3.C.3.*"}, {"id": 41, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which antidiabetic class is **contraindicated/avoided** in symptomatic HF due to fluid retention?", "opts": ["Metformin (Glucophage), a biguanide that lowers hepatic glucose", "GLP-1 receptor agonists such as semaglutide (Ozempic)", "SGLT2 inhibitors such as empagliflozin (Jardiance)", "Thiazolidinediones (pioglitazone/rosiglitazone (Avandia))"], "ans": 3, "exp": "TZDs cause **fluid retention → HF (BBW).** (SGLT2i are *beneficial* in HF.) *NABP: 3.C.2.*"}, {"id": 42, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which antiarrhythmic is generally **safe** in HFrEF?", "opts": ["Amiodarone (Pacerone) or dofetilide", "Dronedarone (a class III agent)", "Sotalol (a class III agent)", "Flecainide (a class IC agent)"], "ans": 0, "exp": "**Amiodarone (Pacerone) and dofetilide** don't worsen HF mortality. ⚠ Avoid **class IC (flecainide/propafenone, CAST)**, **dronedarone (CI in NYHA IV/decompensated, ANDROMEDA)**, and **sotalol (Betapace)** (proarrhythmic/negative inotrope). *NABP: 3.C.2.*"}, {"id": 43, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which DPP-4 inhibitors are associated with **increased HF hospitalization** (avoid in HF)?", "opts": ["Sitagliptin (Januvia) and linagliptin (Tradjenta)", "Saxagliptin (Onglyza) and alogliptin (Nesina)", "All DPP-4 inhibitors equally", "None"], "ans": 1, "exp": "**Saxagliptin (SAVOR-TIMI)** and **alogliptin (EXAMINE)** ↑ HF hospitalization; sitagliptin (Januvia)/linagliptin (Tradjenta) are HF-neutral. *NABP: 3.C.2.*"}, {"id": 46, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "HFrEF (EF 28%) with AFib needing rate control. Best options?", "opts": ["Dronedarone for pharmacologic rhythm control", "Verapamil (Calan) or diltiazem (Cardizem) for ventricular rate", "A β-blocker ± digoxin (Lanoxin); amiodarone (Pacerone) if needed", "Flecainide for ventricular rate control"], "ans": 2, "exp": "Use the HF β-blocker ± **digoxin (Lanoxin)** for rate control; **avoid non-DHP CCBs** (negative inotrope) and class IC/dronedarone. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 47, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.6", "stem": "ADHF patient is **\"warm and wet\"** (congested, well-perfused). First-line?", "opts": ["IV vasopressor (norepinephrine)", "IV crystalloid fluid bolus", "IV inotrope (dobutamine)", "IV loop diuretic ± vasodilator"], "ans": 3, "exp": "Wet = congestion → **decongest with IV loop diuretic** (± nitroglycerin if hypertensive). Warm = adequate perfusion → no inotrope needed. *NABP: 3.D.2 / 3.C.6.*"}, {"id": 48, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "A **\"cold and wet\"** patient (hypoperfused + congested), SBP 95. Best approach?", "opts": ["An inotrope to perfuse, plus a diuretic to decongest", "Uptitrate the β-blocker now to control the rate", "Add a non-DHP CCB to reduce the afterload", "Give an IV loop diuretic as the sole agent"], "ans": 0, "exp": "Cold = low output → **inotrope** to perfuse, then decongest; add a vasopressor if frankly hypotensive. ✓ Don't uptitrate β-blocker in shock. *NABP: 3.D.2.*"}, {"id": 49, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Dosing IV loop diuretic in ADHF for a patient on home furosemide (Lasix):", "opts": ["Half the home oral total, given IV", "At least the daily oral total IV (1–2.5×)", "No diuretic until the labs return", "Continue the same oral dose unchanged"], "ans": 1, "exp": "IV dose should **equal or exceed** the home oral total (DOSE trial); IV bioavailability > oral, especially with gut edema. *NABP: 3.D.2.*"}, {"id": 50, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.3", "stem": "Diuretic resistance despite high-dose IV loop. Best next step?", "opts": ["Restrict fluids as the only intervention", "Stop the loop diuretic and observe", "Add metolazone for sequential nephron blockade", "Add an NSAID to potentiate the loop effect"], "ans": 2, "exp": "**Sequential nephron blockade** (metolazone 30 min before the loop) or **continuous infusion**; ℹ **acetazolamide** improves decongestion (ADVOR). *NABP: 3.D.2 / 3.C.3.*"}, {"id": 51, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.2", "stem": "MOA of **milrinone**?", "opts": ["Soluble guanylate cyclase stimulator", "Na-K-2Cl cotransporter inhibitor", "β₁-adrenergic receptor agonist", "PDE3 inhibitor (\"inodilator\")"], "ans": 3, "exp": "Inodilator; **accumulates in renal failure** → hypotension/arrhythmia. *NABP: 1.A.1 / 3.D.2.*"}, {"id": 52, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.D.2", "stem": "A patient in low-output HF is on **carvedilol (Coreg)**. Preferred inotrope?", "opts": ["Milrinone, acting independently of the β-receptor", "Norepinephrine, a potent α/β vasopressor agent", "Digoxin (Lanoxin), for its modest oral inotropic effect", "Dobutamine, a β₁-adrenergic receptor agonist"], "ans": 0, "exp": "Dobutamine works **through β1**, which carvedilol (Coreg) blocks → use **milrinone** (PDE3, β-independent). ✓ Classic discriminator. *NABP: 3.C.3 / 3.D.2.*"}, {"id": 53, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA/effect of **dobutamine**?", "opts": ["Pure α-agonist vasoconstrictor raising afterload", "β₁ agonist increasing contractility; AE tachyarrhythmia", "PDE3 inhibitor raising cAMP, an inodilator", "sGC stimulator raising cGMP and vasodilation"], "ans": 1, "exp": "β1-mediated inotrope; watch **tachycardia/arrhythmias**, tolerance. *NABP: 1.A.1.*"}, {"id": 54, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6 / 2.A.5", "stem": "A patient on **nitroprusside** infusion with renal impairment develops altered mental status/acidosis. Concern?", "opts": ["Serotonin syndrome from the infusion", "Severe drug-induced hyperkalemia", "Cyanide/thiocyanate toxicity accumulation", "QT prolongation with torsades risk"], "ans": 2, "exp": "Nitroprusside (afterload reducer) → **cyanide/thiocyanate toxicity** — limit duration/dose, caution in organ impairment. *NABP: 3.C.6 / 2.A.5.*"}, {"id": 55, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "IV **nitroglycerin** is most useful in ADHF for:", "opts": ["Increasing myocardial contractility", "Controlling the ventricular rate", "Raising a low blood pressure", "Reducing preload in pulmonary congestion"], "ans": 3, "exp": "Venodilation → **↓ preload/pulmonary congestion**; helpful in hypertensive acute HF. *NABP: 3.C.2.*"}, {"id": 56, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "First-line vasopressor in **cardiogenic shock**?", "opts": ["Norepinephrine", "Phenylephrine", "Vasopressin alone", "Dopamine"], "ans": 0, "exp": "**Norepinephrine** is preferred over dopamine (fewer arrhythmias, lower mortality — SOAP II); add an inotrope (dobutamine) for output. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 57, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.6", "stem": "Acute cardiogenic **pulmonary edema** — which is NO LONGER routinely recommended?", "opts": ["Supplemental oxygen or noninvasive ventilation", "IV morphine (MS Contin) for dyspnea and anxiety", "An IV loop diuretic for congestion", "IV nitroglycerin for preload reduction"], "ans": 1, "exp": "**Morphine (MS Contin) is avoided** (↑ respiratory depression/mortality). Use IV loop + nitrates + O₂/NIV + upright positioning. *NABP: 3.C.6.*"}, {"id": 58, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Why might **torsemide** be chosen over furosemide (Lasix)?", "opts": ["It has no diuretic ceiling effect", "It is a weaker, lower-potency loop", "More complete oral absorption, longer half-life", "It is potassium-sparing, unlike furosemide (Lasix)"], "ans": 2, "exp": "Torsemide (and bumetanide) absorb better than furosemide (~50% variable bioavailability); torsemide has a **longer duration.** *NABP: 1.A.2 / 3.C.2.*"}, {"id": 59, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.D.3", "stem": "Key loop-diuretic adverse effects/monitoring include all EXCEPT:", "opts": ["Hypokalemia / hypomagnesemia", "Hyponatremia / metabolic alkalosis", "Ototoxicity (high-dose IV) / ↑ uric acid", "Hyperkalemia"], "ans": 3, "exp": "Loops cause **HYPO**kalemia (not hyper); also hypomagnesemia, hyponatremia, contraction alkalosis, ototoxicity, hyperuricemia. *NABP: 3.D.2 / 3.D.3.*"}, {"id": 63, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 3.C.1", "stem": "The ACC/AHA HF **stages** describe:", "opts": ["Disease progression from at-risk (A) to refractory (D)", "The left ventricular ejection fraction categories alone", "The specific drug classes used in HF therapy", "The patient's current functional symptom severity"], "ans": 0, "exp": "Stages are **progression-based** (A–D) and don't regress. NYHA describes current symptoms separately. *NABP: 3.B / 3.C.1.*"}, {"id": 64, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B", "stem": "NYHA functional classification grades:", "opts": ["The degree of structural heart disease", "Symptom limitation, from I (none) to IV (at rest)", "The measured left ventricular ejection fraction", "The natriuretic peptide biomarker level"], "ans": 1, "exp": "NYHA I–IV reflects **functional limitation** and can change with treatment. *NABP: 3.B.*"}, {"id": 65, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.1", "stem": "Current LVEF-based HF categories are:", "opts": ["Defined by the BNP level, not EF", "HFrEF below 50% and HFpEF ≥50%", "HFrEF ≤40, HFmrEF 41–49, HFpEF ≥50", "Only reduced versus preserved, two bands"], "ans": 2, "exp": "Three EF bands drive therapy choice; \"**improved EF**\" denotes recovered HFrEF. *NABP: 3.C.1.*"}, {"id": 66, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.1 / 3.D.3", "stem": "Which BNP/NT-proBNP interpretation is correct?", "opts": ["Obesity raises the natriuretic peptide level", "NT-proBNP is a substrate cleared by neprilysin", "BNP is characteristically low in decompensated HF", "Peptides rise in HF; ARNI raises BNP, so follow NT-proBNP"], "ans": 3, "exp": "Confounders: **obesity lowers, renal/age/AFib raise**; ARNI raises **BNP** (neprilysin substrate) → monitor **NT-proBNP.** *NABP: 3.C.1 / 3.D.3.*"}, {"id": 67, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.C.2", "stem": "A HFrEF patient on lisinopril (Zestril) develops a persistent dry cough. Best change?", "opts": ["Switch to an ARB or ARNI (bradykinin-mediated cough)", "Stop all RAAS therapy permanently", "Increase the lisinopril (Zestril) to a higher dose", "Add a dextromethorphan cough suppressant"], "ans": 0, "exp": "ACEi cough (bradykinin) → **switch to an ARB/ARNI** (no cough). Angioedema → also avoid ACEi. *NABP: 3.C.5 / 3.C.2.*"}, {"id": 68, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "HFrEF patient on ACEi + spironolactone (Aldactone) now has **K⁺ 5.9.** Best action?", "opts": ["Continue both agents at current doses", "Hold/reduce the MRA, consider a binder, recheck K", "Add an oral potassium chloride supplement", "Add an NSAID for musculoskeletal symptom control"], "ans": 1, "exp": "Manage **hyperkalemia**: reduce/hold the K-raising agent, dietary counseling, **potassium binder** if needed, recheck — preserve GDMT where possible. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 69, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.D.3", "stem": "After starting or up-titrating an ACEi/ARB/ARNI, monitor:", "opts": ["Liver enzymes and a fasting lipid panel", "Thyroid-stimulating hormone and free T4 level", "Potassium, creatinine, and BP within ~1–2 weeks", "International normalized ratio and platelet count"], "ans": 2, "exp": "RAAS agents → **hyperK, ↑ SCr, hypotension** → recheck early and after each change. *NABP: 3.D.2 / 3.D.3.*"}, {"id": 70, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "A diabetic HFrEF patient on carvedilol (Coreg) should be counseled that β-blockers can:", "opts": ["Replace the need for insulin therapy", "Reliably cause clinically significant weight loss", "Cause persistent fasting hyperglycemia", "Mask adrenergic warning signs of hypoglycemia"], "ans": 3, "exp": "β-blockers **blunt hypoglycemia awareness** (sweating persists); also bradycardia/fatigue. Still indicated for HFrEF. *NABP: 3.E.2 / 3.C.3.*"}, {"id": 71, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A pregnant patient develops HFrEF (peripartum cardiomyopathy). Which agents must be **avoided**?", "opts": ["ACEi, ARB, ARNI, SGLT2 inhibitors, and MRAs", "Hydralazine and isosorbide dinitrate", "All heart failure medications entirely", "β-blockers and loop diuretics"], "ans": 0, "exp": "Avoid **RAAS agents (ACEi/ARB/ARNI), SGLT2i, MRAs**; use **hydralazine + nitrates**, a pregnancy-preferred β-blocker (**labetalol (Trandate) or carvedilol (Coreg)** — avoid atenolol), and diuretics cautiously. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 72, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "In peripartum cardiomyopathy with a very low EF, an added consideration is:", "opts": ["No special added concerns beyond standard care", "Anticoagulation plus pregnancy-adapted GDMT", "Routine SGLT2 inhibitor for HF benefit", "An ARNI as first-line vasodilator therapy"], "ans": 1, "exp": "Markedly reduced EF → **thromboembolism risk** → consider anticoagulation; tailor GDMT to pregnancy-safe agents. *NABP: 3.C.2.*"}, {"id": 73, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 4.B", "stem": "A stage D (advanced/refractory) HF patient intolerant of GDMT due to hypotension. Appropriate path?", "opts": ["Add an NSAID for symptom relief", "Force full-dose GDMT despite hypotension", "Refer for transplant/LVAD or palliative care", "Stop all heart failure therapy"], "ans": 2, "exp": "Stage D → **advanced-therapy referral** (transplant/mechanical support) or **palliative inotrope/hospice**; GDMT often not tolerated. *NABP: 3.C.2 / 4.B.*"}, {"id": 74, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.A / 3.E.3", "stem": "Which reduces 30-day HF readmissions at the transition from hospital to home?", "opts": ["Deferring any scheduled follow-up visit", "Sodium loading to maintain perfusion", "Stopping GDMT at the time of discharge", "Med reconciliation, early follow-up, and education"], "ans": 3, "exp": "Structured **transitions of care** (med rec + early follow-up + education) cut readmissions. *NABP: 5.A / 3.E.3.*"}, {"id": 75, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.3", "stem": "Self-monitoring instruction for a HF patient regarding **daily weights**?", "opts": ["Weigh daily; report a gain of ~2–3 lb/day or ~5 lb/week", "Weight monitoring is not clinically useful in HF", "Weigh only when new symptoms develop", "Weigh once weekly using the same scale"], "ans": 0, "exp": "Rapid weight gain signals fluid retention → call before decompensation. *NABP: 3.E.3.*"}, {"id": 76, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.1", "stem": "Dietary counseling in HF typically includes:", "opts": ["A high-sodium diet to maintain volume", "Sodium ~2–3 g/day; fluid limits if needed", "Unlimited fluid intake daily", "High-protein loading for cachexia"], "ans": 1, "exp": "Moderate **sodium restriction**; **fluid restriction** reserved for hyponatremia/advanced HF. *NABP: 3.E.1.*"}, {"id": 77, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.C.1 / 4.B", "stem": "Recommended vaccinations for HF patients include:", "opts": ["Live attenuated vaccines only", "No vaccines are recommended", "Annual influenza and pneumococcal", "Only travel-related vaccines"], "ans": 2, "exp": "**Influenza + pneumococcal** reduce HF exacerbations/mortality (also COVID, RSV by age). *NABP: 2.C.1 / 4.B.*"}, {"id": 81, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Entresto** is the brand name for:", "opts": ["valsartan monotherapy", "spironolactone", "ivabradine", "sacubitril/valsartan"], "ans": 3, "exp": "Entresto = **sacubitril/valsartan (Entresto)** (ARNI). *NABP: 2.A.1.*"}, {"id": 82, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Match the HFrEF β-blocker brands: **Coreg, Toprol-XL, Zebeta** are:", "opts": ["carvedilol, metoprolol succinate, bisoprolol", "metoprolol tartrate, atenolol, nadolol", "bisoprolol, carvedilol, sotalol", "nebivolol, labetalol, esmolol"], "ans": 0, "exp": "Coreg = **carvedilol (Coreg)**, Toprol-XL = **metoprolol (Lopressor) succinate (ER)**, Zebeta = **bisoprolol (Zebeta)** — the three evidence-based HFrEF β-blockers. *NABP: 2.A.1.*"}, {"id": 83, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Kerendia, Corlanor, and Verquvo** are, respectively:", "opts": ["vericiguat, ivabradine, finerenone", "finerenone, ivabradine, vericiguat", "ivabradine, finerenone, vericiguat", "finerenone, vericiguat, ivabradine"], "ans": 1, "exp": "Kerendia = **finerenone (Kerendia)**, Corlanor = **ivabradine**, Verquvo = **vericiguat.** *NABP: 2.A.1.*"}, {"id": 84, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Lasix, Bumex, and Demadex** are which loop diuretics?", "opts": ["metolazone, furosemide, bumetanide", "bumetanide, furosemide, ethacrynic acid", "furosemide, bumetanide, torsemide", "furosemide, torsemide, bumetanide"], "ans": 2, "exp": "Lasix = **furosemide (Lasix)**, Bumex = **bumetanide**, Demadex = **torsemide.** *NABP: 2.A.1.*"}, {"id": 85, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Aldactone** and **Inspra** are:", "opts": ["eplerenone and spironolactone", "finerenone and spironolactone", "amiloride and triamterene", "spironolactone and eplerenone"], "ans": 3, "exp": "Aldactone = **spironolactone (Aldactone)** (nonselective MRA), Inspra = **eplerenone (Inspra)** (selective MRA). *NABP: 2.A.1.*"}, {"id": 86, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.3", "stem": "MOA of **sacubitril/valsartan (Entresto)**?", "opts": ["Valsartan (Diovan) blocks AT₁ receptors + sacubitril inhibits neprilysin → ↑ natriuretic peptides", "Valsartan (Diovan) blocks AT₁ receptors + sacubitril activates neprilysin → ↑ peptide clearance", "Aliskiren inhibits renin + sacubitril inhibits neprilysin → ↑ natriuretic peptides", "Valsartan (Diovan) blocks AT₁ receptors + sacubitril inhibits ACE → ↓ angiotensin II + ↑ bradykinin"], "ans": 0, "exp": "Sacubitril is a **neprilysin inhibitor** (↑ ANP/BNP/bradykinin), not an ACEi — **D** describes omapatrilat, abandoned for angioedema. Neprilysin activation **B** would ↓ peptides; the ARB partner is valsartan (Diovan), not aliskiren **C**. ✓ BNP rises on ARNI → follow **NT-proBNP.** *NABP: 1.A.1 / 3.D.3.*"}, {"id": 87, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "How do **spironolactone (Aldactone)** and **eplerenone (Inspra)** differ?", "opts": ["Both block the MR, but only eplerenone (Inspra) risks hyperkalemia", "Both block the MR; spironolactone (Aldactone) nonselective, eplerenone (Inspra) selective", "Both block the MR; eplerenone (Inspra) nonselective, spironolactone (Aldactone) selective", "Spironolactone (Aldactone) blocks the MR; eplerenone (Inspra) blocks ENaC like amiloride"], "ans": 1, "exp": "Reversed selectivity **C** is the trap — eplerenone (Inspra) is the **selective** one (switch to it for gynecomastia). Eplerenone is not an ENaC blocker **D**, and **both** MRAs cause hyperkalemia, so **A** is wrong → monitor K. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 88, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **loop diuretics** (furosemide/torsemide/bumetanide)?", "opts": ["Antagonize aldosterone at the cortical collecting duct", "Inhibit carbonic anhydrase in the proximal tubule → ↑ bicarbonate excretion", "Inhibit the Na-K-2Cl (NKCC2) cotransporter in the thick ascending limb of Henle", "Block the Na-Cl cotransporter in the distal convoluted tubule"], "ans": 2, "exp": "All four are real diuretic targets — **B** = acetazolamide, **D** = thiazide, **A** = MRA; loops hit **NKCC2.** AE: ↓K/↓Mg, ototoxicity. *NABP: 1.A.1.*"}, {"id": 89, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **digoxin (Lanoxin)**?", "opts": ["Inhibits phosphodiesterase-3 → ↑ cAMP → ↑ contractility + vasodilation", "Stimulates β₁ receptors → ↑ cAMP → ↑ contractility and heart rate", "Sensitizes troponin C to calcium → ↑ contractility without ↑ intracellular Ca²⁺", "Inhibits Na/K-ATPase → ↑ intracellular Ca²⁺ → ↑ contractility; ↑ vagal tone → ↓ AV conduction"], "ans": 3, "exp": "Na/K-ATPase inhibition + vagal AV slowing (helps HF + AFib rate); narrow TI (0.5–0.9 ng/mL). The others are real inotrope MOAs — **A** = milrinone, **B** = dobutamine, **C** = calcium sensitizers. *NABP: 1.A.1.*"}, {"id": 90, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **hydralazine + isosorbide dinitrate**?", "opts": ["Hydralazine = arterial vasodilator (↓ afterload); ISDN = NO-mediated venodilator (↓ preload)", "Hydralazine = venodilator (↓ preload); ISDN = arterial vasodilator (↓ afterload)", "Both are arterial vasodilators reducing afterload via NO donation", "Both are venodilators reducing preload; neither affects afterload"], "ans": 0, "exp": "Reversed roles **B** is the trap — hydralazine is **arterial** (afterload), the nitrate is **venous** (preload); their actions are complementary, not identical **C**/**D**. ⚠ Nitrate tolerance → need a nitrate-free interval. *NABP: 1.A.1.*"}, {"id": 91, "group": "Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.2 / 3.D.2", "stem": "Target maintenance dose and titration of **sacubitril/valsartan (Entresto)** in HFrEF?", "opts": ["Start 24/26 mg once daily, titrate weekly to 49/51 mg once daily", "Start 49/51 mg BID, double q2–4 wk to 97/103 mg BID", "Start 97/103 mg BID immediately, with no titration", "Start and stay at 49/51 mg BID as the target"], "ans": 1, "exp": "Target is **97/103 mg BID**, dosed **BID**, up-titrated **q2–4 wk** as BP/renal/K tolerate. **A** uses once-daily; **C** skips titration; **D** stops below target. *NABP: 2.A.2 / 3.D.2.*"}, {"id": 92, "group": "Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.2", "stem": "Target dose of **carvedilol (Coreg)** in HFrEF?", "opts": ["6.25 mg BID maximum", "12.5 mg BID maximum", "25 mg BID (50 mg BID if >85 kg)", "50 mg BID for all patients regardless of weight"], "ans": 2, "exp": "Up-titrate to **25 mg BID**, or **50 mg BID only if >85 kg.** **A/B** are sub-target start/intermediate doses; **D** over-doses lighter patients. (Metoprolol succinate target 200 mg daily; bisoprolol (Zebeta) 10 mg daily.) *NABP: 2.A.2.*"}, {"id": 93, "group": "Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.2 / 3.D.2", "stem": "Dosing of **ivabradine (Corlanor)**?", "opts": ["Start 7.5 mg BID; reduce only if HR <50 bpm, no maximum", "Start 5 mg once daily; target HR 60–70 bpm (max 10 mg daily)", "Start 2.5 mg BID; target HR 70–80 bpm (max 5 mg BID)", "Start 5 mg BID; target HR 50–60 bpm (max 7.5 mg BID)"], "ans": 3, "exp": "BID dosing, target **resting HR 50–60**, max **7.5 mg BID**; start 2.5 BID if bradycardia/conduction risk. **A**, **B**, and **C** miss the start dose, HR target, or maximum. *NABP: 2.A.2 / 3.D.2.*"}, {"id": 94, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "Approximate **PO loop diuretic dose equivalence**?", "opts": ["Furosemide (Lasix) 40 mg ≈ torsemide 20 mg ≈ bumetanide 1 mg", "Furosemide (Lasix) 40 mg ≈ torsemide 80 mg ≈ bumetanide 4 mg", "Furosemide (Lasix) 20 mg ≈ torsemide 20 mg ≈ bumetanide 20 mg", "Furosemide (Lasix) 40 mg ≈ torsemide 10 mg ≈ bumetanide 0.5 mg"], "ans": 0, "exp": "Ratio **40 : 20 : 1** (furosemide : torsemide : bumetanide). ★ IV furosemide (Lasix) ~2× as potent as PO. **B** inverts potency; **C** treats them as equipotent; **D** halves torsemide/bumetanide. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 95, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Most important monitoring after starting an **MRA**?", "opts": ["Heart rate and a 12-lead ECG before each dose increase", "Serum potassium and renal function within ~1 week, then periodically", "Serum sodium and a fasting lipid panel at baseline and 3 months", "Liver enzymes and CK within 1 week for myopathy risk"], "ans": 1, "exp": "MRAs → **hyperkalemia + ↑ SCr** → check K/renal early; hold if K >5.0–5.5 or eGFR drops. The others fit different drugs (statin = CK/LFT; β-blocker/ivabradine = HR/ECG). *NABP: 3.D.2.*"}, {"id": 96, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3 / 2.A.4", "stem": "Monitoring/counseling for **sacubitril/valsartan (Entresto)**?", "opts": ["NT-proBNP, potassium, renal function, BP; counsel on a persistent dry cough", "Potassium, renal function, BP, and routine LFTs; counsel on photosensitivity", "NT-proBNP (not BNP), potassium, renal function, BP; counsel on angioedema", "BNP (not NT-proBNP), potassium, renal function, BP; counsel on angioedema"], "ans": 2, "exp": "Use **NT-proBNP** because neprilysin inhibition **raises BNP** (BNP is a neprilysin substrate) → **D** is the trap. ARNI causes **angioedema, not cough** — **A** is the ACEi pearl; no LFT/photosensitivity monitoring, so **B** is wrong. *NABP: 3.D.3 / 2.A.4.*"}, {"id": 97, "group": "Drug Essentials", "domain": "D2", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.6", "stem": "A digoxin (Lanoxin) patient is started on **amiodarone (Pacerone).** Best action?", "opts": ["Increase digoxin (Lanoxin) ~50% — amiodarone (Pacerone) induces P-gp → ↓ digoxin levels", "Continue the same digoxin (Lanoxin) dose but add empiric potassium supplementation", "Reduce digoxin (Lanoxin) ~50% — amiodarone (Pacerone) displaces digoxin from tissue but does not change the level", "Reduce digoxin (Lanoxin) ~50% and monitor level (0.5–0.9), K, Mg — amiodarone (Pacerone) inhibits P-gp → ↑ digoxin"], "ans": 3, "exp": "Amiodarone (and verapamil (Calan)) **inhibit P-gp → ↑ digoxin (Lanoxin)** → halve the dose + monitor (↓K/↓Mg potentiate toxicity). **A** reverses the direction; **B** ignores the dose change; **C** gives the right action for the wrong reason. *NABP: 3.C.3 / 3.C.6.*"}, {"id": 101, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "ADHF patient on **furosemide (Lasix) 40 mg IV BID** is transitioning to oral. Equivalent total daily **PO furosemide** dose? (IV:PO furosemide ≈ 1:2)", "opts": ["160 mg/day", "320 mg/day", "40 mg/day", "80 mg/day"], "ans": 0, "exp": "Oral furosemide (Lasix) is ~50% bioavailable → PO dose ≈ **2× IV.** 40 mg IV BID = 80 mg/day IV → **160 mg/day PO** (80 mg PO BID). ★ Torsemide/bumetanide are ~80–100% bioavailable (≈1:1 IV:PO) — furosemide is the exception. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 102, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Switching **furosemide (Lasix) 80 mg PO daily** to **torsemide.** Approximate equivalent dose?", "opts": ["20 mg", "40 mg", "80 mg", "10 mg"], "ans": 1, "exp": "Ratio **40 : 20 : 1** (furosemide : torsemide : bumetanide) → 80 mg furosemide (Lasix) ≈ **40 mg torsemide.** *NABP: 1.C.4.*"}, {"id": 103, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Same patient — equivalent **bumetanide** dose for furosemide (Lasix) 80 mg PO?", "opts": ["0.5 mg", "1 mg", "2 mg", "4 mg"], "ans": 2, "exp": "40 mg furosemide (Lasix) ≈ 1 mg bumetanide → 80 mg ≈ **2 mg bumetanide.** ★ Bumetanide is the most potent loop (mg-for-mg). *NABP: 1.C.4.*"}, {"id": 104, "group": "Calculations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "Cardiogenic shock, **70 kg**, dobutamine ordered **5 mcg/kg/min**; bag **250 mg/250 mL.** Infusion rate?", "opts": ["42 mL/hr", "5 mL/hr", "10.5 mL/hr", "21 mL/hr"], "ans": 3, "exp": "Concentration = 250 mg/250 mL = **1000 mcg/mL.** Dose = 5 × 70 = 350 mcg/min × 60 = 21,000 mcg/hr ÷ 1000 = **21 mL/hr.** *NABP: 1.C.4 / 3.D.2.*"}, {"id": 105, "group": "Calculations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "ADHF on IV **nitroglycerin 20 mcg/min**; bag **50 mg/250 mL.** Rate?", "opts": ["6 mL/hr", "12 mL/hr", "20 mL/hr", "3 mL/hr"], "ans": 0, "exp": "Concentration = 50 mg/250 mL = **200 mcg/mL.** 20 mcg/min × 60 = 1200 mcg/hr ÷ 200 = **6 mL/hr.** ⚠ NTG is dosed mcg/**min**, not mcg/kg/min — do **not** multiply by weight. *NABP: 1.C.4 / 3.D.2.*"}, {"id": 106, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.C.2", "stem": "**Entresto 49/51 mg**, 1 tab PO BID, dispense **#60.** Days supply?", "opts": ["20", "30", "60", "15"], "ans": 1, "exp": "2 tabs/day → 60 ÷ 2 = **30 days.** *NABP: 1.C.2.*"}, {"id": 107, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "HFrEF, **70 y/o woman, 60 kg, SCr 1.3 mg/dL.** Cockcroft-Gault CrCl?", "opts": ["62 mL/min", "28 mL/min", "38 mL/min", "48 mL/min"], "ans": 2, "exp": "CG = [(140 − age) × wt × 0.85 (female)] / (72 × SCr) = (70 × 60 × 0.85)/(72 × 1.3) = 3570/93.6 ≈ **38 mL/min.** ✓ Drives digoxin (Lanoxin)/renal dosing and MRA/SGLT2i thresholds. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 108, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 2.A.2", "stem": "Converting **metoprolol (Lopressor) succinate (Toprol-XL) 100 mg daily** to **metoprolol tartrate.** Equivalent regimen?", "opts": ["100 mg BID", "200 mg daily", "25 mg BID", "50 mg BID"], "ans": 3, "exp": "Succinate : tartrate ≈ **1:1 total daily dose** → 100 mg/day = **50 mg tartrate BID.** ⚠ Tartrate (IR) is **not** the mortality-benefit HF formulation — this is a conversion, not a therapy recommendation. *NABP: 1.C.4 / 2.A.2.*"}, {"id": 109, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.C.2", "stem": "**BiDil** is the fixed-dose combination of:", "opts": ["Hydralazine and isosorbide dinitrate", "Hydralazine and isosorbide mononitrate", "Amlodipine and isosorbide dinitrate", "Hydralazine and nitroglycerin"], "ans": 0, "exp": "USE: add-on for **self-identified Black patients with HFrEF, NYHA III–IV** on GDMT (or when ACEi/ARB/ARNI not tolerated due to renal/hyperkalemia). MOA: hydralazine = **arterial vasodilator (↓ afterload)**; ISDN = **venodilator/NO donor (↓ preload)**. Dose: **PO TID.** *NABP: 2.A.1 / 3.C.2.*"}, {"id": 110, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1", "stem": "Which ACE-inhibitor brand ↔ generic pairing is correct?", "opts": ["Prinivil/Zestril = enalapril; Vasotec = lisinopril", "Prinivil/Zestril = lisinopril; Vasotec = enalapril", "Altace = captopril; Capoten = ramipril", "Vasotec = ramipril; Altace = lisinopril"], "ans": 1, "exp": "(also Capoten = captopril, Altace = ramipril). Class: ↓ mortality in HFrEF; ⚠ cough, hyperkalemia, angioedema, teratogenic; **36-h washout before starting Entresto.** *NABP: 2.A.1.*"}, {"id": 111, "group": "Brand ↔ Generic & Combination Products", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.C.2", "stem": "The three **β-blockers proven to reduce mortality in HFrEF** (with brands) are:", "opts": ["Metoprolol tartrate (Lopressor), e
