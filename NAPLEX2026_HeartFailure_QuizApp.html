<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Heart Failure — NAPLEX Quiz</title>
<style>
:root{--navy:#1F3864;--steel:#2E5F8A;--green:#1E5C2E;--ok:#1E5C2E;--bad:#9B2226;--bg:#f5f6f8;--card:#fff;--ink:#1d2430;--muted:#5b6675}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--navy);color:#fff;padding:14px 18px}header h1{margin:0;font-size:18px}header .sub{opacity:.85;font-size:12px;margin-top:2px}
.wrap{max-width:800px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid #e3e7ee;border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:12px}
h2.sec{font-size:15px;margin:2px 0 10px;color:var(--navy)}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode{border:2px solid #d7deea;border-radius:10px;padding:12px;cursor:pointer;text-align:center;font-weight:700;color:var(--navy)}
.mode small{display:block;font-weight:400;color:var(--muted);margin-top:3px}.mode.on{border-color:var(--steel);background:#f0f6fd}
.topics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.topic{display:flex;align-items:center;gap:8px;border:1px solid #d7deea;border-radius:9px;padding:9px 11px;cursor:pointer;font-size:13.5px}
.topic.on{border-color:var(--green);background:#eef7ef}.topic input{accent-color:var(--green)}.topic .ct{margin-left:auto;font-size:11px;color:var(--muted)}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:10px}.row label{font-size:13px;color:var(--muted)}
.row select{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db;background:#fff}
.start{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.start:disabled{opacity:.5;cursor:default}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px}.bar button{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #c9d0db;background:#fff;cursor:pointer}.stat{font-size:13px;color:var(--muted);margin-left:auto}
.prog{height:6px;background:#e3e7ee;border-radius:4px;overflow:hidden;margin-bottom:12px}.prog>div{height:100%;background:var(--green);width:0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.b-t1{background:#e2efda;color:#1E5C2E}.b-t2{background:#fff2cc;color:#7a5b00}.b-t3{background:#ffe2e2;color:#9B2226}.b-dom{background:#dee9f6;color:#1F3864}.b-grp{background:#eee;color:#444}.b-aw{background:#ddeeff;color:#17375E}
.stem{font-size:16px;font-weight:600;line-height:1.45;margin:4px 0 14px}
.opt{display:block;width:100%;text-align:left;border:1px solid #c9d0db;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:14.5px;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--steel)}.opt .k{display:inline-block;width:22px;font-weight:700;color:var(--steel)}.opt.sel{border-color:var(--steel);background:#f0f6fd}.opt.correct{border-color:var(--ok);background:#e8f5ea}.opt.wrong{border-color:var(--bad);background:#fdeced}.opt[disabled]{cursor:default}
.exp{margin-top:12px;padding:12px 14px;border-left:4px solid var(--steel);background:#f7f9fc;border-radius:6px;font-size:14px;line-height:1.55;display:none}.exp.show{display:block}.exp .verdict{font-weight:800;margin-bottom:4px}
.actions{display:flex;gap:10px;margin-top:14px}.actions button{flex:1;padding:11px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.check{background:var(--steel);color:#fff}.check:disabled{opacity:.5;cursor:default}.next{background:var(--navy);color:#fff}
.done{text-align:center;padding:26px 16px}.done h2{margin:.2em 0}.score{font-size:42px;font-weight:800;color:var(--navy)}
b,strong{font-weight:700}em,i{font-style:italic}.foot{font-size:11px;color:var(--muted);text-align:center;margin:16px 0}
.bar button{cursor:pointer}.preset{padding:6px 10px!important}
.kpis{display:flex;gap:10px;margin-bottom:4px}.kpi{flex:1;text-align:center;background:#f7f9fc;border:1px solid #e3e7ee;border-radius:9px;padding:10px}.kpi b{font-size:22px;color:var(--navy);display:block}.kpi small{color:var(--muted);font-size:11px}
.ptable{width:100%;border-collapse:collapse;font-size:13px}.ptable th{text-align:left;color:var(--muted);font-weight:600;padding:4px 6px;border-bottom:1px solid #e3e7ee}.ptable td{padding:5px 6px;border-bottom:1px solid #f0f2f6;vertical-align:middle}
.meter{height:7px;background:#e3e7ee;border-radius:4px;overflow:hidden;width:90px}.meter>div{height:100%;background:var(--green)}
</style></head><body>
<header><h1>Heart Failure — NAPLEX 2026 Quiz</h1><div class="sub">single-best-answer · Generic (Brand) paired · answers hidden until you submit</div></header>

<script>
const ALL=[{"id": 1, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "Which set are the **four pillars** of guideline-directed therapy that reduce mortality in HFrEF?", "opts": ["ARNI/ACEi/ARB + β-blocker + MRA + SGLT2i", "ACEi + loop diuretic + digoxin (Lanoxin) + aspirin", "β-blocker + CCB + nitrate + statin", "ARB + thiazide + digoxin (Lanoxin) + warfarin (Coumadin)"], "ans": 0, "exp": "The quadruple foundation: **ARNI (sacubitril/valsartan (Diovan)) [or ACEi/ARB] + β-blocker + MRA + SGLT2i.** Diuretics/digoxin (Lanoxin) treat symptoms, not mortality. *Anchor: AHA/ACC/HFSA 2022. NABP: 3.C.2 / 3.D.1.*"}, {"id": 2, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 2.A.4", "stem": "A patient on lisinopril (Zestril) is switching to **sacubitril/valsartan (Entresto)**. Key step?", "opts": ["Start immediately with the next dose", "Wait ≥36 hours after the last ACEi dose (angioedema risk)", "Continue the lisinopril (Zestril) too", "Give only if BNP is low"], "ans": 1, "exp": "Overlapping ACEi + neprilysin inhibition ↑ bradykinin → **angioedema** → require a **36-h washout.** ⚠ Never co-administer ARNI with an ACEi. *Anchor: PARADIGM-HF. NABP: 3.C.3 / 2.A.4.*"}, {"id": 3, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.1", "stem": "Which β-blockers have proven mortality benefit in HFrEF?", "opts": ["Atenolol and propranolol", "Metoprolol (Lopressor) tartrate and nadolol", "Carvedilol (Coreg), metoprolol (Lopressor) succinate (Toprol-XL), bisoprolol (Zebeta)", "Labetalol (Trandate) and sotalol (Betapace)"], "ans": 2, "exp": "Only **carvedilol (Coreg), metoprolol (Lopressor) succinate (ER), and bisoprolol (Zebeta)** are evidence-based in HFrEF. ⚠ Metoprolol **tartrate** (IR) is not the HF formulation. *NABP: 3.C.2 / 2.A.1.*"}, {"id": 4, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Newly diagnosed HFrEF: **K⁺ 5.6 mEq/L, eGFR 26.** Regarding an MRA (spironolactone)?", "opts": ["Start and add a K supplement", "Start with a loop diuretic to offset", "Start full dose now", "Do not start — K >5.0 and eGFR <30 are contraindications"], "ans": 3, "exp": "Initiate an MRA only if **K ≤5.0** and **eGFR ≥30** (CrCl ≥30); recheck K/renal in 1 wk. ⚠ Hyperkalemia + advanced CKD → hold. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 5, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which statement about **SGLT2 inhibitors** in HFrEF is correct?", "opts": ["Reduce HF hospitalization/mortality regardless of diabetes status; initiate at eGFR ≥20", "Contraindicated in HF", "Require insulin co-therapy", "Only benefit patients with diabetes"], "ans": 0, "exp": "Dapagliflozin (Farxiga, DAPA-HF) and empagliflozin (Jardiance, EMPEROR-Reduced) benefit HFrEF **independent of diabetes.** *Anchor: DAPA-HF/EMPEROR-Reduced. NABP: 3.C.2.*"}, {"id": 6, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.1", "stem": "Newly diagnosed HFrEF, BP 116/72, K 4.2, eGFR 58. Best initiation strategy?", "opts": ["Start one pillar and add the next only after months", "Begin all four pillars early at low doses, then up-titrate", "Maximize one drug before adding others", "Start only a loop diuretic"], "ans": 1, "exp": "Modern HFrEF care **starts all four classes early** (low-dose, then rapid titration — STRONG-HF), not sequential months-apart additions. ✓ Trap: \"max one before adding\" is outdated. *NABP: 3.D.1.*"}, {"id": 7, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "In a stable HFrEF patient tolerating an ACEi, guidelines favor:", "opts": ["Stopping all RAAS therapy", "Continuing the ACEi indefinitely over ARNI", "Replacing the ACEi with an ARNI (sacubitril/valsartan (Diovan)) for greater mortality reduction", "Adding an ARB to the ACEi"], "ans": 2, "exp": "**ARNI is preferred over ACEi/ARB** in HFrEF (PARADIGM-HF) — switch when feasible (after 36-h washout). *NABP: 3.C.2.*"}, {"id": 8, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Which is an absolute **contraindication** to sacubitril/valsartan (Entresto)?", "opts": ["NYHA class II", "Age >65", "eGFR 45", "History of angioedema, concomitant ACEi, or pregnancy"], "ans": 3, "exp": "⚠ CI: prior **angioedema**, **concurrent ACEi** (washout), and **pregnancy** (ARB fetotoxicity). Use cautiously w/ low BP/renal impairment. *NABP: 2.A.4 / 3.C.2.*"}, {"id": 9, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "After starting an MRA, the most important early monitoring is:", "opts": ["Potassium and renal function (within ~1 week)", "TSH", "INR", "Liver enzymes"], "ans": 0, "exp": "MRAs → **hyperkalemia + ↑ SCr** → check K/renal early and after dose changes. ✓ Spironolactone (Aldactone) gynecomastia → switch to **eplerenone (Inspra).** *NABP: 3.D.2.*"}, {"id": 10, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Correct β-blocker initiation in HFrEF?", "opts": ["Start at target dose immediately", "Start low and double every ~2 weeks as tolerated; do NOT initiate during acute decompensation/volume overload", "Only use in HFpEF", "Give IV first"], "ans": 1, "exp": "Up-titrate slowly to target; **avoid starting in decompensated/volume-overloaded** patients (negative inotropy). *NABP: 3.D.2.*"}, {"id": 11, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "HFrEF patient, **SBP 92 mmHg**, on all four pillars at low dose, mildly symptomatic. Best approach to preserve GDMT?", "opts": ["Add amlodipine (Norvasc)", "Stop the MRA and SGLT2i", "Reduce/temporally hold the loop diuretic or nitrate and keep prognostic GDMT; SGLT2i and MRA are the least BP-lowering pillars", "Stop all four pillars"], "ans": 2, "exp": "Protect mortality agents — trim **non-prognostic vasodilators/diuretics** first; **SGLT2i and MRA** lower BP least, so prioritize keeping them. ✓ Trap: don't reflexively stop GDMT for asymptomatic low BP. *NABP: 3.D.2.*"}, {"id": 12, "group": "HFrEF GDMT — The Four Pillars", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.3", "stem": "MOA of **sacubitril/valsartan (Entresto)**?", "opts": ["SGLT2 inhibitor", "Aldosterone antagonist", "Pure β-blocker", "Neprilysin inhibitor (sacubitril) + ARB (valsartan) → ↑ natriuretic peptides + RAAS blockade"], "ans": 3, "exp": "Neprilysin inhibition raises natriuretic peptides (and bradykinin → angioedema risk); valsartan (Diovan) blocks AT1. ✓ Monitor **NT-proBNP** (BNP rises on ARNI). *NABP: 1.A.1 / 3.D.3.*"}, {"id": 13, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Add-on **hydralazine + isosorbide dinitrate** is specifically indicated for:", "opts": ["Black patients with NYHA III–IV HFrEF still symptomatic on GDMT (A-HeFT), or when ACEi/ARB/ARNI are not tolerated", "HFpEF only", "Asymptomatic stage A", "All HFrEF patients first-line"], "ans": 0, "exp": "A-HeFT supports hydral/ISDN add-on in **self-identified Black patients** on optimal GDMT; also an option for **RAAS intolerance** (renal/hyperK). *Anchor: A-HeFT. NABP: 3.C.2.*"}, {"id": 16, "group": "HFrEF GDMT — The Four Pillars", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "A HFrEF patient cannot tolerate any ACEi/ARB/ARNI due to recurrent hyperkalemia and renal decline. Best RAAS-sparing substitute to retain vasodilator benefit?", "opts": ["Add a second β-blocker", "Hydralazine + isosorbide dinitrate", "Amlodipine (Norvasc)", "Diltiazem (Cardizem)"], "ans": 1, "exp": "When RAAS agents aren't tolerated, **hydralazine/ISDN** provides afterload/preload reduction with survival data. ⚠ Non-DHP CCBs (diltiazem/verapamil (Calan)) are avoided in HFrEF. *NABP: 3.C.2.*"}, {"id": 17, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which drug class has the strongest evidence to reduce HF events in **HFpEF/HFmrEF**?", "opts": ["Calcium channel blockers", "ACE inhibitors", "SGLT2 inhibitors (empagliflozin/dapagliflozin (Farxiga)) — benefit across the LVEF spectrum", "Digoxin (Lanoxin)"], "ans": 2, "exp": "SGLT2i (Jardiance/EMPEROR-Preserved, Farxiga/DELIVER) reduce HF hospitalization in **preserved/mildly-reduced EF** — the first class with clear HFpEF outcome benefit. *Anchor: EMPEROR-Preserved/DELIVER. NABP: 3.C.2.*"}, {"id": 18, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Per FINEARTS-HF (2024), which agent reduces CV death/HF events in symptomatic HF with **LVEF ≥40%**?", "opts": ["Sacubitril/valsartan (Entresto)", "Ivabradine", "Spironolactone (Aldactone)", "Finerenone (nonsteroidal selective MRA)"], "ans": 3, "exp": "ℹ **NEW: finerenone (Kerendia)** cut CV death + total HF events ~16% in LVEF ≥40% (FINEARTS-HF), benefit independent of SGLT2i use. Monitor K. *Anchor: FINEARTS-HF. NABP: 3.C.2.*"}, {"id": 19, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "The cornerstone of **HFpEF** management is:", "opts": ["Treat comorbidities (HTN, AFib, obesity, ischemia) + diuretics for congestion + an SGLT2 inhibitor", "Digoxin (Lanoxin) + nitrates", "No pharmacotherapy", "Quadruple HFrEF GDMT at target doses"], "ans": 0, "exp": "HFpEF is comorbidity-driven: control BP/AFib/weight, **decongest with diuretics**, add **SGLT2i** (± finerenone (Kerendia)). *NABP: 3.C.2 / 3.D.1.*"}, {"id": 20, "group": "HFpEF / HFmrEF", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.2", "stem": "How does **finerenone (Kerendia)** differ from spironolactone (Aldactone)?", "opts": ["It is a β-blocker", "Nonsteroidal, selective MRA — less hyperkalemia/gynecomastia than spironolactone (still monitor K)", "It is an SGLT2 inhibitor", "It blocks neprilysin"], "ans": 1, "exp": "Nonsteroidal selective mineralocorticoid-receptor antagonist; **fewer sex-hormone effects** than spironolactone (Aldactone), but **still causes hyperkalemia** → monitor K/renal. *NABP: 1.A.1 / 3.D.2.*"}, {"id": 21, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient with **HFpEF and obesity (BMI 37)**, NYHA II. Per 2026 evidence, a reasonable add-on for symptoms/events?", "opts": ["Verapamil (Calan)", "Hydralazine", "Tirzepatide (Mounjaro/Zepbound) — dual GIP/GLP-1", "Digoxin (Lanoxin)"], "ans": 2, "exp": "ℹ SUMMIT showed **tirzepatide (Mounjaro)** improved HFpEF symptoms/events in obesity; **SGLT2i** also beneficial. (Cross-ref diabetes/obesity.) *Anchor: SUMMIT. NABP: 3.C.2.*"}, {"id": 22, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "For **HFmrEF (LVEF 41–49%)**, the best-supported therapy is:", "opts": ["High-dose nitrates", "Non-DHP CCB", "Nothing — no evidence", "An SGLT2 inhibitor; HFrEF GDMT (ARNI/ACEi/ARB, β-blocker, MRA) is also reasonable"], "ans": 3, "exp": "**SGLT2i** has the clearest benefit; the four-pillar agents are reasonable extrapolations in the mildly-reduced range. *NABP: 3.C.2.*"}, {"id": 23, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 3.C.1", "stem": "HFpEF is diagnosed by:", "opts": ["LVEF ≥50% + signs/symptoms of HF + elevated NT-proBNP / evidence of diastolic dysfunction", "Low NT-proBNP", "Normal echo", "LVEF <40%"], "ans": 0, "exp": "Preserved EF (≥50%) with HF features and objective evidence (↑ natriuretic peptides, structural/diastolic abnormality). *NABP: 3.B / 3.C.1.*"}, {"id": 24, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "In HFpEF, which is true about **diuresis and nitrates**?", "opts": ["Diurese aggressively to a very low filling pressure", "Avoid over-diuresis (HFpEF is preload-dependent → hypotension/low output); routine nitrates are not beneficial (NEAT-HFpEF)", "Nitrates improve outcomes in all HFpEF", "Diuretics are contraindicated"], "ans": 1, "exp": "Stiff ventricles are **preload-sensitive** → over-diuresis drops output; **routine isosorbide mononitrate showed no activity benefit** (NEAT-HFpEF). Use diuretics for congestion, judiciously. *NABP: 3.D.2.*"}, {"id": 25, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Spironolactone (Aldactone) in HFpEF:", "opts": ["First-line over SGLT2i", "Strong mortality benefit in all HFpEF", "Modest benefit (TOPCAT), greatest at the lower-EF range; monitor potassium", "Contraindicated"], "ans": 2, "exp": "TOPCAT suggested **modest** HF-hospitalization benefit (regional/EF-dependent); reasonable add-on with **K monitoring**, but SGLT2i/finerenone (Kerendia) have clearer data. *NABP: 3.C.2.*"}, {"id": 26, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "A HFpEF patient has new atrial fibrillation (CHA₂DS₂-VASc 4). Priority?", "opts": ["Non-DHP CCB are contraindicated", "No anticoagulation", "Digoxin (Lanoxin) for mortality", "Anticoagulate per CHA₂DS₂-VASc + rate/rhythm control"], "ans": 3, "exp": "AFib is a key HFpEF driver — **anticoagulate** (DOAC unless mechanical valve/APS) and control rate/rhythm. (Non-DHP CCBs are acceptable for rate control in *preserved* EF.) *NABP: 3.C.2 / 3.D.2.*"}, {"id": 27, "group": "HFpEF / HFmrEF", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "SGLT2i initiation threshold and benefit in HFpEF:", "opts": ["Benefit regardless of diabetes or EF; initiate at eGFR ≥20", "Contraindicated below eGFR 60", "Requires insulin", "Only if diabetic; eGFR ≥45"], "ans": 0, "exp": "SGLT2i benefit is **independent of diabetes and EF**; initiate down to **eGFR ≥20.** *NABP: 3.C.2.*"}, {"id": 31, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Ivabradine (Corlanor) is indicated when:", "opts": ["Any HFrEF patient", "NYHA II–III HFrEF (EF ≤35%), in sinus rhythm, HR ≥70 bpm despite a maximally tolerated β-blocker (or BB-intolerant)", "Atrial fibrillation with rapid rate", "HFpEF"], "ans": 1, "exp": "SHIFT criteria: **sinus rhythm + resting HR ≥70 on max BB** → ivabradine reduces HF hospitalization. *Anchor: SHIFT. NABP: 3.C.2.*"}, {"id": 32, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **ivabradine**?", "opts": ["sGC stimulation", "β-blockade", "Selective inhibition of the SA-node If (\"funny\") current → slows heart rate only (no effect on BP or contractility)", "Calcium-channel blockade"], "ans": 2, "exp": "Pure **heart-rate reduction** via I_f inhibition — useful when more β-blocker isn't tolerated. *NABP: 1.A.1.*"}, {"id": 33, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.D.2", "stem": "Which is true about ivabradine?", "opts": ["It lowers blood pressure substantially", "It improves contractility", "It works in atrial fibrillation", "It is ineffective in AFib (requires sinus rhythm); AEs include bradycardia, new AFib, and luminous visual phenomena (phosphenes)"], "ans": 3, "exp": "Needs **sinus rhythm**; watch **bradycardia/AFib/phosphenes.** ✓ Trap: don't use for AFib rate control. *NABP: 2.A.4 / 3.D.2.*"}, {"id": 34, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Vericiguat (Verquvo) is best suited for:", "opts": ["Symptomatic HFrEF (EF <45%) with a recent worsening event (HF hospitalization or IV diuretic)", "HFpEF", "Asymptomatic LV dysfunction", "Stable, never-hospitalized HFrEF"], "ans": 0, "exp": "VICTORIA enrolled **worsening HFrEF** — vericiguat is the \"fifth drug\" after the four pillars. *Anchor: VICTORIA. NABP: 3.C.2.*"}, {"id": 35, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **vericiguat**?", "opts": ["Neprilysin inhibition", "Soluble guanylate cyclase (sGC) stimulator → ↑ cGMP → vasodilation", "β-blockade", "SGLT2 inhibition"], "ans": 1, "exp": "sGC stimulation (NO–cGMP pathway). AE: **hypotension, syncope, anemia.** *NABP: 1.A.1.*"}, {"id": 36, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "Vericiguat should NOT be combined with:", "opts": ["A loop diuretic", "A β-blocker", "PDE5 inhibitors (sildenafil) or another sGC stimulator (riociguat) — additive hypotension", "An SGLT2 inhibitor"], "ans": 2, "exp": "Both act on the NO–cGMP pathway → **severe hypotension**; avoid the combination. *NABP: 3.C.3.*"}, {"id": 37, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Digoxin (Lanoxin)'s role in HFrEF is best described as:", "opts": ["First-line GDMT", "Contraindicated in HF", "Reduces mortality", "Reduces symptoms and HF hospitalizations (no mortality benefit); target level 0.5–0.9 ng/mL"], "ans": 3, "exp": "DIG trial — **hospitalization/symptom** benefit, **neutral mortality**; keep level **0.5–0.9.** *Anchor: DIG. NABP: 3.C.2 / 3.D.2.*"}, {"id": 38, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.6", "stem": "Digoxin (Lanoxin) toxicity is potentiated by:", "opts": ["Hypokalemia, hypomagnesemia, and P-gp inhibitors (amiodarone, verapamil (Calan)) → reduce digoxin (Lanoxin) dose ~50%", "High dietary fiber", "Exercise", "Hyperkalemia and hypermagnesemia"], "ans": 0, "exp": "↓K/↓Mg and **P-gp inhibitors** raise digoxin (Lanoxin) effect/levels → **dose-reduce and monitor.** *NABP: 3.C.3 / 3.C.6.*"}, {"id": 39, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which should be **AVOIDED** in HFrEF?", "opts": ["Carvedilol (Coreg)", "Non-dihydropyridine CCBs (verapamil, diltiazem (Cardizem)) — negative inotropes", "Dapagliflozin (Farxiga)", "Spironolactone (Aldactone)"], "ans": 1, "exp": "Non-DHP CCBs depress contractility → **avoid in HFrEF.** (Acceptable in HFpEF.) *NABP: 3.C.2 / 2.A.4.*"}, {"id": 40, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.C.3", "stem": "Why are **NSAIDs** problematic in HF?", "opts": ["No effect", "They lower potassium", "Sodium/fluid retention, renal vasoconstriction, and blunting of diuretics/ACEi → decompensation", "They cause hypoglycemia"], "ans": 2, "exp": "NSAIDs worsen congestion and renal function and **antagonize HF therapies.** *NABP: 3.C.2 / 3.C.3.*"}, {"id": 41, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which antidiabetic class is **contraindicated/avoided** in symptomatic HF due to fluid retention?", "opts": ["Metformin (Glucophage)", "GLP-1 RAs", "SGLT2 inhibitors", "Thiazolidinediones (pioglitazone/rosiglitazone (Avandia)) — boxed warning for HF"], "ans": 3, "exp": "TZDs cause **fluid retention → HF (BBW).** (SGLT2i are *beneficial* in HF.) *NABP: 3.C.2.*"}, {"id": 42, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which antiarrhythmic is generally **safe** in HFrEF?", "opts": ["Amiodarone (or dofetilide)", "Dronedarone", "Sotalol (Betapace)", "Flecainide"], "ans": 0, "exp": "**Amiodarone (Pacerone) and dofetilide** don't worsen HF mortality. ⚠ Avoid **class IC (flecainide/propafenone, CAST)**, **dronedarone (CI in NYHA IV/decompensated, ANDROMEDA)**, and **sotalol (Betapace)** (proarrhythmic/negative inotrope). *NABP: 3.C.2.*"}, {"id": 43, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which DPP-4 inhibitors are associated with **increased HF hospitalization** (avoid in HF)?", "opts": ["Sitagliptin (Januvia) and linagliptin (Tradjenta)", "Saxagliptin (Onglyza) and alogliptin (Nesina)", "All DPP-4 inhibitors equally", "None"], "ans": 1, "exp": "**Saxagliptin (SAVOR-TIMI)** and **alogliptin (EXAMINE)** ↑ HF hospitalization; sitagliptin (Januvia)/linagliptin (Tradjenta) are HF-neutral. *NABP: 3.C.2.*"}, {"id": 46, "group": "HFrEF Add-Ons + Drugs To Avoid", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "HFrEF (EF 28%) with AFib needing rate control. Best options?", "opts": ["Dronedarone", "Verapamil (Calan) or diltiazem (Cardizem)", "A β-blocker (carvedilol) ± digoxin (Lanoxin); amiodarone (Pacerone) if needed", "Flecainide"], "ans": 2, "exp": "Use the HF β-blocker ± **digoxin (Lanoxin)** for rate control; **avoid non-DHP CCBs** (negative inotrope) and class IC/dronedarone. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 47, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.6", "stem": "ADHF patient is **\"warm and wet\"** (congested, well-perfused). First-line?", "opts": ["Vasopressor", "IV fluids", "Inotrope", "IV loop diuretic ± IV vasodilator"], "ans": 3, "exp": "Wet = congestion → **decongest with IV loop diuretic** (± nitroglycerin if hypertensive). Warm = adequate perfusion → no inotrope needed. *NABP: 3.D.2 / 3.C.6.*"}, {"id": 48, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "A **\"cold and wet\"** patient (hypoperfused + congested), SBP 95. Best approach?", "opts": ["An inotrope (dobutamine or milrinone) to restore perfusion, plus IV diuretic (± vasopressor if hypotensive)", "Beta-blocker uptitration", "Non-DHP CCB", "IV loop diuretic alone"], "ans": 0, "exp": "Cold = low output → **inotrope** to perfuse, then decongest; add a vasopressor if frankly hypotensive. ✓ Don't uptitrate β-blocker in shock. *NABP: 3.D.2.*"}, {"id": 49, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Dosing IV loop diuretic in ADHF for a patient on home furosemide (Lasix):", "opts": ["Half the home oral dose", "At least the total daily home oral dose given IV (often 1–2.5× the oral dose)", "No diuretic", "Oral only"], "ans": 1, "exp": "IV dose should **equal or exceed** the home oral total (DOSE trial); IV bioavailability > oral, especially with gut edema. *NABP: 3.D.2.*"}, {"id": 50, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.3", "stem": "Diuretic resistance despite high-dose IV loop. Best next step?", "opts": ["Restrict all fluids only", "Stop the loop", "Add a thiazide-type agent (metolazone) for sequential nephron blockade — or continuous loop infusion; acetazolamide (ADVOR) also aids decongestion", "Add an NSAID"], "ans": 2, "exp": "**Sequential nephron blockade** (metolazone 30 min before the loop) or **continuous infusion**; ℹ **acetazolamide** improves decongestion (ADVOR). *NABP: 3.D.2 / 3.C.3.*"}, {"id": 51, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.2", "stem": "MOA of **milrinone**?", "opts": ["Soluble guanylate cyclase stimulator", "Loop diuretic", "β1 agonist", "PDE3 inhibitor → ↑ cAMP → inotropy + vasodilation (\"inodilator\"); renally eliminated"], "ans": 3, "exp": "Inodilator; **accumulates in renal failure** → hypotension/arrhythmia. *NABP: 1.A.1 / 3.D.2.*"}, {"id": 52, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.D.2", "stem": "A patient in low-output HF is on **carvedilol (Coreg)**. Preferred inotrope?", "opts": ["Milrinone — its effect is independent of the β-receptor (dobutamine is blunted by β-blockade)", "Norepinephrine", "Digoxin (Lanoxin)", "Dobutamine"], "ans": 0, "exp": "Dobutamine works **through β1**, which carvedilol (Coreg) blocks → use **milrinone** (PDE3, β-independent). ✓ Classic discriminator. *NABP: 3.C.3 / 3.D.2.*"}, {"id": 53, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA/effect of **dobutamine**?", "opts": ["Pure vasoconstrictor", "β1 agonist → ↑ contractility (+ mild vasodilation); AE: tachyarrhythmia", "PDE3 inhibitor", "sGC stimulator"], "ans": 1, "exp": "β1-mediated inotrope; watch **tachycardia/arrhythmias**, tolerance. *NABP: 1.A.1.*"}, {"id": 54, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6 / 2.A.5", "stem": "A patient on **nitroprusside** infusion with renal impairment develops altered mental status/acidosis. Concern?", "opts": ["Serotonin syndrome", "Hyperkalemia", "Cyanide/thiocyanate toxicity (accumulates in renal/hepatic impairment, prolonged/high-dose infusions)", "QT prolongation"], "ans": 2, "exp": "Nitroprusside (afterload reducer) → **cyanide/thiocyanate toxicity** — limit duration/dose, caution in organ impairment. *NABP: 3.C.6 / 2.A.5.*"}, {"id": 55, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "IV **nitroglycerin** is most useful in ADHF for:", "opts": ["Inotropy", "Rate control", "Raising blood pressure", "Preload reduction in acute pulmonary congestion (especially with hypertension)"], "ans": 3, "exp": "Venodilation → **↓ preload/pulmonary congestion**; helpful in hypertensive acute HF. *NABP: 3.C.2.*"}, {"id": 56, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "First-line vasopressor in **cardiogenic shock**?", "opts": ["Norepinephrine", "Phenylephrine", "Vasopressin alone", "Dopamine"], "ans": 0, "exp": "**Norepinephrine** is preferred over dopamine (fewer arrhythmias, lower mortality — SOAP II); add an inotrope (dobutamine) for output. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 57, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.6", "stem": "Acute cardiogenic **pulmonary edema** — which is NO LONGER routinely recommended?", "opts": ["Oxygen / noninvasive ventilation", "Morphine (associated with worse outcomes)", "IV loop diuretic", "IV nitroglycerin"], "ans": 1, "exp": "**Morphine (MS Contin) is avoided** (↑ respiratory depression/mortality). Use IV loop + nitrates + O₂/NIV + upright positioning. *NABP: 3.C.6.*"}, {"id": 58, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Why might **torsemide** be chosen over furosemide (Lasix)?", "opts": ["It has no ceiling", "It is weaker", "More predictable/complete oral absorption and longer half-life (useful with gut edema or poor furosemide (Lasix) response)", "It is potassium-sparing"], "ans": 2, "exp": "Torsemide (and bumetanide) absorb better than furosemide (~50% variable bioavailability); torsemide has a **longer duration.** *NABP: 1.A.2 / 3.C.2.*"}, {"id": 59, "group": "Acute Decompensated HF / Cardiogenic Shock + Diuretics", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.D.3", "stem": "Key loop-diuretic adverse effects/monitoring include all EXCEPT:", "opts": ["Hypokalemia / hypomagnesemia", "Hyponatremia / metabolic alkalosis", "Ototoxicity (high-dose IV) / ↑ uric acid", "Hyperkalemia"], "ans": 3, "exp": "Loops cause **HYPO**kalemia (not hyper); also hypomagnesemia, hyponatremia, contraction alkalosis, ototoxicity, hyperuricemia. *NABP: 3.D.2 / 3.D.3.*"}, {"id": 63, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 3.C.1", "stem": "The ACC/AHA HF **stages** describe:", "opts": ["Disease progression: A (at risk) → B (structural/pre-HF, no symptoms) → C (symptomatic HF) → D (advanced/refractory)", "Ejection fraction only", "Drug classes", "Functional symptom severity"], "ans": 0, "exp": "Stages are **progression-based** (A–D) and don't regress. NYHA describes current symptoms separately. *NABP: 3.B / 3.C.1.*"}, {"id": 64, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B", "stem": "NYHA functional classification grades:", "opts": ["Structural disease", "Symptom/activity limitation: I (none) → IV (symptoms at rest)", "Ejection fraction", "Biomarker level"], "ans": 1, "exp": "NYHA I–IV reflects **functional limitation** and can change with treatment. *NABP: 3.B.*"}, {"id": 65, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.1", "stem": "Current LVEF-based HF categories are:", "opts": ["Based on BNP", "HFrEF <50, HFpEF ≥50", "HFrEF ≤40 · HFmrEF 41–49 · HFpEF ≥50 (+ HF with improved EF)", "Only reduced vs preserved"], "ans": 2, "exp": "Three EF bands drive therapy choice; \"**improved EF**\" denotes recovered HFrEF. *NABP: 3.C.1.*"}, {"id": 66, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.1 / 3.D.3", "stem": "Which BNP/NT-proBNP interpretation is correct?", "opts": ["Obesity raises BNP", "NT-proBNP is a neprilysin substrate", "BNP is always low in HF", "Natriuretic peptides rise in HF (also ↑ with age/renal failure/AFib, ↓ with obesity); on sacubitril/valsartan (Entresto), BNP rises — follow NT-proBNP instead"], "ans": 3, "exp": "Confounders: **obesity lowers, renal/age/AFib raise**; ARNI raises **BNP** (neprilysin substrate) → monitor **NT-proBNP.** *NABP: 3.C.1 / 3.D.3.*"}, {"id": 67, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.C.2", "stem": "A HFrEF patient on lisinopril (Zestril) develops a persistent dry cough. Best change?", "opts": ["Switch to an ARB (or ARNI) — cough is bradykinin-mediated", "Stop all RAAS therapy", "Increase the dose", "Add a cough suppressant"], "ans": 0, "exp": "ACEi cough (bradykinin) → **switch to an ARB/ARNI** (no cough). Angioedema → also avoid ACEi. *NABP: 3.C.5 / 3.C.2.*"}, {"id": 68, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "HFrEF patient on ACEi + spironolactone (Aldactone) now has **K⁺ 5.9.** Best action?", "opts": ["Continue unchanged", "Hold/reduce the MRA (± ACEi), counsel low-K diet, consider patiromer (Veltassa)/SZC, and recheck K", "Add a potassium supplement", "Add an NSAID"], "ans": 1, "exp": "Manage **hyperkalemia**: reduce/hold the K-raising agent, dietary counseling, **potassium binder** if needed, recheck — preserve GDMT where possible. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 69, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2 / 3.D.3", "stem": "After starting or up-titrating an ACEi/ARB/ARNI, monitor:", "opts": ["Liver enzymes", "TSH", "Potassium, serum creatinine, and blood pressure within ~1–2 weeks", "INR"], "ans": 2, "exp": "RAAS agents → **hyperK, ↑ SCr, hypotension** → recheck early and after each change. *NABP: 3.D.2 / 3.D.3.*"}, {"id": 70, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "A diabetic HFrEF patient on carvedilol (Coreg) should be counseled that β-blockers can:", "opts": ["Replace insulin", "Cause weight loss", "Cause hyperglycemia", "Mask the adrenergic warning symptoms of hypoglycemia (e.g., tremor/tachycardia)"], "ans": 3, "exp": "β-blockers **blunt hypoglycemia awareness** (sweating persists); also bradycardia/fatigue. Still indicated for HFrEF. *NABP: 3.E.2 / 3.C.3.*"}, {"id": 71, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A pregnant patient develops HFrEF (peripartum cardiomyopathy). Which agents must be **avoided**?", "opts": ["ACEi, ARB, ARNI, SGLT2 inhibitors, and MRAs (teratogenic/unsafe in pregnancy)", "Hydralazine and nitrates", "All HF drugs", "β-blockers and diuretics"], "ans": 0, "exp": "Avoid **RAAS agents (ACEi/ARB/ARNI), SGLT2i, MRAs**; use **hydralazine + nitrates**, a pregnancy-preferred β-blocker (**labetalol (Trandate) or carvedilol (Coreg)** — avoid atenolol), and diuretics cautiously. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 72, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "In peripartum cardiomyopathy with a very low EF, an added consideration is:", "opts": ["No special concerns", "Anticoagulation (high thromboembolic risk with very low EF) + pregnancy-adapted GDMT", "Routine SGLT2i", "ARNI first-line"], "ans": 1, "exp": "Markedly reduced EF → **thromboembolism risk** → consider anticoagulation; tailor GDMT to pregnancy-safe agents. *NABP: 3.C.2.*"}, {"id": 73, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 4.B", "stem": "A stage D (advanced/refractory) HF patient intolerant of GDMT due to hypotension. Appropriate path?", "opts": ["Add an NSAID", "Force full-dose GDMT", "Refer for advanced therapies (transplant/LVAD evaluation); consider palliative inotropes/hospice if not a candidate", "Stop all therapy"], "ans": 2, "exp": "Stage D → **advanced-therapy referral** (transplant/mechanical support) or **palliative inotrope/hospice**; GDMT often not tolerated. *NABP: 3.C.2 / 4.B.*"}, {"id": 74, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.A / 3.E.3", "stem": "Which reduces 30-day HF readmissions at the transition from hospital to home?", "opts": ["No follow-up", "Sodium loading", "Stopping GDMT at discharge", "Medication reconciliation, early follow-up (≈7–14 days), and self-care education (daily weights)"], "ans": 3, "exp": "Structured **transitions of care** (med rec + early follow-up + education) cut readmissions. *NABP: 5.A / 3.E.3.*"}, {"id": 75, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.3", "stem": "Self-monitoring instruction for a HF patient regarding **daily weights**?", "opts": ["Weigh daily (same time/scale); report a gain of ≈2–3 lb in a day or ≈5 lb in a week", "Weight is irrelevant", "Only if symptomatic", "Weigh weekly"], "ans": 0, "exp": "Rapid weight gain signals fluid retention → call before decompensation. *NABP: 3.E.3.*"}, {"id": 76, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.1", "stem": "Dietary counseling in HF typically includes:", "opts": ["High sodium", "Sodium restriction (~2–3 g/day); fluid restriction if hyponatremic or advanced HF", "Unlimited fluids", "High-protein loading"], "ans": 1, "exp": "Moderate **sodium restriction**; **fluid restriction** reserved for hyponatremia/advanced HF. *NABP: 3.E.1.*"}, {"id": 77, "group": "Staging/Bnp · Monitoring · Special Populations · Counseling", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.C.1 / 4.B", "stem": "Recommended vaccinations for HF patients include:", "opts": ["Live attenuated only", "None", "Influenza (annual) and pneumococcal vaccination", "Only travel vaccines"], "ans": 2, "exp": "**Influenza + pneumococcal** reduce HF exacerbations/mortality (also COVID, RSV by age). *NABP: 2.C.1 / 4.B.*"}, {"id": 81, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Entresto** is the brand name for:", "opts": ["valsartan alone", "spironolactone", "ivabradine", "sacubitril/valsartan"], "ans": 3, "exp": "Entresto = **sacubitril/valsartan (Entresto)** (ARNI). *NABP: 2.A.1.*"}, {"id": 82, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "Match the HFrEF β-blocker brands: **Coreg, Toprol-XL, Zebeta** are:", "opts": ["carvedilol, metoprolol succinate, bisoprolol", "metoprolol tartrate, atenolol, nadolol", "bisoprolol, carvedilol, sotalol", "nebivolol, labetalol, esmolol"], "ans": 0, "exp": "Coreg = **carvedilol (Coreg)**, Toprol-XL = **metoprolol (Lopressor) succinate (ER)**, Zebeta = **bisoprolol (Zebeta)** — the three evidence-based HFrEF β-blockers. *NABP: 2.A.1.*"}, {"id": 83, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Kerendia, Corlanor, and Verquvo** are, respectively:", "opts": ["vericiguat, ivabradine, finerenone", "finerenone, ivabradine, vericiguat", "ivabradine, finerenone, vericiguat", "finerenone, vericiguat, ivabradine"], "ans": 1, "exp": "Kerendia = **finerenone (Kerendia)**, Corlanor = **ivabradine**, Verquvo = **vericiguat.** *NABP: 2.A.1.*"}, {"id": 84, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Lasix, Bumex, and Demadex** are which loop diuretics?", "opts": ["metolazone, furosemide, bumetanide", "bumetanide, furosemide, ethacrynic acid", "furosemide, bumetanide, torsemide", "furosemide, torsemide, bumetanide"], "ans": 2, "exp": "Lasix = **furosemide (Lasix)**, Bumex = **bumetanide**, Demadex = **torsemide.** *NABP: 2.A.1.*"}, {"id": 85, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Aldactone** and **Inspra** are:", "opts": ["eplerenone and spironolactone", "finerenone and spironolactone", "amiloride and triamterene", "spironolactone and eplerenone"], "ans": 3, "exp": "Aldactone = **spironolactone (Aldactone)** (nonselective MRA), Inspra = **eplerenone (Inspra)** (selective MRA). *NABP: 2.A.1.*"}, {"id": 86, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.D.3", "stem": "MOA of **sacubitril/valsartan (Entresto)**?", "opts": ["Valsartan (Diovan) blocks AT₁ receptors + sacubitril inhibits neprilysin → ↑ natriuretic peptides", "Valsartan (Diovan) blocks AT₁ receptors + sacubitril activates neprilysin → ↑ peptide clearance", "Aliskiren inhibits renin + sacubitril inhibits neprilysin → ↑ natriuretic peptides", "Valsartan (Diovan) blocks AT₁ receptors + sacubitril inhibits ACE → ↓ angiotensin II + ↑ bradykinin"], "ans": 0, "exp": "Sacubitril is a **neprilysin inhibitor** (↑ ANP/BNP/bradykinin), not an ACEi — **D** describes omapatrilat, abandoned for angioedema. Neprilysin activation **B** would ↓ peptides; the ARB partner is valsartan (Diovan), not aliskiren **C**. ✓ BNP rises on ARNI → follow **NT-proBNP.** *NABP: 1.A.1 / 3.D.3.*"}, {"id": 87, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "How do **spironolactone (Aldactone)** and **eplerenone (Inspra)** differ?", "opts": ["Both block the MR, but only eplerenone (Inspra) carries a meaningful hyperkalemia risk", "Both block the mineralocorticoid receptor; spironolactone (Aldactone) is nonselective (gynecomastia/↓ libido), eplerenone (Inspra) is selective (fewer antiandrogen AEs)", "Both block the MR; eplerenone (Inspra) is nonselective (gynecomastia), spironolactone (Aldactone) is selective (fewer hormonal AEs)", "Spironolactone (Aldactone) blocks the MR; eplerenone (Inspra) blocks the epithelial Na channel like amiloride"], "ans": 1, "exp": "Reversed selectivity **C** is the trap — eplerenone (Inspra) is the **selective** one (switch to it for gynecomastia). Eplerenone is not an ENaC blocker **D**, and **both** MRAs cause hyperkalemia, so **A** is wrong → monitor K. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 88, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **loop diuretics** (furosemide/torsemide/bumetanide)?", "opts": ["Antagonize aldosterone at the cortical collecting duct", "Inhibit carbonic anhydrase in the proximal tubule → ↑ bicarbonate excretion", "Inhibit the Na-K-2Cl (NKCC2) cotransporter in the thick ascending limb of Henle", "Block the Na-Cl cotransporter in the distal convoluted tubule"], "ans": 2, "exp": "All four are real diuretic targets — **B** = acetazolamide, **D** = thiazide, **A** = MRA; loops hit **NKCC2.** AE: ↓K/↓Mg, ototoxicity. *NABP: 1.A.1.*"}, {"id": 89, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **digoxin (Lanoxin)**?", "opts": ["Inhibits phosphodiesterase-3 → ↑ cAMP → ↑ contractility + vasodilation", "Stimulates β₁ receptors → ↑ cAMP → ↑ contractility and heart rate", "Sensitizes troponin C to calcium → ↑ contractility without ↑ intracellular Ca²⁺", "Inhibits Na/K-ATPase → ↑ intracellular Ca²⁺ → ↑ contractility; ↑ vagal tone → ↓ AV conduction"], "ans": 3, "exp": "Na/K-ATPase inhibition + vagal AV slowing (helps HF + AFib rate); narrow TI (0.5–0.9 ng/mL). The others are real inotrope MOAs — **A** = milrinone, **B** = dobutamine, **C** = calcium sensitizers. *NABP: 1.A.1.*"}, {"id": 90, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **hydralazine + isosorbide dinitrate**?", "opts": ["Hydralazine = arterial vasodilator (↓ afterload); ISDN = NO-mediated venodilator (↓ preload)", "Hydralazine = venodilator (↓ preload); ISDN = arterial vasodilator (↓ afterload)", "Both are arterial vasodilators reducing afterload via NO donation", "Both are venodilators reducing preload; neither affects afterload"], "ans": 0, "exp": "Reversed roles **B** is the trap — hydralazine is **arterial** (afterload), the nitrate is **venous** (preload); their actions are complementary, not identical **C**/**D**. ⚠ Nitrate tolerance → need a nitrate-free interval. *NABP: 1.A.1.*"}, {"id": 91, "group": "Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.2 / 3.D.2", "stem": "Target maintenance dose and titration of **sacubitril/valsartan (Entresto)** in HFrEF?", "opts": ["Start 24/26 mg once daily, titrate weekly to a 49/51 mg once-daily target", "Start 49/51 mg BID (24/26 if low BP, renal impairment, or ACEi/ARB-naïve), double q2–4 wk to target 97/103 mg BID", "Start 97/103 mg BID immediately; no titration is required", "Start 49/51 mg BID and titrate no higher than 49/51 mg BID"], "ans": 1, "exp": "Target is **97/103 mg BID**, dosed **BID**, up-titrated **q2–4 wk** as BP/renal/K tolerate. **A** uses once-daily; **C** skips titration; **D** stops below target. *NABP: 2.A.2 / 3.D.2.*"}, {"id": 92, "group": "Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.2", "stem": "Target dose of **carvedilol (Coreg)** in HFrEF?", "opts": ["6.25 mg BID maximum", "12.5 mg BID maximum", "25 mg BID (50 mg BID if >85 kg)", "50 mg BID for all patients regardless of weight"], "ans": 2, "exp": "Up-titrate to **25 mg BID**, or **50 mg BID only if >85 kg.** **A/B** are sub-target start/intermediate doses; **D** over-doses lighter patients. (Metoprolol succinate target 200 mg daily; bisoprolol (Zebeta) 10 mg daily.) *NABP: 2.A.2.*"}, {"id": 93, "group": "Drug Essentials", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.2 / 3.D.2", "stem": "Dosing of **ivabradine (Corlanor)**?", "opts": ["Start 7.5 mg BID; titrate down only if HR <50 bpm, with no defined maximum", "Start 5 mg once daily; titrate to resting HR 60–70 bpm (max 10 mg daily)", "Start 2.5 mg BID; titrate to resting HR 70–80 bpm (max 5 mg BID)", "Start 5 mg BID (2.5 mg BID if conduction risk/low HR); titrate to resting HR 50–60 bpm (max 7.5 mg BID)"], "ans": 3, "exp": "BID dosing, target **resting HR 50–60**, max **7.5 mg BID**; start 2.5 BID if bradycardia/conduction risk. **A**, **B**, and **C** miss the start dose, HR target, or maximum. *NABP: 2.A.2 / 3.D.2.*"}, {"id": 94, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "Approximate **PO loop diuretic dose equivalence**?", "opts": ["Furosemide (Lasix) 40 mg ≈ torsemide 20 mg ≈ bumetanide 1 mg", "Furosemide (Lasix) 40 mg ≈ torsemide 80 mg ≈ bumetanide 4 mg", "Furosemide (Lasix) 20 mg ≈ torsemide 20 mg ≈ bumetanide 20 mg", "Furosemide (Lasix) 40 mg ≈ torsemide 10 mg ≈ bumetanide 0.5 mg"], "ans": 0, "exp": "Ratio **40 : 20 : 1** (furosemide : torsemide : bumetanide). ★ IV furosemide (Lasix) ~2× as potent as PO. **B** inverts potency; **C** treats them as equipotent; **D** halves torsemide/bumetanide. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 95, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Most important monitoring after starting an **MRA**?", "opts": ["Heart rate and a 12-lead ECG before each dose increase", "Serum potassium and renal function within ~1 week, then periodically", "Serum sodium and a fasting lipid panel at baseline and 3 months", "Liver enzymes and CK within 1 week for myopathy risk"], "ans": 1, "exp": "MRAs → **hyperkalemia + ↑ SCr** → check K/renal early; hold if K >5.0–5.5 or eGFR drops. The others fit different drugs (statin = CK/LFT; β-blocker/ivabradine = HR/ECG). *NABP: 3.D.2.*"}, {"id": 96, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3 / 2.A.4", "stem": "Monitoring/counseling for **sacubitril/valsartan (Entresto)**?", "opts": ["NT-proBNP, potassium, renal function, BP; counsel on a persistent dry cough", "Potassium, renal function, BP, and routine LFTs; counsel on photosensitivity", "NT-proBNP (not BNP), potassium, renal function, BP; counsel on angioedema", "BNP (not NT-proBNP), potassium, renal function, BP; counsel on angioedema"], "ans": 2, "exp": "Use **NT-proBNP** because neprilysin inhibition **raises BNP** (BNP is a neprilysin substrate) → **D** is the trap. ARNI causes **angioedema, not cough** — **A** is the ACEi pearl; no LFT/photosensitivity monitoring, so **B** is wrong. *NABP: 3.D.3 / 2.A.4.*"}, {"id": 97, "group": "Drug Essentials", "domain": "D2", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.6", "stem": "A digoxin (Lanoxin) patient is started on **amiodarone (Pacerone).** Best action?", "opts": ["Increase digoxin (Lanoxin) ~50% — amiodarone (Pacerone) induces P-gp → ↓ digoxin levels", "Continue the same digoxin (Lanoxin) dose but add empiric potassium supplementation", "Reduce digoxin (Lanoxin) ~50% — amiodarone (Pacerone) displaces digoxin from tissue but does not change the level", "Reduce digoxin (Lanoxin) ~50% and monitor level (0.5–0.9), K, Mg — amiodarone (Pacerone) inhibits P-gp → ↑ digoxin"], "ans": 3, "exp": "Amiodarone (and verapamil (Calan)) **inhibit P-gp → ↑ digoxin (Lanoxin)** → halve the dose + monitor (↓K/↓Mg potentiate toxicity). **A** reverses the direction; **B** ignores the dose change; **C** gives the right action for the wrong reason. *NABP: 3.C.3 / 3.C.6.*"}, {"id": 101, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "ADHF patient on **furosemide (Lasix) 40 mg IV BID** is transitioning to oral. Equivalent total daily **PO furosemide** dose? (IV:PO furosemide ≈ 1:2)", "opts": ["160 mg/day", "320 mg/day", "40 mg/day", "80 mg/day"], "ans": 0, "exp": "Oral furosemide (Lasix) is ~50% bioavailable → PO dose ≈ **2× IV.** 40 mg IV BID = 80 mg/day IV → **160 mg/day PO** (80 mg PO BID). ★ Torsemide/bumetanide are ~80–100% bioavailable (≈1:1 IV:PO) — furosemide is the exception. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 102, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Switching **furosemide (Lasix) 80 mg PO daily** to **torsemide.** Approximate equivalent dose?", "opts": ["20 mg", "40 mg", "80 mg", "10 mg"], "ans": 1, "exp": "Ratio **40 : 20 : 1** (furosemide : torsemide : bumetanide) → 80 mg furosemide (Lasix) ≈ **40 mg torsemide.** *NABP: 1.C.4.*"}, {"id": 103, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Same patient — equivalent **bumetanide** dose for furosemide (Lasix) 80 mg PO?", "opts": ["0.5 mg", "1 mg", "2 mg", "4 mg"], "ans": 2, "exp": "40 mg furosemide (Lasix) ≈ 1 mg bumetanide → 80 mg ≈ **2 mg bumetanide.** ★ Bumetanide is the most potent loop (mg-for-mg). *NABP: 1.C.4.*"}, {"id": 104, "group": "Calculations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "Cardiogenic shock, **70 kg**, dobutamine ordered **5 mcg/kg/min**; bag **250 mg/250 mL.** Infusion rate?", "opts": ["42 mL/hr", "5 mL/hr", "10.5 mL/hr", "21 mL/hr"], "ans": 3, "exp": "Concentration = 250 mg/250 mL = **1000 mcg/mL.** Dose = 5 × 70 = 350 mcg/min × 60 = 21,000 mcg/hr ÷ 1000 = **21 mL/hr.** *NABP: 1.C.4 / 3.D.2.*"}, {"id": 105, "group": "Calculations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "ADHF on IV **nitroglycerin 20 mcg/min**; bag **50 mg/250 mL.** Rate?", "opts": ["6 mL/hr", "12 mL/hr", "20 mL/hr", "3 mL/hr"], "ans": 0, "exp": "Concentration = 50 mg/250 mL = **200 mcg/mL.** 20 mcg/min × 60 = 1200 mcg/hr ÷ 200 = **6 mL/hr.** ⚠ NTG is dosed mcg/**min**, not mcg/kg/min — do **not** multiply by weight. *NABP: 1.C.4 / 3.D.2.*"}, {"id": 106, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.C.2", "stem": "**Entresto 49/51 mg**, 1 tab PO BID, dispense **#60.** Days supply?", "opts": ["20", "30", "60", "15"], "ans": 1, "exp": "2 tabs/day → 60 ÷ 2 = **30 days.** *NABP: 1.C.2.*"}, {"id": 107, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.A.2", "stem": "HFrEF, **70 y/o woman, 60 kg, SCr 1.3 mg/dL.** Cockcroft-Gault CrCl?", "opts": ["62 mL/min", "28 mL/min", "38 mL/min", "48 mL/min"], "ans": 2, "exp": "CG = [(140 − age) × wt × 0.85 (female)] / (72 × SCr) = (70 × 60 × 0.85)/(72 × 1.3) = 3570/93.6 ≈ **38 mL/min.** ✓ Drives digoxin (Lanoxin)/renal dosing and MRA/SGLT2i thresholds. *NABP: 1.C.4 / 1.A.2.*"}, {"id": 108, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 2.A.2", "stem": "Converting **metoprolol (Lopressor) succinate (Toprol-XL) 100 mg daily** to **metoprolol tartrate.** Equivalent regimen?", "opts": ["100 mg BID", "200 mg daily", "25 mg BID", "50 mg BID"], "ans": 3, "exp": "Succinate : tartrate ≈ **1:1 total daily dose** → 100 mg/day = **50 mg tartrate BID.** ⚠ Tartrate (IR) is **not** the mortality-benefit HF formulation — this is a conversion, not a therapy recommendation. *NABP: 1.C.4 / 2.A.2.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();
const APPKEY="naplexQuiz:Heart Failure";let MEM={attempts:[],topic:{},dom:{},missed:[]};
function loadP(){try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function getP(){return loadP()||MEM;}
function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
