body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

<script>
const ITEMS = [{"id": "CF-001", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "CFTR is best described as which type of epithelial protein?", "opts": ["A cAMP/PKA-regulated apical anion channel conducting both Cl⁻ and HCO₃⁻", "A calcium-activated chloride channel that operates independently of intracellular ATP", "An amiloride-sensitive epithelial sodium channel responsible for Na⁺ reabsorption", "A voltage-gated potassium channel that repolarizes the apical membrane"], "ans": 0, "exp": "CFTR is an **ABC-transporter-family, cAMP/PKA-regulated apical anion channel** (Cl⁻ and **HCO₃⁻**). Loss → ↓ luminal anion/H₂O secretion + ↑ ENaC Na⁺/H₂O reabsorption → **dehydrated viscous secretions**. ENaC is separate; CFTR is not Ca²⁺-activated or voltage-gated.", "anchor": "CF P1 §1"}, {"id": "CF-002", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T1", "nabp": "1.A.2", "recall": true, "stem": "What is the inheritance pattern of cystic fibrosis?", "opts": ["X-linked recessive", "Autosomal recessive", "Autosomal dominant", "Mitochondrial"], "ans": 1, "exp": "**Autosomal recessive** — 2 disease-causing CFTR variants (1 per allele). Gene on **chromosome 7q31.2**.", "anchor": "CF P1 §1"}, {"id": "CF-003", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T1", "nabp": "1.A.2", "recall": true, "stem": "Which CFTR variant is the single most common in persons with CF?", "opts": ["G551D", "G542X", "F508del", "R117H"], "ans": 2, "exp": "**F508del** (class II, processing/trafficking) is carried by **~85–90%** of pwCF (~45% homozygous). G551D = prototype gating (class III); G542X = class I nonsense; R117H = class IV.", "anchor": "CF P1 §1"}, {"id": "CF-004", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "F508del belongs to which mutation class, and what is the underlying defect?", "opts": ["Class I — no protein synthesis from a premature termination codon", "Class III — defective gating: channel reaches the surface but will not open", "Class IV — defective conductance: channel opens but ion flow is reduced", "Class II — defective processing/trafficking: protein is ER-degraded before the surface"], "ans": 3, "exp": "**F508del = class II**: misfolded → ER-degraded → **↓↓ surface CFTR**. The little protein that reaches the surface also gates poorly → F508del needs **corrector(s) + potentiator**. Class III (G551D) = gating; class I = no protein; class IV = ↓ conductance.", "anchor": "CF P1 §1"}, {"id": "CF-005", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "A patient carries G551D. Which class and matching modulator strategy applies?", "opts": ["Class III gating defect → potentiator (ivacaftor), because protein is at the surface but closed", "Class II trafficking defect → a corrector is sufficient on its own", "Class I nonsense defect → an investigational read-through agent is required", "Class V splice defect → a corrector plus potentiator combination is mandatory"], "ans": 0, "exp": "**G551D = class III gating**: CFTR reaches the surface but won't open → a **potentiator (ivacaftor)** holds it open. No corrector needed because trafficking is intact (contrast F508del).", "anchor": "CF P1 §1, §3"}, {"id": "CF-006", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Why does F508del require BOTH a corrector and a potentiator rather than a potentiator alone?", "opts": ["Correctors are needed only to overcome the CYP3A induction caused by F508del", "The variant traffics poorly to the surface AND gates poorly once it arrives there", "A potentiator alone would predictably cause hepatotoxicity in F508del patients", "F508del makes no protein at all, so the corrector must synthesize new CFTR"], "ans": 1, "exp": "**Correctors** fix folding/trafficking (get protein to the surface — class II); **potentiators** hold the surface channel open (gating). F508del has **both** problems → needs ≥1 corrector + a potentiator. Class I = truly no protein; correctors can't help those.", "anchor": "CF P1 §3"}, {"id": "CF-007", "type": "MCQ", "subtopic": "Pathophysiology & Genetics", "domain": "D1", "tier": "T3", "nabp": "1.A.1", "stem": "Why is sweat chloride HIGH in CF when most other secretions are chloride-poor?", "opts": ["Aldosterone excess in CF drives chloride retention within the sweat duct", "CF increases sweat-gland chloride secretion through upregulated ENaC channels", "In the sweat duct CFTR normally reabsorbs Cl⁻, so its loss leaves Cl⁻ behind", "Sweat glands lack CFTR entirely, so chloride simply accumulates over time"], "ans": 2, "exp": "The **sweat duct is the exception** — CFTR there normally **reabsorbs** Cl⁻ from sweat. Loss of CFTR → Cl⁻ stays in sweat → **↑↑ sweat Cl⁻**, the diagnostic basis. Elsewhere CFTR *secretes* Cl⁻, so loss makes those secretions thick.", "anchor": "CF P1 §1"}, {"id": "CF-008", "type": "SATA", "subtopic": "Pathophysiology & Genetics", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "Which findings are classic clinical features supporting a CF diagnosis? Select all that apply.", "opts": ["Chronic sinopulmonary disease with Pseudomonas or Staph colonization", "Pancreatic insufficiency with steatorrhea and failure to thrive", "Male infertility from congenital bilateral absence of the vas deferens (CBAVD)", "Meconium ileus presenting in the neonatal period", "Polycythemia accompanied by a low sweat chloride level"], "ans": [0, 1, 2, 3], "exp": "CF features: **chronic sinopulmonary dz** (PsA/Staph, bronchiectasis, nasal polyps), **pancreatic insufficiency** (steatorrhea, FTT, fat-soluble vit deficiency), **CBAVD** male infertility, **meconium ileus**, salty skin, clubbing. Sweat Cl⁻ is **high** (≥60), not low; polycythemia is not a feature.", "anchor": "CF P1 §2"}, {"id": "CF-009", "type": "MCQ", "subtopic": "Diagnosis & Screening", "domain": "D2", "tier": "T1", "nabp": "3.B", "stem": "In US newborn screening for CF, what is the first-tier screening test?", "opts": ["Pilocarpine iontophoresis to measure sweat chloride directly", "Nasal potential difference measurement across the airway epithelium", "Whole-genome sequencing performed on the newborn blood spot", "Immunoreactive trypsinogen (IRT), reflexed to a CFTR variant panel if elevated"], "ans": 3, "exp": "NBS step 1 = **IRT** (↑ from pancreatic duct obstruction) → ↑ IRT reflexes to a **DNA/variant panel** (IRT/DNA algorithm). A positive screen is **not** diagnostic; confirm with sweat chloride.", "anchor": "CF P1 §2"}, {"id": "CF-010", "type": "MCQ", "subtopic": "Diagnosis & Screening", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "Which test is the confirmatory gold standard for diagnosing CF?", "opts": ["Sweat chloride by pilocarpine iontophoresis", "A CFTR variant panel performed in isolation", "Immunoreactive trypsinogen on a repeat specimen", "Fecal elastase to confirm pancreatic status"], "ans": 0, "exp": "**Sweat chloride (pilocarpine iontophoresis)** is confirmatory. Dx needs clinical features or positive NBS/sibling PLUS CFTR dysfunction evidence: **SwCl ≥60 ×2**, OR 2 CF-causing variants in *trans*, OR abnormal nasal PD.", "anchor": "CF P1 §2"}, {"id": "CF-011", "type": "MCQ", "subtopic": "Diagnosis & Screening", "domain": "D3", "tier": "T2", "nabp": "3.C.1", "stem": "An infant with a positive newborn screen has a sweat chloride of 45 mmol/L. How is this interpreted?", "opts": ["Diagnostic of CF — initiate modulator therapy without further testing", "Intermediate (30–59) — not diagnostic; pursue extended genotyping ± repeat or NPD", "Normal — CF is excluded and no additional evaluation is warranted", "A laboratory error — values cannot legitimately fall in this range"], "ans": 1, "exp": "SwCl **30–59 = intermediate/indeterminate** → genotype + further eval (repeat test, nasal PD). **≥60 = diagnostic**; **≤29 = normal**. A single intermediate value does not confirm or exclude CF.", "anchor": "CF P1 §2, §5"}, {"id": "CF-012", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T2", "nabp": "2.A.1", "stem": "Using the modulator naming convention, how many correctors and potentiators are in Trikafta (elexacaftor/tezacaftor/ivacaftor)?", "opts": ["One corrector paired with two potentiators in the combination", "Three correctors with no potentiator component included", "Two correctors (elexacaftor, tezacaftor) plus one potentiator (ivacaftor)", "Two potentiators combined with a single corrector molecule"], "ans": 2, "exp": "Name **ends in the potentiator** (ivacaftor); correctors precede it (elexa-, teza-). Trikafta = **2 correctors + 1 potentiator** = HEMT. 1 part = potentiator only (Kalydeco); 2 = corrector+potentiator (Orkambi, Symdeko); 3 = HEMT.", "anchor": "CF P1 §3, §6"}, {"id": "CF-013", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of ivacaftor (Kalydeco)?", "opts": ["Corrector — improves folding and trafficking so more CFTR reaches the surface", "Read-through agent — suppresses premature stop codons to restore protein", "ENaC inhibitor — reduces sodium and water reabsorption at the airway", "Potentiator — increases the open probability of CFTR already at the cell surface"], "ans": 3, "exp": "Ivacaftor = **potentiator**: ↑ open probability of surface CFTR → ↑ Cl⁻ transport. First-in-class; benefits genotypes with protein already at the surface (gating/class III, R117H, responsive variants).", "anchor": "CF P1 §3.1"}, {"id": "CF-014", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Lumacaftor (a component of Orkambi) acts by which mechanism?", "opts": ["Corrector that improves CFTR folding, processing, and trafficking", "Potentiator that holds the surface channel in its open conformation", "CYP3A inhibitor that pharmacokinetically boosts ivacaftor exposure", "Osmotic mucoactive agent that rehydrates the airway surface"], "ans": 0, "exp": "Lumacaftor = **corrector** (folding/trafficking, F508del/class II), paired with the potentiator ivacaftor. Signature quirk: lumacaftor is also a **strong CYP3A inducer** (see DDI items).", "anchor": "CF P1 §3.2"}, {"id": "CF-015", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Orkambi (lumacaftor/ivacaftor) is indicated for which genotype and age?", "opts": ["Any single F508del allele, in patients aged 2 years and older", "F508del homozygous, in patients aged 1 year and older", "A gating mutation such as G551D only, at any age", "Class I nonsense mutations, in patients aged 6 years and older"], "ans": 1, "exp": "Orkambi = **F508del homozygous, ≥1 yr**. (Symdeko ≥6 yr adds responsive variants; Trikafta ≥2 yr / Alyftrek ≥6 yr cover ≥1 F508del or responsive variant.) Class I is not modulator-responsive.", "anchor": "CF P1 §3.2"}, {"id": "CF-016", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A 19-yo woman on Orkambi (lumacaftor/ivacaftor) uses a combined oral contraceptive. What is the key counseling point?", "opts": ["No interaction exists, so the hormonal contraceptive remains fully effective", "Lumacaftor inhibits CYP3A, raising hormone levels, so lower the contraceptive dose", "Lumacaftor strongly induces CYP3A, making hormonal contraceptives unreliable; add a back-up", "Switching to a transdermal patch avoids the interaction entirely and needs no back-up"], "ans": 2, "exp": "⚠ **Lumacaftor = strong CYP3A INDUCER** (the only modulator that induces) → ↓ exposure of **all hormonal contraceptives** (oral/patch/injectable/implant) → **not reliable**. Recommend a non-hormonal or back-up method. Highest-yield CF DDI.", "anchor": "CF P1 §3.2, §4"}, {"id": "CF-017", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T3", "nabp": "1.A.2", "stem": "Which statement about CYP3A and CFTR modulators is correct?", "opts": ["Every modulator behaves as a strong CYP3A inhibitor at therapeutic doses", "Ivacaftor strongly induces CYP3A while the remaining modulators inhibit it", "Modulators have no clinically meaningful cytochrome P450 interactions", "All modulators are CYP3A substrates except lumacaftor, a strong CYP3A inducer"], "ans": 3, "exp": "**All modulators are CYP3A substrates** (ivacaftor = sensitive). **Exception: lumacaftor is a strong CYP3A inducer.** Strong inducers ↓ modulator efficacy (avoid); strong/moderate inhibitors → dose-reduce the modulator; grapefruit → avoid.", "anchor": "CF P1 §4"}, {"id": "CF-018", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Compared with Orkambi, which is TRUE of Symdeko (tezacaftor/ivacaftor) regarding hormonal contraception?", "opts": ["Symdeko components are CYP3A substrates and do not impair hormonal contraceptives", "Symdeko is a stronger CYP3A inducer and worsens contraceptive failure further", "Symdeko inhibits CYP3A, raising contraceptive hormone levels to a dangerous degree", "Both agents induce CYP3A to an equal and clinically equivalent degree"], "ans": 0, "exp": "Symdeko (teza/iva) components are **CYP3A substrates** — no induction → **does not impair hormonal contraception**. Contrast **Orkambi** (lumacaftor induces). Symdeko is also better tolerated (fewer respiratory AEs than Orkambi).", "anchor": "CF P1 §3.3"}, {"id": "CF-019", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D2", "tier": "T2", "nabp": "3.C.2", "stem": "Trikafta (elexacaftor/tezacaftor/ivacaftor) is approved for which population under current labeling?", "opts": ["F508del homozygous patients only, aged 6 years and older", "Age ≥2 yr with ≥1 F508del or a responsive variant or one producing CFTR protein", "Patients with a gating mutation exclusively, regardless of age", "Any patient aged 18 years and older, irrespective of CFTR genotype"], "ans": 1, "exp": "Trikafta = **≥2 yr** with **≥1 F508del** OR (2026 expansion) **any responsive variant by clinical/in-vitro data or that produces CFTR protein** (521 variants). The responsive-variant criterion broadened eligibility to ~95% of US pwCF.", "anchor": "CF P1 §3.4"}, {"id": "CF-020", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T1", "nabp": "3.D.1", "aware": true, "stem": "Which boxed warning now applies to both Trikafta and Alyftrek?", "opts": ["Torsades de pointes secondary to QT-interval prolongation", "Agranulocytosis with profound neutropenia", "Drug-induced liver injury and liver failure", "Progressive pulmonary fibrosis"], "ans": 2, "exp": "ℹ Both HEMTs now carry a **BBW for drug-induced liver injury / liver failure** (added 2024–2025; serious, potentially fatal, reported first month up to ~15 mo). Legacy materials omit this — currency point.", "anchor": "CF P1 §3.4 ℹ"}, {"id": "CF-021", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D2", "tier": "T1", "nabp": "3.C.2", "aware": true, "stem": "Which CFTR modulator is dosed ONCE DAILY and carries a boxed warning for liver injury?", "opts": ["Symdeko, a twice-daily corrector–potentiator combination", "Trikafta, a twice-daily highly effective triple combination", "Kalydeco, a twice-daily single-agent potentiator", "Alyftrek, a once-daily highly effective triple combination"], "ans": 3, "exp": "ℹ **Alyftrek** = Vertex's 5th modulator (approved Dec 2024), **once-daily** triple combo, **BBW DILI/liver failure**. Trikafta shares the hepatic BBW but is **BID**. All others are BID; all taken with fat-containing food.", "anchor": "CF P1 §3.5 ℹ"}, {"id": "CF-022", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T2", "nabp": "1.E", "aware": true, "stem": "In SKYLINE, how did Alyftrek (vanza/teza/deutiva) compare with Trikafta?", "opts": ["Non-inferior on ppFEV1 with superior sweat-chloride reduction, dosed once daily", "Superior on ppFEV1 but inferior on sweat-chloride reduction overall", "Inferior across every endpoint, justified only by a lower acquisition cost", "Identical labeling, dosing frequency, and measured biomarker response"], "ans": 0, "exp": "SKYLINE (active-controlled **non-inferiority** vs Trikafta): Alyftrek **non-inferior ppFEV1**, **superior SwCl reduction**, **once-daily**. Illustrates active-comparator design once an effective standard exists (1.D/1.E ballast).", "anchor": "CF P1 §3.5; SKYLINE 102/103"}, {"id": "CF-023", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D2", "tier": "T1", "nabp": "3.E.2", "stem": "How should CFTR modulators be taken to optimize absorption?", "opts": ["On an empty stomach about one hour before each meal", "With fat-containing food at each dose", "With a glass of grapefruit juice to deliberately boost drug levels", "Dissolved fully in a hot liquid before swallowing"], "ans": 1, "exp": "✓ Class-wide: take **with fat-containing food** (↑ absorption). Trikafta/legacy combos BID (~12 h apart); **Alyftrek once-daily**. Grapefruit is a CYP3A inhibitor → **avoid**.", "anchor": "CF P1 §3"}, {"id": "CF-024", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A patient on Trikafta is started on rifampin for latent TB. What is the concern?", "opts": ["Rifampin raises modulator levels, risking hepatotoxicity, so halve the dose", "There is no interaction, and both medications can continue unchanged", "Rifampin strongly induces CYP3A, lowering modulator exposure; the combination is not recommended", "Rifampin and ivacaftor produce additive QT-interval prolongation"], "ans": 2, "exp": "**Strong CYP3A inducers** (rifampin, carbamazepine, phenytoin, phenobarbital, rifabutin, St. John's wort) ↓ modulator exposure (ivacaftor AUC ↓~89% with rifampin) → **not recommended**. Choose an alternative or coordinate with the CF team.", "anchor": "CF P1 §3.4, §4"}, {"id": "CF-025", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient on Trikafta needs itraconazole (a strong CYP3A inhibitor) for invasive aspergillosis. What adjustment is appropriate?", "opts": ["Increase the Trikafta dose to overcome the inhibitor's effect", "Discontinue Trikafta permanently for the duration of azole therapy", "No change is needed, because azoles do not interact with modulators", "Reduce the Trikafta dose per labeling, since the inhibitor raises exposure"], "ans": 3, "exp": "**Strong/moderate CYP3A inhibitors** (itraconazole ↑ elexacaftor AUC ~2.8×; ketoconazole ↑ ivacaftor ~8.5×; fluconazole ↑ ivacaftor ~2.9×; clarithromycin) → **reduce the modulator dose** per PI. Inducers do the opposite (avoid).", "anchor": "CF P1 §3.4, §4"}, {"id": "CF-026", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A patient's genotype is G542X/G542X (nonsense on both alleles). Which modulator is indicated?", "opts": ["None — class I produces no protein, so manage symptomatically instead", "Trikafta, because the triple combination covers all CFTR genotypes", "Kalydeco, because gating potentiators are effective on nonsense variants", "Orkambi, because both alleles carry an abnormal CFTR variant"], "ans": 0, "exp": "**Class I (nonsense, e.g., G542X/W1282X) on both alleles → no protein → not modulator-responsive.** Correctors/potentiators need protein to act on. Manage with symptomatic airway/nutritional therapy (read-through agents remain investigational).", "anchor": "CF P1 §1, §4, §6"}, {"id": "CF-027", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T3", "nabp": "1.D", "aware": true, "stem": "What is the most significant 2026 labeling change for the HEMTs versus legacy CF study materials?", "opts": ["HEMTs were newly restricted to F508del homozygotes only going forward", "HEMT eligibility broadened to a responsive-variant criterion, reaching ~95% of US pwCF", "All modulators were reformulated into inhaled rather than oral products", "Modulator therapy became available over the counter without prescription"], "ans": 1, "exp": "ℹ **2026 expansion**: Trikafta (≥2 yr, 521 variants) and Alyftrek (≥6 yr, 564 variants) moved to the broader **responsive-variant (clinical/in-vitro) or produces-CFTR-protein** criterion → **~95% of US pwCF now eligible**. Biggest change vs older materials.", "anchor": "CF P1 §3 ℹ"}, {"id": "CF-028", "type": "MCQ", "subtopic": "CFTR Modulators", "domain": "D2", "tier": "T2", "nabp": "3.C.3", "stem": "Which beverage should patients on any CFTR modulator be told to avoid?", "opts": ["Cold cranberry or pomegranate juice", "A glass of cold whole milk", "Grapefruit or Seville orange juice", "A cup of plain black coffee"], "ans": 2, "exp": "**Grapefruit/Seville orange = moderate CYP3A inhibitor → avoid** (↑ modulator exposure). Whole milk (fat) actually helps absorption.", "anchor": "CF P1 §3, §4"}, {"id": "CF-029", "type": "SATA", "subtopic": "CFTR Modulators", "domain": "D4", "tier": "T2", "nabp": "3.E.2", "stem": "A patient is starting Trikafta. Which counseling points are appropriate? Select all that apply.", "opts": ["Take twice daily about 12 hours apart with fat-containing food", "Report jaundice, dark urine, or right-upper-quadrant pain promptly", "Report new anxiety, depression, or thoughts of self-harm", "Avoid grapefruit juice and St. John's wort while on therapy", "Crushing the tablets into hot tea is an acceptable alternative"], "ans": [0, 1, 2, 3], "exp": "Trikafta: **BID ~12 h apart with fat food**; watch for **hepatotoxicity** (BBW) and **neuropsychiatric** events (anxiety/depression/SI, postmarketing); avoid **grapefruit** (CYP3A inhibitor) and **St. John's wort** (strong inducer). Crushing into hot/alkaline liquid is not appropriate.", "anchor": "CF P1 §3.4"}, {"id": "CF-030", "type": "MCQ", "subtopic": "Modulator Monitoring & PGx", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "aware": true, "stem": "What is the current LFT monitoring schedule for a patient on Trikafta or Alyftrek?", "opts": ["A single baseline panel only, with no further routine liver monitoring thereafter", "Weekly liver function panels drawn throughout the entire first year of therapy", "Every 6 months indefinitely, beginning only at month 6 after starting therapy", "Baseline, then monthly for 6 months, then every 3 months for 12 months, then at least annually"], "ans": 3, "exp": "ℹ Updated HEMT schedule (ALT/AST/**ALP**/bilirubin): **baseline → monthly ×6 mo → q3mo ×12 mo → ≥annually** (older materials said 'q3mo × first year'). Interrupt for marked ↑LFT or signs of liver injury.", "anchor": "CF P1 §3.4, §4 ℹ"}, {"id": "CF-031", "type": "MCQ", "subtopic": "Modulator Monitoring & PGx", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "A 9-yo is starting Trikafta. Beyond LFTs, which baseline test is specifically indicated because the regimen contains ivacaftor in a pediatric patient?", "opts": ["A baseline ophthalmologic exam for non-congenital cataracts, with follow-up", "A baseline echocardiogram to screen for structural heart disease", "A baseline bone-density (DEXA) scan before initiating therapy", "Baseline pulmonary function testing is unnecessary in this setting"], "ans": 0, "exp": "Any **ivacaftor-containing** regimen in **peds** → **baseline + follow-up ophtho exam** for **non-congenital cataracts**. Cataract screening is the pediatric-specific monitoring pearl.", "anchor": "CF P1 §3.1, §4"}, {"id": "CF-032", "type": "SATA", "subtopic": "Modulator Monitoring & PGx", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "Which parameters are part of routine monitoring for a pediatric patient on Trikafta? Select all that apply.", "opts": ["Liver function tests (ALT/AST/ALP/bilirubin)", "Blood pressure", "Neuropsychiatric symptoms such as anxiety, depression, or suicidal ideation", "Ophthalmologic exam for cataracts", "Thyroid-stimulating hormone at every visit"], "ans": [0, 1, 2, 3], "exp": "Trikafta monitoring: **LFTs** (BBW), **BP** (↑ reported), **neuropsychiatric** screen (postmarketing), **ophtho** (peds cataracts), and **CPK** only if myalgia/weakness. **TSH** is not a routine modulator parameter.", "anchor": "CF P1 §4"}, {"id": "CF-033", "type": "MCQ", "subtopic": "Modulator Monitoring & PGx", "domain": "D2", "tier": "T2", "nabp": "1.A.2", "stem": "Before initiating a CFTR modulator, what determines eligibility?", "opts": ["An empiric therapeutic trial undertaken regardless of the patient's genotype", "The CFTR genotype matched to the drug's FDA-cleared responsive-variant list", "Serum modulator concentrations drawn after a single test dose", "A confirmed sweat chloride value below 30 mmol/L"], "ans": 1, "exp": "✓ **Eligibility is genotype-directed** — confirm variants on an FDA-cleared panel and check the drug's **responsive-variant list** before initiating. Core CF–PGx concept; therapy is not empiric.", "anchor": "CF P1 §3, §4"}, {"id": "CF-034", "type": "MCQ", "subtopic": "Airway Clearance & Mucolytics", "domain": "D1", "tier": "T1", "nabp": "2.A.2", "stem": "What is the mechanism of dornase alfa (Pulmozyme)?", "opts": ["Breaks disulfide bonds in mucin glycoproteins as a sulfhydryl mucolytic", "Osmotic agent that draws water into the airway lumen to thin mucus", "Recombinant human DNase that cleaves extracellular neutrophil DNA in sputum", "Beta-2 agonist bronchodilator that relaxes airway smooth muscle"], "ans": 2, "exp": "Dornase alfa = **rhDNase**: cleaves **extracellular DNA** from degraded neutrophils in purulent CF sputum → ↓ viscosity/adhesiveness. (Acetylcysteine breaks disulfide bonds; hypertonic saline is osmotic — different MOAs.)", "anchor": "CF P2 §1"}, {"id": "CF-035", "type": "MCQ", "subtopic": "Airway Clearance & Mucolytics", "domain": "D2", "tier": "T1", "nabp": "3.E.2", "stem": "Which storage and administration counseling is correct for dornase alfa (Pulmozyme)?", "opts": ["Store at room temperature and combine it with hypertonic saline to save a treatment", "Shake the vial vigorously and dilute with sterile water before each use", "Freeze any unused vials so they can be thawed and used later", "Refrigerate at 2–8°C, protect from light, and do not dilute or mix it in the nebulizer"], "ans": 3, "exp": "Dornase alfa: ★ **refrigerate 2–8°C, protect from light**, **do not dilute or mix** with other nebulizer drugs; discard if cloudy/discolored. Nebulize 2.5 mg once daily via a recommended jet nebulizer.", "anchor": "CF P2 §1"}, {"id": "CF-036", "type": "MCQ", "subtopic": "Airway Clearance & Mucolytics", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "A patient develops cough and chest tightness with nebulized 7% hypertonic saline. What is the recommended preventive step?", "opts": ["Pretreat with a short-acting beta-agonist (albuterol) before the dose", "Permanently discontinue all mucoactive inhaled therapy going forward", "Switch to dornase alfa mixed into the same nebulizer chamber", "Reduce daily fluid intake to lessen overall secretion volume"], "ans": 0, "exp": "Hypertonic saline (osmotic) can cause **bronchospasm/cough/chest tightness** → ★ **pretreat with a SABA (albuterol)**. Same pretreatment applies to inhaled tobramycin and aztreonam.", "anchor": "CF P2 §1, §2"}, {"id": "CF-037", "type": "MCQ", "subtopic": "Airway Clearance & Mucolytics", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "aware": true, "stem": "A 16-yo on Trikafta with FEV1 88% asks whether she still needs daily hypertonic saline AND dornase alfa. What does current evidence support?", "opts": ["Both inhaled therapies must be continued lifelong regardless of modulator status", "Per SIMPLIFY, stopping either one for 6 weeks was non-inferior in stable patients on ETI", "Both should be replaced immediately by chronic oral azithromycin therapy", "Both should be stopped at once as soon as any modulator is started"], "ans": 1, "exp": "ℹ **SIMPLIFY (NEJM 2023)**: in pwCF **≥12 yr on ETI** with preserved lung function, **discontinuing either HS or dornase alfa ×6 wk was non-inferior** on ppFEV1 → supports individualized deprescribing (stop one, with the CF team).", "anchor": "CF P2 §1 ℹ; SIMPLIFY"}, {"id": "CF-038", "type": "MCQ", "subtopic": "Chronic Inhaled Antibiotics", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A stable 8-yo grows Pseudomonas aeruginosa for the first time on routine culture. What is the CFF preferred eradication regimen?", "opts": ["Oral ciprofloxacin alone for a 14-day course", "IV meropenem plus tobramycin for a 21-day course", "Inhaled tobramycin 300 mg twice daily for 28 days", "Chronic oral azithromycin given three times weekly"], "ans": 2, "exp": "ℹ New PsA isolate → **inhaled tobramycin 300 mg BID ×28 d** (CFF grade A eradication). Adding oral ciprofloxacin gives **no added benefit**. Chronic suppression/azithromycin is for established chronic infection, not first eradication.", "anchor": "CF P2 §2 ℹ"}, {"id": "CF-039", "type": "MCQ", "subtopic": "Chronic Inhaled Antibiotics", "domain": "D4", "tier": "T1", "nabp": "4.B", "stem": "Before starting chronic (3×/week) azithromycin in a patient with CF, what must be done?", "opts": ["Obtain a sweat chloride test to reconfirm the underlying diagnosis", "Administer an IV azithromycin loading dose before the oral regimen", "Check CFTR genotype to confirm macrolide responsiveness first", "Screen for nontuberculous mycobacteria and review QT-prolonging drugs"], "ans": 3, "exp": "⚠ **Screen for NTM (e.g., M. abscessus/avium) BEFORE chronic azithromycin** — macrolide monotherapy in undiagnosed NTM drives **resistance** (stewardship). Also review **QT** risk. Chronic azithromycin here is an **immunomodulator**, not antibacterial dosing.", "anchor": "CF P2 §2"}, {"id": "CF-040", "type": "MCQ", "subtopic": "Chronic Inhaled Antibiotics", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "What is the primary rationale for chronic low-dose azithromycin in CF?", "opts": ["Immunomodulatory and anti-inflammatory effect, plus anti-biofilm activity", "Definitive eradication of methicillin-resistant Staphylococcus aureus", "Replacement of inhaled tobramycin during acute pulmonary exacerbations", "Direct treatment of CF-related diabetes and glucose control"], "ans": 0, "exp": "Chronic azithromycin in CF = **immunomodulatory/anti-inflammatory** (plus anti-PsA biofilm effects), dosed ~250–500 mg PO **3×/week** — not standard antibacterial dosing. Screen NTM first; watch QT.", "anchor": "CF P2 §2"}, {"id": "CF-041", "type": "MCQ", "subtopic": "Chronic Inhaled Antibiotics", "domain": "D2", "tier": "T2", "nabp": "2.A.2", "stem": "Aztreonam lysine for inhalation (Cayston) for chronic Pseudomonas suppression is dosed how?", "opts": ["300 mg nebulized twice daily, given continuously without a cycle", "75 mg inhaled three times daily, 28 days on/off, via the Altera nebulizer", "A single 75 mg inhaled dose once weekly as maintenance", "112 mg dry-powder inhalation capsules taken once daily"], "ans": 1, "exp": "Cayston (monobactam, lysine salt) = **75 mg TID (≥4 h apart) ×28 d on/off** via **Altera**; ★ pretreat bronchodilator. Used ≥7 yr as rotation/alternative to inhaled tobramycin (300 mg BID).", "anchor": "CF P2 §2"}, {"id": "CF-042", "type": "SATA", "subtopic": "Chronic Inhaled Antibiotics", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which statements about inhaled antibiotics in CF are correct? Select all that apply.", "opts": ["Inhaled tobramycin can still cause oto/nephrotoxicity, especially with concurrent IV aminoglycosides", "Pretreat a bronchodilator before inhaled tobramycin or aztreonam, given bronchospasm risk", "Chronic azithromycin requires NTM screening before it is initiated", "Inhaled tobramycin and aztreonam are typically cycled 28 days on and 28 days off", "Adding oral ciprofloxacin to inhaled tobramycin improves Pseudomonas eradication"], "ans": [0, 1, 2, 3], "exp": "True: residual **oto/nephrotox** with inhaled tobramycin (caution + other oto/nephrotoxins), **pretreat bronchodilator**, **NTM screen** before chronic azithromycin, **28 on/28 off** cycling. False: adding oral cipro to inhaled tobramycin gives **no added eradication benefit**.", "anchor": "CF P2 §2"}, {"id": "CF-043", "type": "MCQ", "subtopic": "Exacerbation & CF Pharmacokinetics", "domain": "D1", "tier": "T2", "nabp": "1.C.3", "stem": "Why do persons with CF generally require HIGHER weight-based doses of aminoglycosides and beta-lactams than non-CF patients?", "opts": ["CF reduces renal clearance, so a loading dose is followed by dose reduction", "CF saturates hepatic cytochrome metabolism, demanding compensatory higher doses", "CF increases total body clearance and volume of distribution, so standard nomograms underdose", "Higher doses are needed solely because of obesity commonly seen in CF"], "ans": 2, "exp": "CF → **↑ total body clearance + ↑ Vd** for hydrophilic drugs (aminoglycosides, β-lactams) → standard dosing **underdoses**. Use higher mg/kg with TDM. This 'augmented clearance' is a high-yield CF PK point.", "anchor": "CF P2 §3"}, {"id": "CF-044", "type": "MCQ", "subtopic": "Exacerbation & CF Pharmacokinetics", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "For a suspected Pseudomonas pulmonary exacerbation, what does the CFF favor for empiric coverage?", "opts": ["A single oral antipseudomonal fluoroquinolone given as monotherapy", "Vancomycin monotherapy directed primarily at resistant gram-positive organisms", "Aztreonam paired with linezolid for the broadest possible empiric coverage", "Double anti-pseudomonal coverage with two different classes (β-lactam plus aminoglycoside)"], "ans": 3, "exp": "CFF convention = **double anti-pseudomonal coverage**, 2 different classes (β-lactam: cefepime/ceftazidime/pip-tazo/meropenem **+ IV tobramycin**) for synergy + ↓ resistance, culture-directed. Add **vancomycin/linezolid** if MRSA.", "anchor": "CF P2 §3"}, {"id": "CF-045", "type": "MCQ", "subtopic": "Exacerbation & CF Pharmacokinetics", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "For extended-interval (once-daily) IV tobramycin in a CF exacerbation, what is an appropriate target?", "opts": ["A peak of ~25–35 mcg/mL with an undetectable trough, guided by TDM", "A trough of 15–20 mcg/mL, with peak measurement not required", "A peak of 5–10 mcg/mL with a trough of 1–2 mcg/mL", "A fixed 80 mg every 8 hours given without any monitoring"], "ans": 0, "exp": "Extended-interval tobramycin (~10 mg/kg/day) targets **peak 25–35 mcg/mL, undetectable trough** → maximizes peak/MIC, ↓ nephro/ototox vs TID. Requires **TDM**; typical duration 10–14 d.", "anchor": "CF P2 §3, §7"}, {"id": "CF-046", "type": "MCQ", "subtopic": "Exacerbation & CF Pharmacokinetics", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "stem": "A CF sputum culture grows Burkholderia cepacia complex. Which is the most important management consideration?", "opts": ["It is uniformly susceptible to standard inhaled tobramycin therapy", "It is intrinsically multidrug-resistant, warrants strict isolation, and carries a poor prognosis", "It requires no infection-control precautions in the inpatient setting", "Its isolation is an indication to stop all antibiotic therapy"], "ans": 1, "exp": "⚠ **Burkholderia cepacia complex** = intrinsically **multidrug-resistant** (treat per sensitivities — meropenem/ceftazidime + TMP-SMX/minocycline), **strict isolation**, and **poor prognosis** (a transplant-candidacy concern).", "anchor": "CF P2 §3"}, {"id": "CF-047", "type": "MCQ", "subtopic": "PERT / GI / Nutrition", "domain": "D2", "tier": "T1", "nabp": "3.E.2", "stem": "A mother crushes her toddler's Creon (pancrelipase) into warm milk. What is the correct counseling?", "opts": ["Crushing is fine as long as the dose is given with some liquid", "Mix the beads into hot cereal so the enteric coating softens first", "Do not crush; sprinkle intact beads on soft acidic food (applesauce) and give immediately", "Have the child hold the beads in the mouth briefly before swallowing them"], "ans": 2, "exp": "PERT beads are **enteric-coated** — **do not crush/chew** or mix in **warm/alkaline** liquid (destroys coating). **Sprinkle intact beads on soft ACIDIC food (applesauce)**, give immediately with the meal; don't retain in mouth (mucosal irritation).", "anchor": "CF P2 §4"}, {"id": "CF-048", "type": "MCQ", "subtopic": "PERT / GI / Nutrition", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A 10-yo on pancrelipase ~7,000 lipase units/kg/meal develops abdominal pain and bloody diarrhea. What is the concern and limit?", "opts": ["Lactic acidosis from the enzymes; switch to a non-enteric-coated product", "Acute pancreatitis from underdosing; double the per-meal enzyme dose", "Hyperkalemia from the porcine load; add a potassium-binding resin", "Fibrosing colonopathy from high-dose PERT; keep ≤2,500 units/kg/meal"], "ans": 3, "exp": "⚠ **Fibrosing colonopathy/colonic strictures** with chronic high-dose PERT (**>6,000 lipase units/kg/meal**, peds <12 yr) → obstruction, bloody diarrhea. Max = **2,500 U/kg/meal, 10,000 U/kg/day, or 4,000 U/g dietary fat/day.**", "anchor": "CF P2 §4"}, {"id": "CF-049", "type": "MCQ", "subtopic": "PERT / GI / Nutrition", "domain": "D2", "tier": "T3", "nabp": "2.A.2", "stem": "Which pancreatic enzyme product is NON-enteric-coated and therefore should be given with a proton-pump inhibitor?", "opts": ["Viokace", "Creon", "Zenpep", "Pertzye"], "ans": 0, "exp": "**Viokace** = the **non-enteric-coated** pancrelipase tablet (give **with a PPI** so gastric acid doesn't inactivate it); used for chronic pancreatitis/post-pancreatectomy. Creon/Zenpep/Pancreaze/Pertzye are enteric-coated delayed-release.", "anchor": "CF P2 §4"}, {"id": "CF-050", "type": "MCQ", "subtopic": "PERT / GI / Nutrition", "domain": "D3", "tier": "T2", "nabp": "3.E.3", "stem": "A pancreatic-insufficient CF patient has an elevated INR with no anticoagulant use. Which deficiency is the likely cause?", "opts": ["Vitamin C deficiency from poor dietary intake", "Vitamin K deficiency from fat malabsorption", "Iron deficiency from chronic gastrointestinal losses", "Magnesium deficiency from renal wasting"], "ans": 1, "exp": "PI → fat malabsorption → **fat-soluble (ADEK) vitamin deficiency**. **Vitamin K** deficiency → ↑INR/bleeding. Supplement with CF-specific ADEK products and monitor levels (Vit D for bone, A/E per labs).", "anchor": "CF P2 §4"}, {"id": "CF-051", "type": "SATA", "subtopic": "PERT / GI / Nutrition", "domain": "D3", "tier": "T1", "nabp": "3.E.1", "stem": "Which nutrition and PERT principles are correct in CF? Select all that apply.", "opts": ["Maintain a high-calorie, high-fat diet rather than restricting fat", "Take pancreatic enzymes with every meal and every snack", "Provide sodium and salt supplementation to offset sweat losses", "Swallow enteric-coated enzyme capsules whole without chewing", "Restrict dietary fat intake to reduce steatorrhea symptoms"], "ans": [0, 1, 2, 3], "exp": "CF nutrition: **high-calorie/high-fat diet** (do **not** restrict fat), **PERT with every meal/snack**, **salt supplementation** (sweat Na⁺ loss), **swallow enteric beads whole**. Restricting fat is wrong — it worsens caloric deficit.", "anchor": "CF P2 §4, §6"}, {"id": "CF-052", "type": "MCQ", "subtopic": "CF-Related Diabetes", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "A 14-yo is newly diagnosed with CF-related diabetes (CFRD). What is the first-line pharmacotherapy and a key diet caution?", "opts": ["Metformin first-line, paired with carbohydrate restriction", "A sulfonylurea first-line, combined with a low-calorie diet", "Insulin as the only recommended agent, without restricting calories or carbohydrate", "Lifestyle modification only, with no pharmacotherapy at this stage"], "ans": 2, "exp": "✓ **CFRD → INSULIN only** (CFF/ADA); **oral hypoglycemics not recommended**. **Do not restrict calories/carbs** — preserve the high-calorie CF diet and **dose insulin to intake**. CFRD is primarily insulin insufficiency, distinct from T1/T2DM.", "anchor": "CF P2 §5"}, {"id": "CF-053", "type": "MCQ", "subtopic": "CF-Related Diabetes", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "How should asymptomatic persons with CF be screened for CFRD?", "opts": ["A single fasting glucose obtained once at age 18", "Hemoglobin A1c measured once every 5 years only", "No screening at all unless overt symptoms develop", "An annual 2-hour oral glucose tolerance test starting at age 10"], "ans": 3, "exp": "Screen with an **annual 2-hr OGTT starting at age 10** (also during illness/steroids/pregnancy). ★ **A1c can underestimate** glycemia in CF (↑ RBC turnover) → use OGTT/CGM/SMBG, not A1c alone.", "anchor": "CF P2 §5"}, {"id": "CF-054", "type": "MCQ", "subtopic": "CF-Related Diabetes", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "stem": "Why is hemoglobin A1c an unreliable sole marker of glycemic control in CF?", "opts": ["Increased RBC turnover in CF can cause A1c to underestimate true glycemia", "Pancreatic enzyme supplements falsely elevate the A1c assay result", "CFTR modulators bind directly to and interfere with the A1c assay", "A1c reflects only fasting glucose and ignores postprandial excursions"], "ans": 0, "exp": "★ In CF, **↑ RBC turnover** can make **A1c underestimate** actual glycemia → rely on **OGTT/CGM/SMBG**. A1c is adjunctive only.", "anchor": "CF P2 §5, §7"}, {"id": "CF-055", "type": "MCQ", "subtopic": "Special Populations & Currency", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A pregnant patient with CF is on inhaled tobramycin for chronic Pseudomonas. What is the key fetal-safety concern with aminoglycosides?", "opts": ["They cause fetal hyperglycemia and macrosomia if continued in pregnancy", "They cross the placenta and carry a risk of fetal ototoxicity", "They are pregnancy-preferred agents with no recognized fetal risk", "They are absolutely contraindicated and must switch to an oral fluoroquinolone"], "ans": 1, "exp": "Aminoglycosides cross the placenta → **fetal ototoxicity** risk; weigh benefit vs risk and minimize systemic exposure (inhaled route limits systemic levels). Manage with the CF team; CFRD stays **insulin-only**; modulator continuation is individualized.", "anchor": "CF Consolidation (pregnancy)"}, {"id": "CF-056", "type": "SATA", "subtopic": "Special Populations & Currency", "domain": "D4", "tier": "T2", "nabp": "4.B", "aware": true, "stem": "Which immunization points are appropriate for an adult with CF (a chronic lung disease risk condition)? Select all that apply.", "opts": ["Annual inactivated influenza vaccination", "Pneumococcal vaccination per current ACIP, including PCV21 as an option", "Live vaccines are contraindicated after solid-organ (lung) transplant", "RSV vaccination per current risk-based ACIP recommendations", "Pneumococcal and influenza vaccines are unnecessary in patients with CF"], "ans": [0, 1, 2, 3], "exp": "ℹ CF = chronic lung disease → **annual influenza**, **pneumococcal** per current ACIP (PCV21/PCV20 options), **RSV** per current risk-based ACIP guidance, and **no live vaccines post-transplant** (immunosuppression). Saying vaccines are unnecessary is wrong.", "anchor": "CF Consolidation (immunizations); ACIP 2024–2025"}, {"id": "CF-057", "type": "MCQ", "subtopic": "PERT / GI / Nutrition", "domain": "D3", "tier": "T3", "nabp": "3.C.2", "stem": "A CF patient presents with inspissated stool at the ileocecum causing obstruction (distal intestinal obstruction syndrome, DIOS). What is appropriate initial management?", "opts": ["High-dose loperamide to slow intestinal transit and rest the bowel", "Immediate surgical resection of the obstructed ileocecal segment", "Hydration plus osmotic agents such as PEG 3350 or gastrografin", "Complete discontinuation of pancreatic enzyme replacement therapy"], "ans": 2, "exp": "**DIOS** ≠ simple constipation but both are managed with **hydration + osmotic agents (PEG 3350, gastrografin)**; severe cases need hospitalization. Antimotility agents (loperamide) would worsen obstruction.", "anchor": "CF P2 §4"}, {"id": "CF-058", "type": "SATA", "subtopic": "Modulator Monitoring & PGx", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Which statements about CYP3A interactions with CFTR modulators are correct? Select all that apply.", "opts": ["Most modulators are CYP3A substrates, so strong inducers reduce their efficacy", "Lumacaftor is a strong CYP3A inducer and can cause hormonal contraceptive failure", "Strong or moderate CYP3A inhibitors warrant a reduction in the modulator dose", "Grapefruit and Seville orange juice should be avoided during modulator therapy", "Ivacaftor is a potent CYP3A inducer that lowers levels of co-administered drugs"], "ans": [0, 1, 2, 3], "exp": "**All modulators are CYP3A substrates** (ivacaftor sensitive) → strong inducers ↓ efficacy (avoid); inhibitors → dose-reduce; grapefruit → avoid. **Lumacaftor is the lone strong inducer** → contraceptive failure. Ivacaftor is a **substrate**, not an inducer (last option false).", "anchor": "CF P1 §4"}, {"id": "CF-059", "type": "SATA", "subtopic": "Diagnosis & Screening", "domain": "D3", "tier": "T2", "nabp": "3.C.1", "stem": "Which findings can establish evidence of CFTR dysfunction for a CF diagnosis? Select all that apply.", "opts": ["A sweat chloride ≥60 mmol/L confirmed on two separate occasions", "Two CF-causing CFTR variants identified in trans (one on each allele)", "An abnormal nasal potential difference measurement", "A positive newborn screen by IRT alone, without confirmatory testing", "An intermediate sweat chloride of 40 mmol/L on a single test"], "ans": [0, 1, 2], "exp": "CFTR dysfunction is shown by **SwCl ≥60 ×2**, **2 CF-causing variants in *trans***, or **abnormal nasal PD**. A positive **NBS/IRT alone is not diagnostic** (it reflexes to confirmation), and an **intermediate SwCl (30–59)** is indeterminate, not confirmatory.", "anchor": "CF P1 §2"}, {"id": "CF-060", "type": "SATA", "subtopic": "Exacerbation & CF Pharmacokinetics", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which principles apply to antibiotic management of a CF pulmonary exacerbation? Select all that apply.", "opts": ["Use double anti-pseudomonal coverage with two different drug classes", "Add vancomycin or linezolid when MRSA is suspected or cultured", "Dose aminoglycosides and beta-lactams higher per kg than in non-CF patients", "Place Burkholderia cepacia complex isolates under strict infection-control isolation", "A single oral fluoroquinolone is preferred over IV combination therapy"], "ans": [0, 1, 2, 3], "exp": "CFF exacerbation principles: **double anti-pseudomonal coverage** (2 classes), **add vanco/linezolid for MRSA**, **higher mg/kg** dosing (↑ clearance + ↑ Vd), and **strict isolation** for *Burkholderia cepacia* complex. A single oral fluoroquinolone is **not** preferred for moderate–severe exacerbations.", "anchor": "CF P2 §3"}, {"id": "CF-061", "type": "SATA", "subtopic": "CFTR Modulators", "domain": "D1", "tier": "T2", "nabp": "2.A.1", "stem": "Which statements about the CFTR modulator classes are correct? Select all that apply.", "opts": ["Trikafta and Alyftrek are both highly effective modulator therapies (HEMT)", "Alyftrek is dosed once daily, whereas the other modulators are twice daily", "All CFTR modulators should be taken with fat-containing food", "Lumacaftor is the only modulator that induces CYP3A", "Ivacaftor is a corrector that improves CFTR folding and trafficking"], "ans": [0, 1, 2, 3], "exp": "True: **Trikafta + Alyftrek = HEMT**; **Alyftrek once-daily** (others BID); **all taken with fat food**; **lumacaftor is the only inducer**. False: ivacaftor is a **potentiator** (↑ open probability of surface CFTR), not a corrector.", "anchor": "CF P1 §3, §6"}, {"id": "CF-062", "type": "SATA", "subtopic": "CF-Related Diabetes", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "Which statements about CF-related diabetes (CFRD) management are correct? Select all that apply.", "opts": ["Insulin is the only recommended pharmacotherapy", "Screen with an annual 2-hour OGTT beginning at age 10", "Maintain the high-calorie CF diet rather than restricting calories", "A1c may underestimate glycemia because of increased RBC turnover", "Metformin is the preferred first-line oral agent in CFRD"], "ans": [0, 1, 2, 3], "exp": "CFRD: **insulin only** (oral agents not recommended → metformin option false), **annual 2-hr OGTT from age 10**, **do not restrict calories** (preserve high-cal CF diet), and **A1c may underestimate** glycemia (↑ RBC turnover → use OGTT/CGM/SMBG).", "anchor": "CF P2 §5"}];
const LET = "ABCDEF";
const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="cf_log_v1", MISSKEY="cf_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }

function renderDash(){
  const subs = subtopics();
  let s = `<div class="card"><h2>Build your set</h2>
    <div class="row">
      <div><label>Domain</label><select id="fDom"><option value="">All</option>
        <option>D1</option><option>D2</option><option>D3</option><option>D4</option><option>D5</option></select></div>
      <div><label>Tier</label><select id="fTier"><option value="">All</option>
        <option>T1</option><option>T2</option><option>T3</option></select></div>
      <div><label>Count</label><select id="fCount"><option value="0">All</option>
        <option>10</option><option>20</option><option>30</option><option>40</option></select></div>
      <div><label>Order</label><select id="fShuf"><option value="1">Shuffle</option><option value="0">In order</option></select></div>
    </div>
    <div style="margin-top:12px"><label>Subtopics
      <span style="float:right">
        <button class="tag-link" onclick="allSubs(true)">Select all</button>
        <button class="tag-link" onclick="allSubs(false)">Clear</button></span></label>
      <div class="subtopics" id="subs">`;
  subs.forEach((sub,i)=>{ const n=ITEMS.filter(x=>x.subtopic===sub).length;
    s += `<label><input type="checkbox" class="subck" value="${i}" checked onchange="liveCount()"> ${sub} <span class="count-pill">(${n})</span></label>`; });
  s += `</div></div>
    <div class="count-pill" id="live" style="margin-top:6px"></div>
    <button class="bigbtn" id="startBtn" onclick="startQuiz()">Start quiz</button></div>`;
  el('dash').innerHTML = s;
  ['fDom','fTier','fCount','fShuf'].forEach(id=>el(id).onchange=liveCount);
  liveCount();
}
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  const subs = subtopics();
  const chosen = [...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
  const dom = el('fDom').value, tier = el('fTier').value;
  let pool = ITEMS.filter(i=>chosen.includes(i.subtopic));
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const want = +el('fCount').value;
  const n = want? Math.min(want,pool.length): pool.length;
  el('live').textContent = `${pool.length} match filters · quiz of ${n}`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false, answered=false, picks=[];
function buildItem(it){
  if(it.type==='FILL') return {...it};
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  const want = +el('fCount').value;
  if(+el('fShuf').value) pool = shuffle(pool);
  if(want) pool = pool.slice(0,want);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
function badgeHtml(it){
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];
  let b=`<div class="badge ${tierC}">${it.tier}</div><div class="badge b-dom">${it.domain}</div>
    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.type==='FILL') b+=`<div class="badge b-fill">FILL</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  return b;
}
function renderQ(){
  answered=false; picks=[];
  const it=Q[qi];
  const head=`<div class="card">
    <div class="topbar"><span>Question ${qi+1} / ${Q.length}${retestMode?' · retest':''}</span><span>Score ${score}</span></div>
    <div class="bar"><div style="width:${(qi/Q.length)*100}%"></div></div>
    <div class="badges">${badgeHtml(it)}</div>`;
  let body;
  if(it.type==='FILL'){
    body=`<div class="stem">${render(it.stem)}</div>
      <div class="fillrow"><input id="fillIn" type="text" inputmode="decimal" autocomplete="off"
        placeholder="Enter a number" oninput="el('checkBtn').disabled=this.value.trim()===''">
        <span class="unit">${render(it.unit)}</span></div>
      <div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkFill()" disabled>Check</button></div>`;
  } else {
    const isSata = it.type==='SATA';
    body=`<div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div><div id="opts">`;
    it.opts.forEach((o,i)=>{ body+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
      <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
    body+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>`;
  }
  const tail=`<div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=head+body+tail;
  if(it.type==='FILL') setTimeout(()=>{const f=el('fillIn'); if(f)f.focus();},30);
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function tolOk(user,it){
  if(it.tol!=null) return Math.abs(user-it.ans)<=it.tol+1e-9;
  if(it.tolpct!=null) return Math.abs(user-it.ans)<=Math.abs(it.ans)*it.tolpct/100+1e-9;
  return Math.abs(user-it.ans)<=Math.max(Math.abs(it.ans)*0.02,0.01);
}
function recordAndReveal(it,ok,answerText){
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok&&retestMode){ const m=getMissed(); const k=m.indexOf(it.id); if(k>=0){m.splice(k,1);setMissed(m);} }
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+answerText}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function checkFill(){
  if(answered) return; const it=Q[qi];
  const raw=el('fillIn').value.trim().replace(/,/g,'').replace(/[^0-9eE.+-]/g,'');
  const user=parseFloat(raw);
  if(isNaN(user)) return;
  answered=true;
  const ok=tolOk(user,it);
  el('fillIn').classList.add(ok?'correct':'wrong'); el('fillIn').disabled=true;
  recordAndReveal(it,ok,fmtNum(it.ans)+' '+it.unit);
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  recordAndReveal(it,ok,al);
}
function fmtNum(x){ return (Math.round(x*1000)/1000).toString(); }
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button onclick="if(confirm('Reset all progress?')){store.set(LOGKEY,[]);store.set(MISSKEY,[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  const it=Q[qi];
  if(!answered){
    if(it.type==='FILL'){ if(e.key==='Enter'&&!el('checkBtn').disabled)checkFill(); return; }
    if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA');
  } else if(e.key==='Enter')nextQ();
});
renderDash();
</script>
</body></html>
