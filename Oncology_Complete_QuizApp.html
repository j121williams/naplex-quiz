<script>
const ITEMS = [{"id": "ONC-001", "type": "MCQ", "subtopic": "Cancer Biology & Principles", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "Which classification of malignancy is correctly matched to its tissue of origin?", "opts": ["Carcinomas arise from epithelial tissue; sarcomas from connective/mesenchymal tissue", "Carcinomas arise from blood-forming cells; sarcomas from epithelial tissue", "Leukemias arise from lymph nodes; lymphomas from circulating blood cells", "Sarcomas arise from epithelial tissue; carcinomas from nervous tissue"], "ans": 0, "exp": "**Carcinomas = epithelial origin** (most solid tumors); **sarcomas = mesenchymal/connective tissue**. Hematologic: **leukemias = circulating** transformed cells; **lymphomas = lymph node**-based. Tissue of origin guides chemo selection.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-002", "type": "MCQ", "subtopic": "Cancer Biology & Principles", "domain": "D1", "tier": "T1", "nabp": "3.C.1", "stem": "In the TNM staging system, what do the three letters represent?", "opts": ["Tumor histologic type, nodal differentiation grade, and total mutation burden", "Tumor size/extent, regional lymph node involvement, and distant metastasis", "Treatment response, the neutrophil count, and the tumor marker level", "Tissue grade, the degree of necrosis, and the mitotic rate seen"], "ans": 1, "exp": "**TNM = Tumor (size/local extent), Nodes (regional spread), Metastasis (distant).** Compiled into **stages I–IV**; stage is the single best predictor of survival. Grade (differentiation) is separate from stage.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-003", "type": "MCQ", "subtopic": "Cancer Biology & Principles", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which pairing of chemotherapy and cell-cycle activity is correct?", "opts": ["Alkylating agents are S-phase specific; antimetabolites are cell-cycle nonspecific", "Vinca alkaloids are G0-phase specific; taxanes are S-phase specific", "Antimetabolites are S-phase specific; alkylating agents are cell-cycle nonspecific", "Anthracyclines act only in the M phase of the cycle"], "ans": 2, "exp": "**Antimetabolites = S-phase specific** (DNA synthesis); **vinca alkaloids/taxanes = M-phase specific** (mitosis); **alkylating agents = cell-cycle nonspecific** (act in any phase). Phase specificity informs scheduling/infusion strategy.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-004", "type": "MCQ", "subtopic": "Cancer Biology & Principles", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "What is the primary rationale for using combination chemotherapy regimens?", "opts": ["To deliver a single mechanism of action at the highest tolerated dose possible", "To deliberately overlap toxicities so that one antidote can cover all of the agents", "To completely avoid the need for any supportive-care or antiemetic medications", "To combine non-cross-resistant agents with different mechanisms and non-overlapping toxicities"], "ans": 3, "exp": "Combination regimens use **drugs with different MOAs, non-cross-resistant profiles, and non-overlapping dose-limiting toxicities** → maximize cell kill (log-kill) while limiting resistance and additive toxicity. Each drug is used at its optimal dose.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-005", "type": "MCQ", "subtopic": "Cancer Biology & Principles", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "What does the chemotherapy 'nadir' refer to?", "opts": ["The lowest point of the blood counts after a chemotherapy dose", "The peak plasma concentration of the chemotherapy agent", "The maximum tumor size before treatment response", "The cumulative lifetime dose limit of an agent"], "ans": 0, "exp": "The **nadir** is the **lowest blood-count point** (typically ~7–14 days post-dose) reflecting myelosuppression — counts then recover before the next cycle. Knowing the nadir guides monitoring and timing of growth-factor support.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-006", "type": "SATA", "subtopic": "Cancer Biology & Principles", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about chemotherapy principles are correct? Select all that apply.", "opts": ["Combination regimens pair drugs with non-overlapping toxicities", "Antimetabolites are generally S-phase specific", "Alkylating agents are cell-cycle nonspecific", "The nadir is the lowest blood-count point after a dose", "Cell-cycle phase specificity has no effect on dosing or scheduling"], "ans": [0, 1, 2, 3], "exp": "True: **non-overlapping toxicities**, **antimetabolites S-phase**, **alkylators cell-cycle nonspecific**, **nadir = count low point**. Phase specificity **does** affect scheduling (e.g., infusional vs bolus) — last option false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-007", "type": "MCQ", "subtopic": "Screening & Tumor Markers", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "According to American Cancer Society guidance, routine breast cancer screening with mammography is generally recommended to begin at what age for average-risk women (with the option to begin earlier)?", "opts": ["Age 30, using breast MRI as the sole screening modality", "Age 45, with the option to begin screening at 40–44", "Age 55, with yearly mammography as the only schedule", "Age 65, with mammography performed every five years"], "ans": 1, "exp": "ACS: average-risk women should **begin annual mammography at 45** (with the **option to start at 40–44**), transitioning to biennial at 55+. Continue while life expectancy ≥10 years. (Other organizations vary on exact age.)", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-008", "type": "MCQ", "subtopic": "Screening & Tumor Markers", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "At what age does the American Cancer Society recommend average-risk adults begin colorectal cancer screening?", "opts": ["Age 40, with screening colonoscopy repeated every three years", "Age 55, with screening colonoscopy repeated every twenty years", "Age 45, with colonoscopy every 10 years or stool tests more often", "Age 65, with colorectal screening considered entirely optional"], "ans": 2, "exp": "ACS: begin colorectal screening at **age 45** — **colonoscopy every 10 years**, or high-sensitivity stool tests (FIT/gFOBT) annually, continued to at least 75. Earlier/more frequent if higher risk.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-009", "type": "MCQ", "subtopic": "Screening & Tumor Markers", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "Lung cancer screening with low-dose CT is recommended for which population?", "opts": ["All adults over the age of 40 regardless of any tobacco smoking history", "Only patients who currently have an active acute respiratory tract infection", "Ages 30–50 with any prior tobacco exposure of any cumulative amount", "Ages 50–80 with a 20+ pack-year history who smoke now or quit within 15 years"], "ans": 3, "exp": "Low-dose **helical CT** is for **ages 50–80, ≥20 pack-year** history, currently smoking or **quit within 15 years**. Not recommended once someone has quit >15 years ago or is no longer a treatment candidate.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-010", "type": "MCQ", "subtopic": "Screening & Tumor Markers", "domain": "D1", "tier": "T2", "nabp": "1.A", "stem": "Which tumor marker is correctly matched to its associated malignancy?", "opts": ["CEA with colorectal cancer", "CA-125 with prostate cancer", "PSA with ovarian cancer", "AFP with pancreatic cancer"], "ans": 0, "exp": "**CEA → colorectal** (also other GI). Others: **PSA → prostate**, **CA-125 → ovarian**, **AFP → hepatocellular/germ-cell (testicular)**, **CA 19-9 → pancreatic**. Markers track response/recurrence, not primarily diagnosis.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-011", "type": "MCQ", "subtopic": "Screening & Tumor Markers", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "Cervical cancer screening in average-risk individuals is recommended to begin at what age?", "opts": ["Age 16, with HPV testing only", "Age 25, with Pap and/or HPV testing", "Age 40, with Pap testing only", "Age 50, with colposcopy"], "ans": 1, "exp": "Cervical screening begins at **age 25** (Pap test, HPV test, or co-test on recommended intervals), continued to ~65. (Exact start age and interval vary modestly among guideline bodies.)", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-012", "type": "SATA", "subtopic": "Screening & Tumor Markers", "domain": "D1", "tier": "T2", "nabp": "1.A", "stem": "Which tumor marker–malignancy pairings are correct? Select all that apply.", "opts": ["PSA — prostate cancer", "CA-125 — ovarian cancer", "AFP — hepatocellular and germ-cell tumors", "CA 19-9 — pancreatic cancer", "CEA — prostate cancer"], "ans": [0, 1, 2, 3], "exp": "Correct: **PSA-prostate, CA-125-ovarian, AFP-hepatocellular/germ-cell, CA 19-9-pancreatic**. **CEA is associated with colorectal/GI cancer, not prostate** — last pairing false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-013", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of action of alkylating agents?", "opts": ["Inhibition of dihydrofolate reductase acting during the S phase of the cycle", "Stabilization of cellular microtubules during the M phase of mitosis", "Cross-linking of DNA strands to prevent replication (cell-cycle nonspecific)", "Inhibition of the topoisomerase I enzyme during DNA unwinding"], "ans": 2, "exp": "**Alkylating agents cross-link DNA** (intra/interstrand), blocking replication/transcription — **cell-cycle nonspecific**. Examples: cyclophosphamide, ifosfamide, the platinums (which act similarly via DNA adducts).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-014", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "stem": "A patient receiving high-dose cyclophosphamide or ifosfamide is at risk for hemorrhagic cystitis. Which agent is given to prevent it?", "opts": ["Leucovorin", "Dexrazoxane", "Allopurinol", "Mesna"], "ans": 3, "exp": "**Mesna** binds the urotoxic metabolite **acrolein** in the bladder → prevents **hemorrhagic cystitis** from cyclophosphamide/ifosfamide; give with **aggressive hydration**. (Leucovorin = MTX rescue; dexrazoxane = anthracycline cardioprotection; allopurinol = TLS.)", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-015", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "Which toxicity profile is characteristic of cisplatin?", "opts": ["Nephrotoxicity, ototoxicity, and severe emesis", "Pulmonary fibrosis and skin hyperpigmentation", "Cardiotoxicity and red discoloration of urine", "Hemorrhagic cystitis and alopecia"], "ans": 0, "exp": "**Cisplatin → dose-limiting nephrotoxicity, ototoxicity, peripheral neuropathy, and highly emetogenic.** Prevent nephrotoxicity with **aggressive IV hydration ± mannitol**; amifostine is a cytoprotectant option. (Pulm fibrosis = bleomycin; cardiotox = anthracyclines.)", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-016", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "What is the most important supportive measure to reduce cisplatin nephrotoxicity?", "opts": ["Restrict fluids to concentrate the drug at the tumor", "Aggressive intravenous hydration before and after the dose", "Administer the dose as a rapid IV push", "Give the dose without any antiemetic premedication"], "ans": 1, "exp": "**Aggressive IV hydration (± mannitol-forced diuresis)** is the key nephroprotective measure for cisplatin; maintain urine output and replace electrolytes (Mg, K). Amifostine is an additional cytoprotectant. Cisplatin is **highly emetogenic** → always premedicate antiemetics.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-017", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effect is characteristically associated with oxaliplatin?", "opts": ["Hemorrhagic cystitis from a urotoxic metabolite", "Progressive cumulative interstitial pulmonary fibrosis", "Cold-induced acute peripheral sensory neuropathy", "Dilated cardiomyopathy with a reduced ejection fraction"], "ans": 2, "exp": "**Oxaliplatin → cold-sensitive acute peripheral neuropathy** (laryngopharyngeal dysesthesia; counsel to avoid cold) plus a cumulative sensory neuropathy. It is less nephrotoxic/ototoxic than cisplatin.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-018", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D2", "tier": "T3", "nabp": "1.C", "stem": "Carboplatin dosing differs from other agents in that it is calculated using which approach?", "opts": ["A fixed milligram dose applied uniformly to all patients", "Body-surface area calculated without regard to renal function", "Ideal body weight used as the sole determinant of dose", "The Calvert formula using a target AUC and renal function"], "ans": 3, "exp": "**Carboplatin uses the Calvert formula: Dose = target AUC × (GFR + 25)** — an **AUC/renal-function-based** calculation. Compared with cisplatin it is **less nephro/ototoxic but more myelosuppressive (thrombocytopenia)**.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-019", "type": "MCQ", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "stem": "A patient on ifosfamide develops confusion and altered mental status. Which toxicity and treatment should be considered?", "opts": ["Ifosfamide-induced encephalopathy treated with methylene blue", "Anthracycline cardiomyopathy treated with dexrazoxane", "Tumor lysis syndrome treated with rasburicase", "Hand-foot syndrome treated with dose reduction"], "ans": 0, "exp": "**Ifosfamide can cause CNS encephalopathy** (confusion, somnolence) → **methylene blue** is used for treatment/prevention in selected cases. Ifosfamide also causes hemorrhagic cystitis (give mesna).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-020", "type": "SATA", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which agent-and-protective/antidote pairings are correct? Select all that apply.", "opts": ["Cyclophosphamide/ifosfamide hemorrhagic cystitis — mesna", "Cisplatin nephrotoxicity — aggressive IV hydration", "Ifosfamide encephalopathy — methylene blue", "Oxaliplatin — cold-induced peripheral neuropathy counseling", "Carboplatin nephrotoxicity — dexrazoxane"], "ans": [0, 1, 2, 3], "exp": "Correct: **mesna for cystitis**, **hydration for cisplatin nephrotox**, **methylene blue for ifosfamide encephalopathy**, **cold-avoidance for oxaliplatin**. **Dexrazoxane is for anthracycline cardiotoxicity, not carboplatin** — last pairing false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-021", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "Antimetabolites exert their effect primarily during which cell-cycle phase, and by what general mechanism?", "opts": ["M phase, by stabilizing the microtubules of the mitotic spindle apparatus", "S phase, by interfering with DNA synthesis as false nucleotide or folate analogues", "G0 phase, by cross-linking complementary strands of cellular DNA", "G2 phase, by inhibiting the topoisomerase II enzyme during repair"], "ans": 1, "exp": "**Antimetabolites are S-phase specific** — they mimic folates, purines, or pyrimidines and **disrupt DNA synthesis**. Examples: methotrexate (folate), 5-FU/capecitabine/cytarabine/gemcitabine (pyrimidine), 6-MP/6-TG (purine).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-022", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of methotrexate?", "opts": ["Cross-linking of complementary DNA strands acting as an alkylating agent", "Inhibition of microtubule assembly during the mitotic phase of the cycle", "Inhibition of dihydrofolate reductase, lowering tetrahydrofolate for DNA synthesis", "Intercalation into DNA with poisoning of the topoisomerase II enzyme"], "ans": 2, "exp": "**Methotrexate inhibits dihydrofolate reductase (DHFR)** → ↓ tetrahydrofolate → ↓ thymidylate/purine synthesis (S-phase). High-dose MTX requires **leucovorin rescue** of normal cells.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-023", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "stem": "What is the purpose of leucovorin (folinic acid) rescue after high-dose methotrexate?", "opts": ["It increases methotrexate concentrations in order to enhance overall tumor cell kill", "It chelates methotrexate within the bladder to prevent hemorrhagic cystitis", "It prevents the cardiotoxicity that can occur with high-dose methotrexate", "It supplies reduced folate to rescue normal cells from methotrexate's DHFR blockade"], "ans": 3, "exp": "**Leucovorin = reduced folate** that bypasses the DHFR block → **rescues normal cells** after high-dose MTX (timed per MTX levels). For overt MTX toxicity/renal failure, **glucarpidase** rapidly cleaves MTX. Do **not** delay leucovorin if levels are high.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-024", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which counseling/monitoring point is correct for high-dose methotrexate?", "opts": ["Avoid NSAIDs; monitor renal function and levels (third-space fluid prolongs exposure)", "NSAIDs are safe with methotrexate and actually improve its renal clearance", "Pleural effusions and ascites have no effect on methotrexate toxicity at all", "The urine should be acidified in order to enhance methotrexate excretion"], "ans": 0, "exp": "**NSAIDs (and other nephrotoxins) reduce MTX clearance → toxicity**; **third-space fluid (ascites/effusions) acts as a reservoir** prolonging exposure. **Alkalinize the urine** (not acidify) and hydrate to enhance MTX excretion; monitor levels and renal function.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-025", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T1", "nabp": "1.A.2", "stem": "A patient with DPYD deficiency is prescribed 5-fluorouracil. What is the concern, and what is the antidote for severe toxicity?", "opts": ["There is no interaction because DPYD status does not affect the fluoropyrimidines", "Risk of severe or fatal toxicity from impaired metabolism; uridine triacetate is the antidote", "Risk of hemorrhagic cystitis from acrolein, for which mesna is the antidote", "Risk of cumulative cardiotoxicity, for which dexrazoxane is the antidote"], "ans": 1, "exp": "**DPYD (DPD) deficiency → impaired 5-FU/capecitabine catabolism → severe/fatal toxicity** (mucositis, myelosuppression, diarrhea, neurotoxicity). Consider DPYD testing; for overdose/severe toxicity, **uridine triacetate** is the antidote. Core oncology PGx pair.", "anchor": "PGx in Oncology"}, {"id": "ONC-026", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effect is characteristic of capecitabine and infusional 5-fluorouracil?", "opts": ["Progressive cumulative interstitial pulmonary fibrosis", "Hemorrhagic cystitis caused by a urotoxic metabolite", "Hand-foot syndrome (palmar-plantar erythrodysesthesia)", "Red-orange discoloration of the urine after dosing"], "ans": 2, "exp": "**Hand-foot syndrome (palmar-plantar erythrodysesthesia)** — painful erythema/desquamation of palms/soles — is classic for **capecitabine** (oral 5-FU prodrug) and infusional 5-FU. Manage with dose reduction, emollients, supportive care.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-027", "type": "MCQ", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "stem": "High-dose cytarabine is associated with which toxicities requiring specific supportive measures?", "opts": ["Progressive pulmonary fibrosis with associated skin hyperpigmentation changes", "Hemorrhagic cystitis together with a reversible CNS encephalopathy", "Dilated cardiomyopathy together with red discoloration of the urine", "Cerebellar toxicity and conjunctivitis (prophylactic corticosteroid eye drops)"], "ans": 3, "exp": "**High-dose cytarabine → cerebellar toxicity** (assess neuro before each dose) and **chemical conjunctivitis** → **prophylactic corticosteroid (or saline) eye drops**. Also myelosuppression and 'ara-C syndrome' (fever, myalgia).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-028", "type": "SATA", "subtopic": "Antimetabolites", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which statements about antimetabolites are correct? Select all that apply.", "opts": ["Methotrexate inhibits dihydrofolate reductase", "Leucovorin rescues normal cells after high-dose methotrexate", "DPYD deficiency increases 5-fluorouracil toxicity", "Capecitabine can cause hand-foot syndrome", "NSAIDs enhance methotrexate clearance and reduce toxicity"], "ans": [0, 1, 2, 3], "exp": "True: **MTX inhibits DHFR**, **leucovorin rescue**, **DPYD deficiency ↑ 5-FU toxicity**, **capecitabine hand-foot syndrome**. **NSAIDs REDUCE MTX clearance → increased toxicity** — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-029", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "Which dose-limiting toxicity is characteristic of anthracyclines such as doxorubicin?", "opts": ["Cumulative, dose-related cardiotoxicity affecting the heart", "Progressive cumulative interstitial pulmonary fibrosis", "Hemorrhagic cystitis from urotoxic acrolein exposure", "Cerebellar ataxia with conjunctival irritation symptoms"], "ans": 0, "exp": "**Anthracyclines → cumulative, dose-related cardiotoxicity** (cardiomyopathy/CHF) — track lifetime cumulative dose and monitor LVEF. **Dexrazoxane** is the cardioprotectant. They are also potent **vesicants** and cause red urine.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-030", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which agent is used to reduce the risk of anthracycline-induced cardiotoxicity?", "opts": ["Mesna", "Dexrazoxane", "Leucovorin", "Rasburicase"], "ans": 1, "exp": "**Dexrazoxane** (iron-chelating cardioprotectant) reduces anthracycline cardiotoxicity (and is also used for anthracycline **extravasation**). Anthracyclines are vesicants, cause **red-orange urine**, and carry a secondary-leukemia risk.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-031", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "Which toxicity is the signature dose-limiting effect of bleomycin?", "opts": ["Cardiomyopathy", "Nephrotoxicity", "Pulmonary fibrosis", "Myelosuppression"], "ans": 2, "exp": "**Bleomycin → cumulative-dose pulmonary fibrosis/pneumonitis** (risk ↑ with high FiO₂, radiation, renal impairment). Notably it causes **minimal myelosuppression** — atypical for chemo. Monitor pulmonary function.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-032", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "stem": "Irinotecan causes two distinct diarrhea syndromes. How are they managed?", "opts": ["Both types are treated identically with octreotide first-line", "Early diarrhea with loperamide; late diarrhea requires no treatment", "Both types are prevented with dexrazoxane", "Early cholinergic diarrhea with atropine; late-onset diarrhea with loperamide"], "ans": 3, "exp": "**Irinotecan: early cholinergic diarrhea (with cramping/diaphoresis) → atropine; late-onset secretory diarrhea → aggressive loperamide.** Late diarrhea/neutropenia risk rises with **UGT1A1*28** (reduced SN-38 glucuronidation).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-033", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which agent is a topoisomerase I inhibitor?", "opts": ["Irinotecan", "Etoposide", "Doxorubicin", "Vincristine"], "ans": 0, "exp": "**Topoisomerase I inhibitors = irinotecan, topotecan** (the 'camptothecins'). **Topoisomerase II inhibitors = etoposide and anthracyclines.** Vincristine is an antimicrotubule agent.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-034", "type": "MCQ", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T3", "nabp": "3.D.2", "stem": "Which delayed risk is associated with topoisomerase II inhibitors such as etoposide?", "opts": ["Progressive interstitial pulmonary fibrosis over time", "Secondary acute myeloid leukemia developing later", "Hemorrhagic cystitis presenting with gross hematuria", "Cerebellar toxicity presenting with gait ataxia"], "ans": 1, "exp": "**Etoposide (topo II) → secondary AML** (often with MLL/11q23 rearrangement, relatively short latency). Rapid IV infusion can also cause **hypotension**. Anthracyclines (also topo II) likewise carry secondary-leukemia risk.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-035", "type": "SATA", "subtopic": "Antitumor Antibiotics & Topoisomerase Inhibitors", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which toxicity associations are correct? Select all that apply.", "opts": ["Doxorubicin — cumulative cardiotoxicity", "Bleomycin — pulmonary fibrosis", "Irinotecan — diarrhea (early cholinergic and late secretory)", "Etoposide — secondary acute myeloid leukemia", "Bleomycin — severe dose-limiting myelosuppression"], "ans": [0, 1, 2, 3], "exp": "True: **doxorubicin cardiotox**, **bleomycin pulm fibrosis**, **irinotecan dual diarrhea**, **etoposide secondary AML**. **Bleomycin causes MINIMAL myelosuppression** — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-036", "type": "MCQ", "subtopic": "Antimicrotubule Agents", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of the taxanes (e.g., paclitaxel, docetaxel)?", "opts": ["They inhibit microtubule assembly and thereby cause spindle depolymerization", "They cross-link complementary strands of DNA within the cell nucleus", "They stabilize microtubules and prevent depolymerization, arresting cells in mitosis", "They inhibit the dihydrofolate reductase enzyme during DNA synthesis"], "ans": 2, "exp": "**Taxanes STABILIZE microtubules** (prevent depolymerization) → mitotic (M-phase) arrest. Contrast **vinca alkaloids**, which **inhibit microtubule assembly (depolymerize)**. Both are M-phase antimitotics with opposite microtubule effects.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-037", "type": "MCQ", "subtopic": "Antimicrotubule Agents", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "How do vinca alkaloids (e.g., vincristine, vinblastine) act?", "opts": ["They stabilize microtubules to block the mitotic spindle from breaking down", "They intercalate into DNA and poison the topoisomerase enzyme", "They inhibit the thymidylate synthase enzyme during DNA synthesis", "They inhibit microtubule assembly, preventing mitotic spindle formation"], "ans": 3, "exp": "**Vinca alkaloids inhibit microtubule polymerization/assembly** → prevent mitotic spindle formation (M-phase arrest) — the **opposite** microtubule effect of taxanes. Dose-limiting toxicity is **peripheral neuropathy**.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-038", "type": "MCQ", "subtopic": "Antimicrotubule Agents", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "stem": "Which statement about vincristine safety is correct?", "opts": ["It is fatal if administered intrathecally and must be given intravenously only", "It is given intrathecally as routine CNS prophylaxis in leukemia protocols", "Its dose-limiting toxicity is a dilated cardiomyopathy with heart failure", "It causes severe myelosuppression as its primary dose-limiting toxicity"], "ans": 0, "exp": "⚠ **Vincristine is FATAL if given intrathecally** (a never-event medication-safety catastrophe) → **IV only**, dispensed in a labeled syringe/minibag, never with intrathecal drugs. Its **dose-limiting toxicity is peripheral neuropathy**; it is relatively non-myelosuppressive.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-039", "type": "MCQ", "subtopic": "Antimicrotubule Agents", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Why does conventional paclitaxel require premedication with a corticosteroid plus H1 and H2 antagonists?", "opts": ["To prevent hemorrhagic cystitis caused by a urotoxic drug metabolite", "To prevent hypersensitivity/infusion reactions related to the solvent vehicle", "To prevent the tumor lysis syndrome during the first treatment cycle", "To provide additional protection against cumulative anthracycline cardiotoxicity"], "ans": 1, "exp": "**Conventional paclitaxel (Cremophor/polyoxyl-castor-oil vehicle) → hypersensitivity reactions** → premedicate **dexamethasone + H1 (diphenhydramine) + H2 (famotidine)**. **Nab-paclitaxel (albumin-bound, Abraxane) avoids the solvent** and needs no routine premed. Taxanes also cause peripheral neuropathy.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-040", "type": "MCQ", "subtopic": "Antimicrotubule Agents", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Besides peripheral neuropathy, which effect is commonly associated with vinca alkaloids?", "opts": ["Pulmonary fibrosis", "Hemorrhagic cystitis", "Constipation and risk of ileus", "Red discoloration of urine"], "ans": 2, "exp": "**Vinca alkaloids → autonomic neuropathy with constipation/ileus** (prophylactic bowel regimen advised), plus the dose-limiting **peripheral sensory-motor neuropathy**. They are also **vesicants** (extravasation risk).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-041", "type": "SATA", "subtopic": "Antimicrotubule Agents", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about antimicrotubule agents are correct? Select all that apply.", "opts": ["Taxanes stabilize microtubules and prevent depolymerization", "Vinca alkaloids inhibit microtubule assembly", "Vincristine is fatal if administered intrathecally", "Conventional paclitaxel requires hypersensitivity premedication", "Vinca alkaloids cause severe dose-limiting cardiotoxicity"], "ans": [0, 1, 2, 3], "exp": "True: **taxanes stabilize**, **vincas inhibit assembly**, **vincristine intrathecal = fatal (IV only)**, **paclitaxel needs premed**. Vinca dose-limiting toxicity is **neuropathy**, not cardiotoxicity — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-042", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Doxorubicin is marketed under which brand name, and what is its liposomal formulation called?", "opts": ["Gleevec; liposomal form is Abraxane", "Taxol; liposomal form is Xeloda", "Oncovin; liposomal form is Adriamycin", "Adriamycin; liposomal form is Doxil"], "ans": 3, "exp": "**Doxorubicin = Adriamycin**; the **pegylated liposomal form = Doxil** (different toxicity profile — less cardiotox, more hand-foot syndrome). Both are anthracyclines with cumulative cardiotoxicity.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-043", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "The R-CHOP regimen for lymphoma contains rituximab plus which components?", "opts": ["Cyclophosphamide, doxorubicin, vincristine, and prednisone", "Cisplatin, hydroxyurea, oxaliplatin, and pemetrexed", "Carboplatin, hydroxydaunorubicin, vinblastine, and procarbazine", "Cytarabine, hydroxyurea, oxaliplatin, and pamidronate"], "ans": 0, "exp": "**R-CHOP = Rituximab + Cyclophosphamide + Hydroxydaunorubicin (doxorubicin) + Oncovin (vincristine) + Prednisone.** A cornerstone regimen for diffuse large B-cell lymphoma.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-044", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "The FOLFOX regimen used in colorectal cancer consists of which agents?", "opts": ["Fludarabine, oxaliplatin, and xeloda", "Folinic acid (leucovorin), 5-fluorouracil, and oxaliplatin", "Folinic acid, fulvestrant, and oxaliplatin", "5-fluorouracil, irinotecan, and cisplatin"], "ans": 1, "exp": "**FOLFOX = FOL (folinic acid/leucovorin) + F (5-fluorouracil) + OX (oxaliplatin).** (FOLFIRI swaps irinotecan for oxaliplatin.) Watch oxaliplatin's cold-induced neuropathy and 5-FU/DPYD risk.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-045", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Capecitabine (Xeloda) is best described as which of the following?", "opts": ["An intravenous anthracycline", "An oral alkylating agent", "An oral prodrug of 5-fluorouracil", "A monoclonal antibody against HER2"], "ans": 2, "exp": "**Capecitabine (Xeloda) = oral 5-FU prodrug** (activated to 5-FU, partly within tumor tissue). Shares 5-FU toxicities: **hand-foot syndrome**, diarrhea, mucositis, and **DPYD-related** severe toxicity.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-046", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Which statement about paclitaxel formulations is correct?", "opts": ["Paclitaxel is Abraxane and nab-paclitaxel is Taxol, which needs more premedication", "Both paclitaxel and nab-paclitaxel are formulated as oral swallowed capsules", "Nab-paclitaxel is a monoclonal antibody directed against the HER2 receptor", "Paclitaxel is Taxol; nab-paclitaxel (Abraxane) is albumin-bound and avoids solvent premed"], "ans": 3, "exp": "**Paclitaxel = Taxol** (Cremophor vehicle → hypersensitivity premed needed). **Nab-paclitaxel = Abraxane** (albumin-bound) avoids the solvent and its routine premedication. Both are taxanes causing neuropathy.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-047", "type": "MCQ", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T3", "nabp": "2.A.1", "recall": true, "stem": "Imatinib (Gleevec) is the prototype agent for which target/indication?", "opts": ["BCR-ABL tyrosine kinase in chronic myeloid leukemia", "HER2 receptor signaling in metastatic breast cancer", "CD20 surface antigen in B-cell non-Hodgkin lymphoma", "VEGF-mediated angiogenesis in metastatic colorectal cancer"], "ans": 0, "exp": "**Imatinib (Gleevec) inhibits the BCR-ABL tyrosine kinase** (Philadelphia chromosome) → first-line in **CML** (and KIT in GIST). The prototype targeted small-molecule TKI (covered in depth in Part 2).", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-048", "type": "SATA", "subtopic": "Regimen & Brand/Generic Recall", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "stem": "Which brand/generic or regimen statements are correct? Select all that apply.", "opts": ["Doxorubicin is marketed as Adriamycin", "Capecitabine (Xeloda) is an oral 5-fluorouracil prodrug", "R-CHOP includes vincristine (Oncovin)", "FOLFOX includes oxaliplatin", "Nab-paclitaxel (Abraxane) is a HER2 monoclonal antibody"], "ans": [0, 1, 2, 3], "exp": "True: **doxorubicin = Adriamycin**, **capecitabine = oral 5-FU prodrug**, **R-CHOP has vincristine**, **FOLFOX has oxaliplatin**. **Nab-paclitaxel is an albumin-bound taxane, not a HER2 antibody** — last option false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-049", "type": "SATA", "subtopic": "Screening & Tumor Markers", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "Which American Cancer Society screening statements are correct? Select all that apply.", "opts": ["Breast: begin annual mammography at age 45 (option to start at 40–44)", "Colorectal: begin screening at age 45", "Lung: low-dose CT for ages 50–80 with a 20+ pack-year history", "Cervical: begin screening at age 25", "Prostate: universal PSA screening is mandatory for all men starting at age 30"], "ans": [0, 1, 2, 3], "exp": "Correct ACS starts: **breast 45**, **colorectal 45**, **lung 50–80 + ≥20 pack-year (current or quit <15 yr)**, **cervical 25**. Prostate screening is a **shared decision around age 50** (45 if higher risk), **not** mandatory universal screening from age 30 — last option false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-050", "type": "SATA", "subtopic": "Alkylating Agents & Platinums", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which chemotherapy toxicity–antidote/management pairings are correct? Select all that apply.", "opts": ["Cyclophosphamide hemorrhagic cystitis — mesna", "High-dose methotrexate — leucovorin rescue", "Anthracycline cardiotoxicity — dexrazoxane", "Early irinotecan cholinergic diarrhea — atropine", "Cisplatin nephrotoxicity — dexrazoxane"], "ans": [0, 1, 2, 3], "exp": "Correct: **mesna (cystitis)**, **leucovorin (MTX rescue)**, **dexrazoxane (anthracycline cardiotox/extravasation)**, **atropine (early irinotecan diarrhea)**. Cisplatin nephrotoxicity is prevented with **aggressive IV hydration**, not dexrazoxane — last pairing false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-101", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "Oral small-molecule agents whose generic names end in '-nib' generally act by which mechanism?", "opts": ["They inhibit tyrosine kinase signaling that drives tumor growth", "They deliver a cytotoxic payload to antigen-positive cells", "They release inhibitory brakes on cytotoxic T cells", "They cross-link DNA as cell-cycle nonspecific agents"], "ans": 0, "exp": "The **'-nib' suffix = tyrosine kinase inhibitors (TKIs)** — block kinase signaling (e.g., BCR-ABL, EGFR, BTK, ALK, VEGFR). Most are **oral CYP3A4 substrates** with class effects (rash, diarrhea, hepatotoxicity, hypertension depending on target).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-102", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effects are most characteristic of EGFR inhibitors such as erlotinib and osimertinib?", "opts": ["Cumulative cardiomyopathy and red urine", "Acneiform (papulopustular) rash and diarrhea", "Hemorrhagic cystitis and alopecia", "Pulmonary fibrosis and skin pigmentation"], "ans": 1, "exp": "**EGFR inhibitors → acneiform/papulopustular rash and diarrhea**; rash often correlates with response. Manage rash with topical/oral antibiotics and emollients. Osimertinib is a 3rd-generation EGFR TKI active against the T790M resistance mutation.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-103", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effects are associated with the BTK inhibitor ibrutinib?", "opts": ["Pulmonary fibrosis and hypocalcemia", "Hemorrhagic cystitis and ototoxicity", "Bleeding and atrial fibrillation", "Cerebellar ataxia and conjunctivitis"], "ans": 2, "exp": "**Ibrutinib (BTK inhibitor) → bleeding risk and atrial fibrillation** (also hypertension). Counsel on bleeding; caution around procedures and with anticoagulants/antiplatelets. Used in CLL and certain B-cell lymphomas.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-104", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T3", "nabp": "3.C.2", "stem": "In BRAF V600-mutant melanoma, why is a BRAF inhibitor typically combined with a MEK inhibitor?", "opts": ["To deliberately overlap toxicities for easier monitoring", "Because a MEK inhibitor is required to activate the BRAF inhibitor", "To eliminate the need for any response monitoring", "To improve efficacy and reduce paradoxical MAPK activation and resistance"], "ans": 3, "exp": "**BRAF + MEK inhibitor combinations (e.g., dabrafenib + trametinib)** improve response/durability and **reduce paradoxical MAPK pathway reactivation and resistance** seen with BRAF monotherapy. BRAF inhibitors require a confirmed **BRAF V600 mutation**.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-105", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "CDK4/6 inhibitors (palbociclib, ribociclib, abemaciclib) used in HR-positive/HER2-negative breast cancer most commonly require monitoring for which toxicity?", "opts": ["Neutropenia", "Hemorrhagic cystitis", "Pulmonary fibrosis", "Cardiomyopathy"], "ans": 0, "exp": "**CDK4/6 inhibitors → neutropenia** (monitor CBC; dose-hold/reduce) — abemaciclib causes more diarrhea, ribociclib can prolong **QT** (baseline ECG/electrolytes). Used with endocrine therapy in HR+/HER2- breast cancer.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-106", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Multi-targeted VEGFR tyrosine kinase inhibitors such as sunitinib and sorafenib commonly cause which adverse effects?", "opts": ["Cumulative cardiomyopathy and red urine", "Hypertension and hand-foot skin reaction", "Pulmonary fibrosis and ototoxicity", "Hemorrhagic cystitis and conjunctivitis"], "ans": 1, "exp": "**VEGFR-pathway TKIs → hypertension (monitor/treat BP), hand-foot skin reaction, proteinuria, bleeding, and impaired wound healing.** Hand-foot skin reaction (localized, hyperkeratotic) is distinct from chemotherapy hand-foot syndrome.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-107", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D1", "tier": "T3", "nabp": "1.A.1", "stem": "Imatinib (Gleevec) inhibits which kinases, and in which diseases is it primarily used?", "opts": ["EGFR signaling; advanced non-small cell lung cancer", "HER2 receptor; metastatic breast adenocarcinoma", "BCR-ABL and KIT; chronic myeloid leukemia and GIST", "VEGFR pathway; metastatic renal cell carcinoma"], "ans": 2, "exp": "**Imatinib inhibits BCR-ABL (Philadelphia chromosome) and KIT** → first-line in **CML** and **GIST**. Adverse effects include edema, cytopenias, and GI upset; it is a CYP3A4 substrate with interaction potential.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-108", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient on an oral TKI that is a CYP3A4 substrate asks about adding a supplement. Which counseling is correct?", "opts": ["Tyrosine kinase inhibitors have no clinically relevant drug interactions", "Strong CYP3A4 inducers raise TKI levels and thereby improve efficacy", "Oral antacids never affect the absorption of any oral TKI agent", "Grapefruit and strong CYP3A4 inhibitors can raise TKI levels and toxicity"], "ans": 3, "exp": "Many TKIs are **CYP3A4 substrates**: **strong inhibitors and grapefruit ↑ levels/toxicity**; **strong inducers ↓ levels/efficacy.** Some TKIs also need an **acidic gut** (acid suppressants ↓ absorption). Review interactions and adherence carefully.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-109", "type": "MCQ", "subtopic": "Small-Molecule TKIs", "domain": "D2", "tier": "T2", "nabp": "2.A.4", "stem": "Which general counseling point applies to most oral tyrosine kinase inhibitors?", "opts": ["They are oral agents needing adherence support and periodic hepatic monitoring", "They are infusions requiring premedication for hypersensitivity", "They must be given intrathecally for CNS penetration", "They are interchangeable with any monoclonal antibody of the same target"], "ans": 0, "exp": "Oral **TKIs require adherence support** (self-administered chronic therapy), attention to **food/acid-suppression effects**, **drug-interaction screening (CYP3A4)**, and periodic **LFT/blood-pressure/CBC monitoring** depending on the agent.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-110", "type": "SATA", "subtopic": "Small-Molecule TKIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which tyrosine kinase inhibitor toxicity associations are correct? Select all that apply.", "opts": ["EGFR inhibitors — acneiform rash and diarrhea", "Ibrutinib (BTK) — bleeding and atrial fibrillation", "VEGFR inhibitors — hypertension and hand-foot skin reaction", "CDK4/6 inhibitors — neutropenia", "Imatinib — pulmonary fibrosis as its dose-limiting toxicity"], "ans": [0, 1, 2, 3], "exp": "True: **EGFR rash/diarrhea**, **ibrutinib bleeding/AF**, **VEGFR HTN/hand-foot skin reaction**, **CDK4/6 neutropenia**. Imatinib's notable effects are edema/cytopenias/GI — **not pulmonary fibrosis** (that is bleomycin) — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-111", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Monoclonal antibody generic names end in '-mab.' What does the '-ximab' versus '-zumab' versus '-umab' stem indicate?", "opts": ["The specific type of tumor that the antibody is used to treat", "Chimeric versus humanized versus fully human antibody origin", "The route by which the antibody is administered to patients", "The cytotoxic payload that is chemically attached to the antibody"], "ans": 1, "exp": "**-ximab = chimeric, -zumab = humanized, -umab = fully human.** All '-mab' agents are monoclonal antibodies (e.g., rituximab chimeric, trastuzumab humanized). Origin affects immunogenicity/infusion-reaction risk.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-112", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "Trastuzumab targets HER2. Which toxicity requires baseline and periodic monitoring?", "opts": ["Hemorrhagic cystitis caused by a urotoxic drug metabolite", "Progressive cumulative interstitial pulmonary fibrosis over time", "Cardiotoxicity with a decline in left ventricular ejection fraction", "Dose-limiting peripheral sensory and motor neuropathy"], "ans": 2, "exp": "**Trastuzumab (anti-HER2) → cardiotoxicity** (often reversible LVEF decline, worse with anthracyclines) → **monitor LVEF at baseline and periodically**. Requires confirmed **HER2-positive** tumor (companion diagnostic) before use.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-113", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Before starting rituximab (anti-CD20), which screening is important?", "opts": ["A CCR5 co-receptor tropism assay performed before treatment", "Baseline pulmonary function testing to screen for fibrosis", "Glucose-6-phosphate dehydrogenase testing for hemolysis risk", "Hepatitis B screening because of the viral reactivation risk"], "ans": 3, "exp": "**Rituximab → hepatitis B reactivation risk** → **screen HBV (HBsAg/anti-HBc) before treatment** and manage accordingly. Also causes **infusion reactions** (premedicate) and rare **PML**. CCR5/G6PD testing are unrelated.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-114", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which set of toxicities is characteristic of the anti-VEGF antibody bevacizumab?", "opts": ["Hypertension, proteinuria, bleeding, and impaired wound healing", "Cumulative cardiomyopathy with red discoloration of the urine", "Cerebellar toxicity with chemical conjunctivitis of the eyes", "Hemorrhagic cystitis with diffuse reversible scalp alopecia"], "ans": 0, "exp": "**Bevacizumab (anti-VEGF) → hypertension, proteinuria, bleeding/thrombosis, GI perforation, and impaired wound healing.** Because of wound-healing risk, **hold around surgery** (typically several weeks before/after). Monitor BP and urine protein.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-115", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T3", "nabp": "3.C.3", "stem": "A patient on bevacizumab is scheduled for elective surgery. What is the appropriate consideration?", "opts": ["Continue bevacizumab through the actual day of the scheduled surgery", "Hold bevacizumab around the surgery because it impairs wound healing", "Double the bevacizumab dose in order to speed surgical recovery", "No special timing of bevacizumab is needed for elective surgery"], "ans": 1, "exp": "**Bevacizumab impairs wound healing and increases bleeding/perforation risk → hold it around surgery** (commonly ~28 days before and until healing after). Plan elective procedures relative to the dosing interval.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-116", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "The anti-EGFR antibodies cetuximab and panitumumab are effective only in which tumors, and cause which signature effects?", "opts": ["RAS-mutant colorectal cancer; cardiotoxicity and edema", "HER2-positive breast cancer; pulmonary fibrosis", "RAS wild-type colorectal cancer; acneiform rash and hypomagnesemia", "Any solid tumor; hemorrhagic cystitis"], "ans": 2, "exp": "**Anti-EGFR antibodies work only in RAS (KRAS/NRAS) wild-type colorectal cancer** (RAS mutations confer resistance) and cause **acneiform rash and hypomagnesemia** (monitor/replace Mg). Rash often correlates with efficacy.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-117", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D1", "tier": "T3", "nabp": "1.A.1", "stem": "What distinguishes an antibody-drug conjugate (ADC) such as trastuzumab deruxtecan or brentuximab vedotin?", "opts": ["It is an oral kinase inhibitor that has no monoclonal antibody component", "It is a checkpoint inhibitor that blocks the PD-1 receptor on T cells", "It is a hormonal agent that suppresses estrogen-driven tumor growth", "It links a monoclonal antibody to a cytotoxic payload for antigen-targeted delivery"], "ans": 3, "exp": "An **ADC = monoclonal antibody + linker + cytotoxic payload** → delivers the toxin selectively to **antigen-expressing tumor cells**, sparing (somewhat) normal tissue. Toxicities reflect both the target and the released payload.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-118", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D2", "tier": "T2", "nabp": "3.B", "stem": "Before initiating trastuzumab, which testing is required?", "opts": ["Confirmation that the tumor tests HER2-positive on assay", "A CCR5 co-receptor tropism assay result beforehand", "A baseline DPYD pharmacogenomic genotype result", "A glucose-6-phosphate dehydrogenase enzyme level"], "ans": 0, "exp": "**Trastuzumab requires a confirmed HER2-positive tumor** (IHC 3+ or ISH amplification) — a companion-diagnostic requirement; it has no benefit and unnecessary cardiac risk in HER2-negative disease. (DPYD = 5-FU; G6PD = rasburicase.)", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-119", "type": "MCQ", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which premedication strategy is standard for rituximab to reduce infusion reactions?", "opts": ["Dexrazoxane administered before each scheduled rituximab dose", "Acetaminophen with an antihistamine, the first infusion given slowly", "Mesna together with aggressive intravenous hydration support", "Leucovorin rescue given several hours after the infused dose"], "ans": 1, "exp": "**Rituximab infusion reactions → premedicate with acetaminophen + an antihistamine (± corticosteroid), and titrate the infusion rate slowly**, especially the first dose. Dexrazoxane/mesna/leucovorin are for other agents entirely.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-120", "type": "SATA", "subtopic": "Monoclonal Antibodies & ADCs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which monoclonal antibody statements are correct? Select all that apply.", "opts": ["Trastuzumab requires HER2-positive status and LVEF monitoring", "Rituximab carries a hepatitis B reactivation risk", "Bevacizumab causes hypertension and impaired wound healing", "Cetuximab is effective only in RAS wild-type colorectal cancer", "Bevacizumab requires HER2 testing before use"], "ans": [0, 1, 2, 3], "exp": "True: **trastuzumab (HER2 + LVEF)**, **rituximab HBV reactivation**, **bevacizumab HTN/wound healing**, **cetuximab RAS wild-type only**. Bevacizumab targets **VEGF**, not HER2 — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-121", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "Tamoxifen is a selective estrogen receptor modulator (SERM). Which tissue-specific effect explains a key risk?", "opts": ["It is an estrogen agonist in breast tissue and an antagonist in bone tissue", "It blocks the aromatase enzyme within peripheral adipose tissue stores", "It is an estrogen antagonist in breast but a uterine agonist (endometrial cancer risk)", "It degrades the estrogen receptor across essentially all body tissues"], "ans": 2, "exp": "**Tamoxifen = ER antagonist in breast (therapeutic) but ER agonist in the uterus → endometrial hyperplasia/cancer risk**, plus **VTE risk**. Counsel on abnormal vaginal bleeding. It is agonist in bone (preserves BMD) — unlike aromatase inhibitors.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-122", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T1", "nabp": "1.A.2", "stem": "Tamoxifen is a prodrug activated by CYP2D6. What is the clinical implication?", "opts": ["The CYP2D6 enzyme plays no meaningful role in tamoxifen's clinical activity", "CYP2D6 ultrarapid metabolizers have markedly reduced tamoxifen efficacy", "CYP2D6 inhibitors increase tamoxifen toxicity by raising its drug levels", "Strong CYP2D6 inhibitors (paroxetine, fluoxetine) can lower active endoxifen and efficacy"], "ans": 3, "exp": "**Tamoxifen → active endoxifen via CYP2D6.** **Poor metabolizers or strong CYP2D6 inhibitors (paroxetine, fluoxetine, bupropion) ↓ endoxifen → potentially ↓ efficacy** → prefer a non-inhibiting antidepressant (e.g., venlafaxine) for hot flashes. Core oncology PGx pair.", "anchor": "PGx in Oncology"}, {"id": "ONC-123", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Aromatase inhibitors (anastrozole, letrozole, exemestane) are used in which population, and cause which characteristic effects?", "opts": ["Postmenopausal women; arthralgias and bone mineral density loss", "Premenopausal women; uterine cancer and venous thromboembolism", "Adult men only; hemorrhagic cystitis and bladder wall irritation", "Any patient population; dilated cardiomyopathy and heart failure"], "ans": 0, "exp": "**Aromatase inhibitors lower estrogen in postmenopausal women** (ineffective alone in premenopausal women, whose ovaries make estrogen) → **arthralgias and accelerated bone loss/osteoporosis** → monitor **BMD**, supplement **calcium/vitamin D**. They lack tamoxifen's VTE/endometrial risk.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-124", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statement correctly contrasts aromatase inhibitors with tamoxifen?", "opts": ["Aromatase inhibitors carry the higher risk of endometrial cancer and blood clots", "Tamoxifen carries endometrial/VTE risk; aromatase inhibitors cause more bone loss/arthralgia", "Both agents have essentially identical adverse-effect profiles in clinical practice", "Tamoxifen is effective only in postmenopausal women and not in younger ones"], "ans": 1, "exp": "**Tamoxifen → endometrial cancer + VTE risk** (ER agonism in uterus); **aromatase inhibitors → arthralgia + bone loss** (estrogen deprivation) but **no endometrial/VTE excess**. AIs require a postmenopausal state; tamoxifen works in either.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-125", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "When a GnRH agonist such as leuprolide is started for prostate cancer, what early effect must be anticipated?", "opts": ["Immediate castrate testosterone levels with no flare reaction at all", "Severe hemorrhagic cystitis requiring mesna and bladder irrigation", "A tumor flare from an initial testosterone surge; cover with an antiandrogen", "Acute hemolytic anemia that requires urgent G6PD enzyme testing"], "ans": 2, "exp": "**GnRH agonists cause an initial LH/testosterone surge → 'tumor flare'** (worsening bone pain/obstruction) before down-regulation lowers testosterone → **co-administer an antiandrogen** (e.g., bicalutamide) around initiation. GnRH antagonists (degarelix) avoid the flare.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-126", "type": "MCQ", "subtopic": "Endocrine Therapy", "domain": "D1", "tier": "T3", "nabp": "1.A.1", "stem": "Abiraterone, used in prostate cancer, works by which mechanism and is given with which co-medication?", "opts": ["Aromatase enzyme inhibition; given together with calcium tablets", "GnRH receptor antagonism; given together with protective mesna", "HER2 receptor blockade; given together with an anthracycline drug", "CYP17 inhibition to block androgen synthesis; given with prednisone"], "ans": 3, "exp": "**Abiraterone inhibits CYP17 (androgen biosynthesis)** → must be given **with low-dose prednisone** to offset mineralocorticoid excess (hypertension, hypokalemia, fluid retention). Enzalutamide (androgen-receptor antagonist) is an alternative class.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-127", "type": "SATA", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which endocrine-therapy statements are correct? Select all that apply.", "opts": ["Tamoxifen increases the risk of endometrial cancer and venous thromboembolism", "Tamoxifen activity depends on CYP2D6-mediated conversion to endoxifen", "Aromatase inhibitors cause arthralgia and bone loss", "GnRH agonists can cause an initial tumor flare", "Aromatase inhibitors are effective as monotherapy in premenopausal women"], "ans": [0, 1, 2, 3], "exp": "True: **tamoxifen endometrial/VTE risk**, **CYP2D6 → endoxifen**, **AI arthralgia/bone loss**, **GnRH agonist flare**. **AIs are ineffective alone in premenopausal women** (ovarian estrogen) — last option false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-128", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "How do immune checkpoint inhibitors (anti-PD-1, anti-PD-L1, anti-CTLA-4) work?", "opts": ["They block inhibitory checkpoints, restoring T-cell-mediated anti-tumor activity", "They deliver an attached cytotoxic payload directly to the tumor cells", "They cross-link strands of DNA within rapidly dividing tumor cells", "They directly inhibit the tyrosine kinase enzymes within tumor cells"], "ans": 0, "exp": "**Checkpoint inhibitors block inhibitory signals (PD-1/PD-L1, CTLA-4) → 'release the brakes' on cytotoxic T cells** to attack the tumor. Because they broadly activate immunity, they cause **immune-related adverse events (irAEs)**.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-129", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "stem": "What is the mainstay of management for moderate-to-severe immune-related adverse events from checkpoint inhibitors?", "opts": ["Dexrazoxane, with the checkpoint inhibitor continued at the full dose", "Systemic corticosteroids, with the checkpoint inhibitor held or discontinued by grade", "Mesna combined with aggressive intravenous hydration therapy support", "Leucovorin rescue administered after each checkpoint-inhibitor dose"], "ans": 1, "exp": "**irAEs (colitis, pneumonitis, hepatitis, endocrinopathies, dermatitis) → hold the drug and give systemic corticosteroids** (graded approach; permanently discontinue for severe/grade-3–4 in many cases). **Steroid-refractory** cases may need infliximab or other immunosuppression. Distinct from cytotoxic chemo toxicity.", "anchor": "ASCO irAE Guideline"}, {"id": "ONC-130", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T2", "nabp": "3.C.1", "stem": "A patient on pembrolizumab develops new fatigue, hypotension, and low cortisol. Which irAE should be suspected?", "opts": ["An acute tumor lysis syndrome with metabolic derangements", "Hemorrhagic cystitis from a urotoxic chemotherapy metabolite", "An endocrinopathy such as hypophysitis or adrenal insufficiency", "Anthracycline-induced dilated cardiomyopathy with heart failure"], "ans": 2, "exp": "Checkpoint inhibitors cause **endocrine irAEs — hypophysitis, thyroid dysfunction, adrenal insufficiency, type 1 diabetes.** Management includes **hormone replacement** (often lifelong) plus corticosteroids for acute inflammation; many endocrinopathies do not require permanent drug discontinuation once stabilized.", "anchor": "ASCO irAE Guideline"}, {"id": "ONC-131", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "stem": "Compared with PD-1/PD-L1 inhibitors, the anti-CTLA-4 agent ipilimumab is associated with what?", "opts": ["Essentially no immune-related adverse events of any clinical significance", "Cardiotoxicity as its single and only recognized clinical toxicity", "An absolute requirement for confirmed HER2-positive tumor status", "A higher rate of immune-related adverse events, especially in combination regimens"], "ans": 3, "exp": "**Anti-CTLA-4 (ipilimumab) carries a higher irAE burden** than PD-1/PD-L1 agents, and **combination (ipilimumab + nivolumab) increases irAE frequency/severity** further. Monitor closely and manage with the graded corticosteroid approach.", "anchor": "ASCO irAE Guideline"}, {"id": "ONC-132", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T1", "nabp": "3.D.3", "aware": true, "stem": "What is the recommended management of lower-grade cytokine release syndrome (CRS) after CAR T-cell therapy?", "opts": ["Anti-IL-6 therapy with tocilizumab, adding corticosteroids for higher grades", "Dexrazoxane combined with aggressive intravenous hydration support", "Leucovorin rescue given several hours after the infusion completes", "Mesna together with continuous bladder irrigation for protection"], "ans": 0, "exp": "ℹ **CAR-T CRS (fever, hypotension, hypoxia) → tocilizumab (anti-IL-6)** for lower grades, **adding corticosteroids for higher-grade or refractory** CRS. Supportive care (fluids, pressors, oxygen) throughout.", "anchor": "ASCO CAR-T Guideline"}, {"id": "ONC-133", "type": "MCQ", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "aware": true, "stem": "How is immune effector cell-associated neurotoxicity syndrome (ICANS) after CAR T-cell therapy primarily managed?", "opts": ["Tocilizumab alone, which reliably reverses the neurotoxicity", "Corticosteroids and supportive care", "Dexrazoxane", "Mesna with hydration"], "ans": 1, "exp": "ℹ **ICANS → corticosteroids and supportive care** is the mainstay; **systemic tocilizumab is not effective for ICANS** (limited CNS penetration of anti-IL-6 effect), unlike CRS where tocilizumab is first-line. Recognize and grade neurotoxicity promptly.", "anchor": "ASCO CAR-T Guideline"}, {"id": "ONC-134", "type": "SATA", "subtopic": "Immunotherapy & irAEs", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "aware": true, "stem": "Which immunotherapy management statements are correct? Select all that apply.", "opts": ["Checkpoint-inhibitor irAEs are managed mainly with systemic corticosteroids", "CAR-T cytokine release syndrome is treated with tocilizumab (± corticosteroids)", "ICANS is managed mainly with corticosteroids", "Combination anti-CTLA-4 plus anti-PD-1 increases irAE risk", "Checkpoint-inhibitor toxicities are best treated by increasing the dose"], "ans": [0, 1, 2, 3], "exp": "True: **irAEs → corticosteroids**, **CRS → tocilizumab ± steroids**, **ICANS → corticosteroids**, **combination immunotherapy ↑ irAEs**. Increasing the dose to treat toxicity is wrong — last option false.", "anchor": "ASCO Guidelines"}, {"id": "ONC-135", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T1", "nabp": "1.A.2", "stem": "Before starting a thiopurine (azathioprine or 6-mercaptopurine), which pharmacogenes predict severe myelosuppression?", "opts": ["DPYD and UGT1A1", "CYP2D6 and G6PD", "TPMT and NUDT15", "HLA-B*5701 and CCR5"], "ans": 2, "exp": "**TPMT and NUDT15 loss-of-function → impaired thiopurine inactivation → severe myelosuppression** → test before initiation and **reduce the dose** in deficient patients. (DPYD = fluoropyrimidines; UGT1A1 = irinotecan.)", "anchor": "PGx in Oncology"}, {"id": "ONC-136", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "The UGT1A1*28 allele increases toxicity from which chemotherapy agent?", "opts": ["Cisplatin", "Vincristine", "Trastuzumab", "Irinotecan"], "ans": 3, "exp": "**UGT1A1*28 (reduced glucuronidation) → accumulation of SN-38 (active irinotecan metabolite) → increased neutropenia and diarrhea** → consider a reduced starting dose. A core oncology PGx pair.", "anchor": "PGx in Oncology"}, {"id": "ONC-137", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "Rasburicase, used for tumor lysis syndrome, is contraindicated in which patients?", "opts": ["Those with glucose-6-phosphate dehydrogenase (G6PD) deficiency", "Those who have a CYP2D6 ultrarapid metabolizer phenotype", "Those who test positive for the HLA-B*5701 risk allele", "Those who have reduced thiopurine methyltransferase activity"], "ans": 0, "exp": "**Rasburicase (recombinant urate oxidase) is contraindicated in G6PD deficiency** → risk of severe **hemolysis and methemoglobinemia** → **screen at-risk patients first.** It rapidly lowers uric acid in/for TLS.", "anchor": "PGx in Oncology"}, {"id": "ONC-138", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T3", "nabp": "1.A.2", "stem": "A CYP2D6 ultrarapid metabolizer may have reduced efficacy of which supportive-care medication?", "opts": ["Intravenous dexamethasone corticosteroid", "Ondansetron and tropisetron antiemetics", "The NK1 antagonist aprepitant agent", "The benzodiazepine lorazepam agent"], "ans": 1, "exp": "**CYP2D6 ultrarapid metabolizers clear ondansetron/tropisetron faster → reduced antiemetic efficacy** (CPIC) → consider an alternative 5-HT3 antagonist (e.g., granisetron) or agent. Dexamethasone/aprepitant/lorazepam are not CYP2D6-dependent here.", "anchor": "PGx in Oncology"}, {"id": "ONC-139", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Which statement correctly distinguishes germline from somatic mutations in oncology?", "opts": ["Germline variants are inherited; somatic variants arise in the tumor and predict response", "Germline and somatic variants share an identical origin and the same clinical use", "Somatic variants are inherited from parents and chiefly predict treatment toxicity", "Germline variants are present only within tumor tissue and not in normal host cells"], "ans": 0, "exp": "**Germline variants = inherited (host) → influence pharmacokinetics, dosing, and toxicity** (e.g., DPYD, TPMT/NUDT15, UGT1A1, CYP2D6). **Somatic variants = acquired in the tumor → predict response to targeted therapy** (e.g., EGFR, BRAF, HER2, RAS).", "anchor": "PGx in Oncology"}, {"id": "ONC-140", "type": "SATA", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Which oncology pharmacogene–drug pairings are correct? Select all that apply.", "opts": ["DPYD — fluoropyrimidines (5-FU, capecitabine)", "TPMT/NUDT15 — thiopurines", "UGT1A1 — irinotecan", "G6PD — rasburicase", "CYP2D6 — cisplatin"], "ans": [0, 1, 2, 3], "exp": "Correct: **DPYD-fluoropyrimidines, TPMT/NUDT15-thiopurines, UGT1A1-irinotecan, G6PD-rasburicase** (and CYP2D6-tamoxifen/ondansetron). **CYP2D6 is not the relevant gene for cisplatin** — last pairing false.", "anchor": "PGx in Oncology"}, {"id": "ONC-141", "type": "MCQ", "subtopic": "Pharmacogenomics in Oncology", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient with known DPYD deficiency is to receive capecitabine. What is the appropriate approach?", "opts": ["Proceed at the full standard dose, since DPYD does not affect capecitabine", "Give rasburicase prophylaxis before starting the capecitabine course", "Add leucovorin in order to chemically inactivate the capecitabine", "Reduce the dose or choose an alternative, given the severe fluoropyrimidine toxicity risk"], "ans": 3, "exp": "**Capecitabine is an oral 5-FU prodrug → DPYD (DPD) deficiency markedly raises toxicity risk** → **reduce the dose or use an alternative**, guided by genotype/phenotype. For severe toxicity/overdose, **uridine triacetate** is the antidote.", "anchor": "PGx in Oncology"}, {"id": "ONC-142", "type": "SATA", "subtopic": "Immunotherapy & irAEs", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about checkpoint inhibitors are correct? Select all that apply.", "opts": ["Nivolumab and pembrolizumab are anti-PD-1 antibodies", "Atezolizumab and durvalumab are anti-PD-L1 antibodies", "Ipilimumab is an anti-CTLA-4 antibody", "They can cause immune-mediated colitis, pneumonitis, and hepatitis", "They act by cross-linking tumor-cell DNA"], "ans": [0, 1, 2, 3], "exp": "True: **nivolumab/pembrolizumab = PD-1**, **atezolizumab/durvalumab = PD-L1**, **ipilimumab = CTLA-4**, and they cause **immune-mediated organ inflammation**. They work by **releasing T-cell checkpoints**, not by DNA cross-linking — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-143", "type": "SATA", "subtopic": "Small-Molecule TKIs", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about oral targeted small-molecule inhibitors are correct? Select all that apply.", "opts": ["The '-nib' suffix denotes a tyrosine kinase inhibitor", "Many are CYP3A4 substrates with significant drug interactions", "BRAF inhibitors require a confirmed BRAF V600 mutation", "Imatinib targets BCR-ABL and KIT", "All TKIs are given as intravenous infusions with premedication"], "ans": [0, 1, 2, 3], "exp": "True: **'-nib' = TKI**, **CYP3A4 substrates → DDIs**, **BRAF inhibitors need BRAF V600**, **imatinib targets BCR-ABL/KIT**. Most TKIs are **oral**, not IV infusions — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-144", "type": "SATA", "subtopic": "Pharmacogenomics in Oncology", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Which oncology pharmacogenomic statements are correct? Select all that apply.", "opts": ["DPYD deficiency increases fluoropyrimidine (5-FU/capecitabine) toxicity", "TPMT/NUDT15 deficiency increases thiopurine myelosuppression", "UGT1A1*28 increases irinotecan toxicity", "G6PD deficiency contraindicates rasburicase", "CYP2D6 status predicts response to platinum agents"], "ans": [0, 1, 2, 3], "exp": "True: **DPYD-fluoropyrimidine**, **TPMT/NUDT15-thiopurine**, **UGT1A1-irinotecan**, **G6PD-rasburicase (contraindicated)**. **CYP2D6 relates to tamoxifen/ondansetron, not platinums** — last option false.", "anchor": "PGx in Oncology"}, {"id": "ONC-145", "type": "SATA", "subtopic": "Endocrine Therapy", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which monitoring or counseling points fit endocrine therapy in breast and prostate cancer? Select all that apply.", "opts": ["Monitor bone mineral density and supplement calcium/vitamin D with aromatase inhibitors", "Counsel tamoxifen patients to report abnormal vaginal bleeding", "Avoid strong CYP2D6 inhibitors (e.g., paroxetine) with tamoxifen", "Cover GnRH agonist initiation with an antiandrogen to prevent flare", "Aromatase inhibitors increase the risk of venous thromboembolism more than tamoxifen"], "ans": [0, 1, 2, 3], "exp": "True: **AI → BMD monitoring + Ca/Vit D**, **tamoxifen → report vaginal bleeding (endometrial risk)**, **avoid CYP2D6 inhibitors with tamoxifen**, **antiandrogen cover for GnRH flare**. **VTE risk is higher with tamoxifen**, not AIs — last option false.", "anchor": "Ch.10 Oncology Overview"}, {"id": "ONC-201", "type": "MCQ", "subtopic": "Hematopoietic Growth Factors", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "What is the primary purpose of granulocyte colony-stimulating factor (filgrastim, pegfilgrastim) in chemotherapy patients?", "opts": ["To reduce the incidence and duration of febrile neutropenia", "To raise hemoglobin in chemotherapy-induced anemia", "To increase the platelet count after chemotherapy", "To prevent chemotherapy-induced nausea and vomiting"], "ans": 0, "exp": "**G-CSF (filgrastim, pegfilgrastim) stimulates neutrophil production → reduces the risk/duration of febrile neutropenia** in patients on myelosuppressive regimens. ESAs address anemia; thrombopoietin agonists address platelets.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-202", "type": "MCQ", "subtopic": "Hematopoietic Growth Factors", "domain": "D2", "tier": "T2", "nabp": "2.A.5", "stem": "When should G-CSF (filgrastim) generally be administered relative to a chemotherapy dose?", "opts": ["At the same time as the chemotherapy infusion", "Beginning about 24 hours or more after chemotherapy, not concurrently", "Several days before chemotherapy is given", "Only after the patient has developed a documented infection"], "ans": 1, "exp": "**Start G-CSF ~24 hours after completing chemotherapy** (not concurrently) — giving it during chemo can sensitize rapidly dividing myeloid precursors. Pegfilgrastim is given once per cycle (long-acting).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-203", "type": "MCQ", "subtopic": "Hematopoietic Growth Factors", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effect is most characteristic of G-CSF therapy?", "opts": ["Hemorrhagic cystitis", "Pulmonary fibrosis", "Bone pain", "Peripheral neuropathy"], "ans": 2, "exp": "**G-CSF commonly causes bone pain** (from marrow expansion) — manage with acetaminophen/NSAIDs or antihistamines. Rare risks include splenic rupture and ARDS. Bone pain is the high-yield counseling point.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-204", "type": "MCQ", "subtopic": "Hematopoietic Growth Factors", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statement about erythropoiesis-stimulating agents (ESAs) in oncology is correct?", "opts": ["They should be titrated to a normal hemoglobin above 13 g/dL for best outcomes", "They are first-line for febrile neutropenia prophylaxis", "They reliably increase the platelet count after chemotherapy", "They carry risks of thrombosis and tumor progression and are avoided when the goal is cure"], "ans": 3, "exp": "**ESAs (epoetin, darbepoetin) carry boxed warnings for thrombosis, tumor progression, and shortened survival** → use the **lowest dose**, avoid in patients receiving **curative-intent** therapy, and do not target normal/high hemoglobin (cap to avoid exceeding ~11–12 g/dL). They treat anemia, not neutropenia/thrombocytopenia.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-205", "type": "MCQ", "subtopic": "Hematopoietic Growth Factors", "domain": "D2", "tier": "T3", "nabp": "5.B", "aware": true, "stem": "Which statement about biosimilars (e.g., filgrastim, trastuzumab, rituximab biosimilars) is correct?", "opts": ["A biosimilar is highly similar with no clinically meaningful differences from its reference biologic", "A biosimilar is identical in every way to a brand-new generic small molecule", "A biosimilar requires a completely different indication from its reference product", "Biosimilars are unregulated and bypass FDA review"], "ans": 0, "exp": "ℹ A **biosimilar is highly similar to its reference biologic with no clinically meaningful differences** in safety/efficacy (rigorous FDA review). Many oncology biosimilars (filgrastim, epoetin, trastuzumab, rituximab, bevacizumab) reduce cost. 'Interchangeable' is a separate regulatory designation.", "anchor": "HOPA/Biosimilars"}, {"id": "ONC-206", "type": "SATA", "subtopic": "Hematopoietic Growth Factors", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statements about hematopoietic growth factors are correct? Select all that apply.", "opts": ["G-CSF reduces febrile neutropenia risk", "G-CSF commonly causes bone pain", "G-CSF should start about 24 hours after chemotherapy, not during it", "ESAs carry thrombosis and tumor-progression risks", "G-CSF is used to correct chemotherapy-induced anemia"], "ans": [0, 1, 2, 3], "exp": "True: **G-CSF ↓ febrile neutropenia**, **bone pain**, **start ~24 h post-chemo**, **ESA thrombosis/tumor risk**. G-CSF addresses **neutropenia, not anemia** (that is ESAs) — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-207", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "Which agent is considered highly emetogenic and requires the most aggressive antiemetic prophylaxis?", "opts": ["Vincristine", "Cisplatin", "Bleomycin", "Methotrexate (low dose)"], "ans": 1, "exp": "**Cisplatin is highly emetogenic** (as is the anthracycline-cyclophosphamide 'AC
