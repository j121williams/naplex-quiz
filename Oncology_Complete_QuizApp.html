' combination) → requires multi-drug prophylaxis. Vincristine, bleomycin, and low-dose methotrexate are low/minimally emetogenic.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-208", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "What is the recommended antiemetic prophylaxis for a highly emetogenic chemotherapy regimen?", "opts": ["A 5-HT3 receptor antagonist given alone before each chemotherapy dose", "Oral dexamethasone given alone as a single-agent prophylaxis regimen", "An NK1 antagonist plus a 5-HT3 antagonist plus dexamethasone plus olanzapine", "Lorazepam given alone before each cycle of the chemotherapy course"], "ans": 2, "exp": "**Highly emetogenic chemo → 4-drug prophylaxis: NK1 antagonist (aprepitant/fosaprepitant) + 5-HT3 antagonist (ondansetron/palonosetron) + dexamethasone + olanzapine.** Moderately emetogenic regimens generally use a 5-HT3 + dexamethasone (± NK1).", "anchor": "NCCN Antiemesis"}, {"id": "ONC-209", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effects are associated with 5-HT3 antagonists such as ondansetron?", "opts": ["Pulmonary fibrosis and bone pain", "Hemorrhagic cystitis and hematuria", "Cardiomyopathy and red urine", "Headache, constipation, and QT prolongation"], "ans": 3, "exp": "**5-HT3 antagonists → headache, constipation, and QT prolongation** (monitor in at-risk patients/electrolyte abnormalities). Recall CYP2D6 ultrarapid metabolizers may have reduced ondansetron efficacy.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-210", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which type of chemotherapy-induced nausea is best managed with a benzodiazepine such as lorazepam?", "opts": ["Anticipatory nausea and vomiting", "Acute nausea within the first 24 hours", "Delayed nausea after 24 hours", "Refractory nausea due to bowel obstruction"], "ans": 0, "exp": "**Anticipatory nausea/vomiting** (a conditioned response before chemo) → **benzodiazepine (lorazepam)** plus behavioral techniques and good control of acute/delayed CINV to prevent it developing.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-211", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T3", "nabp": "3.C.3", "stem": "Aprepitant (an NK1 antagonist) interacts with dexamethasone in what way?", "opts": ["It induces CYP3A4, which lowers dexamethasone levels in the blood", "It inhibits CYP3A4, so the dexamethasone dose is typically reduced", "It chemically chelates dexamethasone within the gastrointestinal tract", "There is no clinically relevant interaction between the two agents"], "ans": 1, "exp": "**Aprepitant is a moderate CYP3A4 inhibitor → raises dexamethasone exposure → reduce the dexamethasone dose** when co-administered (per antiemetic protocols). Consider CYP3A4 interactions broadly with aprepitant.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-212", "type": "MCQ", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which 5-HT3 antagonist has a long half-life that makes it useful for delayed nausea?", "opts": ["Ondansetron", "Granisetron (immediate-release)", "Palonosetron", "Dolasetron"], "ans": 2, "exp": "**Palonosetron has a prolonged half-life** and high receptor affinity → useful against **delayed CINV**. Shorter-acting 5-HT3 antagonists (ondansetron, granisetron IR) are oriented to acute nausea.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-213", "type": "SATA", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statements about CINV management are correct? Select all that apply.", "opts": ["Highly emetogenic regimens use a four-drug prophylaxis including olanzapine", "5-HT3 antagonists can cause QT prolongation and constipation", "Anticipatory nausea is managed with a benzodiazepine", "Aprepitant inhibits CYP3A4 and reduces the needed dexamethasone dose", "5-HT3 antagonists are first-line for anticipatory nausea"], "ans": [0, 1, 2, 3], "exp": "True: **4-drug HEC prophylaxis (with olanzapine)**, **5-HT3 QT/constipation**, **benzodiazepine for anticipatory**, **aprepitant inhibits CYP3A4 → ↓ dex dose**. Anticipatory nausea responds to **benzodiazepines**, not 5-HT3 antagonists — last option false.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-214", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "How is febrile neutropenia generally defined?", "opts": ["Any documented fever at all, regardless of the absolute neutrophil count value", "A platelet count below 50,000 occurring together with a documented fever", "A hemoglobin level below 8 g/dL occurring together with chills and rigors", "An absolute neutrophil count below 500 with fever (≥38.3°C once or ≥38.0°C sustained)"], "ans": 3, "exp": "**Febrile neutropenia = ANC <500 cells/mm³ (or <1,000 falling) PLUS fever (single ≥38.3°C, or ≥38.0°C for ≥1 hour).** It is an **oncologic emergency** requiring prompt empiric antibiotics.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-215", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "What is the appropriate empiric therapy for febrile neutropenia?", "opts": ["A broad-spectrum antipseudomonal beta-lactam (cefepime, pip-tazo, or meropenem)", "Oral azithromycin given alone in the outpatient ambulatory care setting", "Intravenous vancomycin monotherapy started in all febrile patients", "Empiric systemic antifungal therapy given alone as the first-line agent"], "ans": 0, "exp": "**Febrile neutropenia → prompt empiric broad-spectrum antipseudomonal beta-lactam** (cefepime, pip-tazo, meropenem, or ceftazidime). Begin within ~1 hour. Add vancomycin only for specific indications; escalate antifungals if persistent.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-216", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "When should vancomycin be added to empiric febrile-neutropenia therapy?", "opts": ["For every patient who presents with febrile neutropenia, done routinely", "For suspected catheter/line or skin-soft-tissue infection, MRSA, or instability", "Never, because vancomycin is strictly contraindicated in neutropenia", "Only after fourteen full days of documented persistent neutropenic fever"], "ans": 1, "exp": "**Add vancomycin for specific gram-positive concerns** — suspected catheter-related/line infection, skin/soft-tissue infection, known MRSA colonization, severe mucositis, or hemodynamic instability — not routinely for every patient.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-217", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D1", "tier": "T1", "nabp": "3.C.1", "stem": "Which set of metabolic abnormalities characterizes tumor lysis syndrome?", "opts": ["Low potassium, low phosphate, low uric acid, and high calcium", "High sodium, low chloride, and high bicarbonate", "High potassium, high phosphate, high uric acid, and low calcium", "Low glucose, high lactate, and high ammonia"], "ans": 2, "exp": "**TLS = ↑ potassium, ↑ phosphate, ↑ uric acid, and ↓ calcium** (phosphate binds calcium) → risk of arrhythmia and acute kidney injury. Highest risk with high tumor burden/rapidly proliferating hematologic malignancies after treatment.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-218", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "What is the cornerstone of tumor lysis syndrome prevention?", "opts": ["Calcium supplementation combined with strict intravenous fluid restriction", "Potassium supplementation combined with intravenous bisphosphonate therapy", "Scheduled antiemetics combined with systemic corticosteroid therapy use", "Aggressive IV hydration plus allopurinol (or rasburicase if high-risk)"], "ans": 3, "exp": "**TLS prevention = aggressive IV hydration + allopurinol** (xanthine oxidase inhibitor, prevents new uric acid); **rasburicase** (urate oxidase) for **high-risk/established** TLS — it breaks down existing uric acid but is **contraindicated in G6PD deficiency**. Manage electrolytes.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-219", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "How does rasburicase differ mechanistically from allopurinol in managing uric acid?", "opts": ["Rasburicase converts existing uric acid to allantoin; allopurinol prevents new formation", "Both agents work in an identical manner by inhibiting the xanthine oxidase enzyme", "Allopurinol breaks down existing uric acid while rasburicase prevents its formation", "Neither of the two agents has any meaningful effect on the serum uric acid level"], "ans": 0, "exp": "**Rasburicase (recombinant urate oxidase) breaks down existing uric acid → allantoin** (works on the current load); **allopurinol inhibits xanthine oxidase → prevents new uric acid** (does not lower what is already there). Rasburicase is contraindicated in **G6PD deficiency**.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-220", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "What is the initial management of hypercalcemia of malignancy?", "opts": ["Low potassium, low phosphate, low uric acid, and high calcium levels", "High potassium, high phosphate, high uric acid, and low calcium levels", "High sodium, low chloride, and high serum bicarbonate concentrations", "Low glucose, high serum lactate, and elevated blood ammonia levels"], "ans": 1, "exp": "**Hypercalcemia of malignancy → IV normal saline volume repletion + an IV bisphosphonate (e.g., zoledronic acid)**; add **calcitonin** for rapid (short-term) lowering. Denosumab is an option in bisphosphonate-refractory/renal cases. Avoid thiazides (raise calcium).", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-221", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A cancer patient develops back pain with new leg weakness and urinary retention. Which emergency and treatment apply?", "opts": ["Tumor lysis syndrome; managed urgently with intravenous rasburicase therapy", "Febrile neutropenia; managed with empiric broad-spectrum antibiotic therapy", "Spinal cord compression; high-dose corticosteroids plus urgent radiation/surgery", "Hypercalcemia of malignancy; managed with intravenous normal saline fluids"], "ans": 2, "exp": "**Malignant spinal cord compression = oncologic emergency** (back pain + neuro deficits, bowel/bladder dysfunction) → **immediate high-dose dexamethasone + urgent radiation therapy or surgical decompression**. Delay risks permanent paralysis.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-222", "type": "SATA", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which oncologic-emergency statements are correct? Select all that apply.", "opts": ["Febrile neutropenia is treated with an empiric antipseudomonal beta-lactam", "Tumor lysis syndrome causes high potassium, phosphate, and uric acid with low calcium", "Hypercalcemia of malignancy is treated with IV fluids and a bisphosphonate", "Spinal cord compression is treated with corticosteroids plus urgent radiation/surgery", "Rasburicase is safe to use in patients with G6PD deficiency"], "ans": [0, 1, 2, 3], "exp": "True: **febrile neutropenia → antipseudomonal beta-lactam**, **TLS electrolyte pattern**, **hypercalcemia → fluids + bisphosphonate**, **cord compression → steroids + RT/surgery**. **Rasburicase is contraindicated in G6PD deficiency** — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-223", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "What is the recommended approach to moderate-to-severe cancer pain?", "opts": ["As-needed acetaminophen used alone without any opioid component at all", "A single dose of a short-acting opioid given just once each day only", "Avoiding opioids entirely because of concerns about the addiction risk", "Around-the-clock long-acting opioid plus short-acting opioid for breakthrough"], "ans": 3, "exp": "**Cancer pain: scheduled (around-the-clock) long-acting opioid for baseline pain + short-acting opioid for breakthrough.** Follow the WHO analgesic ladder, titrate to effect, and add adjuvants — opioids are appropriate and central for cancer pain.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-224", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T2", "nabp": "1.C", "stem": "A breakthrough opioid dose is typically calculated as approximately what fraction of the total daily opioid dose?", "opts": ["About 10–20% of the total daily dose", "About 75% of the total daily dose", "Exactly the same as the scheduled long-acting dose", "A fixed 5 mg regardless of the regimen"], "ans": 0, "exp": "**Breakthrough dose ≈ 10–20% of the total 24-hour opioid dose**, given as a short-acting opioid and repeated as needed; adjust the scheduled dose based on breakthrough use.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-225", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which prophylactic measure should accompany scheduled opioid therapy?", "opts": ["Routine antiarrhythmic therapy started together with the opioid dose", "A bowel regimen with a stimulant laxative to prevent constipation", "Prophylactic broad-spectrum antibiotics during the opioid treatment", "Indefinitely scheduled antiemetic 5-HT3 receptor antagonist drugs"], "ans": 1, "exp": "**Opioid-induced constipation is near-universal and does not self-resolve → start a prophylactic stimulant laxative (e.g., senna ± stool softener)** with scheduled opioids. Reserve PAMORAs (e.g., methylnaltrexone) for refractory cases.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-226", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T3", "nabp": "3.C.4", "stem": "Why is morphine used with caution in patients with significant renal impairment?", "opts": ["Morphine has no metabolites and is fully safe in renal failure", "Morphine is contraindicated in all cancer patients", "Active/neurotoxic metabolites accumulate; consider hydromorphone or fentanyl", "Morphine requires G6PD testing before use"], "ans": 2, "exp": "**Morphine's active metabolites (e.g., morphine-6-glucuronide, M3G) accumulate in renal impairment → toxicity/neuroexcitation** → prefer **hydromorphone or fentanyl** in significant renal dysfunction and titrate carefully.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-227", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D4", "tier": "T1", "nabp": "4.B", "stem": "USP General Chapter <800> primarily governs which area of pharmacy practice?", "opts": ["Sterile compounding of only non-hazardous intravenous admixtures", "Pharmacy billing, reimbursement, and third-party claims processing", "Controlled-substance recordkeeping and perpetual inventory logging", "Handling of hazardous drugs from receipt through compounding and disposal"], "ans": 3, "exp": "**USP <800> governs safe handling of hazardous drugs** (many antineoplastics) across the workflow — receipt, storage, compounding, transport, administration, and disposal — to protect personnel and the environment. Engineering controls + PPE are central.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-228", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D5", "tier": "T2", "nabp": "5.B", "stem": "Under USP <800>, hazardous-drug sterile compounding should occur in which environment?", "opts": ["A containment primary engineering control within a negative-pressure area, with CSTDs", "Any open countertop workspace using standard non-sterile examination gloves", "A positive-pressure clean room without any special containment controls", "A standard laminar-airflow hood that is vented directly into the room"], "ans": 0, "exp": "**Hazardous-drug compounding requires a containment primary engineering control (Class II BSC or compounding aseptic containment isolator) within a negative-pressure C-SEC, plus closed-system transfer devices (CSTDs).** Negative pressure keeps contaminants contained.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-229", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D4", "tier": "T2", "nabp": "4.B", "stem": "What personal protective equipment is required when handling hazardous antineoplastic drugs?", "opts": ["A single pair of standard non-sterile examination gloves used alone", "Two pairs of chemotherapy-tested gloves and a protective impermeable gown", "No personal protective equipment at all for the oral hazardous drugs", "A simple surgical face mask worn alone without any other protection"], "ans": 1, "exp": "**Hazardous-drug PPE = double (chemotherapy-rated) gloves + an impermeable gown**, with eye/face and respiratory protection when splashes/aerosols are possible. PPE applies to **oral hazardous drugs** too (counting, crushing).", "anchor": "USP 800 / HOPA"}, {"id": "ONC-230", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "A vesicant anthracycline extravasates during administration. What is the appropriate management?", "opts": ["Continue the infusion in order to finish delivering the full ordered dose", "Apply a warm compress and then increase the rate of the drug infusion", "Stop the infusion and give dexrazoxane (or DMSO) with cold compresses", "Administer hyaluronidase together with a warm compress over the site"], "ans": 2, "exp": "**Anthracycline extravasation → STOP the infusion, aspirate, and give dexrazoxane (or topical DMSO) with COLD compresses.** Contrast **vinca alkaloid extravasation → hyaluronidase + WARM compress**. Vesicants cause tissue necrosis.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-231", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D3", "tier": "T3", "nabp": "3.D.3", "stem": "A vinca alkaloid (e.g., vincristine) extravasates. What is the appropriate antidote and compress?", "opts": ["Dexrazoxane with a cold compress", "Mesna with a cold compress", "Leucovorin with a warm compress", "Hyaluronidase with a warm compress"], "ans": 3, "exp": "**Vinca alkaloid extravasation → hyaluronidase + WARM compress** (disperses the drug). This is the opposite of **anthracyclines (dexrazoxane/DMSO + COLD)**. Knowing the warm-vs-cold and antidote pairing is high-yield.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-232", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D5", "tier": "T3", "nabp": "5.B", "stem": "According to HOPA/NCCN guidance, dose rounding of biologic and cytotoxic anticancer agents to the nearest vial is generally acceptable within what range?", "opts": ["Within approximately 5–10% of the originally ordered dose", "Within 50% of the originally ordered dose for all the agents", "Only exact doses with no rounding at all are ever acceptable", "Within 25% of the ordered dose across all the drug classes"], "ans": 0, "exp": "**Dose rounding to the nearest vial within ~5–10% of the ordered dose** (commonly up to 10% for monoclonal antibodies) reduces drug waste and cost without compromising efficacy, per HOPA/NCCN. Institutional policies define the exact threshold.", "anchor": "HOPA Dose Rounding"}, {"id": "ONC-233", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "What is the key distinction between a vesicant and an irritant chemotherapy agent?", "opts": ["An irritant causes tissue necrosis while a vesicant causes only mild transient redness", "A vesicant can cause tissue necrosis on extravasation; an irritant causes inflammation only", "Both vesicants and irritants are entirely identical in their extravasation consequences", "Only orally administered chemotherapy agents are ever able to act as vesicants"], "ans": 1, "exp": "**Vesicants cause tissue necrosis/blistering if they extravasate** (e.g., anthracyclines, vinca alkaloids) → require specific antidotes; **irritants cause local inflammation/pain without necrosis.** Vesicant administration warrants careful IV access and monitoring.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-234", "type": "SATA", "subtopic": "Safe Handling & Dose Rounding", "domain": "D4", "tier": "T2", "nabp": "4.B", "stem": "Which hazardous-drug handling statements are correct? Select all that apply.", "opts": ["USP <800> covers hazardous drugs from receipt through disposal", "Double chemotherapy-tested gloves and a gown are required PPE", "Hazardous-drug compounding uses a containment PEC in a negative-pressure area", "Anthracycline extravasation is managed with dexrazoxane and cold compresses", "Oral hazardous drugs require no special handling precautions"], "ans": [0, 1, 2, 3], "exp": "True: **USP <800> full workflow**, **double gloves + gown**, **containment PEC/negative pressure**, **anthracycline extravasation → dexrazoxane + cold**. **Oral hazardous drugs DO require precautions** (PPE, no crushing/splitting) — last option false.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-235", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which adjuvant analgesics are appropriate for neuropathic cancer pain?", "opts": ["Stimulant laxatives such as senna and bisacodyl given on a schedule", "5-HT3 antagonists such as ondansetron and granisetron given daily", "Gabapentinoids (gabapentin/pregabalin) and an SNRI such as duloxetine", "Erythropoiesis-stimulating agents such as epoetin given weekly"], "ans": 2, "exp": "**Neuropathic cancer pain → gabapentinoids (gabapentin, pregabalin) and SNRIs/TCAs (duloxetine, nortriptyline)** as adjuvants to opioids. Laxatives, antiemetics, and ESAs treat other problems.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-236", "type": "MCQ", "subtopic": "Oncologic Emergencies", "domain": "D3", "tier": "T2", "nabp": "3.C.1", "stem": "A patient with a mediastinal tumor develops facial/neck swelling, distended neck veins, and dyspnea. Which syndrome is most likely?", "opts": ["Tumor lysis syndrome", "Spinal cord compression", "Hypercalcemia of malignancy", "Superior vena cava syndrome"], "ans": 3, "exp": "**Superior vena cava (SVC) syndrome** — SVC obstruction (lung cancer, lymphoma) → facial/upper-body edema, distended neck veins, dyspnea. Management may include corticosteroids, radiation, or endovascular stenting based on cause/severity.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-237", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D1", "tier": "T3", "nabp": "1.C", "stem": "When rotating between opioids using an equianalgesic table, why is the calculated new dose usually reduced by 25–50%?", "opts": ["To account for incomplete cross-tolerance between different opioids", "Because equianalgesic tables overstate the new drug potency tenfold", "Because the replacement opioid is always far weaker than the first", "To deliberately undertreat the patient's underlying cancer pain"], "ans": 0, "exp": "**Incomplete cross-tolerance between opioids → reduce the equianalgesic-calculated dose ~25–50% when switching**, then titrate to effect. This prevents inadvertent overdose during rotation.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-238", "type": "MCQ", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T3", "nabp": "3.C.2", "stem": "Which agents are used as adjuncts to reduce pain and skeletal events from bone metastases?", "opts": ["Stimulant laxatives combined with osmotic stool-softening agents", "Bisphosphonates or denosumab (with radiation and corticosteroids as adjuncts)", "5-HT3 antagonists combined with NK1 receptor antagonist agents", "Erythropoiesis-stimulating agents combined with intravenous iron"], "ans": 1, "exp": "**Bone-metastasis pain → bisphosphonates (zoledronic acid) or denosumab** reduce skeletal-related events and pain; **radiation and corticosteroids** are useful adjuncts. Monitor for osteonecrosis of the jaw and hypocalcemia.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-239", "type": "MCQ", "subtopic": "Safe Handling & Dose Rounding", "domain": "D4", "tier": "T2", "nabp": "4.B", "stem": "What is the correct response to a hazardous-drug spill in the pharmacy?", "opts": ["Wipe it up quickly using a paper towel and bare ungloved hands", "Leave the area and allow the spilled drug to evaporate on its own", "Contain and clean it with a designated hazardous-drug spill kit, by trained staff in PPE", "Rinse it into the nearest sink using large volumes of tap water"], "ans": 2, "exp": "**Hazardous-drug spill → use a designated spill kit, don appropriate PPE, contain and clean by trained personnel, then document/dispose per policy.** Spill kits and procedures are a USP <800> requirement.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-240", "type": "SATA", "subtopic": "Cancer Pain Management", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which cancer pain management statements are correct? Select all that apply.", "opts": ["Scheduled long-acting opioids cover baseline pain with short-acting agents for breakthrough", "Breakthrough doses are about 10–20% of the total daily opioid dose", "A prophylactic stimulant-laxative bowel regimen should accompany scheduled opioids", "Morphine's active metabolites accumulate in renal impairment", "Opioids should be avoided entirely in cancer pain because of addiction risk"], "ans": [0, 1, 2, 3], "exp": "True: **ATC long-acting + breakthrough short-acting**, **breakthrough 10–20%**, **prophylactic bowel regimen**, **morphine metabolites accumulate in renal failure**. Opioids are central to cancer pain — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-241", "type": "SATA", "subtopic": "Safe Handling & Dose Rounding", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Which extravasation management statements are correct? Select all that apply.", "opts": ["Anthracycline extravasation is managed with dexrazoxane (or DMSO) and a cold compress", "Vinca alkaloid extravasation is managed with hyaluronidase and a warm compress", "Vesicants can cause tissue necrosis if they extravasate", "The infusion should be stopped immediately when extravasation is suspected", "Irritants reliably cause tissue necrosis identical to vesicants"], "ans": [0, 1, 2, 3], "exp": "True: **anthracycline → dexrazoxane/DMSO + cold**, **vinca → hyaluronidase + warm**, **vesicants cause necrosis**, **stop the infusion immediately**. Irritants cause inflammation **without** the necrosis of vesicants — last option false.", "anchor": "USP 800 / HOPA"}, {"id": "ONC-242", "type": "SATA", "subtopic": "Chemotherapy-Induced Nausea & Vomiting", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which antiemetic statements are correct? Select all that apply.", "opts": ["Cisplatin is highly emetogenic", "Palonosetron's long half-life helps with delayed nausea", "Olanzapine is part of four-drug prophylaxis for highly emetogenic chemotherapy", "Dexamethasone is a standard component of antiemetic regimens", "Vincristine is highly emetogenic and requires four-drug prophylaxis"], "ans": [0, 1, 2, 3], "exp": "True: **cisplatin highly emetogenic**, **palonosetron for delayed CINV**, **olanzapine in 4-drug HEC prophylaxis**, **dexamethasone standard component**. **Vincristine is minimally emetogenic** — last option false.", "anchor": "NCCN Antiemesis"}, {"id": "ONC-243", "type": "SATA", "subtopic": "Oncologic Emergencies", "domain": "D1", "tier": "T2", "nabp": "3.C.1", "stem": "Which statements about tumor lysis syndrome are correct? Select all that apply.", "opts": ["It features hyperkalemia and hyperphosphatemia", "It features hyperuricemia and hypocalcemia", "Allopurinol prevents new uric acid formation", "Rasburicase is contraindicated in G6PD deficiency", "It is most common in slow-growing solid tumors with low tumor burden"], "ans": [0, 1, 2, 3], "exp": "True: **↑K/↑PO4**, **↑uric acid/↓Ca**, **allopurinol prevents new uric acid**, **rasburicase contraindicated in G6PD deficiency**. TLS is most common with **rapidly proliferating, high-burden hematologic malignancies** — last option false.", "anchor": "Anticancer Toxicity Mgmt"}, {"id": "ONC-244", "type": "SATA", "subtopic": "Hematopoietic Growth Factors", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statements about supportive biologics are correct? Select all that apply.", "opts": ["Pegfilgrastim is long-acting and dosed once per chemotherapy cycle", "ESAs are avoided when the treatment goal is cure", "Biosimilars have no clinically meaningful differences from their reference biologic", "G-CSF can cause bone pain", "ESAs should be titrated to a hemoglobin above 13 g/dL"], "ans": [0, 1, 2, 3], "exp": "True: **pegfilgrastim once per cycle**, **avoid ESAs in curative intent**, **biosimilar = no clinically meaningful difference**, **G-CSF bone pain**. ESAs should **not** target high hemoglobin (thrombosis/mortality risk) — last option false.", "anchor": "Anticancer Toxicity Mgmt"}];
const LET = "ABCDEF";
const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="oncall_log_v1", MISSKEY="oncall_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }

function renderDash(){
  const subs = subtopics();
  let s = `<div class="card"><h2>Build your set</h2>
    <div class="row">
      <div><label>Domain</label><select id="fDom"><option value="">All</option>
        <option>D1</option><option>D2</option><option>D3</option><option>D4</option><option>D5</option></select></div>
      <div><label>Tier</label><select id="fTier"><option value="">All</option>
        <option>T1</option><option>T2</option><option>T3</option></select></div>
      <div><label>Count</label><select id="fCount"><option value="0">All</option>
        <option>10</option><option>20</option><option>30</option><option>40</option></select></div>
      <div><label>Order</label><select id="fShuf"><option value="1">Shuffle</option><option value="0">In order</option></select></div>
    </div>
    <div style="margin-top:12px"><label>Subtopics
      <span style="float:right">
        <button class="tag-link" onclick="allSubs(true)">Select all</button>
        <button class="tag-link" onclick="allSubs(false)">Clear</button></span></label>
      <div class="subtopics" id="subs">`;
  subs.forEach((sub,i)=>{ const n=ITEMS.filter(x=>x.subtopic===sub).length;
    s += `<label><input type="checkbox" class="subck" value="${i}" checked onchange="liveCount()"> ${sub} <span class="count-pill">(${n})</span></label>`; });
  s += `</div></div>
    <div class="count-pill" id="live" style="margin-top:6px"></div>
    <button class="bigbtn" id="startBtn" onclick="startQuiz()">Start quiz</button></div>`;
  el('dash').innerHTML = s;
  ['fDom','fTier','fCount','fShuf'].forEach(id=>el(id).onchange=liveCount);
  liveCount();
}
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  const subs = subtopics();
  const chosen = [...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
  const dom = el('fDom').value, tier = el('fTier').value;
  let pool = ITEMS.filter(i=>chosen.includes(i.subtopic));
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const want = +el('fCount').value;
  const n = want? Math.min(want,pool.length): pool.length;
  el('live').textContent = `${pool.length} match filters · quiz of ${n}`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false, answered=false, picks=[];
function buildItem(it){
  if(it.type==='FILL') return {...it};
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  const want = +el('fCount').value;
  if(+el('fShuf').value) pool = shuffle(pool);
  if(want) pool = pool.slice(0,want);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
function badgeHtml(it){
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];
  let b=`<div class="badge ${tierC}">${it.tier}</div><div class="badge b-dom">${it.domain}</div>
    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.type==='FILL') b+=`<div class="badge b-fill">FILL</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  return b;
}
function renderQ(){
  answered=false; picks=[];
  const it=Q[qi];
  const head=`<div class="card">
    <div class="topbar"><span>Question ${qi+1} / ${Q.length}${retestMode?' · retest':''}</span><span>Score ${score}</span></div>
    <div class="bar"><div style="width:${(qi/Q.length)*100}%"></div></div>
    <div class="badges">${badgeHtml(it)}</div>`;
  let body;
  if(it.type==='FILL'){
    body=`<div class="stem">${render(it.stem)}</div>
      <div class="fillrow"><input id="fillIn" type="text" inputmode="decimal" autocomplete="off"
        placeholder="Enter a number" oninput="el('checkBtn').disabled=this.value.trim()===''">
        <span class="unit">${render(it.unit)}</span></div>
      <div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkFill()" disabled>Check</button></div>`;
  } else {
    const isSata = it.type==='SATA';
    body=`<div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div><div id="opts">`;
    it.opts.forEach((o,i)=>{ body+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
      <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
    body+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>`;
  }
  const tail=`<div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=head+body+tail;
  if(it.type==='FILL') setTimeout(()=>{const f=el('fillIn'); if(f)f.focus();},30);
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function tolOk(user,it){
  if(it.tol!=null) return Math.abs(user-it.ans)<=it.tol+1e-9;
  if(it.tolpct!=null) return Math.abs(user-it.ans)<=Math.abs(it.ans)*it.tolpct/100+1e-9;
  return Math.abs(user-it.ans)<=Math.max(Math.abs(it.ans)*0.02,0.01);
}
function recordAndReveal(it,ok,answerText){
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok&&retestMode){ const m=getMissed(); const k=m.indexOf(it.id); if(k>=0){m.splice(k,1);setMissed(m);} }
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+answerText}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function checkFill(){
  if(answered) return; const it=Q[qi];
  const raw=el('fillIn').value.trim().replace(/,/g,'').replace(/[^0-9eE.+-]/g,'');
  const user=parseFloat(raw);
  if(isNaN(user)) return;
  answered=true;
  const ok=tolOk(user,it);
  el('fillIn').classList.add(ok?'correct':'wrong'); el('fillIn').disabled=true;
  recordAndReveal(it,ok,fmtNum(it.ans)+' '+it.unit);
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  recordAndReveal(it,ok,al);
}
function fmtNum(x){ return (Math.round(x*1000)/1000).toString(); }
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button onclick="if(confirm('Reset all progress?')){store.set(LOGKEY,[]);store.set(MISSKEY,[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  const it=Q[qi];
  if(!answered){
    if(it.type==='FILL'){ if(e.key==='Enter'&&!el('checkBtn').disabled)checkFill(); return; }
    if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA');
  } else if(e.key==='Enter')nextQ();
});
renderDash();
</script>
</body></html>
