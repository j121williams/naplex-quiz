<script>
const ALL=[{"id": 1, "group": "Azoles", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA shared by the **azole** antifungals?", "opts": ["Inhibit CYP51 (14-α-demethylase) → ↓ ergosterol", "Inhibit β-1,3-glucan synthase → cell-wall loss", "Inhibit squalene epoxidase → ↓ ergosterol", "Bind ergosterol → membrane pores"], "ans": 0, "exp": "Azoles inhibit **14-α-demethylase (CYP51)** → block **ergosterol** synthesis. ⚠ This same CYP affinity drives their **human CYP inhibition / DDIs.** *NABP: 1.A.1.*"}, {"id": 2, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which is TRUE of **fluconazole (Diflucan)'s** spectrum?", "opts": ["Reliable Aspergillus/mold activity, poor CNS penetration", "Candida (not krusei) plus Cryptococcus; great CNS/urine; no molds", "Broad mold coverage including Mucorales; renal dosing", "Topical use only; negligible systemic absorption"], "ans": 1, "exp": "Fluconazole (Diflucan): **Candida (krusei intrinsically resistant; glabrata dose-dependent), Cryptococcus**, great **CSF/urine** penetration; ⚠ **no Aspergillus/mold** activity. *NABP: 3.C.2.*"}, {"id": 3, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line azole for **invasive aspergillosis**?", "opts": ["Fluconazole (Diflucan)", "Voriconazole (Vfend)", "Ketoconazole", "Nystatin"], "ans": 1, "exp": "**Voriconazole (Vfend)** is first-line for invasive aspergillosis (isavuconazole is an alternative). ⚠ Voriconazole does **not** cover mucormycosis. *NABP: 3.C.2.*"}, {"id": 4, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A patient on **voriconazole (Vfend)** reports bright-light flashes and altered color vision. This is:", "opts": ["Early cataract formation from the drug", "Irreversible retinal pigment deposits", "Transient photopsia, a characteristic voriconazole (Vfend) effect", "Optic-nerve infarction requiring drug discontinuation"], "ans": 2, "exp": "**Voriconazole (Vfend) → transient visual disturbances/photopsia** (very characteristic); also **phototoxicity/↑skin-cancer risk, periostitis (fluoride), hallucinations, hepatotoxicity.** *NABP: 3.C.5.*"}, {"id": 5, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which azole carries a boxed warning for **heart failure** (negative inotrope) and should be avoided in HF?", "opts": ["Voriconazole (Vfend)", "Isavuconazole (Cresemba)", "Fluconazole (Diflucan)", "Itraconazole"], "ans": 3, "exp": "⚠ **Itraconazole** has a **BBW for negative inotropy/HF** → avoid in ventricular dysfunction. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 6, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Correct administration of **itraconazole capsules**?", "opts": ["Take with food/cola; avoid acid suppressants", "Crush and give via NG tube with antacid", "Take fasting at bedtime; avoid food entirely", "Take on an empty stomach with plain water"], "ans": 0, "exp": "**Itraconazole capsules need acid** → take **with food/cola**; ⚠ acid suppressants ↓ absorption. (The **oral solution** is taken on an **empty stomach** and has better, more reliable absorption.) *NABP: 3.E.2 / 3.C.3.*"}, {"id": 7, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Primary roles of **posaconazole**?", "opts": ["First-line onychomycosis and tinea capitis", "Mold prophylaxis in neutropenia/GVHD; mucor salvage", "First-line cryptococcal meningitis induction therapy", "Topical thrush and cutaneous candidiasis only"], "ans": 1, "exp": "**Posaconazole** = prophylaxis (prolonged neutropenia/GVHD) + mold coverage incl. **mucormycosis** (salvage). ✓ The **delayed-release tablet/IV** are preferred over the suspension (better absorption). *NABP: 3.C.2.*"}, {"id": 8, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.5 / 2.A.4", "stem": "Which azole is unique in that it **shortens** the QT interval?", "opts": ["Fluconazole (Diflucan)", "Voriconazole (Vfend)", "Isavuconazole (Cresemba)", "Itraconazole"], "ans": 2, "exp": "ℹ **Isavuconazole (Cresemba) SHORTENS QT** (others prolong) → contraindicated in **familial short-QT syndrome**; covers Aspergillus + mucormycosis with fewer DDIs/visual effects than voriconazole (Vfend). *NABP: 3.C.5 / 2.A.4.*"}, {"id": 9, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 2.A.4", "stem": "Why is systemic **ketoconazole** now rarely used?", "opts": ["Lacks any clinically relevant CYP interactions", "Available only as an intravenous formulation", "Too narrow a spectrum for systemic use", "Hepatotoxicity (BBW), adrenal suppression, QT prolongation"], "ans": 3, "exp": "Oral **ketoconazole** = **hepatotoxicity (BBW), adrenal suppression, antiandrogenic effects, QT** → largely replaced; mostly **topical/shampoo** now. *NABP: 3.C.5 / 2.A.4.*"}, {"id": 10, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on **simvastatin (Zocor)** is started on an azole. Main concern?", "opts": ["CYP3A4 inhibition ↑ simvastatin (Zocor) → rhabdomyolysis risk", "Cation chelation lowering simvastatin (Zocor) absorption", "CYP3A4 induction reducing simvastatin (Zocor) exposure", "Additive QT prolongation between the two agents"], "ans": 0, "exp": "Azoles (esp. the **-conazoles**) are **strong CYP3A4 inhibitors** → ↑ simvastatin (Zocor)/lovastatin → **rhabdo**; also ↑ tacrolimus (Prograf)/cyclosporine (Neoral), ↑ warfarin (INR), and many others. *NABP: 3.C.3.*"}, {"id": 11, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "**Voriconazole (Vfend)** dosing is complicated by:", "opts": ["Renal clearance only, requiring CrCl-based dosing", "CYP2C19 polymorphism → trough drug monitoring needed", "Absence of metabolism, giving linear kinetics", "Chelation by dietary cations reducing absorption"], "ans": 1, "exp": "Voriconazole (Vfend) is metabolized by **CYP2C19** (genotype affects levels) → **TDM (trough)** to balance efficacy vs toxicity. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 12, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Therapeutic drug monitoring (trough levels) is routinely recommended for which azoles?", "opts": ["Topical azoles such as clotrimazole", "Fluconazole (Diflucan) and isavuconazole (Cresemba)", "Voriconazole (Vfend), itraconazole, and posaconazole", "Ketoconazole and terbinafine"], "ans": 2, "exp": "**Voriconazole (Vfend), itraconazole, posaconazole** have variable absorption/levels → **TDM.** (Fluconazole has predictable PK; isavuconazole (Cresemba) usually doesn't need routine TDM.) *NABP: 3.D.2.*"}, {"id": 13, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Regarding **fluconazole (Diflucan) in pregnancy**?", "opts": ["Only the IV formulation is safe in pregnancy", "Equivalent in fetal safety to amphotericin B", "Safe at any dose throughout all trimesters", "High-dose/chronic use is teratogenic; avoid 1st trimester"], "ans": 3, "exp": "⚠ **High-dose fluconazole (Diflucan) is teratogenic** → avoid chronic/high-dose in the 1st trimester; for VVC in pregnancy use **topical azoles.** *NABP: 2.A.4 / 3.C.2.*"}, {"id": 14, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Shared monitoring for systemic **azoles**?", "opts": ["Liver function tests, plus QTc for most azoles", "Serum creatine kinase to detect myopathy", "Coagulation panel and platelet counts", "Baseline and periodic audiometry testing"], "ans": 0, "exp": "Azoles → **hepatotoxicity** → monitor **LFTs**; watch **QTc** (all prolong except isavuconazole (Cresemba)). *NABP: 3.C.5 / 3.D.2.*"}, {"id": 15, "group": "Azoles", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which azole requires **renal** dose adjustment (vs hepatic clearance for the others)?", "opts": ["Voriconazole (CYP2C19 metabolized)", "Fluconazole (renally eliminated)", "Itraconazole (hepatically cleared)", "Posaconazole (hepatically cleared)"], "ans": 1, "exp": "**Fluconazole (Diflucan) is renally cleared** → adjust for CrCl; voriconazole (Vfend)/itraconazole/posaconazole are **hepatically** metabolized. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 16, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A neutropenic patient with proven **mucormycosis** — which azole has activity?", "opts": ["Fluconazole (CNS-penetrant azole)", "Voriconazole (broad mold coverage)", "Posaconazole or isavuconazole (mucor-active)", "Ketoconazole (oral broad-spectrum azole)"], "ans": 2, "exp": "**Posaconazole/isavuconazole (Cresemba)** cover **Mucorales**; ⚠ **voriconazole (Vfend) and fluconazole (Diflucan) do NOT** (amphotericin B + surgery is first-line). *NABP: 3.C.2.*"}, {"id": 19, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of the **echinocandins** (caspofungin, micafungin, anidulafungin)?", "opts": ["Inhibit β-1,3-glucan synthase → cell-wall loss", "Inhibit CYP51 → block ergosterol synthesis", "Convert to 5-FU → block nucleic acids", "Bind ergosterol → form membrane pores"], "ans": 0, "exp": "Echinocandins inhibit **β-1,3-glucan synthase** (cell-wall target unique to fungi) → fungicidal vs Candida. *NABP: 1.A.1.*"}, {"id": 20, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **candidemia / invasive candidiasis** in most adults?", "opts": ["Oral fluconazole (Diflucan)", "An echinocandin (e.g., micafungin)", "Amphotericin B deoxycholate", "Nystatin swish-and-swallow"], "ans": 1, "exp": "An **echinocandin is first-line** for candidemia (covers azole-resistant Candida incl. glabrata/krusei); **de-escalate to fluconazole (Diflucan)** if the isolate is susceptible and the patient is stable. *NABP: 3.C.2.*"}, {"id": 21, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which is a key **spectrum/penetration gap** of echinocandins?", "opts": ["Oral-only dosing limits acute use", "Strong cation chelation reduces absorption", "No Cryptococcus/Mucorales; poor CNS/urine", "Activity restricted to azole-susceptible Candida"], "ans": 2, "exp": "⚠ Echinocandins **miss Cryptococcus and Mucorales** and **penetrate CNS/urine poorly** → don't use for CNS or urinary fungal infection (also higher MICs vs C. parapsilosis). *NABP: 3.C.2.*"}, {"id": 22, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.3", "stem": "Why are echinocandins considered \"clean\" drugs for interactions?", "opts": ["They chelate cations, blocking absorption", "They require routine trough-level monitoring", "They strongly inhibit CYP3A4 like azoles", "They are not significant CYP substrates/inhibitors"], "ans": 3, "exp": "Echinocandins have **minimal CYP-mediated DDIs** (a big advantage over azoles); **IV only**; AEs are mild (infusion/histamine, ↑LFTs). *NABP: 3.C.3.*"}, {"id": 23, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **amphotericin B**?", "opts": ["Binds ergosterol → membrane pores → cell death", "Inhibits CYP51 → blocks ergosterol synthesis", "Inhibits squalene epoxidase → squalene buildup", "Inhibits β-1,3-glucan synthase → cell-wall loss"], "ans": 0, "exp": "Amphotericin **binds ergosterol → membrane pores** (fungicidal); binding to human cholesterol underlies its toxicity. *NABP: 1.A.1.*"}, {"id": 24, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Amphotericin B is valued because it has:", "opts": ["The narrowest spectrum among antifungals", "The broadest spectrum (molds, Mucorales, endemics)", "Convenient oral-only dosing for outpatients", "A favorable, essentially toxicity-free profile"], "ans": 1, "exp": "Amphotericin = **broadest spectrum** → severe/disseminated disease, **Mucorales**, cryptococcal induction, endemic mycoses. *NABP: 3.C.2.*"}, {"id": 25, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "The dose-limiting toxicity of **amphotericin B** and how to mitigate it?", "opts": ["Ototoxicity; mitigate with audiometry monitoring", "Hepatotoxicity; mitigate with N-acetylcysteine", "Nephrotoxicity; mitigate with saline loading/lipid form", "QT prolongation; mitigate by repleting potassium"], "ans": 2, "exp": "⚠ **Nephrotoxicity** is dose-limiting → **IV saline pre/post-hydration**, **lipid formulations** (less nephrotoxic), and **monitor SCr**. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 26, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Besides renal injury, amphotericin commonly causes:", "opts": ["Hyperglycemia from impaired insulin release", "Neutrophilia and reactive thrombocytosis", "Hyperkalemia and hypermagnesemia retention", "Hypokalemia and hypomagnesemia from renal wasting"], "ans": 3, "exp": "Amphotericin → renal **K⁺ and Mg²⁺ wasting** → **monitor and replace** K/Mg (also anemia from ↓erythropoietin). *NABP: 3.C.5.*"}, {"id": 27, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "A patient gets fever, chills, and rigors during an amphotericin infusion. Best approach?", "opts": ["Infusion reaction → premedicate and slow the rate", "Anaphylaxis → give IM epinephrine immediately", "Poor tolerance → switch to oral amphotericin", "True allergy → stop amphotericin permanently"], "ans": 0, "exp": "**Infusion reactions** (fever/chills/rigors) are common → **premedicate** and slow the rate; not a true allergy. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 28, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "The main advantage of **liposomal/lipid-complex amphotericin** over the conventional deoxycholate form?", "opts": ["Oral availability avoiding IV access", "Significantly less nephrotoxicity at equal efficacy", "Broader spectrum covering resistant molds", "Complete absence of any infusion reactions"], "ans": 1, "exp": "**Lipid formulations = less nephrotoxic** → preferred in renal impairment or when higher/prolonged dosing is needed (e.g., mucormycosis). *NABP: 3.C.5 / 3.D.2.*"}, {"id": 29, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **flucytosine (5-FC)**?", "opts": ["Inhibits CYP51 → blocks ergosterol synthesis", "Binds ergosterol → forms membrane pores", "Converted to 5-FU → blocks DNA/RNA synthesis", "Inhibits β-1,3-glucan synthase → cell-wall loss"], "ans": 2, "exp": "Flucytosine → **5-FU** intracellularly → disrupts fungal nucleic-acid synthesis. ⚠ **Never use as monotherapy** (rapid resistance). *NABP: 1.A.1.*"}, {"id": 30, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "The classic role of **flucytosine** is:", "opts": ["Topical therapy for oropharyngeal thrush", "Single-agent therapy for invasive aspergillosis", "Pulse oral therapy for toenail onychomycosis", "Combined with amphotericin for cryptococcal induction"], "ans": 3, "exp": "**Flucytosine + amphotericin B** = cryptococcal meningitis **induction** (synergistic), then fluconazole (Diflucan) consolidation/maintenance. *NABP: 3.C.2.*"}, {"id": 31, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Key toxicity/monitoring for **flucytosine**?", "opts": ["Bone-marrow suppression → monitor CBC and serum levels", "Tendon rupture → avoid concurrent corticosteroids", "Optic neuritis → obtain baseline visual-acuity testing", "QT prolongation → monitor ECG and electrolytes"], "ans": 0, "exp": "⚠ Flucytosine → **myelosuppression** (worse with renal impairment/high levels) → **monitor CBC + drug levels**, adjust for renal function. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 32, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Standard regimen for **cryptococcal meningitis**?", "opts": ["Lifelong high-dose fluconazole (Diflucan) monotherapy", "Liposomal amphotericin + flucytosine, then fluconazole (Diflucan)", "An echinocandin such as micafungin alone", "Voriconazole (Vfend) with adjunctive flucytosine"], "ans": 1, "exp": "**Induction = liposomal amphotericin + flucytosine**, then **fluconazole (Diflucan)** consolidation (800 mg) and maintenance (200 mg). ⚠ Echinocandins don't cover Cryptococcus. *NABP: 3.C.2.*"}, {"id": 33, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Why is an **echinocandin a poor choice for Candida meningitis or a Candida UTI**?", "opts": ["It causes dose-limiting nephrotoxicity at those sites", "Its spectrum is too broad for these infections", "Poor CNS/urine penetration → use fluconazole (Diflucan)/ampho", "It is available only as an oral formulation"], "ans": 2, "exp": "Echinocandins **don't penetrate CSF/urine well** → CNS/urinary candidiasis needs **fluconazole (Diflucan) or amphotericin.** *NABP: 1.A.2 / 3.C.2.*"}, {"id": 34, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "After candidemia improves on an echinocandin and the isolate is **fluconazole (Diflucan)-susceptible**, the stewardship step is:", "opts": ["Add amphotericin B for combination coverage", "Stop all antifungal therapy at 48 hours", "Continue the echinocandin for the full course", "De-escalate to oral fluconazole (Diflucan) once stable"], "ans": 3, "exp": "**De-escalate to fluconazole (Diflucan)** (oral, high bioavailability) once the patient is stable and the isolate is susceptible — complete ≥14 days from first negative culture. *NABP: 3.C.2 / 5.C.*"}, {"id": 37, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Mild **oropharyngeal candidiasis (thrush)** is best treated with:", "opts": ["Clotrimazole troches or nystatin suspension (topical)", "An IV echinocandin such as caspofungin", "Oral voriconazole (Vfend) with trough monitoring", "IV liposomal amphotericin B"], "ans": 0, "exp": "Mild thrush → **topical clotrimazole troche/nystatin swish-and-swallow**; **fluconazole (Diflucan)** for moderate–severe or unresponsive. *NABP: 3.C.2.*"}, {"id": 38, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Esophageal candidiasis** requires:", "opts": ["Topical nystatin swish-and-swallow alone", "Systemic oral or IV fluconazole (Diflucan) therapy", "No treatment; it resolves spontaneously", "Clotrimazole troches dissolved in the mouth"], "ans": 1, "exp": "Esophageal candidiasis needs **systemic fluconazole (Diflucan)** (topical/troches don't reach the esophagus); echinocandin/amphotericin if refractory. ✓ Often an AIDS-defining/immunosuppression marker. *NABP: 3.C.2.*"}, {"id": 39, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line for **invasive pulmonary aspergillosis**?", "opts": ["Nystatin suspension", "Fluconazole (Diflucan) monotherapy", "Voriconazole (Vfend) or isavuconazole (Cresemba)", "Caspofungin monotherapy"], "ans": 2, "exp": "**Voriconazole (Vfend)** (or **isavuconazole (Cresemba)**) is first-line; echinocandins are salvage/combination only. ✓ **Serum/BAL galactomannan** aids diagnosis. *NABP: 3.C.2.*"}, {"id": 40, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Cornerstones of **mucormycosis** management?", "opts": ["Voriconazole (Vfend) plus surgical debridement", "An echinocandin plus risk-factor control", "High-dose fluconazole (Diflucan) monotherapy", "Liposomal amphotericin + surgery + reverse DKA"], "ans": 3, "exp": "Mucormycosis → **lipid amphotericin + aggressive surgery + reverse DKA/immunosuppression**; **isavuconazole (Cresemba)/posaconazole** for step-down. ⚠ Voriconazole (Vfend)/fluconazole (Diflucan)/echinocandins do **not** cover Mucorales. *NABP: 3.C.2.*"}, {"id": 41, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Treatment of mild–moderate **histoplasmosis**?", "opts": ["Itraconazole (amphotericin for severe disease)", "Fluconazole (Diflucan) with trough monitoring", "An echinocandin such as micafungin", "Oral terbinafine 250 mg daily"], "ans": 0, "exp": "**Itraconazole** for mild–moderate histoplasmosis/blastomycosis; **(liposomal) amphotericin** for severe → step down to itraconazole. *NABP: 3.C.2.*"}, {"id": 42, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A \"rose gardener\" develops nodular lymphocutaneous **sporotrichosis**. Treatment?", "opts": ["An echinocandin such as caspofungin", "Itraconazole (amphotericin if severe)", "Fluconazole (Diflucan) 200 mg daily", "Oral penicillin VK therapy"], "ans": 1, "exp": "**Itraconazole** is first-line for cutaneous/lymphocutaneous **sporotrichosis**; amphotericin for severe/disseminated. *NABP: 3.C.2.*"}, {"id": 43, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Preferred azole for **coccidioidomycosis** (non-severe) and its meningitis?", "opts": ["Posaconazole, including for meningitis", "Ketoconazole for meningeal disease", "Fluconazole (lifelong for meningitis)", "Voriconazole (Vfend) with trough monitoring"], "ans": 2, "exp": "**Fluconazole (Diflucan)/itraconazole** for non-severe coccidioidomycosis; **fluconazole** is standard for **coccidioidal meningitis** (usually lifelong). *NABP: 3.C.2.*"}, {"id": 44, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Uncomplicated **vulvovaginal candidiasis (VVC)** in a non-pregnant woman?", "opts": ["IV amphotericin B deoxycholate", "Oral nystatin for seven days", "A 14-day oral fluconazole (Diflucan) course", "Fluconazole (Diflucan) 150 mg ×1 or topical azole"], "ans": 3, "exp": "Uncomplicated VVC → **fluconazole (Diflucan) 150 mg PO ×1** or a **topical azole.** *NABP: 3.C.2.*"}, {"id": 45, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "**VVC in pregnancy** is best treated with:", "opts": ["A 7-day topical azole; avoid oral fluconazole (Diflucan)", "Oral itraconazole 200 mg daily course", "No treatment until after delivery", "A single oral fluconazole (Diflucan) 150 mg dose"], "ans": 0, "exp": "In pregnancy use a **7-day topical azole**; ⚠ **avoid oral fluconazole (Diflucan)** (teratogenic at higher/repeated doses). *NABP: 3.C.2 / 2.A.4.*"}, {"id": 46, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Recurrent VVC** (≥3–4 episodes/year) is managed with:", "opts": ["A single 150 mg fluconazole (Diflucan) dose only", "Induction, then weekly fluconazole (Diflucan) for ~6 months", "IV amphotericin B for two weeks", "Daily topical nystatin for one month"], "ans": 1, "exp": "Recurrent VVC → **induction then weekly fluconazole (Diflucan) maintenance (~6 months)**; (oteseconazole is an option for recurrent VVC). *NABP: 3.C.2.*"}, {"id": 47, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An asymptomatic patient has **candiduria** with an indwelling catheter. Best step?", "opts": ["Start routine amphotericin bladder irrigation", "Always treat with a fluconazole (Diflucan) course", "Usually no antifungal — manage the catheter", "Start an echinocandin such as micafungin"], "ans": 2, "exp": "**Asymptomatic candiduria** usually needs **no antifungal** → address the catheter; **treat (fluconazole)** if symptomatic/neutropenic/peri-procedure. *NABP: 3.C.2.*"}, {"id": 48, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "After amphotericin + flucytosine **induction** for cryptococcal meningitis, the **consolidation/maintenance** agent is:", "opts": ["Voriconazole (Vfend) with trough monitoring", "Lifelong amphotericin B therapy", "An echinocandin such as micafungin", "Fluconazole (800 mg, then 200 mg)"], "ans": 3, "exp": "Consolidation/maintenance = **fluconazole (Diflucan)** (≈800 mg ×8 wk, then 200 mg ≥1 yr). ⚠ Echinocandins don't cover Cryptococcus. *NABP: 3.C.2.*"}, {"id": 49, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Antifungal **prophylaxis** in a prolonged-neutropenia AML / GVHD patient (high mold risk)?", "opts": ["Posaconazole (mold-active prophylaxis)", "Terbinafine 250 mg daily", "No antifungal prophylaxis needed", "Nystatin swish-and-swallow daily"], "ans": 0, "exp": "**Posaconazole** (mold-active) for high mold-risk (AML/MDS/GVHD); **fluconazole (Diflucan)** for lower-risk settings; micafungin is an alternative. *NABP: 3.C.2.*"}, {"id": 50, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A neutropenic patient has **persistent fever despite broad antibacterials**. Appropriate empiric antifungal?", "opts": ["A single oral fluconazole (Diflucan) 150 mg dose", "Caspofungin or liposomal amphotericin B", "Nystatin swish-and-swallow suspension", "Oral terbinafine 250 mg daily"], "ans": 1, "exp": "Empiric antifungal for persistent febrile neutropenia → **echinocandin (caspofungin)** or **liposomal amphotericin** (voriconazole is an alternative). *NABP: 3.C.2.*"}, {"id": 51, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "Besides antifungal therapy, essential adjuncts in **candidemia** include:", "opts": ["Indefinite suppressive fluconazole (Diflucan) for all patients", "No additional measures beyond the antifungal", "Remove lines, dilated eye exam, repeat cultures", "Continuous amphotericin bladder irrigation"], "ans": 2, "exp": "Candidemia care = **source control (line removal)** + **dilated eye exam** + **follow-up cultures**; treat ≥14 days from first negative culture. *NABP: 3.C.2 / 5.C.*"}, {"id": 52, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which infection is correctly paired with first-line therapy?", "opts": ["Esophageal candidiasis → topical nystatin", "Cryptococcal meningitis → an echinocandin", "Invasive aspergillosis → fluconazole (Diflucan)", "Mucormycosis → liposomal amphotericin B + surgery"], "ans": 3, "exp": "**Mucormycosis → lipid amphotericin + surgery.** (Aspergillosis → voriconazole (Vfend); esophageal candidiasis → systemic fluconazole (Diflucan); crypto → ampho + flucytosine.) *NABP: 3.C.2.*"}, {"id": 55, "group": "Superficial / Dermatophyte", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **terbinafine**?", "opts": ["Inhibits squalene epoxidase → ↓ ergosterol, squalene buildup", "Inhibits β-1,3-glucan synthase → cell-wall disruption", "Binds membrane ergosterol → forms aqueous pores", "Inhibits CYP51 → blocks ergosterol demethylation"], "ans": 0, "exp": "Terbinafine (allylamine) inhibits **squalene epoxidase** → blocks ergosterol synthesis + **squalene buildup** → fungicidal vs **dermatophytes.** *NABP: 1.A.1.*"}, {"id": 56, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "First-line therapy for **onychomycosis** (toenail), and typical duration?", "opts": ["Topical nystatin cream for two weeks", "Oral terbinafine 250 mg daily ~12 weeks", "Oral fluconazole (Diflucan) 150 mg for three days", "Oral griseofulvin daily for one week"], "ans": 1, "exp": "**Oral terbinafine** is most effective for onychomycosis: **fingernails ~6 wk, toenails ~12 wk.** (Itraconazole pulse is an alternative.) *NABP: 3.C.2 / 1.C.4.*"}, {"id": 57, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Key monitoring/AEs for oral **terbinafine**?", "opts": ["Optic neuritis; obtain baseline visual fields", "Nephrotoxicity; monitor serum creatinine", "Hepatotoxicity and taste loss; CYP2D6 inhibitor", "QT prolongation; monitor ECG and electrolytes"], "ans": 2, "exp": "Terbinafine → **hepatotoxicity (check LFTs)**, **taste/smell disturbance** (can be prolonged), and **CYP2D6 inhibition** (↑ TCAs, some β-blockers). *NABP: 3.C.5 / 3.C.3.*"}, {"id": 58, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "**Griseofulvin** is classically used for and taken how?", "opts": ["Invasive aspergillosis; taken with antacids", "Oropharyngeal thrush; applied topically", "Systemic candidiasis; taken on empty stomach", "Dermatophytes (tinea capitis); taken with fatty meal"], "ans": 3, "exp": "Griseofulvin = **dermatophytes** (tinea capitis); **deposits in keratin**; **take with high-fat food** for absorption. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 59, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 2.A.4", "stem": "Important griseofulvin interactions/cautions?", "opts": ["CYP inducer → ↓ warfarin (Coumadin)/OC; disulfiram-like; pregnancy CI", "Chelates dietary iron, reducing tetracycline absorption", "Causes dose-dependent nephrotoxicity and K⁺ wasting", "Potent CYP3A4 inhibitor → ↑ statin/tacrolimus (Prograf) levels"], "ans": 0, "exp": "Griseofulvin **induces CYP** → ↓ OC/warfarin (Coumadin) effect; ⚠ **disulfiram-like** with alcohol; **contraindicated in pregnancy** and hepatic porphyria. *NABP: 3.C.3 / 2.A.4.*"}, {"id": 60, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why does **tinea capitis** require oral (systemic) therapy?", "opts": ["It doesn't — a topical azole is sufficient", "Topicals miss the hair follicle → need oral therapy", "It is caused by Candida, requiring fluconazole (Diflucan)", "It is an invasive infection needing IV amphotericin"], "ans": 1, "exp": "**Tinea capitis** involves the hair shaft/follicle → **systemic** terbinafine or griseofulvin (topicals are inadequate; adjunctive antifungal shampoo ↓ spread). *NABP: 3.C.2.*"}, {"id": 61, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line for uncomplicated **tinea corporis/cruris/pedis**?", "opts": ["Oral fluconazole (Diflucan) weekly for six months", "Oral griseofulvin with a fatty meal", "Topical terbinafine, clotrimazole, or tolnaftate", "IV amphotericin B deoxycholate"], "ans": 2, "exp": "Body/groin/foot tinea → **topical antifungals** first-line; reserve oral therapy for extensive/refractory disease. *NABP: 3.C.2.*"}, {"id": 62, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "**Nystatin** is best described as:", "opts": ["An IV echinocandin for invasive Candida", "First-line oral therapy for dermatophyte tinea", "A systemically absorbed azole for candidemia", "A non-absorbed polyene for thrush/skin candida"], "ans": 3, "exp": "Nystatin = **polyene, not absorbed** → **oral thrush (swish & swallow)** and cutaneous candidiasis only. *NABP: 1.A.2 / 3.C.2.*"}, {"id": 63, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Tinea (pityriasis) versicolor** (Malassezia) is treated with:", "opts": ["Topical selenium sulfide, ketoconazole, or azole", "Oral griseofulvin with a fatty meal", "Topical nystatin cream twice daily", "Oral terbinafine 250 mg daily"], "ans": 0, "exp": "Tinea versicolor → **topical selenium sulfide/ketoconazole/azole**; ⚠ **oral terbinafine does NOT work** for versicolor (it works for dermatophytes). *NABP: 3.C.2.*"}, {"id": 64, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "OTC options + counseling for **tinea pedis (athlete's foot)**?", "opts": ["Oral itraconazole pulse dosing only", "Topical terbinafine/clotrimazole; keep feet dry", "Topical nystatin cream twice daily", "Selenium sulfide lotion applied weekly"], "ans": 1, "exp": "Tinea pedis → **OTC topical antifungals** + **moisture-control hygiene**; finish the course to prevent relapse. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 65, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient wants to avoid oral therapy for mild **onychomycosis**. A topical option is:", "opts": ["Selenium sulfide shampoo applied to the nail", "Nystatin cream applied to the nail bed", "Efinaconazole, ciclopirox, or tavaborole (nail)", "Clotrimazole troche dissolved near the toe"], "ans": 2, "exp": "Topical nail agents **(efinaconazole/ciclopirox/tavaborole)** suit mild disease or when oral therapy is contraindicated — lower cure rates, prolonged use. *NABP: 3.C.2.*"}, {"id": 66, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An alternative oral agent for onychomycosis when terbinafine isn't suitable?", "opts": ["A single fluconazole (Diflucan) 150 mg dose", "Topical nystatin to the nail", "Griseofulvin daily for one week", "Itraconazole (continuous or pulse)"], "ans": 3, "exp": "**Itraconazole (pulse or continuous)** is the main oral alternative for onychomycosis (mind its DDIs/HF warning). *NABP: 3.C.2.*"}, {"id": 67, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for a patient starting oral **terbinafine** for a toenail?", "opts": ["Nail clears slowly; report jaundice; taste may change", "Take each dose with an antacid for tolerability", "Strictly avoid all sunlight during the course", "Expect the nail to clear within a few days"], "ans": 0, "exp": "Counsel that **visible nail improvement lags** (grows out over months), watch for **hepatic warning signs**, and possible **taste disturbance.** *NABP: 3.E.2.*"}, {"id": 68, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Counseling for **griseofulvin**?", "opts": ["Take on an empty stomach; alcohol is permitted", "Fatty meal; backup contraception; no alcohol; sun care", "Refrigerate the suspension; protect from light", "No clinically significant interactions or precautions"], "ans": 1, "exp": "Griseofulvin: **fatty meal**, **backup contraception**, **no alcohol**, sun precautions. *NABP: 3.E.2 / 3.C.3.*"}, {"id": 69, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Topical/shampoo **ketoconazole** is appropriately used for:", "opts": ["Invasive pulmonary aspergillosis", "Systemic candidemia with line removal", "Seborrheic dermatitis and tinea versicolor", "Curative therapy for toenail onychomycosis"], "ans": 2, "exp": "**Topical ketoconazole** (cream/shampoo) → **seborrheic dermatitis, tinea versicolor**; systemic ketoconazole is avoided (hepatotox/adrenal). *NABP: 3.C.2.*"}, {"id": 70, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which infection correctly requires **systemic** (oral) antifungal therapy rather than topical?", "opts": ["Tinea pedis (athlete's foot)", "Uncomplicated tinea cruris", "Localized tinea corporis", "Tinea capitis and onychomycosis"], "ans": 3, "exp": "**Tinea capitis and onychomycosis need oral therapy**; corporis/cruris/pedis are usually **topical.** *NABP: 3.C.2.*"}, {"id": 73, "group": "Monitoring, Pregnancy, Interactions & Resistance", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "A pregnant patient needs therapy for a **serious systemic fungal infection.** Preferred agent class?", "opts": ["Amphotericin B (azoles/griseofulvin avoided)", "Posaconazole with trough monitoring", "Griseofulvin taken with a fatty meal", "Voriconazole (Vfend) with trough monitoring"], "ans": 0, "exp": "**Amphotericin B** is preferred for serious systemic fungal infection in pregnancy; ⚠ **azoles** (esp. high-dose fluconazole (Diflucan), voriconazole (Vfend), posaconazole) are **teratogenic/avoided**, and **griseofulvin/flucytosine** are contraindicated. *NABP: 2.A.4 / 3.C.2.*"}, {"id": 74, "group": "Monitoring, Pregnancy, Interactions & Resistance", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "Which drug → monitoring pairing is correct?", "opts": ["Amphotericin B → CBC and platelet counts only", "Amphotericin → renal/K/Mg; voriconazole (Vfend) → trough/vision", "Fluconazole (Diflucan) → mandatory routine trough monitoring", "Echinocandins → renal-clearance drug-level monitoring"], "ans": 1, "exp": "**Ampho → renal + K/Mg; flucytosine → CBC + levels; azoles/terbinafine → LFTs; voriconazole (Vfend) → trough + vision.** *NABP: 3.D.2 / 3.C.5.*"}, {"id": 75, "group": "Monitoring, Pregnancy, Interactions & Resistance", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2 / 3.C.5", "stem": "Long-term **voriconazole (Vfend)** counseling should emphasize:", "opts": ["Avoid all dairy products while on therapy", "Take each dose with grapefruit juice", "Photoprotection (skin-cancer risk); night-driving care",  <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
