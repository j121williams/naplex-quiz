<script>
const ALL=[{"id": 1, "group": "Azoles", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA shared by the **azole** antifungals?", "opts": ["Inhibit fungal CYP51 (14-α-demethylase) → ↓ ergosterol synthesis", "Inhibit β-1,3-glucan synthase", "Inhibit squalene epoxidase", "Bind ergosterol and form membrane pores"], "ans": 0, "exp": "Azoles inhibit **14-α-demethylase (CYP51)** → block **ergosterol** synthesis. ⚠ This same CYP affinity drives their **human CYP inhibition / DDIs.** *NABP: 1.A.1.*"}, {"id": 2, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which is TRUE of **fluconazole (Diflucan)'s** spectrum?", "opts": ["Excellent mold/Aspergillus activity", "Good Candida (not", "krusei; reduced", "glabrata) and cryptococcal activity, with excellent CNS/urinary penetration — but NO mold/Aspergillus coverage"], "ans": 1, "exp": "Fluconazole (Diflucan): **Candida (krusei intrinsically resistant; glabrata dose-dependent), Cryptococcus**, great **CSF/urine** penetration; ⚠ **no Aspergillus/mold** activity. *NABP: 3.C.2.*"}, {"id": 3, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line azole for **invasive aspergillosis**?", "opts": ["Fluconazole (Diflucan)", "Voriconazole (Vfend)", "Ketoconazole", "Nystatin"], "ans": 1, "exp": "**Voriconazole (Vfend)** is first-line for invasive aspergillosis (isavuconazole is an alternative). ⚠ Voriconazole does **not** cover mucormycosis. *NABP: 3.C.2.*"}, {"id": 4, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "A patient on **voriconazole (Vfend)** reports bright-light flashes and altered color vision. This is:", "opts": ["Cataract", "A medication error", "A characteristic visual disturbance (photopsia) of voriconazole (Vfend) — usually transient", "Optic-nerve infarction"], "ans": 2, "exp": "**Voriconazole (Vfend) → transient visual disturbances/photopsia** (very characteristic); also **phototoxicity/↑skin-cancer risk, periostitis (fluoride), hallucinations, hepatotoxicity.** *NABP: 3.C.5.*"}, {"id": 5, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which azole carries a boxed warning for **heart failure** (negative inotrope) and should be avoided in HF?", "opts": ["Voriconazole (Vfend)", "Isavuconazole (Cresemba)", "Fluconazole (Diflucan)", "Itraconazole"], "ans": 3, "exp": "⚠ **Itraconazole** has a **BBW for negative inotropy/HF** → avoid in ventricular dysfunction. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 6, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Correct administration of **itraconazole capsules**?", "opts": ["Take WITH food/an acidic beverage (needs gastric acid); avoid with PPIs/H2RAs/antacids", "Crush and give via NG tube", "Take only at bedtime fasting", "Take on an empty stomach with water"], "ans": 0, "exp": "**Itraconazole capsules need acid** → take **with food/cola**; ⚠ acid suppressants ↓ absorption. (The **oral solution** is taken on an **empty stomach** and has better, more reliable absorption.) *NABP: 3.E.2 / 3.C.3.*"}, {"id": 7, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Primary roles of **posaconazole**?", "opts": ["Onychomycosis only", "Antifungal prophylaxis in neutropenia/GVHD and salvage therapy for mucormycosis", "First-line cryptococcal meningitis", "Topical thrush"], "ans": 1, "exp": "**Posaconazole** = prophylaxis (prolonged neutropenia/GVHD) + mold coverage incl. **mucormycosis** (salvage). ✓ The **delayed-release tablet/IV** are preferred over the suspension (better absorption). *NABP: 3.C.2.*"}, {"id": 8, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.5 / 2.A.4", "stem": "Which azole is unique in that it **shortens** the QT interval?", "opts": ["Fluconazole (Diflucan)", "Voriconazole (Vfend)", "Isavuconazole (Cresemba)", "Itraconazole"], "ans": 2, "exp": "ℹ **Isavuconazole (Cresemba) SHORTENS QT** (others prolong) → contraindicated in **familial short-QT syndrome**; covers Aspergillus + mucormycosis with fewer DDIs/visual effects than voriconazole (Vfend). *NABP: 3.C.5 / 2.A.4.*"}, {"id": 9, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 2.A.4", "stem": "Why is systemic **ketoconazole** now rarely used?", "opts": ["It has no CYP interactions", "It is only IV", "It is too narrow", "Hepatotoxicity (BBW), adrenal suppression, antiandrogen effects (gynecomastia), and QT prolongation"], "ans": 3, "exp": "Oral **ketoconazole** = **hepatotoxicity (BBW), adrenal suppression, antiandrogenic effects, QT** → largely replaced; mostly **topical/shampoo** now. *NABP: 3.C.5 / 2.A.4.*"}, {"id": 10, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on **simvastatin (Zocor)** is started on an azole. Main concern?", "opts": ["Strong **CYP3A4 inhibition** by the azole → ↑ simvastatin (Zocor) → rhabdomyolysis (avoid; hold/switch the statin)", "Chelation", "↓ INR", "↓ statin levels"], "ans": 0, "exp": "Azoles (esp. the **-conazoles**) are **strong CYP3A4 inhibitors** → ↑ simvastatin (Zocor)/lovastatin → **rhabdo**; also ↑ tacrolimus (Prograf)/cyclosporine (Neoral), ↑ warfarin (INR), and many others. *NABP: 3.C.3.*"}, {"id": 11, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "**Voriconazole (Vfend)** dosing is complicated by:", "opts": ["Renal clearance only", "CYP2C19 polymorphism (poor vs ultrarapid metabolizers) → therapeutic drug monitoring of trough levels", "No metabolism", "Chelation by cations"], "ans": 1, "exp": "Voriconazole (Vfend) is metabolized by **CYP2C19** (genotype affects levels) → **TDM (trough)** to balance efficacy vs toxicity. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 12, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Therapeutic drug monitoring (trough levels) is routinely recommended for which azoles?", "opts": ["Only topical azoles", "Fluconazole (Diflucan) and isavuconazole (Cresemba)", "Voriconazole (Vfend), itraconazole, and posaconazole", "None"], "ans": 2, "exp": "**Voriconazole (Vfend), itraconazole, posaconazole** have variable absorption/levels → **TDM.** (Fluconazole has predictable PK; isavuconazole (Cresemba) usually doesn't need routine TDM.) *NABP: 3.D.2.*"}, {"id": 13, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "Regarding **fluconazole (Diflucan) in pregnancy**?", "opts": ["Only IV is safe", "Equivalent to amphotericin", "Always safe at any dose", "High-dose/chronic fluconazole (Diflucan) is teratogenic — avoid in the first trimester (a single 150 mg dose for VVC is debated; topical azoles preferred)"], "ans": 3, "exp": "⚠ **High-dose fluconazole (Diflucan) is teratogenic** → avoid chronic/high-dose in the 1st trimester; for VVC in pregnancy use **topical azoles.** *NABP: 2.A.4 / 3.C.2.*"}, {"id": 14, "group": "Azoles", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Shared monitoring for systemic **azoles**?", "opts": ["Liver function tests (hepatotoxicity); also QTc with QT-prolonging azoles", "CPK only", "Coagulation only", "Audiometry"], "ans": 0, "exp": "Azoles → **hepatotoxicity** → monitor **LFTs**; watch **QTc** (all prolong except isavuconazole (Cresemba)). *NABP: 3.C.5 / 3.D.2.*"}, {"id": 15, "group": "Azoles", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.D.2", "stem": "Which azole requires **renal** dose adjustment (vs hepatic clearance for the others)?", "opts": ["Voriconazole (Vfend)", "Fluconazole (renally eliminated)", "Itraconazole", "Posaconazole"], "ans": 1, "exp": "**Fluconazole (Diflucan) is renally cleared** → adjust for CrCl; voriconazole (Vfend)/itraconazole/posaconazole are **hepatically** metabolized. *NABP: 1.A.2 / 3.D.2.*"}, {"id": 16, "group": "Azoles", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A neutropenic patient with proven **mucormycosis** — which azole has activity?", "opts": ["Fluconazole (Diflucan)", "Voriconazole (Vfend)", "Posaconazole or isavuconazole (voriconazole and fluconazole (Diflucan) have NO mucor activity)", "Ketoconazole"], "ans": 2, "exp": "**Posaconazole/isavuconazole (Cresemba)** cover **Mucorales**; ⚠ **voriconazole (Vfend) and fluconazole (Diflucan) do NOT** (amphotericin B + surgery is first-line). *NABP: 3.C.2.*"}, {"id": 19, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of the **echinocandins** (caspofungin, micafungin, anidulafungin)?", "opts": ["Inhibit β-1,3-glucan synthase → disrupt the fungal cell wall", "Inhibit CYP51/ergosterol synthesis", "Convert to 5-FU", "Bind ergosterol → membrane pores"], "ans": 0, "exp": "Echinocandins inhibit **β-1,3-glucan synthase** (cell-wall target unique to fungi) → fungicidal vs Candida. *NABP: 1.A.1.*"}, {"id": 20, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line therapy for **candidemia / invasive candidiasis** in most adults?", "opts": ["Fluconazole (Diflucan)", "An echinocandin (caspofungin/micafungin/anidulafungin)", "Amphotericin B deoxycholate", "Nystatin"], "ans": 1, "exp": "An **echinocandin is first-line** for candidemia (covers azole-resistant Candida incl. glabrata/krusei); **de-escalate to fluconazole (Diflucan)** if the isolate is susceptible and the patient is stable. *NABP: 3.C.2.*"}, {"id": 21, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which is a key **spectrum/penetration gap** of echinocandins?", "opts": ["They are oral only", "They cover everything", "No useful activity against Cryptococcus or molds like Mucorales, and poor CNS/urine penetration (not for fungal meningitis or candiduria/UTI)", "They cover only gram-positives"], "ans": 2, "exp": "⚠ Echinocandins **miss Cryptococcus and Mucorales** and **penetrate CNS/urine poorly** → don't use for CNS or urinary fungal infection (also higher MICs vs C. parapsilosis). *NABP: 3.C.2.*"}, {"id": 22, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.3", "stem": "Why are echinocandins considered \"clean\" drugs for interactions?", "opts": ["They chelate cations", "They require TDM", "They are CYP3A4 inhibitors", "They are NOT significant CYP substrates/inhibitors → minimal drug interactions; given IV only; generally well tolerated"], "ans": 3, "exp": "Echinocandins have **minimal CYP-mediated DDIs** (a big advantage over azoles); **IV only**; AEs are mild (infusion/histamine, ↑LFTs). *NABP: 3.C.3.*"}, {"id": 23, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **amphotericin B**?", "opts": ["Binds ergosterol in the fungal membrane → forms pores → leakage/cell death", "Inhibits CYP51", "Inhibits squalene epoxidase", "Inhibits glucan synthase"], "ans": 0, "exp": "Amphotericin **binds ergosterol → membrane pores** (fungicidal); binding to human cholesterol underlies its toxicity. *NABP: 1.A.1.*"}, {"id": 24, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Amphotericin B is valued because it has:", "opts": ["The narrowest spectrum", "The broadest antifungal spectrum (molds, Mucorales, severe/systemic disease, cryptococcal induction, endemic mycoses)", "Oral-only dosing", "No toxicity"], "ans": 1, "exp": "Amphotericin = **broadest spectrum** → severe/disseminated disease, **Mucorales**, cryptococcal induction, endemic mycoses. *NABP: 3.C.2.*"}, {"id": 25, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "The dose-limiting toxicity of **amphotericin B** and how to mitigate it?", "opts": ["Ototoxicity", "Hepatotoxicity; give NAC", "Nephrotoxicity (afferent vasoconstriction/ATN) → saline hydration (\"sodium loading\"), use a lipid formulation, monitor SCr", "QT prolongation"], "ans": 2, "exp": "⚠ **Nephrotoxicity** is dose-limiting → **IV saline pre/post-hydration**, **lipid formulations** (less nephrotoxic), and **monitor SCr**. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 26, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Besides renal injury, amphotericin commonly causes:", "opts": ["Hyperglycemia", "Neutrophilia", "Hyperkalemia/hypermagnesemia", "Electrolyte wasting — hypokalemia and hypomagnesemia (replete and monitor K/Mg)"], "ans": 3, "exp": "Amphotericin → renal **K⁺ and Mg²⁺ wasting** → **monitor and replace** K/Mg (also anemia from ↓erythropoietin). *NABP: 3.C.5.*"}, {"id": 27, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.5 / 3.E.2", "stem": "A patient gets fever, chills, and rigors during an amphotericin infusion. Best approach?", "opts": ["Infusion-related reaction → premedicate (acetaminophen/diphenhydramine ± meperidine for rigors), slow the infusion", "Give epinephrine", "Switch to oral amphotericin", "Stop amphotericin permanently — it's an allergy"], "ans": 0, "exp": "**Infusion reactions** (fever/chills/rigors) are common → **premedicate** and slow the rate; not a true allergy. *NABP: 3.C.5 / 3.E.2.*"}, {"id": 28, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "The main advantage of **liposomal/lipid-complex amphotericin** over the conventional deoxycholate form?", "opts": ["Oral availability", "Significantly less nephrotoxicity (preferred for renal risk or high-dose/prolonged therapy)", "Broader spectrum", "No infusion reactions ever"], "ans": 1, "exp": "**Lipid formulations = less nephrotoxic** → preferred in renal impairment or when higher/prolonged dosing is needed (e.g., mucormycosis). *NABP: 3.C.5 / 3.D.2.*"}, {"id": 29, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **flucytosine (5-FC)**?", "opts": ["Inhibits CYP51", "Binds ergosterol", "Converted inside fungal cells to 5-fluorouracil → inhibits fungal DNA/RNA synthesis", "Inhibits glucan synthase"], "ans": 2, "exp": "Flucytosine → **5-FU** intracellularly → disrupts fungal nucleic-acid synthesis. ⚠ **Never use as monotherapy** (rapid resistance). *NABP: 1.A.1.*"}, {"id": 30, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "The classic role of **flucytosine** is:", "opts": ["Topical thrush", "Aspergillosis monotherapy", "Onychomycosis", "Combined with amphotericin B for the INDUCTION phase of cryptococcal meningitis (synergy)"], "ans": 3, "exp": "**Flucytosine + amphotericin B** = cryptococcal meningitis **induction** (synergistic), then fluconazole (Diflucan) consolidation/maintenance. *NABP: 3.C.2.*"}, {"id": 31, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Key toxicity/monitoring for **flucytosine**?", "opts": ["Dose/level-related bone-marrow suppression (and hepatotoxicity) — monitor CBC and serum levels; renally dose-adjust", "Tendon rupture", "Optic neuritis", "QT prolongation"], "ans": 0, "exp": "⚠ Flucytosine → **myelosuppression** (worse with renal impairment/high levels) → **monitor CBC + drug levels**, adjust for renal function. *NABP: 3.C.5 / 3.D.2.*"}, {"id": 32, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Standard regimen for **cryptococcal meningitis**?", "opts": ["Fluconazole (Diflucan) monotherapy lifelong", "Induction with amphotericin B (liposomal) + flucytosine → consolidation/maintenance with fluconazole (Diflucan)", "An echinocandin", "Voriconazole (Vfend)"], "ans": 1, "exp": "**Induction = liposomal amphotericin + flucytosine**, then **fluconazole (Diflucan)** consolidation (800 mg) and maintenance (200 mg). ⚠ Echinocandins don't cover Cryptococcus. *NABP: 3.C.2.*"}, {"id": 33, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Why is an **echinocandin a poor choice for Candida meningitis or a Candida UTI**?", "opts": ["It causes nephrotoxicity", "It's too broad", "Poor CNS and urinary penetration → use fluconazole (Diflucan) or amphotericin for those sites", "It's oral only"], "ans": 2, "exp": "Echinocandins **don't penetrate CSF/urine well** → CNS/urinary candidiasis needs **fluconazole (Diflucan) or amphotericin.** *NABP: 1.A.2 / 3.C.2.*"}, {"id": 34, "group": "Echinocandins · Polyenes · Flucytosine", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "After candidemia improves on an echinocandin and the isolate is **fluconazole (Diflucan)-susceptible**, the stewardship step is:", "opts": ["Add amphotericin", "Stop all therapy at 48 h", "Continue the echinocandin indefinitely", "Step down (de-escalate) to oral fluconazole (Diflucan) once stable"], "ans": 3, "exp": "**De-escalate to fluconazole (Diflucan)** (oral, high bioavailability) once the patient is stable and the isolate is susceptible — complete ≥14 days from first negative culture. *NABP: 3.C.2 / 5.C.*"}, {"id": 37, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Mild **oropharyngeal candidiasis (thrush)** is best treated with:", "opts": ["Clotrimazole troches or nystatin suspension (topical); oral fluconazole (Diflucan) for moderate–severe disease", "An echinocandin", "Voriconazole (Vfend)", "IV amphotericin"], "ans": 0, "exp": "Mild thrush → **topical clotrimazole troche/nystatin swish-and-swallow**; **fluconazole (Diflucan)** for moderate–severe or unresponsive. *NABP: 3.C.2.*"}, {"id": 38, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Esophageal candidiasis** requires:", "opts": ["Topical nystatin only", "SYSTEMIC therapy — oral/IV fluconazole (topical agents are inadequate)", "No treatment", "Clotrimazole troches"], "ans": 1, "exp": "Esophageal candidiasis needs **systemic fluconazole (Diflucan)** (topical/troches don't reach the esophagus); echinocandin/amphotericin if refractory. ✓ Often an AIDS-defining/immunosuppression marker. *NABP: 3.C.2.*"}, {"id": 39, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "First-line for **invasive pulmonary aspergillosis**?", "opts": ["Nystatin", "Fluconazole (Diflucan)", "Voriconazole (or isavuconazole (Cresemba))", "An echinocandin alone"], "ans": 2, "exp": "**Voriconazole (Vfend)** (or **isavuconazole (Cresemba)**) is first-line; echinocandins are salvage/combination only. ✓ **Serum/BAL galactomannan** aids diagnosis. *NABP: 3.C.2.*"}, {"id": 40, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Cornerstones of **mucormycosis** management?", "opts": ["Voriconazole (Vfend)", "An echinocandin", "Fluconazole (Diflucan) alone", "Liposomal amphotericin B + urgent surgical debridement + reversing risk factors (control DKA, reduce immunosuppression); isavuconazole (Cresemba)/posaconazole for step-down/salvage"], "ans": 3, "exp": "Mucormycosis → **lipid amphotericin + aggressive surgery + reverse DKA/immunosuppression**; **isavuconazole (Cresemba)/posaconazole** for step-down. ⚠ Voriconazole (Vfend)/fluconazole (Diflucan)/echinocandins do **not** cover Mucorales. *NABP: 3.C.2.*"}, {"id": 41, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Treatment of mild–moderate **histoplasmosis**?", "opts": ["Itraconazole (amphotericin B for severe/disseminated disease, then step down to itraconazole)", "Fluconazole (Diflucan)", "An echinocandin", "Terbinafine"], "ans": 0, "exp": "**Itraconazole** for mild–moderate histoplasmosis/blastomycosis; **(liposomal) amphotericin** for severe → step down to itraconazole. *NABP: 3.C.2.*"}, {"id": 42, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A \"rose gardener\" develops nodular lymphocutaneous **sporotrichosis**. Treatment?", "opts": ["An echinocandin", "Itraconazole (amphotericin for severe/disseminated)", "Fluconazole (Diflucan)", "Penicillin"], "ans": 1, "exp": "**Itraconazole** is first-line for cutaneous/lymphocutaneous **sporotrichosis**; amphotericin for severe/disseminated. *NABP: 3.C.2.*"}, {"id": 43, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Preferred azole for **coccidioidomycosis** (non-severe) and its meningitis?", "opts": ["Posaconazole", "Ketoconazole", "Fluconazole (or itraconazole); fluconazole (Diflucan) for coccidioidal meningitis (often lifelong)", "Voriconazole (Vfend)"], "ans": 2, "exp": "**Fluconazole (Diflucan)/itraconazole** for non-severe coccidioidomycosis; **fluconazole** is standard for **coccidioidal meningitis** (usually lifelong). *NABP: 3.C.2.*"}, {"id": 44, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Uncomplicated **vulvovaginal candidiasis (VVC)** in a non-pregnant woman?", "opts": ["IV amphotericin", "Oral nystatin", "A 14-day fluconazole (Diflucan) course", "Oral fluconazole (Diflucan) 150 mg ×1 OR a short-course topical azole (clotrimazole/miconazole)"], "ans": 3, "exp": "Uncomplicated VVC → **fluconazole (Diflucan) 150 mg PO ×1** or a **topical azole.** *NABP: 3.C.2.*"}, {"id": 45, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "**VVC in pregnancy** is best treated with:", "opts": ["A topical azole (e.g., clotrimazole) for ~7 days — avoid oral fluconazole (Diflucan)", "Oral itraconazole", "No treatment", "Oral fluconazole (Diflucan) 150 mg ×1"], "ans": 0, "exp": "In pregnancy use a **7-day topical azole**; ⚠ **avoid oral fluconazole (Diflucan)** (teratogenic at higher/repeated doses). *NABP: 3.C.2 / 2.A.4.*"}, {"id": 46, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Recurrent VVC** (≥3–4 episodes/year) is managed with:", "opts": ["A single 150 mg fluconazole (Diflucan) dose only", "Induction (e.g., fluconazole (Diflucan) every 72 h ×3 doses) followed by maintenance fluconazole 150 mg weekly for ~6 months", "IV amphotericin", "Topical nystatin daily"], "ans": 1, "exp": "Recurrent VVC → **induction then weekly fluconazole (Diflucan) maintenance (~6 months)**; (oteseconazole is an option for recurrent VVC). *NABP: 3.C.2.*"}, {"id": 47, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An asymptomatic patient has **candiduria** with an indwelling catheter. Best step?", "opts": ["Start amphotericin bladder irrigation routinely", "Always treat with fluconazole (Diflucan)", "Usually no antifungal — remove/replace the catheter; treat only if symptomatic, neutropenic, or before a urologic procedure (then fluconazole (Diflucan))", "Start an echinocandin"], "ans": 2, "exp": "**Asymptomatic candiduria** usually needs **no antifungal** → address the catheter; **treat (fluconazole)** if symptomatic/neutropenic/peri-procedure. *NABP: 3.C.2.*"}, {"id": 48, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "After amphotericin + flucytosine **induction** for cryptococcal meningitis, the **consolidation/maintenance** agent is:", "opts": ["Voriconazole (Vfend)", "Amphotericin lifelong", "An echinocandin", "Fluconazole (800 mg consolidation, then 200 mg maintenance)"], "ans": 3, "exp": "Consolidation/maintenance = **fluconazole (Diflucan)** (≈800 mg ×8 wk, then 200 mg ≥1 yr). ⚠ Echinocandins don't cover Cryptococcus. *NABP: 3.C.2.*"}, {"id": 49, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Antifungal **prophylaxis** in a prolonged-neutropenia AML / GVHD patient (high mold risk)?", "opts": ["Posaconazole (mold-active); fluconazole (Diflucan) is used where mold risk is lower", "Terbinafine", "No prophylaxis", "Nystatin"], "ans": 0, "exp": "**Posaconazole** (mold-active) for high mold-risk (AML/MDS/GVHD); **fluconazole (Diflucan)** for lower-risk settings; micafungin is an alternative. *NABP: 3.C.2.*"}, {"id": 50, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A neutropenic patient has **persistent fever despite broad antibacterials**. Appropriate empiric antifungal?", "opts": ["Oral fluconazole (Diflucan) 150 mg ×1", "Caspofungin (an echinocandin) or liposomal amphotericin B", "Nystatin", "Terbinafine"], "ans": 1, "exp": "Empiric antifungal for persistent febrile neutropenia → **echinocandin (caspofungin)** or **liposomal amphotericin** (voriconazole is an alternative). *NABP: 3.C.2.*"}, {"id": 51, "group": "Disease-State Selection", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 5.C", "stem": "Besides antifungal therapy, essential adjuncts in **candidemia** include:", "opts": ["Lifelong fluconazole (Diflucan) for everyone", "Nothing else", "Remove/replace infected central venous catheters, obtain a dilated ophthalmologic exam (endophthalmitis), and repeat blood cultures until clear", "Bladder irrigation"], "ans": 2, "exp": "Candidemia care = **source control (line removal)** + **dilated eye exam** + **follow-up cultures**; treat ≥14 days from first negative culture. *NABP: 3.C.2 / 5.C.*"}, {"id": 52, "group": "Disease-State Selection", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which infection is correctly paired with first-line therapy?", "opts": ["Esophageal candidiasis → topical nystatin", "Cryptococcal meningitis → an echinocandin", "Invasive aspergillosis → fluconazole (Diflucan)", "Mucormycosis → liposomal amphotericin B + surgery"], "ans": 3, "exp": "**Mucormycosis → lipid amphotericin + surgery.** (Aspergillosis → voriconazole (Vfend); esophageal candidiasis → systemic fluconazole (Diflucan); crypto → ampho + flucytosine.) *NABP: 3.C.2.*"}, {"id": 55, "group": "Superficial / Dermatophyte", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **terbinafine**?", "opts": ["Inhibits squalene epoxidase → ↓ ergosterol + toxic squalene accumulation (fungicidal for dermatophytes)", "Inhibits β-1,3-glucan synthase", "Binds ergosterol", "Inhibits CYP51"], "ans": 0, "exp": "Terbinafine (allylamine) inhibits **squalene epoxidase** → blocks ergosterol synthesis + **squalene buildup** → fungicidal vs **dermatophytes.** *NABP: 1.A.1.*"}, {"id": 56, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "First-line therapy for **onychomycosis** (toenail), and typical duration?", "opts": ["Topical nystatin ×2 weeks", "Oral terbinafine 250 mg daily — ~6 weeks for fingernails, ~12 weeks for toenails", "Oral fluconazole (Diflucan) ×3 days", "Griseofulvin ×1 week"], "ans": 1, "exp": "**Oral terbinafine** is most effective for onychomycosis: **fingernails ~6 wk, toenails ~12 wk.** (Itraconazole pulse is an alternative.) *NABP: 3.C.2 / 1.C.4.*"}, {"id": 57, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.C.3", "stem": "Key monitoring/AEs for oral **terbinafine**?", "opts": ["Optic neuritis", "Nephrotoxicity", "Hepatotoxicity (monitor LFTs) and taste/smell disturbance; it is a CYP2D6 inhibitor", "QT prolongation"], "ans": 2, "exp": "Terbinafine → **hepatotoxicity (check LFTs)**, **taste/smell disturbance** (can be prolonged), and **CYP2D6 inhibition** (↑ TCAs, some β-blockers). *NABP: 3.C.5 / 3.C.3.*"}, {"id": 58, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "**Griseofulvin** is classically used for and taken how?", "opts": ["Aspergillosis; with antacids", "Thrush; topically", "Candidiasis; empty stomach", "Dermatophyte infections (esp. tinea capitis in children); deposits in keratin; take WITH a fatty meal (↑ absorption)"], "ans": 3, "exp": "Griseofulvin = **dermatophytes** (tinea capitis); **deposits in keratin**; **take with high-fat food** for absorption. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 59, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 2.A.4", "stem": "Important griseofulvin interactions/cautions?", "opts": ["CYP **inducer** → ↓ warfarin (Coumadin) and oral-contraceptive efficacy (backup contraception); disulfiram-like reaction with alcohol; contraindicated in pregnancy", "Chelates iron", "Causes nephrotoxicity", "It is a CYP inhibitor"], "ans": 0, "exp": "Griseofulvin **induces CYP** → ↓ OC/warfarin (Coumadin) effect; ⚠ **disulfiram-like** with alcohol; **contraindicated in pregnancy** and hepatic porphyria. *NABP: 3.C.3 / 2.A.4.*"}, {"id": 60, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why does **tinea capitis** require oral (systemic) therapy?", "opts": ["It doesn't — topical works", "Topical antifungals don't penetrate the hair follicle → need oral terbinafine or griseofulvin", "It's caused by Candida", "It needs IV amphotericin"], "ans": 1, "exp": "**Tinea capitis** involves the hair shaft/follicle → **systemic** terbinafine or griseofulvin (topicals are inadequate; adjunctive antifungal shampoo ↓ spread). *NABP: 3.C.2.*"}, {"id": 61, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line for uncomplicated **tinea corporis/cruris/pedis**?", "opts": ["Oral fluconazole (Diflucan) ×6 months", "Oral griseofulvin", "Topical antifungal (terbinafine, an azole like clotrimazole, or tolnaftate)", "IV amphotericin"], "ans": 2, "exp": "Body/groin/foot tinea → **topical antifungals** first-line; reserve oral therapy for extensive/refractory disease. *NABP: 3.C.2.*"}, {"id": 62, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "**Nystatin** is best described as:", "opts": ["An echinocandin", "First-line for tinea", "A systemically absorbed azole", "A polyene that is NOT systemically absorbed — used topically and as a \"swish-and-swallow\" for oral/cutaneous candidiasis"], "ans": 3, "exp": "Nystatin = **polyene, not absorbed** → **oral thrush (swish & swallow)** and cutaneous candidiasis only. *NABP: 1.A.2 / 3.C.2.*"}, {"id": 63, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "**Tinea (pityriasis) versicolor** (Malassezia) is treated with:", "opts": ["Topical selenium sulfide, ketoconazole shampoo, or a topical azole (oral fluconazole (Diflucan)/itraconazole for extensive disease)", "Griseofulvin", "Nystatin", "Oral terbinafine"], "ans": 0, "exp": "Tinea versicolor → **topical selenium sulfide/ketoconazole/azole**; ⚠ **oral terbinafine does NOT work** for versicolor (it works for dermatophytes). *NABP: 3.C.2.*"}, {"id": 64, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "OTC options + counseling for **tinea pedis (athlete's foot)**?", "opts": ["Oral itraconazole only", "Topical terbinafine, clotrimazole, miconazole, or tolnaftate; keep feet clean/dry, complete the full course (high recurrence)", "Nystatin", "Selenium sulfide"], "ans": 1, "exp": "Tinea pedis → **OTC topical antifungals** + **moisture-control hygiene**; finish the course to prevent relapse. *NABP: 3.C.2 / 3.E.2.*"}, {"id": 65, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A patient wants to avoid oral therapy for mild **onychomycosis**. A topical option is:", "opts": ["Selenium sulfide", "Nystatin", "Efinaconazole, ciclopirox, or tavaborole (topical nail agents) — less effective than oral, long courses", "Clotrimazole troche"], "ans": 2, "exp": "Topical nail agents **(efinaconazole/ciclopirox/tavaborole)** suit mild disease or when oral therapy is contraindicated — lower cure rates, prolonged use. *NABP: 3.C.2.*"}, {"id": 66, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An alternative oral agent for onychomycosis when terbinafine isn't suitable?", "opts": ["Fluconazole (Diflucan) 150 mg ×1", "Nystatin", "Griseofulvin daily indefinitely", "Itraconazole (continuous or pulse dosing)"], "ans": 3, "exp": "**Itraconazole (pulse or continuous)** is the main oral alternative for onychomycosis (mind its DDIs/HF warning). *NABP: 3.C.2.*"}, {"id": 67, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Counseling for a patient starting oral **terbinafine** for a toenail?", "opts": ["The nail clears slowly as it grows out (months after therapy ends); report dark urine/jaundice; taste changes may occur", "Take with antacids", "Avoid all sunlight", "Expect immediate clearing"], "ans": 0, "exp": "Counsel that **visible nail improvement lags** (grows out over months), watch for **hepatic warning signs**, and possible **taste disturbance.** *NABP: 3.E.2.*"}, {"id": 68, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2 / 3.C.3", "stem": "Counseling for **griseofulvin**?", "opts": ["Take on an empty stomach; alcohol is fine", "Take with a fatty meal; use backup contraception (↓ OC efficacy); avoid alcohol (disulfiram-like); photosensitivity", "Refrigerate", "No interactions"], "ans": 1, "exp": "Griseofulvin: **fatty meal**, **backup contraception**, **no alcohol**, sun precautions. *NABP: 3.E.2 / 3.C.3.*"}, {"id": 69, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Topical/shampoo **ketoconazole** is appropriately used for:", "opts": ["Aspergillosis", "Systemic candidemia", "Seborrheic dermatitis and tinea versicolor (topical only — systemic ketoconazole is largely avoided)", "Onychomycosis cure"], "ans": 2, "exp": "**Topical ketoconazole** (cream/shampoo) → **seborrheic dermatitis, tinea versicolor**; systemic ketoconazole is avoided (hepatotox/adrenal). *NABP: 3.C.2.*"}, {"id": 70, "group": "Superficial / Dermatophyte", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Which infection correctly requires **systemic** (oral) antifungal therapy rather than topical?", "opts": ["Tinea pedis", "Uncomplicated tinea cruris", "Tinea corporis", "Tinea capitis (and onychomycosis)"], "ans": 3, "exp": "**Tinea capitis and onychomycosis need oral therapy**; corporis/cruris/pedis are usually **topical.** *NABP: 3.C.2.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();
const APPKEY="naplexQuiz:Antifungals";let MEM={attempts:[],topic:{},dom:{},missed:[]};

function getP(){return loadP()||MEM;}
function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
