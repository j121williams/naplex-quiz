es → **hydrate, slow infusion, adjust for renal function.** *NABP: 3.C.5 / 3.D.2.*"}, {"id": 4, "group": "Herpesvirus & Cmv Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A 60-y/o presents with a dermatomal vesicular rash (**herpes zoster**) starting 2 days ago. Best therapy?", "opts": ["Intravenous ganciclovir initiated for systemic coverage", "Topical acyclovir (Zovirax) applied to the affected dermatome", "No antiviral, since the rash is already established", "Oral valacyclovir, ideally begun within 72 hours"], "ans": 3, "exp": "Zoster → **valacyclovir/famciclovir/acyclovir (Zovirax)**, most beneficial **within 72 h** of rash (↓ duration/post-herpetic neuralgia). *NABP: 3.C.2.*"}, {"id": 5, "group": "Herpesvirus & Cmv Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Treatment of **HSV encephalitis**?", "opts": ["High-dose intravenous acyclovir (Zovirax)", "Standard-dose oral valganciclovir", "First-line intravenous foscarnet", "Standard-dose oral acyclovir (Zovirax)"], "ans": 0, "exp": "**HSV encephalitis → high-dose IV acyclovir (Zovirax)** (start empirically; it's a neurologic emergency). *NABP: 3.C.2.*"}, {"id": 6, "group": "Herpesvirus & Cmv Agents", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA/activation of **ganciclovir** (and valganciclovir)?", "opts": ["Inhibits the CMV terminase complex directly", "Activated by CMV UL97 kinase to inhibit DNA polymerase", "Blocks viral neuraminidase to prevent virion release", "Acts as a pyrophosphate analog without activation"], "ans": 1, "exp": "Ganciclovir is activated by **CMV UL97 phosphotransferase** → inhibits CMV DNA polymerase. **Valganciclovir** is its oral prodrug. *NABP: 1.A.1.*"}, {"id": 7, "group": "Herpesvirus & Cmv Agents", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Dose-limiting toxicity of **ganciclovir/valganciclovir**?", "opts": ["Pancreatitis with elevated serum lipase" r persists beyond five days"], "ans": 1, "exp": "Start **within ~48 h** for the duration benefit; **high-risk, hospitalized, or severe** patients are treated even if presenting later. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 21, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Which influenza antiviral should be AVOIDED in a patient with **asthma/COPD**?", "opts": ["Baloxavir", "Oseltamivir (Tamiflu)", "Zanamivir", "Peramivir"], "ans": 2, "exp": "⚠ **Inhaled zanamivir** can cause **bronchospasm** → avoid in underlying airway disease; use oseltamivir (Tamiflu)/baloxavir instead. *NABP: 2.A.4 / 3.C.5.*"}, {"id": 22, "group": "Influenza & Rsv", "domain": "D1", "tier": "T2", "aware": true, "nabp": "1.A.1 / 3.C.2", "stem": "MOA of **baloxavir marboxil (Xofluza)**?", "opts": ["M2 ion-channel blocker", "Hemagglutinin-binding entry inhibitor", "Neuraminidase inhibitor", "Cap-dependent endonuclease inhibitor"], "ans": 3, "exp": "Baloxavir = **cap-dependent endonuclease inhibitor**, given as a **single oral dose** (influenza A/B). *NABP: 1.A.1 / 3.C.2.*"}, {"id": 23, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "Counseling for **baloxavir** administration?", "opts": ["Avoid dairy, calcium, and antacids around the dose", "Refrigerate the tablet until administration", "Take only together with grapefruit juice", "Take with milk to enhance absorption"], "ans": 0, "exp": "⚠ **Polyvalent cations chelate baloxavir** → avoid dairy/calcium/antacids/Mg-Al products around dosing. *NABP: 3.C.3 / 3.E.2.*"}, {"id": 24, "group": "Influenza & Rsv", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "**Peramivir** is best described as:", "opts": ["An oral once-daily neuraminidase inhibitor", "A single-dose intravenous neuraminidase inhibitor", "An inhaled neuraminidase inhibitor", "An oral cap-dependent endonuclease inhibitor"], "ans": 1, "exp": "**Peramivir** = "opts": ["Monthly palivizumab given to all infants", "Nirsevimab, a single long-acting monoclonal antibody", "A treatment course of oral ribavirin", "A short prophylactic course of oseltamivir (Tamiflu)"], "ans": 1, "exp": "ℹ **Nirsevimab** (single long-acting mAb) protects infants through their first season; **maternal RSV vaccine** is the alternative. *NABP: 5.B / 3.C.2.*"}, {"id": 29, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "How does **palivizumab** differ from nirsevimab?", "opts": ["The two products are pharmacologically identical", "Palivizumab is an oral antiviral, not an antibody", "Palivizumab requires monthly dosing for high-risk infants", "Palivizumab is an active RSV vaccine, not an antibody"], "ans": 2, "exp": "**Palivizumab = monthly** RSV mAb for **high-risk infants**; **nirsevimab = single long-acting** dose for a broader infant population. *NABP: 3.C.2.*"}, {"id": 30, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": true, "nabp": "5.B", "stem": "The **maternal RSV vaccine (Abrysvo)** is given:", "opts": ["Monthly throughout the mother's pregnancy", "Only to adults older than 60 years", "To the infant at the time of birth", "During pregnancy at about 32–36 weeks"], "ans": 3, "exp": "**Maternal RSV vaccination at 32–36 weeks** passes protective antibody to the newborn (an alternative to infant nirsevimab). *NABP: 5.B.*"}, {"id": 31, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.5", "stem": "Hallmark toxicities/contraindication of **ribavirin**?", "opts": ["Hemolytic anemia (boxed warning) and teratogenicity", "QT prolongation and torsades de pointes risk", "Isolated myelosuppression without hemolysis", "Dose-dependent proximal renal tubular injury"], "ans": 0, "exp": "⚠ Ribavirin → **hemolytic anemia (BBW)** and is **teratogenic/embryolethal** (pregnancy CI; strict contraception for patient and partner). *NABP: 2.A.4 / 3.C.5.*"}, {"id": 32, "group": "Influenza & Rsv", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Management of most **RSV infection** is:", "opts": ["Routine oral ribavirin for all cases", "Mainly supportive care, with prevention prioritized", "Empiric oseltamivir (Tamiflu) for all symptomatic cases", "Intravenous foscarnet for severe cases"], "ans": 1, "exp": "RSV treatment is **mainly supportive**; emphasis is on **prevention** in infants/older adults. *NABP: 3.C.2.*"}, {"id": 33, "group": "Influenza & Rsv", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Besides treatment, **baloxavir** and **oseltamivir (Tamiflu)** are also used for:", "opts": ["Treatment of active RSV infection", "No indication beyond acute treatment", "Post-exposure prophylaxis after influenza exposure", "Long-term chronic viral suppression"], "ans": 2, "exp": "Both have a **post-exposure prophylaxis** role (in addition to treatment) for influenza. *NABP: 3.C.2.*"}, {"id": 34, "group": "Influenza & Rsv", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "A frail hospitalized patient presents on **day 4** of influenza symptoms. Should an antiviral be given?", "opts": ["No, treat only if the patient is currently afebrile", "No, only baloxavir would still be effective", "No, the patient is past the 48-hour window", "Yes, hospitalized high-risk patients are treated regardless"], "ans": 3, "exp": "⚠ The 48-h rule applies to **uncomplicated outpatients**; **hospitalized/severe/high-risk** patients get **oseltamivir (Tamiflu) even >48 h.** *NABP: 3.C.2 / 3.D.2.*"}, {"id": 37, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Preferred first-line oral agents for **chronic hepatitis B**?", "opts": ["Entecavir or tenofovir, with a high resistance barrier", "Pegylated interferon as the sole oral option", "A ribavirin-based oral regimen", "Lamivudine or adefovir monotherapy"], "ans": 0, "exp": "**Entecavir** and **tenofovir (TDF or TAF)** are first-line for chronic HBV (high potency, **high genetic barrier to resistance**); lamivudine/adefovir/telbivudine are not preferred (resistance). *NABP: 3.C.2.*"}, {"id": 38, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.5 / 3.D.2", "stem": "Advantage of **tenofovir alafenamide (TAF)** over tenofovir disoproxil fumarate (TDF)?", "opts": ["A substantially lower drug-acquisition cost", "Lower renal and bone toxicity than TDF", "Added direct activity against hepatitis C", "No need for any laboratory monitoring"], "ans": 1, "exp": "**TAF** → **less nephrotoxicity and bone-density loss** than TDF (lower systemic tenofovir exposure). *NABP: 3.C.5 / 3.D.2.*"}, {"id": 39, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Before starting **rituximab (Rituxan)/chemotherapy**, why screen for hepatitis B (HBsAg, anti-HBc)?", "opts": ["Hepatitis C is the only clinically relevant infection", "To choose the appropriate chemotherapy regimen", "Risk of HBV reactivation warranting antiviral prophylaxis", "Hepatitis B has no available treatment"], "ans": 2, "exp": "⚠ Immunosuppression (esp. **anti-CD20/rituximab (Rituxan)**) can trigger **HBV reactivation** → **screen and give entecavir/tenofovir prophylaxis.** *NABP: 3.C.2 / 3.D.2.*"}, {"id": 40, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **sofosbuvir**?", "opts": ["Viral neuraminidase inhibitor", "NS3/4A protease inhibitor", "NS5A replication-complex inhibitor", "NS5B polymerase nucleotide inhibitor"], "ans": 3, "exp": "**Sofosbuvir = NS5B (RNA-dependent RNA polymerase) nucleotide inhibitor.** *NABP: 1.A.1.*"}, {"id": 41, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1", "stem": "Match the HCV DAA suffix to target: which is correct?", "opts": ["\"-previr\" protease, \"-asvir\" NS5A, \"-buvir\" NS5B polymerase", "\"-previr\" polymerase, \"-asvir\" NS5A, \"-buvir\" protease", "\"-previr\" NS5A, \"-asvir\" protease, \"-buvir\" polymerase", "\"-previr\" polymerase, \"-asvir\" protease, \"-buvir\" NS5A"], "ans": 0, "exp": "★ **-previr → NS3/4A protease; -asvir → NS5A; -buvir → NS5B polymerase.** *NABP: 1.A.1.*"}, {"id": 42, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "**Epclusa** is:", "opts": ["Ledipasvir/sofosbuvir, genotype 1 only", "Sofosbuvir/velpatasvir, pangenotypic", "Glecaprevir/pibrentasvir, pangenotypic", "Elbasvir/grazoprevir, genotype 1/4"], "ans": 1, "exp": "**Epclusa = sofosbuvir (NS5B) + velpatasvir (NS5A)** → **pangenotypic**, usually 12 weeks. *NABP: 3.C.2.*"}, {"id": 43, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "**Mavyret (glecaprevir/pibrentasvir)** is notable for:", "opts": ["A sofosbuvir-based regimen given for 24 weeks", "Genotype 1 only, requiring 24-week therapy", "Pangenotypic, 8 weeks in treatment-naïve without cirrhosis", "Mandatory co-administration with ribavirin"], "ans": 2, "exp": "**Mavyret = glecaprevir (NS3/4A) + pibrentasvir (NS5A)** → **pangenotypic, 8-week** course in treatment-naïve without cirrhosis. *NABP: 3.C.2.*"}, {"id": 44, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **amiodarone (Pacerone)** is starting a **sofosbuvir**-based regimen. Concern?", "opts": ["QT shortening with reflex tachycardia", "Amiodarone (Pacerone)-induced hepatotoxicity alone", "Hyperkalemia from worsening renal function", "Symptomatic bradycardia or heart block"], "ans": 3, "exp": "⚠ **Sofosbuvir + amiodarone (Pacerone) → serious symptomatic bradycardia** → avoid; if unavoidable, cardiac monitoring. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 45, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "Boxed warning common to **HCV direct-acting antivirals**?", "opts": ["HBV reactivation in HBV/HCV co-infected patients", "Agranulocytosis requiring frequent CBC monitoring", "Stevens-Johnson syndrome with mucosal involvement", "Torsades de pointes from QT prolongation"], "ans": 0, "exp": "⚠ All DAAs carry a **boxed warning for HBV reactivation** → **screen for HBV (HBsAg/anti-HBc) before DAA therapy.** *NABP: 3.C.2 / 3.D.2.*"}, {"id": 46, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which HCV regimen is **contraindicated in decompensated (Child-Pugh B/C) cirrhosis**?", "opts": ["Sofosbuvir/velpatasvir, which has no protease inhibitor", "Protease-inhibitor regimens such as glecaprevir-based", "All forms of hepatitis C therapy", "Entecavir-based nucleoside therapy"], "ans": 1, "exp": "⚠ **Protease-inhibitor (\"-previr\") regimens are contraindicated in decompensated cirrhosis**; sofosbuvir/velpatasvir (±ribavirin) is used instead. *NABP: 3.C.2 / 3.C.5.*"}, {"id": 47, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.E.2", "stem": "Absorption of the NS5A inhibitor **ledipasvir** (in Harvoni) is reduced by:", "opts": ["Nothing meaningfully affects its absorption", "High-fat meals taken with the dose", "Acid-suppressing drugs that raise gastric pH", "Concurrent moderate-intensity statin therapy"], "ans": 2, "exp": "⚠ **Ledipasvir (and velpatasvir) are pH-dependent** → **PPIs/H2RAs/antacids ↓ absorption** (separate/limit acid suppression; ledipasvir/sofosbuvir = Harvoni). *NABP: 3.C.3 / 3.E.2.*"}, {"id": 48, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.3", "stem": "Composition/role of **Paxlovid (nirmatrelvir/ritonavir)**?", "opts": ["A monoclonal antibody against the spike protein", "An intravenous RdRp polymerase inhibitor", "A pairing of two neuraminidase inhibitors", "Nirmatrelvir plus ritonavir as a CYP3A booster"], "ans": 3, "exp": "**Paxlovid = nirmatrelvir (3CL/Mpro protease inhibitor) + ritonavir (CYP3A4 inhibitor booster)** → ⚠ extensive **CYP3A drug interactions.** *NABP: 1.A.1 / 3.C.3.*"}, {"id": 49, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.2", "stem": "Correct about **Paxlovid** use?", "opts": ["Begin ≤5 days; dose-reduce at eGFR 30–<60; avoid <30", "Begin anytime; no renal dose adjustment needed", "Reserved for influenza; renally cleared without limits", "Begin only after symptom day 5; hepatic dosing only"], "ans": 0, "exp": "**Paxlovid:** begin **within 5 days** of symptoms; **dose-reduce at eGFR 30–<60**, **avoid at eGFR <30**; rebound can occur. *NABP: 3.D.2 / 3.C.2.*"}, {"id": 50, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **simvastatin (Zocor)** is prescribed Paxlovid. Best action?", "opts": ["Continue simvastatin (Zocor) at the same dose", "Temporarily hold simvastatin (Zocor) during the course", "Double the simvastatin (Zocor) dose for the course", "Switch to a higher-intensity simvastatin (Zocor) dose"], "ans": 1, "exp": "⚠ Ritonavir (CYP3A inhibitor) → **simvastatin (Zocor)/lovastatin contraindicated** (rhabdomyolysis) → **hold** during the short course. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 51, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.C.2", "stem": "**Remdesivir** is best characterized as:", "opts": ["An oral NS5A replication inhibitor", "An oral viral protease inhibitor", "An intravenous RdRp polymerase inhibitor", "An mRNA-based vaccine product"], "ans": 2, "exp": "**Remdesivir = IV RdRp (polymerase) inhibitor** (hospitalized and high-risk outpatients); monitor LFTs/infusion reactions. *NABP: 1.A.1 / 3.C.2.*"}, {"id": 52, "group": "Hepatitis B/C + Covid-19 Antivirals", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Key limitation/caution for **molnupiravir**?", "opts": ["It causes dose-limiting nephrotoxicity", "It requires intravenous administration", "It is preferred first-line in all patients", "It is avoided in pregnancy and is a reserve agent"], "ans": 3, "exp": "⚠ **Molnupiravir** → **not recommended in pregnancy**, reserve agent (lower efficacy than Paxlovid/remdesivir); MOA = lethal viral **mutagenesis.** *NABP: 3.C.2 / 3.C.5.*"}, {"id": 55, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "Routine **influenza vaccine** recommendation?", "opts": ["Annual vaccination for everyone six months and older", "A single lifetime dose in adulthood", "Vaccination only for high-risk patients", "Vaccination only for adults 65 and older"], "ans": 0, "exp": "**Annual influenza vaccine for all ≥6 months.** ✓ At **≥65**, prefer a **high-dose, adjuvanted, or recombinant** product. *NABP: 5.B.*"}, {"id": 56, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": true, "nabp": "5.B", "stem": "ℹ Current ACIP **age** at which PCV-naïve adults are routinely recommended a pneumococcal conjugate vaccine?", "opts": ["Age 65 and older", "Age 50 and older", "Age 40 and older", "All adults 19 and older"], "ans": 1, "exp": "ℹ ACIP **lowered routine pneumococcal vaccination to age ≥50** (Oct 2024): give **PCV15, PCV20, or PCV21** to PCV-naïve adults. *NABP: 5.B.*"}, {"id": 57, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "If **PCV15** (rather than PCV20/PCV21) is used in a pneumococcal-naïve adult, what follows?", "opts": ["An annual PPSV23 dose thereafter", "No additional pneumococcal vaccine", "A dose of PPSV23 at least one year later", "A second PCV15 dose after eight weeks"], "ans": 2, "exp": "★ **PCV15 → PPSV23 ≥1 yr later**; **PCV20/PCV21 are given alone** (no PPSV23 needed). *NABP: 5.B.*"}, {"id": 58, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": true, "nabp": "5.B", "stem": "ℹ Current adult **RSV vaccine** recommendation?", "opts": ["Recommended only for pregnant patients", "Recommended only for adults 85 and older", "Given annually to everyone 18 and older", "Single dose for all ≥75 and 50–74 at risk"], "ans": 3, "exp": "ℹ **RSV vaccine: single dose for all ≥75; ages 50–74 with increased risk** (age lowered to 50 in Apr 2025). **Not annual.** Products: Arexvy, Abrysvo, mResvia. *NABP: 5.B.*"}, {"id": 59, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "**Recombinant zoster vaccine (RZV, Shingrix)** — schedule/population?", "opts": ["Two doses for adults ≥50 and immunocompromised ≥19", "A single annual dose for all adults", "One live attenuated dose at any age", "A single live attenuated dose at ≥60"], "ans": 0, "exp": "**RZV/Shingrix = 2 doses** for **≥50** (and **immunocompromised ≥19**); **recombinant/non-live** (the old live ZVL is no longer used in the US). *NABP: 5.B.*"}, {"id": 60, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "**Tdap in pregnancy** is given:", "opts": ["Once in a lifetime, before any pregnancy", "In every pregnancy, at 27–36 weeks", "Only during the postpartum period", "Only if never previously vaccinated"], "ans": 1, "exp": "★ **Tdap every pregnancy, 27–36 wk** → maternal antibodies protect the infant against **pertussis.** *NABP: 5.B.*"}, {"id": 61, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "Adult tetanus booster schedule after the one-time Tdap?", "opts": ["Every 5 years without exception", "Never again after the Tdap dose", "Td or Tdap every 10 years", "Annually each fall season"], "ans": 2, "exp": "After a dose of **Tdap**, boost with **Td or Tdap every 10 years** (Tdap may substitute for any Td). *NABP: 5.B.*"}, {"id": 62, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "**HPV vaccine** dosing depends on age at initiation. Which is correct?", "opts": ["A single dose regardless of starting age", "Recommended only for female patients", "A three-dose series for all ages", "Two doses if started before 15, otherwise three"], "ans": 3, "exp": "★ **HPV: 2 doses if initiated <15 y; 3 doses if ≥15 y or immunocompromised**; routine **11–12** (can start 9), catch-up **through 26**; shared decision 27–45. *NABP: 5.B.*"}, {"id": 63, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B / 3.C.5", "stem": "**MMR** vaccine — key property/contraindication?", "opts": ["Live attenuated; avoid in pregnancy and immunocompromise", "Recombinant subunit; safe in all patient groups", "Given annually like the influenza vaccine", "Inactivated; recommended during pregnancy"], "ans": 0, "exp": "⚠ **MMR is live attenuated** → **avoid in pregnancy and severe immunocompromise** (2-dose series). *NABP: 5.B / 3.C.5.*"}, {"id": 64, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B / 3.C.5", "stem": "**Varicella** vaccine is:", "opts": ["An inactivated single-dose vaccine", "A live attenuated two-dose vaccine", "A recombinant adjuvanted subunit vaccine", "The same product as the zoster RZV vaccine"], "ans": 1, "exp": "**Varicella = live, 2-dose**; ⚠ contraindicated in **pregnancy/immunocompromise** (distinct from non-live RZV). *NABP: 5.B / 3.C.5.*"}, {"id": 65, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "Current **hepatitis B** recommendation for adults?", "opts": ["Recommended for children only", "Recommended for healthcare workers only", "Universal for adults 19–59; risk-based after 60", "Recommended for international travelers only"], "ans": 2, "exp": "**Universal HepB for adults 19–59**; **≥60** vaccinate based on risk (but may be given to anyone wanting protection). *NABP: 5.B.*"}, {"id": 66, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "**Meningococcal B (MenB)** vaccine for healthy adolescents is:", "opts": ["Never administered to adolescents", "Given annually throughout adolescence", "Routinely recommended for all at age 11", "Shared clinical decision-making at ages 16–23"], "ans": 3, "exp": "**MenB = shared clinical decision-making, 16–23 y** (≠ the routinely recommended **MenACWY** at 11–12 with a 16-y booster). *NABP: 5.B.*"}, {"id": 67, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T2", "aware": true, "nabp": "5.B", "stem": "ℹ **COVID-19 vaccine** under current ACIP guidance is emphasized especially for:", "opts": ["Adults ≥65 and persons at increased risk", "Children younger than five years only", "Only severely immunocompromised adults", "No population under current guidance"], "ans": 0, "exp": "ℹ COVID-19 vaccination is **emphasized for ≥65 and increased-risk groups** (check the current season's ACIP/CDC statement, which is updated periodically). *NABP: 5.B.*"}, {"id": 68, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "A patient reports an **egg allergy**. How does this affect influenza vaccination (current ACIP)?", "opts": ["Influenza vaccine is absolutely contraindicated", "Any age-appropriate flu vaccine with no special steps", "Only cell-based vaccine in a hospital setting", "Vaccination only after a two-hour observation"], "ans": 1, "exp": "ℹ Since 2023, **egg allergy requires no special measures** — give any age-appropriate flu vaccine routinely. *NABP: 5.B / 3.C.5.*"}, {"id": 69, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "A 52-year-old with no prior pneumococcal vaccine asks what she needs. Best answer?", "opts": ["Two PCV doses spaced eight weeks apart", "No vaccine is needed until age 65", "A single PCV20 or PCV21 dose now", "A PPSV23 dose alone is sufficient"], "ans": 2, "exp": "ℹ At **≥50** she qualifies: **PCV20/PCV21 alone**, or **PCV15 → PPSV23 (≥1 yr).** *NABP: 5.B.*"}, {"id": 70, "group": "Routine Adult Immunization Schedule", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "The RSV vaccine **Abrysvo** is notable because it is used:", "opts": ["Only on a yearly seasonal basis", "As a live attenuated RSV vaccine", "Only for administration to infants", "As both a maternal and older-adult vaccine"], "ans": 3, "exp": "**Abrysvo** has dual use: **maternal (32–36 wk)** to protect newborns AND **older-adult** RSV prevention. *NABP: 5.B.*"}, {"id": 73, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "Two **live injectable vaccines** (e.g., MMR and varicella) not given on the same day must be separated by at least:", "opts": ["Four weeks", "Six months", "One week", "Two weeks"], "ans": 0, "exp": "★ Live parenteral vaccines → **same visit or ≥4 weeks apart** (giving them closer can blunt the immune response to the second). *NABP: 5.B.*"}, {"id": 74, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "Spacing requirement between **inactivated vaccines** (or an inactivated and a live vaccine)?", "opts": ["A mandatory four-week interval", "No minimum interval; any timing acceptable", "A mandatory eight-week interval", "A mandatory six-month interval"], "ans": 1, "exp": "**Inactivated vaccines have no minimum interval** with other inactivated or live vaccines — give at any time/together. *NABP: 5.B.*"}, {"id": 75, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "Which is a true **contraindication** (not merely a precaution) to a vaccine?", "opts": ["Currently breastfeeding an infant", "A mild cold without any fever", "Anaphylaxis to a prior dose or component", "A recent course of oral antibiotics"], "ans": 2, "exp": "⚠ **Anaphylaxis to a prior dose/component = contraindication.** **Moderate/severe acute illness = precaution;** minor illness (mild URI, low-grade fever) is **NOT** a reason to defer. *NABP: 5.B / 3.C.5.*"}, {"id": 76, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "A patient is pregnant. Which vaccine is **contraindicated**?", "opts": ["Hepatitis B", "Inactivated influenza", "Tdap", "MMR"], "ans": 3, "exp": "⚠ **Live vaccines (MMR, varicella, LAIV) are contraindicated in pregnancy**; avoid conception for **4 weeks** after a live vaccine. IIV, Tdap, HepB are fine. *NABP: 5.B / 3.C.5.*"}, {"id": 77, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "In a patient with **severe immunocompromise** (e.g., active chemotherapy, advanced HIV), which applies?", "opts": ["Live vaccines contraindicated; inactivated acceptable", "Only live vaccines may be administered", "No vaccination restrictions apply at all", "All vaccines are absolutely contraindicated"], "ans": 0, "exp": "⚠ **Live vaccines contraindicated** in severe immunocompromise; **inactivated are acceptable** (may have ↓ efficacy). *NABP: 5.B / 3.C.5.*"}, {"id": 78, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "**Live attenuated intranasal influenza (LAIV)** is appropriate for:", "opts": ["Anyone six months of age and older", "Healthy non-pregnant persons aged 2–49", "Adults 65 and older preferentially", "Pregnant patients in any trimester"], "ans": 1, "exp": "**LAIV: ages 2–49, healthy, non-pregnant, non-immunocompromised**; otherwise use inactivated/recombinant. *NABP: 5.B / 3.C.5.*"}, {"id": 79, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "Correct administration **route** for MMR and varicella vaccines?", "opts": ["Oral", "Intramuscular", "Subcutaneous", "Intranasal"], "ans": 2, "exp": "**MMR and varicella are given SC**; most other vaccines (Tdap, HepB, PCV, RZV, IIV) are **IM.** *NABP: 5.B.*"}, {"id": 80, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "Preferred **IM injection site** by age?", "opts": ["The gluteus muscle for all ages", "The anterolateral thigh for adults", "The deltoid muscle for all ages", "Deltoid for adults, thigh for infants"], "ans": 3, "exp": "★ **IM site: deltoid (adults/older children); vastus lateralis/anterolateral thigh (infants).** *NABP: 5.B.*"}, {"id": 81, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "A patient recently received **immune globulin / a blood product**. Effect on live vaccines?", "opts": ["Defer MMR/varicella for the product-specific interval", "Administer live vaccines immediately as planned", "Live vaccines become more immunogenic", "There is no effect on live vaccines"], "ans": 0, "exp": "⚠ **Antibody-containing products blunt live vaccines** → **defer MMR/varicella** (interval depends on product/dose). *NABP: 5.B.*"}, {"id": 82, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "Counseling after **varicella vaccination** regarding salicylates?", "opts": ["No salicylate restriction is needed", "Avoid salicylates for about six weeks", "Take daily aspirin during this period", "Avoid acetaminophen for six weeks"], "ans": 1, "exp": "⚠ **Avoid salicylates for ~6 weeks after varicella vaccine** (Reye syndrome risk in children/adolescents). *NABP: 5.B / 3.C.5.*"}, {"id": 83, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "Which is a contraindication specific to the **pertussis** component (DTaP/Tdap)?", "opts": ["A family history of febrile seizures", "A sore arm following a prior dose", "Encephalopathy within 7 days of a prior dose", "A temperature of 100°F after a dose"], "ans": 2, "exp": "⚠ **Encephalopathy within 7 days** of a prior pertussis vaccine (no other cause) = **CI to the pertussis component** (use Td/DT). *NABP: 5.B / 3.C.5.*"}, {"id": 84, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B", "stem": "A tuberculin skin test (TST) is needed in a patient also due for **MMR**. Best approach?", "opts": ["Wait six months after MMR before testing", "Tuberculin testing is permanently invalidated", "Never administer the two vaccines together", "Place TST same day as MMR or after 4 weeks"], "ans": 3, "exp": "★ **TST same day as MMR or ≥4 weeks after** (live measles vaccine can cause a false-negative TST). *NABP: 5.B.*"}, {"id": 85, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B / 3.D.4", "stem": "General vaccine **storage/handling** principle?", "opts": ["Refrigerate most at 2–8 °C; some require freezing", "Store all vaccines at room temperature", "Freeze every live vaccine product", "Freeze all vaccines without exception"], "ans": 0, "exp": "★ **Most vaccines: refrigerate 2–8 °C**; certain live products (MMRV) **frozen**; follow labeling, protect from light, honor beyond-use/expiration. *NABP: 5.B / 3.D.4.*"}, {"id": 86, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "5.B", "stem": "Can multiple needed vaccines be given at the **same visit**?", "opts": ["No, give only one vaccine per visit", "Yes, give simultaneously at different sites", "Only inactivated vaccines may be combined", "Only if spaced at least four weeks apart"], "ans": 1, "exp": "**Give all due vaccines at one visit** (different sites) — simultaneous administration is safe/effective and raises completion. *NABP: 5.B.*"}, {"id": 87, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "**Rotavirus** vaccine — key features/contraindications?", "opts": ["Recombinant vaccine with no age limit", "Inactivated intramuscular vaccine, no restrictions", "Live oral vaccine; avoid with intussusception or SCID", "Live subcutaneous vaccine given to adults"], "ans": 2, "exp": "**Rotavirus = live oral** infant series; ⚠ **CI: prior intussusception, SCID**; must complete within age limits. *NABP: 5.B / 3.C.5.*"}, {"id": 88, "group": "Administration, Spacing, Contraindications & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.5", "stem": "A patient reports **anaphylaxis to gelatin/neomycin**. Which vaccines warrant caution/contraindication?", "opts": ["Hepatitis A and B", "Tdap and Td", "Pneumococcal PCV/PPSV", "MMR and varicella"], "ans": 3, "exp": "⚠ **Severe gelatin/neomycin allergy** → caution/CI with **MMR and varicella** (contain these components). *NABP: 5.B / 3.C.5.*"}, {"id": 91, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.3", "stem": "A HSCT patient has ganciclovir-refractory CMV. Genotyping shows a **UL54 (DNA polymerase)** mutation. What does this imply?", "opts": ["Cross-resistance among ganciclovir, cidofovir, and foscarnet", "New treatment-emergent resistance to oseltamivir (Tamiflu)", "Restored full susceptibility to acyclovir (Zovirax)", "Resistance limited to ganciclovir alone"], "ans": 0, "exp": "★ **UL97** mutation → **ganciclovir** resistance (impaired activation); **UL54 (DNA pol)** → **cross-resistance** across ganciclovir/cidofovir/foscarnet. **Maribavir** (UL97 inhibitor) is an option for refractory disease. *NABP: 3.C.2 / 3.C.3.*"}, {"id": 92, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An influenza isolate carries the **H275Y neuraminidase** mutation. Best implication?", "opts": ["Selective resistance to baloxavir only", "Reduced oseltamivir (Tamiflu) susceptibility; consider baloxavir", "Resistance to every available antiviral", "Resistance limited to amantadine"], "ans": 1, "exp": "⚠ **H275Y → oseltamivir (Tamiflu)/peramivir resistance** (neuraminidase); **baloxavir** (different target) or **zanamivir** may retain activity. *NABP: 3.C.2.*"}, {"id": 93, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A transplant patient on **cyclosporine (Neoral)** is started on **letermovir**. Key management point?", "opts": ["Double the letermovir dose for adequate efficacy", "No clinically relevant interaction occurs", "Reduce letermovir to 240 mg and monitor cyclosporine (Neoral)", "Discontinue cyclosporine (Neoral) during therapy"], "ans": 2, "exp": "⚠ **Letermovir–cyclosporine (Neoral)** interaction → **reduce letermovir to 240 mg/day**, monitor calcineurin-inhibitor levels; letermovir (CYP3A inhibitor) also ↑ statins. *NABP: 3.C.3.*"}, {"id": 94, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3", "stem": "A patient on **carbamazepine (Tegretol)** needs COVID treatment. Concern with **Paxlovid**?", "opts": ["It only raises carbamazepine (Tegretol) to toxic levels", "The two agents act synergistically", "There is no clinically significant interaction", "CYP3A inducers lower nirmatrelvir, risking failure"], "ans": 3, "exp": "⚠ **Strong CYP3A inducers ↓ nirmatrelvir/ritonavir** → loss of efficacy → **avoid Paxlovid** (use an alternative such as remdesivir). *NABP: 3.C.3.*"}, {"id": 95, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **zidovudine** is started on IV **ganciclovir**. Monitoring concern?", "opts": ["Additive myelosuppression; monitor the CBC closely", "Additive nephrotoxicity; monitor renal function", "Hyperkalemia; monitor serum potassium", "QT prolongation; monitor the ECG"], "ans": 0, "exp": "⚠ **Ganciclovir + zidovudine → additive bone-marrow suppression** → frequent **CBC** monitoring. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 96, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.3", "stem": "Timing rule between **influenza antivirals** and the **live intranasal vaccine (LAIV)**?", "opts": ["They may be given together without concern", "Avoid LAIV near antiviral use; antivirals inhibit it", "LAIV enhances the effect of the antivirals", "The rule applies only to inactivated vaccine"], "ans": 1, "exp": "⚠ **Antivirals inhibit LAIV replication** → **don't give LAIV near antiviral dosing**; inactivated flu vaccine is unaffected. *NABP: 5.B / 3.C.3.*"}, {"id": 97, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.2", "stem": "Which group of antivirals characteristically requires **renal dose adjustment**?", "opts": ["Only letermovir requires any dose adjustment", "None of these antivirals require dose adjustment", "Acyclovir (Zovirax), ganciclovir, oseltamivir (Tamiflu), and others", "Only the orally administered antiviral agents"], "ans": 2, "exp": "★ Most antivirals are **renally cleared → dose-adjust** (acyclovir, ganciclovir, oseltamivir (Tamiflu), cidofovir, foscarnet, entecavir, tenofovir, Paxlovid). *NABP: 3.D.2.*"}, {"id": 98, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "A pregnant patient has a symptomatic genital **HSV** outbreak. Appropriate therapy?", "opts": ["Oral ribavirin", "Oral molnupiravir", "No antiviral is ever safe", "Acyclovir (Zovirax) or valacyclovir"], "ans": 3, "exp": "**Acyclovir (Zovirax)/valacyclovir are acceptable in pregnancy** for HSV (and suppressive near term); ⚠ **ribavirin and molnupiravir are contraindicated/avoided in pregnancy.** *NABP: 3.C.2 / 3.C.5.*"}, {"id": 99, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.D.4", "stem": "Administration counseling for oral **valganciclovir**?", "opts": ["Take with food; monitor CBC; handle carefully", "Always crush and dissolve the tablet", "Strictly avoid all dairy products", "Take consistently on an empty stomach"], "ans": 0, "exp": "**Valganciclovir: take with food** (improves absorption); cytotoxic/teratogenic → **handling precautions**; monitor **CBC.** *NABP: 3.E.2 / 3.D.4.*"}, {"id": 100, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "Why are **entecavir and tenofovir** preferred over lamivudine for chronic HBV?", "opts": ["They are considerably less potent than lamivudine", "They have a higher resistance barrier than lamivudine", "They achieve a definitive cure of HBV", "They require no laboratory monitoring"], "ans": 1, "exp": "★ **Entecavir/tenofovir = high resistance barrier**; **lamivudine** → high resistance over time → not preferred as monotherapy. *NABP: 3.C.2.*"}, {"id": 101, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.A.1", "stem": "The mechanism most responsible for **acyclovir (Zovirax) resistance** in HSV is:", "opts": ["Production of a viral β-lactamase enzyme", "Alteration of a host cellular kinase", "Viral thymidine-kinase deficiency or mutation", "Upregulation of a viral drug-efflux pump"], "ans": 2, "exp": "⚠ **TK-deficient/mutant HSV** can't activate acyclovir (Zovirax) → resistance → **foscarnet** (or cidofovir), which need no viral kinase. *NABP: 3.C.2 / 1.A.1.*"}, {"id": 102, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **rivaroxaban (Xarelto)** is prescribed **Paxlovid**. Concern?", "opts": ["Reduced rivaroxaban (Xarelto) exposure raising clot risk", "Hyperkalemia from impaired potassium handling", "No clinically significant interaction occurs", "Increased DOAC exposure raising bleeding risk"], "ans": 3, "exp": "⚠ **Ritonavir ↑ rivaroxaban (Xarelto)/apixaban (Eliquis)** (CYP3A/P-gp) → **bleeding**; review all meds for CYP3A interactions before Paxlovid. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 103, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **tenofovir disoproxil (TDF)** also takes chronic NSAIDs. Concern?", "opts": ["Additive nephrotoxicity; monitor renal function", "Additive myelosuppression; monitor the CBC", "Additive hepatotoxicity; monitor LFTs", "QT prolongation; monitor the ECG"], "ans": 0, "exp": "⚠ **TDF + nephrotoxins (NSAIDs/aminoglycosides)** → additive **renal injury** → monitor SCr/phosphate (TAF has lower renal risk). *NABP: 3.C.3 / 3.C.5.*"}, {"id": 104, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "Resistance consideration unique to **baloxavir**?", "opts": ["Selection of the H275Y neuraminidase variant", "Treatment-emergent PA/I38X substitutions", "Selection of a CMV UL97 kinase mutation", "No resistance has been described to date"], "ans": 1, "exp": "ℹ **Baloxavir** selects **PA (I38X) variants** with reduced susceptibility (distinct from NA H275Y); single-dose convenience remains. *NABP: 3.C.2.*"}, {"id": 105, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.B / 3.C.2", "stem": "Best statement integrating **zoster prevention vs treatment**?", "opts": ["Antivirals are a substitute for vaccination", "Antivirals provide durable long-term prevention", "RZV prevents zoster; antivirals treat acute disease", "RZV is the treatment for acute zoster"], "ans": 2, "exp": "★ **Prevent with RZV; treat acute zoster with oral antivirals (≤72 h).** Distinct roles. *NABP: 5.B / 3.C.2.*"}, {"id": 106, "group": "Wrap-Up — Resistance Mechanisms, DDI Depth & Integration Pearls", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on **amiodarone (Pacerone)** is being evaluated for **sofosbuvir/velpatasvir**. Best action?", "opts": ["Add a beta-blocker and proceed", "Double the direct-acting antiviral dose", "Proceed, as there is no real concern", "Avoid the combination; bradycardia risk"], "ans": 3, "exp": "⚠ **Sofosbuvir + amiodarone (Pacerone) → severe bradycardia/heart block** → avoid; intensive monitoring only if no alternative. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 109, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.A.2", "stem": "Brand name for **acyclovir**?", "opts": ["Zovirax", "Famvir", "Cytovene", "Valtrex"], "ans": 0, "exp": "✓ Pearl: acyclovir (Zovirax) is **activated by viral thymidine kinase** → inhibits viral DNA polymerase; ⚠ **IV → crystalluria/AKI** (hydrate, slow infusion, renal dose-adjust). *NABP: 1.A.2.*"}, {"id": 110, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "**Valtrex** is the brand for which drug?", "opts": ["A polymerase inhibitor unrelated to acyclovir", "Valacyclovir, the prodrug of acyclovir", "Penciclovir, an active acyclovir metabolite", "Ganciclovir, a CMV-active prodrug"], "ans": 1, "exp": "✓ Pearl: better oral absorption lets it dose **BID/TID** (vs acyclovir (Zovirax) 5×/day); used for HSV, zoster, and **suppressive/transmission-reduction** therapy. *NABP: 1.A.2.*"}, {"id": 111, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "**Famciclovir (Famvir)** is the prodrug of:", "opts": ["Cidofovir", "Acyclovir", "Penciclovir", "Ganciclovir"], "ans": 2, "exp": "⚠ Pearl: classic trap — **valacyclovir→acyclovir (Zovirax)** but **famciclovir→penciclovir**; topical penciclovir = **Denavir** (cold sores). *NABP: 1.A.2.*"}, {"id": 112, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Which pairing is correct for the CMV agents?", "opts": ["Both ganciclovir and valganciclovir are Foscavir", "Ganciclovir is branded Prevymis", "Ganciclovir = Valcyte; valganciclovir = Cytovene", "Ganciclovir = Cytovene; valganciclovir = Valcyte"], "ans": 3, "exp": "✓ Pearl: **valganciclovir = oral prodrug of ganciclovir, take WITH food**; dose-limiting **myelosuppression** (monitor CBC); ophthalmic ganciclovir gel = **Zirgan**. *NABP: 1.A.2.*"}, {"id": 113, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "Brand name for **foscarnet**?", "opts": ["Foscavir", "Rapivab", "Prevymis", "Vistide"], "ans": 0, "exp": "✓ Pearl: **pyrophosphate analog** — inhibits DNA polymerase directly (no viral kinase needed) → active vs **TK-deficient (acyclovir-resistant) HSV** and ganciclovir-resistant CMV; ⚠ **nephrotoxicity + electrolyte wasting** (↓Ca/Mg/K). *NABP: 1.A.2.*"}, {"id": 114, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "**Cidofovir** is marketed as:", "opts": ["Livtencity", "Vistide", "Foscavir", "Valcyte"], "ans": 1, "exp": "✓ Pearl: dose-limiting **nephrotoxicity** → must give **probenecid + IV saline** with each dose; reserved for resistant CMV retinitis. *NABP: 1.A.2.*"}, {"id": 115, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "**Prevymis** is the brand name for:", "opts": ["Cidofovir", "Maribavir", "Letermovir", "Ganciclovir"], "ans": 2, "exp": "✓ Pearl: **CMV terminase inhibitor** for **prophylaxis in CMV-seropositive allo-HSCT**; advantage = **no myelosuppression**; ⚠ **CYP3A** interactions (↑ statins; with cyclosporine (Neoral) reduce letermovir to **240 mg**). *NABP: 1.A.2.*"}, {"id": 116, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2", "stem": "**Livtencity (maribavir)** is indicated for:", "opts": ["Chronic hepatitis C infection", "Acute herpes zoster", "Influenza A and B", "Refractory post-transplant CMV"], "ans": 3, "exp": "⚠ Pearl: **UL97 kinase inhibitor**; do **NOT** combine with ganciclovir (**antagonism**); common AE **dysgeusia (taste disturbance)**. *NABP: 1.A.2.*"}, {"id": 117, "group": "Brand ↔ Generic & Combination Products", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.A.2", " function loadP(){try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}return null;}

function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}

 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
