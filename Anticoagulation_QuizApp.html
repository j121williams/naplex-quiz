<script>
const ITEMS = [{"id": "W-1", "subtopic": "Warfarin / VKA", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which clotting factors does warfarin deplete through its mechanism?", "opts": ["Factors II, VII, IX, X and proteins C and S", "Factors V, VIII, XI and von Willebrand factor", "Antithrombin and heparin cofactor II directly", "Tissue factor and factor VIIa complex only"], "ans": 0, "exp": "Warfarin (Coumadin/Jantoven) inhibits **VKORC1**, blocking recycling of vitamin K → ↓ γ-carboxylation of the **vitamin-K-dependent factors II, VII, IX, X** plus **proteins C & S**. Because protein C (anticoagulant) has a short half-life, there is a transient **procoagulant** window early → bridge w/ a parenteral agent in acute thrombosis.", "anchor": "MOA — VKA."}, {"id": "W-2", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.D.2", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with nonvalvular AFib on warfarin has a target INR range of:", "opts": ["1.5 to 2.0", "2.0 to 3.0", "2.5 to 3.5", "3.0 to 4.0"], "ans": 1, "exp": "Goal INR **2.0–3.0** for nonvalvular AFib, VTE treatment, and bioprosthetic/most indications. The higher **2.5–3.5** range is reserved for a **mechanical mitral valve** (or mechanical aortic w/ added risk factors). Monitor INR; the value is the discriminator.", "anchor": "INR targets."}, {"id": "W-3", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on stable warfarin is started on a new drug and the INR rises to 5.8 without bleeding. Which agent most likely caused this?", "opts": ["Rifampin started for latent TB", "Carbamazepine added for neuropathy", "Amiodarone started for new AFib", "Cholestyramine for pruritus"], "ans": 2, "exp": "**Amiodarone** inhibits **CYP2C9** (and CYP3A4/P-gp) → ↓ clearance of the potent **S-warfarin** enantiomer → ↑↑ INR; empirically ↓ warfarin dose ~30–50% and monitor. Rifampin and carbamazepine are CYP **inducers** → ↓ INR; cholestyramine ↓ warfarin absorption → ↓ INR. All four interact — only amiodarone raises INR.", "anchor": "DDI — CYP2C9."}, {"id": "W-4", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A warfarin patient presents with INR 8.5, no bleeding. Most appropriate management?", "opts": ["Give IV phytonadione plus 4-factor PCC now", "Transfuse fresh frozen plasma empirically", "Administer protamine sulfate 1 mg per 100 units", "Hold warfarin and give low-dose oral vitamin K"], "ans": 3, "exp": "INR >4.5–10 **without bleeding** → **hold warfarin ± low-dose oral vitamin K (phytonadione)**; routine PCC/FFP is not indicated absent bleeding. **4F-PCC (Kcentra) + IV vitamin K** is reserved for **serious/major bleeding** or emergent surgery. Protamine reverses heparin, not warfarin. ✓ Trap: A is the major-bleed answer.", "anchor": "VKA reversal — ACCP."}, {"id": "W-5", "subtopic": "Warfarin / VKA", "domain": "D1", "nabp": "1.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Genetic testing shows a patient is a CYP2C9 poor metabolizer with a VKORC1 -1639 A/A genotype. The expected warfarin requirement is:", "opts": ["Lower dose due to reduced clearance and high sensitivity", "Higher dose due to faster S-warfarin clearance", "Unchanged because INR monitoring overrides genetics", "Higher dose because VKORC1 increases enzyme expression"], "ans": 0, "exp": "**CYP2C9** loss-of-function → slower **S-warfarin** clearance; **VKORC1 -1639 A/A** → lower target-enzyme expression → ↑ sensitivity. Net effect = **lower** warfarin dose requirement & higher bleeding risk during initiation. PGx-guided dosing nudges the starting dose; INR still guides titration.", "anchor": "PGx — CPIC warfarin."}, {"id": "W-6", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.E.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Best dietary counseling point for a patient starting warfarin?", "opts": ["Completely avoid all green leafy vegetables", "Keep vitamin K intake consistent week to week", "Double leafy-green intake to protect the liver", "Take warfarin only on an empty stomach"], "ans": 1, "exp": "Vitamin-K-rich foods (kale, spinach, broccoli) antagonize warfarin. The goal is **consistency**, not avoidance — large swings in intake destabilize INR. Counsel steady diet, limit alcohol binges, and check before new supplements/OTCs.", "anchor": "Pt education."}, {"id": "W-7", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which agents are expected to INCREASE a stable patient's INR on warfarin? Select all that apply.", "opts": ["Trimethoprim-sulfamethoxazole", "Fluconazole", "Rifampin", "Metronidazole", "Phenytoin (chronic)", "St. John's wort"], "ans": [0, 1, 3], "exp": "↑INR via **CYP2C9 inhibition**: **TMP-SMX**, **fluconazole** (also CYP2C9/3A4), **metronidazole**. ↓INR via **induction**: **rifampin**, **chronic phenytoin** (acute phenytoin can paradoxically ↑), **St. John's wort**. The false options are parallel real interactions — direction is the discriminator.", "anchor": "DDI direction."}, {"id": "H-1", "subtopic": "Heparins / Fondaparinux", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Unfractionated heparin produces anticoagulation primarily by:", "opts": ["Directly inhibiting thrombin at its active site", "Blocking factor Xa selectively without a cofactor", "Potentiating antithrombin to inactivate IIa and Xa", "Inhibiting vitamin K epoxide reductase"], "ans": 2, "exp": "UFH binds **antithrombin**, accelerating inactivation of **thrombin (IIa)** and **factor Xa** roughly equally. LMWH shifts the ratio toward **Xa > IIa**; **fondaparinux** is **pure anti-Xa**. Direct thrombin inhibitors (argatroban, dabigatran) act at IIa's active site without antithrombin.", "anchor": "MOA — heparins."}, {"id": "H-2", "subtopic": "Heparins / Fondaparinux", "domain": "D2", "nabp": "2.A.5", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which test best monitors a therapeutic IV unfractionated heparin infusion?", "opts": ["INR, the international normalized ratio", "Platelet count trend on its own", "Thrombin time, the fibrinogen-to-fibrin assay", "aPTT, the activated partial thromboplastin time"], "ans": 3, "exp": "Therapeutic **UFH** is titrated by **aPTT** or an **anti-Xa heparin assay**. INR tracks warfarin. Platelets are monitored for **HIT** but don't gauge intensity. LMWH/fondaparinux generally need no routine monitoring (anti-Xa in pregnancy, obesity, renal impairment).", "anchor": "Monitoring."}, {"id": "H-3", "subtopic": "Heparins / Fondaparinux", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on a UFH infusion has serious bleeding. The appropriate reversal agent is:", "opts": ["Protamine sulfate", "Idarucizumab", "Andexanet alfa", "Vitamin K"], "ans": 0, "exp": "**Protamine sulfate** reverses **UFH** (≈1 mg per 100 units of heparin in the last few hours); it only **partially** reverses LMWH and does **not** reverse fondaparinux. Idarucizumab → dabigatran; andexanet → apixaban/rivaroxaban; vitamin K → warfarin. ⚠ Protamine itself can cause hypotension/anaphylaxis.", "anchor": "Reversal mapping."}, {"id": "H-4", "subtopic": "Heparins / Fondaparinux", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with CrCl 22 mL/min needs treatment-dose anticoagulation for DVT. Which choice raises the greatest accumulation/bleeding concern?", "opts": ["Unfractionated heparin infusion", "Fondaparinux at treatment dose", "Warfarin bridged with UFH", "IV argatroban"], "ans": 1, "exp": "**Fondaparinux** is **renally cleared** and **contraindicated at CrCl <30** (accumulation, no antidote). **UFH** is not renally cleared → preferred when renal function is poor. Argatroban is hepatically cleared. Enoxaparin would also need reduction (1 mg/kg q24h) at CrCl <30.", "anchor": "Renal dosing."}, {"id": "H-5", "subtopic": "Heparins / Fondaparinux", "domain": "D2", "nabp": "2.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Enoxaparin is ordered for treatment of DVT in a patient with CrCl 25 mL/min. The most appropriate regimen is:", "opts": ["1 mg/kg subcutaneously every 12 hours", "1.5 mg/kg subcutaneously every 12 hours", "1 mg/kg subcutaneously every 24 hours", "30 mg subcutaneously every 12 hours"], "ans": 2, "exp": "Enoxaparin (Lovenox) treatment dose is **1 mg/kg SQ q12h** (or 1.5 mg/kg q24h) normally; at **CrCl <30** reduce to **1 mg/kg q24h** per labeling to avoid accumulation. The 30 mg q12h regimen is **prophylaxis**, not treatment. Consider anti-Xa monitoring in renal impairment/obesity.", "anchor": "LMWH renal adjust."}, {"id": "HIT-1", "subtopic": "HIT", "domain": "D3", "nabp": "3.C.5", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Day 7 of UFH, platelets fall from 250 to 90 ×10^9/L with a new DVT. After stopping all heparin, the best next step is:", "opts": ["Transfuse platelets to correct the count", "Begin warfarin 10 mg immediately", "Switch to prophylactic-dose enoxaparin", "Start argatroban infusion"], "ans": 3, "exp": "This is **HIT** (immune, PF4-heparin antibody; platelets ↓>50% on days 5–10, **prothrombotic**). Stop **all** heparin/LMWH and start a **non-heparin anticoagulant** — **argatroban** (or bivalirudin/fondaparinux/DOAC). ⚠ Do **NOT** transfuse platelets, do **NOT** start warfarin until platelets recover (>150) — early warfarin risks **venous limb gangrene**.", "anchor": "HIT management — ASH 2018."}, {"id": "HIT-2", "subtopic": "HIT", "domain": "D1", "nabp": "1.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Argatroban is selected for HIT. Which monitoring/clearance statement is correct?", "opts": ["Hepatically cleared; monitor with aPTT", "Renally cleared; monitor with anti-Xa", "Renally cleared; monitor INR only", "No monitoring needed at any dose"], "ans": 0, "exp": "**Argatroban** is a direct thrombin inhibitor, **hepatically** metabolized (reduce dose in hepatic impairment) and titrated by **aPTT**. Note it **raises the INR**, complicating the later overlap to warfarin (use higher INR target/factor X assay during transition).", "anchor": "DTI monitoring."}, {"id": "DO-1", "subtopic": "DOACs", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which DOAC is a direct thrombin (IIa) inhibitor rather than a factor Xa inhibitor?", "opts": ["Apixaban", "Dabigatran", "Rivaroxaban", "Edoxaban"], "ans": 1, "exp": "**Dabigatran (Pradaxa)** directly inhibits **thrombin (IIa)**; **apixaban, rivaroxaban, edoxaban** ('-xabans') inhibit **factor Xa**. Mechanism dictates reversal: **idarucizumab** for dabigatran vs **andexanet alfa** for the -xabans.", "anchor": "Class MOA."}, {"id": "DO-2", "subtopic": "DOACs", "domain": "D2", "nabp": "2.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "An 82-year-old woman (weight 55 kg, SCr 1.6 mg/dL) starts apixaban for AFib. The correct dose is:", "opts": ["5 mg twice daily", "10 mg twice daily", "2.5 mg twice daily", "5 mg once daily"], "ans": 2, "exp": "Apixaban (Eliquis) for AFib is **5 mg BID**, reduced to **2.5 mg BID** if **≥2 of**: **age ≥80, weight ≤60 kg, SCr ≥1.5**. She meets all three → **2.5 mg BID**. (The 10 mg BID lead-in belongs to acute VTE treatment, not AFib.)", "anchor": "Apixaban dose-reduction criteria."}, {"id": "DO-3", "subtopic": "DOACs", "domain": "D3", "nabp": "3.E.2", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which counseling point is specific to rivaroxaban at the 15 mg and 20 mg doses?", "opts": ["Take on an empty stomach for absorption", "Separate from all dairy by two hours", "Crush only if swallowing is difficult, then fast", "Take with the evening meal to maximize absorption"], "ans": 3, "exp": "**Rivaroxaban (Xarelto) 15 mg and 20 mg must be taken WITH food** — bioavailability drops markedly when fasting. (The 2.5/10 mg doses can be taken without regard to food.) Contrast **apixaban** and **dabigatran**, which have no food requirement.", "anchor": "Food effect."}, {"id": "DO-4", "subtopic": "DOACs", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Which patient should receive warfarin rather than a DOAC?", "opts": ["Mechanical mitral valve prosthesis", "Nonvalvular AFib with CrCl 40 mL/min", "Provoked proximal DVT, normal renal function", "AFib with well-controlled hypertension"], "ans": 0, "exp": "DOACs are **contraindicated in mechanical heart valves** (RE-ALIGN: dabigatran → more thromboembolism + bleeding than warfarin) and in **moderate-to-severe mitral stenosis** → use **warfarin**. The other scenarios are standard DOAC indications. ✓ Trap: 'valvular' for DOAC purposes ≈ mechanical valve / rheumatic mitral stenosis.", "anchor": "DOAC contraindication."}, {"id": "DO-5", "subtopic": "DOACs", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on dabigatran has life-threatening GI bleeding. The specific reversal agent is:", "opts": ["Andexanet alfa", "Idarucizumab", "Protamine sulfate", "4-factor PCC as first-line antidote"], "ans": 1, "exp": "**Idarucizumab (Praxbind)** is the monoclonal-antibody fragment that specifically reverses **dabigatran**. **Andexanet alfa (Andexxa)** reverses the **factor Xa inhibitors** (apixaban, rivaroxaban). 4F-PCC is an off-label alternative if the specific agent is unavailable. Dabigatran is also dialyzable.", "anchor": "DOAC reversal."}, {"id": "DO-6", "subtopic": "DOACs", "domain": "D2", "nabp": "2.A.4", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Edoxaban carries a boxed warning to avoid use in nonvalvular AFib when CrCl is:", "opts": ["Less than 15 mL/min", "15 to 50 mL/min", "Greater than 95 mL/min", "51 to 95 mL/min"], "ans": 2, "exp": "Edoxaban (Savaysa) for AFib is **less effective (↑ ischemic stroke) vs warfarin when CrCl >95** → **BBW: do not use**. Approved AFib range is **CrCl 15–95**; avoid <15. This 'too-good kidneys' trap is unique to edoxaban among the DOACs.", "anchor": "Edoxaban BBW."}, {"id": "DO-7", "subtopic": "DOACs", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "Which drugs can clinically significantly REDUCE DOAC levels (induction of P-gp/CYP3A4) and risk treatment failure? Select all that apply.", "opts": ["Rifampin", "Carbamazepine", "Phenytoin", "St. John's wort", "Verapamil", "Ketoconazole"], "ans": [0, 1, 2, 3], "exp": "DOACs are **P-gp ± CYP3A4 substrates**. Strong **inducers** ↓ levels → avoid: **rifampin, carbamazepine, phenytoin, St. John's wort**. **Verapamil** and **ketoconazole** are **inhibitors** → ↑ levels/bleeding (opposite direction) — included as parallel distractors. Direction is the discriminator.", "anchor": "DOAC DDI."}, {"id": "DO-8", "subtopic": "DOACs", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "For acute VTE, which DOAC regimen uses a single-drug approach with NO parenteral lead-in?", "opts": ["Dabigatran after 5 days of LMWH", "Edoxaban after 5 days of LMWH", "Warfarin bridged with enoxaparin", "Apixaban 10 mg BID x7 days then 5 mg BID"], "ans": 3, "exp": "**Apixaban** (10 mg BID ×7d → 5 mg BID) and **rivaroxaban** (15 mg BID ×21d → 20 mg QD) are **single-drug** VTE regimens — no heparin lead-in. **Dabigatran** and **edoxaban** require **≥5 days of parenteral** anticoagulation first. Warfarin needs a heparin bridge.", "anchor": "VTE DOAC regimens."}, {"id": "DO-9", "subtopic": "DOACs", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient with triple-positive antiphospholipid syndrome needs long-term anticoagulation. Best choice?", "opts": ["Warfarin titrated to INR 2-3", "Rivaroxaban, a factor Xa inhibitor", "Apixaban, a factor Xa inhibitor", "Dabigatran, a thrombin inhibitor"], "ans": 0, "exp": "In **antiphospholipid syndrome (esp. triple-positive)**, DOACs (rivaroxaban in the TRAPS trial) had **more arterial thrombotic events** → **warfarin (INR 2–3) is preferred**. This is a guideline carve-out where DOACs underperform despite being convenient.", "anchor": "APS — TRAPS."}, {"id": "DO-10", "subtopic": "DOACs", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which DOAC has the LOWEST renal elimination, making it most usable in advanced CKD/hemodialysis?", "opts": ["Dabigatran", "Apixaban", "Edoxaban", "Rivaroxaban"], "ans": 1, "exp": "**Apixaban** is ~**27% renally** cleared (lowest) → most often used in severe CKD/HD (2.5–5 mg BID per criteria). **Dabigatran** is ~80% renal (most renally dependent, avoid CrCl <30 for VTE). This drives DOAC selection when kidneys are poor.", "anchor": "Renal elimination."}, {"id": "AP-1", "subtopic": "Antiplatelets / DAPT", "domain": "D1", "nabp": "1.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Clopidogrel exerts its antiplatelet effect by:", "opts": ["Irreversibly inhibiting COX-1 to block thromboxane A2", "Reversibly antagonizing the GP IIb/IIIa receptor", "Irreversibly blocking the P2Y12 ADP receptor", "Blocking the PAR-1 thrombin receptor"], "ans": 2, "exp": "Clopidogrel (Plavix) is a thienopyridine **prodrug** → active metabolite **irreversibly blocks P2Y12 (ADP)**. Aspirin = irreversible **COX-1**; abciximab/eptifibatide = **GP IIb/IIIa**; vorapaxar = **PAR-1**. Each distractor names a real, distinct antiplatelet mechanism.", "anchor": "P2Y12 MOA."}, {"id": "AP-2", "subtopic": "Antiplatelets / DAPT", "domain": "D1", "nabp": "1.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A CYP2C19 poor metabolizer post-PCI is most likely to have reduced efficacy from which agent?", "opts": ["Ticagrelor", "Prasugrel", "Aspirin", "Clopidogrel"], "ans": 3, "exp": "**Clopidogrel** requires **CYP2C19** activation → **poor metabolizers** form less active drug → ↓ platelet inhibition + ↑ stent thrombosis (**BBW/PGx**). **Ticagrelor** (active drug, not CYP-dependent) and **prasugrel** (broad esterase/CYP activation) are unaffected → preferred when PGx shows poor metabolism.", "anchor": "Clopidogrel PGx — CPIC."}, {"id": "AP-3", "subtopic": "Antiplatelets / DAPT", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A 78-year-old with prior ischemic stroke needs a P2Y12 inhibitor with DAPT after ACS. Which agent is contraindicated?", "opts": ["Prasugrel", "Clopidogrel", "Ticagrelor", "Aspirin component"], "ans": 0, "exp": "**Prasugrel (Effient)** is **contraindicated with a history of stroke/TIA** (BBW — net harm from ICH) and is used with caution if **age ≥75 or weight <60 kg**. In this patient choose **clopidogrel** or **ticagrelor**. ✓ Trap: prasugrel is the most potent but the prior-stroke history disqualifies it.", "anchor": "Prasugrel BBW."}, {"id": "AP-4", "subtopic": "Antiplatelets / DAPT", "domain": "D3", "nabp": "3.C.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which counseling point is unique to ticagrelor?", "opts": ["It is dosed once daily for convenience", "Keep the daily aspirin dose at or below 100 mg", "Avoid concurrent proton pump inhibitors", "It is a prodrug needing CYP2C19 activation"], "ans": 1, "exp": "**Ticagrelor (Brilinta)** efficacy falls when maintenance **aspirin >100 mg/day** (BBW) → keep ASA **≤100 mg**. It is **BID** (reversible, not a prodrug), and **dyspnea** is a characteristic AE. The CYP2C19-prodrug description belongs to clopidogrel.", "anchor": "Ticagrelor aspirin cap."}, {"id": "AP-5", "subtopic": "Antiplatelets / DAPT", "domain": "D1", "nabp": "1.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which P2Y12 inhibitor is intravenous with near-immediate onset and offset, used during PCI?", "opts": ["Ticagrelor", "Clopidogrel", "Cangrelor", "Vorapaxar"], "ans": 2, "exp": "**Cangrelor (Kengreal)** is an **IV, reversible, direct-acting** P2Y12 inhibitor with onset/offset in minutes — useful in PCI for patients unable to take oral agents. Vorapaxar is an oral PAR-1 antagonist (contraindicated w/ prior stroke/TIA/ICH).", "anchor": "IV P2Y12."}, {"id": "AP-6", "subtopic": "Antiplatelets / DAPT", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "After drug-eluting stent placement for stable CAD (no high bleeding risk), the typical minimum DAPT duration is:", "opts": ["2 weeks", "1 month", "24 months mandatory", "6 months"], "ans": 3, "exp": "For **stable ischemic CAD with a DES**, default DAPT is **~6 months** (shorter if high bleeding risk; longer/extended if high ischemic-low bleeding risk). **ACS** patients default to **~12 months**. Duration individualizes by ischemic vs bleeding balance (e.g., DAPT/PRECISE-DAPT scores).", "anchor": "DAPT duration."}, {"id": "AP-7", "subtopic": "Antiplatelets / DAPT", "domain": "D3", "nabp": "3.C.5", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Low-dose aspirin's antiplatelet effect lasts the lifespan of the platelet (~7-10 days) because it:", "opts": ["Irreversibly acetylates COX-1 in anucleate platelets", "Reversibly binds COX-1 with a short half-life", "Inhibits ADP-induced aggregation at P2Y12", "Chelates calcium required for aggregation"], "ans": 0, "exp": "Aspirin **irreversibly acetylates COX-1**; platelets are **anucleate** and cannot synthesize new enzyme → effect persists until new platelets form (~7–10 days). This is why aspirin is held ~5–7 days before high-bleed-risk surgery.", "anchor": "Aspirin MOA."}, {"id": "VTE-1", "subtopic": "VTE Treatment & Prophylaxis", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient has a DVT provoked by recent knee surgery (transient risk factor). Recommended anticoagulation duration?", "opts": ["6 weeks", "3 months", "Indefinite/extended therapy", "Until the INR is therapeutic once"], "ans": 1, "exp": "VTE **provoked by a major transient risk factor** (surgery/trauma) → **3 months** then stop. **Unprovoked** proximal DVT/PE → ≥3 months with consideration of **extended** therapy. Recurrence risk drives the decision; a single transient provoker favors stopping at 3 months.", "anchor": "VTE duration — CHEST."}, {"id": "VTE-2", "subtopic": "VTE Treatment & Prophylaxis", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": true, "recall": false, "stem": "A patient with active colon cancer and a new DVT plus a recent GI bleed needs anticoagulation. Best choice?", "opts": ["Rivaroxaban, an oral factor Xa inhibitor", "Edoxaban, an oral factor Xa inhibitor", "Low-molecular-weight heparin (dalteparin)", "Warfarin titrated to an INR of 2 to 3"], "ans": 2, "exp": "Current guidance: cancer-associated VTE may use a **DOAC (apixaban/rivaroxaban/edoxaban) OR LMWH**, but with **luminal GI (or GU) tumors / recent GI bleed**, **LMWH** (or apixaban) is preferred because edoxaban/rivaroxaban raised **major GI bleeding**. Warfarin is inferior in cancer. ℹ Apixaban is a reasonable oral alternative here.", "anchor": "Cancer VTE — NCCN/ASH/ASCO 2024."}, {"id": "VTE-3", "subtopic": "VTE Treatment & Prophylaxis", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Standard pharmacologic VTE prophylaxis for a hospitalized acutely-ill medical patient with normal renal function is:", "opts": ["Enoxaparin 1 mg/kg SQ q12h", "Apixaban 10 mg BID", "Warfarin to INR 2-3", "Enoxaparin 40 mg SQ once daily"], "ans": 3, "exp": "Prophylaxis = **enoxaparin 40 mg SQ daily** (or UFH 5000 units SQ q8–12h, or fondaparinux). The **1 mg/kg q12h** regimen is **treatment** dose. Mechanical prophylaxis when bleeding risk is high. Match dose to indication — a classic prophylaxis-vs-treatment trap.", "anchor": "VTE prophylaxis."}, {"id": "VTE-4", "subtopic": "VTE Treatment & Prophylaxis", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "SATA", "aware": false, "recall": false, "stem": "A patient with a large PE develops hemodynamic instability (massive PE). Which are appropriate considerations? Select all that apply.", "opts": ["Systemic thrombolysis with alteplase if no contraindication", "IV unfractionated heparin", "Catheter-directed therapy/embolectomy if thrombolysis contraindicated", "Start warfarin monotherapy without parenteral overlap", "IVC filter if anticoagulation is absolutely contraindicated"], "ans": [0, 1, 2, 4], "exp": "**Massive (high-risk) PE** → **systemic thrombolysis (alteplase)** if no contraindication, anticoagulate with **IV UFH** (titratable, reversible), and consider **catheter-directed/embolectomy** if lysis is contraindicated; **IVC filter** only when anticoagulation is **contraindicated**. **Warfarin monotherapy without parenteral overlap is wrong** — it has a slow onset and an early procoagulant phase.", "anchor": "Massive PE."}, {"id": "AF-1", "subtopic": "AFib Stroke Prevention", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A 70-year-old man with AFib, hypertension, and diabetes (CHA2DS2-VASc = 3) — best antithrombotic strategy?", "opts": ["Oral anticoagulation, a DOAC preferred", "Aspirin 81 mg daily as monotherapy", "Dual antiplatelet therapy with aspirin", "No antithrombotic therapy is needed"], "ans": 0, "exp": "CHA2DS2-VASc ≥2 (men) → **oral anticoagulation**, and per the **2023 ACC/AHA/ACCP/HRS** guideline a **DOAC is preferred over warfarin** in eligible (nonvalvular) patients. **Aspirin/DAPT is not adequate** stroke prevention in AFib. Score components: CHF, HTN, Age≥75 (2), DM, Stroke/TIA (2), Vascular dz, Age 65–74, Sex (female).", "anchor": "AFib OAC — 2023 AF guideline."}, {"id": "AF-2", "subtopic": "AFib Stroke Prevention", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "What is the correct role of the HAS-BLED score in an AFib patient who qualifies for anticoagulation?", "opts": ["Use it to withhold anticoagulation when ≥3", "Use it to identify and modify bleeding risk factors", "It replaces CHA2DS2-VASc for therapy decisions", "It selects the specific DOAC dose"], "ans": 1, "exp": "**HAS-BLED** flags and prompts correction of **modifiable bleeding risks** (uncontrolled BP, labile INR, NSAIDs/alcohol) and closer follow-up — a **high score is NOT a reason to withhold** indicated anticoagulation. Stroke-risk (CHA2DS2-VASc) decides *whether* to anticoagulate; HAS-BLED informs *how safely*.", "anchor": "Bleeding risk scoring."}, {"id": "AF-3", "subtopic": "AFib Stroke Prevention", "domain": "D3", "nabp": "3.C.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "An AFib patient with a strong contraindication to long-term anticoagulation (recurrent serious bleeding) may be offered:", "opts": ["Lifelong aspirin plus clopidogrel", "Higher-intensity warfarin (INR 3-4)", "Left atrial appendage occlusion device", "Cangrelor infusion"], "ans": 2, "exp": "**Left atrial appendage occlusion (e.g., Watchman)** is a non-pharmacologic option (2023 guideline **Class 2a**) for AFib patients with a **long-term contraindication to anticoagulation**. DAPT and intensified warfarin add bleeding risk; cangrelor is an IV PCI agent, irrelevant here.", "anchor": "LAAO — 2023 AF guideline."}, {"id": "AF-4", "subtopic": "AFib Stroke Prevention", "domain": "D3", "nabp": "3.C.2", "tier": "T1", "type": "MCQ", "aware": false, "recall": false, "stem": "Which AFib patient requires warfarin rather than a DOAC?", "opts": ["AFib with stable CKD stage 3", "AFib with a prior GI bleed now resolved", "AFib with controlled heart failure", "AFib with rheumatic mitral stenosis"], "ans": 3, "exp": "**Moderate-to-severe (rheumatic) mitral stenosis** and **mechanical valves** define 'valvular AFib' → **warfarin only**; DOACs lack evidence/are contraindicated. The other scenarios are 'nonvalvular' and DOAC-eligible.", "anchor": "Valvular AFib."}, {"id": "SP-1", "subtopic": "Special Populations & Periprocedural", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "A pregnant patient requires therapeutic anticoagulation for VTE. Preferred agent?", "opts": ["Low-molecular-weight heparin", "Warfarin, a vitamin K antagonist", "Rivaroxaban, a factor Xa inhibitor", "Dabigatran, a thrombin inhibitor"], "ans": 0, "exp": "**LMWH** is preferred in pregnancy — it does **not cross the placenta**. **Warfarin is teratogenic** (warfarin embryopathy, 1st trimester) and avoided except some mechanical valves under specialist care. **DOACs are not recommended** in pregnancy/lactation (limited data, placental transfer).", "anchor": "Pregnancy."}, {"id": "SP-2", "subtopic": "Special Populations & Periprocedural", "domain": "D3", "nabp": "3.D.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on warfarin (mechanical mitral valve) needs an elective colonoscopy with possible polypectomy. Best periprocedural plan?", "opts": ["Continue warfarin unchanged through the procedure", "Hold warfarin and bridge with therapeutic LMWH/UFH", "Stop warfarin with no bridging", "Switch permanently to a DOAC before the procedure"], "ans": 1, "exp": "A **mechanical mitral valve** is **high thromboembolic risk** → **bridge** with therapeutic LMWH/UFH when interrupting warfarin for a high-bleed-risk procedure. (Most **AFib** patients do **not** need bridging — BRIDGE trial.) DOACs are contraindicated with mechanical valves, so switching is wrong.", "anchor": "Periprocedural bridging."}, {"id": "SP-3", "subtopic": "Special Populations & Periprocedural", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": true, "recall": false, "stem": "Per the 2024 ANNEXA-I trial, andexanet alfa for factor Xa inhibitor-related intracranial hemorrhage:", "opts": ["Reduced both mortality and thrombosis dramatically", "Had no effect on hematoma expansion", "Reduced hematoma expansion but increased thrombotic events", "Was equivalent to idarucizumab for dabigatran bleeds"], "ans": 2, "exp": "**ANNEXA-I (2024)** showed andexanet **reduced hematoma expansion** vs usual care but with an **↑ in thrombotic events (notably stroke)** and **no clear mortality/disability benefit** — tempering enthusiasm and reinforcing case-by-case use. ℹ Idarucizumab is dabigatran-specific, not interchangeable.", "anchor": "ANNEXA-I 2024."}, {"id": "SP-4", "subtopic": "Special Populations & Periprocedural", "domain": "D3", "nabp": "3.C.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which combination most increases GI bleeding risk and should prompt gastroprotection or reassessment?", "opts": ["Apixaban plus acetaminophen", "Clopidogrel plus a statin", "Enoxaparin plus levothyroxine", "Warfarin plus chronic NSAID plus aspirin"], "ans": 3, "exp": "**Anticoagulant + NSAID + antiplatelet** ('triple' antithrombotic/NSAID overlap) markedly ↑ **GI bleeding** → avoid NSAIDs, add a **PPI**, minimize duration. Acetaminophen (high chronic doses can ↑ INR but low bleed risk), statins, and levothyroxine don't carry this additive bleeding hazard.", "anchor": "Bleeding DDI."}, {"id": "W-8", "subtopic": "Warfarin / VKA", "domain": "D3", "nabp": "3.C.5", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient started on warfarin without parenteral overlap develops painful skin lesions/necrosis on day 3. The underlying mechanism is:", "opts": ["Early protein C fall causing transient hypercoagulability", "Heparin-PF4 immune antibody complex formation", "Direct dermal toxicity from vitamin K depletion", "Accumulation of the active S-warfarin enantiomer"], "ans": 0, "exp": "**Warfarin-induced skin necrosis** stems from the **early drop in protein C** (short half-life, anticoagulant) before factors II/IX/X fall → transient **hypercoagulability** and dermal microthrombosis; risk ↑ in **protein C/S deficiency** and with no heparin overlap. Prevent by **bridging** and avoiding large loading doses.", "anchor": "Warfarin skin necrosis."}, {"id": "H-6", "subtopic": "HIT", "domain": "D3", "nabp": "3.C.2", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which agents are acceptable to anticoagulate a patient with acute HIT (no current heparin exposure)? Select all that apply.", "opts": ["Argatroban", "Bivalirudin", "Fondaparinux", "Enoxaparin", "Unfractionated heparin", "Apixaban"], "ans": [0, 1, 2, 5], "exp": "HIT-acceptable = **non-heparin** anticoagulants: **argatroban**, **bivalirudin** (direct thrombin inhibitors), **fondaparinux**, and **DOACs (apixaban)** once stable. **Enoxaparin and UFH are contraindicated** — they perpetuate the PF4-antibody process. Parallel decoys mix safe and unsafe agents.", "anchor": "HIT-safe agents."}, {"id": "DO-11", "subtopic": "DOACs", "domain": "D3", "nabp": "3.D.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on apixaban (normal renal function) needs a high-bleed-risk elective surgery. Standard preoperative hold is:", "opts": ["Continue through surgery; no hold needed", "Hold approximately 48 hours before the procedure", "Hold 14 days before the procedure", "Bridge with therapeutic LMWH after the last dose"], "ans": 1, "exp": "For DOACs with **normal renal function**, hold **~48 h** before **high-bleed-risk** surgery (24 h for low risk); longer if CrCl is reduced (dabigatran especially, being renally cleared). ⚠ **Routine bridging is NOT needed** for DOACs — their short half-life is the point (PAUSE trial).", "anchor": "Periprocedural DOAC — PAUSE."}, {"id": "AP-8", "subtopic": "Antiplatelets / DAPT", "domain": "D3", "nabp": "3.C.3", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient takes cardioprotective aspirin and frequently uses ibuprofen for arthritis. The key interaction is that ibuprofen:", "opts": ["Irreversibly potentiates aspirin's COX-1 effect", "Induces CYP2C19 and lowers serum aspirin levels", "Competitively blocks aspirin's access to platelet COX-1", "Has no interaction regardless of dosing time"], "ans": 2, "exp": "**Ibuprofen** reversibly occupies the **COX-1** site and can **block aspirin's irreversible acetylation** → blunted antiplatelet/cardioprotective effect. Counsel: take **aspirin ≥30 min before** or **≥8 h after** ibuprofen, or use an alternative analgesic; this competition does not occur with acetaminophen.", "anchor": "ASA-NSAID interaction."}, {"id": "VTE-5", "subtopic": "VTE Treatment & Prophylaxis", "domain": "D3", "nabp": "3.D.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "After 6 months for an unprovoked PE, a patient continues extended apixaban for secondary prevention. The appropriate extended-phase dose is:", "opts": ["10 mg twice daily", "5 mg twice daily", "5 mg once daily", "2.5 mg twice daily"], "ans": 3, "exp": "Extended (secondary-prevention) apixaban after ≥6 months of treatment is **2.5 mg BID** (AMPLIFY-EXT) — it retains efficacy with less bleeding. Contrast the **treatment** phase (10 mg BID ×7d → 5 mg BID). Rivaroxaban's extended dose is 10 mg daily.", "anchor": "Extended VTE — AMPLIFY-EXT."}, {"id": "AF-5", "subtopic": "AFib Stroke Prevention", "domain": "D3", "nabp": "3.D.1", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "An AFib patient (duration >48 h or unknown) is scheduled for elective electrical cardioversion. Correct anticoagulation approach?", "opts": ["Anticoagulate ≥3 weeks before and ≥4 weeks after cardioversion", "Anticoagulate only for 24 hours after the procedure", "No anticoagulation if rhythm normalizes", "Give a single aspirin dose pre-procedure"], "ans": 0, "exp": "AFib ≥48 h (or unknown duration) → **therapeutic anticoagulation ≥3 weeks before and ≥4 weeks after** cardioversion (atrial stunning prolongs clot risk post-conversion), OR a **TEE-guided** strategy to exclude thrombus, then anticoagulate. Continue long-term per CHA2DS2-VASc.", "anchor": "Cardioversion anticoagulation."}, {"id": "AF-6", "subtopic": "AFib Stroke Prevention", "domain": "D2", "nabp": "2.A.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Rivaroxaban for nonvalvular AFib with CrCl 35 mL/min should be dosed as:", "opts": ["20 mg once daily with the evening meal", "15 mg once daily with the evening meal", "2.5 mg twice daily", "10 mg once daily without food"], "ans": 1, "exp": "Rivaroxaban (Xarelto) AFib dose is **20 mg QD with the evening meal**, reduced to **15 mg QD** when **CrCl 15–50**. CrCl 35 → **15 mg with food**. Avoid if CrCl <15. The 2.5 mg BID is the CAD/PAD vascular dose, not AFib.", "anchor": "Rivaroxaban renal AFib dose."}, {"id": "RV-1", "subtopic": "Reversal & Bleeding Management", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Match the urgent reversal/antidote correctly. Select all CORRECT antidote pairings.", "opts": ["Dabigatran — idarucizumab", "Apixaban/rivaroxaban — andexanet alfa", "Unfractionated heparin — protamine", "Warfarin major bleed — 4-factor PCC + IV vitamin K", "Enoxaparin — andexanet alfa", "Fondaparinux — protamine"], "ans": [0, 1, 2, 3], "exp": "Correct: **dabigatran→idarucizumab (Praxbind)**; **apixaban/rivaroxaban→andexanet (Andexxa)**; **UFH→protamine**; **warfarin major bleed→4F-PCC (Kcentra)+IV vitamin K**. Wrong: enoxaparin is only **partially** reversed by **protamine** (not andexanet); **fondaparinux has no effective antidote** (protamine does not work).", "anchor": "Antidote matrix."}, {"id": "RV-2", "subtopic": "Reversal & Bleeding Management", "domain": "D3", "nabp": "3.C.6", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "A patient on dabigatran with renal impairment has life-threatening bleeding and idarucizumab is temporarily unavailable. Besides supportive care and PCC, which option uniquely helps because of dabigatran's properties?", "opts": ["Protamine sulfate, given by infusion", "Oral vitamin K (phytonadione)", "Hemodialysis to clear circulating drug", "Andexanet alfa, the Xa decoy protein"], "ans": 2, "exp": "**Dabigatran is dialyzable** (low protein binding, renally cleared) → **hemodialysis** can remove it — a property unique among DOACs (the -xabans are highly protein-bound, not dialyzable). Protamine (heparin) and vitamin K (warfarin) don't apply; andexanet targets Xa inhibitors, not dabigatran.", "anchor": "Dabigatran dialysis."}, {"id": "SP-5", "subtopic": "Special Populations & Periprocedural", "domain": "D3", "nabp": "3.D.2", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Which monitoring statement is most accurate for LMWH (enoxaparin)?", "opts": ["Routine aPTT titration is required in all patients", "INR is the preferred monitoring test for LMWH", "Platelets never require any monitoring on LMWH", "Anti-Xa can guide dosing in select populations"], "ans": 3, "exp": "LMWH usually needs **no routine monitoring**, but **anti-Xa (peak, ~4 h post-dose)** is reasonable in **pregnancy, severe obesity, renal impairment, or extremes of weight**. aPTT/INR don't track LMWH reliably. Platelets should still be watched — **HIT is less common but possible** with LMWH.", "anchor": "LMWH monitoring."}, {"id": "BC-1", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": true, "stem": "Eliquis is the brand name for which anticoagulant?", "opts": ["Apixaban, a factor Xa inhibitor", "Rivaroxaban, a factor Xa inhibitor", "Dabigatran, a thrombin inhibitor", "Edoxaban, a factor Xa inhibitor"], "ans": 0, "exp": "**Eliquis = apixaban** (oral factor Xa inhibitor; 5 mg BID for AFib, reduce to 2.5 if ≥2 criteria; reversed by andexanet alfa). Xarelto = rivaroxaban, Pradaxa = dabigatran, Savaysa = edoxaban.", "anchor": "Brand recall."}, {"id": "BC-2", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T1", "type": "MCQ", "aware": false, "recall": true, "stem": "Pradaxa is the brand name for which agent?", "opts": ["Apixaban, a factor Xa inhibitor", "Dabigatran, a direct thrombin inhibitor", "Fondaparinux, a factor Xa inhibitor", "Warfarin, a vitamin K antagonist"], "ans": 1, "exp": "**Pradaxa = dabigatran** (direct thrombin/IIa inhibitor; P-gp substrate, not CYP-metabolized; reversed by idarucizumab/Praxbind; store capsules in original bottle, discard 4 months after opening; dyspepsia AE).", "anchor": "Brand recall."}, {"id": "BC-3", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": true, "stem": "Lovenox is the brand name for which anticoagulant?", "opts": ["Dalteparin, a low-molecular-weight heparin", "Fondaparinux, a synthetic pentasaccharide", "Enoxaparin, a low-molecular-weight heparin", "Tinzaparin, a low-molecular-weight heparin"], "ans": 2, "exp": "**Lovenox = enoxaparin** (LMWH; anti-Xa > anti-IIa; treatment 1 mg/kg SQ q12h, q24h if CrCl <30; prophylaxis 40 mg SQ daily; partially reversed by protamine). **Fragmin = dalteparin**; **Arixtra = fondaparinux**.", "anchor": "Brand recall."}, {"id": "BC-4", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T2", "type": "MCQ", "aware": false, "recall": true, "stem": "Brilinta is the brand name for which P2Y12 inhibitor?", "opts": ["Clopidogrel, a thienopyridine prodrug", "Prasugrel, a thienopyridine prodrug", "Cangrelor, an intravenous P2Y12 agent", "Ticagrelor, a reversible P2Y12 inhibitor"], "ans": 3, "exp": "**Brilinta = ticagrelor** (reversible, direct-acting, BID; keep aspirin ≤100 mg; dyspnea AE). **Plavix = clopidogrel**, **Effient = prasugrel**, **Kengreal = cangrelor**.", "anchor": "Brand recall."}, {"id": "BC-5", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.3", "tier": "T2", "type": "MCQ", "aware": false, "recall": false, "stem": "Aggrenox is a fixed-dose combination product containing:", "opts": ["Aspirin plus extended-release dipyridamole", "Aspirin plus clopidogrel (Plavix)", "Aspirin plus ticagrelor (Brilinta)", "Warfarin plus low-dose aspirin"], "ans": 0, "exp": "**Aggrenox = aspirin 25 mg + extended-release dipyridamole 200 mg** (BID), used for **secondary prevention of ischemic stroke/TIA**. AE: **headache** (vasodilation) is common early. There is no aspirin/clopidogrel or aspirin/ticagrelor fixed-dose combo product.", "anchor": "Combination product."}, {"id": "BC-6", "subtopic": "Brand/Generic + Combinations", "domain": "D3", "nabp": "3.C.6", "tier": "T2", "type": "MCQ", "aware": false, "recall": true, "stem": "Praxbind is the reversal agent for which drug?", "opts": ["Rivaroxaban", "Dabigatran", "Warfarin", "Enoxaparin"], "ans": 1, "exp": "**Praxbind = idarucizumab**, the antibody fragment that specifically reverses **dabigatran (Pradaxa)**. Contrast **Andexxa = andexanet alfa** (reverses apixaban/rivaroxaban) and **Kcentra = 4-factor PCC** (warfarin/off-label DOAC bleeding).", "anchor": "Antidote recall."}, {"id": "BC-7", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.1", "tier": "T2", "type": "SATA", "aware": false, "recall": false, "stem": "Which generic-to-brand pairings are correct? Select all that apply.", "opts": ["Fondaparinux — Arixtra", "Edoxaban — Savaysa", "Warfarin — Coumadin", "Rivaroxaban — Pradaxa", "Argatroban — Kengreal", "Dalteparin — Fragmin"], "ans": [0, 1, 2, 5], "exp": "Correct: **fondaparinux–Arixtra**, **edoxaban–Savaysa**, **warfarin–Coumadin (Jantoven)**, **dalteparin–Fragmin**. Wrong: **rivaroxaban = Xarelto** (Pradaxa is dabigatran); **Kengreal = cangrelor** (argatroban has no distinct common brand). Parallel decoys swap real brands.", "anchor": "Brand mapping."}, {"id": "BC-8", "subtopic": "Brand/Generic + Combinations", "domain": "D2", "nabp": "2.A.2", "tier": "T3", "type": "MCQ", "aware": false, "recall": false, "stem": "Which statement about a combination/product detail is correct?", "opts": ["Apixaban must always be taken with a full meal", "Dabigatran capsules may be opened and sprinkled on food", "Rivaroxaban 2.5 mg with aspirin is used for chronic CAD/PAD vascular protection", "Enoxaparin syringes should be expelled of the air bubble before injection"], "ans": 2, "exp": "**Rivaroxaban 2.5 mg BID + low-dose aspirin** (COMPASS regimen) reduces major vascular events in **stable CAD/PAD**. Apixaban has **no food requirement**; **dabigatran capsules must NOT be opened** (↑ bioavailability ~75%); the **enoxaparin prefilled-syringe air bubble should NOT be expelled** (it ensures the full dose + reduces bruising).", "anchor": "Product/admin detail."}];
const LET = "ABCDEF";
// ---- storage wrapper (localStorage + in-memory fallback) ----
const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="anticoag_log_v1", MISSKEY="anticoag_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

// ---- helpers ----
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }

// ---- dashboard ----
function renderDash(){
  const subs = subtopics();
  let s = `<div class="card"><h2>Build your set</h2>
    <div class="row">
      <div><label>Domain</label><select id="fDom"><option value="">All</option>
        <option>D1</option><option>D2</option><option>D3</option><option>D4</option><option>D5</option></select></div>
      <div><label>Tier</label><select id="fTier"><option value="">All</option>
        <option>T1</option><option>T2</option><option>T3</option></select></div>
      <div><label>Count</label><select id="fCount"><option value="0">All</option>
        <option>10</option><option>20</option><option>30</option><option>40</option></select></div>
      <div><label>Order</label><select id="fShuf"><option value="1">Shuffle</option><option value="0">In order</option></select></div>
    </div>
    <div style="margin-top:12px"><label>Subtopics
      <span style="float:right">
        <button class="tag-link" onclick="allSubs(true)">Select all</button>
        <button class="tag-link" onclick="allSubs(false)">Clear</button></span></label>
      <div class="subtopics" id="subs">`;
  subs.forEach((sub,i)=>{ const n=ITEMS.filter(x=>x.subtopic===sub).length;
    s += `<label><input type="checkbox" class="subck" value="${i}" checked onchange="liveCount()"> ${sub} <span class="count-pill">(${n})</span></label>`; });
  s += `</div></div>
    <div class="count-pill" id="live" style="margin-top:6px"></div>
    <button class="bigbtn" id="startBtn" onclick="startQuiz()">Start quiz</button></div>`;
  el('dash').innerHTML = s;
  ['fDom','fTier','fCount','fShuf'].forEach(id=>el(id).onchange=liveCount);
  liveCount();
}
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  const subs = subtopics();
  const chosen = [...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
  const dom = el('fDom').value, tier = el('fTier').value;
  let pool = ITEMS.filter(i=>chosen.includes(i.subtopic));
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const want = +el('fCount').value;
  const n = want? Math.min(want,pool.length): pool.length;
  el('live').textContent = `${pool.length} match filters · quiz of ${n}`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

// ---- quiz state ----
let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false;
function buildItem(it){
  // shuffle option order; remap answer indices
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  const want = +el('fCount').value;
  if(+el('fShuf').value) pool = shuffle(pool);
  if(want) pool = pool.slice(0,want);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
let answered=false, picks=[];
function renderQ(){
  answered=false; picks=[];
  const it=Q[qi];
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];
  let b=`<div class="badge ${tierC}">${it.tier}</div><div class="badge b-dom">${it.domain}</div>
    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  const isSata = it.type==='SATA';
  let h=`<div class="card">
    <div class="topbar"><span>Question ${qi+1} / ${Q.length}${retestMode?' · retest':''}</span><span>Score ${score}</span></div>
    <div class="bar"><div style="width:${(qi/Q.length)*100}%"></div></div>
    <div class="badges">${b}</div>
    <div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div>
    <div id="opts">`;
  it.opts.forEach((o,i)=>{ h+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
    <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
  h+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>
    <div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=h;
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok){ const m=getMissed(); const k=m.indexOf(it.id); if(retestMode&&k>=0){m.splice(k,1);setMissed(m);} }
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+al}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
// ---- progress ----
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button onclick="if(confirm('Reset all progress?')){store.set('${LOGKEY}',[]);store.set('${MISSKEY}',[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
// ---- light markdown render (bold, arrows already unicode) ----
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
// keyboard
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  if(!answered){ const it=Q[qi]; if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA'); }
  else if(e.key==='Enter')nextQ();
});
renderDash();
</script>
</body></html>
