months**. It is the injectable INSTI PrEP option (distinct from lenacapavir's twice-yearly schedule).", "anchor": "Apretude PI"}, {"id": "HIV-204", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Lenacapavir (Yeztugo), FDA-approved in 2025 for PrEP, is notable for which dosing feature?", "opts": ["A daily oral tablet that must be taken with a fatty meal", "An intramuscular injection that is administered once each month", "A transdermal patch that is replaced once every week", "A subcutaneous injection given twice yearly (every 6 months)"], "ans": 3, "exp": "ℹ **Yeztugo (lenacapavir) = first twice-yearly (every 6 months) subcutaneous PrEP** (capsid inhibitor; FDA-approved June 2025; PURPOSE 1/2 trials). After oral + SC initiation dosing, maintenance is **SC q6 months** — the longest-acting PrEP option.", "anchor": "Yeztugo PI; PURPOSE trials"}, {"id": "HIV-205", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T1", "nabp": "3.B", "stem": "What must be confirmed immediately before initiating any form of PrEP?", "opts": ["A documented negative HIV test", "A CD4 count above 500 cells/mm³", "A therapeutic tenofovir drug level", "A negative pregnancy test in all patients"], "ans": 0, "exp": "**A negative HIV test is required before starting PrEP** (and at follow-up intervals) — starting PrEP in undiagnosed HIV is effectively functional monotherapy and **selects resistance**. Baseline renal function and STI screening are also obtained.", "anchor": "CDC PrEP guidance"}, {"id": "HIV-206", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "Which ongoing monitoring is appropriate for a patient on daily oral TDF/FTC PrEP?", "opts": ["Monthly liver biopsies to assess the degree of hepatic fibrosis", "HIV testing about every 3 months with renal function and STI screening", "Weekly complete blood counts to watch for bone marrow suppression", "Annual echocardiography to estimate the patient's cardiac output"], "ans": 1, "exp": "Oral PrEP follow-up: **HIV test ~every 3 months** (confirm still negative), plus **renal function** (TDF) and **STI screening**, with adherence counseling. Injectable PrEP follows its own visit/testing cadence tied to the injection schedule.", "anchor": "CDC PrEP guidance"}, {"id": "HIV-207", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "Post-exposure prophylaxis (PEP) after a high-risk exposure should be started within what window, and for how long?", "opts": ["Within 2 weeks, continued for 7 days", "Within 24 hours, continued indefinitely", "Within 72 hours, continued for 28 days", "Anytime within 30 days, continued for 90 days"], "ans": 2, "exp": "**PEP: start as soon as possible and within 72 hours of exposure, continue for 28 days.** The sooner it begins, the better; after 72 hours it is not recommended. Confirm baseline HIV-negative status and follow up testing.", "anchor": "CDC PEP guidance"}, {"id": "HIV-208", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "What is the preferred regimen structure for HIV post-exposure prophylaxis?", "opts": ["A single oral nucleoside analogue taken once daily as monotherapy", "A boosted protease inhibitor used by itself as a one-drug regimen", "An NNRTI such as nevirapine combined with one nucleoside analogue", "An integrase inhibitor plus two NRTIs (e.g., TDF/FTC + dolutegravir)"], "ans": 3, "exp": "**PEP = INSTI + 2 NRTIs**, typically **TDF/FTC (or TAF/FTC) plus dolutegravir or raltegravir** for 28 days — mirroring a potent, well-tolerated treatment regimen. Nevirapine is avoided (hepatotoxicity).", "anchor": "CDC PEP guidance"}, {"id": "HIV-209", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "Why is it critical to exclude established HIV infection before starting PrEP?", "opts": ["Using two-drug PrEP in undiagnosed HIV can select for drug resistance", "PrEP drugs are inactive in anyone already infected with HIV", "PrEP causes severe hypersensitivity in HIV-positive patients", "PrEP automatically converts to a full treatment regimen if HIV is present"], "ans": 0, "exp": "**PrEP is a two-drug regimen; in undiagnosed HIV it acts as functional monotherapy → resistance** (jeopardizing future treatment options). Hence the mandatory negative HIV test before and during PrEP.", "anchor": "CDC PrEP guidance"}, {"id": "HIV-210", "type": "SATA", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Which statements about HIV pre-exposure prophylaxis (PrEP) options are correct? Select all that apply.", "opts": ["Oral TDF/FTC (Truvada) is a first-line daily PrEP option", "Injectable cabotegravir (Apretude) is given intramuscularly every 2 months", "Injectable lenacapavir (Yeztugo) is given subcutaneously every 6 months", "A negative HIV test is required before starting and during PrEP", "Descovy (TAF/FTC) is preferred for those at risk through receptive vaginal sex"], "ans": [0, 1, 2, 3], "exp": "True: **TDF/FTC oral**, **Apretude IM q2 months**, **Yeztugo SC q6 months (2025)**, **negative HIV test required**. False: **Descovy is NOT indicated for receptive vaginal exposure** — TDF/FTC is used there.", "anchor": "CDC PrEP guidance; Yeztugo/Apretude PIs"}, {"id": "HIV-211", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D4", "tier": "T2", "nabp": "4.A", "stem": "Which counseling point is appropriate for a patient starting oral PrEP?", "opts": ["PrEP eliminates the need for any HIV testing going forward", "PrEP reduces but does not eliminate HIV risk; continue testing, adherence, and STI prevention", "PrEP also fully protects against all other sexually transmitted infections", "PrEP should be stopped immediately if a single dose is missed"], "ans": 1, "exp": "Counsel that **PrEP substantially lowers but does not eliminate HIV risk**, requires **good adherence and ongoing HIV/STI testing**, and **does not prevent other STIs** — so condoms/risk-reduction still matter. A single missed dose does not warrant stopping.", "anchor": "CDC PrEP guidance"}, {"id": "HIV-212", "type": "SATA", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statements about HIV post-exposure prophylaxis (PEP) are correct? Select all that apply.", "opts": ["It should be started within 72 hours of exposure", "It is continued for a total of 28 days", "The preferred regimen is an integrase inhibitor plus two NRTIs", "Baseline HIV testing should be performed before starting", "It should be continued indefinitely as lifelong therapy"], "ans": [0, 1, 2, 3], "exp": "PEP: **start <72 h**, **28-day course**, **INSTI + 2 NRTIs**, **baseline HIV test** first (and follow-up testing). It is a finite 28-day course, not lifelong — last option false.", "anchor": "CDC PEP guidance"}, {"id": "HIV-221", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "At what CD4 threshold is primary Pneumocystis (PCP) prophylaxis indicated, and with which preferred agent?", "opts": ["CD4 < 50; weekly azithromycin", "CD4 < 100; oral fluconazole", "CD4 < 200; trimethoprim-sulfamethoxazole", "CD4 < 350; daily valganciclovir"], "ans": 2, "exp": "**PCP prophylaxis: CD4 < 200 → TMP-SMX** (one DS or SS daily; also covers toxoplasmosis). Alternatives for sulfa intolerance: dapsone, atovaquone, aerosolized pentamidine. (Azithromycin = MAC; fluconazole = certain fungals.)", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-222", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A patient on TMP-SMX for PCP prophylaxis receives the added benefit of preventing which other opportunistic infection?", "opts": ["Mycobacterium avium complex", "Cytomegalovirus retinitis", "Cryptococcal meningitis", "Toxoplasma gondii encephalitis"], "ans": 3, "exp": "**TMP-SMX also prevents toxoplasmosis** (indicated at **CD4 < 100 with positive Toxo IgG**), conveniently covering both with one agent. MAC, CMV, and Cryptococcus require different strategies.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-223", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient who needs PCP prophylaxis has a documented severe sulfonamide allergy. Which alternative requires checking G6PD status first?", "opts": ["Dapsone", "Atovaquone", "Aerosolized pentamidine", "Azithromycin"], "ans": 0, "exp": "**Dapsone can cause hemolysis in G6PD deficiency → check G6PD before use.** Other sulfa-free PCP options: **atovaquone** and **aerosolized pentamidine**. Dapsone also covers toxoplasmosis when combined with pyrimethamine/leucovorin.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-224", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Under current DHHS opportunistic-infection guidance, when is primary prophylaxis against Mycobacterium avium complex (MAC) indicated?", "opts": ["It is recommended for every patient with CD4 below 50 regardless of ART", "It is no longer routine for patients who promptly start effective ART", "It is recommended for every newly diagnosed patient before starting ART", "It is recommended for all patients with CD4 below 200 as standard care"], "ans": 1, "exp": "ℹ **Primary MAC prophylaxis is NO LONGER routinely recommended for patients who promptly start effective ART, regardless of CD4.** It is reserved for CD4 < 50 in those **not on ART, viremic on ART, or without a fully suppressive option** (then weekly azithromycin). Major currency update.", "anchor": "DHHS OI Guidelines (2024 update)"}, {"id": "HIV-225", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "When can primary PCP prophylaxis generally be discontinued?", "opts": ["As soon as antiretroviral therapy is started, regardless of CD4", "Only after the CD4 count exceeds 500 permanently", "Once the CD4 count is > 200 for at least 3 months on ART", "It must be continued lifelong once initiated"], "ans": 2, "exp": "**Stop PCP (and toxoplasmosis) prophylaxis when CD4 > 200 for ≥ 3 months on ART**; restart if CD4 falls below 200 again. This CD4-guided start/stop logic is high-yield.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-226", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Primary prophylaxis against Toxoplasma encephalitis is indicated under which condition?", "opts": ["CD4 < 200 in any patient regardless of serology", "CD4 < 50 with a negative Toxoplasma IgG antibody", "Any CD4 count if the patient owns a cat", "CD4 < 100 with a positive Toxoplasma IgG antibody"], "ans": 3, "exp": "**Toxoplasmosis prophylaxis: CD4 < 100 AND positive Toxo IgG** → TMP-SMX (the same agent used for PCP at CD4 < 200). Seronegative patients are not given primary prophylaxis but should avoid exposure.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-227", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T3", "nabp": "3.C.2", "stem": "When primary MAC prophylaxis IS indicated (CD4 < 50 and unable to take effective ART), which agent is preferred?", "opts": ["Weekly azithromycin", "Daily oral fluconazole", "Daily valganciclovir", "Intravenous amphotericin B"], "ans": 0, "exp": "When indicated, **MAC primary prophylaxis = azithromycin (commonly 1,200 mg weekly)** or clarithromycin. **Rule out active disseminated MAC first** (blood culture) to avoid macrolide monotherapy and resistance. Most patients starting ART promptly no longer need it.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-228", "type": "SATA", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Which opportunistic-infection prophylaxis statements are correct? Select all that apply.", "opts": ["PCP prophylaxis is indicated at CD4 < 200 using TMP-SMX", "Toxoplasmosis prophylaxis is indicated at CD4 < 100 with positive IgG", "PCP and toxo prophylaxis can stop when CD4 > 200 for ≥ 3 months on ART", "Primary MAC prophylaxis is no longer routine for those promptly starting effective ART", "All patients with CD4 < 50 require lifelong MAC prophylaxis regardless of ART"], "ans": [0, 1, 2, 3], "exp": "True: **PCP < 200 (TMP-SMX)**, **Toxo < 100 + IgG+**, **stop PCP/Toxo at CD4 > 200 ×3 mo on ART**, **MAC primary prophylaxis no longer routine with prompt effective ART**. The blanket lifelong-MAC claim is false.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-229", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T3", "nabp": "3.C.3", "stem": "A patient with HIV has a positive latent tuberculosis test. What is the key consideration when treating it?", "opts": ["Latent tuberculosis should simply not be treated in HIV-positive patients", "Treat latent TB but manage rifamycin–ARV interactions (rifabutin if needed)", "Use a fixed 28-day course identical in structure to HIV PEP regimens", "Defer all tuberculosis treatment until the CD4 count rises above 500"], "ans": 1, "exp": "**Treat latent TB in HIV** (high progression risk) with isoniazid (+ pyridoxine) or a rifamycin-based regimen — but **rifampin/rifapentine strongly induce CYP3A**, so coordinate with the ARV regimen (often **rifabutin** with boosted regimens). Rule out active TB first.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-230", "type": "MCQ", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Before starting azithromycin for MAC prophylaxis in an eligible patient, what must be done?", "opts": ["First confirm that the CD4 count is above 200 cells per cubic millimeter", "Obtain a CCR5 co-receptor tropism assay before giving the macrolide", "Rule out active disseminated MAC disease, for example with a blood culture", "Administer an intravenous azithromycin loading dose before oral therapy"], "ans": 2, "exp": "**Rule out active disseminated MAC (clinical assessment ± blood culture) before prophylaxis** — giving single-agent macrolide to someone with active disease risks **macrolide resistance**. Prophylaxis is for CD4 < 50 without effective ART.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-241", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T1", "nabp": "3.C.5", "stem": "What is the approach to antiretroviral therapy in pregnancy?", "opts": ["Withhold ART until after the first trimester in all patients", "Use only a single NRTI to minimize fetal exposure", "Stop ART during labor to reduce drug transfer", "Treat all pregnant patients with ART, aiming for an undetectable viral load"], "ans": 3, "exp": "**All pregnant patients should receive ART, with the goal of viral suppression** to protect maternal health and prevent perinatal transmission. Integrase-based regimens (e.g., dolutegravir) are recommended; an earlier neural-tube-defect signal was not confirmed on larger data.", "anchor": "DHHS Perinatal Guidelines"}, {"id": "HIV-242", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "Intrapartum intravenous zidovudine is recommended in which situation?", "opts": ["When the maternal viral load is above 1,000 copies/mL or is unknown", "At every delivery regardless of the maternal HIV viral load", "Only when the mother has never received any antiretroviral therapy", "Only for scheduled cesarean deliveries occurring before 37 weeks"], "ans": 0, "exp": "**Intrapartum IV zidovudine is given when maternal HIV RNA is > 1,000 copies/mL or unknown near delivery** (added protection against transmission). With sustained suppression (<1,000), it is generally not required. Infant antiretroviral prophylaxis is also given.", "anchor": "DHHS Perinatal Guidelines"}, {"id": "HIV-243", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T1", "nabp": "3.C.5", "stem": "Which NRTI backbone is preferred in a patient with HIV and chronic hepatitis B coinfection?", "opts": ["An abacavir plus lamivudine nucleoside analogue backbone", "A tenofovir-based backbone (TDF or TAF) combined with emtricitabine", "A zidovudine plus lamivudine nucleoside analogue backbone", "A nucleoside-sparing regimen that uses no NRTI backbone at all"], "ans": 1, "exp": "**Tenofovir (TDF or TAF) is active against both HIV and HBV → preferred backbone in coinfection** (with FTC). It suppresses both viruses and reduces the flare risk associated with inadequate HBV coverage.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-244", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "What can happen if HBV-active antiretrovirals are abruptly stopped in a coinfected patient?", "opts": ["An immediate cure of the hepatitis B infection", "Permanent loss of all HIV drug activity", "A hepatitis B flare with hepatic decompensation", "Spontaneous seroconversion to HIV-negative status"], "ans": 2, "exp": "**Abruptly stopping HBV-active agents (tenofovir, lamivudine, emtricitabine) can cause a hepatitis B flare**, sometimes severe. Maintain HBV coverage, change regimens carefully, and monitor LFTs in coinfected patients.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-245", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.4", "stem": "In a patient with significant renal impairment, which tenofovir-related adjustment is appropriate?", "opts": ["Prefer TDF over TAF because it is renally protective", "Tenofovir products require no adjustment at any renal function", "Discontinue all NRTIs in renal impairment", "Avoid or dose-adjust TDF and consider TAF, with renal-based NRTI dosing"], "ans": 3, "exp": "**TDF can worsen renal function → avoid/adjust in CKD; TAF (less renal exposure) is generally preferred.** Most NRTIs are renally cleared and need **CrCl-based dose adjustment** (abacavir is the exception, being hepatically metabolized).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-246", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "Why should lamivudine or emtricitabine NOT be used as the only HBV-active drug in a coinfected patient?", "opts": ["Hepatitis B rapidly develops resistance to them when used alone", "They have no activity against hepatitis B at all", "They are contraindicated with all integrase inhibitors", "They cause immediate hepatic failure in coinfection"], "ans": 0, "exp": "**3TC/FTC monotherapy for HBV selects resistance quickly** → always pair with **tenofovir** in coinfection. They do have HBV activity, but alone they are inadequate for durable suppression.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-247", "type": "SATA", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "Which statements about HIV in pregnancy and coinfection are correct? Select all that apply.", "opts": ["All pregnant patients should receive ART aiming for viral suppression", "Intrapartum IV zidovudine is used when maternal viral load is >1,000 or unknown", "A tenofovir-based backbone is preferred with hepatitis B coinfection", "Abruptly stopping HBV-active drugs can trigger a hepatitis flare", "Lamivudine alone provides durable hepatitis B suppression in coinfection"], "ans": [0, 1, 2, 3], "exp": "True: **treat all in pregnancy**, **intrapartum AZT if VL >1,000/unknown**, **tenofovir backbone for HBV**, **flare risk on abrupt withdrawal**. False: **3TC alone is inadequate** for HBV (resistance).", "anchor": "DHHS Guidelines"}, {"id": "HIV-248", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T3", "nabp": "3.C.3", "stem": "When treating hepatitis C with direct-acting antivirals in an HIV-coinfected patient, what is a key concern?", "opts": ["Direct-acting antivirals have no interaction with antiretroviral drugs", "Drug interactions between certain DAAs and antiretrovirals must be screened", "Hepatitis C treatment requires stopping all antiretroviral therapy first", "Direct-acting antivirals are contraindicated in anyone living with HIV"], "ans": 1, "exp": "**DAA–ARV drug interactions must be checked** (e.g., some DAAs interact with certain PIs/boosters or tenofovir exposure) — screen and adjust rather than stop ART. HIV/HCV coinfection is treatable with attention to these interactions.", "anchor": "DHHS/HCV Guidance"}, {"id": "HIV-249", "type": "MCQ", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "Prevention of perinatal HIV transmission relies on which combined approach?", "opts": ["Infant antiretroviral prophylaxis given alone in the days after birth", "A single maternal dose of nevirapine administered only at delivery", "Maternal ART in pregnancy, intrapartum management, and infant prophylaxis", "Cesarean delivery performed alone without any antiretroviral therapy"], "ans": 2, "exp": "Perinatal prevention is **layered: maternal ART (goal undetectable) throughout pregnancy + intrapartum management (IV AZT if VL >1,000/unknown) + infant antiretroviral prophylaxis** after birth. This combination drives transmission risk very low.", "anchor": "DHHS Perinatal Guidelines"}, {"id": "HIV-250", "type": "SATA", "subtopic": "Special Populations", "domain": "D3", "tier": "T2", "nabp": "3.C.4", "stem": "Which statements about antiretroviral use in organ impairment are correct? Select all that apply.", "opts": ["TDF should be avoided or adjusted in significant renal impairment", "TAF generally has a more favorable renal profile than TDF", "Most NRTIs require dose adjustment based on creatinine clearance", "Abacavir is metabolized hepatically rather than renally cleared", "All antiretrovirals are removed efficiently by hemodialysis and need no adjustment"], "ans": [0, 1, 2, 3], "exp": "True: **avoid/adjust TDF in CKD**, **TAF kinder to kidney**, **most NRTIs are CrCl-adjusted**, **abacavir is hepatically metabolized** (no renal adjustment). The blanket dialysis claim is false — dosing varies by agent.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-261", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T1", "nabp": "4.A", "aware": true, "stem": "What does the public-health message 'U=U' mean?", "opts": ["Universal testing equals universal treatment for all patients", "Untreated infection equals unavoidable progression to AIDS", "Unboosted regimens equal unreliable viral suppression", "A person with a durably undetectable viral load does not sexually transmit HIV"], "ans": 3, "exp": "ℹ **U=U = Undetectable equals Untransmittable**: sustained viral suppression on ART means **no sexual transmission of HIV** (PARTNER, HPTN 052 evidence). It is a powerful adherence motivator and anti-stigma message.", "anchor": "DHHS ARV Guidelines; PARTNER/HPTN 052"}, {"id": "HIV-262", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T1", "nabp": "4.B", "stem": "Why is strict adherence emphasized so heavily in antiretroviral therapy?", "opts": ["Because poor adherence allows viral replication and selection of drug resistance", "Because missed doses cause immediate fatal toxicity", "Because adherence has no effect on outcomes with modern regimens", "Because nonadherence only matters for protease inhibitors"], "ans": 0, "exp": "**Poor adherence → ongoing replication under drug pressure → resistance and treatment failure**, especially with lower-barrier agents. High-barrier regimens (DTG/BIC, boosted PIs) are more forgiving, but adherence remains central (and underlies U=U).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-263", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.A", "stem": "Which vaccine consideration is correct for a patient with HIV and a CD4 count below 200?", "opts": ["All live and inactivated vaccines are equally safe at any CD4", "Live vaccines such as MMR and varicella are generally contraindicated", "No vaccines should ever be given to patients with HIV", "Only live vaccines are recommended at low CD4 counts"], "ans": 1, "exp": "**Live vaccines (MMR, varicella, live zoster) are generally contraindicated at CD4 < 200** (immunosuppression). **Inactivated vaccines** (influenza, pneumococcal, HBV, HPV, COVID, recombinant zoster) are recommended. Some live vaccines may be considered once CD4 ≥ 200.", "anchor": "ACIP / DHHS Guidelines"}, {"id": "HIV-264", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.A", "stem": "Which vaccines are routinely recommended for adults with HIV?", "opts": ["No vaccines should be given, in order to avoid immune activation", "Only the live attenuated intranasal influenza vaccine each season", "Inactivated influenza, pneumococcal, hepatitis B, and HPV vaccines", "The live oral poliovirus vaccine given as a vaccination priority"], "ans": 2, "exp": "Recommended in HIV: **inactivated influenza (annually), pneumococcal, hepatitis B, HPV, COVID-19, and recombinant zoster** per ACIP. **Avoid live vaccines** when CD4 is low (e.g., live attenuated influenza, oral polio).", "anchor": "ACIP / DHHS Guidelines"}, {"id": "HIV-265", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.D", "stem": "Which professional/ethical practice is appropriate when caring for patients with HIV?", "opts": ["Disclosing HIV status to employers to ensure adherence", "Requiring patients to name all partners before dispensing therapy", "Limiting therapy to patients who can pay out of pocket", "Protecting confidentiality of HIV status and addressing stigma and access barriers"], "ans": 3, "exp": "Ethical HIV care centers on **confidentiality of status, reducing stigma, and addressing social determinants/access barriers** (e.g., ADAP, copay assistance). Mandatory disclosure to employers or payment-based gatekeeping is inappropriate.", "anchor": "Professional practice standards"}, {"id": "HIV-266", "type": "SATA", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.A", "aware": true, "stem": "Which statements about adherence, U=U, and immunization in HIV are correct? Select all that apply.", "opts": ["Durable viral suppression means HIV is not sexually transmitted (U=U)", "Poor adherence can select for antiretroviral resistance", "Live vaccines are generally contraindicated when CD4 is below 200", "Inactivated influenza and pneumococcal vaccines are recommended", "Patients who reach undetectable status no longer need to take ART"], "ans": [0, 1, 2, 3], "exp": "True: **U=U**, **nonadherence → resistance**, **live vaccines contraindicated at CD4 <200**, **inactivated flu/pneumococcal recommended**. False: **ART must continue for life** — stopping leads to rebound and loss of U=U.", "anchor": "DHHS / ACIP Guidelines"}, {"id": "HIV-267", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D1", "tier": "T3", "nabp": "1.E", "aware": true, "stem": "The U=U principle is supported by which body of clinical evidence?", "opts": ["Prospective serodifferent-couple studies (PARTNER, HPTN 052)", "Isolated single-arm case reports lacking any comparison group", "In-vitro laboratory assays that were never tested in humans", "Retrospective chart reviews of medication possession ratios"], "ans": 0, "exp": "ℹ **U=U rests on prospective serodifferent-couple studies — PARTNER 1/2 and HPTN 052 — which observed no linked sexual transmissions when the partner with HIV was virally suppressed.** A strong example of evidence shaping prevention messaging (research-design ballast).", "anchor": "PARTNER; HPTN 052"}, {"id": "HIV-268", "type": "MCQ", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.A", "stem": "A patient reports frequently forgetting doses because of a complex schedule. What is the most appropriate pharmacist action?", "opts": ["Advise stopping therapy until the daily schedule becomes simpler", "Assess barriers and consider a single-tablet or long-acting regimen", "Reassure the patient that nonadherence is fine with modern drugs", "Immediately switch the patient to a low-genetic-barrier regimen"], "ans": 1, "exp": "Address adherence proactively: **identify barriers and consider regimen simplification (single-tablet or long-acting injectable) plus adherence tools/support.** Never advise stopping, and avoid lower-barrier regimens in a patient already struggling with adherence.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-231", "type": "SATA", "subtopic": "Opportunistic Infection Prophylaxis", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which CD4-based opportunistic-infection prophylaxis rules are correct? Select all that apply.", "opts": ["Start PCP prophylaxis when CD4 falls below 200 cells/mm³", "Start toxoplasmosis prophylaxis when CD4 is below 100 with positive IgG", "Stop PCP and toxoplasmosis prophylaxis when CD4 is above 200 for at least 3 months on ART", "Restart PCP prophylaxis if the CD4 count later falls below 200", "Continue PCP prophylaxis lifelong even after sustained immune recovery"], "ans": [0, 1, 2, 3], "exp": "Thresholds: **PCP start <200**, **Toxo start <100 + IgG+**, **stop both when CD4 >200 ×3 mo on ART**, **restart if CD4 drops <200**. Lifelong continuation despite recovery is unnecessary — last option false.", "anchor": "DHHS OI Guidelines"}, {"id": "HIV-269", "type": "SATA", "subtopic": "Adherence, U=U & Professional Practice", "domain": "D4", "tier": "T2", "nabp": "4.A", "stem": "Which immunization statements are correct for adults with HIV? Select all that apply.", "opts": ["Annual inactivated influenza vaccine is recommended", "Pneumococcal vaccination is recommended per current ACIP guidance", "Hepatitis B vaccination is recommended if non-immune", "Live vaccines (MMR, varicella) are generally contraindicated when CD4 is below 200", "The live attenuated intranasal influenza vaccine is preferred at low CD4 counts"], "ans": [0, 1, 2, 3], "exp": "Recommended in HIV: **inactivated influenza**, **pneumococcal** (ACIP), **hepatitis B** if non-immune, plus HPV/COVID/recombinant zoster. **Live vaccines are contraindicated at CD4 <200** → the live intranasal influenza vaccine is NOT preferred at low CD4 (last option false).", "anchor": "ACIP / DHHS Guidelines"}
];
const LET = "ABCDEF";
const MEM = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return MEM[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ MEM[k]=v; } }
};
const LOGKEY="hivall_log_v1", MISSKEY="hivall_missed_v1";
function getLog(){ return store.get(LOGKEY)||[]; }
function pushLog(rec){ const l=getLog(); l.push(rec); store.set(LOGKEY,l); }
function getMissed(){ return store.get(MISSKEY)||[]; }
function setMissed(arr){ store.set(MISSKEY,[...new Set(arr)]); }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function subtopics(){ return [...new Set(ITEMS.map(i=>i.subtopic))]; }
function el(id){ return document.getElementById(id); }
function show(v){ ['dash','quiz','results','prog'].forEach(x=>el(x).classList.toggle('hide',x!==v)); }
function go(v){ if(v==='dash')renderDash(); if(v==='prog')renderProg(); show(v); window.scrollTo(0,0); }

function renderDash(){
  const subs = subtopics();
  let s = `<div class="card"><h2>Build your set</h2>
    <div class="row">
      <div><label>Domain</label><select id="fDom"><option value="">All</option>
        <option>D1</option><option>D2</option><option>D3</option><option>D4</option><option>D5</option></select></div>
      <div><label>Tier</label><select id="fTier"><option value="">All</option>
        <option>T1</option><option>T2</option><option>T3</option></select></div>
      <div><label>Count</label><select id="fCount"><option value="0">All</option>
        <option>10</option><option>20</option><option>30</option><option>40</option></select></div>
      <div><label>Order</label><select id="fShuf"><option value="1">Shuffle</option><option value="0">In order</option></select></div>
    </div>
    <div style="margin-top:12px"><label>Subtopics
      <span style="float:right">
        <button class="tag-link" onclick="allSubs(true)">Select all</button>
        <button class="tag-link" onclick="allSubs(false)">Clear</button></span></label>
      <div class="subtopics" id="subs">`;
  subs.forEach((sub,i)=>{ const n=ITEMS.filter(x=>x.subtopic===sub).length;
    s += `<label><input type="checkbox" class="subck" value="${i}" checked onchange="liveCount()"> ${sub} <span class="count-pill">(${n})</span></label>`; });
  s += `</div></div>
    <div class="count-pill" id="live" style="margin-top:6px"></div>
    <button class="bigbtn" id="startBtn" onclick="startQuiz()">Start quiz</button></div>`;
  el('dash').innerHTML = s;
  ['fDom','fTier','fCount','fShuf'].forEach(id=>el(id).onchange=liveCount);
  liveCount();
}
function allSubs(v){ document.querySelectorAll('.subck').forEach(c=>c.checked=v); liveCount(); }
function selectedPool(){
  const subs = subtopics();
  const chosen = [...document.querySelectorAll('.subck:checked')].map(c=>subs[+c.value]);
  const dom = el('fDom').value, tier = el('fTier').value;
  let pool = ITEMS.filter(i=>chosen.includes(i.subtopic));
  if(dom) pool = pool.filter(i=>i.domain===dom);
  if(tier) pool = pool.filter(i=>i.tier===tier);
  return pool;
}
function liveCount(){
  const pool = selectedPool();
  const want = +el('fCount').value;
  const n = want? Math.min(want,pool.length): pool.length;
  el('live').textContent = `${pool.length} match filters · quiz of ${n}`;
  el('startBtn').disabled = n===0;
  el('startBtn').textContent = `Start quiz · ${n} Qs`;
}

let Q=[], qi=0, score=0, sessionMissed=[], retestMode=false, answered=false, picks=[];
function buildItem(it){
  if(it.type==='FILL') return {...it};
  const idx = shuffle(it.opts.map((_,i)=>i));
  const opts = idx.map(i=>it.opts[i]);
  const ansSet = (Array.isArray(it.ans)?it.ans:[it.ans]).map(a=>idx.indexOf(a));
  return {...it, opts, ansSet};
}
function startQuiz(){
  let pool = selectedPool();
  const want = +el('fCount').value;
  if(+el('fShuf').value) pool = shuffle(pool);
  if(want) pool = pool.slice(0,want);
  Q = pool.map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=false;
  if(Q.length===0) return;
  show('quiz'); renderQ();
}
function startRetest(){
  const ids = getMissed();
  let pool = ITEMS.filter(i=>ids.includes(i.id));
  if(pool.length===0){ alert('No missed items in your pool.'); return; }
  Q = shuffle(pool).map(buildItem); qi=0; score=0; sessionMissed=[]; retestMode=true;
  show('quiz'); window.scrollTo(0,0); renderQ();
}
function badgeHtml(it){
  const tierC={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[it.tier];
  let b=`<div class="badge ${tierC}">${it.tier}</div><div class="badge b-dom">${it.domain}</div>
    <div class="badge b-sub">${it.subtopic}</div><div class="badge b-id">#${it.id}</div>`;
  if(it.type==='FILL') b+=`<div class="badge b-fill">FILL</div>`;
  if(it.aware) b+=`<div class="badge b-new">ℹ NEW</div>`;
  return b;
}
function renderQ(){
  answered=false; picks=[];
  const it=Q[qi];
  const head=`<div class="card">
    <div class="topbar"><span>Question ${qi+1} / ${Q.length}${retestMode?' · retest':''}</span><span>Score ${score}</span></div>
    <div class="bar"><div style="width:${(qi/Q.length)*100}%"></div></div>
    <div class="badges">${badgeHtml(it)}</div>`;
  let body;
  if(it.type==='FILL'){
    body=`<div class="stem">${render(it.stem)}</div>
      <div class="fillrow"><input id="fillIn" type="text" inputmode="decimal" autocomplete="off"
        placeholder="Enter a number" oninput="el('checkBtn').disabled=this.value.trim()===''">
        <span class="unit">${render(it.unit)}</span></div>
      <div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkFill()" disabled>Check</button></div>`;
  } else {
    const isSata = it.type==='SATA';
    body=`<div class="stem">${render(it.stem)}${isSata?' <em>(Select all that apply.)</em>':''}</div><div id="opts">`;
    it.opts.forEach((o,i)=>{ body+=`<button class="opt" id="o${i}" onclick="pick(${i},${isSata})">
      <span class="ck">${LET[i]}.</span>${render(o)}</button>`; });
    body+=`</div><div id="checkRow"><button class="bigbtn" id="checkBtn" onclick="checkQ(${isSata})" disabled>Check</button></div>`;
  }
  const tail=`<div id="exp"></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button id="nextBtn" class="hide" onclick="nextQ()">Next ›</button></div></div>`;
  el('quiz').innerHTML=head+body+tail;
  if(it.type==='FILL') setTimeout(()=>{const f=el('fillIn'); if(f)f.focus();},30);
}
function pick(i,isSata){
  if(answered) return;
  if(isSata){ const k=picks.indexOf(i); if(k>=0)picks.splice(k,1); else picks.push(i);
    el('o'+i).classList.toggle('sel'); }
  else { picks=[i]; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el('o'+i).classList.add('sel'); }
  el('checkBtn').disabled = picks.length===0;
}
function tolOk(user,it){
  if(it.tol!=null) return Math.abs(user-it.ans)<=it.tol+1e-9;
  if(it.tolpct!=null) return Math.abs(user-it.ans)<=Math.abs(it.ans)*it.tolpct/100+1e-9;
  return Math.abs(user-it.ans)<=Math.max(Math.abs(it.ans)*0.02,0.01);
}
function recordAndReveal(it,ok,answerText){
  if(ok) score++;
  else { sessionMissed.push(it.id); const m=getMissed(); if(!m.includes(it.id)){m.push(it.id);setMissed(m);} }
  if(ok&&retestMode){ const m=getMissed(); const k=m.indexOf(it.id); if(k>=0){m.splice(k,1);setMissed(m);} }
  el('exp').innerHTML=`<div class="exp"><b>${ok?'✔ Correct':'✗ Answer: '+answerText}.</b> ${render(it.exp)}
    <div class="muted" style="margin-top:6px">NABP ${it.nabp}${it.anchor?' · '+render(it.anchor):''}</div></div>`;
  pushLog({id:it.id,domain:it.domain,subtopic:it.subtopic,ok,t:Date.now()});
  el('checkRow').classList.add('hide'); el('nextBtn').classList.remove('hide');
}
function checkFill(){
  if(answered) return; const it=Q[qi];
  const raw=el('fillIn').value.trim().replace(/,/g,'').replace(/[^0-9eE.+-]/g,'');
  const user=parseFloat(raw);
  if(isNaN(user)) return;
  answered=true;
  const ok=tolOk(user,it);
  el('fillIn').classList.add(ok?'correct':'wrong'); el('fillIn').disabled=true;
  recordAndReveal(it,ok,fmtNum(it.ans)+' '+it.unit);
}
function checkQ(isSata){
  if(answered||picks.length===0) return; answered=true;
  const it=Q[qi]; const correct=it.ansSet.slice().sort((a,b)=>a-b);
  const chosen=picks.slice().sort((a,b)=>a-b);
  const ok = correct.length===chosen.length && correct.every((v,k)=>v===chosen[k]);
  it.opts.forEach((o,i)=>{ const b=el('o'+i); b.classList.remove('sel');
    if(it.ansSet.includes(i)) b.classList.add('correct');
    else if(picks.includes(i)) b.classList.add('wrong'); });
  const al=it.ansSet.map(a=>LET[a]).sort().join(', ');
  recordAndReveal(it,ok,al);
}
function fmtNum(x){ return (Math.round(x*1000)/1000).toString(); }
function nextQ(){ qi++; if(qi>=Q.length) renderResults(); else { renderQ(); window.scrollTo(0,0);} }
function renderResults(){
  const pct=Math.round(score/Q.length*100);
  el('results').innerHTML=`<div class="card"><h2>Results</h2>
    <div class="big">${pct}%</div>
    <div class="stat"><span>Correct</span><b>${score} / ${Q.length}</b></div>
    <div class="stat"><span>Missed this session</span><b>${sessionMissed.length}</b></div>
    <div class="stat"><span>Total missed pool</span><b>${getMissed().length}</b></div>
    <div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
      <button onclick="startRetest()">Retest missed (${getMissed().length})</button></div></div>`;
  show('results'); window.scrollTo(0,0);
}
function renderProg(){
  const log=getLog();
  const byDom={}, bySub={};
  log.forEach(r=>{ (byDom[r.domain]=byDom[r.domain]||[0,0])[1]++; if(r.ok)byDom[r.domain][0]++;
    (bySub[r.subtopic]=bySub[r.subtopic]||[0,0])[1]++; if(r.ok)bySub[r.subtopic][0]++; });
  let s=`<div class="card"><h2>Progress</h2>
    <div class="stat"><span>Total answered</span><b>${log.length}</b></div>
    <div class="stat"><span>Current missed pool</span><b>${getMissed().length}</b></div>`;
  s+=`<h2 style="margin-top:16px">Accuracy by domain</h2>`;
  Object.keys(byDom).sort().forEach(d=>{const[c,t]=byDom[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  s+=`<h2 style="margin-top:16px">Accuracy by subtopic</h2>`;
  Object.keys(bySub).sort().forEach(d=>{const[c,t]=bySub[d];
    s+=`<div class="stat"><span>${d}</span><b>${Math.round(c/t*100)}% (${c}/${t})</b></div>`;});
  if(log.length===0) s+=`<p class="muted">No attempts yet. Build a set from the Dashboard.</p>`;
  s+=`<div class="nav"><button class="ghost" onclick="go('dash')">‹ Dashboard</button>
     <button onclick="if(confirm('Reset all progress?')){store.set(LOGKEY,[]);store.set(MISSKEY,[]);renderProg();}">Reset progress</button></div></div>`;
  el('prog').innerHTML=s;
}
function render(t){ t=String(t);
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
  return t; }
document.addEventListener('keydown',e=>{
  if(el('quiz').classList.contains('hide')) return;
  const it=Q[qi];
  if(!answered){
    if(it.type==='FILL'){ if(e.key==='Enter'&&!el('checkBtn').disabled)checkFill(); return; }
    if(/^[1-6]$/.test(e.key)){const i=+e.key-1; if(i<it.opts.length)pick(i,it.type==='SATA');}
    if(e.key==='Enter'&&!el('checkBtn').disabled)checkQ(it.type==='SATA');
  } else if(e.key==='Enter')nextQ();
});
renderDash();
</script>
</body></html>
