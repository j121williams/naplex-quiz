<script>
const ITEMS = [
{"id": "HIV-001", "type": "MCQ", "subtopic": "Virology & Lifecycle", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "HIV is best classified as which type of virus?", "opts": ["A single-stranded RNA retrovirus that replicates through a DNA intermediate", "A double-stranded DNA virus that integrates directly into host DNA", "A non-enveloped positive-sense RNA virus lacking reverse transcriptase", "A double-stranded segmented RNA virus that replicates in the cytoplasm"], "ans": 0, "exp": "HIV is a **single-stranded RNA retrovirus**: its RNA genome is reverse-transcribed to DNA, integrated into host DNA, then transcribed/translated and assembled. The enzymes **reverse transcriptase, integrase, protease** are the targets of the major ARV classes.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-002", "type": "MCQ", "subtopic": "Virology & Lifecycle", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "Which viral enzyme converts HIV RNA into DNA and is the target of the NRTI and NNRTI classes?", "opts": ["Integrase, which splices proviral DNA into the host genome", "Reverse transcriptase, which transcribes viral RNA into DNA", "Protease, which cleaves the viral polyprotein into mature proteins", "Capsid protein, which forms the conical protective shell"], "ans": 1, "exp": "**Reverse transcriptase** copies viral ssRNA → dsDNA. **NRTIs** (chain terminators) and **NNRTIs** (allosteric inhibitors) both target it. Integrase and protease are targeted by INSTIs and PIs respectively.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-003", "type": "MCQ", "subtopic": "Virology & Lifecycle", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the function of HIV integrase, the target of the INSTI class?", "opts": ["It cleaves the gag-pol polyprotein into functional enzymes", "It catalyzes the conversion of viral RNA into complementary DNA", "It inserts reverse-transcribed proviral DNA into the host cell genome", "It mediates fusion of the viral envelope with the cell membrane"], "ans": 2, "exp": "**Integrase** inserts the reverse-transcribed proviral DNA into host DNA (strand transfer). **INSTIs** (-tegravir) block this step. Protease cleaves polyproteins; reverse transcriptase makes the DNA; gp41 mediates fusion.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-004", "type": "MCQ", "subtopic": "Virology & Lifecycle", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "HIV protease is required for which step, making it the target of the PI class?", "opts": ["Integration of proviral DNA into the host chromosome", "Reverse transcription of the single-stranded RNA genome", "Binding of gp120 to the CD4 receptor on T cells", "Cleavage of viral polyproteins to produce mature, infectious virions"], "ans": 3, "exp": "**Protease** cleaves gag/gag-pol polyproteins during maturation → without it, virions are **immature and non-infectious**. **PIs** (-navir) inhibit it and have a **high genetic barrier** to resistance.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-005", "type": "MCQ", "subtopic": "Virology & Lifecycle", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "HIV primarily infects which host cell, and via which primary receptor plus co-receptor?", "opts": ["CD4 T cells via the CD4 receptor plus a CCR5 or CXCR4 co-receptor", "CD8 cytotoxic T cells via the CXCR4 receptor alone", "B lymphocytes via the CD21 complement receptor", "Erythrocytes via the Duffy antigen receptor"], "ans": 0, "exp": "HIV infects **CD4 T-helper cells**: gp120 binds **CD4** plus a **CCR5 or CXCR4 co-receptor**. Co-receptor tropism matters clinically — **maraviroc (CCR5 antagonist) requires a tropism assay**. Progressive CD4 loss → immunodeficiency.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-006", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T1", "nabp": "3.B", "stem": "What is the recommended first-line laboratory test to screen for HIV infection?", "opts": ["A CD4 lymphocyte count obtained by flow cytometry", "A fourth-generation HIV-1/2 antigen/antibody combination immunoassay", "An HIV-1 RNA viral load by polymerase chain reaction", "A Western blot performed on a peripheral blood sample"], "ans": 1, "exp": "Screening starts with a **4th-generation Ag/Ab combination immunoassay** (detects p24 antigen + antibodies → shortens the window period), then a confirmatory differentiation assay; HIV RNA resolves indeterminate/acute cases. CD4 is for staging, not screening.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-007", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T1", "nabp": "3.D.1", "stem": "Which marker is used to assess the efficacy of antiretroviral therapy, with the goal of an undetectable result?", "opts": ["The absolute CD4 lymphocyte count", "The serum beta-2 microglobulin level", "The plasma HIV-1 RNA viral load", "The p24 antigen titer"], "ans": 2, "exp": "**HIV-1 RNA viral load** measures treatment response; the goal is **virologic suppression (undetectable)**, which underlies **U=U** (undetectable = untransmittable). CD4 tracks immune recovery/OI risk, not virologic efficacy directly.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-008", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T1", "nabp": "3.C.1", "stem": "Which laboratory value best reflects immune status and the risk of opportunistic infections in HIV?", "opts": ["HIV-1 RNA viral load", "Absolute neutrophil count", "Erythrocyte sedimentation rate", "CD4 lymphocyte count"], "ans": 3, "exp": "The **CD4 count** reflects immune status and drives **OI prophylaxis thresholds** (e.g., PCP <200, Toxo <100, MAC <50). Viral load measures virologic control, not immune status.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-009", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D1", "tier": "T1", "nabp": "1.A.2", "recall": true, "stem": "Which pharmacogenomic test must be performed before initiating abacavir?", "opts": ["HLA-B*5701 allele", "CYP2B6 genotype", "UGT1A1 genotype", "CCR5 tropism assay"], "ans": 0, "exp": "**HLA-B*5701 must be negative before abacavir** — a positive allele predicts a potentially fatal **hypersensitivity reaction (HSR)**; never rechallenge after suspected HSR. (CCR5 tropism is for maraviroc; UGT1A1 relates to atazanavir hyperbilirubinemia.)", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-010", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T2", "nabp": "3.C.1", "stem": "Which test must be obtained before starting maraviroc?", "opts": ["An HLA-B*5701 allele determination", "A CCR5 co-receptor tropism assay", "A glucose-6-phosphate dehydrogenase level", "A baseline electrocardiogram for QT interval"], "ans": 1, "exp": "**Maraviroc (CCR5 antagonist) requires a tropism assay** — it works only against **CCR5-tropic** virus and is ineffective against CXCR4-tropic or dual/mixed virus. HLA-B*5701 is for abacavir.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-011", "type": "MCQ", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "For a newly diagnosed, treatment-naive patient, which baseline test does DHHS recommend before or at ART initiation?", "opts": ["A bone mineral density scan to assess fracture risk", "A coronary artery calcium score for cardiovascular risk", "A genotypic resistance (drug-resistance) test", "A pharmacogenomic CYP2C19 panel for clopidogrel response"], "ans": 2, "exp": "**Baseline genotypic resistance testing** is recommended for all newly diagnosed patients (10–17% carry transmitted resistance), along with **HBV/HCV screening**, CD4, viral load, renal/hepatic panels, and HLA-B*5701 if abacavir is considered. Rapid-start may begin before genotype returns using high-barrier regimens.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-012", "type": "SATA", "subtopic": "Diagnosis & Monitoring", "domain": "D3", "tier": "T2", "nabp": "3.B", "stem": "Which evaluations are appropriate at baseline before starting antiretroviral therapy? Select all that apply.", "opts": ["HIV genotypic resistance testing", "CD4 count and HIV-1 RNA viral load", "Hepatitis B and hepatitis C screening", "HLA-B*5701 if an abacavir-containing regimen is considered", "Routine CCR5 tropism testing for all patients regardless of regimen"], "ans": [0, 1, 2, 3], "exp": "Baseline: **genotype**, **CD4 + viral load**, **HBV/HCV screen**, **HLA-B*5701 if abacavir** is planned, plus renal/hepatic/metabolic panels. **Tropism testing is only needed if maraviroc is considered**, not routinely for all patients.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-013", "type": "MCQ", "subtopic": "NRTIs", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of nucleoside/nucleotide reverse transcriptase inhibitors (NRTIs)?", "opts": ["Allosteric, non-competitive inhibition of reverse transcriptase", "Competitive inhibition of the integrase strand-transfer reaction", "Blockade of protease-mediated polyprotein cleavage", "Incorporation into viral DNA as chain terminators of reverse transcription"], "ans": 3, "exp": "**NRTIs are chain terminators**: phosphorylated to active triphosphates, incorporated into the growing viral DNA chain, halting reverse transcription (they lack a 3'-OH). NNRTIs bind allosterically; integrase/protease are separate targets.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-014", "type": "MCQ", "subtopic": "NRTIs", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "Compared with tenofovir alafenamide (TAF), tenofovir disoproxil fumarate (TDF) is more associated with which toxicities?", "opts": ["Greater renal impairment and reduced bone mineral density", "Greater weight gain along with worsening of the lipid profile", "Greater hypersensitivity reactions with rash and fever", "Greater myelosuppression presenting as anemia and neutropenia"], "ans": 0, "exp": "**TDF → higher plasma tenofovir → more nephrotoxicity (proximal tubulopathy) and bone-density loss.** **TAF** delivers more drug intracellularly with lower plasma levels → kinder to kidney/bone but slightly more **weight gain/lipids**. AZT causes anemia.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-015", "type": "MCQ", "subtopic": "NRTIs", "domain": "D3", "tier": "T1", "nabp": "3.D.2", "stem": "A patient develops fever, rash, and GI symptoms days after starting an abacavir-containing regimen (HLA-B*5701 status was never checked). What is the correct action?", "opts": ["Continue abacavir and add an antihistamine for the rash", "Permanently discontinue abacavir and never rechallenge", "Reduce the abacavir dose by half and monitor", "Hold abacavir for 48 hours, then rechallenge at full dose"], "ans": 1, "exp": "This is **abacavir hypersensitivity** — **stop permanently and NEVER rechallenge** (rechallenge can cause fatal reactions). HLA-B*5701 should always be checked first; a positive result contraindicates abacavir.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-016", "type": "SATA", "subtopic": "NRTIs", "domain": "D3", "tier": "T2", "nabp": "3.C.5", "stem": "In a patient with HIV and chronic hepatitis B coinfection, which statements about the NRTI backbone are correct? Select all that apply.", "opts": ["Tenofovir (TDF or TAF) has activity against both HIV and hepatitis B", "Lamivudine or emtricitabine alone provides adequate hepatitis B coverage long-term", "A tenofovir-based backbone is preferred to suppress both viruses", "Stopping HBV-active agents abruptly can cause a hepatitis B flare", "Abacavir provides reliable hepatitis B suppression"], "ans": [0, 2, 3], "exp": "**Tenofovir (TDF/TAF) covers HIV + HBV** and is the **preferred backbone** in coinfection. **3TC/FTC alone is inadequate** (rapid HBV resistance) — pair with tenofovir. **Abrupt withdrawal of HBV-active drugs → hepatitis flare.** Abacavir has no HBV activity.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-017", "type": "MCQ", "subtopic": "NRTIs", "domain": "D1", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effect is classically associated with zidovudine (AZT)?", "opts": ["Proximal renal tubulopathy with phosphate wasting", "Indirect hyperbilirubinemia with scleral icterus", "Bone marrow suppression with anemia and neutropenia", "Hypersensitivity reaction mediated by HLA-B*5701"], "ans": 2, "exp": "**Zidovudine → bone marrow suppression (anemia, neutropenia)**, plus myopathy and lipoatrophy. It is now largely historical except in specific perinatal scenarios. Tubulopathy is tenofovir; hyperbilirubinemia is atazanavir.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-018", "type": "MCQ", "subtopic": "NRTIs", "domain": "D2", "tier": "T2", "nabp": "2.A.4", "stem": "Which statement about lamivudine (3TC) and emtricitabine (FTC) is correct?", "opts": ["They must always be used together for an additive antiviral effect", "Only lamivudine, not emtricitabine, has activity against hepatitis B", "They both require HLA-B*5701 testing before they can be used", "They are similar cytidine analogues and should not be combined together"], "ans": 3, "exp": "**3TC and FTC are interchangeable cytidine analogues — never use both together** (no benefit, overlapping resistance). **Both** have HBV activity. Neither requires HLA-B*5701 (that's abacavir).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-019", "type": "SATA", "subtopic": "NRTIs", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about the NRTI class are correct? Select all that apply.", "opts": ["They act as DNA chain terminators after intracellular phosphorylation", "Abacavir requires HLA-B*5701 screening before initiation", "TDF carries more renal and bone toxicity than TAF", "Emtricitabine and lamivudine both have hepatitis B activity", "All NRTIs are potent CYP3A4 inhibitors"], "ans": [0, 1, 2, 3], "exp": "NRTIs: **chain terminators**, **abacavir needs HLA-B*5701**, **TDF > TAF for renal/bone tox**, **FTC/3TC are HBV-active**. NRTIs are **renally cleared and not significant CYP substrates/inhibitors** — the last option is false (CYP DDIs belong to PIs, NNRTIs, boosters).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-020", "type": "MCQ", "subtopic": "INSTIs", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the mechanism of integrase strand-transfer inhibitors (INSTIs)?", "opts": ["They prevent insertion of proviral DNA into the host genome", "They block reverse transcription by terminating the DNA chain", "They inhibit cleavage of viral polyproteins during maturation", "They antagonize the CCR5 co-receptor"], "ans": 0, "exp": "**INSTIs (-tegravir) block integrase strand transfer**, preventing proviral DNA from integrating into host DNA. INSTI + 2 NRTIs is the **DHHS-recommended initial regimen for most patients**.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-021", "type": "MCQ", "subtopic": "INSTIs", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "Which integrase inhibitors have the HIGHEST genetic barrier to resistance?", "opts": ["Raltegravir and elvitegravir", "Dolutegravir and bictegravir", "Cabotegravir and elvitegravir", "Raltegravir and cabotegravir"], "ans": 1, "exp": "**Dolutegravir and bictegravir = high genetic barrier** (favored, including 2-drug DTG/3TC and rapid start). **Raltegravir and elvitegravir = lower barrier** (elvitegravir also needs cobicistat boosting). Higher barrier → more forgiving of adherence lapses.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-022", "type": "MCQ", "subtopic": "INSTIs", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A patient on dolutegravir also takes a calcium-and-magnesium antacid and a ferrous sulfate supplement. What counseling is correct?", "opts": ["No interaction exists; the products may be taken together at any time", "The antacid increases INSTI absorption and should be taken simultaneously", "Polyvalent cations chelate the INSTI and reduce its absorption; separate the doses", "Discontinue dolutegravir while taking any oral supplement"], "ans": 2, "exp": "⚠ **Polyvalent cations (Ca, Mg, Al, Fe, Zn — antacids, supplements, dairy) chelate INSTIs → ↓ absorption.** Take the INSTI **2 h before or 6 h after** the cation (or take dolutegravir/bictegravir WITH food and the cation simultaneously per specific labeling). High-yield NAPLEX DDI.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-023", "type": "MCQ", "subtopic": "INSTIs", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "A patient starting dolutegravir has a small rise in serum creatinine with no change in actual GFR. What is the explanation?", "opts": ["Early dolutegravir-induced acute tubular necrosis that requires stopping the drug", "Rhabdomyolysis precipitated by a drug interaction with a statin", "Dehydration that should be corrected before the regimen is continued", "Inhibition of tubular creatinine secretion, a benign effect not reflecting true injury"], "ans": 3, "exp": "**DTG and BIC inhibit tubular creatinine secretion (OCT2/MATE) → a small benign ↑SCr** without a true GFR decline (similar to cobicistat). It is expected, stable, and **not nephrotoxicity**. Distinguish from tenofovir's true tubulopathy.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-024", "type": "MCQ", "subtopic": "INSTIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse effect has been increasingly associated with the INSTI class, particularly when combined with TAF?", "opts": ["Weight gain", "Photosensitivity", "QT prolongation", "Pancreatitis"], "ans": 0, "exp": "**INSTIs (esp. DTG/BIC) + TAF are associated with weight gain.** Monitor weight and metabolic parameters. Other class notes: generally well tolerated, **benign ↑SCr** with DTG/BIC, insomnia with some agents.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-025", "type": "MCQ", "subtopic": "INSTIs", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient with type 2 diabetes on metformin is started on dolutegravir. What interaction should be anticipated?", "opts": ["Dolutegravir lowers metformin levels, requiring a higher metformin dose", "Dolutegravir raises metformin levels by inhibiting its renal transport; limit the metformin dose", "The two should never be co-administered under any circumstance", "Metformin reduces dolutegravir absorption and must be separated by 6 hours"], "ans": 1, "exp": "**Dolutegravir inhibits OCT2/MATE → ↑ metformin exposure.** Cap metformin (commonly ≤1,000 mg/day) and monitor glycemia/GI tolerance and renal function. A bidirectional dose-limit interaction, not an absolute contraindication.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-026", "type": "MCQ", "subtopic": "INSTIs", "domain": "D2", "tier": "T2", "nabp": "2.A.5", "stem": "Which integrase inhibitor is available as a long-acting intramuscular injection for maintenance therapy and for PrEP?", "opts": ["Dolutegravir", "Bictegravir", "Cabotegravir", "Raltegravir"], "ans": 2, "exp": "**Cabotegravir** is the LA-injectable INSTI: with rilpivirine (**Cabenuva**) for maintenance in virologically suppressed patients, and alone (**Apretude**) for PrEP. DTG/BIC/RAL are oral only.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-027", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "How do non-nucleoside reverse transcriptase inhibitors (NNRTIs) differ mechanistically from NRTIs?", "opts": ["NNRTIs require intracellular phosphorylation to terminate the growing DNA chain", "NNRTIs inhibit the integrase strand-transfer reaction during proviral integration", "NNRTIs block protease-mediated maturation of the viral polyprotein", "NNRTIs bind allosterically to reverse transcriptase, causing non-competitive inhibition"], "ans": 3, "exp": "**NNRTIs bind a non-catalytic allosteric site on reverse transcriptase → non-competitive inhibition** (no phosphorylation needed). They generally have a **low genetic barrier** (single mutation = class resistance) and **CYP-mediated DDIs**.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-028", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which adverse-effect and administration pairing is correct for efavirenz?", "opts": ["Vivid dreams and CNS/neuropsychiatric effects; dose at bedtime on an empty stomach", "Severe photosensitivity reactions; dose together with a high-fat evening meal", "Indirect hyperbilirubinemia and jaundice; dose with an acidic beverage", "Bone marrow suppression with anemia; dose with food each morning"], "ans": 0, "exp": "**Efavirenz → CNS/neuropsychiatric effects** (vivid dreams, dizziness, mood changes) → **dose at bedtime, empty stomach** (food ↑ absorption + CNS AEs). Largely superseded by INSTIs. Efavirenz is also a CYP inducer.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-029", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A patient on rilpivirine asks about an over-the-counter omeprazole for reflux. What is the correct advice?", "opts": ["Proton pump inhibitors are safe and may be taken simultaneously with rilpivirine", "Proton pump inhibitors are contraindicated because raised gastric pH lowers rilpivirine absorption", "Rilpivirine should be taken on an empty stomach to prevent any acid interaction", "The rilpivirine dose should be doubled for the duration of proton pump inhibitor use"], "ans": 1, "exp": "⚠ **Rilpivirine needs an acidic gut to dissolve → PPIs are CONTRAINDICATED** (↓ absorption → virologic failure). H2 blockers must be **separated** (≥12 h before / 4 h after); antacids separated too. Also **take rilpivirine WITH a meal**. High-yield trap.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-030", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Rilpivirine is generally NOT recommended in which treatment-naive scenario?", "opts": ["Patients older than 50 years of age at the time of diagnosis", "Patients with well-controlled essential hypertension on therapy", "Baseline HIV-1 RNA greater than 100,000 copies/mL or a CD4 below 200", "Patients who would prefer a once-daily single-tablet regimen"], "ans": 2, "exp": "**Rilpivirine is less effective at high baseline viral load (>100,000) and low CD4 (<200)** → avoid as initial therapy in those patients. It is otherwise well tolerated and used in STRs (Juluca, Odefsey) and the LA injectable (with cabotegravir).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-031", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D3", "tier": "T3", "nabp": "3.D.2", "stem": "Which adverse effects are characteristic of nevirapine, limiting its use today?", "opts": ["Nephrolithiasis together with indirect hyperbilirubinemia", "Lactic acidosis accompanied by acute pancreatitis", "Weight gain with worsening of the serum lipid profile", "Hepatotoxicity and severe rash, including Stevens-Johnson syndrome"], "ans": 3, "exp": "**Nevirapine → hepatotoxicity and severe rash/SJS**, risk higher when started at **higher CD4 counts** (avoid CD4 >250 women / >400 men). Largely historical. Hyperbilirubinemia = atazanavir; weight gain = INSTI/TAF.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-032", "type": "MCQ", "subtopic": "NNRTIs", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Why do NNRTIs such as efavirenz carry significant drug-interaction potential?", "opts": ["They are metabolized by and can induce or inhibit CYP450 enzymes", "They are eliminated unchanged by the kidney and compete for tubular secretion", "They chelate polyvalent cations in the gut", "They require gastric acid for absorption"], "ans": 0, "exp": "**NNRTIs are CYP substrates; efavirenz is also a CYP3A inducer** (↓ levels of co-meds, e.g., some statins, contraceptives, methadone). Contrast NRTIs (renal, minimal CYP) and INSTIs (cation chelation). Rilpivirine adds the acid-dependence interaction.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-033", "type": "MCQ", "subtopic": "Protease Inhibitors", "domain": "D1", "tier": "T1", "nabp": "1.A.1", "stem": "What is the result of protease inhibition by the PI class?", "opts": ["Premature chain termination of reverse transcription", "Production of immature, non-infectious viral particles", "Blockade of viral entry at the CD4 receptor", "Prevention of proviral DNA integration"], "ans": 1, "exp": "**PIs (-navir) block protease cleavage of polyproteins → immature, non-infectious virions.** The class has a **high genetic barrier** (useful when resistance/adherence is a concern) but extensive **CYP3A interactions** and metabolic adverse effects.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-034", "type": "MCQ", "subtopic": "Protease Inhibitors", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "Why are protease inhibitors such as darunavir and atazanavir given with ritonavir or cobicistat?", "opts": ["To provide a second antiviral mechanism of action", "To prevent abacavir hypersensitivity", "To pharmacokinetically boost PI levels via CYP3A4 inhibition", "To neutralize gastric acid for absorption"], "ans": 2, "exp": "**PIs are 'boosted' with ritonavir or cobicistat — potent CYP3A4 inhibitors that raise and sustain PI concentrations.** This enables once-daily dosing but creates the PI class's large DDI footprint. Boosting is PK, not a second antiviral mechanism.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-035", "type": "MCQ", "subtopic": "Protease Inhibitors", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "A patient on atazanavir develops scleral icterus but has normal transaminases and feels well. What is the most likely explanation?", "opts": ["Drug-induced hepatitis that requires immediate discontinuation of therapy", "Hemolytic anemia driven by oxidative stress on the red cells", "Acute pancreatitis with associated biliary tract obstruction", "Benign indirect (unconjugated) hyperbilirubinemia from UGT1A1 inhibition"], "ans": 3, "exp": "**Atazanavir inhibits UGT1A1 → benign indirect hyperbilirubinemia/jaundice** (cosmetic, reversible) without hepatocellular injury. Also causes **nephrolithiasis** and **requires gastric acid** (separate from PPIs/H2 blockers). Reassure; no need to stop for isolated jaundice.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-036", "type": "MCQ", "subtopic": "Protease Inhibitors", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "Which feature distinguishes darunavir among the protease inhibitors?", "opts": ["It has a high genetic barrier and contains a sulfonamide moiety (caution in sulfa allergy)", "It is the only protease inhibitor that does not require pharmacokinetic boosting", "It is contraindicated with any tenofovir-containing product because of toxicity", "It requires a CCR5 co-receptor tropism assay before it can be started"], "ans": 0, "exp": "**Darunavir = high genetic barrier** (preferred PI, useful in resistance/rapid-start before genotype) and contains a **sulfonamide moiety** → caution with severe sulfa allergy. It is still **boosted** (ritonavir/cobicistat). Tropism testing is for maraviroc.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-037", "type": "SATA", "subtopic": "Protease Inhibitors", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which statements about the protease inhibitor class are correct? Select all that apply.", "opts": ["They must be pharmacokinetically boosted with ritonavir or cobicistat", "They have a high genetic barrier to resistance", "They are associated with dyslipidemia, GI intolerance, and insulin resistance", "They are potent inhibitors of CYP3A4 with extensive drug interactions", "They act as reverse transcriptase chain terminators"], "ans": [0, 1, 2, 3], "exp": "PIs: **boosted**, **high genetic barrier**, **metabolic AEs** (lipids, GI, glucose), **major CYP3A interactions**. They inhibit **protease (maturation)**, not reverse transcription — the last option is false.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-038", "type": "MCQ", "subtopic": "PK Boosters", "domain": "D1", "tier": "T1", "nabp": "1.A.2", "stem": "What is the mechanism by which cobicistat and ritonavir act as pharmacokinetic boosters?", "opts": ["They induce CYP3A4, lowering levels of the co-administered agent", "They are potent inhibitors of CYP3A4, raising levels of the co-administered agent", "They block intestinal P-glycoprotein efflux only, with no CYP effect", "They provide direct antiviral activity that adds to the partner drug"], "ans": 1, "exp": "**Ritonavir and cobicistat are potent CYP3A4 inhibitors** used to boost PIs and elvitegravir. **Cobicistat has NO antiviral activity** (pure booster); **ritonavir is technically a PI but used only as a booster** at low dose. The DDI burden comes from this inhibition.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-039", "type": "MCQ", "subtopic": "PK Boosters", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "A patient starting a cobicistat-boosted regimen has a modest rise in serum creatinine. Which statement is correct?", "opts": ["Cobicistat causes true nephrotoxicity, so the entire regimen must be stopped at once", "The creatinine rise reflects rhabdomyolysis precipitated by the booster drug", "Cobicistat inhibits tubular creatinine secretion, a benign rise without a true GFR decline", "Cobicistat increases the actual glomerular filtration rate over the first months"], "ans": 2, "exp": "**Cobicistat (like DTG/BIC) inhibits tubular creatinine secretion → benign ↑SCr without true GFR change.** Expected and not nephrotoxic. Distinguish from tenofovir-DF tubulopathy (real injury), which matters when cobicistat is co-formulated with TDF.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-040", "type": "SATA", "subtopic": "PK Boosters", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Because ritonavir and cobicistat strongly inhibit CYP3A4, which co-medications are contraindicated or require avoidance/major caution? Select all that apply.", "opts": ["Simvastatin and lovastatin", "Ergot alkaloids (e.g., ergotamine)", "Alfuzosin", "Oral midazolam or triazolam", "Lisinopril"], "ans": [0, 1, 2, 3], "exp": "Boosters ↑ CYP3A substrates dangerously: **avoid simvastatin/lovastatin** (rhabdomyolysis), **ergots** (ergotism), **alfuzosin** (hypotension), **oral midazolam/triazolam** (excess sedation). **Lisinopril** is renally cleared, not a CYP3A substrate → no interaction.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-041", "type": "MCQ", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "What is the mechanism of maraviroc?", "opts": ["It inhibits gp41-mediated fusion of the viral and cell membranes", "It is a monoclonal antibody that binds the host CD4 receptor", "It inhibits the HIV capsid protein during assembly and uncoating", "It antagonizes the host CCR5 co-receptor, thereby blocking viral entry"], "ans": 3, "exp": "**Maraviroc = CCR5 antagonist** (blocks the host co-receptor) → effective only against **CCR5-tropic** virus, so a **tropism assay is required**. Enfuvirtide blocks gp41 fusion; ibalizumab binds CD4; lenacapavir targets the capsid.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-042", "type": "MCQ", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Enfuvirtide is best described as which type of agent?", "opts": ["A subcutaneously injected fusion (gp41) inhibitor", "An oral CCR5 antagonist", "An intravenous post-attachment monoclonal antibody", "An oral capsid inhibitor"], "ans": 0, "exp": "**Enfuvirtide = fusion inhibitor** (binds gp41, blocks membrane fusion), given **subcutaneously** (injection-site reactions are common). Reserved for salvage/MDR therapy. Contrast maraviroc (oral CCR5), ibalizumab (IV mAb), lenacapavir (capsid).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-043", "type": "MCQ", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "aware": true, "stem": "Fostemsavir is indicated for which situation, and by what mechanism?", "opts": ["First-line therapy in treatment-naive patients, acting by integrase inhibition", "Heavily treatment-experienced MDR HIV, acting by gp120 attachment inhibition", "Pre-exposure prophylaxis, acting through reverse transcriptase inhibition", "Hepatitis B coinfection, acting as a nucleotide analogue against both viruses"], "ans": 1, "exp": "ℹ **Fostemsavir (Rukobia) = attachment inhibitor** (binds gp120, blocks CD4 attachment), oral, for **heavily treatment-experienced MDR HIV** with limited options — not for naive patients or PrEP. HIV-2 is intrinsically resistant to it.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-044", "type": "MCQ", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "aware": true, "stem": "Ibalizumab is best characterized as which of the following?", "opts": ["An oral CCR5 antagonist taken once daily with or without food", "A subcutaneous fusion inhibitor injected twice daily by the patient", "An intravenous post-attachment monoclonal antibody dosed every 2 weeks for MDR HIV", "A long-acting injectable capsid inhibitor used for pre-exposure prophylaxis"], "ans": 2, "exp": "ℹ **Ibalizumab (Trogarzo) = post-attachment monoclonal antibody** binding CD4 domain 2; **IV every 2 weeks** (after a loading dose) for **multidrug-resistant HIV** + an optimized background. Not oral, not for naive patients/PrEP.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-045", "type": "MCQ", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D1", "tier": "T3", "nabp": "1.A.1", "aware": true, "stem": "Lenacapavir (Sunlenca) acts by which novel mechanism?", "opts": ["Integrase strand-transfer inhibition during proviral DNA integration", "Protease inhibition that blocks maturation of the viral polyprotein", "CCR5 co-receptor antagonism that prevents viral entry into the cell", "HIV capsid inhibition that disrupts multiple steps of the viral lifecycle"], "ans": 3, "exp": "ℹ **Lenacapavir = first-in-class capsid inhibitor** (interferes with capsid-dependent steps: nuclear import, assembly, uncoating). **Sunlenca** = long-acting (q6mo SC) for **MDR HIV** with an optimized background; the same molecule underlies twice-yearly **PrEP (Yeztugo, 2025)**.", "anchor": "Sunlenca/Yeztugo PI; PURPOSE trials"}, {"id": "HIV-046", "type": "MCQ", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T1", "nabp": "2.A.1", "recall": true, "stem": "Biktarvy is a single-tablet regimen containing which three components?", "opts": ["Bictegravir, emtricitabine, and tenofovir alafenamide", "Dolutegravir, abacavir, and lamivudine", "Elvitegravir, cobicistat, emtricitabine, and tenofovir", "Darunavir, cobicistat, emtricitabine, and tenofovir"], "ans": 0, "exp": "**Biktarvy = bictegravir + emtricitabine + tenofovir alafenamide (BIC/FTC/TAF)** — a DHHS-recommended initial STR, INSTI-based, **no booster, no HLA-B*5701 needed**, no food requirement. (DTG/ABC/3TC = Triumeq.)", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-047", "type": "MCQ", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T1", "nabp": "2.A.1", "recall": true, "stem": "Triumeq contains dolutegravir, lamivudine, and abacavir. What must be confirmed before prescribing it?", "opts": ["A CCR5-tropic virus on a tropism assay", "A negative HLA-B*5701 result", "An undetectable hepatitis B surface antigen only", "A normal baseline QT interval"], "ans": 1, "exp": "**Triumeq = DTG/3TC/ABC**; because it contains **abacavir, HLA-B*5701 must be negative** before use (HSR risk). It is a complete INSTI-based STR. Tropism testing is for maraviroc, not Triumeq.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-048", "type": "MCQ", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Dovato is a two-drug single-tablet regimen containing which components?", "opts": ["Dolutegravir and rilpivirine", "Bictegravir and emtricitabine", "Dolutegravir and lamivudine", "Cabotegravir and rilpivirine"], "ans": 2, "exp": "**Dovato = dolutegravir + lamivudine (DTG/3TC)** — a 2-drug complete regimen for naive or suppressed patients, **excluding** HIV RNA >500,000, HBV coinfection, or use before genotype/HBV results. (DTG/RPV = Juluca; CAB/RPV = Cabenuva injectable.)", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-049", "type": "MCQ", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Juluca (dolutegravir/rilpivirine) is FDA-approved for which use?", "opts": ["Initial therapy in any treatment-naive patient regardless of baseline viral load", "Pre-exposure prophylaxis in HIV-negative individuals at ongoing risk", "Salvage therapy in multidrug-resistant HIV with an optimized background", "Maintenance switch in suppressed patients without prior resistance or failure"], "ans": 3, "exp": "**Juluca = DTG/RPV**, a 2-drug **maintenance/switch** regimen for patients **already virologically suppressed** (≥6 months) without prior failure/resistance — not for initial therapy, PrEP, or salvage. Remember rilpivirine's food + acid requirements.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-050", "type": "MCQ", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "recall": true, "stem": "Symtuza is notable as the only single-tablet regimen built around which component?", "opts": ["A boosted protease inhibitor backbone (darunavir with cobicistat)", "An unboosted integrase strand-transfer inhibitor as the anchor", "A CCR5 co-receptor antagonist requiring a tropism assay", "A subcutaneous fusion inhibitor used in salvage regimens"], "ans": 0, "exp": "**Symtuza = darunavir/cobicistat/emtricitabine/TAF (D/C/F/TAF)** — the only **boosted-PI STR**, useful for its **high genetic barrier** (e.g., adherence concerns, rapid start before genotype). Carries the PI/cobicistat DDI burden.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-051", "type": "SATA", "subtopic": "Single-Tablet & 2-Drug Regimens", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "stem": "Which statements about HIV single-tablet and two-drug regimens are correct? Select all that apply.", "opts": ["Biktarvy (BIC/FTC/TAF) is an INSTI-based regimen needing no booster or HLA testing", "Triumeq (DTG/3TC/ABC) requires a negative HLA-B*5701 before use", "Dovato (DTG/3TC) is avoided when HIV RNA exceeds 500,000 copies/mL or with HBV coinfection", "Symtuza (DRV/c/FTC/TAF) is a boosted protease-inhibitor regimen", "Juluca (DTG/RPV) is indicated as initial therapy in treatment-naive patients"], "ans": [0, 1, 2, 3], "exp": "True: **Biktarvy** (no booster/HLA), **Triumeq needs HLA-B*5701**, **Dovato excluded at high VL/HBV**, **Symtuza is boosted-PI**. False: **Juluca is a maintenance/switch regimen**, not initial therapy.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-052", "type": "SATA", "subtopic": "INSTIs", "domain": "D1", "tier": "T2", "nabp": "1.A.1", "stem": "Which statements about the integrase strand-transfer inhibitor (INSTI) class are correct? Select all that apply.", "opts": ["They block integration of proviral DNA into the host genome", "Dolutegravir and bictegravir have a high genetic barrier to resistance", "Polyvalent cations chelate INSTIs and reduce their oral absorption", "Dolutegravir and bictegravir can cause a benign rise in serum creatinine", "All INSTIs require pharmacokinetic boosting with cobicistat"], "ans": [0, 1, 2, 3], "exp": "INSTIs: **block strand transfer/integration**, **DTG/BIC high barrier**, **cation chelation** DDI, **benign ↑SCr** (DTG/BIC). Only **elvitegravir requires cobicistat** — DTG, BIC, RAL, CAB are **not** boosted, so the last option is false.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-053", "type": "SATA", "subtopic": "NNRTIs", "domain": "D1", "tier": "T2", "nabp": "1.A.2", "stem": "Which statements about the NNRTI class are correct? Select all that apply.", "opts": ["They bind allosterically to reverse transcriptase (non-competitive inhibition)", "Efavirenz causes CNS effects and also induces CYP enzymes", "Rilpivirine requires gastric acid and is contraindicated with proton pump inhibitors", "Nevirapine carries risks of hepatotoxicity and severe rash", "NNRTIs act as DNA chain terminators after phosphorylation"], "ans": [0, 1, 2, 3], "exp": "NNRTIs: **allosteric RT inhibition**, **efavirenz CNS + CYP inducer**, **rilpivirine acid-dependent (PPI contraindicated)**, **nevirapine hepatotox/rash**. They are **not** chain terminators (that is the NRTIs) — last option false.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-054", "type": "SATA", "subtopic": "Entry, Fusion & Capsid Agents", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "aware": true, "stem": "Which agent-and-mechanism pairings used in multidrug-resistant or salvage HIV are correct? Select all that apply.", "opts": ["Maraviroc — CCR5 antagonist requiring a tropism assay", "Enfuvirtide — fusion inhibitor given subcutaneously", "Ibalizumab — post-attachment monoclonal antibody given intravenously", "Fostemsavir — gp120 attachment inhibitor taken orally", "All of these agents are recommended first-line for treatment-naive patients"], "ans": [0, 1, 2, 3], "exp": "Salvage/MDR agents: **maraviroc (CCR5, tropism test)**, **enfuvirtide (fusion, SC)**, **ibalizumab (post-attachment mAb, IV)**, **fostemsavir (gp120 attachment, oral)**. These are reserved for **treatment-experienced/MDR** HIV, **not** first-line in naive patients — last option false.", "anchor": "DHHS ARV Guidelines"},
{"id": "HIV-101", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "For most treatment-naive adults, the DHHS-recommended initial antiretroviral regimen consists of which structure?", "opts": ["An integrase strand-transfer inhibitor plus two NRTIs", "Two protease inhibitors combined with a pharmacokinetic booster", "One NNRTI combined with a single NRTI as a sparing regimen", "Three NRTIs from the same nucleoside backbone class"], "ans": 0, "exp": "For most people, DHHS recommends **an INSTI + 2 NRTIs** (e.g., BIC/FTC/TAF; DTG + a tenofovir-based backbone) for potency, tolerability, and barrier to resistance. Universal ART is recommended **regardless of CD4 count**.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-102", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "Which single-tablet regimen is a DHHS-recommended option for most treatment-naive patients?", "opts": ["Darunavir/cobicistat/emtricitabine/tenofovir alafenamide", "Bictegravir/emtricitabine/tenofovir alafenamide", "Elvitegravir/cobicistat/emtricitabine/tenofovir disoproxil", "Efavirenz/emtricitabine/tenofovir disoproxil fumarate"], "ans": 1, "exp": "**BIC/FTC/TAF (Biktarvy)** is a recommended initial STR for most: INSTI-based, **no booster, no HLA-B*5701, no food requirement**, high barrier. Boosted-PI and EVG/cobicistat STRs are alternatives; efavirenz-based regimens are now largely superseded.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-103", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "The two-drug regimen dolutegravir/lamivudine (Dovato) should be AVOIDED as initial therapy in which situation?", "opts": ["A patient who prefers a once-daily single-tablet regimen", "A patient older than 60 years with controlled hypertension", "A baseline HIV-1 RNA above 500,000 copies/mL or hepatitis B coinfection", "A patient with a documented sulfonamide allergy"], "ans": 2, "exp": "**DTG/3TC is excluded when HIV RNA >500,000, with HBV coinfection, or before genotype/HBV results are available** (3TC alone is inadequate for HBV; high VL risks failure). Otherwise it is an effective 2-drug option that spares tenofovir/abacavir.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-104", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "When starting ART rapidly before resistance-test results are available, which anchor agent is preferred because of its high genetic barrier?", "opts": ["Rilpivirine, because it is well tolerated at any viral load", "Elvitegravir, because of its convenient once-daily dosing", "Nevirapine, because it produces a rapid initial viral decline", "Dolutegravir or boosted darunavir, given the low rate of transmitted resistance"], "ans": 3, "exp": "For **rapid start before genotype**, use a **high-barrier anchor — dolutegravir or boosted darunavir** (low transmitted INSTI/PI resistance). **Avoid NNRTIs (rilpivirine, efavirenz, nevirapine)** before resistance is known (low barrier), and avoid abacavir until HLA-B*5701 returns.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-105", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "According to current guidelines, when should antiretroviral therapy be initiated in a newly diagnosed patient?", "opts": ["In all patients regardless of CD4 count, as soon as feasible", "Only once the CD4 count falls below 350 cells/mm³", "Only after two confirmatory viral-load measurements weeks apart", "Only when the patient develops an opportunistic infection"], "ans": 0, "exp": "**ART is recommended for all people with HIV regardless of CD4 count, started as soon as possible** (including rapid/same-day start), to reduce morbidity, mortality, and transmission (treatment as prevention; U=U).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-106", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Why is an abacavir-containing regimen generally avoided when starting ART rapidly before lab results return?", "opts": ["Abacavir cannot be combined with any integrase inhibitor", "Abacavir requires a negative HLA-B*5701 result that may not yet be available", "Abacavir requires a CCR5 tropism assay before any use", "Abacavir is contraindicated in all patients under age 50"], "ans": 1, "exp": "**Abacavir needs a documented negative HLA-B*5701** (HSR risk); during rapid start that result may be pending, so a non-abacavir backbone (e.g., TAF/FTC) is preferred until it returns.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-107", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D2", "tier": "T2", "nabp": "2.A.1", "stem": "Which pairing is an appropriate two-NRTI backbone for an initial regimen?", "opts": ["Lamivudine plus emtricitabine for additive cytidine activity", "Zidovudine plus stavudine for enhanced potency", "Tenofovir alafenamide plus emtricitabine as a fixed-dose backbone", "Abacavir plus tenofovir without any third agent"], "ans": 2, "exp": "Standard backbones are **TAF/FTC, TDF/FTC, or ABC/3TC** (HLA-negative). **Never combine 3TC + FTC** (redundant cytidine analogues). AZT+d4T is contraindicated (overlapping toxicity); a backbone always pairs with a third agent (INSTI, etc.).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-108", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "A clinician plans dolutegravir/abacavir/lamivudine (Triumeq) for a naive patient. What must be confirmed first?", "opts": ["A CCR5-tropic virus on a tropism assay", "An undetectable hepatitis C viral load", "A normal baseline QTc interval", "A negative HLA-B*5701 allele result"], "ans": 3, "exp": "**Triumeq contains abacavir → confirm HLA-B*5701 negative** before prescribing. It is a complete INSTI-based STR with a high barrier (dolutegravir). Tropism testing applies to maraviroc, not Triumeq.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-109", "type": "SATA", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which statements about selecting an initial antiretroviral regimen are correct? Select all that apply.", "opts": ["An INSTI plus two NRTIs is recommended for most treatment-naive patients", "ART should be offered to all patients regardless of CD4 count", "Dolutegravir/lamivudine is avoided with HBV coinfection or very high viral load", "A high-barrier anchor is preferred when starting before genotype results return", "Abacavir may be started immediately without any pharmacogenomic testing"], "ans": [0, 1, 2, 3], "exp": "True: **INSTI + 2 NRTIs**, **treat all regardless of CD4**, **DTG/3TC excluded with HBV/high VL/pre-genotype**, **high-barrier anchor for rapid start**. False: **abacavir always requires HLA-B*5701** screening first.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-110", "type": "MCQ", "subtopic": "Initial Regimen Selection", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "stem": "Why is boosted darunavir a useful anchor when adherence is uncertain or resistance is unknown?", "opts": ["It has a high genetic barrier with a low rate of treatment-emergent resistance", "It has the lowest genetic barrier, so resistance develops predictably", "It requires no booster and therefore has minimal drug interactions", "It is the only agent active against CCR5-tropic virus"], "ans": 0, "exp": "**Boosted darunavir has a high genetic barrier and low treatment-emergent resistance** — forgiving of adherence lapses and useful before genotype returns. It still requires boosting (ritonavir/cobicistat) and carries the PI DDI burden.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-111", "type": "MCQ", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Cabenuva is a long-acting injectable regimen containing which two agents, used for which purpose?", "opts": ["Bictegravir and lenacapavir, for pre-exposure prophylaxis", "Cabotegravir and rilpivirine, for maintenance in virologically suppressed patients", "Dolutegravir and darunavir, for multidrug-resistant salvage therapy", "Lenacapavir and tenofovir, for treatment-naive initiation"], "ans": 1, "exp": "ℹ **Cabenuva = cabotegravir (INSTI) + rilpivirine (NNRTI), long-acting IM**, for **maintenance** in patients **already virologically suppressed** on oral ART without resistance/failure. Not for naive starts, salvage, or PrEP (CAB alone = Apretude for PrEP).", "anchor": "DHHS ARV Guidelines; Cabenuva PI"}, {"id": "HIV-112", "type": "MCQ", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "Which patient is the most appropriate candidate for long-acting injectable cabotegravir/rilpivirine?", "opts": ["A treatment-naive patient with a viral load of 600,000 copies/mL", "A patient with active hepatitis B coinfection requiring ongoing therapy", "A virologically suppressed patient without prior failure or known resistance", "A patient with documented rilpivirine and integrase resistance"], "ans": 2, "exp": "Cabenuva candidates are **virologically suppressed, with no history of treatment failure and no known resistance to either component**, and who can adhere to the injection schedule. High VL, HBV coinfection (no HBV-active drug), and RPV/INSTI resistance are reasons to avoid it.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-113", "type": "MCQ", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D2", "tier": "T2", "nabp": "2.A.5", "stem": "A patient on injectable cabotegravir/rilpivirine will miss an upcoming injection by more than the allowed window. What is the recommended approach?", "opts": ["Skip the dose entirely and resume at the next scheduled visit", "Double the next injection volume to compensate for the missed dose", "Permanently discontinue the regimen after a single missed injection", "Use oral bridging therapy to cover the gap until injections resume"], "ans": 3, "exp": "For an anticipated delay beyond the dosing window, **oral bridging therapy** (e.g., oral cabotegravir + rilpivirine) covers the gap to maintain suppression and prevent resistance. Adherence to the injection schedule is essential because subtherapeutic long-acting levels can select resistance.", "anchor": "Cabenuva PI"}, {"id": "HIV-114", "type": "MCQ", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D3", "tier": "T3", "nabp": "3.C.5", "stem": "Why is injectable cabotegravir/rilpivirine NOT appropriate as the sole regimen in a patient with HIV–hepatitis B coinfection?", "opts": ["Neither component has activity against hepatitis B, leaving HBV untreated", "Rilpivirine is hepatotoxic and worsens hepatitis B", "Cabotegravir reactivates latent hepatitis B virus", "The combination is contraindicated with all tenofovir products"], "ans": 0, "exp": "**Cabotegravir and rilpivirine have no hepatitis B activity** — using them alone leaves HBV untreated (risk of progression and, if a prior HBV-active drug is stopped, a flare). HBV-coinfected patients need a **tenofovir-based** backbone.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-115", "type": "MCQ", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D2", "tier": "T2", "nabp": "2.A.5", "stem": "What are the approved dosing-interval options for injectable cabotegravir/rilpivirine maintenance?", "opts": ["Once weekly or once every two weeks", "Once monthly or once every two months", "Once every three months or twice yearly", "A single one-time injection only"], "ans": 1, "exp": "**Cabenuva is given IM once monthly OR once every 2 months** (after optional oral lead-in), by a health professional. (Contrast lenacapavir PrEP, which is twice yearly.)", "anchor": "Cabenuva PI"}, {"id": "HIV-116", "type": "SATA", "subtopic": "Long-Acting Injectable Maintenance", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Which statements about long-acting injectable cabotegravir/rilpivirine (Cabenuva) are correct? Select all that apply.", "opts": ["It is indicated for maintenance in virologically suppressed patients", "It is given intramuscularly monthly or every two months", "Oral bridging therapy is used when an injection will be delayed", "It provides reliable coverage for hepatitis B coinfection", "It is appropriate as initial therapy for treatment-naive patients with high viral loads"], "ans": [0, 1, 2], "exp": "True: **maintenance in suppressed patients**, **IM monthly or q2 months**, **oral bridging for delays**. False: it has **no HBV activity**, and it is **not** for treatment-naive initiation (especially not at high viral loads).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-121", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T1", "nabp": "3.C.6", "stem": "A patient previously suppressed on ART now has a confirmed rising viral load. What is the most appropriate FIRST step?", "opts": ["Immediately add a single new active agent to the current regimen", "Stop all antiretrovirals and recheck the viral load in 3 months", "Assess adherence and obtain resistance testing while still on the failing regimen", "Switch empirically to a protease-inhibitor regimen without testing"], "ans": 2, "exp": "On virologic failure, **first assess adherence and obtain a resistance genotype WHILE the patient is still on the failing regimen** (mutations are detectable under drug pressure). Never add a single drug to a failing regimen (functional monotherapy → resistance).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-122", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "For an accurate resistance genotype, when should the sample be collected relative to the failing regimen?", "opts": ["After the patient has been off all therapy for several months", "Only once the viral load has dropped below 200 copies/mL", "At least one year after the regimen was discontinued", "While on the failing regimen, or within about 4 weeks of stopping it"], "ans": 3, "exp": "Resistance testing is most informative **on the failing regimen or within ~4 weeks of stopping** — off drug, wild-type virus outgrows resistant strains and mutations may no longer be detected (though they remain archived).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-123", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "When constructing a new regimen after treatment failure, what is the guiding principle?", "opts": ["Include at least two fully active agents based on resistance results", "Add one fully active agent on top of the existing failing regimen", "Keep the same regimen but increase the dose of each component drug", "Select the agents solely on the basis of acquisition cost"], "ans": 0, "exp": "Build the new regimen around **at least two fully active agents** guided by resistance testing and history. **Never add a single active drug to a failing regimen** (functional monotherapy breeds further resistance).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-124", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "stem": "What does the concept of 'archived resistance' mean for regimen selection?", "opts": ["Resistance mutations disappear permanently once the drug is stopped", "Past resistance mutations persist and can re-emerge despite a clean current genotype", "Resistance is relevant only for the protease inhibitor drug class", "A single clean genotype reliably rules out all prior resistance for life"], "ans": 1, "exp": "**Archived resistance**: mutations selected by prior regimens persist in latent reservoirs and **can re-emerge** even when a current genotype (which reflects only the dominant circulating virus) looks clean. Always weigh the **full treatment history**, not just the latest genotype.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-125", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "Which regimen anchors are most vulnerable to rapid resistance if adherence is poor?", "opts": ["Dolutegravir and bictegravir, the high-barrier integrase inhibitors", "Boosted darunavir, a high-barrier protease inhibitor", "Raltegravir, elvitegravir, and the NNRTIs (lower genetic barrier)", "Boosted atazanavir, another high-barrier protease inhibitor"], "ans": 2, "exp": "**Low genetic barrier — raltegravir, elvitegravir, and the NNRTIs (efavirenz, rilpivirine, nevirapine)** — can develop resistance with a single mutation if doses are missed. **DTG/BIC and boosted PIs are high-barrier** and more forgiving.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-126", "type": "SATA", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T2", "nabp": "3.C.6", "stem": "Which principles apply to managing antiretroviral treatment failure? Select all that apply.", "opts": ["Assess adherence before assuming biologic resistance", "Obtain resistance testing while the patient is still on the failing regimen", "Build the new regimen with at least two fully active agents", "Consider archived resistance from the full treatment history", "Add a single new active drug to the current failing regimen"], "ans": [0, 1, 2, 3], "exp": "Sound principles: **check adherence first**, **genotype on the failing regimen**, **≥2 fully active agents**, **account for archived resistance**. **Adding one drug to a failing regimen is functional monotherapy** and is wrong.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-127", "type": "MCQ", "subtopic": "Treatment Failure & Resistance", "domain": "D3", "tier": "T3", "nabp": "3.C.6", "aware": true, "stem": "Which agents are specifically used to construct regimens for heavily treatment-experienced, multidrug-resistant HIV?", "opts": ["Efavirenz, nevirapine, and rilpivirine as a salvage NNRTI combination", "Bictegravir, emtricitabine, and tenofovir alafenamide as a single tablet", "Lamivudine, abacavir, and zidovudine as a nucleoside-only regimen", "Fostemsavir, ibalizumab, and lenacapavir with an optimized background"], "ans": 3, "exp": "ℹ MDR salvage uses novel-mechanism agents — **fostemsavir (attachment), ibalizumab (post-attachment mAb), lenacapavir (capsid)** — combined with the **optimized background regimen** containing any remaining active drugs.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-131", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A patient on a cobicistat-boosted regimen needs treatment for active tuberculosis. Which rifamycin consideration is correct?", "opts": ["Rifampin is a strong inducer that drastically lowers boosted-ARV levels; rifabutin is preferred", "Rifampin is preferred because it is the weakest enzyme inducer", "Both rifampin and rifabutin are contraindicated with all antiretrovirals", "Rifampin can be used safely with cobicistat at standard doses"], "ans": 0, "exp": "⚠ **Rifampin = strong CYP3A inducer → can't combine with boosted PIs/cobicistat or most INSTIs at standard dose.** Use **rifabutin** (weaker inducer) instead, with dose adjustments. (Dolutegravir can be used with rifampin only if dosed BID.) High-yield TB–HIV interaction.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-132", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "A patient on a ritonavir-boosted protease inhibitor needs a statin. Which choice is appropriate?", "opts": ["Simvastatin at a standard dose", "A low dose of atorvastatin or pravastatin with monitoring", "Lovastatin titrated to the lipid goal", "Any statin at full dose, since no interaction exists"], "ans": 1, "exp": "⚠ **Boosters strongly inhibit CYP3A → simvastatin and lovastatin are contraindicated (rhabdomyolysis).** Use **pravastatin, or low-dose atorvastatin/rosuvastatin** with careful titration and monitoring.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-133", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Why should St. John's wort be avoided in patients on protease inhibitors, NNRTIs, or maraviroc?", "opts": ["It inhibits CYP3A and causes toxic antiretroviral drug accumulation", "It chelates the antiretroviral within the gastrointestinal tract lumen", "It induces CYP3A and P-glycoprotein, lowering ARV levels and risking failure", "It directly antagonizes the integrase strand-transfer enzyme reaction"], "ans": 2, "exp": "**St. John's wort is a CYP3A/P-gp inducer → ↓ ARV concentrations → virologic failure and resistance.** Avoid it with PIs, NNRTIs, maraviroc, and other CYP3A-dependent agents.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-134", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A woman on efavirenz uses a combined oral contraceptive. What counseling is appropriate?", "opts": ["No interaction occurs; the contraceptive remains fully effective", "Efavirenz raises hormone levels, so the contraceptive dose should be reduced", "The contraceptive should be taken 2 hours after efavirenz to avoid chelation", "Efavirenz can reduce hormonal contraceptive efficacy; recommend an additional or alternative method"], "ans": 3, "exp": "**Efavirenz induces metabolism of hormonal contraceptives → reduced efficacy.** Advise a reliable additional/barrier method (or a more robust contraceptive option). Several boosters/ARVs alter hormone exposure — counsel and individualize.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-135", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T1", "nabp": "3.C.3", "stem": "Acid-suppressing therapy most significantly reduces the absorption of which antiretrovirals?", "opts": ["Atazanavir and rilpivirine", "Dolutegravir and bictegravir", "Tenofovir and emtricitabine", "Raltegravir and lamivudine"], "ans": 0, "exp": "**Atazanavir and rilpivirine require gastric acid for absorption** → PPIs (contraindicated with rilpivirine; tightly restricted/separated with atazanavir) and H2 blockers/antacids reduce levels. INSTIs are affected by **polyvalent cation chelation**, a different mechanism.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-136", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient on an integrase inhibitor takes a calcium carbonate antacid for reflux. What is the best counseling?", "opts": ["Take the antacid and the integrase inhibitor together to boost absorption", "Separate doses (INSTI 2 h before or 6 h after the cation) or follow labeling", "Stop the integrase inhibitor entirely while using any antacid product", "No spacing is needed because antacids do not affect integrase inhibitors"], "ans": 1, "exp": "**Polyvalent cations (Ca, Mg, Al, Fe) chelate INSTIs → ↓ absorption.** Separate dosing (commonly INSTI 2 h before or 6 h after), or use the product-specific rule (e.g., DTG/BIC may be taken with the cation if also taken with food, per labeling).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-137", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A patient on a boosted antiretroviral regimen is prescribed carbamazepine. What is the concern?", "opts": ["Carbamazepine inhibits CYP3A and leads to antiretroviral drug toxicity", "Carbamazepine chelates the antiretroviral agent within the gut lumen", "Carbamazepine induces CYP3A, lowering ARV levels and risking failure", "There is no clinically meaningful interaction between the two drugs"], "ans": 2, "exp": "**Carbamazepine (and phenytoin, phenobarbital) are strong enzyme inducers → ↓ ARV exposure → failure/resistance.** Prefer non-inducing anticonvulsants (e.g., levetiracetam, lamotrigine) or adjust/monitor closely.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-138", "type": "SATA", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Because ritonavir and cobicistat strongly inhibit CYP3A4, which co-medications require avoidance or major caution? Select all that apply.", "opts": ["Simvastatin and lovastatin", "Ergot alkaloids such as ergotamine", "Oral midazolam or triazolam", "Rifampin", "Lisinopril"], "ans": [0, 1, 2, 3], "exp": "With boosters, avoid **simvastatin/lovastatin** (rhabdo), **ergots** (ergotism), **oral midazolam/triazolam** (oversedation), and **rifampin** (it slashes booster levels). **Lisinopril** is renally cleared with no CYP3A interaction.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-139", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "A diabetic patient on metformin is started on dolutegravir. What adjustment is appropriate?", "opts": ["Increase metformin because dolutegravir lowers its levels", "Stop dolutegravir, since the combination is absolutely contraindicated", "Separate the two drugs by 6 hours to avoid chelation", "Limit the metformin dose because dolutegravir raises its exposure"], "ans": 3, "exp": "**Dolutegravir inhibits renal OCT2/MATE transport → ↑ metformin levels.** Cap metformin (commonly ≤1,000 mg/day), monitor glycemia, GI tolerance, and renal function. Not an absolute contraindication.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-140", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T3", "nabp": "3.C.3", "stem": "Why is rifabutin generally preferred over rifampin when treating tuberculosis in a patient on a boosted antiretroviral regimen?", "opts": ["Rifabutin is a less potent CYP3A inducer and is more compatible with dose adjustment", "Rifabutin has no antimycobacterial activity, so it avoids resistance", "Rifabutin is renally cleared and has no metabolic interactions", "Rifabutin can be combined with simvastatin without risk"], "ans": 0, "exp": "**Rifabutin is a weaker CYP3A inducer than rifampin**, so it can be combined (with dose adjustments) with boosted PIs/cobicistat where rifampin cannot. Both are active anti-TB rifamycins; the difference is the magnitude of enzyme induction.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-141", "type": "SATA", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which statements about acid-dependent antiretrovirals and their management are correct? Select all that apply.", "opts": ["Rilpivirine absorption falls when gastric pH rises", "Proton pump inhibitors are contraindicated with rilpivirine", "Atazanavir requires an acidic environment for absorption", "H2-receptor antagonists with atazanavir or rilpivirine should be dose-separated", "Tenofovir and lamivudine require gastric acid for absorption"], "ans": [0, 1, 2, 3], "exp": "**Rilpivirine and atazanavir are acid-dependent**: rising pH ↓ absorption → **PPIs contraindicated with rilpivirine**, and **H2 blockers/antacids must be separated** for both. **Tenofovir/lamivudine are not acid-dependent** — last option false.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-142", "type": "MCQ", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which combination is CONTRAINDICATED because of a dangerous pharmacokinetic interaction?", "opts": ["Bictegravir with a once-daily multivitamin taken at a separate time", "Ritonavir-boosted darunavir with simvastatin", "Dolutegravir with metformin at a limited dose", "Tenofovir alafenamide with emtricitabine"], "ans": 1, "exp": "**Boosted PI + simvastatin is contraindicated** (CYP3A inhibition → simvastatin accumulation → rhabdomyolysis). The others are manageable: spaced cations with INSTI, dose-limited DTG+metformin, and TAF/FTC is a standard backbone.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-151", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "After a patient starts ART, when is the viral load typically rechecked, and what is expected?", "opts": ["At one year only, expecting essentially no measurable change in level", "Every single day for the first month to confirm immediate undetectability", "Within about 4–8 weeks, expecting a decline toward suppression by ~24 weeks", "Only if the patient develops symptoms of an opportunistic infection"], "ans": 2, "exp": "Recheck viral load **~4–8 weeks after starting/changing ART**, expecting a steady decline and **virologic suppression by ~24 weeks**, then monitor every 3–6 months. Lack of expected decline prompts an adherence/resistance assessment.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-152", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.3", "stem": "Weeks after starting ART, a patient with a very low baseline CD4 develops worsening inflammation around a known infection. What is the most likely cause?", "opts": ["Antiretroviral hypersensitivity requiring immediate drug discontinuation", "Acute treatment failure from transmitted resistance", "A new unrelated drug allergy to the NRTI backbone", "Immune reconstitution inflammatory syndrome (IRIS); generally continue ART"], "ans": 3, "exp": "**IRIS** = paradoxical inflammatory worsening of an underlying/occult infection as immunity recovers, typically in patients with **low baseline CD4** soon after ART start. Usually **continue ART**, treat the underlying infection, and add anti-inflammatory therapy if severe.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-153", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which combination is most associated with clinically significant weight gain?", "opts": ["An integrase inhibitor combined with tenofovir alafenamide", "An NNRTI combined with an abacavir-based nucleoside backbone", "Two nucleoside analogues used together without any third agent", "A fusion inhibitor combined with an oral CCR5 antagonist"], "ans": 0, "exp": "**INSTIs (esp. DTG/BIC) + TAF are associated with weight gain.** Monitor weight, lipids, and glucose, and discuss diet/activity; consider regimen factors if gain is excessive.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-154", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Dyslipidemia is most characteristically associated with which antiretroviral components?", "opts": ["Lamivudine and emtricitabine", "Protease inhibitors and efavirenz", "Raltegravir and dolutegravir", "Enfuvirtide and maraviroc"], "ans": 1, "exp": "**Protease inhibitors and efavirenz** are classically linked to **dyslipidemia** (and PIs to insulin resistance). Monitor a fasting lipid panel; manage with statins chosen to avoid CYP3A interactions (no simvastatin/lovastatin with boosters).", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-155", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which monitoring is most important for a patient on a tenofovir disoproxil fumarate (TDF)-based regimen?", "opts": ["Serial electrocardiograms for QT prolongation", "Complete blood count for myelosuppression", "Renal function, serum phosphate, and bone health", "Thyroid function tests every visit"], "ans": 2, "exp": "**TDF → proximal tubulopathy and bone-density loss** → monitor **renal function (SCr/eGFR), urinalysis, serum phosphate, and bone health**. TAF causes less renal/bone toxicity but more weight/lipid effect.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-156", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D1", "tier": "T3", "nabp": "3.D.2", "stem": "Lactic acidosis and lipoatrophy are toxicities historically tied to which drug class?", "opts": ["Integrase strand-transfer inhibitors such as dolutegravir", "CCR5 co-receptor antagonists such as oral maraviroc", "Pharmacokinetic boosters such as ritonavir or cobicistat", "Older nucleoside analogues such as stavudine and didanosine"], "ans": 3, "exp": "**Mitochondrial toxicity (lactic acidosis, lipoatrophy, peripheral neuropathy)** is tied to **older NRTIs (stavudine/d4T, didanosine/ddI)** — now largely abandoned. Current NRTIs (TAF, FTC, 3TC, ABC) carry far lower mitochondrial risk.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-157", "type": "SATA", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.1", "stem": "Which monitoring or complication associations are correct for antiretroviral therapy? Select all that apply.", "opts": ["Viral load is rechecked ~4–8 weeks after starting ART to confirm decline", "INSTI plus TAF regimens are associated with weight gain", "TDF requires monitoring of renal function and bone health", "Protease inhibitors are associated with dyslipidemia", "CD4 count is the marker used to assess virologic response to therapy"], "ans": [0, 1, 2, 3], "exp": "True: **early VL recheck**, **INSTI+TAF weight gain**, **TDF renal/bone monitoring**, **PI dyslipidemia**. False: **viral load (not CD4)** measures virologic response; CD4 reflects immune recovery/OI risk.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-158", "type": "MCQ", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T3", "nabp": "3.D.1", "stem": "In a patient who is stable and virologically suppressed with a well-recovered CD4 count, how does CD4 monitoring change?", "opts": ["CD4 monitoring can become less frequent or optional once durably high", "CD4 must still be checked every 4 weeks indefinitely during suppression", "CD4 should be checked every single day throughout the suppression period", "CD4 testing replaces viral load as the measure of virologic control"], "ans": 0, "exp": "Once a patient is **suppressed with a durably high CD4**, **CD4 monitoring becomes less frequent (often annually) or optional**, while **viral load** continues to be tracked as the marker of virologic control.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-143", "type": "SATA", "subtopic": "Drug Interactions", "domain": "D3", "tier": "T2", "nabp": "3.C.3", "stem": "Which statements about enzyme-inducer interactions with antiretrovirals are correct? Select all that apply.", "opts": ["Rifampin strongly induces CYP3A and markedly lowers boosted-ARV levels", "Rifabutin is preferred over rifampin with boosted regimens because it induces less", "Carbamazepine and phenytoin can lower antiretroviral concentrations", "St. John's wort can reduce antiretroviral levels and risk failure", "Rifabutin has no metabolic interaction with antiretrovirals"], "ans": [0, 1, 2, 3], "exp": "Inducers ↓ ARV exposure → failure/resistance: **rifampin (strong) — avoid with boosted regimens; use rifabutin** (weaker inducer, still interacts → dose-adjust), **carbamazepine/phenytoin**, **St. John's wort**. The claim that rifabutin has *no* interaction is false.", "anchor": "DHHS ARV Guidelines"}, {"id": "HIV-159", "type": "SATA", "subtopic": "Monitoring & Long-Term Complications", "domain": "D3", "tier": "T2", "nabp": "3.D.2", "stem": "Which antiretroviral toxicity associations are correct? Select all that apply.", "opts": ["TDF — renal tubulopathy and reduced bone mineral density", "Protease inhibitors and efavirenz — dyslipidemia", "INSTI plus TAF regimens — weight gain", "Older NRTIs (stavudine, didanosine) — lactic acidosis and lipoatrophy", "Integrase inhibitors — severe bone marrow suppression"], "ans": [0, 1, 2, 3], "exp": "Correct: **TDF renal/bone**, **PI/EFV dyslipidemia**, **INSTI+TAF weight gain**, **older NRTI mitochondrial toxicity** (lactic acidosis, lipoatrophy). INSTIs are **not** associated with severe myelosuppression (that is zidovudine) — last option false.", "anchor": "DHHS ARV Guidelines"},
{"id": "HIV-201", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T1", "nabp": "3.C.2", "stem": "Which oral agent is a first-line option for HIV pre-exposure prophylaxis (PrEP)?", "opts": ["Tenofovir disoproxil fumarate/emtricitabine (Truvada)", "Dolutegravir/lamivudine taken once daily", "Atazanavir boosted with cobicistat", "Maraviroc after a CCR5 tropism assay"], "ans": 0, "exp": "**Oral PrEP = TDF/FTC (Truvada)** or **TAF/FTC (Descovy)**, taken daily in HIV-negative individuals at risk. Treatment regimens (DTG/3TC, boosted PIs, maraviroc) are not PrEP. A negative HIV test is required before starting.", "anchor": "CDC/USPSTF PrEP guidance"}, {"id": "HIV-202", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "stem": "What is the key labeling limitation of TAF/emtricitabine (Descovy) for PrEP?", "opts": ["It is approved for use only in patients older than 65 years of age", "It is not indicated for people at risk through receptive vaginal sex (no efficacy data)", "It requires a CCR5 co-receptor tropism assay before it can be initiated", "It must be combined with an integrase inhibitor to work as PrEP"], "ans": 1, "exp": "**Descovy (TAF/FTC) is not indicated for those at risk via receptive vaginal sex** (efficacy not established in that population), so **TDF/FTC remains the option there**. Descovy spares renal/bone toxicity relative to TDF for other risk groups.", "anchor": "Descovy PI"}, {"id": "HIV-203", "type": "MCQ", "subtopic": "PrEP & PEP", "domain": "D3", "tier": "T2", "nabp": "3.C.2", "aware": true, "stem": "Injectable cabotegravir (Apretude) for PrEP is administered on which schedule after initiation?", "opts": ["Once weekly subcutaneously", "Once every 6 months subcutaneously", "Intramuscularly every 2 months", "A single one-time intramuscular dose"], "ans": 2, "exp": "ℹ **Apretude (cabotegravir long-acting) for PrEP**: after an optional oral lead-in, IM injections at month 1, month 2, then **every 2
