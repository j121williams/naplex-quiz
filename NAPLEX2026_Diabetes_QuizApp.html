ro (Humalog), Fiasp); basal/NPH/premix are not used. ★ Change the infusion set every **2–3 days** (site rotation, infection/occlusion). *NABP: 3.E.2.*"}, {"id": 178, "group": "Products — Tier 3", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.A.1 / 3.E.2", "stem": "A caregiver wants a **needle-free** rescue glucagon for an unconscious patient. Best option?", "opts": ["Gvoke — prefilled SC autoinjector", "Zegalogue — SC autoinjector", "GlucaGen Emergency Kit (reconstitute powder + inject)", "Baqsimi — intranasal 3 mg, no reconstitution"], "ans": 3, "exp": "**Baqsimi** = **intranasal** 3 mg (needle-free, works even if the patient can't inhale). Gvoke/Zegalogue are prefilled **SC**; **GlucaGen** requires **reconstitution.** *NABP: 2.A.1 / 3.E.2.*"}, {"id": 179, "group": "Products — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.2 / 3.E.2", "stem": "Correct administration of **Byetta (exenatide, immediate-release)** vs **Bydureon BCise (exenatide ER)**?", "opts": ["Byetta = twice daily within 60 min BEFORE morning/evening meals; Bydureon BCise = once weekly (resuspend)", "Both are once daily at bedtime", "Both are given after meals", "Byetta = once weekly; Bydureon = twice daily"], "ans": 0, "exp": "**Byetta** = **BID, within 60 min before** the 2 main meals (not after); **Bydureon BCise** = **once weekly** (resuspend the autoinjector). *NABP: 2.A.2 / 3.E.2.*"}, {"id": 181, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "A non-critically-ill hospitalized T2DM patient on basal-bolus insulin. Per ADA inpatient targets and best practice:", "opts": ["Target 140–180 mg/dL; scheduled basal-bolus is preferred over sliding-scale-alone", "Target <120 fasting; stop all insulin", "Target 200–250 to avoid hypoglycemia", "Target glucose 80–110; use sliding-scale insulin alone"], "ans": 0, "exp": "Inpatient goal **140–180 mg/dL**; **scheduled basal + prandial + correction** beats **sliding-scale-alone** (which reactively chases highs). ⚠ Tight 80–110 control ↑ hypoglycemia. *NABP: 3.D.2.*"}, {"id": 182, "group": "High-Yield Breadth", "domain": "D1", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which is correct about **metformin (Glucophage)** safety?", "opts": ["Safe at any eGFR", "Contraindicated at eGFR <30; don't start if eGFR 30–45; hold at iodinated contrast/acute illness; monitor B12", "Causes frequent hypoglycemia", "Must be held only for surgery, never for contrast"], "ans": 1, "exp": "Lactic-acidosis risk → **CI <30**, don't initiate **30–45**, **hold around contrast/acute kidney injury/sepsis**, and monitor **B12** (long-term deficiency). *NABP: 3.C.2 / 2.A.4.*"}, {"id": 183, "group": "High-Yield Breadth", "domain": "D2", "tier": "T2", "aware": true, "nabp": "2.A.1", "stem": "**Insulin icodec (Awiqli)**, FDA-approved 2026, is best described as:", "opts": ["A once-weekly basal insulin approved for type 1 diabetes", "An inhaled insulin", "A once-weekly basal insulin for adults with type 2 diabetes", "A rapid-acting mealtime insulin"], "ans": 2, "exp": "Awiqli (icodec) = first **once-weekly basal** insulin (700 u/mL), **T2DM only** (not approved for T1DM). *NABP: 2.A.1.*"}, {"id": 184, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 1.A.1", "stem": "**Finerenone (Kerendia)** is best characterized as:", "opts": ["An SGLT2 inhibitor", "A loop diuretic", "A steroidal MRA like spironolactone (Aldactone)", "A nonsteroidal selective MRA that slows CKD progression in T2DM (and now HF LVEF ≥40%); do not start if K >5.0"], "ans": 3, "exp": "Finerenone (Kerendia) = **nonsteroidal, selective MRA** → reduces CKD progression/CV events in **T2DM-associated CKD**; **2025 expansion to HF LVEF ≥40%.** ⚠ **Hold/avoid if K >5.0**; monitor K + eGFR. *NABP: 3.C.2 / 1.A.1.*"}, {"id": 185, "group": "High-Yield Breadth", "domain": "D2", "tier": "T2", "aware": true, "nabp": "3.D.1", "stem": "Which best reflects a recommended **continuous glucose monitor (CGM)** target?", "opts": ["Time-in-Range (70–180 mg/dL) >70% with time-below-range <4%", "Time-in-Range >40%", "Keep glucose <70 as long as possible", "A1c is no longer relevant with CGM"], "ans": 0, "exp": "Standard goals: **TIR >70%**, **time-below-range (<70) <4%** (and <54 <1%); GMI estimates A1c. *NABP: 3.D.1.*"}, {"id": 186, "group": "High-Yield Breadth", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.E.2", "stem": "**Regular (short-acting) insulin** for mealtime coverage should be injected:", "opts": ["0–15 minutes before eating", "About 30 minutes before the meal", "Immediately after eating", "At bedtime only"], "ans": 1, "exp": "Regular insulin onset ~30 min → give **~30 min before meals**; **rapid analogs (lispro/aspart (NovoLog))** are given **0–15 min** before. ★ Glargine (Lantus) is peakless ~24 h; degludec (Tresiba) ~42 h. *NABP: 1.A.1 / 3.E.2.*"}, {"id": 187, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A patient with **NYHA class III heart failure** is started on **pioglitazone (Actos).** Main concern?", "opts": ["Hyperkalemia", "Hypoglycemia", "Fluid retention worsening HF (boxed warning) — contraindicated in NYHA III–IV; also bladder cancer/fracture risk", "Lactic acidosis"], "ans": 2, "exp": "TZDs cause **fluid retention/edema** → ⚠ **BBW: may cause/worsen HF; CI in NYHA III–IV.** Other AEs: weight gain, fractures, bladder cancer. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 188, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An **82-year-old with CKD (eGFR 35)** needs a sulfonylurea. Which is the **least** appropriate?", "opts": ["None are sulfonylureas", "Glipizide (Glucotrol)", "Glimepiride (Amaryl)", "Glyburide (DiaBeta)"], "ans": 3, "exp": "**Glyburide (DiaBeta)** has active renally-cleared metabolites → **prolonged hypoglycemia** in elderly/CKD → **Beers-listed, avoid**; prefer **glipizide (Glucotrol)** (no active metabolites). *NABP: 3.C.2.*"}, {"id": 189, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.E.2", "stem": "A patient on **acarbose (Precose)** plus a sulfonylurea becomes hypoglycemic. The correct rescue is:", "opts": ["Oral glucose tablets or dextrose (not sucrose)", "A high-fat snack", "Acarbose (Precose) dose increase", "Table sugar (sucrose)"], "ans": 0, "exp": "α-glucosidase inhibitors (**acarbose (Precose)/miglitol**) block disaccharide breakdown → **sucrose won't be absorbed** → treat with **glucose/dextrose.** *NABP: 3.C.2 / 3.E.2.*"}, {"id": 190, "group": "High-Yield Breadth", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "Which medication most likely **causes hyperglycemia** and may unmask diabetes?", "opts": ["Lisinopril (Zestril)", "Systemic glucocorticoids (and olanzapine (Zyprexa), thiazides, tacrolimus (Prograf))", "Metformin (Glucophage)", "Acarbose (Precose)"], "ans": 1, "exp": "**Glucocorticoids** (plus atypical antipsychotics like **olanzapine (Zyprexa)/clozapine (Clozaril)**, **thiazides**, **tacrolimus (Prograf)**, niacin, protease inhibitors) raise glucose. *NABP: 3.C.2 / 3.C.5.*"}, {"id": 191, "group": "High-Yield Breadth", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Per ADA Standards, statin therapy for a **55-year-old with T2DM and no ASCVD** is:", "opts": ["PCSK9 inhibitor first-line", "Not indicated", "Moderate-intensity statin (high-intensity if ASCVD or multiple risk factors)", "Only if LDL >190"], "ans": 2, "exp": "Diabetes ages 40–75 → **moderate-intensity statin**; **high-intensity** with ASCVD or high risk. *NABP: 3.C.2.*"}, {"id": 192, "group": "High-Yield Breadth", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "A T2DM patient has BP 142/88 and **albuminuria (UACR 240).** Best antihypertensive and BP goal?", "opts": ["A beta-blocker; goal <150/90", "No treatment needed", "A thiazide; goal <140/90", "An ACE inhibitor or ARB; goal <130/80"], "ans": 3, "exp": "With **albuminuria**, an **ACEi or ARB** is first-line (renoprotective); ADA BP goal **<130/80.** ℹ ADA 2026 also offers an optional **SBP <120** target for high CV/kidney risk if safely tolerated. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 193, "group": "High-Yield Breadth", "domain": "D5", "tier": "T2", "aware": false, "nabp": "5.B / 3.E.2", "stem": "Which vaccine does the ADA specifically recommend for previously unvaccinated **adults with diabetes**?", "opts": ["Hepatitis B (plus pneumococcal, annual influenza, COVID, and RSV per age)", "Only the shingles vaccine", "Yellow fever", "No special vaccines are needed"], "ans": 0, "exp": "Diabetes ↑ infection risk → **Hep B** (unvaccinated adults), **pneumococcal**, **annual influenza**, **COVID-19**, **RSV** (age-based). *NABP: 5.B / 3.E.2.*"}, {"id": 194, "group": "High-Yield Breadth", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.3 / 3.C.5", "stem": "A patient on a **nonselective beta-blocker** has frequent unrecognized hypoglycemia. Why, and what symptom persists?", "opts": ["They have no effect on hypoglycemia awareness", "β-blockers mask adrenergic warning signs (tremor/palpitations) but **sweating** persists", "β-blockers cause hyperglycemia, not masking", "They block all hypoglycemia symptoms including sweating"], "ans": 1, "exp": "β-blockers **blunt adrenergic warning symptoms** (tremor, tachycardia) → hypoglycemia unawareness; **diaphoresis (cholinergic) still occurs.** ★ Level 3 hypoglycemia = severe, needs assistance. *NABP: 3.C.3 / 3.C.5.*"}, {"id": 195, "group": "High-Yield Breadth", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line pharmacotherapy for painful **diabetic peripheral neuropathy** includes:", "opts": ["Metformin (Glucophage)", "Opioids", "Duloxetine (Cymbalta), pregabalin (Lyrica), or gabapentin (also TCAs)", "Topical corticosteroids"], "ans": 2, "exp": "First-line: **duloxetine (Cymbalta, SNRI), pregabalin (Lyrica)/gabapentin (Neurontin), TCAs** (± topical capsaicin); **avoid opioids** first-line. *NABP: 3.C.2.*"}, {"id": 196, "group": "High-Yield Breadth", "domain": "D2", "tier": "T2", "aware": true, "nabp": "2.A.1 / 3.C.2", "stem": "Which correctly pairs **tirzepatide (Mounjaro)** brands/indications?", "opts": ["Both are approved only for type 1 diabetes", "Both are basal insulins", "Mounjaro = obesity only; Zepbound = T2DM only", "Mounjaro = T2DM glycemic control; Zepbound = chronic weight management and obstructive sleep apnea (in obesity)"], "ans": 3, "exp": "**Mounjaro** = T2DM; **Zepbound** = weight management **+ moderate–severe OSA** in obesity (2024). Dual **GIP/GLP-1** agonist; titrate slowly for GI tolerance. *NABP: 2.A.1 / 3.C.2.*"}];const GROUPS=[...new Set(ALL.map(x=>x.group))];const DOMAINS=[...new Set(ALL.map(x=>x.domain))].sort();

function setP(p){MEM=p;try{localStorage.setItem(APPKEY,JSON.stringify(p));}catch(e){}}
function record(q,ok){const p=getP();p.dom=p.dom||{};p.topic=p.topic||{};
 p.dom[q.domain]=p.dom[q.domain]||{s:0,c:0};p.dom[q.domain].s++;if(ok)p.dom[q.domain].c++;
 p.topic[q.group]=p.topic[q.group]||{s:0,c:0};p.topic[q.group].s++;if(ok)p.topic[q.group].c++;
 const m=new Set(p.missed||[]);if(ok)m.delete(q.id);else m.add(q.id);p.missed=[...m];setP(p);}
function logAttempt(meta){const p=getP();p.attempts=p.attempts||[];p.attempts.push(meta);if(p.attempts.length>60)p.attempts=p.attempts.slice(-60);setP(p);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let mode='mix',picks=new Set(),pool=[],idx=0,score=0,answered=0,missed=[],locked=false,sel=null,curMeta={mode:'full'};
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>").replace(/`(.+?)`/g,"$1");}
function plain(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`(.+?)`/g,"$1");}
function shufOpts(q){const idx=q.opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return Object.assign({},q,{opts:idx.map(i=>q.opts[i]),ans:idx.indexOf(q.ans)});}
const $=s=>document.getElementById(s);
function dashboard(){const c={};GROUPS.forEach(g=>c[g]=ALL.filter(x=>x.group===g).length);const ms=getP().missed||[];
 $('app').innerHTML=`<div class="bar"><span class="stat" style="margin-left:0">${ALL.length} Qs · ${GROUPS.length} topics · ${DOMAINS.length} domains</span><button id="prog">📊 Progress</button></div>
 <div class="card"><h2 class="sec">1 · Choose your set</h2>
 <div class="modes"><div class="mode ${mode==='mix'?'on':''}" data-mode="mix">Full bank — all topics mixed<small>${ALL.length} questions</small></div>
 <div class="mode ${mode==='pick'?'on':''}" data-mode="pick">Pick specific subtopics<small>drill one or more areas</small></div></div>
 <div id="tw" style="${mode==='pick'?'':'display:none'}"><h2 class="sec" style="margin-top:14px">Subtopics</h2>
 <div class="topics">${GROUPS.map(g=>`<label class="topic ${picks.has(g)?'on':''}"><input type="checkbox" data-g="${g}" ${picks.has(g)?'checked':''}> ${g}<span class="ct">${c[g]}</span></label>`).join('')}</div>
 <div class="row"><button class="topic" id="sa">Select all</button><button class="topic" id="sn">Clear</button></div></div>
 <h2 class="sec" style="margin-top:14px">2 · Filters</h2><div class="row">
 <label>Domain <select id="fDom"><option value="">all</option>${DOMAINS.map(d=>`<option>${d}</option>`).join('')}</select></label>
 <label>Difficulty <select id="fTier"><option value="">all tiers</option><option>T1</option><option>T2</option><option>T3</option></select></label>
 <label><input type="checkbox" id="fShuf" checked> shuffle</label></div>
 <h2 class="sec" style="margin-top:14px">3 · How many questions?</h2><div class="row">
 <input type="number" id="fLenN" min="1" placeholder="all" style="width:84px;padding:6px 9px;border-radius:8px;border:1px solid #c9d0db">
 <button class="topic preset" data-n="10">10</button><button class="topic preset" data-n="20">20</button><button class="topic preset" data-n="30">30</button><button class="topic preset" data-n="">All</button>
 <span class="stat" id="avail" style="margin-left:0"></span></div>
 <button class="start" id="start">Start quiz <span id="cnt"></span></button></div>
 ${ms.length?`<div class="card"><h2 class="sec">Retest wrong answers</h2><p style="margin:.2em 0 10px;color:var(--muted);font-size:13px">${ms.length} question${ms.length>1?'s':''} marked wrong in past attempts — drill until you clear them.</p><button class="start" id="retest" style="background:var(--bad)">Retest my missed (${ms.length})</button></div>`:''}`;
 document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{mode=m.dataset.mode;dashboard();});
 document.querySelectorAll('input[data-g]').forEach(cb=>cb.onchange=()=>{cb.checked?picks.add(cb.dataset.g):picks.delete(cb.dataset.g);cb.closest('.topic').classList.toggle('on',cb.checked);refresh();});
 if($('sa'))$('sa').onclick=()=>{GROUPS.forEach(g=>picks.add(g));dashboard();};if($('sn'))$('sn').onclick=()=>{picks.clear();dashboard();};
 ['fDom','fTier','fShuf'].forEach(id=>$(id).onchange=refresh);$('fLenN').oninput=refresh;
 document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>{$('fLenN').value=b.dataset.n;refresh();});
 $('start').onclick=start;$('prog').onclick=progressView;if($('retest'))$('retest').onclick=startRetest;refresh();}
function selected(){return mode==='mix'||picks.size===0?GROUPS:[...picks];}
function pool0(){const t=$('fTier').value,d=$('fDom').value,gs=selected();return ALL.filter(x=>gs.includes(x.group)&&(!t||x.tier===t)&&(!d||x.domain===d));}
function build(){let p=pool0().slice();if($('fShuf').checked)shuffle(p);const n=parseInt($('fLenN').value);if(n>0)p=p.slice(0,n);return p.map(shufOpts);}
function refresh(){const avail=pool0().length;const n=build().length;$('cnt').textContent='· '+n+' Qs';$('avail').textContent=avail+' available';$('start').disabled=n===0;}
function start(){const d=$('fDom').value,t=$('fTier').value;curMeta={mode:(mode==='mix'?'full':'subtopics')+(d?' '+d:'')+(t?' '+t:'')};pool=build();idx=0;score=0;answered=0;missed=[];quiz();}
function startRetest(){const ms=new Set(getP().missed||[]);let p=ALL.filter(x=>ms.has(x.id));shuffle(p);curMeta={mode:'retest'};pool=p.map(shufOpts);idx=0;score=0;answered=0;missed=[];quiz();}
function quiz(){locked=false;sel=null;if(idx>=pool.length)return results();const q=pool[idx];const tb={T1:'b-t1',T2:'b-t2',T3:'b-t3'}[q.tier];
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Q ${idx+1}/${pool.length} · score ${score}/${answered}</span></div>
 <div class="prog"><div style="width:${100*answered/pool.length}%"></div></div>
 <div class="card"><div class="badges"><span class="badge ${tb}">${q.tier}</span><span class="badge b-dom">${q.domain}</span><span class="badge b-grp">${q.group}</span>${q.aware?'<span class="badge b-aw">ℹ NEW</span>':''}<span class="badge b-grp">#${q.id}</span></div>
 <div class="stem">${md(q.stem)}</div><div id="opts">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${plain(o)}</button>`).join('')}</div>
 <div class="exp" id="exp"></div><div class="actions"><button class="check" id="check" disabled>Check answer</button><button class="next" id="next" style="display:none">${idx+1<pool.length?'Next ›':'Finish'}</button></div></div>`;
 $('home').onclick=dashboard;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(locked)return;sel=+b.dataset.i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('check').disabled=false;});
 $('check').onclick=check;$('next').onclick=()=>{idx++;quiz();};}
function check(){if(locked||sel===null)return;locked=true;const q=pool[idx];answered++;const ok=sel===q.ans;if(ok)score++;else missed.push(q);record(q,ok);
 document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===sel)b.classList.add('wrong');});
 const e=$('exp');e.classList.add('show');e.innerHTML=`<div class="verdict" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✔ Correct':'✗ Incorrect — answer '+'ABCD'[q.ans]}</div>${md(q.exp)}${q.nabp?'<div style="margin-top:6px;font-size:12px;color:var(--muted)">NABP '+q.nabp+'</div>':''}`;
 $('check').style.display='none';$('next').style.display='block';}
function results(){if(answered)logAttempt({t:Date.now(),mode:curMeta.mode,n:answered,score:score,pct:Math.round(100*score/answered)||0});
 $('app').innerHTML=`<div class="card done"><h2>Done</h2><div class="score">${Math.round(100*score/answered)||0}%</div>
 <p>${score} / ${answered} correct${missed.length?` · ${missed.length} missed`:''}</p><div class="actions" style="max-width:480px;margin:0 auto;flex-wrap:wrap">
 ${missed.length?`<button class="check" id="rev">Review missed (${missed.length})</button>`:''}<button class="next" id="back">‹ Dashboard</button><button class="next" id="pg" style="background:var(--steel)">📊 Progress</button></div></div>`;
 if($('rev'))$('rev').onclick=()=>{pool=missed.slice();idx=0;score=0;answered=0;missed=[];curMeta={mode:'review'};quiz();};$('back').onclick=dashboard;$('pg').onclick=progressView;}
function progressView(){const p=getP();const at=p.attempts||[];
 const avg=at.length?Math.round(at.reduce((s,a)=>s+a.pct,0)/at.length):0;const best=at.length?Math.max(...at.map(a=>a.pct)):0;const ms=p.missed||[];const dom=p.dom||{},top=p.topic||{};
 const dr=DOMAINS.map(d=>{const o=dom[d]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${d}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const tr=GROUPS.map(g=>{const o=top[g]||{s:0,c:0};const pc=o.s?Math.round(100*o.c/o.s):0;return `<tr><td>${g}</td><td>${o.c}/${o.s}</td><td>${o.s?pc+'%':'—'}</td><td><div class="meter"><div style="width:${pc}%"></div></div></td></tr>`;}).join('');
 const rec=at.slice(-12).reverse().map(a=>`<tr><td>${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td><td>${a.mode}</td><td>${a.score}/${a.n}</td><td>${a.pct}%</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No attempts yet — take a quiz to start tracking.</td></tr>';
 $('app').innerHTML=`<div class="bar"><button id="home">‹ Dashboard</button><span class="stat">Your progress</span></div>
 <div class="card"><h2 class="sec">Summary</h2><div class="kpis"><div class="kpi"><b>${at.length}</b><small>attempts</small></div><div class="kpi"><b>${avg}%</b><small>avg score</small></div><div class="kpi"><b>${best}%</b><small>best</small></div><div class="kpi"><b>${ms.length}</b><small>to retest</small></div></div>
 ${ms.length?`<button class="start" id="retest" style="background:var(--bad);margin-top:6px">Retest my missed (${ms.length})</button>`:''}</div>
 <div class="card"><h2 class="sec">Accuracy by domain</h2><table class="ptable"><tr><th>Domain</th><th>Correct</th><th>%</th><th></th></tr>${dr}</table></div>
 <div class="card"><h2 class="sec">Accuracy by topic</h2><table class="ptable"><tr><th>Topic</th><th>Correct</th><th>%</th><th></th></tr>${tr}</table></div>
 <div class="card"><h2 class="sec">Recent attempts</h2><table class="ptable"><tr><th>When</th><th>Mode</th><th>Score</th><th>%</th></tr>${rec}</table>
 <button class="topic" id="reset" style="margin-top:12px">Reset all progress</button></div>`;
 $('home').onclick=dashboard;if($('retest'))$('retest').onclick=startRetest;
 $('reset').onclick=()=>{if(confirm('Erase all saved progress for this quiz?')){setP({attempts:[],topic:{},dom:{},missed:[]});progressView();}};}
document.addEventListener('keydown',e=>{if(['1','2','3','4'].includes(e.key)){const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b&&!locked)b.click();}
 else if(e.key==='Enter'){const c=$('check'),n=$('next');if(c&&c.style.display!=='none'&&!c.disabled)c.click();else if(n&&n.style.display!=='none')n.click();}});
dashboard();
</script></body></html>
