<style>
:root{--navy:#1F3864;--steel:#2E5F8A;--green:#1E5C2E;--ok:#1E5C2E;--bad:#9B2226;--bg:#f5f6f8;--card:#fff;--ink:#1d2430;--muted:#5b6675}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}

.bar{display:flex;gap:10px;align-items:center;margin-bottom:10px}.bar button{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #c9d0db;background:#fff;cursor:pointer}.stat{font-size:13px;color:var(--muted);margin-left:auto}

.opt:hover{border-color:var(--steel)}.opt .k{display:inline-block;width:22px;font-weight:700;color:var(--steel)}.opt.sel{border-color:var(--steel);background:#f0f6fd}.opt.correct{border-color:var(--ok);background:#e8f5ea}.opt.wrong{border-color:var(--bad);background:#fdeced}.opt[disabled]{cursor:default}

<script>
const ALL=[{"id": 1, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "T2DM + established **ASCVD**, A1c 8.2% on metformin (Glucophage). Best add-on?", "opts": ["Semaglutide (Ozempic, GLP-1)", "Basal insulin glargine (Lantus)", "Sitagliptin (Januvia, DPP-4)", "Glipizide (an SU)"], "ans": 0, "exp": "With ASCVD, add an agent with **proven CV benefit** — a **GLP-1 RA** (semaglutide/dulaglutide (Trulicity)/liraglutide (Victoza)) **or** SGLT2i — independent of A1c. **C** DPP-4 is CV-neutral. **D** SU adds hypoglycemia/weight, no CV benefit. **B** insulin lowers A1c but no CV outcome benefit here. ✓ ADA 2026: comorbidity drives selection. *Anchor: ADA 2026 §9. NABP: 3.C.2 / 3.D.1.*"}, {"id": 2, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "T2DM + **HFrEF (EF 30%)**, A1c 7.5% on metformin (Glucophage). Best add-on?", "opts": ["Semaglutide (Ozempic, GLP-1)", "Empagliflozin (Jardiance, SGLT2i)", "Pioglitazone (Actos, TZD)", "Saxagliptin (Onglyza, DPP-4)"], "ans": 1, "exp": "**SGLT2i** reduces HF hospitalization/mortality in **HFrEF** (regardless of diabetes). **C** pioglitazone (Actos) → fluid retention (**HF BBW**). **D** saxagliptin (Onglyza) ↑ HF hospitalization (SAVOR-TIMI). **A** GLP-1 has **ASCVD** benefit but is **not** the HFrEF answer. ✓ Trap: GLP-1 is \"cardioprotective\" but SGLT2i owns HFrEF. *Anchor: ADA 2026; DAPA-HF/EMPEROR. NABP: 3.C.2.*"}, {"id": 3, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2", "stem": "T2DM + **HFpEF + obesity (BMI 36)**. Per ADA 2026, a preferred add-on is:", "opts": ["Sitagliptin (a DPP-4)", "NPH basal insulin", "Tirzepatide (GIP/GLP-1)", "Glyburide (a sulfonylurea)"], "ans": 2, "exp": "ℹ **NEW: dual GIP/GLP-1 (tirzepatide)** improves **HFpEF** symptoms/events in obesity (SUMMIT); SGLT2i is also beneficial in HFpEF. **D/A/B** offer no HFpEF benefit and SU/insulin add weight. ✓ Currency item — HFpEF + obesity now has an incretin answer. *Anchor: ADA 2026; SUMMIT. NABP: 3.C.2.*"}, {"id": 4, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "T2DM + **CKD (eGFR 35, UACR 320 mg/g)**. Best to slow kidney progression?", "opts": ["Glipizide (an SU)", "Sitagliptin (Januvia, DPP-4)", "Metformin (Glucophage) uptitration", "Dapagliflozin (Farxiga, SGLT2i)"], "ans": 3, "exp": "**SGLT2i** slows CKD progression (initiate at eGFR ≥20); add **finerenone (Kerendia)** and, for advanced CKD, **GLP-1 (semaglutide, FLOW)**. **C** metformin (Glucophage) is fine >30 but isn't reno-protective. **A/B** neither slows progression. ★ eGFR 35 still allows SGLT2i initiation. *Anchor: ADA 2026; FLOW/finerenone. NABP: 3.C.2 / 3.D.1.*"}, {"id": 5, "group": "Agent Selection & Class Traps", "domain": "D1", "tier": "T2", "aware": false, "nabp": "3.C.2 / 1.A.2", "stem": "Which statement about **metformin (Glucophage)** is correct?", "opts": ["CI <30; hold for contrast; B12 loss", "Frequently causes fasting hypoglycemia", "Reliably causes modest weight gain", "Safe to use at any level of eGFR"], "ans": 0, "exp": "Metformin (Glucophage) **CI eGFR <30**, **don't initiate 30–45**, hold around contrast/illness (lactic acidosis); chronic use → **B12 deficiency.** **B** monotherapy rarely causes hypoglycemia. **C** weight-neutral/slight loss. *NABP: 3.C.2 / 1.A.2.*"}, {"id": 6, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6", "stem": "A patient on an SGLT2i presents with N/V, malaise, **glucose 190**, ketones positive, pH 7.25. Diagnosis/action?", "opts": ["HHS — give IV insulin only", "Euglycemic DKA — stop drug, insulin", "Lactic acidosis — give bicarbonate", "Normal anion gap — reassure patient"], "ans": 1, "exp": "**Euglycemic DKA** — SGLT2i can cause DKA with **near-normal glucose** (the trap). Stop the SGLT2i, treat with insulin **+ dextrose** (glucose isn't high) + fluids. ✓ Don't be fooled by the \"normal\" glucose. *Anchor: FDA SGLT2i DKA warning. NABP: 3.C.6.*"}, {"id": 7, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Which is an absolute **contraindication** to a GLP-1 RA?", "opts": ["Class III obesity (BMI 42)", "Reduced renal function (eGFR 40)", "Personal/family history of MTC or MEN2", "Stage 2 hypertension on three agents"], "ans": 2, "exp": "GLP-1 RAs (and tirzepatide (Mounjaro)) carry a **boxed warning** — CI with personal/family **medullary thyroid carcinoma** or **MEN2.** **A/B** are actually reasons to favor them. ⚠ Also: pancreatitis caution, gastroparesis. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 8, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "A 78-y/o with CKD (eGFR 40) on **glyburide (DiaBeta)** has recurrent hypoglycemia. Best change?", "opts": ["Add a second sulfonylurea agent", "Continue glyburide (DiaBeta), add snacks", "Increase the glyburide (DiaBeta) dose", "Switch to glipizide (Glucotrol) or non-SU"], "ans": 3, "exp": "**Glyburide (DiaBeta)** is long-acting with active renal-cleared metabolites → **prolonged hypoglycemia** (Beers). Use **glipizide (Glucotrol)** (shorter, hepatic) or a low-hypoglycemia agent. *NABP: 3.C.2.*"}, {"id": 9, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which patient should **avoid pioglitazone (Actos)**?", "opts": ["T2DM + symptomatic HF", "T2DM + class II obesity", "T2DM + mixed hyperlipidemia", "T2DM + stable ASCVD"], "ans": 0, "exp": "Pioglitazone (Actos) causes **fluid retention → HF (boxed warning)**; also bladder-cancer and fracture risk. **D/B/C** aren't contraindications. *NABP: 3.C.2.*"}, {"id": 10, "group": "Agent Selection & Class Traps", "domain": "D1", "tier": "T3", "aware": false, "nabp": "3.C.5", "stem": "Which class is **least** likely to cause hypoglycemia as monotherapy?", "opts": ["Meglitinide", "SGLT2 inhibitor", "Basal insulin", "Sulfonylurea"], "ans": 1, "exp": "**SGLT2i** (like metformin (Glucophage), GLP-1, DPP-4, TZD) is **low-hypoglycemia.** **D/A/C** (SU, meglitinide, insulin) are the high-risk agents. ✓ \"Least likely\" inverts the usual hypoglycemia item. *NABP: 3.C.5.*"}, {"id": 11, "group": "Agent Selection & Class Traps", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.D / 3.D.2", "stem": "A patient on an SGLT2i is scheduled for elective surgery. Periprocedural action?", "opts": ["Switch to a sliding-scale insulin regimen", "Continue the SGLT2i through surgery", "Hold the SGLT2i ~3–4 days pre-op", "Double the SGLT2i dose pre-op"], "ans": 2, "exp": "Hold SGLT2i **~3–4 days pre-op** (FDA) to reduce **perioperative euglycemic DKA**. **B** raises DKA risk. *NABP: 2.D / 3.D.2.*"}, {"id": 12, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": true, "nabp": "3.C.2", "stem": "T2DM + **obesity + biopsy-proven MASH with fibrosis**. Per ADA 2026, preferred initial pharmacotherapy?", "opts": ["A sulfonylurea", "A DPP-4 inhibitor", "Pioglitazone (Actos) alone", "GLP-1 RA (semaglutide)"], "ans": 3, "exp": "ℹ **NEW: GLP-1 RA is initial therapy for T2DM + MASLD/liver fibrosis** (weight loss + hepatic benefit, ESSENCE). **C** pioglitazone (Actos) has MASH data but isn't first given HF/weight issues. **A/B** no MASLD benefit. *Anchor: ADA 2026; ESSENCE. NABP: 3.C.2.*"}, {"id": 13, "group": "Agent Selection & Class Traps", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which DPP-4 inhibitor is most associated with **increased heart-failure hospitalization**?", "opts": ["Saxagliptin (Onglyza)", "Linagliptin (Tradjenta)", "None of them", "Sitagliptin (Januvia)"], "ans": 0, "exp": "**Saxagliptin (Onglyza)** (SAVOR-TIMI) and alogliptin (EXAMINE) ↑ HF hospitalization → avoid in HF; **sitagliptin (Januvia)/linagliptin (Tradjenta)** are HF-neutral. *NABP: 3.C.2.*"}, {"id": 17, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.6", "stem": "Which insulin can be given **IV** (e.g., DKA infusion)?", "opts": ["NPH insulin", "Regular insulin", "Insulin lispro (Humalog)", "Insulin glargine (Lantus)"], "ans": 1, "exp": "**Regular** insulin is the IV/DKA insulin. **D/A** long/intermediate are subQ only. **C** rapid analogs are subQ (not the standard IV drip). *NABP: 1.A.2 / 3.C.6.*"}, {"id": 18, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "3.E.2 / 1.A.2", "stem": "Rapid-acting insulin (lispro/aspart (NovoLog)/glulisine (Apidra)) should be given:", "opts": ["Only when fasting", "30–60 min before meals", "0–15 min before the meal", "At bedtime only"], "ans": 2, "exp": "Rapid analogs: onset ~15 min, peak ~1 h → give **0–15 min before eating**; **hold if not eating.** **B** is the timing for **regular** insulin. *NABP: 3.E.2 / 1.A.2.*"}, {"id": 19, "group": "Insulin", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.2 / 3.C.5", "stem": "A patient takes **NPH each morning** and has hypoglycemia in the **mid-afternoon**. Which property explains it?", "opts": ["NPH is rapid-acting", "NPH has no real duration", "NPH is essentially peakless", "NPH peaks ~4–12 h later"], "ans": 3, "exp": "Morning **NPH peaks in the afternoon (4–12 h)** → mid-afternoon hypoglycemia (add a snack or shift dose). **C** describes glargine (Lantus), not NPH. ✓ Match the peak to the event. *NABP: 1.A.2 / 3.C.5.*"}, {"id": 20, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.1 / 1.C.3", "stem": "Total daily dose (TDD) = 50 units of insulin (rapid). Using the **1800 rule**, the insulin sensitivity factor (ISF) and correction dose for glucose 250 → target 100 are:", "opts": ["ISF 36; ~4 units", "ISF 50; 3 units", "ISF 90; 2 units", "ISF 18; 8 units"], "ans": 0, "exp": "ISF = **1800/TDD = 1800/50 = 36 mg/dL per unit**; correction = (250−100)/36 = 150/36 ≈ **4 units.** (1500 rule for regular insulin.) *NABP: 1.C.1 / 1.C.3.*"}, {"id": 21, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.1", "stem": "Same patient (TDD 50). Using the **500 rule**, the insulin-to-carb ratio and mealtime dose for **60 g** carbohydrate:", "opts": ["1 u : 5 g → 12 u", "1 u : 10 g → 6 u", "1 u : 15 g → 4 u", "1 u : 20 g → 3 u"], "ans": 1, "exp": "Carb ratio = **500/TDD = 500/50 = 1 unit per 10 g** → 60/10 = **6 units.** *NABP: 1.C.1.*"}, {"id": 22, "group": "Insulin", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.5", "stem": "A patient has fasting morning hyperglycemia; a **3 a.m. glucose is 50 mg/dL.** Best adjustment?", "opts": ["Make no change to the regimen", "Increase the evening basal/NPH dose", "Reduce evening basal (or add snack)", "Add morning rapid-acting insulin"], "ans": 2, "exp": "**Somogyi effect** — nocturnal **hypoglycemia → rebound morning hyperglycemia** → **reduce** evening basal. **B** would worsen it (that's the dawn-phenomenon fix, where 3 a.m. is normal/high). ✓ The 3 a.m. value is the discriminator: low = Somogyi, normal/high = dawn. *NABP: 3.D.2 / 3.C.5.*"}, {"id": 23, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "2.A.2 / 3.E.2", "stem": "When drawing **NPH and regular** insulin into one syringe, you should:", "opts": ["The draw-up order does not matter", "Never combine these in practice", "Draw the NPH (cloudy) first", "Draw regular (clear) first"], "ans": 3, "exp": "**\"Clear before cloudy\"** — draw **regular (clear) first** to avoid contaminating the regular vial with NPH. *NABP: 2.A.2 / 3.E.2.*"}, {"id": 24, "group": "Insulin", "domain": "D1", "tier": "T3", "aware": true, "nabp": "1.A.2 / 3.C.2", "stem": "The first **once-weekly basal insulin (insulin icodec (Awiqli), Awiqli)** is FDA-approved for:", "opts": ["Adults with type 2 diabetes only", "Both T1DM and T2DM adults", "Gestational diabetes mellitus", "Type 1 diabetes only"], "ans": 0, "exp": "ℹ **NEW (FDA Mar 2026):** insulin icodec (Awiqli) is approved for **adults with T2DM only** — **not T1DM** (higher hypoglycemia rates in T1D). ✓ Currency trap: \"once-weekly insulin for everyone\" is wrong. *Anchor: FDA 2026. NABP: 1.A.2 / 3.C.2.*"}, {"id": 25, "group": "Insulin", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.2 / 2.A.2", "stem": "Which insulin is \"peakless\" and must **not** be mixed with other insulins in a syringe?", "opts": ["NPH insulin", "Glargine (Lantus)", "Insulin lispro (Humalog)", "Regular insulin"], "ans": 1, "exp": "**Glargine (Lantus)** (and detemir (Levemir), degludec (Tresiba)) are long-acting, relatively peakless, and **cannot be mixed.** **D/A** (regular + NPH) are the mixable pair. *NABP: 1.A.2 / 2.A.2.*"}, {"id": 26, "group": "Insulin", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Inhaled insulin (Afrezza) is **contraindicated** in:", "opts": ["Chronic kidney disease stage 3", "Class I obesity (BMI ≥30)", "Chronic lung disease (asthma/COPD)", "Resistant hypertension on 3 drugs"], "ans": 2, "exp": "Inhaled insulin causes **bronchospasm** → contraindicated in **asthma/COPD**; baseline spirometry required. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 27, "group": "Insulin", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.D", "stem": "Storage of an **in-use** insulin vial/pen is best described as:", "opts": ["Keep refrigerated at all times while in use", "Discard the vial at the end of each day", "Keep frozen until the time of use", "Room temp, use within ~28 days; never freeze"], "ans": 3, "exp": "In-use insulin: **room temp ~28 days** (product-dependent 10–56 d); **unopened → refrigerate** until expiration; **never freeze**; protect from heat/light. *NABP: 2.D.*"}, {"id": 28, "group": "Insulin", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.6 / 3.E.3", "stem": "A **type 1 diabetic** is ill, not eating, and stops **all** insulin. Risk?", "opts": ["DKA — basal insulin must always continue", "No risk if the patient is not eating", "Hyperosmolar hyperglycemic state (HHS)", "Hypoglycemia from missed meals only"], "ans": 0, "exp": "T1DM patients **always need basal insulin** (sick-day rules); stopping it → **DKA**, even when not eating. **C** HHS is the T2DM picture. *NABP: 3.C.6 / 3.E.3.*"}, {"id": 32, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.6", "stem": "Per the **2024 hyperglycemic-crises consensus**, which set diagnoses DKA?", "opts": ["Glucose ≥250 + urine ketones + venous pH <7.2", "Glucose ≥200 (or known DM) + β-OHB ≥3.0 + pH <7.3", "Glucose ≥600 + effective serum osm >320", "Any glucose with positive urine ketones"], "ans": 1, "exp": "ℹ The 2024 consensus **lowered the glucose cutoff to ≥200** (or prior diabetes) and centers **β-OHB ≥3.0.** **A** is the older (≥250/urine) teaching — the trap. **C** is HHS. **D** is nonspecific. *Anchor: Diabetes Care 2024. NABP: 3.C.6.*"}, {"id": 33, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.6 / 1.A.2", "stem": "Preferred test to diagnose and **monitor resolution** of DKA?", "opts": ["Anion gap only", "Urine ketones (acetoacetate)", "Serum/POC β-hydroxybutyrate", "Serum glucose"], "ans": 2, "exp": "**β-hydroxybutyrate** (the dominant DKA ketone) is preferred; **urine ketones lag** and can paradoxically *rise* during recovery (acetoacetate conversion). ✓ 2024 currency point. *NABP: 3.C.6 / 1.A.2.*"}, {"id": 34, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.6", "stem": "First step in managing a hemodynamically dry DKA patient?", "opts": ["Give IV sodium bicarbonate", "Give subQ rapid insulin", "Start an IV regular insulin bolus", "IV isotonic fluids (0.9% NaCl)"], "ans": 3, "exp": "**Fluids first** (volume deficit ~6 L). **C** insulin before fluids/K worsens hypovolemia and hypokalemia. ✓ Sequence trap: fluids → K check → insulin. *NABP: 3.D.2 / 3.C.6.*"}, {"id": 35, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.6", "stem": "DKA patient, initial **K⁺ 3.0 mEq/L.** Next step?", "opts": ["Hold insulin, replace K first", "Give IV sodium bicarbonate", "Give IV calcium gluconate", "Start the insulin drip now"], "ans": 0, "exp": "Insulin drives K⁺ intracellularly → with K <3.3, starting insulin can cause **fatal hypokalemia/arrhythmia.** Replace K first, then start insulin. ⚠ The single most-tested DKA trap. *NABP: 3.C.2 / 3.C.6.*"}, {"id": 36, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6", "stem": "DKA patient with **K⁺ 5.6.** Potassium management?", "opts": ["Add 40 mEq of KCl to fluids now", "Hold K, start insulin + fluids, recheck", "Give Kayexalate to lower potassium", "Stop insulin until potassium normalizes"], "ans": 1, "exp": "With K >5.2, **hold K replacement**, treat with insulin/fluids (which lower K), and **recheck.** Add K once it falls to 3.3–5.2. *NABP: 3.C.6.*"}, {"id": 37, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "During the insulin drip, glucose falls to **~200 mg/dL** but the anion gap is still elevated. Action?", "opts": ["Give IV bicarbonate now", "Stop the IV insulin drip", "Add dextrose, continue insulin", "Switch to subQ insulin now"], "ans": 2, "exp": "Insulin must continue to **clear ketones/close the gap**; **add dextrose** to prevent hypoglycemia while the drip runs. **B/D** stopping early → DKA recurs. ✓ Trap: normal glucose ≠ resolved DKA. *NABP: 3.D.2.*"}, {"id": 38, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2 / 3.C.6", "stem": "Which best defines **DKA resolution** and readiness to transition to subQ insulin?", "opts": ["Urine ketones fully cleared on dipstick", "Patient feels better and is eating", "Serum glucose below 200 mg/dL alone", "Glucose <200 plus ≥2 of HCO₃ ≥15, pH >7.3, gap ≤12"], "ans": 3, "exp": "Resolution = glucose <200 **and** acidosis/gap corrected; **overlap subQ insulin 1–2 h before stopping the IV** (drip has ~minutes half-life). **C/A** are the traps (glucose or urine ketones alone). *NABP: 3.D.2 / 3.C.6.*"}, {"id": 39, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.6", "stem": "Bicarbonate therapy in DKA is best described as:", "opts": ["Not routine; consider only severe acidosis (pH <7.0)", "Indicated whenever the venous pH is below 7.3", "Given first-line before any fluid resuscitation", "Routine for every patient presenting with DKA"], "ans": 0, "exp": "Bicarbonate is **not routine** (risks: hypokalemia, paradoxical CNS acidosis, delayed ketone clearance); reserve for **severe acidosis (pH <7.0; classic <6.9)** at most. *NABP: 3.C.6.*"}, {"id": 40, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6", "stem": "A patient on **empagliflozin (Jardiance)** presents with malaise, glucose 180, β-OHB 4.0, pH 7.2. Diagnosis?", "opts": ["HHS", "Euglycemic DKA (SGLT2i)", "Lactic acidosis", "Not DKA (glucose too low)"], "ans": 1, "exp": "**Euglycemic DKA** — SGLT2i can produce ketoacidosis with **near-normal glucose**; the 2024 criteria (glucose ≥200 *or known diabetes* + β-OHB ≥3.0) still capture it. **D** is the trap (don't exclude DKA on glucose alone). *NABP: 3.C.6.*"}, {"id": 41, "group": "DKA / HHS + Sick-Day", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.1 / 1.C.5", "stem": "Na⁺ 145, glucose 900 mg/dL. **Effective serum osmolality**?", "opts": ["250", "290", "340", "380"], "ans": 2, "exp": "Effective osm = **2×Na + glucose/18** = 2(145) + 900/18 = 290 + 50 = **340 mOsm/kg** (>320 → hyperosmolar, supports HHS). (BUN excluded — it's an ineffective osmole.) *NABP: 1.C.1 / 1.C.5.*"}, {"id": 42, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6", "stem": "Compared with DKA, **HHS** is characterized by:", "opts": ["Glucose 250, large ketones, pH 7.1", "Glucose ≥600 with normal osmolality", "Low glucose with severe ketoacidosis", "Glucose ≥600, osm >320, minimal ketosis"], "ans": 3, "exp": "HHS = **profound hyperglycemia + hyperosmolarity + minimal ketoacidosis** (enough insulin to suppress ketogenesis), older patients, severe dehydration/AMS. **A** is DKA. *NABP: 3.C.6.*"}, {"id": 43, "group": "DKA / HHS + Sick-Day", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.3 / 3.C.6", "stem": "A type 1 diabetic with a viral illness (eating little) asks about insulin. Best sick-day advice?", "opts": ["Continue insulin, check glucose + ketones, hydrate", "Stop basal insulin but keep mealtime bolus", "Halve all insulin doses while ill", "Stop all insulin until eating normally"], "ans": 0, "exp": "**Never stop basal insulin** in T1DM — illness raises counter-regulatory hormones → DKA even when not eating; monitor **ketones** and hydrate. *NABP: 3.E.3 / 3.C.6.*"}, {"id": 47, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 3.C.1", "stem": "Which result diagnoses diabetes?", "opts": ["A1c 6.2%", "2-h 75-g OGTT 210 mg/dL", "Random glucose 150, asymptomatic", "FPG 118"], "ans": 1, "exp": "Dx thresholds: **FPG ≥126, A1c ≥6.5%, 2-h OGTT ≥200, or random ≥200 + symptoms** (confirm on a second test). **D/A** are **prediabetes** (FPG 100–125; A1c 5.7–6.4). **C** subthreshold. *NABP: 3.B / 3.C.1.*"}, {"id": 48, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.1", "stem": "General A1c target for most nonpregnant adults (ADA 2026)?", "opts": ["<6.0%", "<6.5%", "<7.0%", "<8.0%"], "ans": 2, "exp": "<7% for most; **<6.5%** if achievable without hypoglycemia; **<8%** for frail/limited life expectancy. *NABP: 3.D.1.*"}, {"id": 49, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.1 / 3.C.2", "stem": "A frail 84-y/o with multiple comorbidities and prior severe hypoglycemia. Best A1c goal?", "opts": ["As low as possible", "<6.5%", "<7.0%", "<8.0%"], "ans": 3, "exp": "**Less stringent (<8%)** — tight control risks hypoglycemia harm with little benefit in limited life expectancy. ✓ Individualization trap. *NABP: 3.D.1 / 3.C.2.*"}, {"id": 50, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.C.1 / 3.E.2", "stem": "A1c 7.0%. Estimated average glucose (eAG)?", "opts": ["154", "183", "126", "140"], "ans": 0, "exp": "eAG = 28.7×7 − 46.7 = 200.9 − 46.7 ≈ **154.** *NABP: 1.C.1 / 3.E.2.*"}, {"id": 51, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.3", "stem": "On CGM, which metric best correlates with A1c <7% and is the primary management target?", "opts": ["Number of fingersticks", "Time-in-range (70–180) >70%", "Mean glucose <200", "Total daily insulin"], "ans": 1, "exp": "**TIR >70%** (~16.8 h/day) ≈ A1c <7%; also **TBR <70 <4%, <54 <1%.** ✓ 2026 CGM emphasis. *NABP: 3.D.3.*"}, {"id": 52, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.1", "stem": "A patient with **sickle cell trait and recent transfusion** has A1c 6.0% but glucoses run 200s. Best assessment tool?", "opts": ["Urine glucose dipstick", "Trust the reported A1c", "Fructosamine or CGM", "Random plasma glucose only"], "ans": 2, "exp": "A1c is **unreliable** with hemoglobinopathies, recent transfusion, hemolysis, CKD/EPO, iron deficiency, pregnancy → use **fructosamine or CGM.** ✓ Don't trust a falsely low A1c. *NABP: 3.C.1.*"}, {"id": 53, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.6 / 3.E.2", "stem": "Severe hypoglycemia (unconscious, no IV access) at home. First-line treatment a caregiver should give?", "opts": ["Wait for EMS", "Insulin", "Oral glucose gel forced into mouth", "Intranasal or IM glucagon"], "ans": 3, "exp": "**Glucagon** (nasal/IM/subQ) for severe hypoglycemia when the patient can't safely swallow. Conscious + able to swallow → **15 g carbs, recheck in 15 min (rule of 15).** *NABP: 3.C.6 / 3.E.2.*"}, {"id": 54, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.D.2", "stem": "A T1DM patient no longer feels hypoglycemia symptoms (hypoglycemia unawareness). Best step?", "opts": ["Relax targets + CGM, avoid lows for weeks", "Stop all insulin until symptoms return", "Add a sulfonylurea to smooth glucose", "Tighten the A1c target below 6.5%"], "ans": 0, "exp": "**Relax targets and strictly avoid hypoglycemia** (with CGM) to **restore counter-regulatory awareness.** ✓ Tightening control worsens it. *NABP: 3.D.2.*"}, {"id": 55, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.1", "stem": "Prediabetes is defined by all EXCEPT:", "opts": ["2-h OGTT 140–199", "A1c 6.8%", "A1c 5.7–6.4%", "FPG 100–125"], "ans": 1, "exp": "A1c **6.8% = diabetes** (≥6.5%). A–C are prediabetes ranges. ✓ Metformin (Glucophage) considered for prediabetes if high-risk (BMI ≥35, age <60, prior GDM). *NABP: 3.C.1.*"}, {"id": 56, "group": "Diagnosis, Glycemic Targets & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.1", "stem": "Older adult on CGM — appropriate **relaxed** TIR/TBR targets?", "opts": ["No CGM targets", "TIR >70%, TBR <4%", "TIR >50%, TBR <1%", "TIR 100%, TBR 0%"], "ans": 2, "exp": "For older/high-risk adults, ADA suggests **TIR >50% with TBR <1%** (hypoglycemia avoidance prioritized). *NABP: 3.D.1.*"}, {"id": 60, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "Preferred pharmacologic agent for hyperglycemia in pregnancy?", "opts": ["Empagliflozin (Jardiance)", "Semaglutide (Ozempic)", "Glyburide (DiaBeta)", "Insulin"], "ans": 3, "exp": "**Insulin** is preferred — it **does not cross the placenta.** Metformin (Glucophage) is an alternative (crosses placenta; ~50% need added insulin); glyburide (DiaBeta) is not first-line; **SGLT2i/GLP-1 are avoided** in pregnancy. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 61, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 2.A.4", "stem": "A patient with pregestational T2DM on **lisinopril (Zestril) + atorvastatin (Lipitor) + empagliflozin (Jardiance)** has a positive pregnancy test. Best medication change?", "opts": ["Stop ACEi, statin, and SGLT2i; use insulin + labetalol (Trandate)", "Stop only atorvastatin (Lipitor); keep the rest", "Switch lisinopril (Zestril) to losartan (an ARB)", "Continue all current medications unchanged"], "ans": 0, "exp": "⚠ **ACEi/ARB are teratogenic** (2nd/3rd-trimester fetopathy), **statins are generally discontinued**, and **SGLT2i are avoided** in pregnancy → switch to **insulin** and pregnancy-safe antihypertensives. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 62, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B", "stem": "Routine GDM screening (no prior diabetes) is performed at:", "opts": ["8–10 weeks", "24–28 weeks", "36 weeks", "Only postpartum"], "ans": 1, "exp": "**24–28 weeks** (one-step 75-g OGTT, or two-step 50-g GCT → 100-g OGTT). High-risk patients are also screened **<15 weeks.** *NABP: 3.B.*"}, {"id": 63, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.D.1", "stem": "Pregnancy glucose targets (GDM) are approximately:", "opts": ["Fasting <70, 2-h <100 mg/dL", "Fasting <120, 1-h <180 mg/dL", "Fasting <95, 1-h <140, 2-h <120", "Fasting <130, 2-h <180 mg/dL"], "ans": 2, "exp": "Tighter than nonpregnant: **fasting <95, 1-h postprandial <140, 2-h <120**; A1c <6% if achievable without hypoglycemia. *NABP: 3.D.1.*"}, {"id": 64, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "4.B / 3.C.2", "stem": "A pregnant diabetic at 13 weeks — which prophylaxis reduces preeclampsia risk?", "opts": ["Prophylactic warfarin (Coumadin) anticoagulation", "A moderate-intensity statin", "High-dose aspirin (325 mg daily)", "Low-dose aspirin (81–150 mg) from wk 12–16"], "ans": 3, "exp": "**Low-dose aspirin from 12–16 weeks** is recommended for preeclampsia prevention in diabetes/high-risk pregnancy. *NABP: 4.B / 3.C.2.*"}, {"id": 65, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B / 4.B", "stem": "GDM patient 8 weeks postpartum — recommended follow-up?", "opts": ["75-g OGTT at 4–12 weeks postpartum", "A1c checked once at one year only", "Start lifelong basal insulin now", "No further glucose testing needed"], "ans": 0, "exp": "GDM → **75-g OGTT at 4–12 weeks postpartum**, then lifelong periodic screening (↑ future T2DM risk). *NABP: 3.B / 4.B.*"}, {"id": 66, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "An 80-y/o with T2DM and CKD (eGFR 38) on **glyburide (DiaBeta)** has nocturnal hypoglycemia. Best change?", "opts": ["Increase the glyburide (DiaBeta) dose for control", "Switch to a low-hypoglycemia agent (DPP-4/glipizide (Glucotrol))", "Add bedtime basal insulin to glyburide (DiaBeta)", "Add a second-generation sulfonylurea"], "ans": 1, "exp": "**Glyburide (DiaBeta)** (Beers, long-acting renal metabolites) → switch to **glipizide (Glucotrol)** or a low-hypoglycemia agent; relax A1c (<8%). *NABP: 3.C.2.*"}, {"id": 67, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "In a patient with **eGFR 25**, which agent is most appropriate to continue/adjust?", "opts": ["Glimepiride (a sulfonylurea)", "Metformin (Glucophage) at full dose", "Dose-reduced insulin or a GLP-1 RA", "Glyburide (a sulfonylurea)"], "ans": 2, "exp": "Metformin (Glucophage) is **CI <30**; SGLT2i initiation needs eGFR ≥20 (limited glycemic effect low); **insulin (reduced dose)** and **GLP-1 RA** remain usable. ★ Renal threshold drives selection. *NABP: 3.C.2.*"}, {"id": 68, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Which antihypertensive is preferred during pregnancy?", "opts": ["Hydrochlorothiazide (Microzide)", "Lisinopril (an ACEi)", "Losartan (an ARB)", "Labetalol (Trandate) or nifedipine (Procardia)"], "ans": 3, "exp": "**ACEi/ARB are teratogenic** → use **labetalol (Trandate), nifedipine (Procardia), or methyldopa (Aldomet)** in pregnancy. *NABP: 3.C.2.*"}, {"id": 71, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "Breastfeeding mother with T2DM — compatible glucose-lowering options?", "opts": ["Insulin and metformin (Glucophage) are compatible", "An SGLT2 inhibitor is preferred", "A GLP-1 RA is the preferred agent", "None; the mother must wean first"], "ans": 0, "exp": "**Insulin and metformin (Glucophage)** are considered compatible with lactation; newer agents lack safety data. *NABP: 3.C.2.*"}, {"id": 72, "group": "Pregnancy & Special Populations", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.C.2", "stem": "Why is **insulin** preferred over oral agents in pregnancy?", "opts": ["It is the cheapest option", "It does not cross the placenta", "It reliably causes weight loss", "It is dosed only once weekly"], "ans": 1, "exp": "Insulin **does not cross the placenta**, avoiding fetal exposure; oral agents (metformin, glyburide (DiaBeta)) do cross. *NABP: 1.A.2 / 3.C.2.*"}, {"id": 73, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "T2DM with **albuminuria (UACR 400) and eGFR 50, BP 142/88.** First-line antihypertensive?", "opts": ["Atenolol", "Amlodipine (Norvasc)", "ACEi or ARB", "Hydrochlorothiazide (Microzide)"], "ans": 2, "exp": "**ACEi/ARB** are first-line with **albuminuria** (reno-protective); add **SGLT2i** and **finerenone (Kerendia)** for further kidney/CV protection. Target **<130/80.** *NABP: 3.C.2 / 3.D.1.*"}, {"id": 74, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B", "stem": "Recommended retinopathy screening for a newly diagnosed **T2DM** patient?", "opts": ["Only if vision symptoms develop", "A dilated exam every 5 years", "No routine eye exam needed", "Dilated exam at dx, then annually"], "ans": 3, "exp": "T2DM → **dilated exam at diagnosis** (retinopathy may already be present); T1DM → within **5 years** of onset; then at least annually. *NABP: 3.B.*"}, {"id": 75, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2", "stem": "First-line pharmacotherapy for **painful diabetic peripheral neuropathy**?", "opts": ["Pregabalin (Lyrica), duloxetine (Cymbalta), gabapentin (Neurontin)", "Scheduled oral opioids", "Topical lidocaine patch only", "Scheduled oral acetaminophen"], "ans": 0, "exp": "First-line: **pregabalin (Lyrica)/gabapentin (α2δ ligands)** or **duloxetine (Cymbalta, SNRI)**; avoid opioids. *NABP: 3.C.2.*"}, {"id": 76, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "Lipid management for a 52-y/o with T2DM, no ASCVD?", "opts": ["No statin therapy", "Moderate-intensity statin", "A fibrate alone", "Extended-release niacin"], "ans": 1, "exp": "Diabetes age **40–75 → moderate-intensity statin**; **high-intensity** if ASCVD or multiple risk factors. *NABP: 3.C.2 / 3.D.1.*"}, {"id": 77, "group": "Complications & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "4.B / 3.C.2", "stem": "Aspirin for a 55-y/o diabetic with **no prior ASCVD event**. Best statement?", "opts": ["Use 325 mg daily for all patients", "Mandatory for every diabetic patient", "Consider only if high CV risk vs bleeding", "Absolutely contraindicated in diabetes"], "ans": 2, "exp": "Aspirin is **secondary-prevention** standard; **primary prevention** is **selective** (high-risk, shared decision re: bleeding). ✓ Trap: \"all diabetics need aspirin\" is outdated. *NABP: 4.B / 3.C.2.*"}, {"id": 78, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.B", "stem": "Annual **foot** assessment in diabetes uses which tool to detect loss of protective sensation?", "opts": ["A plain-film foot radiograph", "The ankle-brachial index test", "Doppler arterial ultrasound alone", "10-g monofilament (± vibration)"], "ans": 3, "exp": "**10-g monofilament** testing (plus vibration/ankle reflexes/pulses) annually; high-risk feet more often. *NABP: 3.B.*"}, {"id": 79, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "A diabetic with **HFrEF and CKD** — which class gives kidney + heart protection regardless of A1c?", "opts": ["SGLT2 inhibitor", "Sulfonylurea", "Basal insulin", "DPP-4 inhibitor"], "ans": 0, "exp": "**SGLT2i** reduce HF hospitalization and slow CKD progression independent of glycemic effect. *NABP: 3.C.2 / 3.D.1.*"}, {"id": 80, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.3", "stem": "Which combination should be **avoided** for diabetic kidney/BP management?", "opts": ["ARB + finerenone (with K monitoring)", "ACEi + ARB together", "ACEi + amlodipine (Norvasc)", "ACEi + SGLT2i"], "ans": 1, "exp": "**Never combine ACEi + ARB** (↑ hyperkalemia/AKI, no added benefit). The others are acceptable combinations (monitor K with finerenone (Kerendia)). *NABP: 3.C.3.*"}, {"id": 81, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.C.1 / 4.B", "stem": "Recommended vaccines for adults with diabetes include all EXCEPT:", "opts": ["Pneumococcal conjugate vaccine", "Hepatitis B series vaccine", "Live attenuated zoster (Zostavax)", "Annual inactivated influenza vaccine"], "ans": 2, "exp": "Diabetics should get influenza, **pneumococcal**, **hepatitis B**, COVID, RSV (age-based), and **recombinant zoster (Shingrix)** — the **live zoster vaccine is retired/not used.** *NABP: 2.C.1 / 4.B.*"}, {"id": 82, "group": "Complications & Monitoring", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "A diabetic on insulin reports early satiety, bloating, and erratic glucose after meals (gastroparesis). Reasonable option?", "opts": ["Switch to a high-fiber, high-residue diet", "Stop all insulin until symptoms resolve", "Increase only the mealtime insulin dose", "Short-term metoclopramide (Reglan) + diet; adjust timing"], "ans": 3, "exp": "Diabetic **gastroparesis** → **metoclopramide (Reglan)** (limited duration — tardive dyskinesia BBW), small low-fat/low-fiber meals, and adjust prandial insulin timing. *NABP: 3.C.2.*"}, {"id": 83, "group": "Complications & Monitoring", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "A diabetic with ASCVD already on a maximally tolerated statin has LDL 92. Next step to lower ASCVD risk?", "opts": ["Add ezetimibe (Zetia) ± a PCSK9 inhibitor", "Add extended-release niacin", "No change to current therapy", "Stop the statin to avoid AEs"], "ans": 0, "exp": "Intensify with **ezetimibe (Zetia)** and/or a **PCSK9 inhibitor** (very-high-risk LDL goal <55). *NABP: 3.C.2 / 3.D.1.*"}, {"id": 87, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Jardiance** is the brand name for:", "opts": ["ertugliflozin", "empagliflozin", "dapagliflozin", "canagliflozin"], "ans": 1, "exp": "Jardiance = **empagliflozin (Jardiance)** (SGLT2i). Farxiga = dapagliflozin (Farxiga), Invokana = canagliflozin (Invokana), Steglatro = ertugliflozin (Steglatro). *NABP: 2.A.1.*"}, {"id": 88, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "The generic name behind **Ozempic** and **Rybelsus** is:", "opts": ["tirzepatide", "dulaglutide", "semaglutide", "liraglutide"], "ans": 2, "exp": "**Semaglutide (Ozempic)** — Ozempic (SC), Rybelsus (oral), Wegovy (weight). Trulicity = dulaglutide (Trulicity), Victoza = liraglutide (Victoza), Mounjaro = tirzepatide (Mounjaro). *NABP: 2.A.1.*"}, {"id": 89, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Mounjaro / Zepbound** contain:", "opts": ["exenatide", "liraglutide", "semaglutide", "tirzepatide"], "ans": 3, "exp": "**Tirzepatide (Mounjaro)** — the dual GIP/GLP-1 receptor agonist. *NABP: 2.A.1.*"}, {"id": 90, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Januvia** is best described as:", "opts": ["sitagliptin, a DPP-4 inhibitor", "saxagliptin, an SGLT2 inhibitor", "empagliflozin, a DPP-4 inhibitor", "metformin, a biguanide"], "ans": 0, "exp": "Januvia = **sitagliptin (Januvia, DPP-4 inhibitor)**. (Onglyza = saxagliptin (Onglyza), Tradjenta = linagliptin (Tradjenta), Nesina = alogliptin (Nesina).) *NABP: 2.A.1.*"}, {"id": 91, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Lantus, Tresiba, and Levemir** are, respectively:", "opts": ["lispro, aspart, glulisine", "glargine, degludec, detemir", "detemir, glargine, degludec", "glargine, detemir, degludec"], "ans": 1, "exp": "Lantus = **glargine (Lantus)**, Tresiba = **degludec (Tresiba)**, Levemir = **detemir (Levemir)** (all long-acting basal). *NABP: 2.A.1.*"}, {"id": 92, "group": "Drug Essentials", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Actos** — generic and class?", "opts": ["glipizide, sulfonylurea", "acarbose, alpha-glucosidase inhibitor", "pioglitazone, thiazolidinedione (TZD)", "rosiglitazone, SGLT2 inhibitor"], "ans": 2, "exp": "Actos = **pioglitazone (TZD/PPAR-γ agonist)**. *NABP: 2.A.1.*"}, {"id": 93, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "Primary MOA of **metformin (Glucophage)**?", "opts": ["Inhibits renal SGLT2 reabsorption", "Activates the PPAR-γ nuclear receptor", "Stimulates pancreatic insulin secretion", "↓ hepatic gluconeogenesis + ↑ sensitivity"], "ans": 3, "exp": "Metformin (Glucophage) **lowers hepatic glucose output** and improves insulin sensitivity; it is **not** a secretagogue → low hypoglycemia risk, weight-neutral. *NABP: 1.A.1.*"}, {"id": 94, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **SGLT2 inhibitors**?", "opts": ["Block proximal-tubule glucose reabsorption", "Close the pancreatic β-cell K-ATP channel", "Delay intestinal carbohydrate absorption", "Raise endogenous incretin (GLP-1) levels"], "ans": 0, "exp": "Block **SGLT2** → urinary glucose loss (insulin-independent) + natriuresis (HF/renal benefit). *NABP: 1.A.1.*"}, {"id": 95, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **GLP-1 receptor agonists**?", "opts": ["Intestinal α-glucosidase enzyme inhibition", "↑ insulin, ↓ glucagon, ↓ gastric emptying", "PPAR-γ nuclear receptor activation", "Renal SGLT2 cotransporter inhibition"], "ans": 1, "exp": "Incretin mimetic — **glucose-dependent** insulin (low hypoglycemia), weight loss, CV/renal benefit. *NABP: 1.A.1.*"}, {"id": 96, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **DPP-4 inhibitors**?", "opts": ["Close the β-cell K-ATP channel", "Directly mimic the GLP-1 receptor", "Inhibit DPP-4 → ↑ endogenous incretins", "Inhibit renal SGLT2 transporters"], "ans": 2, "exp": "Block the enzyme that degrades incretins → modest glucose-dependent effect; weight-neutral, low hypoglycemia. *NABP: 1.A.1.*"}, {"id": 97, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **sulfonylureas**?", "opts": ["Suppress hepatic gluconeogenesis", "Block renal SGLT2 reabsorption", "Glucose-dependent insulin release", "Close K-ATP → glucose-independent insulin"], "ans": 3, "exp": "Secretagogue acting **independent of glucose** → **hypoglycemia + weight gain** risk. *NABP: 1.A.1.*"}, {"id": 98, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1", "stem": "MOA of **pioglitazone (Actos)**?", "opts": ["PPAR-γ agonist, ↑ sensitivity", "β-cell insulin secretagogue", "Renal SGLT2 cotransport block", "DPP-4 enzyme inhibition"], "ans": 0, "exp": "PPAR-γ nuclear receptor agonist; slow onset (weeks). ⚠ Fluid retention → HF (BBW), edema, fractures, bladder cancer. *NABP: 1.A.1.*"}, {"id": 99, "group": "Drug Essentials", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.A.1 / 3.E.2", "stem": "MOA + key counseling for **acarbose (Precose)**?", "opts": ["Incretin mimetic; titrate weekly for GI tolerance", "α-glucosidase inhibitor; treat lows with glucose, not sucrose", "SGLT2 inhibitor; hold 3–4 days before surgery", "Biguanide; contraindicated below eGFR 30"], "ans": 1, "exp": "Delays intestinal carb breakdown (flatulence/GI). ✓ Because it blocks disaccharide breakdown, **sucrose won't reverse hypoglycemia — use glucose.** *NABP: 1.A.1 / 3.E.2.*"}, {"id": 100, "group": "Drug Essentials", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.A.1 / 2.A.4", "stem": "Which statement about **pramlintide (Symlin, amylin analog)** is correct?", "opts": ["It is mixed in the same syringe as mealtime insulin", "It stimulates β-cell insulin secretion like a sulfonylurea", "Amylin analog → ↓ glucagon/gastric emptying; cut prandial insulin ~50%", "It blocks SGLT2 in the proximal renal tubule"], "ans": 2, "exp": "Adjunct to mealtime insulin in T1/T2DM; **boxed warning for severe insulin-induced hypoglycemia** → cut prandial insulin and never mix in the same syringe. *NABP: 1.A.1 / 2.A.4.*"}, {"id": 101, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3 / 3.C.5", "stem": "Recommended monitoring for **metformin (Glucophage)**?", "opts": ["Serum TSH and free T4 each visit", "A full fasting lipid panel quarterly", "Baseline LFTs and serum lipase", "Renal function (eGFR) + B12"], "ans": 3, "exp": "eGFR (CI <30) and **B12** (chronic deficiency → anemia/neuropathy). *NABP: 3.D.3 / 3.C.5.*"}, {"id": 102, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3 / 3.E.2", "stem": "SGLT2-inhibitor counseling/monitoring includes all EXCEPT:", "opts": ["Routine scheduled LFT monitoring is mandatory", "Genital mycotic infections / perineal hygiene", "Volume status and eGFR", "DKA awareness; hold ~3–4 days before surgery"], "ans": 0, "exp": "Routine LFT monitoring is **not** required. The rest are real SGLT2i counseling points (mycotic infections, volume/eGFR, euglycemic DKA, perioperative hold). *NABP: 3.D.3 / 3.E.2.*"}, {"id": 103, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3 / 2.A.4", "stem": "Best monitoring/counseling for **GLP-1 RAs**?", "opts": ["Monitor TSH closely; titrate for thyroid AEs", "Titrate for GI; pancreatitis; CI in MTC", "Monitor INR closely; hold for any nausea", "Routine CBC and serum creatine kinase"], "ans": 1, "exp": "GI is dose-limiting (titrate); pancreatitis caution; **boxed thyroid C-cell warning.** *NABP: 3.D.3 / 2.A.4.*"}, {"id": 104, "group": "Drug Essentials", "domain": "D2", "tier": "T2", "aware": false, "nabp": "3.D.3", "stem": "Monitoring for **pioglitazone (Actos)**?", "opts": ["HbA1c, TSH, and free T4 each visit", "Serum amylase and lipase trending", "Baseline LFTs, weight, edema", "INR and platelet count monitoring"], "ans": 2, "exp": "TZD fluid retention → **HF/edema**; check baseline LFTs, monitor weight; fracture risk. *NABP: 3.D.3.*"}, {"id": 105, "group": "Drug Essentials", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.6 / 2.A.5", "stem": "Which agent should be **held around iodinated contrast and during acute illness**?", "opts": ["Glipizide (Glucotrol)", "Insulin glargine (Lantus)", "Sitagliptin (Januvia)", "Metformin (Glucophage)"], "ans": 3, "exp": "**Metformin (Glucophage)** — risk of **lactic acidosis** with AKI/contrast/illness; hold and reassess renal function. *NABP: 3.C.6 / 2.A.5.*"}, {"id": 109, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Why rotate insulin injection sites within a region?", "opts": ["To prevent lipohypertrophy and erratic absorption", "To speed the onset of insulin action", "It is unnecessary with modern analogs", "To reduce the total daily insulin requirement"], "ans": 0, "exp": "Repeated same-spot injection → **lipohypertrophy** → unpredictable absorption/glycemic swings. Inject into healthy tissue and rotate. *NABP: 3.E.2.*"}, {"id": 110, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "1.A.2 / 3.E.2", "stem": "Which site gives the **fastest** subcutaneous insulin absorption?", "opts": ["Buttock", "Abdomen", "Upper arm", "Thigh"], "ans": 1, "exp": "Absorption: **abdomen > arm > thigh > buttock**; the abdomen is preferred for consistency. *NABP: 1.A.2 / 3.E.2.*"}, {"id": 111, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Correct insulin **pen** technique includes:", "opts": ["Shake the pen vigorously before each dose", "Reuse the same pen needle for a week", "Prime ~2 units, new needle, hold ~10 s", "Inject and withdraw the needle immediately"], "ans": 2, "exp": "Prime to clear air/confirm flow, **new needle each time**, and **count ~10 seconds** before withdrawing to deliver the full dose. *NABP: 3.E.2.*"}, {"id": 112, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 2.A.2", "stem": "How should a cloudy insulin (NPH) be prepared before drawing/injecting?", "opts": ["Warm it under hot running water", "No resuspension is needed", "Shake the vial vigorously", "Gently roll/invert to resuspend"], "ans": 3, "exp": "**Gently roll** (don't shake — shaking causes bubbles/clumping). NPH is a suspension that must be uniformly resuspended. *NABP: 3.E.2 / 2.A.2.*"}, {"id": 113, "group": "Devices & Products", "domain": "D3", "tier": "T3", "aware": false, "nabp": "5.A / 1.A.2", "stem": "A patient with severe insulin resistance is prescribed **U-500 regular insulin.** Key safety point?", "opts": ["Use a dedicated U-500 device; verify dose", "It is interchangeable with U-100 unit-for-unit", "No special dosing precautions are needed", "Draw it up in a standard U-100 syringe"], "ans": 0, "exp": "U-500 is **5× concentrated** → use the **U-500-specific device** and independent dose verification (ISMP high-alert; major dosing-error risk). *NABP: 5.A / 1.A.2.*"}, {"id": 114, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Standard subcutaneous insulin injection technique:", "opts": ["Inject directly into a vein", "90° (45° if lean), no aspiration", "Always aspirate to check for blood", "Inject deep into the muscle"], "ans": 1, "exp": "SC injection at **90°** (45° in thin patients); **aspiration is not required**; rotate sites. IM/IV alters absorption (regular insulin is the only IV one). *NABP: 3.E.2.*"}, {"id": 115, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.G / 3.C.6", "stem": "An insulin **pump** delivers which insulin, and what is the main risk if the infusion set occludes?", "opts": ["Regular insulin; risk of lactic acidosis", "Long-acting glargine (Lantus); risk of hypoglycemia", "Rapid analog; occlusion → rapid DKA", "NPH insulin; no occlusion risk"], "ans": 2, "exp": "Pumps use **rapid-acting** insulin for both basal and bolus; with no long-acting depot, an **occlusion quickly → hyperglycemia/DKA.** Change the site q2–3 days. *NABP: 3.G / 3.C.6.*"}, {"id": 116, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.4 / 3.G", "stem": "Inhaled insulin (Afrezza) counseling includes:", "opts": ["Safe to use in any chronic lung disease", "May be mixed with subcutaneous insulin", "Can serve as a once-daily basal insulin", "Dose at meals; CI in asthma/COPD; check spirometry"], "ans": 3, "exp": "Rapid prandial inhaled insulin; **bronchospasm risk → CI in chronic lung disease**, spirometry monitoring; still needs basal insulin in T1DM. *NABP: 2.A.4 / 3.G.*"}, {"id": 117, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "A caregiver needs a rescue option for **severe hypoglycemia** (patient unconscious) at home. Best to dispense?", "opts": ["Nasal glucagon (Baqsimi) or autoinjector", "Rapid-acting insulin given subcutaneously", "An immediate dose of oral metformin", "Oral glucose tablets placed in the cheek"], "ans": 0, "exp": "**Glucagon** (intranasal/autoinjector/prefilled) for when the patient can't swallow; teach caregivers. Oral glucose is only for conscious patients who can swallow. *NABP: 3.E.2.*"}, {"id": 118, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.D / 3.E.2", "stem": "Sharps/needle counseling for insulin users:", "opts": ["Reuse needles a few times to save cost", "Single-use; don't recap/share; use a sharps container", "Discard used needles in the household trash", "Recap carefully and reuse once weekly"], "ans": 1, "exp": "**One-time-use** needles, no sharing/recapping, **sharps container** disposal (bloodborne-pathogen + dosing-accuracy reasons). *NABP: 2.D / 3.E.2.*"}, {"id": 119, "group": "Devices & Products", "domain": "D1", "tier": "T2", "aware": false, "nabp": "2.A.2", "stem": "Match the **GLP-1 RA dosing frequency**:", "opts": ["Liraglutide (Victoza) weekly · dulaglutide (Trulicity) daily", "Exenatide (Byetta) once weekly · liraglutide (Victoza) weekly", "Dulaglutide (Trulicity) weekly · liraglutide (Victoza) daily · Byetta BID", "Semaglutide (Ozempic) daily · dulaglutide (Trulicity) BID"], "ans": 2, "exp": "**Weekly:** dulaglutide (Trulicity), semaglutide (Ozempic), exenatide (Byetta) ER (Bydureon), tirzepatide (Mounjaro). **Daily:** liraglutide (Victoza); **BID:** exenatide (Byetta); **oral daily:** semaglutide (Rybelsus). *NABP: 2.A.2.*"}, {"id": 120, "group": "Devices & Products", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.E.2 / 2.A.2", "stem": "Correct administration of **oral semaglutide (Rybelsus)**?", "opts": ["At bedtime with 8 oz of milk", "Crushed and dispersed in juice", "With a large breakfast for absorption", "Empty stomach AM, ≤4 oz water, wait ≥30 min"], "ans": 3, "exp": "ℹ Absorption is poor and food/fluid-sensitive → **empty stomach, small sip of water only, 30-min wait.** ✓ The classic Rybelsus counseling trap. *NABP: 3.E.2 / 2.A.2.*"}, {"id": 121, "group": "Devices & Products", "domain": "D1", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "The **weight-management** brand of **semaglutide** is:", "opts": ["Wegovy", "Rybelsus", "Mounjaro", "Ozempic"], "ans": 0, "exp": "**Wegovy** = semaglutide (Ozempic) for weight (Ozempic = T2DM injectable, Rybelsus = oral T2DM). Liraglutide (Victoza) weight brand = Saxenda; tirzepatide (Mounjaro) weight brand = Zepbound. *NABP: 2.A.1.*"}, {"id": 122, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.2", "stem": "Best strategy to reduce **GI intolerance** when starting a GLP-1 RA?", "opts": ["Start at the maximum maintenance dose", "Start low, titrate up monthly as tolerated", "Give each dose with high-fat meals", "Add a scheduled antiemetic indefinitely"], "ans": 1, "exp": "Nausea is dose-related → **slow stepwise titration**; small low-fat meals help. *NABP: 3.E.2 / 3.C.2.*"}, {"id": 123, "group": "Devices & Products", "domain": "D3", "tier": "T3", "aware": true, "nabp": "2.A.4 / 3.E.2", "stem": "Which statement about **canagliflozin (Invokana)** and amputation risk is correct (2026)?", "opts": ["Amputation risk is unique to dapagliflozin (Farxiga)", "It still carries an amputation boxed warning", "Boxed warning removed (2020); precaution remains", "There is no amputation signal at all for it"], "ans": 2, "exp": "ℹ FDA **removed the boxed warning in 2020** (benefit/data reassessment); the precaution and **foot-care counseling** remain. ✓ Currency trap: it's no longer a *boxed* warning. *NABP: 2.A.4 / 3.E.2.*"}, {"id": 124, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.C.2 / 3.D.1", "stem": "Which SGLT2 inhibitors have the **strongest heart-failure/CKD outcome evidence**?", "opts": ["Only canagliflozin (Invokana)", "None have outcome trial data", "Ertugliflozin (Steglatro) alone", "Dapagliflozin (Farxiga) and empagliflozin (Jardiance)"], "ans": 3, "exp": "**Dapagliflozin (Farxiga)** (DAPA-HF, DAPA-CKD) and **empagliflozin (Jardiance)** (EMPEROR, EMPA-REG) have the strongest HF/renal/CV-mortality data; **ertugliflozin (Steglatro)** has the least. *NABP: 3.C.2 / 3.D.1.*"}, {"id": 125, "group": "Devices & Products", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Optimal timing for an **SGLT2 inhibitor**?", "opts": ["In the morning before the first meal", "Only with the largest meal of the day", "Every other day, alternating mornings", "At bedtime with a small snack"], "ans": 0, "exp": "Once daily **in the morning before the first meal**; counsel on **volume status, genital mycotic infections, and DKA awareness.** *NABP: 3.E.2.*"}, {"id": 129, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.D.2", "stem": "Insulin-naïve T2DM, **80 kg**, starting basal insulin at **0.2 units/kg/day.** Starting dose?", "opts": ["16 units", "24 units", "8 units", "12 units"], "ans": 0, "exp": "0.2 × 80 = **16 units** (typical basal start is 0.1–0.2 units/kg/day or 10 units). *NABP: 1.C.4 / 3.D.2.*"}, {"id": 130, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "A patient's total daily dose (TDD) is **50 units.** Using a **50/50 basal-bolus split**, the basal dose is?", "opts": ["10 units", "25 units", "33 units", "50 units"], "ans": 1, "exp": "50% of 50 = **25 units basal**, with 25 units split across meals. *NABP: 1.C.4.*"}, {"id": 131, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "TDD **50 units.** Insulin-to-carb ratio by the **500 rule**?", "opts": ["1 unit / 50 g", "1 unit / 5 g", "1 unit / 10 g", "1 unit / 25 g"], "ans": 2, "exp": "500 ÷ TDD = 500 ÷ 50 = **1 unit per 10 g carbohydrate.** *NABP: 1.C.4.*"}, {"id": 132, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Same patient (TDD 50 units rapid-acting). Correction (sensitivity) factor by the **1800 rule**?", "opts": ["50 mg/dL/unit", "18 mg/dL/unit", "25 mg/dL/unit", "36 mg/dL/unit"], "ans": 3, "exp": "1800 ÷ TDD = 1800 ÷ 50 = **36 mg/dL per unit** (use 1500 for **regular** insulin). *NABP: 1.C.4.*"}, {"id": 133, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "Pre-meal glucose **250 mg/dL**, target **150**, correction factor **50 mg/dL/unit.** Correction dose?", "opts": ["2 units", "4 units", "5 units", "1 unit"], "ans": 0, "exp": "(250 − 150) ÷ 50 = **2 units** (add to the carb-coverage dose). *NABP: 1.C.4.*"}, {"id": 134, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 5.A", "stem": "A patient requires **250 units/day** of insulin using **U-500.** Volume per day?", "opts": ["0.25 mL", "0.5 mL", "1 mL", "2.5 mL"], "ans": 1, "exp": "U-500 = 500 units/mL → 250 ÷ 500 = **0.5 mL.** ⚠ U-500 is 5× concentrated — dose with a U-500 syringe or in \"units\" to avoid 5-fold errors. *NABP: 1.C.4 / 5.A.*"}, {"id": 135, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "DKA, **70 kg**, continuous IV regular insulin at **0.1 units/kg/hr.** Infusion rate?", "opts": ["14 units/hr", "3.5 units/hr", "7 units/hr", "10 units/hr"], "ans": 2, "exp": "0.1 × 70 = **7 units/hr** (± a 0.1 unit/kg bolus per protocol). *NABP: 1.C.4 / 3.C.2.*"}, {"id": 136, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4 / 1.C.8", "stem": "DKA labs: glucose **600 mg/dL**, measured Na **130 mEq/L.** Corrected sodium (add 1.6 per 100 mg/dL >100)?", "opts": ["146", "130", "134", "138"], "ans": 3, "exp": "Correction = 1.6 × [(600 − 100)/100] = 1.6 × 5 = 8 → 130 + 8 = **138 mEq/L.** ✓ Hyperglycemia dilutes serum Na; \"true\" Na guides fluids. *NABP: 1.C.4 / 1.C.8.*"}, {"id": 137, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.8", "stem": "Same DKA patient: Na **140**, Cl **100**, HCO₃ **10 mEq/L.** Anion gap?", "opts": ["30", "40", "12", "20"], "ans": 0, "exp": "AG = Na − (Cl + HCO₃) = 140 − (100 + 10) = **30** (high-AG metabolic acidosis). *NABP: 1.C.8.*"}, {"id": 138, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.C.4 / 3.D.1", "stem": "Estimated average glucose (eAG) for an **A1c of 8%** (eAG = 28.7 × A1c − 46.7)?", "opts": ["154 mg/dL", "183 mg/dL", "200 mg/dL", "240 mg/dL"], "ans": 1, "exp": "28.7 × 8 − 46.7 = **183 mg/dL.** ★ A1c 7% ≈ 154; each 1% ≈ +29 mg/dL. *NABP: 1.C.4 / 3.D.1.*"}, {"id": 139, "group": "Calculations", "domain": "D1", "tier": "T1", "aware": false, "nabp": "1.C.2", "stem": "**Semaglutide (Ozempic) 0.5 mg SC weekly**; the pen delivers **2 mg** total. Days supply of one pen?", "opts": ["14 days", "21 days", "28 days", "56 days"], "ans": 2, "exp": "2 mg ÷ 0.5 mg/dose = 4 doses × 7 days = **28 days.** *NABP: 1.C.2.*"}, {"id": 140, "group": "Calculations", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.4", "stem": "A patient on **regular** insulin has TDD **60 units.** Correction factor by the **1500 rule**?", "opts": ["36 mg/dL/unit", "60 mg/dL/unit", "15 mg/dL/unit", "25 mg/dL/unit"], "ans": 3, "exp": "1500 ÷ 60 = **25 mg/dL per unit.** Use **1500 for regular** insulin and **1800 for rapid-acting analogs.** *NABP: 1.C.4.*"}, {"id": 141, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "DKA: glucose 480, pH 7.05, **K⁺ 3.1 mEq/L.** The insulin infusion is ordered. Best next step?", "opts": ["Replace K, hold insulin until ≥3.5", "Start insulin and give IV bicarbonate", "Start the insulin drip at a doubled rate", "Start insulin at 0.1 u/kg/hr now"], "ans": 0, "exp": "Per the **2024 consensus, K <3.5** → insulin shifts K intracellularly → life-threatening hypokalemia/arrhythmia → **replace K first, hold insulin until ≥3.5** (raised from the legacy 3.3). ★ Total-body K is depleted even when serum looks normal/high. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 142, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "DKA on insulin + saline; at 4 h **glucose 230 but β-OHB 4.0, pH 7.15.** Best adjustment?", "opts": ["Stop the IV insulin infusion now", "Add D5 to fluids, continue insulin", "Halve the insulin and stop fluids", "Switch to subcutaneous sliding scale"], "ans": 1, "exp": "Ketoacidosis isn't resolved — **keep insulin to clear ketones** and **add dextrose once glucose <250** so insulin continues without hypoglycemia. ⚠ Stopping insulin when glucose falls but the gap/ketones persist → DKA rebound. *NABP: 3.C.2.*"}, {"id": 143, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.D.2", "stem": "A DKA patient has resolved (β-OHB <0.6, eating). Transitioning IV→subcutaneous insulin, you should:", "opts": ["Continue the IV insulin infusion at home", "Stop the IV drip, give subQ basal 2 h later", "Give subQ basal 1–2 h before stopping IV", "Stop IV; use only correctional subQ insulin"], "ans": 2, "exp": "IV insulin t½ is minutes → overlap **subcut basal 1–2 h before** stopping the drip to prevent rebound hyperglycemia/DKA. *NABP: 3.C.2 / 3.D.2.*"}, {"id": 144, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 2.A.4", "stem": "A T2DM patient on **empagliflozin (Jardiance)** has N/V, **glucose 185**, β-OHB 4.5, pH 7.18. Best management?", "opts": ["Give fluids alone; insulin is unnecessary", "Treat as HHS with fluids and insulin", "Not DKA — glucose is normal, reassure", "Euglycemic DKA — insulin + dextrose, stop SGLT2i"], "ans": 3, "exp": "SGLT2i → **euglycemic DKA**; treat with insulin **plus dextrose from the start** (glucose already <200) + fluids; **discontinue the SGLT2i.** ★ Hold SGLT2i ~3–4 days before surgery to prevent it. *NABP: 3.C.2 / 2.A.4.*"}, {"id": 145, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.C.8", "stem": "Labs: glucose 850, effective osm 335, **β-OHB 1.2**, pH 7.34, bicarb 20, obtunded. Diagnosis?", "opts": ["HHS", "Mixed DKA/HHS", "Lactic acidosis", "DKA"], "ans": 0, "exp": "HHS = glucose ≥600 + osm >320 + **minimal ketones (β-OHB <3.0)** + pH >7.3/bicarb >18 + AMS; no acidosis → not DKA. *NABP: 3.C.2 / 1.C.8.*"}, {"id": 146, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 1.C.4", "stem": "DKA, after initial saline: **corrected Na 148**, glucose 350, hemodynamically stable. Next fluid?", "opts": ["Continue 0.9% NaCl", "Switch to 0.45% NaCl", "Give D5W only", "Stop all fluids"], "ans": 1, "exp": "Once euvolemic with **normal/high corrected Na**, switch to **0.45% NaCl**; keep 0.9% if Na is low or still hypovolemic. Add dextrose when glucose ~200. *NABP: 3.C.2 / 1.C.4.*"}, {"id": 147, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2", "stem": "DKA patient, **pH 6.85** despite fluids/insulin. Regarding bicarbonate?", "opts": ["Give bicarbonate only if K is high", "Give bicarbonate routinely for any pH <7.3", "Consider bicarbonate — pH <7.0", "Never use bicarbonate in DKA"], "ans": 2, "exp": "Bicarbonate is **only considered for pH <7.0** (severe); routine use isn't recommended (risks: hypokalemia, paradoxical CSF acidosis, delayed ketone clearance). *NABP: 3.C.2.*"}, {"id": 148, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": true, "nabp": "3.C.2 / 1.C.8", "stem": "Which best confirms **DKA resolution** (2024 criteria)?", "opts": ["Negative urine ketone dipstick", "Persistent anion gap above 12", "Serum glucose below 200 alone", "β-OHB <0.6 (or pH ≥7.3/bicarb ≥18)"], "ans": 3, "exp": "Resolution = **β-OHB <0.6** (preferred) or pH ≥7.3/bicarb ≥18, plus glucose control. ⚠ **Urine ketones lag** (measure acetoacetate) and can stay positive — don't use them to confirm resolution. *NABP: 3.C.2 / 1.C.8.*"}, {"id": 149, "group": "DKA / HHS — Tier 3", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 3.C.2", "stem": "DKA, **80 kg**, K 4.0. Standard IV regular-insulin infusion rate (no-bolus protocol)?", "opts": ["8 units/hr", "16 units/hr", "24 units/hr", "4 units/hr"], "ans": 0, "exp": "0.1 u/kg/hr × 80 = **8 units/hr** (± an optional 0.1 u/kg bolus; the 2024 report notes a bolus is unnecessary if the infusion starts promptly). *NABP: 1.C.4 / 3.C.2.*"}, {"id": 150, "group": "DKA / HHS — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.C.2 / 3.C.5", "stem": "A **child** treated for DKA develops headache, bradycardia, and declining consciousness ~6–10 h into therapy. Most likely cause/action?", "opts": ["Hypoglycemia — give IV dextrose now", "Cerebral edema — mannitol/3% saline, slow fluids", "Hypokalemia — replace potassium IV", "Rebound DKA — increase the insulin rate"], "ans": 1, "exp": "**Cerebral edema** (mainly pediatric) from osmotic shifts/overly rapid correction → **mannitol or hypertonic saline**, reduce fluid rate, imaging. ⚠ Avoid overaggressive fluid/osmolar correction in children. *NABP: 3.C.2 / 3.C.5.*"}, {"id": 151, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Janumet** contains:", "opts": ["sitagliptin + metformin", "saxagliptin + dapagliflozin", "empagliflozin + linagliptin", "glipizide + metformin"], "ans": 0, "exp": "Janumet = **sitagliptin (Januvia, DPP-4) + metformin (Glucophage)** (Janumet XR = ER). *NABP: 2.A.1.*"}, {"id": 152, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T1", "aware": false, "nabp": "2.A.1", "stem": "**Synjardy** is:", "opts": ["dapagliflozin + metformin", "empagliflozin + metformin", "canagliflozin + metformin", "ertugliflozin + metformin"], "ans": 1, "exp": "Synjardy = **empagliflozin (Jardiance, SGLT2i) + metformin (Glucophage).** (Xigduo XR = dapa/met, Invokamet = cana/met, Segluromet = ertu/met.) *NABP: 2.A.1.*"}, {"id": 153, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1", "stem": "**Glyxambi** combines:", "opts": ["a sulfonylurea + metformin (biguanide)", "a TZD + a DPP-4 inhibitor", "empagliflozin + linagliptin", "a GLP-1 RA + basal insulin"], "ans": 2, "exp": "Glyxambi = **empagliflozin (Jardiance, SGLT2i) + linagliptin (Tradjenta, DPP-4).** (Qtern = dapa/saxa; Steglujan = ertu/sita.) *NABP: 2.A.1.*"}, {"id": 154, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1", "stem": "**Trijardy XR** is a fixed **triple** combination of:", "opts": ["dapagliflozin + saxagliptin + metformin", "canagliflozin + sitagliptin + metformin", "glargine + lixisenatide + metformin", "empagliflozin + linagliptin + metformin"], "ans": 3, "exp": "Trijardy XR = **empagliflozin (Jardiance) + linagliptin (Tradjenta) + metformin (Glucophage)** (SGLT2i + DPP-4 + biguanide). *NABP: 2.A.1.*"}, {"id": 155, "group": "Products, Storage & Rx Status", "domain": "D3", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.C.2", "stem": "**Soliqua** and **Xultophy** are fixed-ratio combinations of:", "opts": ["basal insulin + a GLP-1 RA", "basal insulin + an SGLT2i", "two basal insulins combined", "two GLP-1 receptor agonists"], "ans": 0, "exp": "Soliqua = **glargine (Lantus) + lixisenatide**; Xultophy = **degludec (Tresiba) + liraglutide (Victoza)** (basal insulin + GLP-1 RA). *NABP: 2.A.1 / 3.C.2.*"}, {"id": 156, "group": "Products, Storage & Rx Status", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.2 / 3.E.2", "stem": "**Unopened** insulin should be stored:", "opts": ["In the freezer until first use", "Refrigerated (36–46°F) until expiration", "At room temperature until expiration", "At room temperature in direct sunlight"], "ans": 1, "exp": "**Refrigerate unopened** insulin until expiration; **never freeze** (freezing denatures it). Once in use, store at room temp (≤86°F). *NABP: 1.C.2 / 3.E.2.*"}, {"id": 157, "group": "Products, Storage & Rx Status", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.2 / 3.E.2", "stem": "After first use at room temperature, which insulin has the **longest** discard time?", "opts": ["Insulin lispro (Humalog) — 28 days", "Insulin detemir (Levemir) — 42 days", "Insulin degludec (Tresiba)/Toujeo — 56 days", "Insulin glargine (Lantus) — 28 days"], "ans": 2, "exp": "In-use BUDs: most analogs **28 d**, **Levemir 42**, **Tresiba & Toujeo 56.** ★ Write the open date on the pen/vial. *NABP: 1.C.2 / 3.E.2.*"}, {"id": 158, "group": "Products, Storage & Rx Status", "domain": "D1", "tier": "T2", "aware": false, "nabp": "1.C.2", "stem": "An **opened Levemir** pen at room temperature is discarded after:", "opts": ["56 days", "14 days", "28 days", "42 days"], "ans": 3, "exp": "**Levemir (detemir) = 42 days** in use (vs 28 for most analogs, 56 for Tresiba/Toujeo). *NABP: 1.C.2.*"}, {"id": 159, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.E.2", "stem": "An **in-use Ozempic** pen may be kept (fridge or room temp) for up to:", "opts": ["56 days", "90 days", "14 days", "28 days"], "ans": 0, "exp": "**Ozempic = 56 days** after first use. (Trulicity 14 days room temp; Victoza 30 days.) *NABP: 2.A.1 / 3.E.2.*"}, {"id": 160, "group": "Products, Storage & Rx Status", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2", "stem": "Before injecting **NPH or a premixed (70/30) insulin**, the patient should:", "opts": ["Shake the vial vigorously to mix", "Gently roll to resuspend; do not shake", "Warm it briefly in a microwave", "Use it only once it appears clear"], "ans": 1, "exp": "NPH/premix are **cloudy suspensions** → gently **roll** to resuspend (shaking causes bubbles/uneven dosing). ⚠ Clear insulins (regular, rapid analogs) should never look cloudy. *NABP: 3.E.2.*"}, {"id": 161, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.B / 2.A.4", "stem": "Which insulin can typically be purchased **OTC (no federal prescription)**?", "opts": ["Insulin glargine (Lantus, an analog)", "Insulin lispro (Humalog, an analog)", "Human regular & NPH (Humulin/Novolin)", "Insulin degludec (Tresiba, an analog)"], "ans": 2, "exp": "**Human regular & NPH** (Humulin/Novolin R/N/70-30, e.g., Walmart ReliOn) are **OTC**; **analog** insulins (glargine, lispro (Humalog), aspart (NovoLog), detemir (Levemir), degludec (Tresiba)) are **Rx.** ℹ State rules vary. *NABP: 2.B / 2.A.4.*"}, {"id": 162, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": true, "nabp": "2.B", "stem": "Per 2024 FDA clearances, the new **OTC continuous glucose monitors** (Dexcom Stelo, Abbott Lingo/Libre Rio) are:", "opts": ["Available by prescription only", "Indicated for type 1 diabetes only", "An approved replacement for A1c testing", "For non-insulin adults, no prescription"], "ans": 3, "exp": "The **first OTC CGMs** (2024) are for **adults ≥18 not on insulin** (T2DM on orals / wellness) — **no Rx.** Insulin-dependent patients still use Rx CGMs (Dexcom G7, Libre 3). *NABP: 2.B.*"}, {"id": 163, "group": "Products, Storage & Rx Status", "domain": "D2", "tier": "T2", "aware": false, "nabp": "2.A.1 / 3.E.2", "stem": "Injectable/nasal **glucagon** (Gvoke, Baqsimi) for severe hypoglycemia is:", "opts": ["Prescription-only", "Stocked only in hospitals", "A controlled substance", "OTC"], "ans": 0, "exp": "Glucagon is **Rx**; counsel caregivers to use it when the patient is unconscious/can't swallow. **Baqsimi = nasal** (no reconstitution). *NABP: 2.A.1 / 3.E.2.*"}, {"id": 164, "group": "Products, Storage & Rx Status", "domain": "D3", "tier": "T2", "aware": false, "nabp": "3.E.2 / 3.C.2", "stem": "Best counseling to reduce **GI intolerance** when starting a GLP-1 RA?", "opts": ["Take each dose with a high-fat meal", "Start low, titrate slowly, smaller meals", "Double the first dose for faster effect", "Take it only when symptoms appear"], "ans": 1, "exp": "**Slow titration** + smaller meals minimizes nausea (the dose-limiting AE). ⚠ Counsel on pancreatitis; hold for severe persistent abdominal pain. *NABP: 3.E.2 / 3.C.2.*"}, {"id": 167, "group": "Products — Tier 3", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4 / 5.A", "stem": "A patient needs **Humulin R U-500** for severe insulin resistance. To prevent 5-fold dosing errors, you should:", "opts": ["Dispense the U-500 KwikPen; dose in true units", "Tell the patient to multiply every dose by five", "Substitute U-100 regular insulin at the same volume", "Dispense a standard U-100 syringe and convert"], "ans": 0, "exp": "U-500 is **5× concentrated (500 units/mL)** and **high-alert** → use the **U-500 KwikPen or dedicated U-500 syringe** (dose in true units). ⚠ Mixing U-500 with U-100 devices is a classic fatal error. *NABP: 1.C.4 / 5.A.*"}, {"id": 168, "group": "Products — Tier 3", "domain": "D1", "tier": "T3", "aware": false, "nabp": "1.C.4", "stem": "Using a **U-500 syringe**, a patient draws to the **0.2 mL** mark. How many units is that?", "opts": ["50 units", "100 units", "200 units", "20 units"], "ans": 1, "exp": "U-500 = 500 units/mL → 0.2 mL × 500 = **100 units.** *NABP: 1.C.4.*"}, {"id": 169, "group": "Products — Tier 3", "domain": "D1", "tier": "T3", "aware": false, "nabp": "2.A.1 / 1.C.4", "stem": "Which set are all **concentrated (>U-100)** insulin products?", "opts": ["Basaglar, Admelog, and Lyumjev U-100", "Lantus, Levemir, and Humulin N U-100", "Toujeo U-300, Tresiba U-200, Humulin R U-500", "Novolog, Apidra, and Fiasp U-100"], "ans": 2, "exp": "Concentrated: **Toujeo U-300, Tresiba U-200, Humalog U-200, Lyumjev U-200, Humulin R U-500.** The rest listed are U-100. *NABP: 2.A.1 / 1.C.4.*"}, {"id": 170, "group": "Products — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2", "stem": "When mixing **regular + NPH** insulin in one syringe, the correct draw-up order is:", "opts": ["Draw them up in any convenient order", "Withdraw without injecting any air first", "Draw NPH (cloudy) first, then regular", "Air into both, then draw regular first"], "ans": 3, "exp": "\"**Clear before cloudy**\" — air into NPH vial, air into regular vial, then withdraw **regular (clear) first** to avoid contaminating the clear vial with NPH. *NABP: 3.E.2.*"}, {"id": 171, "group": "Products — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "3.E.2", "stem": "Which insulin must **NOT** be mixed in a syringe with another insulin?", "opts": ["Insulin glargine (Lantus)", "Insulin lispro (Humalog)", "Regular insulin (Humulin R)", "NPH insulin (Humulin N)"], "ans": 0, "exp": "**Glargine (Lantus)** (and **detemir (Levemir), degludec (Tresiba)**) must not be mixed (pH/precipitation, altered PK). Regular, NPH, and rapid analogs (lispro/aspart (NovoLog)) **can** be combined. *NABP: 3.E.2.*"}, {"id": 172, "group": "Products — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.E.2", "stem": "**Afrezza (inhaled insulin)** carries a boxed warning and is contraindicated in:", "opts": ["Obesity with BMI above 35", "Chronic lung disease (asthma/COPD)", "Type 1 diabetes mellitus", "Adults older than 65 years"], "ans": 1, "exp": "⚠ BBW: **acute bronchospasm** → **contraindicated in asthma/COPD**; check **spirometry (FEV₁)** at baseline and periodically; not for DKA; counsel smokers. *NABP: 2.A.4 / 3.E.2.*"}, {"id": 173, "group": "Products — Tier 3", "domain": "D3", "tier": "T3", "aware": false, "nabp": "2.A.4 / 3.C.2", "stem": "**Pramlintide (Symlin)**, an amylin analog given with mealtime insulin, requires which key step?", "opts": ["Double the prandial insulin dose", "Mix it in the same syringe as insulin", "Inject separately; cut mealtime insulin ~50%", "Give it intravenously after each meal"], "ans": 2, "exp": "Pramlintide (Symlin) is injected **separately** (never mixed with insulin) before major meals; **reduce prandial insulin ~50%** to avoid the **BBW severe hypoglycemia** (esp. T1DM). Slows gastric emptying. *NABP: 2.A.4 / 3.C.2.*"}, {"id": 174, "group": "Products — Tier 3", "domain": "D2", "tier": "T3", "aware": true, "nabp": "2.B", "stem": "A pharmacist may substitute which product for **Lantus without contacting the prescriber** (interchangeable biosimilar)?", "opts": ["Toujeo (glargine U-300)", "Tresiba (insulin degludec (Tresiba))", "Basaglar (a follow-on)", "Semglee (glargine-yfgn)"], "ans": 3, "exp": "**Semglee** (and **Rezvoglar**) are FDA **interchangeable** with Lantus → substitutable per state law. **Basaglar** is a **follow-on** (505(b)(2)) — **not** interchangeable. *NABP: 2.B.*"}, {"id": 175, "group": "Products — Tier 3", "domain": "D2", "tier": "T3", "aware": false, "nabp": "2.B", "stem": "How does **Basaglar** differ from **Semglee** (both insulin glargine (Lantus))?", "opts": ["Basaglar is a follow-on; Semglee is interchangeable", "Basaglar is interchangeab
